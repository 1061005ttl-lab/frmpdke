[架構說明]
  此頁面是「達成率型」看板，從 Google Sheet 讀取業務進度資料。
  所有專案設定集中在「業務王管理表」(MGMT_SHEET_ID)。
  修改專案只需異動 Google Sheet，不需改動此 HTML。

[業務王管理表 — 三個分頁]
  1.「登入與頁面設定」 → 密碼、看板類型對應頁面檔名
  2.「專案管理」       → 所有岈案基本資料(ON/OFF、sheetId、分頁名等)
  3.「特殊專案進階設定」 → 達成率型特殊專案的複雜 config

[特殊專案進階設定 — 欄位對照(A~M)]
  A 專案名稱     僅供辨識，建議與專案管理 B欄一致
  B 專案ID      Google Sheet ID，需與專案管理 C欄一致
  C 狀態模式     text = 單欄文字比對
                  combo = 雙欄交叉判斷（需有副狀態欄）
  D 主狀態欄     Sheet 中的狀態欄位名稱（必填）
  E 副狀態欄     combo 模式才需填，第二個判斷欄位
  F 狀態定義     填樣板代號：二態 / 二態-已達 / 三態 / 三態-全部
                  空白時：若 L欄進階JSON 有 statusMap 則用 statusMap，
                           否則自動偵測 0/1 欄（通用專案）
  G 額外欄位     明細表額外顯示的欄位，半形逗號分隔（不能有空格）
  H 功能旗標     noGrade（隱藏等級欄）、noChannel（隱藏通路欄）、noVisits（隱藏標準/已訪欄），逗號分隔
                  注意：若 Sheet 無訪次欄位（CI['visits']<0），標準/已訪欄自動隱藏，無需填 noVisits
  I 資料分頁名稱  覆蓋「專案管理」 D欄的 Sheet 分頁名
  J 資料同步分頁  覆蓋「專案管理」 E欄的同步分頁
  K 資料同步格    覆蓋「專案管理」 F欄的同步格（如 B1、E2）
  L 進階JSON      無法標準化的特殊欄位，純 JSON 格式，勿加 markdown 符號
                   可用鍵： range / statusMap / monthCol / monthCols /
                           defaultChannel / pctDecimals /
                           cvsWeightChannel / cvsWeightCap /
                           statusVal（combo用）
  M 備註          給維護人員的說明，程式不讀取

[狀態模式說明]
  text  → Sheet 有一欄存放文字狀態值（如「✔」「達成」「已達」）
           程式靠 statusDefs[].val 或 statusMap 比對，判斷屬於哪個狀態
  combo → Sheet 有兩欄，程式交叉判斷：
           兩欄都達標 → 全達成(l)
           只一欄達標 → 部分達成(y)
           兩欄都未達 → 未達(u)
           判斷值由 L欄進階JSON 的 statusVal 設定

[Session 驗證]
  使用者從 index.html 登入後，localStorage 寫入 ttl_auth_v1=1
  此頁面啟動時檢查此值，不存在則自動跳回 index.html

[新增 AI 接手注意事項]
  - SURVEYS_FIXED 由 loadSpecialConfig() 從 Sheet 動態讀入，勿手動寫死
  - STATUS_TEMPLATES 是狀態定義樣板，對應 F欄代號，勿刪改
  - 啟動順序： loadSpecialConfig → loadSurveys → buildSurveySelects → onSurveyChange
  - 啟動時會自動讀 URL 的 sheetId 參數，對應到正確的專案下拉選項
================================================================================

        overflow: hidden;
      }

      .mini-card:hover {
        border-color: var(--primary);
        transform: translateX(3px);
        box-shadow: 3px 0 10px var(--shadow);
      }

      .mini-card.sel {
        border-color: var(--primary);
        background: rgba(139, 166, 144, .1);
      }

      .mc-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 4px;
        margin-bottom: 8px;
      }

      .mc-name {
        font-size: 17px;
        font-weight: 900;
        color: var(--text);
        word-break: keep-all;
        line-height: 1.2;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .mc-total {
        font-size: 28px;
        font-weight: 900;
        color: var(--primary-d);
        line-height: 1;
        flex-shrink: 0;
        letter-spacing: -1.5px;
      }

      .mc-sts {
        display: flex;
        justify-content: flex-start;
        gap: 5px;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }

      .mc-s {
        font-size: 13px;
        font-weight: 900;
        white-space: nowrap;
      }

      .mc-s.g { color: var(--green); }
      .mc-s.y { color: var(--yellow); }
      .mc-s.p { color: var(--purple); }
      .mc-s.o { color: var(--orange); }
      .mc-s.r { color: var(--red); }

      /* 主要通路巡訪專用：色塊格式 */
      .mc-s-block-met {
        background: var(--green-bg);
        border: 1px solid var(--green-bd);
        border-radius: 6px;
        padding: 3px 8px;
        display: inline-flex;
        align-items: baseline;
        gap: 3px;
      }
      .mc-s-block-unmet {
        background: var(--red-bg);
        border: 1px solid var(--red-bd);
        border-radius: 6px;
        padding: 3px 8px;
        display: inline-flex;
        align-items: baseline;
        gap: 3px;
      }
      .mc-s-sub {
        font-size: 11px;
        font-weight: 700;
        opacity: .75;
      }

      /* ══ 整體卡（統一大卡樣式，不再深色英雄） ══ */
      .big-card.whole {
        cursor: default;
        background: #fff;
        border-radius: var(--r);
        padding: 14px 16px 0 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, .05), 0 1px 0 rgba(255, 255, 255, .9) inset;
        position: relative;
        overflow: hidden;
        animation: cardPop .34s var(--ease) both;
        border: 1.5px solid rgba(139, 166, 144, .45);
      }

      /* 整體卡左側色條（固定顯示，不需 hover） */
      .big-card.whole::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: linear-gradient(180deg, var(--primary-d), var(--primary));
        opacity: 1;
        border-radius: 3px 0 0 3px;
      }

      /* ══ 前3名效果 ══ */
      .big-card.bc-top1,
      .big-card.bc-top2,
      .big-card.bc-top3 {
        position: relative;
      }

      .big-card.bc-top1::after,
      .big-card.bc-top2::after,
      .big-card.bc-top3::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: var(--r);
        pointer-events: none;
        animation: cardGlow 3s ease-in-out infinite;
      }

      .big-card.bc-top1::after {
        box-shadow: 0 0 0 2px rgba(220, 38, 38, .55), 0 4px 20px rgba(220, 38, 38, .25);
        animation-delay: 0s;
      }

      .big-card.bc-top2::after {
        box-shadow: 0 0 0 1.5px rgba(234, 88, 12, .45), 0 4px 16px rgba(234, 88, 12, .18);
        animation-delay: .5s;
      }

      .big-card.bc-top3::after {
        box-shadow: 0 0 0 1.5px rgba(202, 138, 4, .4), 0 4px 14px rgba(202, 138, 4, .15);
        animation-delay: 1s;
      }

      @keyframes cardGlow {

        0%,
        100% {
          opacity: .55;
        }

        50% {
          opacity: 1;
        }
      }

      .big-card.bc-top1 .bc-head::after {
        content: '1';
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 22px;
        height: 22px;
        border-radius: 7px;
        font-size: 12px;
        font-weight: 900;
        color: #fff;
        flex-shrink: 0;
        margin-left: 6px;
        background: linear-gradient(135deg, #7f1d1d, #ef4444);
        box-shadow: 0 2px 8px rgba(239, 68, 68, .45);
      }

      .big-card.bc-top2 .bc-head::after {
        content: '2';
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 22px;
        height: 22px;
        border-radius: 7px;
        font-size: 12px;
        font-weight: 900;
        color: #fff;
        flex-shrink: 0;
        margin-left: 6px;
        background: linear-gradient(135deg, #7c2d12, #f97316);
        box-shadow: 0 2px 6px rgba(249, 115, 22, .4);
      }

      .big-card.bc-top3 .bc-head::after {
        content: '3';
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 22px;
        height: 22px;
        border-radius: 7px;
        font-size: 12px;
        font-weight: 900;
        color: #fff;
        flex-shrink: 0;
        margin-left: 6px;
        background: linear-gradient(135deg, #78350f, #f59e0b);
        box-shadow: 0 2px 6px rgba(245, 158, 11, .35);
      }

      /* ══ 明細按鈕（卡片底部細條） ══ */
      .card-detail-btn {
        display: block;
        width: 100%;
        padding: 5px 0;
        font-size: 11px;
        font-weight: 700;
        color: #999;
        background: rgba(0,0,0,.03);
        border: none;
        border-top: 1px solid rgba(0,0,0,.06);
        cursor: pointer;
        text-align: center;
        letter-spacing: .5px;
        transition: background .12s, color .12s;
        flex-shrink: 0;
        pointer-events: all !important;
      }
      .card-detail-btn:hover {
        background: var(--primary-d);
        color: #fff;
      }
      /* mini-card 底部按鈕：更緊湊 */
      .mini-card .card-detail-btn {
        padding: 3px 0;
        font-size: 10px;
      }
      /* bc-cv-card 底部按鈕：確保在 table 之外 */
      .big-card.bc-cv-card .card-detail-btn {
        pointer-events: all !important;
        position: relative;
        z-index: 20;
        margin-top: 0;
        border-top: 1px solid rgba(0,0,0,.06);
      }

      /* ══ 一般大卡 ══ */
      .big-card {
        background: #fff;
        border-radius: var(--r);
        border: 1px solid rgba(0, 0, 0, .07);
        cursor: pointer;
        overflow: hidden;
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 8px;
        transition: border-color .2s, box-shadow .2s, transform .22s var(--ease);
        animation: cardPop .34s var(--ease) both;
        padding: 14px 16px 0 16px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, .05), 0 1px 0 rgba(255, 255, 255, .9) inset;
      }

      .big-card::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: linear-gradient(180deg, var(--primary-d), var(--primary));
        opacity: 0;
        transition: opacity .2s;
        border-radius: 3px 0 0 3px;
      }

      .big-card:hover::before,
      .big-card.sel::before {
        opacity: 1;
      }

      .big-card:hover {
        border-color: rgba(139, 166, 144, .5);
        box-shadow: 0 8px 28px rgba(139, 166, 144, .18), 0 1px 0 rgba(255, 255, 255, .9) inset;
        transform: translateY(-2px);
      }

      .big-card.sel {
        border-color: rgba(139, 166, 144, .55);
        box-shadow: 0 0 0 3px rgba(139, 166, 144, .15), 0 6px 20px var(--shadow);
      }

      .bc-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .bc-name {
        font-size: clamp(13px, 1.4vw, 17px);
        font-weight: 900;
        color: var(--text);
        white-space: normal;
        word-break: break-all;
        flex: 1;
        min-width: 0;
        line-height: 1.3;
      }

      .bc-total {
        font-size: clamp(22px, 2.5vw, 32px);
        font-weight: 900;
        color: var(--primary-d);
        line-height: 1;
        letter-spacing: -1.5px;
        flex-shrink: 0;
      }

      /* ══ [主要通路巡訪] 大卡全新設計 ══ */

      .big-card.bc-cv-card {
        padding: 0 !important;
        overflow: hidden;
        gap: 0 !important;
        border-radius: var(--r);
      }

      .bc-cv-tbl {
        width: 100%;
        border-collapse: collapse;
        table-layout: auto;
      }

      /* ── 標題列 ── */
      .bc-cv-thead tr {
        background: rgba(0,0,0,.025);
      }

      .bc-cv-th-name {
        font-size: 20px;
        font-weight: 900;
        color: var(--text);
        text-align: left;
        padding: 10px 8px 9px 14px;
        white-space: nowrap;
        vertical-align: middle;
        line-height: 1;
        letter-spacing: -.3px;
        border-left: 4px solid var(--primary-d);
        max-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        width: 100%;
      }

      .bc-cv-th-cnt {
        font-size: 11px;
        font-weight: 700;
        color: var(--sub);
        text-align: right;
        padding: 8px 10px 8px 4px;
        white-space: nowrap;
        vertical-align: middle;
        min-width: 48px;
        letter-spacing: .2px;
      }

      .bc-cv-th {
        font-size: 12px;
        font-weight: 800;
        text-align: right;
        padding: 8px 14px 8px 8px;
        white-space: nowrap;
        vertical-align: middle;
        min-width: 110px;
        letter-spacing: .5px;
        text-transform: uppercase;
      }
      .bc-cv-th.bc-cv-met   { color: #1a7a38; }
      .bc-cv-th.bc-cv-unmet { color: #b52218; }
      .bc-cv-th.bc-cv-neutral { color: var(--yellow); }

      /* ── 資料列：主列與子列完全統一 ── */
      .bc-cv-tbody tr {
        border-top: 1px solid rgba(0,0,0,.05);
        transition: background .1s;
      }
      .bc-cv-tbody tr:hover { background: rgba(0,0,0,.02); }

      .bc-cv-lbl {
        font-size: 11px;
        font-weight: 700;
        color: #666;
        white-space: nowrap;
        padding: 9px 4px 9px 14px;
        vertical-align: middle;
        letter-spacing: .2px;
      }

      .bc-cv-cnt {
        font-size: 13px;
        font-weight: 800;
        color: #555;
        text-align: right;
        padding: 9px 10px 9px 4px;
        vertical-align: middle;
        font-variant-numeric: tabular-nums;
        min-width: 48px;
        white-space: nowrap;
      }

      /* 百分比欄：右對齊，固定最小寬度防截斷 */
      .bc-cv-td {
        text-align: right;
        padding: 9px 14px 9px 8px;
        vertical-align: middle;
        white-space: nowrap;
        min-width: 110px;
      }

      .bc-cv-pct {
        font-size: 18px;
        font-weight: 900;
        font-variant-numeric: tabular-nums;
        letter-spacing: -.3px;
        display: inline-block;
        min-width: 3.2em;
        text-align: right;
      }
      .bc-cv-num {
        font-size: 12px;
        font-weight: 700;
        opacity: .65;
        margin-left: 2px;
        white-space: nowrap;
      }

      .bc-cv-met .bc-cv-pct { color: var(--green); }
      .bc-cv-met .bc-cv-num { color: var(--green); }
      .bc-cv-unmet .bc-cv-pct { color: var(--red); }
      .bc-cv-unmet .bc-cv-num { color: var(--red); }
      .bc-cv-neutral .bc-cv-pct { color: var(--yellow); }
      .bc-cv-neutral .bc-cv-num { color: var(--yellow); }

      .bc-cv-td.bc-cv-td-zero {
        opacity: 0.18;
        filter: grayscale(1);
      }

      /* ══ [2026-05-28] bc-cv-card 人員/個人頭卡補充樣式 ══ */

      /* th-name 內的角落資訊 */
      .bc-cv-corner {
        font-size: 11px;
        font-weight: 700;
        color: var(--sub);
        opacity: .75;
        margin-left: auto;
        white-space: nowrap;
      }
      .bc-cv-visits {
        font-size: 10px;
        font-weight: 700;
        color: #4a7a55;
      }

      /* staff-view 下的 bc-cv-card：名字欄稍縮 */
      .staff-view .big-card.bc-cv-card .bc-cv-th-name {
        font-size: 17px;
        padding: 8px 8px 7px 12px;
      }
      .staff-view .big-card.bc-cv-card .bc-cv-th-name--staff {
        font-size: 16px;
        padding: 7px 6px 6px 12px;
        letter-spacing: -.2px;
      }

      /* store-view 頭卡（個人層級）：full width + 不可點擊 */
      .store-view .big-card.bc-cv-card.whole {
        grid-column: 1 / -1;
        cursor: default;
        border-left: 5px solid var(--primary-d);
        margin-bottom: 0;
      }
      /* 個人頭卡：覆寫深色 whole 背景，改成淺色清爽版 */
      .sv-personal-header {
        background: var(--card) !important;
        color: var(--text) !important;
      }
      .sv-personal-header .bc-cv-thead tr {
        background: rgba(139,166,144,.08);
      }
      .sv-personal-header .bc-cv-tbody tr {
        background: transparent;
      }
      /* 個人頭卡人名欄：用綠色主題色，不用大白字 */
      .sv-ph-name {
        font-size: clamp(18px, 2vw, 26px) !important;
        color: var(--primary-d) !important;
        padding: 10px 10px 9px 16px !important;
        border-left: 5px solid var(--primary-d) !important;
      }
      /* ── 清冊展開 bar（清冊框上緣） ── */
      .sp-toggle-bar {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 7px 14px;
        font-size: 12px;
        font-weight: 700;
        color: var(--primary-d);
        background: rgba(139,166,144,.10);
        border-bottom: 1px solid rgba(0,0,0,.07);
        cursor: pointer;
        user-select: none;
        transition: background .14s;
        border-radius: var(--r) var(--r) 0 0;
      }
      .sp-toggle-bar:hover {
        background: rgba(139,166,144,.18);
      }
      .bc-tbl { width: 100%; border-collapse: collapse; margin-top: 6px; }
      .bc-tbl-th-name { font-size: 16px; font-weight: 900; color: var(--text); text-align: left; padding: 3px 4px 5px 0; white-space: nowrap; }
      .bc-tbl-th-count { font-size: 11px; font-weight: 700; color: var(--sub); text-align: right; padding: 2px 6px; }
      .bc-tbl-th { font-size: 11px; font-weight: 700; text-align: center; padding: 2px 4px; }
      .bc-tbl-th.g { color: var(--green); }
      .bc-tbl-th.y { color: var(--yellow); }
      .bc-tbl-th.r { color: var(--red); }
      .bc-tbl-lbl { font-size: 12px; font-weight: 700; color: var(--sub); padding: 5px 5px 5px 0; white-space: nowrap; }
      .bc-tbl-count { font-size: 12px; color: var(--sub); text-align: right; padding: 5px 7px; }
      .bc-tbl-td { text-align: center; padding: 4px 5px; border-top: 1px solid rgba(0,0,0,.05); }
      .bc-tbl-pct { font-size: clamp(13px, 1.2vw, 15px); font-weight: 900; }
      .bc-tbl-num { font-size: 11px; color: var(--sub); margin-left: 2px; }
      .bc-tbl-td.g .bc-tbl-pct { color: var(--green); }
      .bc-tbl-td.r .bc-tbl-pct { color: var(--red); }
      .bc-tbl-td.y .bc-tbl-pct { color: var(--yellow); }
      /* 達成（綠）色塊 */
      .bc-tbl-td.bc-tbl-td-met { background: var(--green-bg); }
      .bc-tbl-td.bc-tbl-td-met .bc-tbl-pct { color: var(--green); }
      /* 未達（紅）色塊 */
      .bc-tbl-td.bc-tbl-td-unmet { background: var(--red-bg); }
      .bc-tbl-td.bc-tbl-td-unmet .bc-tbl-pct { color: var(--red); }
      .bc-tbl-tag { font-size: 10px; font-weight: 700; color: var(--green); margin-left: 2px; }
      /* ══ 統計格：行內橫排 ══ */
      .bc-stats {
        display: none; /* 已改為行內顯示 */
      }

      /* 行內統計列 — 每個狀態獨立色框，文字在上數字在下 */
      .bc-inline-stats {
        display: flex;
        gap: 6px;
        align-items: stretch;
        flex-wrap: wrap;
        width: 100%;
        margin-top: 2px;
      }

      .bc-inline-st {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1px;
        padding: 5px 9px 6px;
        border-radius: 8px;
        border: 1px solid transparent;
        flex: 1;
        min-width: 0;
        white-space: nowrap;
      }

      .bc-inline-lbl {
        font-size: clamp(9px, 0.8vw, 11px);
        font-weight: 800;
        letter-spacing: .2px;
        line-height: 1.2;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 100%;
      }

      .bc-inline-num-row {
        display: flex;
        align-items: baseline;
        gap: 2px;
        white-space: nowrap;
      }

      .bc-inline-pct {
        font-size: clamp(13px, 1.3vw, 17px);
        font-weight: 900;
        line-height: 1;
      }

      .bc-inline-num {
        font-size: clamp(13px, 1.3vw, 17px);
        font-weight: 700;
        opacity: .8;
      }

      /* 數量為0的狀態框：完全透明，不搶眼，讓有數字的色塊更突出 */
      .bc-inline-st.bc-st-zero {
        opacity: 0.18;
        filter: grayscale(1);
        background: transparent !important;
        border-color: transparent !important;
      }
      .bc-inline-st.bc-st-zero .bc-inline-pct {
        font-size: clamp(11px, 1.1vw, 15px);
      }

      /* bc-inline 顏色 + 框 */
      .bc-inline-st.g {
        background: var(--green-bg);
        border-color: var(--green-bd);
      }
      .bc-inline-st.g .bc-inline-lbl { color: #1e6e35; }
      .bc-inline-st.g .bc-inline-pct,
      .bc-inline-st.g .bc-inline-num { color: var(--green); }

      .bc-inline-st.y {
        background: var(--yellow-bg);
        border-color: var(--yellow-bd);
      }
      .bc-inline-st.y .bc-inline-lbl { color: #7a5500; }
      .bc-inline-st.y .bc-inline-pct,
      .bc-inline-st.y .bc-inline-num { color: var(--yellow); }

      .bc-inline-st.r {
        background: var(--red-bg);
        border-color: var(--red-bd);
      }
      .bc-inline-st.r .bc-inline-lbl { color: #922018; }
      .bc-inline-st.r .bc-inline-pct,
      .bc-inline-st.r .bc-inline-num { color: var(--red); }

      .bc-inline-st.p {
        background: var(--purple-bg);
        border-color: var(--purple-bd);
      }
      .bc-inline-st.p .bc-inline-lbl { color: #5b21b6; }
      .bc-inline-st.p .bc-inline-pct,
      .bc-inline-st.p .bc-inline-num { color: var(--purple); }

      .bc-inline-st.o {
        background: var(--orange-bg);
        border-color: var(--orange-bd);
      }
      .bc-inline-st.o .bc-inline-lbl { color: #92400e; }
      .bc-inline-st.o .bc-inline-pct,
      .bc-inline-st.o .bc-inline-num { color: var(--orange); }

      .bc-st {
        padding: 6px 7px;
        display: flex;
        flex-direction: column;
        gap: 1px;
        overflow: hidden;
      }

      .bc-st.g {
        background: #f0faf4;
      }

      .bc-st.y {
        background: #fdf8ed;
      }

      .bc-st.p {
        background: #f5f3ff;
      }

      .bc-st.o {
        background: #fff7ed;
      }

      .bc-st.r {
        background: #fdf0ef;
      }

      .bc-st-lbl {
        font-size: clamp(8px, 0.8vw, 11px);
        font-weight: 700;
        letter-spacing: .2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .bc-st.g .bc-st-lbl {
        color: #1e6e35;
      }

      .bc-st.y .bc-st-lbl {
        color: #7a5500;
      }

      .bc-st.p .bc-st-lbl {
        color: #5b21b6;
      }

      .bc-st.o .bc-st-lbl {
        color: #92400e;
      }

      .bc-st.r .bc-st-lbl {
        color: #922018;
      }

      .bc-st-row {
        display: flex;
        flex-direction: row;
        align-items: baseline;
        gap: 3px;
        flex-wrap: nowrap;
      }

      .bc-st-pct {
        font-size: clamp(12px, 1.3vw, 18px);
        font-weight: 900;
        line-height: 1.1;
        white-space: nowrap;
      }

      .bc-st-num {
        font-size: clamp(12px, 1.3vw, 18px);
        font-weight: 700;
        opacity: .85;
        white-space: nowrap;
      }

      .bc-st.g .bc-st-num {
        color: var(--green);
      }

      .bc-st.g .bc-st-pct {
        color: var(--green);
      }

      .bc-st.y .bc-st-num {
        color: var(--yellow);
      }

      .bc-st.y .bc-st-pct {
        color: var(--yellow);
      }

      .bc-st.p .bc-st-num {
        color: var(--purple);
      }

      .bc-st.p .bc-st-pct {
        color: var(--purple);
      }

      .bc-st.o .bc-st-num {
        color: var(--orange);
      }

      .bc-st.o .bc-st-pct {
        color: var(--orange);
      }

      .bc-st.r .bc-st-num {
        color: var(--red);
      }

      .bc-st.r .bc-st-pct {
        color: var(--red);
      }

      /* 進度條色段 */
      .seg-g {
        background: linear-gradient(180deg, #6ee89c 0%, #22c55e 55%, #16a34a 100%);
        box-shadow: inset 0 1px 0 rgba(255,255,255,.3);
        transition: width .6s ease;
      }

      .seg-y {
        background: linear-gradient(180deg, #fcd34d 0%, #f59e0b 55%, #d97706 100%);
        box-shadow: inset 0 1px 0 rgba(255,255,255,.3);
        transition: width .6s ease;
      }

      .seg-p {
        background: linear-gradient(180deg, #c4b5fd 0%, #7c3aed 55%, #6d28d9 100%);
        box-shadow: inset 0 1px 0 rgba(255,255,255,.25);
        transition: width .6s ease;
      }

      .seg-o {
        background: linear-gradient(180deg, #fdba74 0%, #ea6c00 55%, #c05500 100%);
        box-shadow: inset 0 1px 0 rgba(255,255,255,.25);
        transition: width .6s ease;
      }

      .seg-r {
        background: linear-gradient(180deg, #fca5a5 0%, #ef4444 55%, #dc2626 100%);
        box-shadow: inset 0 1px 0 rgba(255,255,255,.25);
        transition: width .6s ease;
      }

      /* area-view 字級放大 */
      .area-view .bc-name {
        font-size: clamp(15px, 1.7vw, 20px);
      }

      .area-view .bc-total {
        font-size: clamp(32px, 3.8vw, 46px);
      }

      .area-view .bc-st-num {
        font-size: clamp(16px, 2vw, 24px);
      }

      .area-view .bc-st-pct {
        font-size: clamp(10px, 1vw, 13px);
      }

      .area-view .bc-st-lbl {
        font-size: clamp(9px, 0.9vw, 12px);
      }

      /* office-view */
      .office-view .big-card {
        padding: 11px 13px;
        gap: 8px;
      }

      .office-view .bc-st {
        padding: 5px 6px;
      }

      /* ══ 人員層 ══ */
      .staff-card {
        background: #fff;
        border: 1px solid rgba(0, 0, 0, .07);
        border-radius: var(--r);
        cursor: pointer;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        gap: 0;
        transition: border-color .18s, box-shadow .18s, transform .18s;
        animation: cardPop .32s var(--ease) both;
        box-shadow: 0 2px 8px rgba(0, 0, 0, .05), 0 1px 0 rgba(255, 255, 255, .9) inset;
      }

      .staff-card:hover {
        border-color: rgba(139, 166, 144, .5);
        box-shadow: 0 6px 20px rgba(139, 166, 144, .16);
        transform: translateY(-2px);
      }

      .staff-card.sel {
        border-color: rgba(139, 166, 144, .55);
      }

      .sc-head {
        padding: 10px 12px 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .sc-name {
        font-size: clamp(14px, 1.5vw, 20px);
        font-weight: 900;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex-shrink: 0;
      }

      .sc-corner {
        text-align: right;
        flex-shrink: 0;
      }

      .sc-corner-num {
        font-size: clamp(18px, 2vw, 26px);
        font-weight: 900;
        color: var(--primary-d);
        line-height: 1;
        letter-spacing: -1px;
        display: block;
      }

      .sc-corner-pct {
        font-size: clamp(9px, 0.85vw, 11px);
        font-weight: 700;
        color: var(--sub);
        display: block;
        margin-top: 1px;
        white-space: nowrap;
      }

      /* 人員卡統計格：改為行內 */
      .sc-stats {
        display: none;
      }

      .sc-stats.cols-2 {
        grid-template-columns: repeat(2, 1fr);
      }

      .sc-stats.cols-3 {
        grid-template-columns: repeat(3, 1fr);
      }

      .sc-stats.cols-4 {
        grid-template-columns: repeat(2, 1fr);
      }

      /* 4格換2行 */
      .sc-stats.cols-5 {
        grid-template-columns: repeat(3, 1fr);
      }

      .sc-st {
        padding: 6px 7px 8px;
        display: flex;
        flex-direction: column;
        gap: 1px;
        border-right: 1px solid rgba(0, 0, 0, .06);
        overflow: hidden;
        min-width: 0;
      }

      .sc-st:last-child {
        border-right: none;
      }

      /* 4格時讓第2行左兩格有上邊框 */
      .sc-stats.cols-4 .sc-st:nth-child(3),
      .sc-stats.cols-4 .sc-st:nth-child(4) {
        border-top: 1px solid rgba(0, 0, 0, .06);
      }

      .sc-stats.cols-4 .sc-st:nth-child(2) {
        border-right: none;
      }

      .sc-st-lbl {
        font-size: clamp(8px, 0.8vw, 10px);
        font-weight: 700;
        color: var(--sub);
        white-space: nowrap;
        letter-spacing: .2px;
      }

      .sc-st-row {
        display: flex;
        flex-direction: row;
        align-items: baseline;
        gap: 3px;
        flex-wrap: nowrap;
        overflow: hidden;
        white-space: nowrap;
      }

      .sc-st-pct {
        font-size: 15px;
        font-weight: 900;
        line-height: 1;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .sc-st-num {
        font-size: 15px;
        font-weight: 700;
        opacity: .85;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .sc-st.g .sc-st-num {
        color: var(--green);
      }

      .sc-st.g .sc-st-pct {
        color: var(--green);
      }

      .sc-st.y .sc-st-num {
        color: var(--yellow);
      }

      .sc-st.y .sc-st-pct {
        color: var(--yellow);
      }

      .sc-st.p .sc-st-num {
        color: var(--purple);
      }

      .sc-st.p .sc-st-pct {
        color: var(--purple);
      }

      .sc-st.o .sc-st-num {
        color: var(--orange);
      }

      .sc-st.o .sc-st-pct {
        color: var(--orange);
      }

      .sc-st.r .sc-st-num {
        color: var(--red);
      }

      .sc-st.r .sc-st-pct {
        color: var(--red);
      }

      /* 人員卡行內統計 — 同 bc-inline-stats 框式 */
      .sc-inline-stats {
        display: flex;
        gap: 5px;
        align-items: stretch;
        flex-wrap: wrap;
        flex: 1;
        min-width: 0;
        margin-top: 4px;
      }

      .sc-inline-st {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1px;
        padding: 4px 7px 5px;
        border-radius: 7px;
        border: 1px solid transparent;
        flex: 1;
        min-width: 0;
        white-space: nowrap;
      }

      .sc-inline-st.sc-st-zero {
        opacity: 0.28;
        filter: grayscale(0.6);
      }

      .sc-inline-lbl {
        font-size: clamp(8px, 0.75vw, 10px);
        font-weight: 800;
        letter-spacing: .2px;
        line-height: 1.2;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 100%;
      }

      .sc-inline-num-row {
        display: flex;
        align-items: baseline;
        gap: 2px;
        white-space: nowrap;
      }

      .sc-inline-pct {
        font-size: clamp(13px, 1.3vw, 17px);
        font-weight: 900;
        line-height: 1;
      }

      .sc-inline-num {
        font-size: clamp(13px, 1.3vw, 17px);
        font-weight: 700;
        opacity: .8;
      }

      /* sc-inline 顏色 + 框 */
      .sc-inline-st.g { background: var(--green-bg); border-color: var(--green-bd); }
      .sc-inline-st.g .sc-inline-lbl { color: #1e6e35; }
      .sc-inline-st.g .sc-inline-pct,
      .sc-inline-st.g .sc-inline-num { color: var(--green); }

      .sc-inline-st.y { background: var(--yellow-bg); border-color: var(--yellow-bd); }
      .sc-inline-st.y .sc-inline-lbl { color: #7a5500; }
      .sc-inline-st.y .sc-inline-pct,
      .sc-inline-st.y .sc-inline-num { color: var(--yellow); }

      .sc-inline-st.r { background: var(--red-bg); border-color: var(--red-bd); }
      .sc-inline-st.r .sc-inline-lbl { color: #922018; }
      .sc-inline-st.r .sc-inline-pct,
      .sc-inline-st.r .sc-inline-num { color: var(--red); }

      .sc-inline-st.p { background: var(--purple-bg); border-color: var(--purple-bd); }
      .sc-inline-st.p .sc-inline-lbl { color: #5b21b6; }
      .sc-inline-st.p .sc-inline-pct,
      .sc-inline-st.p .sc-inline-num { color: var(--purple); }

      .sc-inline-st.o { background: var(--orange-bg); border-color: var(--orange-bd); }
      .sc-inline-st.o .sc-inline-lbl { color: #92400e; }
      .sc-inline-st.o .sc-inline-pct,
      .sc-inline-st.o .sc-inline-num { color: var(--orange); }

      /* ══ 店家層 ══ */
      .store-header {
        background: #fff;
        border: 1px solid rgba(0, 0, 0, .07);
        border-radius: var(--r);
        padding: 12px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        animation: panelFade .28s var(--ease) both;
        box-shadow: 0 2px 8px rgba(0, 0, 0, .04);
        gap: 10px;
        flex-wrap: nowrap;
        overflow: hidden;
      }

      .sh-left {
        display: flex;
        align-items: center;
        gap: 12px;
        flex: 1;
        min-width: 0;
        overflow: hidden;
        flex-wrap: wrap;
      }

      .sh-toggle {
        padding: 5px 14px;
        border-radius: 7px;
        border: 1px solid rgba(0, 0, 0, .12);
        background: rgba(255, 255, 255, .7);
        color: var(--text);
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        white-space: nowrap;
        font-family: inherit;
        flex-shrink: 0;
        transition: all .14s;
      }

      .sh-toggle:hover {
        border-color: var(--primary);
        color: var(--primary-d);
      }

      .sh-name {
        font-size: 16px;
        font-weight: 900;
        color: var(--text);
        white-space: nowrap;
      }

      .sh-stats {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: baseline;
      }

      .sh-s {
        font-size: 13px;
        font-weight: 800;
        white-space: nowrap;
        display: inline-flex;
        align-items: baseline;
        gap: 3px;
      }

      .sh-s-lbl {
        font-size: 11px;
        font-weight: 700;
        opacity: .7;
      }

      .sh-s-pct {
        font-size: 16px;
        font-weight: 900;
      }

      .sh-s-num {
        font-size: 16px;
        font-weight: 700;
        opacity: .75;
      }

      .sh-s.g {
        color: var(--green);
      }

      .sh-s.y {
        color: var(--yellow);
      }

      .sh-s.p {
        color: var(--purple);
      }

      .sh-s.o {
        color: var(--orange);
      }

      .sh-s.r {
        color: var(--red);
      }

      .store-panel {
        background: #fff;
        border: 1px solid rgba(0, 0, 0, .07);
        border-radius: var(--r);
        overflow: hidden;
        animation: panelFade .3s var(--ease) both;
        box-shadow: 0 2px 8px rgba(0, 0, 0, .04);
      }

      .store-panel.hidden {
        display: none;
      }

      .store-panel.sg {
        border-left: 4px solid var(--green);
      }

      .sp-body {
        overflow-x: hidden;
      }

      .store-tbl {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }

      .store-tbl .col-name {
        width: 200px !important;
        max-width: 200px !important;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .store-tbl th {
        position: sticky;
        top: 0;
        z-index: 2;
        padding: 7px 10px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: .3px;
        text-align: left;
        color: var(--sub);
        background: #f0ece3;
        border-bottom: 1px solid rgba(0, 0, 0, .1);
        overflow: hidden;
        white-space: nowrap;
      }

      /* dialog 內的 th 確保背景不透明 */
      #staff-dlg-body .store-tbl th {
        background: #fff;
        top: 0;
      }

      .store-tbl td {
        padding: 8px 10px;
        font-size: 12px;
        border-bottom: 1px solid rgba(0, 0, 0, .04);
        vertical-align: top;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .store-tbl tbody tr:nth-child(even) td {
        background: rgba(0, 0, 0, .012);
      }

      .store-tbl tr:last-child td {
        border-bottom: none;
      }

      .store-tbl tr:hover td {
        background: rgba(139, 166, 144, .08) !important;
      }

      /* ── 狀態篩選 tabs ── */
      #staff-dlg-filter {
        display: flex;
        gap: 6px;
        padding: 8px 14px;
        background: #faf9f6;
        border-bottom: 1px solid rgba(0,0,0,.06);
        flex-shrink: 0;
        flex-wrap: wrap;
        align-items: center;
      }
      .dlg-filter-lbl {
        font-size: 11px;
        font-weight: 700;
        color: #999;
        margin-right: 2px;
        white-space: nowrap;
      }
      .dlg-filter-btn {
        font-size: 12px;
        font-weight: 800;
        padding: 4px 12px;
        border-radius: 20px;
        border: 1.5px solid rgba(0,0,0,.12);
        background: #fff;
        color: #666;
        cursor: pointer;
        white-space: nowrap;
        transition: all .12s;
      }
      .dlg-filter-btn:hover { background: #f0f0f0; }
      .dlg-filter-btn.active-all {
        background: #444;
        border-color: #444;
        color: #fff;
      }
      .dlg-filter-btn.active-met {
        background: var(--green);
        border-color: var(--green);
        color: #fff;
      }
      .dlg-filter-btn.active-unmet {
        background: var(--red);
        border-color: var(--red);
        color: #fff;
      }

      /* 篩選隱藏的 row */
      .store-tbl tr.dlg-hidden {
        display: none;
      }

      /* bc-cv-card 人員卡：table 及所有子元素不攔截 click，讓事件冒泡到 card */
      .big-card.bc-cv-card .bc-cv-tbl,
      .big-card.bc-cv-card .bc-cv-tbl *  {
        pointer-events: none;
      }
      .big-card.bc-cv-card {
        cursor: pointer;
      }
      /* 整體卡和個人頭卡不可點 */
      .big-card.bc-cv-card.whole,
      .big-card.bc-cv-card.sv-personal-header {
        cursor: default;
      }
      .big-card.bc-cv-card.whole .bc-cv-tbl,
      .big-card.bc-cv-card.whole .bc-cv-tbl *,
      .big-card.bc-cv-card.sv-personal-header .bc-cv-tbl,
      .big-card.bc-cv-card.sv-personal-header .bc-cv-tbl * {
        pointer-events: auto;
      }

      /* 斑馬紋改用 CSS :not(.dlg-hidden) 避免篩選後色差錯亂 */
      .store-tbl tbody tr:nth-child(even) td { background: transparent; }
      .store-tbl tbody tr:not(.dlg-hidden):nth-child(even) td {
        background: rgba(0,0,0,.012);
      }
      .bc-visits {
        font-size: 11px;
        font-weight: 700;
        color: #4a7a55;
        padding: 3px 8px 5px;
        background: rgba(139, 166, 144, .1);
        border-top: 1px solid rgba(139, 166, 144, .15);
        text-align: center;
        margin: 4px -18px -16px -18px;
      }
      .bc-visits strong { font-size: 14px; color: #3a6a45; }
      .sc-visits {
        display: block;
        font-size: 10px;
        font-weight: 700;
        color: #6a8a70;
        margin-top: 2px;
        white-space: nowrap;
      }

      /* ══ 三層橫向對比列（總體→非CVS→CVS） ══ */
      .bc-tri {
        display: flex;
        flex-direction: column;
        gap: 3px;
        margin-top: 4px;
      }
      .bc-tri-row {
        display: flex;
        align-items: center;
        gap: 0;
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid rgba(0,0,0,.06);
        min-height: 28px;
      }
      .bc-tri-hdr {
        font-size: 10px;
        font-weight: 800;
        padding: 5px 8px;
        white-space: nowrap;
        flex-shrink: 0;
        width: 108px;
        min-width: 108px;
        display: flex;
        align-items: center;
        gap: 4px;
        line-height: 1.2;
      }
      .bc-tri-hdr .bc-tri-visits {
        font-size: 9px;
        font-weight: 700;
        opacity: .7;
        margin-left: 3px;
        white-space: nowrap;
      }
      .bc-tri-cells {
        display: flex;
        flex: 1;
        min-width: 0;
        gap: 1px;
        background: rgba(0,0,0,.05);
      }
      .bc-tri-cell {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 2px;
        padding: 4px 6px;
        min-width: 0;
      }
      .bc-tri-pct {
        font-size: clamp(11px, 1.1vw, 14px);
        font-weight: 900;
        white-space: nowrap;
        line-height: 1;
      }
      .bc-tri-num {
        font-size: clamp(11px, 1.1vw, 14px);
        font-weight: 700;
        opacity: .8;
        white-space: nowrap;
      }
      /* 總體列 */
      .bc-tri-row.total { background: #f4f6f4; }
      .bc-tri-row.total .bc-tri-hdr { background: rgba(139,166,144,.18); color: #3a5a45; }
      .bc-tri-row.total .bc-tri-cell { background: #f4f6f4; }
      /* 非CVS列 */
      .bc-tri-row.noncvs { background: #f8faf9; }
      .bc-tri-row.noncvs .bc-tri-hdr { background: rgba(139,166,144,.1); color: #5a7a60; }
      .bc-tri-row.noncvs .bc-tri-cell { background: #f8faf9; }
      /* CVS列 */
      .bc-tri-row.cvs { background: #f0f5ff; }
      .bc-tri-row.cvs .bc-tri-hdr { background: rgba(100,130,200,.12); color: #3a60aa; }
      .bc-tri-row.cvs .bc-tri-cell { background: #f0f5ff; }
      /* 顏色 */
      .bc-tri-cell.g .bc-tri-pct,
      .bc-tri-cell.g .bc-tri-num { color: var(--green); }
      .bc-tri-cell.y .bc-tri-pct,
      .bc-tri-cell.y .bc-tri-num { color: var(--yellow); }
      .bc-tri-cell.r .bc-tri-pct,
      .bc-tri-cell.r .bc-tri-num { color: var(--red); }
      .bc-tri-cell.p .bc-tri-pct,
      .bc-tri-cell.p .bc-tri-num { color: var(--purple); }
      .bc-tri-cell.o .bc-tri-pct,
      .bc-tri-cell.o .bc-tri-num { color: var(--orange); }
      /* CVS達標特殊標示 */
      .bc-tri-tag {
        font-size: 8px;
        font-weight: 800;
        padding: 1px 4px;
        border-radius: 4px;
        background: rgba(58,106,170,.15);
        color: #3a60aa;
        margin-left: 2px;
        vertical-align: middle;
        white-space: nowrap;
        flex-shrink: 0;
      }

      /* bc-tri 在人員卡中的微調 */
      .staff-card .bc-tri {
        margin: 4px 0 0;
      }
      .staff-card .bc-tri-hdr {
        font-size: 9.5px;
        width: 100px;
        min-width: 100px;
      }

      /* ══ 人員詳情頁（store-header）雙欄摘要 ══ */
      .sh-dual {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 4px 10px;
        margin-top: 6px;
        padding: 5px 10px;
        background: rgba(0,0,0,.04);
        border-radius: 7px;
        font-size: 11px;
        font-weight: 700;
        width: 100%;
      }
      .sh-dual-lbl {
        font-size: 9.5px;
        font-weight: 900;
        letter-spacing: .3px;
        opacity: .8;
        white-space: nowrap;
      }
      .sh-dual-lbl.real { color: #4a7a55; }
      .sh-dual-lbl.weighted { color: #3a5faa; }

      /* 加權數字角標 */
      .wt-badge {
        display: inline-block;
        font-size: 10px;
        font-weight: 800;
        color: #3a6aaa;
        background: rgba(58, 106, 170, .1);
        border: 1px solid rgba(58, 106, 170, .25);
        border-radius: 5px;
        padding: 1px 5px;
        margin-left: 4px;
        vertical-align: middle;
        white-space: nowrap;
        letter-spacing: 0;
      }
      /* 整體卡裡的加權角標（白底版） */
      .wc-badge {
        display: inline-block;
        font-size: 11px;
        font-weight: 800;

    <script>
      /* \u2550\u2550 \u8A2D\u5B9A \u2550\u2550 */
      /* \u2550\u2550 \u7BA1\u7406\u5206\u9801\u8A2D\u5B9A \u2550\u2550 */
      var MGMT_SHEET_ID = '1PR9OR7BIGyTpcH8QSMRXkPhQTr4h3m0UK3gET29f19s';
      var MGMT_SHEET_NAME = '\u5C08\u6848\u7BA1\u7406';
      var SPECIAL_SHEET_NAME = '\u7279\u6B8A\u5C08\u6848\u9032\u968E\u8A2D\u5B9A';
      var STATUS_TEMPLATES = {
        '\u4E8C\u614B': [
          { key:'l', val:'\u9054\u6210', label:'\u2705 \u9054\u6210',   labelShort:'\u9054\u6210',   cls:'g', emoji:'\u2705' },
          { key:'u', val:'\u672A\u9054', label:'\uD83D\uDD34 \u672A\u9054',   labelShort:'\u672A\u9054',   cls:'r', emoji:'\uD83D\uDD34' }
        ],
        '\u4E8C\u614B-\u5DF2\u9054': [
          { key:'l', val:'\u5DF2\u9054', label:'\u2705 \u5DF2\u9054\u6210', labelShort:'\u5DF2\u9054\u6210', cls:'g', emoji:'\u2705' },
          { key:'u', val:'\u672A\u9054', label:'\uD83D\uDD34 \u672A\u9054\u6210', labelShort:'\u672A\u9054\u6210', cls:'r', emoji:'\uD83D\uDD34' }
        ],
        '\u4E8C\u614B-checkbox': [
          { key:'l', val:'true',  label:'\u2705 \u9054\u6210', labelShort:'\u9054\u6210', cls:'g', emoji:'\u2705' },
          { key:'u', val:'false', label:'\uD83D\uDD34 \u672A\u9054', labelShort:'\u672A\u9054', cls:'r', emoji:'\uD83D\uDD34' }
        ],
        '\u4E09\u614B': [
          { key:'l', val:'\u2714', label:'\u2705 \u9054\u6210',  labelShort:'\u9054\u6210',  cls:'g', emoji:'\u2705' },
          { key:'y', val:'\u2501', label:'\uD83D\uDFE1 \u9589\u5E97', labelShort:'\u9589\u5E97', cls:'y', emoji:'\uD83D\uDFE1' },
          { key:'u', val:'\u2716', label:'\uD83D\uDD34 \u672A\u9054', labelShort:'\u672A\u9054', cls:'r', emoji:'\uD83D\uDD34' }
        ],
        '\u4E09\u614B-\u5168\u90E8': [
          { key:'l', label:'\u2705 \u5168\u9054\u6210',   labelShort:'\u5168\u9054\u6210',   cls:'g', emoji:'\u2705' },
          { key:'y', label:'\uD83D\uDFE1 \u90E8\u5206\u9054\u6210', labelShort:'\u90E8\u5206\u9054\u6210', cls:'y', emoji:'\uD83D\uDFE1' },
          { key:'u', label:'\uD83D\uDD34 \u672A\u67E5',   labelShort:'\u672A\u67E5',   cls:'r', emoji:'\uD83D\uDD34' }
        ]
      };

      /* \u7279\u6B8A\u5C08\u6848\u7531 loadSpecialConfig() \u5F9E\u300C\u7279\u6B8A\u5C08\u6848\u9032\u968E\u8A2D\u5B9A\u300D\u5206\u9801\u52D5\u614B\u8B80\u5165\uFF0C\u52FF\u624B\u52D5\u5BEB\u6B7B */
      var SURVEYS_FIXED = [];

      /* \u5168\u57DF SURVEYS\uFF0C\u555F\u52D5\u5F8C\u7531 loadSurveys() \u586B\u5165 */
      var SURVEYS = [];

      /* \u2500\u2500 \u5F9E\u300C\u7279\u6B8A\u5C08\u6848\u9032\u968E\u8A2D\u5B9A\u300D\u5206\u9801\u8B80\u5165\u7279\u6B8A config \u2500\u2500 */
      function loadSpecialConfig(callback) {
        var url = 'https://docs.google.com/spreadsheets/d/' + MGMT_SHEET_ID +
          '/gviz/tq?tqx=out:json&sheet=' + encodeURIComponent(SPECIAL_SHEET_NAME);
        fetch(url)
          .then(function(r) { return r.text(); })
          .then(function(txt) {
            var json = JSON.parse(txt.replace(/^[^\(]+\(/, '').replace(/\);?\s*$/, ''));
            var rows = (json.table && json.table.rows) || [];
            var list = [];
            rows.forEach(function(row) {
              var cells = row.c || [];
              function cv(c) { return c ? String(c.v !== null && c.v !== undefined ? c.v : c.f || '').trim() : ''; }
              var name      = cv(cells[0]);  /* A \u5C08\u6848\u540D\u7A31 */
              var sid       = cv(cells[1]);  /* B \u5C08\u6848ID */
              var sMode     = cv(cells[2]) || 'text'; /* C \u72C0\u614B\u6A21\u5F0F */
              var sCol      = cv(cells[3]);  /* D \u4E3B\u72C0\u614B\u6B04 */
              var sCol2     = cv(cells[4]);  /* E \u526F\u72C0\u614B\u6B04 */
              var sDef      = cv(cells[5]);  /* F \u72C0\u614B\u5B9A\u7FA9\uFF08\u6A23\u677F\u4EE3\u865F\uFF09 */
              var extraStr  = cv(cells[6]);  /* G \u984D\u5916\u6B04\u4F4D */
              var flagStr   = cv(cells[7]);  /* H \u529F\u80FD\u65D7\u6A19 */
              var sheetName = cv(cells[8]);  /* I \u8CC7\u6599\u5206\u9801\u540D\u7A31 */
              var syncSh    = cv(cells[9]);  /* J \u8CC7\u6599\u540C\u6B65\u5206\u9801 */
              var syncCl    = cv(cells[10]); /* K \u8CC7\u6599\u540C\u6B65\u683C */
              var advJson   = cv(cells[11]); /* L \u9032\u968EJSON */
              /* M \u5099\u8A3B\uFF08cells[12]\uFF09\u7A0B\u5F0F\u4E0D\u8B80\u53D6 */
              if (!name || !sid) return;
              /* skip header row: real Sheet ID is always 40+ chars */
              if (sid.length < 20) return;

              var cfg = {
                _fixed: true,
                _active: true,
                name: name,
                id: sid,
                statusMode: sMode,
                statusCol: sCol
              };

              /* E \u526F\u72C0\u614B\u6B04 */
              if (sCol2) cfg.statusCol2 = sCol2;

              /* F \u72C0\u614B\u5B9A\u7FA9\uFF1A\u67E5\u6A23\u677F \u2192 \u5617\u8A66 JSON.parse \u2192 \u7A7A\u9663\u5217 */
              if (sDef) {
                if (STATUS_TEMPLATES[sDef]) {
                  cfg.statusDefs = STATUS_TEMPLATES[sDef];
                } else {
                  try { cfg.statusDefs = JSON.parse(sDef); } catch(e) {}
                }
              }

              /* G \u984D\u5916\u6B04\u4F4D */
              if (extraStr) cfg.extraCols = extraStr.split(',').map(function(s) { return s.trim(); }).filter(Boolean);

              /* H \u529F\u80FD\u65D7\u6A19 */
              if (flagStr) {
                flagStr.split(',').forEach(function(f) {
                  var fl = f.trim();
                  if (fl) cfg[fl] = true;
                });
              }

              /* I \u8CC7\u6599\u5206\u9801\u540D\u7A31 */
              if (sheetName) cfg.sheet = sheetName;

              /* J \u8CC7\u6599\u540C\u6B65\u5206\u9801 + K \u8CC7\u6599\u540C\u6B65\u683C */
              if (syncSh) cfg.syncSheet = syncSh;
              if (syncCl) cfg.syncCell  = syncCl;

              /* L \u9032\u968EJSON\uFF1A\u5408\u4F75\u6240\u6709\u7279\u6B8A\u6B04\u4F4D */
              if (advJson) {
                try {
                  /* gviz API \u6709\u6642\u6703\u628A JSON \u88E1\u7684\u5F15\u865F\u505A HTML entity \u7DE8\u78BC\uFF0C\u5148 decode */
                  var cleanJson = advJson
                    .replace(/&quot;/g, '"')
                    .replace(/&#39;/g, "'")
                    .replace(/&amp;/g, '&')
                    .replace(/&lt;/g, '<')
                    .replace(/&gt;/g, '>');
                  var adv = JSON.parse(cleanJson);
                  /* \u9010\u4E00\u5408\u4F75\uFF0C\u4FDD\u7559\u578B\u5225 */
                  ['range','monthCol','monthCols','defaultChannel','pctDecimals',
                   'cvsWeightChannel','cvsWeightCap','statusMap','statusVal'
                  ].forEach(function(k) {
                    if (adv[k] !== undefined) cfg[k] = adv[k];
                  });
                  /* combo \u6A21\u5F0F\uFF1A\u82E5\u9032\u968EJSON\u6709 statusVal\uFF0C\u78BA\u4FDD statusMode \u70BA combo */
                  if (adv.statusVal) cfg.statusMode = 'combo';
                } catch(e) {
                  console.warn('\u7279\u6B8A\u5C08\u6848\u9032\u968E\u8A2D\u5B9A\uFF1AL\u6B04\u9032\u968EJSON \u683C\u5F0F\u932F\u8AA4\uFF08' + name + '\uFF09', e);
                }
              }

              list.push(cfg);
            });
            SURVEYS_FIXED = list;
            console.log('\u7279\u6B8A\u5C08\u6848\u9032\u968E\u8A2D\u5B9A\u8F09\u5165\u5B8C\u6210\uFF0C\u5171 ' + list.length + ' \u7B46');
            callback();
          })
          .catch(function(err) {
            console.warn('\u7279\u6B8A\u5C08\u6848\u9032\u968E\u8A2D\u5B9A\u8F09\u5165\u5931\u6557\uFF0C\u4F7F\u7528\u7A7A\u6E05\u55AE', err);
            SURVEYS_FIXED = [];
            callback();
          });
      }

      /* \u2500\u2500 \u5F9E\u7BA1\u7406\u5206\u9801\u52D5\u614B\u8F09\u5165\u5C08\u6848\u6E05\u55AE \u2500\u2500 */
      function loadSurveys(callback) {
        var url = 'https://docs.google.com/spreadsheets/d/' + MGMT_SHEET_ID +
          '/gviz/tq?tqx=out:json&headers=1&sheet=' + encodeURIComponent(MGMT_SHEET_NAME);
        fetch(url)
          .then(function(r) { return r.text(); })
          .then(function(txt) {
            var json = JSON.parse(txt.replace(/^[^\(]+\(/, '').replace(/\);?\s*$/, ''));
            var rows = (json.table && json.table.rows) || [];
            var dynamic = [];
            /* \u5DF2\u5728 SURVEYS_FIXED \u7684 sheetId \u96C6\u5408\uFF0C\u907F\u514D\u91CD\u8907 */
            var fixedIds = {};
            SURVEYS_FIXED.forEach(function(s) { fixedIds[s.id] = true; });
            rows.forEach(function(row) {
              var cells = row.c || [];
              function cv(c) { return c ? ((c.v !== null && c.v !== undefined ? c.v : c.f) || '') : ''; }
              var active    = cv(cells[0]).toString().trim().toUpperCase() === 'ON';
              var name      = cv(cells[1]).toString().trim();
              var sid       = cv(cells[2]).toString().trim();
              var sheet     = cv(cells[3]).toString().trim() || '\u5E97\u5BB6\u540D\u518A';
              var sync      = cv(cells[4]).toString().trim() || '\u8F14\u52A9';
              var cell      = cv(cells[5]).toString().trim() || 'B1';
              var boardType = cv(cells[6]).toString().trim() || '\u9054\u6210\u7387\u578B';
              /* \u904E\u6FFE\uFF1A\u7A7A\u8CC7\u6599\u3001\u975E\u9054\u6210\u7387\u578B\u3001\u5DF2\u5728\u7279\u6B8A\u6E05\u55AE\u4E2D\u7684\u8DF3\u904E */
              if (!name || !sid) return;
              /* skip header row: real Sheet ID is always 40+ chars */
              if (sid.length < 20) return;
              if (boardType !== '\u9054\u6210\u7387\u578B') return;
              if (fixedIds[sid]) return;
              dynamic.push({
                _active: active,
                name: name,
                id: sid,
                sheet: sheet,
                syncSheet: sync,
                syncCell: cell,
                boardType: boardType
              });
            });
            /* \u7279\u6B8A\u6E05\u55AE\uFF08SURVEYS_FIXED\uFF09\u7F6E\u9802 \u2192 \u52D5\u614B\u9032\u884C\u4E2D \u2192 \u52D5\u614B\u5DF2\u7D50\u675F */
            var fixedOn  = SURVEYS_FIXED.filter(function(s) { return s._active !== false; });
            var fixedOff = SURVEYS_FIXED.filter(function(s) { return s._active === false; });
            var onList   = dynamic.filter(function(s) { return s._active; });
            var offList  = dynamic.filter(function(s) { return !s._active; });
            SURVEYS = fixedOn.concat(onList).concat(fixedOff).concat(offList);
            callback();
          })
          .catch(function(err) {
            console.warn('\u7BA1\u7406\u5206\u9801\u8F09\u5165\u5931\u6557\uFF0C\u4F7F\u7528\u5BEB\u6B7B\u6E05\u55AE', err);
            SURVEYS = SURVEYS_FIXED.slice();
            callback();
          });
      }

      /* \u2500\u2500 \u5EFA\u7ACB\u4E0B\u62C9\u9078\u55AE\uFF08\u542B optgroup\uFF09 \u2500\u2500 */
      function buildSurveySelects() {
        var onItems  = SURVEYS.map(function(c, i) { return { idx: i, s: c }; }).filter(function(o) { return o.s._active !== false; });
        var offItems = SURVEYS.map(function(c, i) { return { idx: i, s: c }; }).filter(function(o) { return o.s._active === false; });

        function makeOptions(list) {
          return list.map(function(o) {
            return '<option value="' + o.idx + '">' + esc(o.s.name) + '</option>';
          }).join('');
        }
        function makeHTML() {
          var h = '';
          if (onItems.length)  h += '<optgroup label="\u25B8 \u9032\u884C\u4E2D">'  + makeOptions(onItems)  + '</optgroup>';
          if (offItems.length) h += '<optgroup label="\u25B8 \u5DF2\u7D50\u675F">' + makeOptions(offItems) + '</optgroup>';
          return h;
        }
        var html = makeHTML();
        var ss = document.getElementById('sel-survey');
        var mm = document.getElementById('mm-survey');
        if (ss) { ss.innerHTML = html; ss.disabled = false; }
        if (mm) { mm.innerHTML = html; mm.disabled = false; }
      }
      var AREA_ORDER = ['\u5317\u90E8', '\u6843\u5712', '\u81FA\u4E2D', '\u5609\u7FA9', '\u81FA\u5357', '\u9AD8\u96C4', '\u82B1\u84EE'];
      var GRADE_STD = {
        '\u91CF\u8CA9A': 4, '\u91CF\u8CA9B': 3, '\u91CF\u8CA9C': 2,
        'A': 2, 'B': 1,
        '\u4E94\u5927A': 8, '\u4E94\u5927B': 4, '\u4E94\u5927C': 2,
        '\u9023\u9396\u8D85\u5E02A': 4, '\u9023\u9396\u8D85\u5E02B': 2, '\u9023\u9396\u8D85\u5E02C': 1,
        'CVS': 1
      };
      var STATUS_CLS_ORDER = ['g', 'y', 'p', 'o'];
      var STATUS_EMOJI_ORDER = ['\u2705', '\uD83D\uDFE1', '\uD83D\uDFE3', '\uD83D\uDFE0'];
      /* \u2550\u2550 \u72C0\u614B \u2550\u2550 */
      var allRows = [],
        allHeaders = [];
      var chips = {};
      var curStatuses = [];
      var fYear = '',
        fMonth = '';
      var fArea = '',
        fOffice = '',
        fStaff = '';
      var fChSet = null,
        fTpSet = null;
      var drillStack = [];
      var curSurvey = -1;
      var _oMap = {},
        _sMap = {};
      var _runRaf = null;
      var _syncTime = '';
      var _dataTime = '';
      var _rankDrawerOpen = false;
      var _curCfg = null;
      var _monthColIdxMap = {};
      var _activeMontCols = [];
      var _viewMode = 'org';
      var _chDrillStack = [];
      var _chTypeMap = {};
      var _allCh = [],
        _allTp = [];

      /* \u2550\u2550 \u81EA\u52D5\u8FA8\u8B58\u72C0\u614B\u6B04 \u2550\u2550 */
      function autoDetectStatuses(headers, rawRows) {
        var statusColIdxs = [];
        headers.forEach(function(h, i) {
          if (!h) return;
          var isStatus = rawRows.every(function(r) {
            var v = (r[i] || '').trim();
            return v === '' || v === '0' || v === '1';
          });
          if (isStatus) statusColIdxs.push(i);
        });
        if (!statusColIdxs.length) return null;
        var unfilled = -1;
        var others = [];
        statusColIdxs.forEach(function(i) {
          if (headers[i].indexOf('\u672A\u586B\u5BEB') >= 0) unfilled = i;
          else others.push(i);
        });
        var ordered = others.slice();
        if (unfilled >= 0) ordered.push(unfilled);
        else if (ordered.length) ordered.push(ordered.pop());
        var statuses = ordered.map(function(colIdx, i) {
          var isLast = (i === ordered.length - 1);
          var cls = isLast ? 'r' : STATUS_CLS_ORDER[Math.min(i, STATUS_CLS_ORDER.length - 1)];
          var emoji = isLast ? '\uD83D\uDD34' : STATUS_EMOJI_ORDER[Math.min(i, STATUS_EMOJI_ORDER.length - 1)];
          return {
            key: isLast ? 'u' : ['l', 'n', 'p', 'o'][Math.min(i, 3)],
            colIdx: colIdx,
            col: headers[colIdx],
            label: emoji + ' ' + headers[colIdx],
            labelShort: headers[colIdx],
            cls: cls,
            emoji: emoji
          };
        });
        return statuses;
      }

      /* \u2550\u2550 chips \u91CD\u5EFA \u2550\u2550 */
      function rebuildChips() {
        chips = {};
        curStatuses.forEach(function(s) {
          chips[s.key] = true;
        });
        var chipsEl = document.getElementById('chips');
        if (chipsEl) {
          chipsEl.innerHTML = '';
          curStatuses.forEach(function(s) {
            var btn = document.createElement('button');
            btn.className = 'chip ' + s.cls + ' on';
            btn.id = 'chip-' + s.key;
            btn.textContent = s.label;
            btn.onclick = (function(k) {
              return function() {
                toggleChip(k);
              };
            })(s.key);
            chipsEl.appendChild(btn);
          });
        }
        var mmRow = document.getElementById('mm-chips-row');
        if (mmRow) {
          Array.from(mmRow.querySelectorAll('.chip')).forEach(function(el) {
            el.parentNode.removeChild(el);
          });
          var clearBtn = document.getElementById('mm-clear');
          curStatuses.forEach(function(s) {
            var btn = document.createElement('button');
            btn.className = 'chip ' + s.cls + ' on';
            btn.id = 'mm-chip-' + s.key;
            btn.textContent = s.label;
            btn.onclick = (function(k) {
              return function() {
                toggleChip(k);
                syncMmChips();
              };
            })(s.key);
            mmRow.insertBefore(btn, clearBtn);
          });
        }
      }

      /* \u2550\u2550 \u6B04\u4F4D\u7D22\u5F15 \u2550\u2550 */
      var CI = {
        area: -1,
        office: -1,
        staff: -1,
        store: -1,
        code: -1,
        channel: -1,
        type: -1,
        grade: -1
      };

      function initCI() {
        var MAP = {
          year: ['\u5E74\u4EFD'],
          month: ['\u6708\u4EFD'],
          area: ['\u71DF\u696D\u8655\u540D\u7A31', '\u71DF\u696D\u8655'],
          office: ['\u71DF\u696D\u6240/\u8AB2', '\u71DF\u696D\u6240'],
          staff: ['\u57F7\u884C\u4EBA\u54E1', '\u696D\u52D9\u54E1', '\u8A2A\u54E1'],
          store: ['\u5E97\u5BB6\u540D\u7A31', '\u5E97\u5BB6'],
          code: ['\u5E97\u5BB6\u4EE3\u78BC'],
          channel: ['\u901A\u8DEF\u5225'],
          type: ['\u5E97\u5BB6\u578B\u614B', '\u5E97\u5BB6\u578B\u614B\u540D\u7A31'],
          grade: ['\u5E97\u5BB6\u7B49\u7D1A', '\u5E97\u5BB6\u968E\u7D1A'],
          visits: []
        };
        Object.keys(MAP).forEach(function(k) {
          CI[k] = -1;
          MAP[k].forEach(function(name) {
            if (CI[k] >= 0) return;
            var i = allHeaders.findIndex(function(h) {
              return h === name;
            });
            if (i < 0) i = allHeaders.findIndex(function(h) {
              return h.indexOf(name) >= 0;
            });
            if (i >= 0) CI[k] = i;
          });
        });
      }

      function initCIVisits(monthColName) {
        CI['visits'] = -1;
        if (!monthColName) return;
        /* \u4F4D\u7F6E\u6CD5\uFF1A__col_N \u76F4\u63A5\u7528\u7D22\u5F15 */
        if (monthColName.indexOf('__col_') === 0) {
          var idx = parseInt(monthColName.replace('__col_', ''), 10);
          CI['visits'] = idx;
          console.log('[initCIVisits] positional col:', idx);
          return;
        }
        var i = allHeaders.findIndex(function(h) { return h === monthColName; });
        if (i < 0) i = allHeaders.findIndex(function(h) { return h.indexOf(monthColName) >= 0; });
        CI['visits'] = i;
        console.log('[initCIVisits] monthColName:', monthColName, '\u2192 CI[visits]:', i, '| allHeaders:', JSON.stringify(allHeaders));
      }

      function gv(row, key) {
        var i = CI[key];
        var v = (i >= 0 && row[i] != null) ? String(row[i]).trim() : '';
        /* defaultChannel\uFF1A\u7576 channel \u6B04\u4F4D\u4E0D\u5B58\u5728\u6642\uFF0C\u56DE\u50B3 cfg \u8A2D\u5B9A\u7684\u9810\u8A2D\u901A\u8DEF */
        if (!v && key === 'channel' && _curCfg && _curCfg.defaultChannel) {
          return _curCfg.defaultChannel;
        }
        return v;
      }

      function gs(row) {
        return row[row.length - 1];
      }

      /* \u2550\u2550 \u5DE5\u5177 \u2550\u2550 */
      function stat(rows) {
        var s = { t: 0 };
        curStatuses.forEach(function(st) { s[st.key] = 0; });
        rows.forEach(function(r) {
          var k = gs(r);
          if (s[k] !== undefined) s[k]++;
          else s[k] = 1;
          s.t++;
        });
        return s;
      }

      /* combo \u6A21\u5F0F\u4E0B\u5206\u6BCD\u53EA\u7B97\u6709\u300C\u67E5\u6838\u9054\u6210\u300D\u6B04\uFF08l+y\uFF09\u7684\u5E97\uFF1B\u5176\u9918\u6A21\u5F0F\u56DE\u50B3 s.t */
      function statBase(s) {
        if (_curCfg && _curCfg.statusMode === 'combo') {
          return (s['l'] || 0) + (s['y'] || 0);
        }
        return s.t;
      }

      var _pctDecimals = 0; /* \u7531 cfg.pctDecimals \u63A7\u5236\uFF0C\u9810\u8A2D0\u4F4D\u5C0F\u6578 */
      function pct(a, b) {
        if (b <= 0) return _pctDecimals > 0 ? (0).toFixed(_pctDecimals) : 0;
        var v = a / b * 100;
        return _pctDecimals > 0 ? v.toFixed(_pctDecimals) : Math.round(v);
      }

      function visitsSum(rows) {
        if (CI['visits'] < 0) return -1;
        var sum = 0;
        rows.forEach(function(r) {
          var v = parseFloat(gv(r, 'visits')) || 0;
          sum += v;
        });
        return sum;
      }

      function visitsWeightedDetail(rows) {
        var cfg = _curCfg;
        if (!cfg || !cfg.cvsWeightChannel || !cfg.cvsWeightCap) return null;
        if (CI['visits'] < 0) return null;
        var cvsCh = cfg.cvsWeightChannel;
        var nonCvsVisits = 0, cvsVisits = 0;
        rows.forEach(function(r) {
          var ch = gv(r, 'channel') || '\uFF08\u5176\u4ED6\uFF09';
          var v = parseFloat(gv(r, 'visits')) || 0;
          if (ch === cvsCh) cvsVisits += v;
          else nonCvsVisits += v;
        });
        return {
          real: nonCvsVisits + cvsVisits,
          nonCvs: nonCvsVisits,
          cvs: cvsVisits
        };
      }

      function statWeighted(rows) {
        var cfg = _curCfg;
        if (!cfg || !cfg.cvsWeightChannel || !cfg.cvsWeightCap) return null;
        var cap = cfg.cvsWeightCap;
        var cvsCh = cfg.cvsWeightChannel;
        var wl = 0, wu = 0, wt = 0;
        var groups = {};
        rows.forEach(function(r) {
          var ch = gv(r, 'channel') || '\uFF08\u5176\u4ED6\uFF09';
          if (!groups[ch]) groups[ch] = { l: 0, u: 0, t: 0 };
          groups[ch].t++;
          if (gs(r) === 'l') groups[ch].l++;
          else groups[ch].u++;
        });
        Object.keys(groups).forEach(function(ch) {
          var g = groups[ch];
          if (ch === cvsCh && g.t > 0) {
            var rate = g.l / g.t;
            if (rate >= cap) {
              wl += g.l;
              wu += 0;
              wt += g.l;
            } else {
              wl += g.l;
              wu += g.u;
              wt += g.t;
            }
          } else {
            wl += g.l;
            wu += g.u;
            wt += g.t;
          }
        });
        var realS = stat(rows);
        if (wl === realS.l && wt === realS.t) return null;
        return { wl: wl, wu: wu, wt: wt };
      }

      function statByChannel(rows) {
        var cfg = _curCfg;
        if (!cfg || !cfg.cvsWeightChannel || !cfg.cvsWeightCap) return null;
        var cvsCh = cfg.cvsWeightChannel;
        var cap = cfg.cvsWeightCap;
        var nc = { l: 0, u: 0, t: 0 };
        var cv = { l: 0, u: 0, t: 0 };
        rows.forEach(function(r) {
          var ch = gv(r, 'channel') || '';
          var key = gs(r);
          var target = (ch === cvsCh) ? cv : nc;
          target.t++;
          if (key === 'l') target.l++;
          else target.u++;
        });
        cv.weighted = (cv.t > 0 && cv.l / cv.t >= cap);
        return { nonCvs: nc, cvs: cv };
      }

      function trimName(s) {
        var idx = String(s || '').indexOf('-');
        return idx > 0 ? s.slice(0, idx) : s;
      }

      function esc(s) {
        return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      function sortArea(keys) {
        return keys.slice().sort(function(a, b) {
          var ai = AREA_ORDER.findIndex(function(k) { return a.indexOf(k) >= 0; });
          var bi = AREA_ORDER.findIndex(function(k) { return b.indexOf(k) >= 0; });
          if (ai >= 0 && bi >= 0) return ai - bi;
          if (ai >= 0) return -1;
          if (bi >= 0) return 1;
          return a.localeCompare(b, 'zh-TW');
        });
      }

      function groupBy(rows, key) {
        var m = {};
        rows.forEach(function(r) {
          var k = gv(r, key) || '\uFF08\u672A\u77E5\uFF09';
          if (!m[k]) m[k] = [];
          m[k].push(r);
        });
        return m;
      }

      function visible() {
        return allRows.filter(function(r) {
          if (fYear && gv(r, 'year') !== fYear) return false;
          if (fMonth && gv(r, 'month') !== fMonth) return false;
          if (fArea && gv(r, 'area') !== fArea) return false;
          if (fOffice && gv(r, 'office') !== fOffice) return false;
          if (fStaff && gv(r, 'staff') !== fStaff) return false;
          if (fChSet !== null && !fChSet.has(gv(r, 'channel'))) return false;
          if (fTpSet !== null && !fTpSet.has(gv(r, 'type'))) return false;
          return chips[gs(r)];
        });
      }

      function segs(s) {
        var t = s.t || 1;
        return curStatuses.map(function(st) {
          return '<div class="seg-' + st.cls + '" style="width:' + pct(s[st.key] || 0, t) + '%"></div>';
        }).join('');
      }

      function colsClass(n) {
        return 'cols-' + Math.min(n, 5);
      }

      /* \u2550\u2550 \u8CC7\u6599\u8F09\u5165 \u2550\u2550 */
      function onSurveyChange() {
        var idx = Number(document.getElementById('sel-survey').value);
        var cfg = SURVEYS[idx];
        /* \u8986\u84CB\u7387\u578B \u2192 \u540C\u5206\u9801\u8DF3\u8F49 */
        if (cfg && cfg.boardType === '\u8986\u84CB\u7387\u578B') {
          window.location.href = 'coverage_board.html?sheetId=' + encodeURIComponent(cfg.id);
          return;
        }
        /* \u734E\u52F5\u9054\u6210\u578B \u2192 \u540C\u5206\u9801\u8DF3\u8F49 */
        if (cfg && cfg.boardType === '\u734E\u52F5\u9054\u6210\u578B') {
          window.location.href = 'award_board.html?sheetId=' + encodeURIComponent(cfg.id);
          return;
        }
        if (idx === curSurvey) {
          render('none');
          return;
        }
        /* \u5DF2\u7D50\u675F\u5C08\u6848\uFF1A\u986F\u793A\u63D0\u793A\uFF0C\u4E0D\u5617\u8A66\u8B80\u53D6 */
        if (cfg && cfg._active === false) {
          curSurvey = idx;
          render('none');
          var stage = document.getElementById('main-stage');
          if (stage) stage.innerHTML = '<div style="padding:60px 20px;text-align:center;color:#888;font-size:14px;">\u6B64\u5C08\u6848\u5DF2\u7D50\u675F\uFF0C\u7121\u6CD5\u8B80\u53D6\u8CC7\u6599</div>';
          return;
        }
        curSurvey = -1;
        drillStack = [];
        allRows = [];
        allHeaders = [];
        curStatuses = [];
        fYear = '';
        fMonth = '';
        fArea = '';
        fOffice = '';
        fStaff = '';
        fChSet = null;
        fTpSet = null;
        _allCh = [];
        _allTp = [];
        _chTypeMap = {};
        _oMap = {};
        _sMap = {};
        _chDrillStack = [];
        chips = {};
        ['sel-area', 'sel-office', 'sel-staff'].forEach(function(id) {
          var el = document.getElementById(id);
          if (el) {
            el.innerHTML = '<option value="">\u5168\u90E8</option>';
            el.disabled = true;
          }
        });
        ['ms-ch-btn', 'ms-tp-btn', 'mm-ch-btn', 'mm-tp-btn'].forEach(function(id) {
          var el = document.getElementById(id);
          if (el) {
            el.textContent = '\u5168\u90E8';
            el.disabled = true;
            el.classList.remove('has-filter');
          }
        });
        ['ms-ch-drop', 'ms-tp-drop', 'mm-ch-drop', 'mm-tp-drop'].forEach(function(id) {
          var el = document.getElementById(id);
          if (el) el.innerHTML = '';
        });
        var rdContent = document.getElementById('rd-content');
        if (rdContent) rdContent.innerHTML = '';
        document.getElementById('stage').innerHTML = '';
        updateClearBtn();
        showLoading();
        var cfg = SURVEYS[idx];
        if (!cfg) return;
        console.log('[onSurveyChange] cfg:', JSON.stringify({ name: cfg.name, id: cfg.id, sheet: cfg.sheet, statusMode: cfg.statusMode, statusCol: cfg.statusCol, statusCol2: cfg.statusCol2, statusDefs: !!cfg.statusDefs }));
        var p1 = fetchSheetP(cfg.id, cfg.sheet, cfg);
        var p2 = cfg.syncSheet ? fetchSyncTime(cfg.id, cfg.syncSheet, cfg.syncCell) : Promise.resolve('');
        var p3 = cfg.dataTimeSheet ? fetchSyncTime(cfg.id, cfg.dataTimeSheet, cfg.dataTimeCell) : Promise.resolve('');
        Promise.all([p1, p2, p3]).then(function(res) {
          try {
            allHeaders = res[0].headers;
            allRows = res[0].rows;
            curStatuses = res[0].statuses;
            _monthColIdxMap = res[0].monthColKeepIdxMap || {};
            _activeMontCols = res[0].activeMontCols || [];
            initCI();
            var resolvedMonthCol = res[0].resolvedMonthCol || cfg.monthCol || '';
            if (resolvedMonthCol) initCIVisits(resolvedMonthCol);
            _curCfg = cfg;
            _pctDecimals = cfg.pctDecimals || 0;
            rebuildChips();
            buildFilters();
          } catch (e) {
            console.error(e);
          }
          var monthVal = res[0].monthValue || '';
          if (monthVal) {
            _syncTime = '\uD83D\uDCC5 \u8CC7\u6599\u6708\u4EFD\uFF1A' + monthVal;
          } else {
            _syncTime = res[1] ? '\uD83D\uDCCA \u8CC7\u6599\u540C\u6B65 ' + res[1] : '';
          }
          _dataTime = res[2] || '';
          curSurvey = idx;
          hideLoading();
          if (allRows.length) {
            render('none');
            updateRankDrawer();
          }
        }).catch(function(err) {
          hideLoading();
          document.getElementById('stage').innerHTML = '<div style="padding:40px;color:#c62828;font-size:14px">\u26A0\uFE0F \u8F09\u5165\u5931\u6557\uFF1A' + err + '</div>';
        });
      }

      function fetchSyncTime(id, sheet, cell) {
        var url = 'https://docs.google.com/spreadsheets/d/' + id + '/gviz/tq?tqx=out:json&sheet=' + encodeURIComponent(sheet) + '&range=' + cell;
        return fetch(url).then(function(r) {
          return r.text();
        }).then(function(txt) {
          var s = txt.indexOf('{'), e = txt.lastIndexOf('}');
          if (s < 0) return '';
          var json = JSON.parse(txt.slice(s, e + 1));

      /* \u2550\u2550 \u5171\u7528\uFF1A\u7528 range=1:1 \u55AE\u7368\u6293\u7B2C\u4E00\u5217\uFF0C\u53D6\u5F97\u771F\u6B63\u7684\u6A19\u984C\u6587\u5B57 \u2550\u2550

      function fetchSheetCombo(id, sheet, cfg, ok, fail) {
