  patrol_board.html ─ 節慶專案巡補頻次型看板
  版本：Ver. 1.0.0 ｜ 建立：2026-07-20

【這個檔案是什麼】
  單一 HTML 檔案，純前端 JS，透過 Google Sheets 的 gviz API 讀取同一份
  試算表裡的兩個分頁，在瀏覽器端組成「2026 節慶專案（中元／中秋）通路
  巡補頻次」儀表板：依店家等級判斷每週「應達巡補次數」，跟實際巡補
  次數比對，超過標準的部分拆成「超額」另計，不列入達成率。

  跟 audit_board / contract_board / coverage_board 是各自獨立的系統，
  只共用 shared/*.js 技術骨架（gviz 抓表、CSV/複製/截圖/UI Chrome），
  業務邏輯完全不共用——本檔特有的「依日期自動判斷檔期週次」「依等級
  動態算應達次數」「標準/超額格子自動觸發＋資料隔離」都是全新邏輯，
  三份舊看板都沒有，改動前不要假設跟舊看板共用計算函式。

  【與舊看板的差異，方便之後銜接／擴充時查閱】
  ‧ contract_board 的「處理層」是拿來比對「這個月這品項有沒有交」
    （二元 ✅/❌）；本檔的「處理層」是拿來算「這一週去了幾次」
    （數字，可能超過標準），計算邏輯完全不同、不可互換套用。
  ‧ 本檔沒有 contract_board 式的「處→所→人員」四層鑽層卡片，
    改用「檔期／通路／等級／區域」四組 chip 篩選（比照 alpha 版
    設計），畫面更接近 coverage_board 的單層彙整表格風格。
  ‧ 本檔沒有多專案切換（MGMT「專案管理」boardType 機制），
    SHEET_ID 直接從網址 ?sheetId= 帶入，是本次中元/中秋專用的
    單一看板（已與需求方確認，未來若要擴充尾牙/春節等其他檔期，
    可考慮比照 contract_board 加回 MGMT 切換機制，屆時 PERIODS
    常數需要改成從管理表動態載入，而不是寫死在本檔）。

────────────────────────────────────────────────────────────
【讀取的兩份資料來源（同一份 SHEET_ID 試算表裡的兩個分頁）】

  1.「店家名冊」── 母體，量販通路與全聯社（超市）通路合併一份名冊。
     欄位（表頭列文字需完全一致，程式用欄名比對，不用欄位順序）：
       營業處名稱／營業所/課／主要訪員／通路別／店家型態／店家代碼／店家名稱／店家等級
     ‧ 通路／全聯的判斷改用真實欄位值分類（畫面上仍只顯示「量販」
       「全聯」簡稱），不是直接比對整欄：
         量販：通路別＝「量販通路」
         全聯：店家型態＝「全聯社」（不看通路別欄）
       比對邏輯集中在常數區的 _chanKey() 函式，日後真實值再變動，
       改這支函式即可，不要在別處另外加比對條件。
     ‧ 店家等級：決定「每週應達巡補次數」的依據，目前支援四種值，
       對照表寫死在本檔常數 GRADE_FREQ（見下方【等級應達次數對照】），
       日後若需要新增等級或調整標準次數，直接改這個常數即可，
       不需要（也刻意不做）另外接管理表動態載入。
     ‧ 這份名冊不分檔期、不分週次——「這家店這一週該去幾次」是
       純粹由「等級」決定的固定標準，跟中元或中秋無關（兩個檔期
       共用同一套等級標準）。

  2.「處理層」── 比對資料，每一列＝一筆巡補紀錄，由 GAS（後端，
     不在本檔案範圍內）從「問卷資料(量販)」「問卷資料(全聯)」兩份
     問卷分頁整理產生，比照 contract_board 的
     extractSurveyDataToMasterRegistry() 模式。
     欄位：
       來源分頁+行數／店家代碼／通路別／執行人員／巡補日期
     ‧ 來源分頁+行數：跨分頁連結鍵（格式：分頁名稱_行數，例如
       「問卷資料量販_57」），目前本檔只用來當作明細列表的參考欄位
       顯示，沒有做到像 audit_board 那樣即時回查來源分頁抓問卷大題
       內容——如果之後要加「點一次巡補紀錄看當次完整問卷內容」，
       可以參考 audit_board.html 的 _fetchSourceSheet 機制另外接上，
       本檔目前刻意不做（節慶巡補的問卷內容通常不需要逐筆回看）。
     ‧ 巡補日期：本檔核心依據，看板依這個日期 + 下方【檔期定義】
       的起訖日，自動換算屬於哪個檔期的第幾週，處理層本身「不」
       另外存週次欄位（跟已確認的規劃一致：週次由看板端計算，
       不要求 GAS 端額外產出）。

  兩者都讀自同一個 SHEET_ID（網址參數 ?sheetId= 帶入）。

【檔期定義（寫死在常數 PERIODS，之後年度數字要改就改這裡）】
  中元專案：2026/08/08（六）– 08/28（五），共 3 週（W1、W2、W3）
  中秋專案：2026/09/14（一）– 09/27（日），共 2 週（W1、W2）
  整體視角：兩檔期合併顯示（W1–W5，中元3欄+中秋2欄）

  週次判斷邏輯：以「巡補日期－檔期起始日」的天數差，每 7 天一週，
  換算出來的週次超過該檔期總週數就視為「不屬於任何檔期」（不計入
  任何統計，例如中元檔期跑到 08/29 才去的巡補不算數）。

【等級應達次數對照（寫死在常數 GRADE_FREQ）】
  量販 A 級：每週 5 次　量販 B 級：每週 3 次　量販 C 級：每週 2 次
  全聯 連鎖超市A：每週 1 次（畫面上簡稱顯示為「超市A」，對照表見
  GRADE_LABEL，「店家名冊」裡「店家等級」欄的真實值須為「連鎖超市A」）
  （對照表已與需求方確認先寫死在 HTML 常數，不做管理表可調整設定；
   日後真的要調整，直接改 GRADE_FREQ／GRADE_LABEL 物件即可，
   不需要改動其餘邏輯）

【核心計算邏輯（自動化格子觸發＋資料隔離，比照 alpha 版規格書）】
  對每一家店、每一個顯示中的檔期週次欄位：
    1. actual = 處理層裡「店家代碼相符 ＋ 巡補日期落在該檔期該週」
       的紀錄筆數。
    2. std   = 該店等級對應的每週應達次數（GRADE_FREQ）。
    3. stdDone = min(actual, std)　→ 顯示為藍色格子，勾選 stdDone 格。
    4. extra   = max(0, actual - std)　→ 顯示為橘色格子，自動觸發，
       勾選 extra 格（最高不特別限制格數，巡補次數多就顯示多格）。
  資料隔離原則（三份都要遵守，這是本檔最容易被改壞的地方）：
    ‧ 橘色格（超額）只計入「自動觸發超額次數」統計，絕對不計入
      任何「達成率 %」的分子分母。
    ‧ 超額次數不可外溢：A 店多跑的次數不能拿來墊 B 店的未達成，
      統計時一律逐店、逐週獨立計算，最後才加總顯示範圍內的合計，
      不存在任何「跨店挪用」的計算路徑。
    ‧ 達成率 % = Σ全部顯示中欄位的 stdDone ／ Σ全部顯示中欄位的 std，
      分母用「應達次數」而非「實際次數」，超標的店不會把分母墊高、
      拖累其他店的達成率觀感。

【店家明細 Dialog 的「問卷內容」怎麼接上原始問卷（1.3.0 新增）】
  比照 coverage_board.html 的 _fetchQuestionnaireSheet 設計（headers=0
  抓資料、另發 headers=1 只拿欄名，避免日期型別欄位的表頭文字被 gviz
  型別推斷吃掉；欄名含「_」視為「大題_選項」，其餘視為基本欄位），
  差異是本檔問卷分成「問卷資料(量販)」「問卷資料(全聯)」兩個分頁
  （常數 QUESTIONNAIRE_SHEETS），依店家的 chanKey 決定查哪一份，
  用「店家代碼」欄位（沿用 R_CODE 常數）分組。
  ‧ 前提假設：這兩份問卷分頁裡都要有一欄叫「店家代碼」，且值要跟
    「店家名冊」的店家代碼完全一致，才能對得上——這點如果跟後端
    GAS 產出的欄位命名對不上，問卷內容會顯示「找不到這家店的問卷
    紀錄」（不是程式壞掉，是店家代碼欄名或值對不上）。
  ‧ 渲染共用 shared/photo-viewer.js 的 _renderQuizSections（跟
    coverage/audit 同一支，照片／文字答案的標準化顯示邏輯不重寫），
    因此本檔新增掛載 shared/photo-viewer.js（原本刻意不掛載，
    1.3.0 起為了問卷內容顯示需要而加回）。

【巡補次數計算：每日每店計 1 次（1.3.0 修正，此前為未落實的文件承諾）】
  舊版文件已經寫明「有效計算方式是每日每店計 1 次」，但 _actualCount()
  實際上是直接數處理層筆數，沒有依日期去重——如果同一天同一店有兩筆
  問卷紀錄（重填、誤送出兩次等狀況），會被誤算成 2 次巡補，可能墊高
  達成率或多算超額次數。1.3.0 改成依「年-月-日」用 Set 去重再計數，
  只影響「算幾次」；店家明細 Dialog 的時間軸仍會列出全部原始紀錄（供
  人工核對是否真的重複填寫），同一天有多筆時會加註橘色「同日N筆」
  徽章提醒。

────────────────────────────────────────────────────────────
【已知待確認/待部署事項（非本檔程式問題，交接時務必告知後端）】
  ‧ GAS 端需要另外新增一支「處理層」產生函式（本檔案不含 GAS
    程式碼），把「問卷資料(量販)」「問卷資料(全聯)」兩份問卷分頁
    整理成上方【處理層】欄位格式，比照 contract_board 對應的
    extractSurveyDataToMasterRegistry() 寫法即可，「巡補日期」
    務必是 Google Sheet 的日期格式（gviz 才能正確解析 Date(y,m,d)），
    不要存成純文字字串。
  ‧ 「問卷資料(量販)」「問卷資料(全聯)」兩份問卷分頁務必各自有一欄
    「店家代碼」，且值要跟「店家名冊」對得上，否則店家明細 Dialog 的
    「問卷內容」區塊會顯示找不到資料（見上方【店家明細 Dialog 的
    「問卷內容」怎麼接上原始問卷】說明）。
  ‧ 「店家名冊」的「店家等級」欄位值務必跟 GRADE_FREQ 常數的 key
    完全一致（量販A／量販B／量販C／連鎖超市A，含全形字），否則該店
    會被判斷為「等級未知」，應達次數算 0，不會出現在達成率分母
    （畫面上會照樣列出該店但四項摘要都不會把它算進去，屬於刻意
    設計成「不要讓未知等級污染統計」，但仍要能被人工發現，故保留
    顯示、不整列隱藏——見 render() 內 _unknownGradeCount 統計）。
  ‧ 本檔預設會走跟 coverage_board.html 相同的 session 驗證
    （localStorage 'ttl_auth_v1' !== '1' 就導回 index.html），
    如果這份看板要獨立部署不經過現有登入頁，把 <head> 裡那段
    <script> 拿掉即可。

<link rel="stylesheet" href="shared/dashboard-common.css">
<style>
:root {
  --primary: #1a508b;
  --primary-bg: rgba(26,80,139,.08);
  --bg: #F0EDE6;
  --card: #FFFFFF;
  --text: #2D2D2D;
  --sub: #000000;

  --green-bg: #EAF3DE;

  --r: 12px;
  --dur: .32s;
  --ease: cubic-bezier(.34,1.05,.64,1);
}
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif; min-height:100vh; }

/* ── loading ── */
.loading { position:fixed; inset:0; background:rgba(240,237,230,.85); display:none; align-items:center; justify-content:center; z-index:999; font-size:15px; font-weight:600; color:var(--sub); }
.loading.show { display:flex; }

/* ── toolbar ── */
.toolbar { background:#fff; border-bottom:1px solid var(--border); padding:0 20px; height:52px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:50; }
.toolbar-title { font-size:15px; font-weight:700; flex-shrink:0; }
.sync-note { font-size:11px; color:var(--sub); white-space:nowrap; }
.tb-act-btn { padding:5px 12px; border:1px solid var(--border); border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; color:var(--text); background:#fff; font-family:inherit; white-space:nowrap; transition:all .15s; flex-shrink:0; }
.tb-act-btn:hover { background:var(--primary-bg); border-color:var(--primary); color:var(--primary); }
.tb-act-btn.done { border-color:var(--green); color:var(--green); background:var(--green-bg); }
.tb-act-btn.loading { opacity:.6; pointer-events:none; }
.toolbar-spacer { flex:1; }

/* ── filter bar ── */
.filterbar { background:#fff; border-bottom:1px solid var(--border); padding:10px 20px; position:sticky; top:52px; z-index:40; }
.chip-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; flex-wrap:wrap; }
.chip-row:last-child { margin-bottom:0; }
.chip-fgroup { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.chip-fgroup-divider { padding-left:14px; margin-left:2px; border-left:2px solid var(--border); }
.chip-label { font-size:11px; color:var(--sub); font-weight:700; width:64px; flex-shrink:0; letter-spacing:.03em; }
.chip-group { display:flex; gap:6px; flex-wrap:wrap; background:rgba(26,80,139,.045); border:1px solid rgba(26,80,139,.08); padding:4px; border-radius:18px; }
.chip { padding:4px 12px; background:#fff; border:1px solid var(--border); border-radius:16px; cursor:pointer; font-size:12px; font-weight:600; color:var(--sub); font-family:inherit; transition:all .15s; white-space:nowrap; }
.chip:hover { background:var(--primary-bg); color:var(--primary); }
.chip.active { background:var(--primary); color:#fff; border-color:var(--primary); }
/* ── summary row ── */
.summary-row { padding:14px 20px 0; display:flex; gap:12px; flex-wrap:wrap; }
.sum-card { flex:1; min-width:140px; background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:12px 16px; }
.sum-card .sc-label { font-size:11px; color:var(--sub); font-weight:600; margin-bottom:4px; }
.sum-card .sc-val { font-size:24px; font-weight:800; letter-spacing:-1px; }
.sum-card.rate .sc-val { color:var(--primary); }
.sum-card.extra .sc-val { color:var(--bonus); }
.sum-card.warn-note { font-size:11px; color:var(--bonus); margin-top:2px; }

/* ── stage / table ── */
.stage { padding:16px 20px 40px; }
.empty { padding:60px 20px; text-align:center; color:var(--sub); font-size:16px; }
.tbl-wrap { overflow-x:auto; background:var(--card); border-radius:var(--r); border:1px solid var(--border); }
.main-tbl { width:100%; border-collapse:collapse; font-size:15px; }
.main-tbl thead th { background:#f6f4ef; padding:10px 8px; text-align:center; font-size:13.5px; font-weight:700; color:var(--sub); border-bottom:2px solid var(--border); white-space:nowrap; position:sticky; top:0; z-index:5; }
.main-tbl th.th-left, .main-tbl td.td-left { text-align:left; }
.main-tbl tbody td { padding:8px 6px; text-align:center; border-bottom:1px solid #f0efe9; }
.main-tbl tbody tr { cursor:pointer; transition:background .12s; }
.main-tbl tbody tr:hover { background:var(--primary-bg); }
.td-code { color:var(--sub); font-size:13.5px; }
.td-name { font-weight:700; }
.grade-tag { font-size:13px; color:var(--sub); }
.sum-col { white-space:nowrap; }
.sum-cell { display:flex; flex-direction:column; align-items:center; gap:3px; }
.sum-main { font-weight:800; font-size:15px; }
.sum-extra-badge { display:inline-block; padding:1px 8px; border-radius:10px; background:var(--bonus-bg); color:var(--bonus); font-size:11.5px; font-weight:700; white-space:nowrap; }

/* ── 檔期欄位分組底色＋跨欄分隔（強化不同檔期／同檔期不同週的視覺區隔） ── */
.pg-zhong { background:rgba(26,80,139,.08); }
.pg-mid { background:rgba(230,81,0,.08); }
.main-tbl thead th.pg-zhong { color:var(--primary); }
.main-tbl thead th.pg-mid { color:var(--bonus); }
.th-wk-flex { display:flex; align-items:baseline; justify-content:center; gap:5px; white-space:nowrap; }
.th-period-name { font-size:13.5px; font-weight:800; letter-spacing:.04em; }
.th-week-label { font-size:13.5px; font-weight:700; }
.th-date-range { font-size:13px; font-weight:600; color:var(--sub); }
.wk-divider { border-left:1px solid var(--border); }
.pg-divider { border-left:3px solid var(--text) !important; }

.box-container { display:flex; align-items:center; justify-content:flex-start; gap:4px; flex-wrap:wrap; min-height:22px; padding-left:6px; }
.box-container input[type="checkbox"] { width:17px; height:17px; pointer-events:none; margin:0; }
input.std-check { accent-color:#2F86EB; }
input.std-check:not(:checked) { accent-color:#c8ccd2; }
input.extra-check { accent-color:#FF7A00; outline:2px solid #FF7A00; outline-offset:1px; border-radius:3px; animation:extraPulse 1.4s ease-in-out infinite; }
@keyframes extraPulse {

}
.unknown-grade { color:var(--red); font-size:13px; font-weight:700; }
.miss-mark { display:inline-flex; align-items:center; justify-content:center; width:17px; height:17px; border-radius:3px; background:var(--red-bg); border:1px solid rgba(163,32,32,.4); color:var(--red); font-size:12px; font-weight:800; line-height:1; }

.loadmore-wrap { text-align:center; margin-top:16px; }
.loadmore-btn { padding:8px 22px; border:1px solid var(--border); border-radius:20px; background:#fff; font-size:13px; font-weight:600; color:var(--text); cursor:pointer; font-family:inherit; }
.loadmore-btn:hover { border-color:var(--primary); color:var(--primary); }

@media (max-width:640px) {

  .summary-row { padding:10px 12px 0; }

}

/* ── 概況主畫面（戰情室，比照 alpha 版 mainDashboard） ── */
.ov-wrap { max-width:1600px; margin:0 auto; padding:20px; }

.ov-card:hover { transform:translateY(-3px); box-shadow:0 8px 18px rgba(0,0,0,.09); }

<script>
window._STICKY_IDS = ['filterbar'];

/* ════ 常數 ════ */
var params    = new URLSearchParams(location.search);
var SHEET_ID  = params.get('sheetId') || '';
var PROJ_NAME = '2026 節慶巡補看板';

var POP_SHEET  = '店家名冊';
var PROC_SHEET = '處理層';
var SYNC_SHEET = '輔助';
var SYNC_CELL  = 'B1';
/* 原始問卷分頁（給店家明細 Dialog 顯示「問卷內容」用，比照 coverage_board 的
   _fetchQuestionnaireSheet 設計：欄名含「_」的視為「大題_選項」，其餘視為
   基本欄位；用「店家代碼」分組建索引。跟 coverage 的差異：這裡問卷分成
   量販／全聯兩個分頁，依店家的 chanKey 決定要查哪一份，快取也各自獨立） */
var QUESTIONNAIRE_SHEETS = { '量販':'卷_巡量販', '全聯':'卷_巡全聯' };

/* 母體（店家名冊）欄名 */
var P_AREA='營業處名稱', P_OFFICE='營業所/課', P_STAFF='主要訪員', P_CHANNEL='通路別',
    P_STORETYPE='店家型態', P_CODE='店家代碼', P_STORENAME='店家名稱', P_GRADE='店家等級';
/* 處理層欄名 */
var R_CODE='店家代碼', R_DATE='巡補日期', R_SOURCEREF='來源分頁+行數', R_STAFF='執行人員';

/* 檔期定義：起始日 + 週數。之後年度數字要改就改這裡，不用動下方邏輯 */
var PERIODS = [
  { key:'zhong', label:'中元專案', y:2026, mo:8, d:8,  weeks:3 },
  { key:'mid',   label:'中秋專案', y:2026, mo:9, d:14, weeks:2 }
];
/* 等級 → 每週應達次數（已與需求方確認先寫死，不做管理表）
   key 必須跟「店家名冊」的「店家等級」欄位真實值完全一致（含全形字） */
var GRADE_FREQ = { '量販A':5, '量販B':3, '量販C':2, '連鎖超市A':1 };
/* 等級的畫面簡稱（真實值較長時，畫面上仍顯示簡稱，不影響比對邏輯） */
var GRADE_LABEL = { '量販A':'量販A', '量販B':'量販B', '量販C':'量販C', '連鎖超市A':'超市A' };
var AREA_ORDER = ['北部','桃園','臺中','嘉義','臺南','高雄','花蓮'];

/* 通路判斷（依真實欄位值分類為「量販」／「全聯」兩種內部簡稱 key，
   畫面上的 chip／badge 一律顯示簡稱，篩選比對則一律用這個 key）：
   ‧ 通路別＝「量販通路」→ 判定為量販
   ‧ 店家型態＝「全聯社」→ 判定為全聯（不看通路別欄，避免全聯的通路別
     欄值寫法不一致時漏判） */
function _chanKey(channelVal, storeTypeVal){
  if(channelVal === '量販通路') return '量販';
  if(storeTypeVal === '全聯社') return '全聯';
  return '';
}

var STORE_ROWS  = [];   /* 店家名冊，含 __visits 索引 */
var VISIT_ROWS  = [];   /* 處理層原始列（供明細 Dialog 用） */
var VISIT_INDEX = {};   /* key: code → [{period,week,y,mo,d,ref}, ...]（新到舊） */

/* 問卷內容快取，key 為 chanKey（'量販'／'全聯'），value 為
   { codeToRecords:{ code: [{base,sections,timeKey}, ...] } } 或 { error:'訊息' }。
   每個 chanKey 只抓一次、之後共用，跟 coverage_board 的 _qSheetCache 是同一個設計 */
var _qSheetCache = {};
var _qSheetLoading = {};
var _qSheetWaiters = {};

var FILTER = { period:'全部', channel:'全部', grade:'全部', area:'全部', office:'全部', keyword:'' };
/* 依營業處執行狀況表：目前檢視的週次。null＝整體（不分檔期／週次，原本行為），
   否則為 {period,week} 只看該檔期該週，讓現場能看「當週進度」而不是被
   整段檔期的合計數字蓋掉。跟主表 FILTER 是各自獨立的狀態，互不影響。 */
var OFFICE_WEEK_SEL = null;

function showLoading(){ document.getElementById('loading').classList.add('show'); }
function hideLoading(){ document.getElementById('loading').classList.remove('show'); }

/* ════ 初始化 ════ */
function init(){
  document.getElementById('tb-title').textContent = PROJ_NAME;
  document.getElementById('ov-title').textContent = PROJ_NAME;
  document.title = PROJ_NAME;
  if(!SHEET_ID){
    hideLoading();
    document.getElementById('empty-msg').style.display = 'block';
    document.getElementById('empty-msg').textContent = '⚠️ 缺少 sheetId 參數';
    return;
  }
  buildFilterUI();
  showLoading();
  fetchPopulation(function(){
    fetchProcessLayer(function(){
      hideLoading();
      renderOverview(); /* 先進概況主畫面，不直接跳明細 */
      /* 背景預先載入兩份問卷分頁，點店家明細時就不用現點現等 */
      Object.keys(QUESTIONNAIRE_SHEETS).forEach(function(chanKey){
        _fetchQuestionnaireSheet(chanKey, function(){});
      });
    });
  });
  fetchSyncTime();
}

/* ════ 讀「店家名冊」════ */
function fetchPopulation(callback){
  var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
    '/gviz/tq?tqx=out:json&headers=1&sheet=' + encodeURIComponent(POP_SHEET);
  fetch(url).then(function(r){ return r.text(); }).then(function(txt){
    var json = gvizParse(txt);
    var tbl = json.table || {};
    var cols = (tbl.cols||[]).map(function(c){ return c.label||''; });
    STORE_ROWS = (tbl.rows||[]).map(function(row){
      var obj = {};
      (row.c||[]).forEach(function(cell,i){
        var colName = cols[i];
        if(!colName) return;
        if(!cell){ obj[colName]=''; return; }
        var v = (cell.v!==null && cell.v!==undefined) ? cell.v : '';
        obj[colName] = (v!=='' && v!==null && v!==undefined) ? v : (cell.f||'');
      });
      var channelVal = String(obj[P_CHANNEL]||'').trim();
      var storeTypeVal = String(obj[P_STORETYPE]||'').trim();
      return {
        area: String(obj[P_AREA]||'').trim(),
        office: String(obj[P_OFFICE]||'').trim(),
        channel: channelVal,
        storeType: storeTypeVal,
        chanKey: _chanKey(channelVal, storeTypeVal),
        storeName: String(obj[P_STORENAME]||'').trim(),
        code: String(obj[P_CODE]||'').trim(),
        grade: String(obj[P_GRADE]||'').trim(),
        staff: String(obj[P_STAFF]||'').trim()
      };
    }).filter(function(r){ return r.code; });
  }).catch(function(err){
    STORE_ROWS = [];
    document.getElementById('empty-msg').style.display = 'block';
    document.getElementById('empty-msg').textContent = '⚠️ 店家名冊載入失敗：'+err;
    var ov = document.getElementById('ov-cards');
    if(ov) ov.innerHTML = '<div class="ov-empty">⚠️ 店家名冊載入失敗：'+esc(String(err))+'</div>';
  }).then(function(){ callback(); });
}

/* ════ 日期解析／檔期週次判斷（核心邏輯，已獨立單元測試過，改動請對照
   logic-test.js 的測試案例重新驗證，不要憑感覺改） ════ */
function _cellDateParts(cell){
  if(!cell) return null;
  var v = cell.v;
  if(typeof v === 'string'){
    var m = v.match(/Date\((\d+),(\d+),(\d+)/);
    if(m) return { y:+m[1], mo:+m[2]+1, d:+m[3] };
  }
  var f = cell.f || '';
  var m2 = String(f).match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if(m2) return { y:+m2[1], mo:+m2[2], d:+m2[3] };
  return null;
}
function _toEpochDay(y,mo,d){ return Math.floor(Date.UTC(y, mo-1, d) / 86400000); }
function _classifyParts(parts){
  if(!parts) return null;
  var day = _toEpochDay(parts.y, parts.mo, parts.d);
  for(var i=0;i<PERIODS.length;i++){
    var p = PERIODS[i];
    var start = _toEpochDay(p.y,p.mo,p.d);
    var diff = day - start;
    if(diff < 0) continue;
    var week = Math.floor(diff/7) + 1;
    if(week <= p.weeks) return { period:p.key, week:week };
  }
  return null;
}
function _fmtParts(parts){
  if(!parts) return '';
  var pad = function(n){ return String(n).padStart(2,'0'); };
  return parts.y+'/'+pad(parts.mo)+'/'+pad(parts.d);
}
/* 依檔期起始日＋週次，換算該週的日期區間，顯示成 MM/DD-DD（跨月則 MM/DD-MM/DD） */
function _epochDayToParts(day){
  var d = new Date(day*86400000);
  return { y:d.getUTCFullYear(), mo:d.getUTCMonth()+1, d:d.getUTCDate() };
}
function _weekDateRange(periodKey, week){
  var p = PERIODS.filter(function(pp){ return pp.key===periodKey; })[0];
  if(!p) return '';
  var pad = function(n){ return String(n).padStart(2,'0'); };
  var startDay = _toEpochDay(p.y,p.mo,p.d) + (week-1)*7;
  var sp = _epochDayToParts(startDay);
  var ep = _epochDayToParts(startDay+6);
  return sp.mo===ep.mo
    ? pad(sp.mo)+'/'+pad(sp.d)+'-'+pad(ep.d)
    : pad(sp.mo)+'/'+pad(sp.d)+'-'+pad(ep.mo)+'/'+pad(ep.d);
}
/* 今天的日期（台北時區，僅取年月日），用來判斷某檔期週次是否已經「完全過去」
   （週的最後一天都已經過了，才算過去週；當週進行中不算，不應誤判為未達成） */
function _todayEpochDay(){
  var s = new Date().toLocaleDateString('en-CA', { timeZone:'Asia/Taipei' }); /* 'YYYY-MM-DD' */
  var parts = s.split('-');
  return _toEpochDay(+parts[0], +parts[1], +parts[2]);
}
function _isWeekPast(periodKey, week){
  var p = PERIODS.filter(function(pp){ return pp.key===periodKey; })[0];
  if(!p) return false;
  var weekEndDay = _toEpochDay(p.y,p.mo,p.d) + week*7 - 1;
  return _todayEpochDay() > weekEndDay;
}

/* ════ 讀「處理層」════ */
function fetchProcessLayer(callback){
  var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
    '/gviz/tq?tqx=out:json&headers=1&sheet=' + encodeURIComponent(PROC_SHEET);
  fetch(url).then(function(r){ return r.text(); }).then(function(txt){
    var json = gvizParse(txt);
    var tbl = json.table || {};
    var cols = (tbl.cols||[]).map(function(c){ return c.label||''; });
    var idxCode = cols.indexOf(R_CODE), idxDate = cols.indexOf(R_DATE), idxRef = cols.indexOf(R_SOURCEREF), idxStaff = cols.indexOf(R_STAFF);
    function cv(c){ return (c && (c.v!=null ? c.v : c.f)) || ''; }
    var index = {};
    var rows = [];
    (tbl.rows||[]).forEach(function(row){
      var c = row.c || [];
      var code = String(cv(c[idxCode])).trim();
      var parts = _cellDateParts(c[idxDate]);
      var cls = _classifyParts(parts);
      if(!code || !cls) return; /* 不屬於任何已定義檔期週次的紀錄，不計入統計 */
      var ref = idxRef!==-1 ? String(cv(c[idxRef])).trim() : '';
      var staff = idxStaff!==-1 ? String(cv(c[idxStaff])).trim() : '';
      var rec = { code:code, period:cls.period, week:cls.week, parts:parts, ref:ref, staff:staff };
      rows.push(rec);
      if(!index[code]) index[code] = [];
      index[code].push(rec);
    });
    Object.keys(index).forEach(function(code){
      index[code].sort(function(a,b){
        var da=_toEpochDay(a.parts.y,a.parts.mo,a.parts.d), db=_toEpochDay(b.parts.y,b.parts.mo,b.parts.d);
        return db-da; /* 新到舊 */
      });
    });
    VISIT_ROWS = rows;
    VISIT_INDEX = index;
  }).catch(function(){ VISIT_ROWS = []; VISIT_INDEX = {}; }).then(function(){ callback(); });
}

/* ════ 讀原始問卷分頁（店家明細 Dialog「問卷內容」用，比照 coverage_board
   的 _fetchQuestionnaireSheet：headers=0 抓資料、另發 headers=1 只拿欄名，
   避免日期型別欄位的表頭文字被 gviz 型別推斷吃掉）════ */
function _fetchQuestionnaireSheet(chanKey, callback){
  var sheetName = QUESTIONNAIRE_SHEETS[chanKey];
  if(!sheetName){ callback({ error:'找不到「'+chanKey+'」對應的問卷分頁設定' }); return; }
  if(_qSheetCache[chanKey]){ callback(_qSheetCache[chanKey]); return; }
  if(_qSheetLoading[chanKey]){ (_qSheetWaiters[chanKey]=_qSheetWaiters[chanKey]||[]).push(callback); return; }
  _qSheetLoading[chanKey] = true;
  var dataUrl = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
    '/gviz/tq?tqx=out:json&headers=0&sheet=' + encodeURIComponent(sheetName);
  var headerUrl = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
    '/gviz/tq?tqx=out:json&headers=1&sheet=' + encodeURIComponent(sheetName);
  function fail(msg){
    _qSheetLoading[chanKey] = false;
    var errResult = { error: msg };
    callback(errResult);
    (_qSheetWaiters[chanKey]||[]).forEach(function(cb){ cb(errResult); });
    _qSheetWaiters[chanKey] = [];
  }
  Promise.all([
    fetch(dataUrl).then(function(r){ return r.text(); }),
    fetch(headerUrl).then(function(r){ return r.text(); })
  ]).then(function(results){
    var json = gvizParse(results[0]);
    var headerJson = gvizParse(results[1]);
    var rawRows = (json.table||{}).rows || [];
    if(rawRows.length < 1){ fail('分頁「'+sheetName+'」沒有資料'); return; }
    var headerLabels = ((headerJson.table||{}).cols || []).map(function(c){ return String(c.label||'').trim(); });

    function cellVal(row, i){
      if(!row) return '';
      var c = row.c && row.c[i];
      if(!c) return '';
      var v=(c.v!==null&&c.v!==undefined)?c.v:'';
      var f=c.f||'';
      if(typeof v==='string' && /^Date\(/.test(v)) return f || parseGvizDate(v);
      return (v!==''&&v!==null&&v!==undefined)?v:f;
    }

    var colCount = headerLabels.length;
    var baseColNames = [];
    var quizCols = []; /* [{col,section,option}]，欄名含「_」視為「大題_選項」 */
    var codeColIdx = -1;
    for(var i=0;i<colCount;i++){
      var headerText = headerLabels[i];
      if(!headerText) continue;
      if(headerText.indexOf('_')!==-1){
        var parts = headerText.split('_');
        quizCols.push({ col:i, section:parts[0].trim(), option:parts.slice(1).join('_').trim() });
      } else {
        baseColNames.push({ name:headerText, col:i });
        if(headerText === R_CODE) codeColIdx = i;
      }
    }

    /* codeToRecords：依這份問卷分頁自己的「店家代碼」欄分組（原始設計）。
       rowRecords：額外依「處理層」記錄的「行數」建索引。1.3.1 新增——用意
       是店家明細 Dialog 其實已經從「處理層」的「來源分頁+行數」欄位知道
       每一筆巡補紀錄具體落在問卷分頁的哪一列，不需要再靠這份問卷分頁
       自己的「店家代碼」欄位文字去反查比對；如果問卷分頁那欄有打字
       誤差、全半形不一致、或欄位根本沒填，只靠代碼比對就會找不到資料
       （結果就是「明明知道在第428列，卻讀不到」），改成優先用行數直接
       定位就不受這欄內容影響，openStoreDetail() 裡會優先用 rowRecords，
       找不到才退回 codeToRecords 當備援。
       行數對齊注意（1.3.2 修正）：GAS 端產生「行數」是對「扣掉表頭後的
       資料列」1-based 編號（第1筆資料＝行數1），不是試算表本身的實體
       列號；這裡的迴圈變數 ri 本來就是同一種編號（rawRows[0]＝表頭，
       ri 從1開始正好對應「第 ri 筆資料」），索引直接用 ri，不要再 +1，
       之前 rowRecords[ri+1] 會錯位取到下一筆資料，導致查得到筆數但
       內容全部對不上（時間顯示未知、題目空白）*/
    console.log('[問卷分頁除錯]', sheetName,
      'headerLabels=', headerLabels,
      'baseColNames=', baseColNames.map(function(b){return b.name+'(col'+b.col+')';}),
      'quizCols=', quizCols.length, quizCols.slice(0,5),
      'codeColIdx=', codeColIdx,
      'rawRows.length=', rawRows.length);
    var _dbgRow = rawRows[215];
    console.log('[問卷分頁除錯] rawRows[215]=', _dbgRow, 'c陣列長度=', _dbgRow && _dbgRow.c ? _dbgRow.c.length : 'row不存在');

    var codeToRecords = {};
    var rowRecords = {};
    for(var ri=1; ri<rawRows.length; ri++){
      var row = rawRows[ri];
      if(!row || !row.c) continue;
      var code = codeColIdx!==-1 ? String(cellVal(row, codeColIdx)||'').trim() : '';
      var baseData = {};
      baseColNames.forEach(function(b){ baseData[b.name] = cellVal(row, b.col); });
      var sections = {}, sectionOrder = [];
      quizCols.forEach(function(qc){
        var v = String(cellVal(row, qc.col)||'').trim();
        if(!v) return;
        if(!sections[qc.section]){ sections[qc.section]=[]; sectionOrder.push(qc.section); }
        sections[qc.section].push({ option:qc.option, value:v });
      });
      /* 這一列若「店家代碼」以外的欄位全部是空的，視為空白列（例如表尾
         殘留的空列），不建索引，避免污染 rowRecords／codeToRecords */
      var hasAnyData = sectionOrder.length>0 || baseColNames.some(function(b){ return String(baseData[b.name]||'').trim()!==''; });
      if(!hasAnyData) continue;
      var record = {
        base: baseData,
        sections: sectionOrder.map(function(s){ return { section:s, picks:sections[s] }; }),
        timeKey: _findTimeText(baseData)
      };
      if(ri===215){
        console.log('[問卷分頁除錯] 第215筆 baseData=', baseData, 'sectionOrder=', sectionOrder, 'timeKey=', record.timeKey);
      }
      rowRecords[ri] = record; /* ri＝「處理層」行數欄位所指的同一種編號（扣掉表頭後第幾筆資料） */
      if(code){
        if(!codeToRecords[code]) codeToRecords[code] = [];
        codeToRecords[code].push(record);
      }
    }
    Object.keys(codeToRecords).forEach(function(code){
      codeToRecords[code].sort(function(a,b){ return a.timeKey < b.timeKey ? 1 : (a.timeKey > b.timeKey ? -1 : 0); });
    });

    _qSheetCache[chanKey] = { codeToRecords:codeToRecords, rowRecords:rowRecords };
    _qSheetLoading[chanKey] = false;
    callback(_qSheetCache[chanKey]);
    (_qSheetWaiters[chanKey]||[]).forEach(function(cb){ cb(_qSheetCache[chanKey]); });
    _qSheetWaiters[chanKey] = [];
  }).catch(function(err){ fail(String(err)); });
}

/* ════ 概況主畫面（戰情室）：中元/中秋 × 量販/全聯 四張卡片 ════ */
function _periodColumns(periodKey){
  var p = PERIODS.filter(function(pp){ return pp.key===periodKey; })[0];
  if(!p) return [];
  var cols = [];
  for(var w=1; w<=p.weeks; w++) cols.push({ period:p.key, week:w });
  return cols;
}
function _statsFor(storesSubset, cols){
  var totalExp=0, totalStdDone=0;
  var byGrade = {}; /* grade → {count, exp, stdDone, weeks:{week:{exp,stdDone}}} */
  storesSubset.forEach(function(s){
    var std = GRADE_FREQ[s.grade];
    if(std===undefined) return; /* 等級未知不計入概況統計，跟主表邏輯一致 */
    if(!byGrade[s.grade]) byGrade[s.grade] = { count:0, exp:0, stdDone:0, weeks:{} };
    var g = byGrade[s.grade];
    g.count++;
    cols.forEach(function(c){
      var actual = _actualCount(s.code, c.period, c.week);
      var exp = std, stdDone = Math.min(actual, std);
      g.exp += exp; g.stdDone += stdDone;
      if(!g.weeks[c.week]) g.weeks[c.week] = { exp:0, stdDone:0 };
      g.weeks[c.week].exp += exp; g.weeks[c.week].stdDone += stdDone;
      totalExp += exp; totalStdDone += stdDone;
    });
  });
  return { rate: totalExp>0 ? (totalStdDone/totalExp*100) : 0, totalExp:totalExp, byGrade:byGrade };
}
/* ════ 依營業處的執行狀況總覽（不分檔期／通路，合計整體表現） ════ */
function _allPeriodColumns(){
  var cols = [];
  PERIODS.forEach(function(p){ for(var w=1; w<=p.weeks; w++) cols.push({ period:p.key, week:w }); });
  return cols;
}
/* 1.3.1：量販／全聯應達次數標準不同（見 GRADE_FREQ），混在一起算「達成率」
   會互相稀釋，看不出兩個通路各自的執行狀況，改成依「營業處＋通路」分開
   統計，chanKey 傳 null／不傳則維持舊的「不分通路」合計（保留給總計列用） */
function _officeStatsFor(area, chanKey){
  var subset = STORE_ROWS.filter(function(s){
    if(s.area!==area) return false;
    if(chanKey && s.chanKey!==chanKey) return false;
    return true;
  });
  var cols = OFFICE_WEEK_SEL ? [{ period:OFFICE_WEEK_SEL.period, week:OFFICE_WEEK_SEL.week }] : _allPeriodColumns();
  var exp=0, stdDone=0, extra=0, unknownGrade=0;
  subset.forEach(function(s){
    var std = GRADE_FREQ[s.grade];
    if(std===undefined){ unknownGrade++; return; }
    cols.forEach(function(c){
      var actual = _actualCount(s.code, c.period, c.week);
      exp += std; stdDone += Math.min(actual, std); extra += Math.max(0, actual-std);
    });
  });
  return { area:area, chanKey:chanKey||'', count:subset.length, exp:exp, stdDone:stdDone, extra:extra,
    unknownGrade:unknownGrade, rate: exp>0 ? (stdDone/exp*100) : 0 };
}
/* 依營業處執行狀況表的「週次」選單：null(整體) + 每個檔期底下的每一週，
   讓現場能切到「當週」看進度，不是永遠只看整段檔期合計 */
function _officeWeekOptions(){
  var opts = [{ period:null, week:null, label:'整體', range:'' }];
  PERIODS.forEach(function(p){
    for(var w=1; w<=p.weeks; w++){
      opts.push({ period:p.key, week:w, label:p.label.replace('專案','')+' W'+w, range:_weekDateRange(p.key,w) });
    }
  });
  return opts;
}
function renderOfficeWeekChips(){
  var wrap = document.getElementById('ov-office-week-chips');
  if(!wrap) return;
  var opts = _officeWeekOptions();
  wrap.innerHTML = opts.map(function(o){
    var active = OFFICE_WEEK_SEL ? (o.period===OFFICE_WEEK_SEL.period && o.week===OFFICE_WEEK_SEL.week) : !o.period;
    var pArg = o.period ? "'"+o.period+"'" : 'null';
    var wArg = o.week || 'null';
    return '<div class="chip'+(active?' active':'')+'" onclick="setOfficeWeek(this,'+pArg+','+wArg+')">'
      + esc(o.label) + (o.range ? '<span class="chip-sub">'+esc(o.range)+'</span>' : '')
      + '</div>';
  }).join('');
}
function setOfficeWeek(el, period, week){

function renderOfficeOverview(){
  var wrap = document.getElementById('ov-office-wrap');
  if(!wrap) return;
  renderOfficeWeekChips();
  var areasPresent = AREA_ORDER.filter(function(a){
    return STORE_ROWS.some(function(s){ return s.area===a; });
  });
  if(!areasPresent.length){ wrap.innerHTML = '<div class="ov-empty">目前沒有符合資料</div>'; return; }
  var CHANS = ['量販','全聯'];
  var chanIcon = { '量販':'📦', '全聯':'🛒' };
  /* 每個通路各自的 5 個統計儲存格（店數／應達／達標／達成率／超額），
     hasData=false 時（該處沒有這個通路的店）顯示「—」且不可點擊 */
  function _statCells(area, ck){
    var hasData = STORE_ROWS.some(function(s){ return s.area===area && s.chanKey===ck; });
    if(!hasData){
      return '<td>—</td><td>—</td><td>—</td><td>—</td><td>—</td>';
    }
    var r = _officeStatsFor(area, ck);
    var click = ' class="oo-clickable" onclick="openDetailFromOffice(\''+area+'\',\''+ck+'\')"';
    return '<td'+click+'>'+r.count+'</td>'
      + '<td'+click+'>'+r.exp+'</td>'
      + '<td'+click+'>'+r.stdDone+'</td>'
      + '<td'+click+' class="oo-rate">'+r.rate.toFixed(1)+'%</td>'
      + '<td'+click+' class="oo-extra">'+(r.extra>0?'+'+r.extra:'0')+'</td>';
  }
  var chanTotals = { '量販':{exp:0,stdDone:0,extra:0,count:0}, '全聯':{exp:0,stdDone:0,extra:0,count:0} };
  var bodyRows = areasPresent.map(function(area){
    var row = '<tr><td class="oo-name">'+esc(area)+'</td>';
    CHANS.forEach(function(ck){
      var r = _officeStatsFor(area, ck);
      chanTotals[ck].exp += r.exp; chanTotals[ck].stdDone += r.stdDone; chanTotals[ck].extra += r.extra; chanTotals[ck].count += r.count;
      row += _statCells(area, ck);
    });
    row += '</tr>';
    return row;
  }).join('');
  var totalRow = '<tr class="oo-total"><td class="oo-name">全部合計</td>' + CHANS.map(function(ck){
    var t = chanTotals[ck];
    var rate = t.exp>0 ? (t.stdDone/t.exp*100) : 0;
    return '<td>'+t.count+'</td><td>'+t.exp+'</td><td>'+t.stdDone+'</td>'
      + '<td class="oo-rate">'+rate.toFixed(1)+'%</td>'
      + '<td class="oo-extra">'+(t.extra>0?'+'+t.extra:'0')+'</td>';
  }).join('') + '</tr>';
  var tableHtml = '<div class="oo-tbl-scroll"><table class="ov-office-tbl">'
    + '<tr><th rowspan="2">營業處</th><th colspan="5">📦 量販</th><th colspan="5">🛒 全聯</th></tr>'
    + '<tr>' + CHANS.map(function(){ return '<th>店數</th><th>應達次數</th><th>達標次數</th><th>達成率%</th><th>超額次數</th>'; }).join('') + '</tr>'
    + bodyRows
    + totalRow
    + '</table></div>';

  /* 手機版：改成一處一張直式卡片（量販／全聯各一區塊），避免表格橫向
     欄位在窄螢幕被裁到看不到，同一份統計數字（_officeStatsFor／
     chanTotals）只是換一種排版，不重算 */
  function _mcardChan(area, ck){
    var hasData = STORE_ROWS.some(function(s){ return s.area===area && s.chanKey===ck; });
    var title = '<div class="oo-mcard-chan-title">'+chanIcon[ck]+' '+ck+'</div>';
    if(!hasData){ return '<div class="oo-mcard-chan">'+title+'<div class="oo-mcard-empty">—</div></div>'; }
    var r = _officeStatsFor(area, ck);
    return '<div class="oo-mcard-chan oo-clickable" onclick="openDetailFromOffice(\''+area+'\',\''+ck+'\')">'
      + title
      + '<div class="oo-mcard-grid">'
      + '<div class="oo-mstat"><span class="k">店數</span><span class="v">'+r.count+'</span></div>'
      + '<div class="oo-mstat"><span class="k">應達</span><span class="v">'+r.exp+'</span></div>'
      + '<div class="oo-mstat"><span class="k">達標</span><span class="v">'+r.stdDone+'</span></div>'
      + '<div class="oo-mstat"><span class="k">達成率</span><span class="v rate">'+r.rate.toFixed(1)+'%</span></div>'
      + '<div class="oo-mstat"><span class="k">超額</span><span class="v extra">'+(r.extra>0?'+'+r.extra:'0')+'</span></div>'
      + '</div></div>';
  }
  var mobileCards = areasPresent.map(function(area){
    return '<div class="oo-mcard"><div class="oo-mcard-head">'+esc(area)+'</div>'
      + CHANS.map(function(ck){ return _mcardChan(area, ck); }).join('')
      + '</div>';
  }).join('');
  var totalChanBlocks = CHANS.map(function(ck){
    var t = chanTotals[ck];
    var rate = t.exp>0 ? (t.stdDone/t.exp*100) : 0;
    return '<div class="oo-mcard-chan">'
      + '<div class="oo-mcard-chan-title">'+chanIcon[ck]+' '+ck+'</div>'
      + '<div class="oo-mcard-grid">'
      + '<div class="oo-mstat"><span class="k">店數</span><span class="v">'+t.count+'</span></div>'
      + '<div class="oo-mstat"><span class="k">應達</span><span class="v">'+t.exp+'</span></div>'
      + '<div class="oo-mstat"><span class="k">達標</span><span class="v">'+t.stdDone+'</span></div>'
      + '<div class="oo-mstat"><span class="k">達成率</span><span class="v rate">'+rate.toFixed(1)+'%</span></div>'
      + '<div class="oo-mstat"><span class="k">超額</span><span class="v extra">'+(t.extra>0?'+'+t.extra:'0')+'</span></div>'
      + '</div></div>';
  }).join('');
  var mobileHtml = '<div class="oo-mobile-cards">'
    + mobileCards
    + '<div class="oo-mcard oo-mcard-total"><div class="oo-mcard-head">全部合計</div>' + totalChanBlocks + '</div>'
    + '</div>';

  wrap.innerHTML = tableHtml + mobileHtml;
}

function renderOverview(){
  var wrap = document.getElementById('ov-cards');

            var label = (GRADE_LABEL[g]||g) + '（' + GRADE_FREQ[g] + '）';

          }).join('')

      return '<div class="ov-card" onclick="openDetailFromOverview(\''+p.key+'\',\''+chanKey+'\')">'

  renderOverview(); /* 回總覽時重新整理數字，避免跟明細篩選後的畫面對不上 */
}

/* ════ 目前應顯示的欄位（依檔期篩選動態決定） ════ */
function activeColumns(){
  var cols = [];
  PERIODS.forEach(function(p){
    if(FILTER.period!=='全部' && FILTER.period!==p.key) return;
    for(var w=1; w<=p.weeks; w++){
      cols.push({ period:p.key, week:w, label:(FILTER.period==='全部'?p.label.replace('專案',''):'') + ' W'+w });
    }
  });
  return cols;
}

/* ════ 單店在指定欄位上的實際次數 ════
   【1.3.0 修正】巡補的有效計算方式是「每日每店計 1 次」——同一天同一店
   若有多筆問卷紀錄（例如重填、或訪員誤送出兩次），只算 1 次巡補，不應該
   被算成 2 次而墊高達成率或超額次數。舊版直接數處理層筆數（list.length），
   沒有依日期去重，若同一天有多筆紀錄會被誤算成多次巡補；改用
   Set 依「年-月-日」去重後再計數。店家明細 Dialog 的時間軸仍會列出全部
   原始紀錄（供人工核對是否真的重複填寫），兩者不衝突：這裡負責「算幾次」，
   Dialog 負責「給你看每一筆長怎樣」。 */
function _actualCount(code, period, week){
  var list = VISIT_INDEX[code];
  if(!list) return 0;
  var days = {};
  for(var i=0;i<list.length;i++){
    var v = list[i];
    if(v.period!==period || v.week!==week) continue;
    days[_toEpochDay(v.parts.y,v.parts.mo,v.parts.d)] = true;
  }
  return Object.keys(days).length;
}
/* 同一天是否有多筆原始紀錄（供店家明細 Dialog 標示「同日多筆，僅計1次」用，
   不影響 _actualCount 的計算結果，純粹是給人看的提示） */
function _dupDaysForStore(code){
  var list = VISIT_INDEX[code];
  if(!list) return {};
  var countByDay = {};
  list.forEach(function(v){
    var key = _toEpochDay(v.parts.y,v.parts.mo,v.parts.d);
    countByDay[key] = (countByDay[key]||0) + 1;
  });
  var dup = {};
  Object.keys(countByDay).forEach(function(k){ if(countByDay[k]>1) dup[k] = countByDay[k]; });
  return dup;
}

/* ════ 篩選店家清單 ════ */
function getFilteredStores(){
  var kw = (FILTER.keyword||'').toLowerCase();
  return STORE_ROWS.filter(function(r){
    if(FILTER.channel!=='全部' && r.chanKey!==FILTER.channel) return false;
    if(FILTER.grade!=='全部' && r.grade!==FILTER.grade) return false;
    if(FILTER.area!=='全部' && r.area!==FILTER.area) return false;
    if(FILTER.office!=='全部' && r.office!==FILTER.office) return false;
    if(kw){
      var hay = (r.storeName+' '+r.code+' '+r.staff).toLowerCase();
      if(hay.indexOf(kw)===-1) return false;
    }
    return true;
  }).sort(function(a,b){
    var cols=['area','office','chanKey','code'];
    for(var i=0;i<cols.length;i++){
      var va=String(a[cols[i]]||''), vb=String(b[cols[i]]||'');
      if(va!==vb) return va>vb?1:-1;
    }
    return 0;
  });
}

/* ════ 渲染 ════ */
function render(){
  var stores = getFilteredStores();
  var cols = activeColumns();

  /* 依「期」把連續欄位分組（中元 W1~W3 一組／中秋 W1~W2 一組），
     用來畫出跨欄的檔期分組表頭 + 組間強分隔線；同檔期內週與週之間也加上
     較細的分隔線，強化不同檔期／不同週次的視覺區隔 */
  var periodLabelMap = {}; PERIODS.forEach(function(p){ periodLabelMap[p.key] = p.label.replace('專案',''); });
  var colGroups = [];
  var colMeta = [];
  cols.forEach(function(c, idx){
    var last = colGroups[colGroups.length-1];
    var isNewGroup = !last || last.period!==c.period;
    if(isNewGroup){ colGroups.push({ period:c.period, count:1 }); }
    else { last.count++; }
    var isGroupDivider = isNewGroup && colGroups.length>1; /* 檔期交界：粗分隔線，表格最左欄不畫 */
    var isWeekDivider = idx>0 && !isGroupDivider; /* 同檔期內週與週交界：細分隔線 */
    colMeta.push({
      isGroupDivider: isGroupDivider,
      isWeekDivider: isWeekDivider,
      periodCls: c.period==='zhong' ? 'pg-zhong' : 'pg-mid',
      dateRange: _weekDateRange(c.period, c.week),
      isPastWeek: _isWeekPast(c.period, c.week)
    });
  });

  var head = document.getElementById('tbl-head');
  var headHtml = '<tr><th class="th-left">區域</th><th class="th-left">店家</th><th>通路</th><th>等級</th><th>主要訪員</th><th>次數合計</th>';
  cols.forEach(function(c, idx){
    var m = colMeta[idx];
    var dividerCls = m.isGroupDivider ? ' pg-divider' : (m.isWeekDivider ? ' wk-divider' : '');
    headHtml += '<th class="'+m.periodCls+dividerCls+'"><div class="th-wk-flex">'
      + '<span class="th-period-name">'+esc(periodLabelMap[c.period]||c.period)+'</span>'
      + '<span class="th-week-label">W'+c.week+'</span>'
      + '<span class="th-date-range">'+esc(m.dateRange)+'</span>'
      + '</div></th>';
  });
  headHtml += '</tr>';
  head.innerHTML = headHtml;

  var totalExp=0, totalStdDone=0, totalExtra=0, unknownGradeCount=0;
  var body = document.getElementById('tbl-body');
  var rowsHtml = '';

  stores.forEach(function(s){
    var std = GRADE_FREQ[s.grade];
    if(std===undefined){ unknownGradeCount++; }
    var gradeLabel = GRADE_LABEL[s.grade] || s.grade;

    var colsHtml = '';
    var rowExp=0, rowStdDone=0, rowExtra=0;
    cols.forEach(function(c, idx){
      var actual = _actualCount(s.code, c.period, c.week);
      var stdN = std===undefined ? 0 : std;
      var stdDone = Math.min(actual, stdN);
      var extra = Math.max(0, actual - stdN);
      if(std!==undefined){ totalExp += stdN; totalStdDone += stdDone; totalExtra += extra; rowExp += stdN; rowStdDone += stdDone; rowExtra += extra; }
      var m = colMeta[idx];
      var dividerCls = m.isGroupDivider ? ' pg-divider' : (m.isWeekDivider ? ' wk-divider' : '');
      colsHtml += '<td class="'+m.periodCls+dividerCls+'"><div class="box-container">';
      for(var i=1;i<=stdN;i++){
        if(actual>=i){ colsHtml += '<input type="checkbox" class="std-check" checked>'; }
        else if(m.isPastWeek){ colsHtml += '<span class="miss-mark" title="過去週未達成">✖</span>'; }
        else { colsHtml += '<input type="checkbox" class="std-check">'; }
      }
      for(var j=1;j<=extra;j++){ colsHtml += '<input type="checkbox" class="extra-check" checked>'; }
      colsHtml += '</div></td>';
    });
    var sumHtml = '<div class="sum-cell"><div class="sum-main">'+rowStdDone+'/'+rowExp+'</div>'
      + (rowExtra>0 ? '<div class="sum-extra-badge">超額 +'+rowExtra+'</div>' : '')
      + '</div>';

    var row = '<tr onclick="openStoreDetail(\''+esc(s.code)+'\')">'
      + '<td class="td-left">'+esc(s.area)+' '+esc(s.office)+'</td>'
      + '<td class="td-left"><div class="td-name">'+esc(s.storeName)+'</div><div class="td-code">'+esc(s.code)+'</div></td>'
      + '<td>'+esc(s.storeType||'—')+'</td>'
      + '<td class="grade-tag">'+(std===undefined?'<span class="unknown-grade">'+esc(s.grade||'未設定')+' ⚠️</span>':esc(gradeLabel))+'</td>'
      + '<td>'+esc(s.staff)+'</td>'
      + '<td class="sum-col">'+sumHtml+'</td>'
      + colsHtml;
    row += '</tr>';
    rowsHtml += row;
  });

  body.innerHTML = rowsHtml;
  document.getElementById('empty-msg').style.display = stores.length ? 'none' : 'block';

  document.getElementById('stat-store-count').textContent = stores.length;
  document.getElementById('stat-exp-visits').textContent = totalExp;
  var rate = totalExp>0 ? (totalStdDone/totalExp*100).toFixed(1) : '0.0';
  document.getElementById('stat-rate').textContent = rate+'%';
  document.getElementById('stat-extra').textContent = totalExtra;

  var noteEl = document.querySelector('.sum-card.extra .sc-val-note');
  if(unknownGradeCount>0){
    noteEl.style.display = 'block';
    noteEl.textContent = '⚠️ '+unknownGradeCount+' 家店等級未對照到標準，未列入應達次數與達成率';
    noteEl.style.fontSize = '11px'; noteEl.style.fontWeight = '600'; noteEl.style.color = 'var(--red)'; noteEl.style.marginTop='6px';
  } else {
    noteEl.style.display = 'none';
  }

  updateStickyTops();
}

/* ════ 店家明細 Dialog：巡補時間軸＋問卷內容 ════ */
var _detailCode = '';

/* 每筆問卷紀錄預設收合，點擊才展開完整內容（比照 coverage_board 的
   _toggleHistoryRecord，避免多筆紀錄一次全部展開把畫面撐爆） */
function _toggleHistoryRecord(hid){
  var rec = document.getElementById('hrec-'+hid);
  var body = document.getElementById('hbody-'+hid);
  if(!rec || !body) return;
  var isOpen = rec.classList.contains('open');
  rec.classList.toggle('open', !isOpen);
  body.style.display = isOpen ? 'none' : 'block';
}

/* 把 codeToRecords 底下某店的問卷紀錄陣列渲染成可展開時間軸，
   內容渲染交給 shared/photo-viewer.js 的 _renderQuizSections（照片/文字
   答案的標準化渲染，跟 coverage_board 共用同一支，不重寫一份） */
function _buildQuestionnaireList(records, storeName, ridBase){
  if(!records || !records.length){
    return '<div class="store-history-empty">⏳ 目前篩選範圍找不到這家店的問卷紀錄'
      + '（可能是巡補紀錄還沒同步，或問卷資料的店家代碼跟名冊對不上）</div>';
  }
  return '<div class="store-history-list">' + records.map(function(rec, idx){
    var timeText = _findTimeText(rec.base) || '未知時間';
    var badge = idx===0 ? '最新' : ('第 '+(records.length-idx)+' 筆');
    var hid = ridBase + '-q' + idx;
    var isOpen = idx === 0;
    return '<div class="store-history-record'+(isOpen?' open':'')+'" id="hrec-'+hid+'">'
      + '<div class="store-history-head" onclick="_toggleHistoryRecord(\''+hid+'\')">'
      +   '<span class="store-history-badge">'+esc(badge)+'</span>'
      +   '<span class="store-history-time">🕒 '+esc(String(timeText))+'</span>'
      +   '<span class="store-history-expand-ico">▶</span>'
      + '</div>'
      + '<div class="store-history-body raw-detail-panel" id="hbody-'+hid+'" style="display:'+(isOpen?'block':'none')+';">'
      +   _renderQuizSections(rec.sections, storeName)
      + '</div>'
      + '</div>';
  }).join('') + '</div>';
}

/* 從「來源分頁+行數」參考字串取出行數（字串結尾那段數字，例如
   「問卷資料量販_57」或「卷_巡全聯_428」都抓最後的 57／428），
   用來直接定位問卷分頁的實際列，不用再靠問卷分頁自己的店家代碼欄反查 */
function _refRowNum(ref){
  var m = String(ref||'').match(/(\d+)\s*$/);
  return m ? parseInt(m[1],10) : null;
}
function openStoreDetail(code){
  _detailCode = code;
  var store = STORE_ROWS.filter(function(s){ return s.code===code; })[0];
  if(!store) return;
  document.getElementById('dlg-title').textContent = store.storeName+'（'+store.code+'）';

  var cols = activeColumns();
  var std = GRADE_FREQ[store.grade];
  var expTotal=0, stdDoneTotal=0, extraTotal=0;
  cols.forEach(function(c){
    var actual = _actualCount(code, c.period, c.week);
    var stdN = std===undefined?0:std;
    expTotal += stdN;
    stdDoneTotal += Math.min(actual, stdN);
    extraTotal += Math.max(0, actual-stdN);
  });
  var rate = expTotal>0 ? (stdDoneTotal/expTotal*100).toFixed(1) : '0.0';

  var visits = (VISIT_INDEX[code]||[]).filter(function(v){
    return cols.some(function(c){ return c.period===v.period && c.week===v.week; });
  });
  /* 同一天有幾筆原始紀錄（僅供標示提醒，不影響達成率計算——
     _actualCount 已經依日期去重，這裡純粹讓使用者知道「為什麼這天只算1次」 */
  var dupDays = _dupDaysForStore(code);

  var qRid = _rid(code);
  var html = '<div class="visit-timeline">'
    + '<div class="visit-summary">'
    + '<div class="vs-item">單位<br><b>'+esc(store.area)+' '+esc(store.office)+'</b></div>'
    + '<div class="vs-item">主要訪員<br><b>'+esc(store.staff)+'</b></div>'
    + '<div class="vs-item">等級<br><b>'+esc(store.grade ? (GRADE_LABEL[store.grade]||store.grade) : '未設定')+'</b></div>'
    + '<div class="vs-item">目前篩選範圍達成率<br><b>'+stdDoneTotal+'/'+expTotal+'（'+rate+'%）</b></div>'
    + '<div class="vs-item">超額次數<br><b style="color:var(--bonus)">'+extraTotal+'</b></div>'
    + '</div>';

  if(!visits.length){
    html += '<div class="empty">目前篩選範圍內沒有巡補紀錄</div>';
  } else {
    html += visits.map(function(v){
      var periodLabel = (PERIODS.filter(function(p){return p.key===v.period;})[0]||{}).label || v.period;
      var dayKey = _toEpochDay(v.parts.y, v.parts.mo, v.parts.d);
      var dupN = dupDays[dayKey];
      var dupBadge = dupN ? '<span class="store-history-badge dup" title="同一天共 '+dupN+' 筆紀錄，達成率僅計1次巡補" style="flex-shrink:0;">同日'+dupN+'筆</span>' : '';
      return '<div class="visit-row">'
        + '<span class="v-date">'+esc(_fmtParts(v.parts))+'</span>'
        + '<span class="v-week">'+esc(periodLabel.replace('專案',''))+' W'+v.week+'</span>'
        + '<span class="v-staff">'+esc(v.staff||'—')+'</span>'
        + dupBadge
        + '<span class="v-ref">'+esc(v.ref||'—')+'</span>'
        + '</div>';
    }).join('');
  }
  html += '</div>';

  html += '<div style="padding:0 20px;">'
    + '<div class="q-section-title">📋 問卷內容</div>'
    + '<div id="q-panel-'+qRid+'">⏳ 讀取問卷內容…</div>'
    + '</div>';

  document.getElementById('dlg-body').innerHTML = html;
  var dlg = document.getElementById('detail-dialog');
  dlg.style.display = 'flex';
  setTimeout(function(){ dlg.classList.add('open'); }, 10);

  /* 問卷內容依店家的通路（量販／全聯）決定要抓哪一份問卷分頁，
     非同步載入，載入期間不擋住時間軸先顯示 */
  var panelEl = document.getElementById('q-panel-'+qRid);
  if(!store.chanKey){
    if(panelEl) panelEl.innerHTML = '<div class="store-history-empty">⚠️ 這家店的通路無法判斷（通路別／店家型態欄位對不到量販或全聯），無法查找對應的問卷分頁</div>';
    return;
  }
  _fetchQuestionnaireSheet(store.chanKey, function(qData){
    var liveEl = document.getElementById('q-panel-'+qRid);
    if(!liveEl || _detailCode !== code) return; /* 使用者可能已切換到別家店或關閉 dialog */
    if(qData.error){
      liveEl.innerHTML = '<div style="padding:8px 0;font-size:12px;color:#B23A3A;">⚠️ '+esc(qData.error)+'</div>';
      return;
    }
    /* 優先用「處理層」每筆巡補紀錄自帶的來源列號（v.ref）直接定位問卷分頁
       的那一列，不靠問卷分頁自己的店家代碼欄反查——這樣即使那欄打字有
       誤差／全半形不一致／沒填，只要行數對得上，內容還是讀得到。
       visits 本身已經是「新到舊」排序，records 順序自然跟時間軸一致 */
    var records = [], seenRows = {};
    visits.forEach(function(v){
      var rowNum = _refRowNum(v.ref);
      if(rowNum==null || !qData.rowRecords || !qData.rowRecords[rowNum] || seenRows[rowNum]) return;
      seenRows[rowNum] = true;
      records.push(qData.rowRecords[rowNum]);
    });
    /* 備援：行數解析不出來或該行沒索引到（例如舊資料的 ref 格式不同），
       退回原本「用店家代碼比對問卷分頁」的方式 */
    if(!records.length){
      records = (qData.codeToRecords && qData.codeToRecords[code]) || [];
    }
    liveEl.innerHTML = _buildQuestionnaireList(records, store.storeName, qRid);
  });
}

/* ════ CSV／LINE／截圖 ════ */
function _summaryForShare(){
  var stores = getFilteredStores();
  var cols = activeColumns();
  var totalExp=0, totalStdDone=0, totalExtra=0;
  var perStore = stores.map(function(s){
    var std = GRADE_FREQ[s.grade];
    var stdN = std===undefined?0:std;
    var exp=0, stdDone=0, extra=0;
    cols.forEach(function(c){
      var actual = _actualCount(s.code, c.period, c.week);
      exp += stdN; stdDone += Math.min(actual,stdN); extra += Math.max(0,actual-stdN);
    });
    if(std!==undefined){ totalExp+=exp; totalStdDone+=stdDone; totalExtra+=extra; }
    return { store:s, exp:exp, stdDone:stdDone, extra:extra, rate: exp>0?(stdDone/exp*100):0 };
  });
  return { stores:perStore, totalExp:totalExp, totalStdDone:totalStdDone, totalExtra:totalExtra,
    rate: totalExp>0 ? (totalStdDone/totalExp*100).toFixed(1) : '0.0' };
}
function buildCsvContent(){
  var data = _summaryForShare();
  var cols = activeColumns();
  var headers = ['營業處名稱','營業所/課','主要訪員','通路別','店家型態','店家代碼','店家名稱','店家等級'].concat(cols.map(function(c){return c.label.trim();})).concat(['應達合計','標準完成合計','超額合計','達成率%']);
  var rows = [headers];
  data.stores.forEach(function(item){
    var s = item.store;
    var row = [s.area, s.office, s.staff, s.channel, s.storeType, s.code, s.storeName, s.grade];
    var std = GRADE_FREQ[s.grade];
    var stdN = std===undefined?0:std;
    cols.forEach(function(c){ row.push(_actualCount(s.code, c.period, c.week)); });
    row.push(item.exp, item.stdDone, item.extra, item.rate.toFixed(1));
    rows.push(row);
  });
  return '\uFEFF'+rows.map(function(r){
    return r.map(function(c){ var s=String(c==null?'':c); return /[,"\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }).join(',');
  }).join('\n');
}
function toolbarDownloadCsv(){
  var btn = document.getElementById('tb-btn-csv');

/* ════ 使用說明 Dialog：給操作者看「數據代表什麼」，刻意不寫後台怎麼算
   （檔期週次判斷、gviz 欄位比對等實作細節），只講畫面上的數字跟顏色是
   什麼意思，避免非技術使用者被公式淹沒 ════ */
var _manualBuilt = false;
function _buildManualContent(){
  return ''
    + '<p><b>【這是什麼看板？】</b>追蹤中元／中秋節慶專案，各店家每週有沒有'
    + '達到應該去巡補的次數。看板依店家等級自動抓「這家店這週該去幾次」，'
    + '再跟實際去過的次數比對，一眼看出誰達標、誰超標、誰還沒去。</p>'
    + '<hr>'
    + '<p><b>【概況主畫面怎麼看？】</b></p>'
    + '<p>上方四張卡片＝中元／中秋 ×量販／全聯，每張顯示整體達成率，卡片內'
    + '表格再依店家等級拆分各週達成率。點卡片會帶著對應的檔期／通路篩選'
    + '直接進明細表格。</p>'
    + '<p>下方「依營業處執行狀況」表格是同一批資料換一個角度看——不分檔期'
    + '／通路，看每個營業處整體表現，點一列同樣可以直接進明細（只鎖定該'
    + '營業處）。</p>'
    + '<hr>'
    + '<p><b>【篩選列】</b></p>'
    + '<p><b>檔期</b>：只看中元或只看中秋，或全部一起看（欄位會跟著變成 W1~W5）<br>'
    + '<b>通路／等級</b>：量販店與全聯社的應達次數標準不同（等級旁邊的數字'
    + '就是每週該去幾次），可個別篩選<br>'
    + '<b>營業處／營業所</b>：依組織層級篩選，選定營業處後才會出現底下的'
    + '營業所選項</p>'
    + '<hr>'
    + '<p><b>【主表格的格子代表什麼？】</b></p>'
    + '<p><span style="display:inline-block;width:13px;height:13px;background:#2F86EB;border-radius:3px;vertical-align:middle;"></span>'
    + ' <b>藍色格</b>：這次巡補算進「應達次數」裡，已經完成<br>'
    + '<span style="display:inline-block;width:13px;height:13px;border:2px solid #c8ccd2;border-radius:3px;vertical-align:middle;"></span>'
    + ' <b>灰框空格</b>：這格還沒完成（若該週已經過去，會顯示 ✖ 提醒未達成）<br>'
    + '<span style="display:inline-block;width:13px;height:13px;background:#FF7A00;border-radius:3px;vertical-align:middle;"></span>'
    + ' <b>橘色發光格（超額）</b>：實際去的次數超過標準，多出來的部分自動顯示；'
    + '超額次數不會拉高達成率，也不會拿去補其他店家的不足，純粹是額外的努力紀錄</p>'
    + '<hr>'
    + '<p><b>【達成率 % 是怎麼定義的？】</b>達成率 ＝ 目前篩選範圍內「已完成'
    + '的標準次數」除以「應達到的標準次數」。重點是分母只看「應達次數」，'
    + '不是「實際次數」——巡補超標的店不會把分母墊高，也不會拉低其他店家'
    + '看起來的表現。</p>'
    + '<hr>'
    + '<p><b>【「每日每店計 1 次」是什麼意思？】</b>同一家店同一天不管填了'
    + '幾筆問卷紀錄，都只算 1 次巡補；同一天重複的紀錄不會被灌水成多次，'
    + '也不會多墊超額次數。</p>'
    + '<hr>'
    + '<p><b>【店家明細 Dialog】</b>點主表格任一列，可看到這家店在目前篩選'
    + '範圍內的完整巡補時間軸，包含每次的日期、屬於哪個檔期第幾週；點某一'
    + '筆時間軸紀錄，還能展開看該次填寫的問卷內容（大題與選項）。若同一天'
    + '出現多筆紀錄，會用橘色徽章標示「同日多筆」，提醒這幾筆只會被算成'
    + '1 次巡補。</p>'
    + '<hr>'
    + '<p><b>【工具列按鈕】</b><br>'
    + '<b>📥 CSV</b>：下載目前篩選結果的完整表格<br>'
    + '<b>💬 LINE</b>：複製包含未達標店家清單的完整文字，可直接貼到 LINE 群組<br>'
    + '<b>✂️ 精簡</b>：只複製統計摘要數字，不列店家名稱<br>'
    + '<b>📸 截圖</b>：把目前畫面截圖直接複製到剪貼簿，貼上即可分享</p>';
}
function openManual(){
  if(!_manualBuilt){
    document.getElementById('manual-inner').innerHTML = _buildManualContent();
    _manualBuilt = true;
  }
  document.getElementById('manual-overlay').classList.add('open');
}
function closeManual(){
  document.getElementById('manual-overlay').classList.remove('open');
}

/* ════ 共用層載入防呆 ════ */
(function _checkSharedLoaded(){
  var missing = [];
  if(typeof esc !== 'function') missing.push('core-utils.js（esc）');
  if(typeof gvizParse !== 'function') missing.push('core-utils.js（gvizParse）');
  if(typeof _flashBtn !== 'function') missing.push('copy-utils.js（_flashBtn）');
  if(typeof _doCopy !== 'function') missing.push('copy-utils.js（_doCopy）');
  if(typeof _triggerCsvDownload !== 'function') missing.push('csv-export.js');
  if(typeof _captureElement !== 'function') missing.push('capture-clipboard.js');
  if(typeof updateStickyTops !== 'function') missing.push('ui-chrome.js');
  if(typeof _renderQuizSections !== 'function') missing.push('photo-viewer.js（_renderQuizSections）');
  if(missing.length){
    document.body.innerHTML = '<div style="padding:40px;font-family:sans-serif;line-height:1.8;">'
      + '<h2 style="color:#A32020;">⚠️ 共用層檔案沒有載入成功</h2>'
      + '<p>以下檔案讀不到，通常是因為 <code>shared/</code> 資料夾沒有跟 <code>patrol_board.html</code> 放在同一層目錄：</p>'
      + '<ul>' + missing.map(function(m){ return '<li>'+m+'</li>'; }).join('') + '</ul>'
      + '<pre style="background:#f0efe9;padding:12px;border-radius:8px;">你的資料夾/\n  patrol_board.html\n  shared/\n    core-utils.js\n    copy-utils.js\n    csv-export.js\n    capture-clipboard.js\n    ui-chrome.js\n    photo-viewer.js\n    dashboard-common.css</pre>'
      + '</div>';
    throw new Error('shared 層未載入：' + missing.join('、'));
  }
})();

init();
</script>
