  patrol_board.html ─ 節慶專案巡補頻次型看板
  版本：Ver. 1.0.0 ｜ 建立：2026-07-20

【這個檔案是什麼】
  單一 HTML 檔案，純前端 JS，透過 Google Sheets 的 gviz API 讀取同一份
  試算表裡的兩個分頁，在瀏覽器端組成「2026 節慶專案（中元／中秋）通路
  巡補頻次」儀表板：依店家等級判斷每週「應達巡補次數」，跟實際巡補
  次數比對，超過標準的部分拆成「超額」另計，不列入達成率。

  跟 audit_board / contract_board / coverage_board 是各自獨立的系統，
  只共用 shared/*.js 技術骨架（gviz 抓表、CSV/複製/截圖/UI Chrome），
  業務邏輯完全不共用——本檔特有的「依日期自動判斷檔期週次」「依等級
  動態算應達次數」「標準/超額格子自動觸發＋資料隔離」都是全新邏輯，
  三份舊看板都沒有，改動前不要假設跟舊看板共用計算函式。

  【與舊看板的差異，方便之後銜接／擴充時查閱】
  ‧ contract_board 的「處理層」是拿來比對「這個月這品項有沒有交」
    （二元 ✅/❌）；本檔的「處理層」是拿來算「這一週去了幾次」
    （數字，可能超過標準），計算邏輯完全不同、不可互換套用。
  ‧ 本檔沒有 contract_board 式的「處→所→人員」四層鑽層卡片，
    改用「檔期／通路／等級／區域」四組 chip 篩選（比照 alpha 版
    設計），畫面更接近 coverage_board 的單層彙整表格風格。
  ‧ 本檔沒有多專案切換（MGMT「專案管理」boardType 機制），
    SHEET_ID 直接從網址 ?sheetId= 帶入，是本次中元/中秋專用的
    單一看板（已與需求方確認，未來若要擴充尾牙/春節等其他檔期，
    可考慮比照 contract_board 加回 MGMT 切換機制，屆時 PERIODS
    常數需要改成從管理表動態載入，而不是寫死在本檔）。

────────────────────────────────────────────────────────────
【讀取的兩份資料來源（同一份 SHEET_ID 試算表裡的兩個分頁）】

  1.「店家名冊」── 母體，量販通路與全聯社（超市）通路合併一份名冊。
     欄位（表頭列文字需完全一致，程式用欄名比對，不用欄位順序）：
       營業處名稱／營業所/課／主要訪員／通路別／店家型態／店家代碼／店家名稱／店家等級
     ‧ 通路／全聯的判斷改用真實欄位值分類（畫面上仍只顯示「量販」
       「全聯」簡稱），不是直接比對整欄：
         量販：通路別＝「量販通路」
         全聯：店家型態＝「全聯社」（不看通路別欄）
       比對邏輯集中在常數區的 _chanKey() 函式，日後真實值再變動，
       改這支函式即可，不要在別處另外加比對條件。
     ‧ 店家等級：決定「每週應達巡補次數」的依據，目前支援四種值，
       對照表寫死在本檔常數 GRADE_FREQ（見下方【等級應達次數對照】），
       日後若需要新增等級或調整標準次數，直接改這個常數即可，
       不需要（也刻意不做）另外接管理表動態載入。
     ‧ 這份名冊不分檔期、不分週次——「這家店這一週該去幾次」是
       純粹由「等級」決定的固定標準，跟中元或中秋無關（兩個檔期
       共用同一套等級標準）。

  2.「處理層」── 比對資料，每一列＝一筆巡補紀錄，由 GAS（後端，
     不在本檔案範圍內）從「問卷資料(量販)」「問卷資料(全聯)」兩份
     問卷分頁整理產生，比照 contract_board 的
     extractSurveyDataToMasterRegistry() 模式。
     欄位：
       來源分頁+行數／店家代碼／通路別／執行人員／巡補日期
     ‧ 來源分頁+行數：跨分頁連結鍵（格式：分頁名稱_行數，例如
       「問卷資料量販_57」），目前本檔只用來當作明細列表的參考欄位
       顯示，沒有做到像 audit_board 那樣即時回查來源分頁抓問卷大題
       內容——如果之後要加「點一次巡補紀錄看當次完整問卷內容」，
       可以參考 audit_board.html 的 _fetchSourceSheet 機制另外接上，
       本檔目前刻意不做（節慶巡補的問卷內容通常不需要逐筆回看）。
     ‧ 巡補日期：本檔核心依據，看板依這個日期 + 下方【檔期定義】
       的起訖日，自動換算屬於哪個檔期的第幾週，處理層本身「不」
       另外存週次欄位（跟已確認的規劃一致：週次由看板端計算，
       不要求 GAS 端額外產出）。

  兩者都讀自同一個 SHEET_ID（網址參數 ?sheetId= 帶入）。

────────────────────────────────────────────────────────────
【檔期定義（寫死在常數 PERIODS，之後年度數字要改就改這裡）】
  中元專案：2026/08/08（六）– 08/28（五），共 3 週（W1、W2、W3）
  中秋專案：2026/09/14（一）– 09/27（日），共 2 週（W1、W2）
  整體視角：兩檔期合併顯示（W1–W5，中元3欄+中秋2欄）

  週次判斷邏輯：以「巡補日期－檔期起始日」的天數差，每 7 天一週，
  換算出來的週次超過該檔期總週數就視為「不屬於任何檔期」（不計入
  任何統計，例如中元檔期跑到 08/29 才去的巡補不算數）。

【等級應達次數對照（寫死在常數 GRADE_FREQ）】
  量販 A 級：每週 5 次　量販 B 級：每週 3 次　量販 C 級：每週 2 次
  全聯 連鎖超市A：每週 1 次（畫面上簡稱顯示為「超市A」，對照表見
  GRADE_LABEL，「店家名冊」裡「店家等級」欄的真實值須為「連鎖超市A」）
  （對照表已與需求方確認先寫死在 HTML 常數，不做管理表可調整設定；
   日後真的要調整，直接改 GRADE_FREQ／GRADE_LABEL 物件即可，
   不需要改動其餘邏輯）

────────────────────────────────────────────────────────────
【核心計算邏輯（自動化格子觸發＋資料隔離，比照 alpha 版規格書）】
  對每一家店、每一個顯示中的檔期週次欄位：
    1. actual = 處理層裡「店家代碼相符 ＋ 巡補日期落在該檔期該週」
       的紀錄筆數。
    2. std   = 該店等級對應的每週應達次數（GRADE_FREQ）。
    3. stdDone = min(actual, std)　→ 顯示為藍色格子，勾選 stdDone 格。
    4. extra   = max(0, actual - std)　→ 顯示為橘色格子，自動觸發，
       勾選 extra 格（最高不特別限制格數，巡補次數多就顯示多格）。
  資料隔離原則（三份都要遵守，這是本檔最容易被改壞的地方）：
    ‧ 橘色格（超額）只計入「自動觸發超額次數」統計，絕對不計入
      任何「達成率 %」的分子分母。
    ‧ 超額次數不可外溢：A 店多跑的次數不能拿來墊 B 店的未達成，
      統計時一律逐店、逐週獨立計算，最後才加總顯示範圍內的合計，
      不存在任何「跨店挪用」的計算路徑。
    ‧ 達成率 % = Σ全部顯示中欄位的 stdDone ／ Σ全部顯示中欄位的 std，
      分母用「應達次數」而非「實際次數」，超標的店不會把分母墊高、
      拖累其他店的達成率觀感。

  ‧ 進站先看「概況主畫面」（比照 alpha 版 mainDashboard 設計）：

  ‧ 上方摘要列：目前篩選範圍的 過濾店數／標準應達總次數／
    目標達成率(%)／自動觸發超額次數，四項比照 alpha 版數據摘要區。
  ‧ 篩選列（filterbar，關鍵字搜尋 + 動態列數的 chip，通路／等級因
    彼此相關併同一列以節省版面）：
      檔期：全部(W1-W5)／中元專案／中秋專案
      通路＋等級（同一列）：全部／量販店／全聯社　　全部／量販A／
        量販B／量販C／超市A
      營業處：全部／北部／桃園／臺中／嘉義／臺南／高雄／花蓮
            （順序固定＝AREA_ORDER 常數，嚴格遵循北桃中嘉南高花）
      營業所/課：選定「營業處」（非全部）後才出現，選項依實際資料
        動態產生（該營業處底下有哪些營業所就列哪些，選全部處時整列
        隱藏並重置為全部所，避免殘留篩選誤導使用者）
      關鍵字：比對店名／店代碼／主要訪員（沿用其他看板慣例，非必要
              需求，加上方便使用而已）
  ‧ 主表格：一列一家店，欄位依目前「檔期」篩選動態展開（全部＝
    5欄「中元W1~W3＋中秋W1~W2」；只選中元＝3欄；只選中秋＝2欄），
    每欄用 checkbox 呈現 stdDone(藍，靠左排列) + extra(橘，帶脈動
    發光特效)，比照 alpha 版 box-container 視覺設計；checkbox 不加
    disabled 屬性（改用 CSS pointer-events:none 擋互動），避免瀏覽器
    對 disabled 控制項套用預設灰階，確保已勾選格子顏色維持明亮。
  ‧ 點一列店家 → 開店家明細 Dialog，列出該店在目前篩選檔期範圍內
    的逐筆巡補紀錄時間軸（日期＋週次＋來源分頁+行數參考）。
  ‧ 工具列：📥CSV／💬LINE全文／✂️LINE精簡／📸截圖，皆針對「目前
    篩選後的完整結果」（不受表格是否分頁載入影響——本檔資料量
    預期不大，未做 contract_board 式的「顯示更多」分批載入）。

【已知待確認/待部署事項（非本檔程式問題，交接時務必告知後端）】
  ‧ GAS 端需要另外新增一支「處理層」產生函式（本檔案不含 GAS

    不要存成純文字字串。
  ‧ 「店家名冊」的「店家等級」欄位值務必跟 GRADE_FREQ 常數的 key
    完全一致（量販A／量販B／量販C／連鎖超市A，含全形字），否則該店
    會被判斷為「等級未知」，應達次數算 0，不會出現在達成率分母
    （畫面上會照樣列出該店但四項摘要都不會把它算進去，屬於刻意
    設計成「不要讓未知等級污染統計」，但仍要能被人工發現，故保留
    顯示、不整列隱藏——見 render() 內 _unknownGradeCount 統計）。
  ‧ 本檔預設會走跟 coverage_board.html 相同的 session 驗證
    （localStorage 'ttl_auth_v1' !== '1' 就導回 index.html），
    如果這份看板要獨立部署不經過現有登入頁，把 <head> 裡那段
    <script> 拿掉即可。

<style>

/* ── loading ── */

.loading.show { display:flex; }

/* ── toolbar ── */
.toolbar { background:#fff; border-bottom:1px solid var(--border); padding:0 20px; height:52px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:50; }

.tb-act-btn.done { border-color:var(--green); color:var(--green); background:var(--green-bg); }

/* ── summary row ── */
.summary-row { padding:14px 20px 0; display:flex; gap:12px; flex-wrap:wrap; }

<script>
window._STICKY_IDS = ['filterbar'];

/* ════ 常數 ════ */
var params    = new URLSearchParams(location.search);
var SHEET_ID  = params.get('sheetId') || '';
var PROJ_NAME = '2026 節慶巡補看板';

var POP_SHEET  = '店家名冊';
var PROC_SHEET = '處理層';
var SYNC_SHEET = '輔助';
var SYNC_CELL  = 'B1';

/* 母體（店家名冊）欄名 */
var P_AREA='營業處名稱', P_OFFICE='營業所/課', P_STAFF='主要訪員', P_CHANNEL='通路別',
    P_STORETYPE='店家型態', P_CODE='店家代碼', P_STORENAME='店家名稱', P_GRADE='店家等級';
/* 處理層欄名 */
var R_CODE='店家代碼', R_DATE='巡補日期', R_SOURCEREF='來源分頁+行數';

/* 檔期定義：起始日 + 週數。之後年度數字要改就改這裡，不用動下方邏輯 */
var PERIODS = [
  { key:'zhong', label:'中元專案', y:2026, mo:8, d:8,  weeks:3 },
  { key:'mid',   label:'中秋專案', y:2026, mo:9, d:14, weeks:2 }
];
/* 等級 → 每週應達次數（已與需求方確認先寫死，不做管理表）
   key 必須跟「店家名冊」的「店家等級」欄位真實值完全一致（含全形字） */
var GRADE_FREQ = { '量販A':5, '量販B':3, '量販C':2, '連鎖超市A':1 };
/* 等級的畫面簡稱（真實值較長時，畫面上仍顯示簡稱，不影響比對邏輯） */
var GRADE_LABEL = { '量販A':'量販A', '量販B':'量販B', '量販C':'量販C', '連鎖超市A':'超市A' };
var AREA_ORDER = ['北部','桃園','臺中','嘉義','臺南','高雄','花蓮'];

/* 通路判斷（依真實欄位值分類為「量販」／「全聯」兩種內部簡稱 key，
   畫面上的 chip／badge 一律顯示簡稱，篩選比對則一律用這個 key）：
   ‧ 通路別＝「量販通路」→ 判定為量販
   ‧ 店家型態＝「全聯社」→ 判定為全聯（不看通路別欄，避免全聯的通路別
     欄值寫法不一致時漏判） */
function _chanKey(channelVal, storeTypeVal){
  if(channelVal === '量販通路') return '量販';
  if(storeTypeVal === '全聯社') return '全聯';
  return '';
}

var STORE_ROWS  = [];   /* 店家名冊，含 __visits 索引 */
var VISIT_ROWS  = [];   /* 處理層原始列（供明細 Dialog 用） */
var VISIT_INDEX = {};   /* key: code → [{period,week,y,mo,d,ref}, ...]（新到舊） */

var FILTER = { period:'全部', channel:'全部', grade:'全部', area:'全部', office:'全部', keyword:'' };

function showLoading(){ document.getElementById('loading').classList.add('show'); }
function hideLoading(){ document.getElementById('loading').classList.remove('show'); }

/* ════ 初始化 ════ */
function init(){
  document.getElementById('tb-title').textContent = PROJ_NAME;
  document.getElementById('ov-title').textContent = PROJ_NAME;
  document.title = PROJ_NAME;
  if(!SHEET_ID){
    hideLoading();
    document.getElementById('empty-msg').style.display = 'block';
    document.getElementById('empty-msg').textContent = '⚠️ 缺少 sheetId 參數';
    return;
  }
  buildFilterUI();
  showLoading();
  fetchPopulation(function(){
    fetchProcessLayer(function(){
      hideLoading();
      renderOverview(); /* 先進概況主畫面，不直接跳明細 */
    });
  });
  fetchSyncTime();
}

/* ════ 讀「店家名冊」════ */
function fetchPopulation(callback){
  var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
    '/gviz/tq?tqx=out:json&headers=1&sheet=' + encodeURIComponent(POP_SHEET);
  fetch(url).then(function(r){ return r.text(); }).then(function(txt){
    var json = gvizParse(txt);
    var tbl = json.table || {};
    var cols = (tbl.cols||[]).map(function(c){ return c.label||''; });
    STORE_ROWS = (tbl.rows||[]).map(function(row){
      var obj = {};
      (row.c||[]).forEach(function(cell,i){
        var colName = cols[i];
        if(!colName) return;
        if(!cell){ obj[colName]=''; return; }
        var v = (cell.v!==null && cell.v!==undefined) ? cell.v : '';
        obj[colName] = (v!=='' && v!==null && v!==undefined) ? v : (cell.f||'');
      });
      var channelVal = String(obj[P_CHANNEL]||'').trim();
      var storeTypeVal = String(obj[P_STORETYPE]||'').trim();
      return {
        area: String(obj[P_AREA]||'').trim(),
        office: String(obj[P_OFFICE]||'').trim(),
        channel: channelVal,
        storeType: storeTypeVal,
        chanKey: _chanKey(channelVal, storeTypeVal),
        storeName: String(obj[P_STORENAME]||'').trim(),
        code: String(obj[P_CODE]||'').trim(),
        grade: String(obj[P_GRADE]||'').trim(),
        staff: String(obj[P_STAFF]||'').trim()
      };
    }).filter(function(r){ return r.code; });
  }).catch(function(err){
    STORE_ROWS = [];
    document.getElementById('empty-msg').style.display = 'block';
    document.getElementById('empty-msg').textContent = '⚠️ 店家名冊載入失敗：'+err;
    var ov = document.getElementById('ov-cards');
    if(ov) ov.innerHTML = '<div class="ov-empty">⚠️ 店家名冊載入失敗：'+esc(String(err))+'</div>';
  }).then(function(){ callback(); });
}

/* ════ 日期解析／檔期週次判斷（核心邏輯，已獨立單元測試過，改動請對照
   logic-test.js 的測試案例重新驗證，不要憑感覺改） ════ */
function _cellDateParts(cell){
  if(!cell) return null;
  var v = cell.v;
  if(typeof v === 'string'){
    var m = v.match(/Date\((\d+),(\d+),(\d+)/);
    if(m) return { y:+m[1], mo:+m[2]+1, d:+m[3] };
  }
  var f = cell.f || '';
  var m2 = String(f).match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if(m2) return { y:+m2[1], mo:+m2[2], d:+m2[3] };
  return null;
}
function _toEpochDay(y,mo,d){ return Math.floor(Date.UTC(y, mo-1, d) / 86400000); }
function _classifyParts(parts){
  if(!parts) return null;
  var day = _toEpochDay(parts.y, parts.mo, parts.d);
  for(var i=0;i<PERIODS.length;i++){
    var p = PERIODS[i];
    var start = _toEpochDay(p.y,p.mo,p.d);
    var diff = day - start;
    if(diff < 0) continue;
    var week = Math.floor(diff/7) + 1;
    if(week <= p.weeks) return { period:p.key, week:week };
  }
  return null;
}
function _fmtParts(parts){
  if(!parts) return '';
  var pad = function(n){ return String(n).padStart(2,'0'); };
  return parts.y+'/'+pad(parts.mo)+'/'+pad(parts.d);
}
/* 依檔期起始日＋週次，換算該週的日期區間，顯示成 MM/DD-DD（跨月則 MM/DD-MM/DD） */
function _epochDayToParts(day){
  var d = new Date(day*86400000);
  return { y:d.getUTCFullYear(), mo:d.getUTCMonth()+1, d:d.getUTCDate() };
}
function _weekDateRange(periodKey, week){
  var p = PERIODS.filter(function(pp){ return pp.key===periodKey; })[0];
  if(!p) return '';
  var pad = function(n){ return String(n).padStart(2,'0'); };
  var startDay = _toEpochDay(p.y,p.mo,p.d) + (week-1)*7;
  var sp = _epochDayToParts(startDay);
  var ep = _epochDayToParts(startDay+6);
  return sp.mo===ep.mo
    ? pad(sp.mo)+'/'+pad(sp.d)+'-'+pad(ep.d)
    : pad(sp.mo)+'/'+pad(sp.d)+'-'+pad(ep.mo)+'/'+pad(ep.d);
}
/* 今天的日期（台北時區，僅取年月日），用來判斷某檔期週次是否已經「完全過去」
   （週的最後一天都已經過了，才算過去週；當週進行中不算，不應誤判為未達成） */
function _todayEpochDay(){
  var s = new Date().toLocaleDateString('en-CA', { timeZone:'Asia/Taipei' }); /* 'YYYY-MM-DD' */
  var parts = s.split('-');
  return _toEpochDay(+parts[0], +parts[1], +parts[2]);
}
function _isWeekPast(periodKey, week){
  var p = PERIODS.filter(function(pp){ return pp.key===periodKey; })[0];
  if(!p) return false;
  var weekEndDay = _toEpochDay(p.y,p.mo,p.d) + week*7 - 1;
  return _todayEpochDay() > weekEndDay;
}

/* ════ 讀「處理層」════ */
function fetchProcessLayer(callback){
  var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
    '/gviz/tq?tqx=out:json&headers=1&sheet=' + encodeURIComponent(PROC_SHEET);
  fetch(url).then(function(r){ return r.text(); }).then(function(txt){
    var json = gvizParse(txt);
    var tbl = json.table || {};
    var cols = (tbl.cols||[]).map(function(c){ return c.label||''; });
    var idxCode = cols.indexOf(R_CODE), idxDate = cols.indexOf(R_DATE), idxRef = cols.indexOf(R_SOURCEREF);
    function cv(c){ return (c && (c.v!=null ? c.v : c.f)) || ''; }
    var index = {};
    var rows = [];
    (tbl.rows||[]).forEach(function(row){
      var c = row.c || [];
      var code = String(cv(c[idxCode])).trim();
      var parts = _cellDateParts(c[idxDate]);
      var cls = _classifyParts(parts);
      if(!code || !cls) return; /* 不屬於任何已定義檔期週次的紀錄，不計入統計 */
      var ref = idxRef!==-1 ? String(cv(c[idxRef])).trim() : '';
      var rec = { code:code, period:cls.period, week:cls.week, parts:parts, ref:ref };
      rows.push(rec);
      if(!index[code]) index[code] = [];
      index[code].push(rec);
    });
    Object.keys(index).forEach(function(code){
      index[code].sort(function(a,b){
        var da=_toEpochDay(a.parts.y,a.parts.mo,a.parts.d), db=_toEpochDay(b.parts.y,b.parts.mo,b.parts.d);
        return db-da; /* 新到舊 */
      });
    });
    VISIT_ROWS = rows;
    VISIT_INDEX = index;
  }).catch(function(){ VISIT_ROWS = []; VISIT_INDEX = {}; }).then(function(){ callback(); });
}

/* ════ 概況主畫面（戰情室）：中元/中秋 × 量販/全聯 四張卡片 ════ */
function _periodColumns(periodKey){
  var p = PERIODS.filter(function(pp){ return pp.key===periodKey; })[0];
  if(!p) return [];
  var cols = [];
  for(var w=1; w<=p.weeks; w++) cols.push({ period:p.key, week:w });
  return cols;
}
function _statsFor(storesSubset, cols){
  var totalExp=0, totalStdDone=0;
  var byGrade = {}; /* grade → {count, exp, stdDone, weeks:{week:{exp,stdDone}}} */
  storesSubset.forEach(function(s){
    var std = GRADE_FREQ[s.grade];
    if(std===undefined) return; /* 等級未知不計入概況統計，跟主表邏輯一致 */
    if(!byGrade[s.grade]) byGrade[s.grade] = { count:0, exp:0, stdDone:0, weeks:{} };
    var g = byGrade[s.grade];
    g.count++;
    cols.forEach(function(c){
      var actual = _actualCount(s.code, c.period, c.week);
      var exp = std, stdDone = Math.min(actual, std);
      g.exp += exp; g.stdDone += stdDone;
      if(!g.weeks[c.week]) g.weeks[c.week] = { exp:0, stdDone:0 };
      g.weeks[c.week].exp += exp; g.weeks[c.week].stdDone += stdDone;
      totalExp += exp; totalStdDone += stdDone;
    });
  });
  return { rate: totalExp>0 ? (totalStdDone/totalExp*100) : 0, totalExp:totalExp, byGrade:byGrade };
}
function renderOverview(){
  var wrap = document.getElementById('ov-cards');
  if(!wrap) return;
  var cardsHtml = PERIODS.map(function(p){
    var icon = p.key==='zhong' ? '🏮' : '🎑';
    var cols = _periodColumns(p.key);
    var weekNums = cols.map(function(c){ return c.week; });
    return ['量販','全聯'].map(function(chanKey){
      var subset = STORE_ROWS.filter(function(s){ return s.chanKey===chanKey; });
      var stat = _statsFor(subset, cols);
      var gradeKeys = Object.keys(stat.byGrade).sort(function(a,b){
        return (GRADE_FREQ[b]||0) - (GRADE_FREQ[a]||0);
      });
      var body = gradeKeys.length ? (
        '<table class="ov-mini"><tr><th>等級</th><th>店數</th>'
        + weekNums.map(function(w){ return '<th>W'+w+'</th>'; }).join('')
        + '<th>達成率%</th></tr>'
        + gradeKeys.map(function(g){
            var gd = stat.byGrade[g];
            var r = gd.exp>0 ? (gd.stdDone/gd.exp*100).toFixed(1) : '0.0';
            var label = (GRADE_LABEL[g]||g) + '（' + GRADE_FREQ[g] + '）';
            var weekCells = weekNums.map(function(w){
              var wd = gd.weeks[w] || { exp:0, stdDone:0 };
              var wr = wd.exp>0 ? (wd.stdDone/wd.exp*100).toFixed(0) : '0';
              return '<td>'+wr+'%</td>';
            }).join('');
            return '<tr><td>'+esc(label)+'</td><td>'+gd.count+'</td>'+weekCells
              + '<td style="color:var(--green);font-weight:700;">'+r+'%</td></tr>';
          }).join('')
        + '</table>'
      ) : '<div class="ov-empty">目前沒有符合資料</div>';
      return '<div class="ov-card" onclick="openDetailFromOverview(\''+p.key+'\',\''+chanKey+'\')">'
        + '<h2><span>'+icon+' '+esc(p.label)+' - '+(chanKey==='量販'?'量販通路':'全聯通路')+'</span>'
        + '<span class="ov-perc">'+stat.rate.toFixed(1)+'%</span></h2>'
        + body + '</div>';
    }).join('');
  }).join('');
  wrap.innerHTML = cardsHtml;
}

function activeColumns(){
  var cols = [];
  PERIODS.forEach(function(p){
    if(FILTER.period!=='全部' && FILTER.period!==p.key) return;
    for(var w=1; w<=p.weeks; w++){
      cols.push({ period:p.key, week:w, label:(FILTER.period==='全部'?p.label.replace('專案',''):'') + ' W'+w });
    }
  });
  return cols;
}

/* ════ 單店在指定欄位上的實際次數 ════ */
function _actualCount(code, period, week){
  var list = VISIT_INDEX[code];
  if(!list) return 0;
  var n = 0;
  for(var i=0;i<list.length;i++){ if(list[i].period===period && list[i].week===week) n++; }
  return n;
}

/* ════ 篩選店家清單 ════ */
function getFilteredStores(){
  var kw = (FILTER.keyword||'').toLowerCase();
  return STORE_ROWS.filter(function(r){
    if(FILTER.channel!=='全部' && r.chanKey!==FILTER.channel) return false;
    if(FILTER.grade!=='全部' && r.grade!==FILTER.grade) return false;
    if(FILTER.area!=='全部' && r.area!==FILTER.area) return false;
    if(FILTER.office!=='全部' && r.office!==FILTER.office) return false;
    if(kw){
      var hay = (r.storeName+' '+r.code+' '+r.staff).toLowerCase();
      if(hay.indexOf(kw)===-1) return false;
    }
    return true;
  }).sort(function(a,b){
    var cols=['area','office','chanKey','code'];
    for(var i=0;i<cols.length;i++){
      var va=String(a[cols[i]]||''), vb=String(b[cols[i]]||'');
      if(va!==vb) return va>vb?1:-1;
    }
    return 0;
  });
}

/* ════ 渲染 ════ */
function render(){
  var stores = getFilteredStores();
  var cols = activeColumns();

  /* 依「期」把連續欄位分組（中元 W1~W3 一組／中秋 W1~W2 一組），
     用來畫出跨欄的檔期分組表頭 + 組間強分隔線；同檔期內週與週之間也加上
     較細的分隔線，強化不同檔期／不同週次的視覺區隔 */
  var periodLabelMap = {}; PERIODS.forEach(function(p){ periodLabelMap[p.key] = p.label.replace('專案',''); });
  var colGroups = [];
  var colMeta = [];
  cols.forEach(function(c, idx){
    var last = colGroups[colGroups.length-1];
    var isNewGroup = !last || last.period!==c.period;
    if(isNewGroup){ colGroups.push({ period:c.period, count:1 }); }
    else { last.count++; }
    var isGroupDivider = isNewGroup && colGroups.length>1; /* 檔期交界：粗分隔線，表格最左欄不畫 */
    var isWeekDivider = idx>0 && !isGroupDivider; /* 同檔期內週與週交界：細分隔線 */
    colMeta.push({
      isGroupDivider: isGroupDivider,
      isWeekDivider: isWeekDivider,
      periodCls: c.period==='zhong' ? 'pg-zhong' : 'pg-mid',
      dateRange: _weekDateRange(c.period, c.week),
      isPastWeek: _isWeekPast(c.period, c.week)
    });
  });

  var head = document.getElementById('tbl-head');
  var headHtml = '<tr><th class="th-left">區域</th><th class="th-left">店家</th><th>通路</th><th>等級</th><th>主要訪員</th><th>次數合計</th>';
  cols.forEach(function(c, idx){
    var m = colMeta[idx];
    var dividerCls = m.isGroupDivider ? ' pg-divider' : (m.isWeekDivider ? ' wk-divider' : '');
    headHtml += '<th class="'+m.periodCls+dividerCls+'"><div class="th-wk-flex">'
      + '<span class="th-period-name">'+esc(periodLabelMap[c.period]||c.period)+'</span>'
      + '<span class="th-week-label">W'+c.week+'</span>'
      + '<span class="th-date-range">'+esc(m.dateRange)+'</span>'
      + '</div></th>';
  });
  headHtml += '</tr>';
  head.innerHTML = headHtml;

  var totalExp=0, totalStdDone=0, totalExtra=0, unknownGradeCount=0;
  var body = document.getElementById('tbl-body');
  var rowsHtml = '';

  stores.forEach(function(s){
    var std = GRADE_FREQ[s.grade];
    if(std===undefined){ unknownGradeCount++; }
    var gradeLabel = GRADE_LABEL[s.grade] || s.grade;

    var colsHtml = '';
    var rowExp=0, rowStdDone=0, rowExtra=0;
    cols.forEach(function(c, idx){
      var actual = _actualCount(s.code, c.period, c.week);
      var stdN = std===undefined ? 0 : std;
      var stdDone = Math.min(actual, stdN);
      var extra = Math.max(0, actual - stdN);
      if(std!==undefined){ totalExp += stdN; totalStdDone += stdDone; totalExtra += extra; rowExp += stdN; rowStdDone += stdDone; rowExtra += extra; }
      var m = colMeta[idx];
      var dividerCls = m.isGroupDivider ? ' pg-divider' : (m.isWeekDivider ? ' wk-divider' : '');
      colsHtml += '<td class="'+m.periodCls+dividerCls+'"><div class="box-container">';
      for(var i=1;i<=stdN;i++){
        if(actual>=i){ colsHtml += '<input type="checkbox" class="std-check" checked>'; }
        else if(m.isPastWeek){ colsHtml += '<span class="miss-mark" title="過去週未達成">✖</span>'; }
        else { colsHtml += '<input type="checkbox" class="std-check">'; }
      }
      for(var j=1;j<=extra;j++){ colsHtml += '<input type="checkbox" class="extra-check" checked>'; }
      colsHtml += '</div></td>';
    });
    var sumHtml = '<div class="sum-cell"><div class="sum-main">達標 '+rowStdDone+'/'+rowExp+'</div>'
      + (rowExtra>0 ? '<div class="sum-extra-badge">超額 +'+rowExtra+'</div>' : '')
      + '</div>';

    var row = '<tr onclick="openStoreDetail(\''+esc(s.code)+'\')">'
      + '<td class="td-left">'+esc(s.area)+' '+esc(s.office)+'</td>'
      + '<td class="td-left"><div class="td-name">'+esc(s.storeName)+'</div><div class="td-code">'+esc(s.code)+'</div></td>'
      + '<td>'+esc(s.storeType||'—')+'</td>'
      + '<td class="grade-tag">'+(std===undefined?'<span class="unknown-grade">'+esc(s.grade||'未設定')+' ⚠️</span>':esc(gradeLabel))+'</td>'
      + '<td>'+esc(s.staff)+'</td>'
      + '<td class="sum-col">'+sumHtml+'</td>'
      + colsHtml;
    row += '</tr>';
    rowsHtml += row;
  });

  body.innerHTML = rowsHtml;
  document.getElementById('empty-msg').style.display = stores.length ? 'none' : 'block';

  document.getElementById('stat-store-count').textContent = stores.length;
  document.getElementById('stat-exp-visits').textContent = totalExp;
  var rate = totalExp>0 ? (totalStdDone/totalExp*100).toFixed(1) : '0.0';
  document.getElementById('stat-rate').textContent = rate+'%';
  document.getElementById('stat-extra').textContent = totalExtra;

  var noteEl = document.querySelector('.sum-card.extra .sc-val-note');
  if(unknownGradeCount>0){
    noteEl.style.display = 'block';
    noteEl.textContent = '⚠️ '+unknownGradeCount+' 家店等級未對照到標準，未列入應達次數與達成率';
    noteEl.style.fontSize = '11px'; noteEl.style.fontWeight = '600'; noteEl.style.color = 'var(--red)'; noteEl.style.marginTop='6px';
  } else {
    noteEl.style.display = 'none';
  }

  updateStickyTops();
}

/* ════ CSV／LINE／截圖 ════ */
function _summaryForShare(){
  var stores = getFilteredStores();
  var cols = activeColumns();
  var totalExp=0, totalStdDone=0, totalExtra=0;
  var perStore = stores.map(function(s){
    var std = GRADE_FREQ[s.grade];
    var stdN = std===undefined?0:std;
    var exp=0, stdDone=0, extra=0;
    cols.forEach(function(c){
      var actual = _actualCount(s.code, c.period, c.week);
      exp += stdN; stdDone += Math.min(actual,stdN); extra += Math.max(0,actual-stdN);
    });
    if(std!==undefined){ totalExp+=exp; totalStdDone+=stdDone; totalExtra+=extra; }
    return { store:s, exp:exp, stdDone:stdDone, extra:extra, rate: exp>0?(stdDone/exp*100):0 };
  });
  return { stores:perStore, totalExp:totalExp, totalStdDone:totalStdDone, totalExtra:totalExtra,
    rate: totalExp>0 ? (totalStdDone/totalExp*100).toFixed(1) : '0.0' };
}
function buildCsvContent(){
  var data = _summaryForShare();
  var cols = activeColumns();
  var headers = ['營業處名稱','營業所/課','主要訪員','通路別','店家型態','店家代碼','店家名稱','店家等級'].concat(cols.map(function(c){return c.label.trim();})).concat(['應達合計','標準完成合計','超額合計','達成率%']);
  var rows = [headers];
  data.stores.forEach(function(item){
    var s = item.store;
    var row = [s.area, s.office, s.staff, s.channel, s.storeType, s.code, s.storeName, s.grade];
    var std = GRADE_FREQ[s.grade];
    var stdN = std===undefined?0:std;
    cols.forEach(function(c){ row.push(_actualCount(s.code, c.period, c.week)); });
    row.push(item.exp, item.stdDone, item.extra, item.rate.toFixed(1));
    rows.push(row);
  });
  return '\uFEFF'+rows.map(function(r){
    return r.map(function(c){ var s=String(c==null?'':c); return /[,"\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }).join(',');
  }).join('\n');
}

  _triggerCsvDownload(buildCsvContent(), PROJ_NAME);

  });
  lines.push('');
  lines.push('📅 '+new Date().toLocaleString('zh-TW',{timeZone:'Asia/Taipei'}));
  _doCopy(lines.join('\n'), btn);
}
function toolbarCopyLineBrief(){
  var btn = document.getElementById('tb-btn-line-brief');
  var data = _summaryForShare();
  if(!data.stores.length){ _flashBtn(btn,'⚠️ 無資料'); return; }
  var text = '【'+PROJ_NAME+'】過濾店數 '+data.stores.length+'／應達 '+data.totalExp+'／達成率 '+data.rate+'%／超額 '+data.totalExtra;
  _doCopy(text, btn);
}
function toolbarScreenshot(){
  var btn = document.getElementById('tb-btn-screenshot');
  var el = document.querySelector('.stage');
  _captureElement(el, btn, PROJ_NAME);
}

/* ════ 共用層載入防呆 ════ */
(function _checkSharedLoaded(){
  var missing = [];
  if(typeof esc !== 'function') missing.push('core-utils.js（esc）');
  if(typeof gvizParse !== 'function') missing.push('core-utils.js（gvizParse）');
  if(typeof _flashBtn !== 'function') missing.push('copy-utils.js（_flashBtn）');
  if(typeof _doCopy !== 'function') missing.push('copy-utils.js（_doCopy）');
  if(typeof _triggerCsvDownload !== 'function') missing.push('csv-export.js');
  if(typeof _captureElement !== 'function') missing.push('capture-clipboard.js');
  if(typeof updateStickyTops !== 'function') missing.push('ui-chrome.js');
  if(missing.length){
    document.body.innerHTML = '<div style="padding:40px;font-family:sans-serif;line-height:1.8;">'
      + '<h2 style="color:#A32020;">⚠️ 共用層檔案沒有載入成功</h2>'
      + '<p>以下檔案讀不到，通常是因為 <code>shared/</code> 資料夾沒有跟 <code>patrol_board.html</code> 放在同一層目錄：</p>'
      + '<ul>' + missing.map(function(m){ return '<li>'+m+'</li>'; }).join('') + '</ul>'
      + '<pre style="background:#f0efe9;padding:12px;border-radius:8px;">你的資料夾/\n  patrol_board.html\n  shared/\n    core-utils.js\n    copy-utils.js\n    csv-export.js\n    capture-clipboard.js\n    ui-chrome.js\n    dashboard-common.css</pre>'
      + '</div>';
    throw new Error('shared 層未載入：' + missing.join('、'));
  }
})();

init();
</script>
