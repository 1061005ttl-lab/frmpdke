<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>業務王 · 戰情中心</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --c-bg: #060912;
  --c-panel: #0c1220;
  --c-card: #101828;
  --c-border: rgba(0,200,255,0.12);
  --c-border-bright: rgba(0,200,255,0.4);
  --c-cyan: #00c8ff;
  --c-cyan-dim: rgba(0,200,255,0.15);
  --c-green: #00ff9d;
  --c-green-dim: rgba(0,255,157,0.15);
  --c-yellow: #ffcc00;
  --c-yellow-dim: rgba(255,204,0,0.15);
  --c-red: #ff4060;
  --c-red-dim: rgba(255,64,96,0.15);
  --c-text: #e0eeff;
  --c-text-dim: #5a7090;
  --c-text-mid: #8aaabb;
  --font-hud: 'Orbitron', monospace;
  --font-body: 'Noto Sans TC', sans-serif;
  --glow-cyan: 0 0 20px rgba(0,200,255,0.4), 0 0 40px rgba(0,200,255,0.15);
  --glow-green: 0 0 20px rgba(0,255,157,0.4), 0 0 40px rgba(0,255,157,0.15);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--c-bg);
  color: var(--c-text);
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content:'';
  position:fixed; inset:0; z-index:0;
  background-image:
    linear-gradient(rgba(0,200,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,200,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  animation: gridPulse 8s ease-in-out infinite;
  pointer-events:none;
}
@keyframes gridPulse { 0%,100%{opacity:0.5}50%{opacity:1} }
body::after {
  content:'';
  position:fixed; inset:0; z-index:0;
  background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);
  pointer-events:none;
}

/* HUD 頂部 */
#hud-header {
  position:sticky; top:0; z-index:1000;
  background: rgba(6,9,18,0.94);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--c-border-bright);
  padding: 12px 20px;
  display:flex; align-items:center; justify-content:space-between; gap:12px;
}
#hud-header::after {
  content:'';
  position:absolute; bottom:-1px; left:0; right:0; height:1px;
  background: linear-gradient(90deg, transparent, var(--c-cyan), transparent);
  animation: scanLine 4s linear infinite;
}
@keyframes scanLine {
  0%{transform:scaleX(0);transform-origin:left}
  50%{transform:scaleX(1);transform-origin:left}
  50.01%{transform:scaleX(1);transform-origin:right}
  100%{transform:scaleX(0);transform-origin:right}
}
.hud-title {
  font-family:var(--font-hud); font-size:clamp(13px,2.5vw,20px);
  font-weight:900; color:var(--c-cyan);
  text-shadow:var(--glow-cyan); letter-spacing:2px; white-space:nowrap;
}
.hud-title span { color:var(--c-text); }
.hud-meta {
  display:flex; align-items:center; gap:14px;
  font-size:10px; color:var(--c-text-dim); font-family:var(--font-hud); letter-spacing:1px;
}
.hud-clock { color:var(--c-cyan); font-size:12px; }
.hud-dot { width:7px; height:7px; border-radius:50%; background:var(--c-green); box-shadow:0 0 8px var(--c-green); animation:blink 2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:0.3} }

/* App */
#app { position:relative; z-index:1; max-width:1400px; margin:0 auto; padding:20px 16px 40px; }

/* KPI */
#kpi-bar { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px; }
@media(max-width:640px){ #kpi-bar{grid-template-columns:repeat(2,1fr)} }
.kpi-card {
  background:var(--c-panel); border:1px solid var(--c-border); border-radius:12px;
  padding:16px; position:relative; overflow:hidden; transition:all 0.2s;
}
.kpi-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
.kpi-card.kpi-total::before { background:linear-gradient(90deg,var(--c-cyan),transparent); }
.kpi-card.kpi-listed::before { background:linear-gradient(90deg,var(--c-green),transparent); }
.kpi-card.kpi-unlisted::before { background:linear-gradient(90deg,var(--c-yellow),transparent); }
.kpi-card.kpi-unfilled::before { background:linear-gradient(90deg,var(--c-red),transparent); }
.kpi-card:hover { transform:translateY(-2px); border-color:var(--c-border-bright); }
.kpi-label { font-size:9px; font-family:var(--font-hud); letter-spacing:2px; color:var(--c-text-dim); margin-bottom:8px; }
.kpi-value { font-family:var(--font-hud); font-size:clamp(22px,4vw,34px); font-weight:900; line-height:1; margin-bottom:4px; }
.kpi-card.kpi-total .kpi-value { color:var(--c-cyan); text-shadow:var(--glow-cyan); }
.kpi-card.kpi-listed .kpi-value { color:var(--c-green); text-shadow:var(--glow-green); }
.kpi-card.kpi-unlisted .kpi-value { color:var(--c-yellow); }
.kpi-card.kpi-unfilled .kpi-value { color:var(--c-red); }
.kpi-pct { font-size:10px; color:var(--c-text-mid); }
.kpi-bar-fill { position:absolute; bottom:0; left:0; height:3px; transition:width 1.2s cubic-bezier(0.4,0,0.2,1); }
.kpi-card.kpi-listed .kpi-bar-fill { background:var(--c-green); box-shadow:0 0 8px var(--c-green); }
.kpi-card.kpi-unlisted .kpi-bar-fill { background:var(--c-yellow); }
.kpi-card.kpi-unfilled .kpi-bar-fill { background:var(--c-red); }

/* 總進度條 */
#overall-progress {
  background:var(--c-panel); border:1px solid var(--c-border);
  border-radius:12px; padding:16px 20px; margin-bottom:20px;
}
.prog-label { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.prog-label-left { font-family:var(--font-hud); font-size:10px; letter-spacing:2px; color:var(--c-text-dim); }
.prog-label-right { font-family:var(--font-hud); font-size:14px; color:var(--c-cyan); }
.prog-track { height:10px; background:rgba(255,255,255,0.05); border-radius:999px; overflow:hidden; display:flex; }
.prog-seg { height:100%; transition:width 1.2s cubic-bezier(0.4,0,0.2,1); }
.prog-seg.listed { background:var(--c-green); box-shadow:0 0 8px var(--c-green); }
.prog-seg.unlisted { background:var(--c-yellow); }
.prog-seg.unfilled { background:var(--c-red); }
.prog-legend { display:flex; gap:16px; margin-top:10px; flex-wrap:wrap; }
.prog-legend-item { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--c-text-mid); }
.prog-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

/* 麵包屑 */
#breadcrumb-row { display:flex; align-items:center; gap:10px; margin-bottom:12px; flex-wrap:wrap; }
#back-btn {
  display:none; align-items:center; gap:6px;
  background:transparent; border:1px solid var(--c-border); color:var(--c-text-dim);
  padding:6px 12px; border-radius:8px; cursor:pointer;
  font-family:var(--font-hud); font-size:10px; letter-spacing:1px; transition:all 0.2s;
}
#back-btn:hover { border-color:var(--c-cyan); color:var(--c-cyan); }
#back-btn.show { display:flex; }
#breadcrumb { display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
.bc-item {
  font-family:var(--font-hud); font-size:10px; color:var(--c-text-dim);
  letter-spacing:1px; cursor:pointer; padding:4px 8px; border-radius:6px;
  border:1px solid transparent; transition:all 0.2s;
}
.bc-item:hover { color:var(--c-cyan); border-color:var(--c-border-bright); }
.bc-item.active { color:var(--c-cyan); }
.bc-sep { color:var(--c-text-dim); font-size:12px; }

/* 篩選 chips */
#filter-bar { display:flex; align-items:center; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
.filter-chip {
  display:flex; align-items:center; gap:5px; padding:5px 12px; border-radius:999px;
  border:1px solid; cursor:pointer; font-size:11px; font-family:var(--font-hud);
  letter-spacing:1px; transition:all 0.2s; user-select:none; opacity:0.4;
}
.filter-chip.on { opacity:1; }
.filter-chip.chip-l { border-color:rgba(0,255,157,0.4); color:var(--c-green); background:rgba(0,255,157,0.06); }
.filter-chip.chip-l.on { background:rgba(0,255,157,0.15); box-shadow:0 0 12px rgba(0,255,157,0.2); }
.filter-chip.chip-n { border-color:rgba(255,204,0,0.4); color:var(--c-yellow); background:rgba(255,204,0,0.06); }
.filter-chip.chip-n.on { background:rgba(255,204,0,0.15); }
.filter-chip.chip-u { border-color:rgba(255,64,96,0.4); color:var(--c-red); background:rgba(255,64,96,0.06); }
.filter-chip.chip-u.on { background:rgba(255,64,96,0.15); }
.chip-dot { width:6px; height:6px; border-radius:50%; background:currentColor; }

/* Section header */
.section-header { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
.section-title { font-family:var(--font-hud); font-size:11px; letter-spacing:3px; color:var(--c-text-dim); white-space:nowrap; }
.section-line { flex:1; height:1px; background:linear-gradient(90deg,var(--c-border-bright),transparent); }
.section-count { font-family:var(--font-hud); font-size:10px; color:var(--c-text-dim); white-space:nowrap; }

/* 第一層：營業處卡片 */
.area-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:14px; }
.area-card {
  background:var(--c-panel); border:1px solid var(--c-border); border-radius:14px;
  padding:18px; cursor:pointer; transition:all 0.25s; position:relative; overflow:hidden;
}
.area-card::after {
  content:''; position:absolute; inset:0; border-radius:14px;
  background:radial-gradient(circle at 50% 0%,rgba(0,200,255,0.07),transparent 70%);
  opacity:0; transition:opacity 0.3s;
}
.area-card:hover { transform:translateY(-3px); border-color:var(--c-border-bright); box-shadow:0 8px 32px rgba(0,200,255,0.1); }
.area-card:hover::after { opacity:1; }
.area-card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
.area-card-name { font-size:15px; font-weight:700; color:var(--c-text); }
.area-card-total { font-family:var(--font-hud); font-size:22px; font-weight:900; color:var(--c-cyan); text-shadow:var(--glow-cyan); line-height:1; }
.area-card-total-label { font-size:9px; color:var(--c-text-dim); text-align:right; font-family:var(--font-hud); letter-spacing:1px; }
.mini-prog { height:6px; background:rgba(255,255,255,0.05); border-radius:999px; overflow:hidden; display:flex; margin-bottom:10px; }
.mini-seg { height:100%; transition:width 1s cubic-bezier(0.4,0,0.2,1); }
.mini-seg.l { background:var(--c-green); }
.mini-seg.n { background:var(--c-yellow); }
.mini-seg.u { background:var(--c-red); }
.area-card-stats { display:flex; gap:12px; }
.area-stat { display:flex; align-items:center; gap:4px; font-size:12px; }
.area-stat-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.area-stat-num { font-family:var(--font-hud); font-size:13px; font-weight:700; }
.area-card-arrow { position:absolute; right:14px; bottom:14px; font-family:var(--font-hud); font-size:10px; color:var(--c-text-dim); letter-spacing:1px; transition:all 0.2s; }
.area-card:hover .area-card-arrow { color:var(--c-cyan); transform:translateX(4px); }

/* 第二層：營業所列表 */
.office-list { display:flex; flex-direction:column; gap:10px; }
.office-row {
  background:var(--c-panel); border:1px solid var(--c-border); border-radius:12px;
  padding:14px 18px; cursor:pointer; transition:all 0.2s;
  display:flex; align-items:center; gap:14px;
}
.office-row:hover { border-color:var(--c-border-bright); background:var(--c-card); transform:translateX(4px); }
.office-name { font-size:14px; font-weight:500; min-width:90px; color:var(--c-text); }
.office-prog-wrap { flex:1; }
.office-prog-track { height:8px; background:rgba(255,255,255,0.05); border-radius:999px; overflow:hidden; display:flex; margin-bottom:4px; }
.office-prog-nums { display:flex; gap:10px; }
.office-prog-num { font-family:var(--font-hud); font-size:10px; display:flex; align-items:center; gap:3px; }
.office-num-dot { width:5px; height:5px; border-radius:50%; display:inline-block; }
.office-total { font-family:var(--font-hud); font-size:18px; font-weight:700; color:var(--c-cyan); min-width:36px; text-align:right; }
.office-arrow { font-size:16px; color:var(--c-text-dim); transition:all 0.2s; flex-shrink:0; }
.office-row:hover .office-arrow { color:var(--c-cyan); transform:translateX(3px); }

/* 第三層：人員卡片 */
.staff-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:14px; }
.staff-card {
  background:var(--c-panel); border:1px solid var(--c-border); border-radius:14px;
  overflow:hidden; transition:all 0.25s;
}
.staff-card:hover { border-color:var(--c-border-bright); box-shadow:0 6px 24px rgba(0,200,255,0.1); transform:translateY(-2px); }
.staff-card-header {
  padding:16px 16px 12px; display:flex; align-items:center; gap:12px;
  border-bottom:1px solid var(--c-border); cursor:pointer;
}
.staff-avatar {
  width:40px; height:40px; border-radius:50%;
  background:var(--c-card); border:2px solid var(--c-border-bright);
  display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0;
}
.staff-info { flex:1; min-width:0; }
.staff-name { font-size:14px; font-weight:700; color:var(--c-text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.staff-office { font-size:10px; color:var(--c-text-dim); margin-top:2px; }
.staff-total { font-family:var(--font-hud); font-size:20px; font-weight:900; color:var(--c-cyan); text-shadow:var(--glow-cyan); }
.staff-card-body { padding:12px 16px; cursor:pointer; }
.staff-prog { height:6px; background:rgba(255,255,255,0.05); border-radius:999px; overflow:hidden; display:flex; margin-bottom:10px; }
.staff-stats { display:flex; gap:6px; flex-wrap:wrap; }
.staff-stat {
  display:flex; align-items:center; gap:3px; font-size:10px;
  background:rgba(255,255,255,0.04); padding:2px 8px; border-radius:999px;
}
.staff-stat b { font-family:var(--font-hud); font-size:11px; }
.staff-card-detail {
  display:none; border-top:1px solid var(--c-border);
  max-height:300px; overflow-y:auto;
}
.staff-card-detail.open { display:block; }
.store-item {
  display:flex; align-items:center; gap:9px; padding:9px 16px;
  border-bottom:1px solid rgba(255,255,255,0.03); transition:background 0.15s;
}
.store-item:last-child { border-bottom:none; }
.store-item:hover { background:rgba(0,200,255,0.04); }
.store-status-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.store-status-dot.l { background:var(--c-green); box-shadow:0 0 5px var(--c-green); }
.store-status-dot.n { background:var(--c-yellow); }
.store-status-dot.u { background:var(--c-red); }
.store-name { font-size:12px; color:var(--c-text); flex:1; line-height:1.3; }
.store-meta { font-size:9px; color:var(--c-text-dim); text-align:right; }
.store-code { font-family:var(--font-hud); font-size:8px; color:var(--c-text-dim); }

/* 載入畫面 */
#loading-screen {
  position:fixed; inset:0; z-index:9999; background:var(--c-bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px;
}
.loading-logo { font-family:var(--font-hud); font-size:clamp(18px,4vw,28px); font-weight:900; letter-spacing:4px; color:var(--c-cyan); text-shadow:var(--glow-cyan); animation:logoPulse 2s ease-in-out infinite; }
@keyframes logoPulse { 0%,100%{opacity:1}50%{opacity:0.6} }
.loading-bar-wrap { width:220px; height:3px; background:rgba(255,255,255,0.08); border-radius:999px; overflow:hidden; }
.loading-bar { height:100%; width:0%; background:linear-gradient(90deg,var(--c-cyan),var(--c-green)); border-radius:999px; box-shadow:var(--glow-cyan); animation:loadProg 2s cubic-bezier(0.4,0,0.2,1) forwards; }
@keyframes loadProg { to{width:100%} }
.loading-text { font-family:var(--font-hud); font-size:10px; color:var(--c-text-dim); letter-spacing:3px; }
#loading-screen.hide { animation:fadeOut 0.5s ease forwards; }
@keyframes fadeOut { to{opacity:0;pointer-events:none} }

/* 動畫 */
.fade-in { animation:fadeInUp 0.4s ease both; }
@keyframes fadeInUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.stagger>* { animation:fadeInUp 0.4s ease both; }
.stagger>*:nth-child(1){animation-delay:0s}
.stagger>*:nth-child(2){animation-delay:.05s}
.stagger>*:nth-child(3){animation-delay:.1s}
.stagger>*:nth-child(4){animation-delay:.15s}
.stagger>*:nth-child(5){animation-delay:.2s}
.stagger>*:nth-child(6){animation-delay:.25s}
.stagger>*:nth-child(7){animation-delay:.3s}
.stagger>*:nth-child(8){animation-delay:.35s}
.stagger>*:nth-child(n+9){animation-delay:.4s}

.error-state { text-align:center; padding:60px 20px; color:var(--c-red); font-family:var(--font-hud); font-size:12px; letter-spacing:2px; }

::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--c-border-bright); border-radius:2px; }

@media(max-width:480px){
  #app{padding:12px 10px 32px;}
  .area-grid,.staff-grid{grid-template-columns:1fr;}
  .hud-meta{display:none;}
}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="loading-logo">業務王 · WAR ROOM</div>
  <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
  <div class="loading-text">LOADING MISSION DATA...</div>
</div>

<header id="hud-header">
  <div class="hud-title">業務王 <span>·</span> 戰情中心</div>
  <div class="hud-meta">
    <div class="hud-dot"></div>
    <span>LIVE</span>
    <span id="hud-clock" class="hud-clock">--:--:--</span>
    <span id="hud-label" style="color:var(--c-text-dim)">特販問卷</span>
  </div>
</header>

<div id="app">
  <div id="kpi-bar">
    <div class="kpi-card kpi-total">
      <div class="kpi-label">TOTAL STORES</div>
      <div class="kpi-value" id="kpi-total">--</div>
      <div class="kpi-pct">全部店家</div>
    </div>
    <div class="kpi-card kpi-listed">
      <div class="kpi-label">LISTED ✓</div>
      <div class="kpi-value" id="kpi-listed">--</div>
      <div class="kpi-pct" id="kpi-listed-pct">上架</div>
      <div class="kpi-bar-fill" id="kfb-listed" style="width:0%"></div>
    </div>
    <div class="kpi-card kpi-unlisted">
      <div class="kpi-label">UNLISTED ●</div>
      <div class="kpi-value" id="kpi-unlisted">--</div>
      <div class="kpi-pct" id="kpi-unlisted-pct">未上架</div>
      <div class="kpi-bar-fill" id="kfb-unlisted" style="width:0%"></div>
    </div>
    <div class="kpi-card kpi-unfilled">
      <div class="kpi-label">UNFILLED ✕</div>
      <div class="kpi-value" id="kpi-unfilled">--</div>
      <div class="kpi-pct" id="kpi-unfilled-pct">未填寫</div>
      <div class="kpi-bar-fill" id="kfb-unfilled" style="width:0%"></div>
    </div>
  </div>

  <div id="overall-progress">
    <div class="prog-label">
      <span class="prog-label-left">OVERALL PROGRESS</span>
      <span class="prog-label-right" id="prog-pct">-- %</span>
    </div>
    <div class="prog-track">
      <div class="prog-seg listed" id="prog-l" style="width:0%"></div>
      <div class="prog-seg unlisted" id="prog-n" style="width:0%"></div>
      <div class="prog-seg unfilled" id="prog-u" style="width:0%"></div>
    </div>
    <div class="prog-legend">
      <div class="prog-legend-item"><div class="prog-dot" style="background:var(--c-green)"></div><span>上架</span></div>
      <div class="prog-legend-item"><div class="prog-dot" style="background:var(--c-yellow)"></div><span>未上架</span></div>
      <div class="prog-legend-item"><div class="prog-dot" style="background:var(--c-red)"></div><span>未填寫</span></div>
    </div>
  </div>

  <div id="breadcrumb-row">
    <button id="back-btn" onclick="goBack()">◀ 返回</button>
    <div id="breadcrumb"></div>
  </div>

  <div id="filter-bar">
    <div class="filter-chip chip-l on" id="chip-l" onclick="toggleChip('l')"><span class="chip-dot"></span>上架</div>
    <div class="filter-chip chip-n on" id="chip-n" onclick="toggleChip('n')"><span class="chip-dot"></span>未上架</div>
    <div class="filter-chip chip-u on" id="chip-u" onclick="toggleChip('u')"><span class="chip-dot"></span>未填寫</div>
  </div>

  <div class="section-header">
    <span class="section-title" id="section-title">AREA OVERVIEW</span>
    <div class="section-line"></div>
    <span class="section-count" id="section-count"></span>
  </div>

  <div id="content-area"></div>
</div>

<script>
var SURVEY_CONFIG = [{
  name:'特販問卷',
  spreadsheetId:'1ftAAjWsibhNFjaro5ZONFfu2Ru7CmMq9VfSUArdckLc',
  sheetName:'店家名冊'
}];
var AREA_ORDER = ['北一','北二','北三','中一','中二','南一','南二','南三','東'];

var allRows=[], allHeaders=[];
var chipState={l:true,n:true,u:true};
var drillStack=[];
var COL={};

function initCOL(){
  var MAP={
    area:['營業處名稱','營業處'],office:['營業所/課','營業所'],
    staff:['執行人員','業務員'],store:['店家名稱','店家'],
    code:['店家代碼'],channel:['通路別'],type:['店家型態'],grade:['店家等級']
  };
  Object.keys(MAP).forEach(function(k){
    COL[k]=-1;
    for(var i=0;i<MAP[k].length;i++){
      var f=allHeaders.findIndex(function(h){return h===MAP[k][i];});
      if(f>=0){COL[k]=f;return;}
    }
    for(var i=0;i<MAP[k].length;i++){
      var f=allHeaders.findIndex(function(h){return h.includes(MAP[k][i]);});
      if(f>=0){COL[k]=f;return;}
    }
  });
}

// 時鐘
setInterval(function(){
  var d=new Date(), el=document.getElementById('hud-clock');
  if(el) el.textContent=[d.getHours(),d.getMinutes(),d.getSeconds()].map(function(v){return String(v).padStart(2,'0');}).join(':');
},1000);

// 資料
function fetchSheetData(id,sheet,ok,fail){
  fetch('https://docs.google.com/spreadsheets/d/'+id+'/gviz/tq?tqx=out:json&sheet='+encodeURIComponent(sheet))
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.text();})
    .then(function(text){
      var json=JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
      var table=json.table;
      if(!table||!table.cols)throw new Error('無法讀取資料');
      var headers=table.cols.map(function(c){return c.label||'';}).filter(Boolean);
      var ui=-1,li=-1,ni=-1;
      headers.forEach(function(h,i){if(h==='未填寫')ui=i;else if(h==='上架')li=i;else if(h==='未上架')ni=i;});
      var rows=[];
      (table.rows||[]).forEach(function(row){
        var vals=(row.c||[]).map(function(c){return c&&c.v!=null?String(c.v):'';});
        if(vals.every(function(v){return!v.trim();}))return;
        var st='u';
        if(ui>=0&&vals[ui]&&vals[ui].trim()==='1')st='u';
        else if(ni>=0&&vals[ni]&&vals[ni].trim()==='1')st='n';
        else if(li>=0&&vals[li]&&vals[li].trim()==='1')st='l';
        vals.push(st); rows.push(vals);
      });
      var keep=[];
      headers.forEach(function(h,i){if(h!=='未填寫'&&h!=='上架'&&h!=='未上架')keep.push(i);});
      ok({headers:keep.map(function(i){return headers[i];}),rows:rows.map(function(r){var st=r[r.length-1];var f=keep.map(function(i){return r[i]||'';});f.push(st);return f;})});
    })
    .catch(function(e){fail(e.message||String(e));});
}

function stats(rows){var s={total:0,l:0,n:0,u:0};rows.forEach(function(r){var st=r[r.length-1];s.total++;s[st]++;});return s;}
function pct(a,b){return b>0?a/b*100:0;}

function updateKPI(rows){
  var s=stats(rows);
  function anim(id,val){
    var el=document.getElementById(id);if(!el)return;
    var t0=null,dur=800;
    function step(ts){if(!t0)t0=ts;var p=Math.min((ts-t0)/dur,1),e=1-Math.pow(1-p,3);el.textContent=Math.round(val*e);if(p<1)requestAnimationFrame(step);}
    requestAnimationFrame(step);
  }
  anim('kpi-total',s.total);anim('kpi-listed',s.l);anim('kpi-unlisted',s.n);anim('kpi-unfilled',s.u);
  document.getElementById('kpi-listed-pct').textContent=Math.round(pct(s.l,s.total))+'% 上架';
  document.getElementById('kpi-unlisted-pct').textContent=Math.round(pct(s.n,s.total))+'% 未上架';
  document.getElementById('kpi-unfilled-pct').textContent=Math.round(pct(s.u,s.total))+'% 未填寫';
  document.getElementById('prog-pct').textContent=Math.round(pct(s.l,s.total))+' %';
  setTimeout(function(){
    document.getElementById('kfb-listed').style.width=pct(s.l,s.total)+'%';
    document.getElementById('kfb-unlisted').style.width=pct(s.n,s.total)+'%';
    document.getElementById('kfb-unfilled').style.width=pct(s.u,s.total)+'%';
    document.getElementById('prog-l').style.width=pct(s.l,s.total)+'%';
    document.getElementById('prog-n').style.width=pct(s.n,s.total)+'%';
    document.getElementById('prog-u').style.width=pct(s.u,s.total)+'%';
  },100);
}

function updateBreadcrumb(){
  var parts=[{label:'全部營業處',fn:"drillTo('root')"}];
  drillStack.forEach(function(d){
    if(d.type==='area')parts.push({label:d.name,fn:"drillTo('area','"+d.name.replace(/'/g,"\\'")+"')"});
    else if(d.type==='office')parts.push({label:d.name,fn:null});
  });
  document.getElementById('breadcrumb').innerHTML=parts.map(function(p,i){
    var last=i===parts.length-1;
    return '<span class="bc-item'+(last?' active':'')+'"'+(p.fn&&!last?' onclick="'+p.fn+'"':'')+'>'+p.label+'</span>'+(last?'':'<span class="bc-sep">›</span>');
  }).join('');
  var btn=document.getElementById('back-btn');
  drillStack.length>0?btn.classList.add('show'):btn.classList.remove('show');
}

function drillTo(type,name){
  if(type==='root')drillStack=[];
  else if(type==='area')drillStack=[{type:'area',name:name}];
  else if(type==='office'){var last=drillStack[drillStack.length-1];if(last&&last.type==='area')drillStack=[{type:'area',name:last.name},{type:'office',name:name,area:last.name}];}
  updateBreadcrumb();renderContent();
}
function goBack(){drillStack.pop();updateBreadcrumb();renderContent();}

function areaSort(keys){
  return keys.slice().sort(function(a,b){
    var ai=AREA_ORDER.findIndex(function(k){return a.includes(k);});
    var bi=AREA_ORDER.findIndex(function(k){return b.includes(k);});
    if(ai>=0&&bi>=0)return ai-bi;if(ai>=0)return -1;if(bi>=0)return 1;
    return a.localeCompare(b,'zh-TW');
  });
}

function miniProg(s){
  var t=s.total||1;
  return '<div class="mini-prog">'+
    '<div class="mini-seg l" style="width:'+pct(s.l,t)+'%"></div>'+
    '<div class="mini-seg n" style="width:'+pct(s.n,t)+'%"></div>'+
    '<div class="mini-seg u" style="width:'+pct(s.u,t)+'%"></div>'+
  '</div>';
}

function renderContent(){
  var ca=document.getElementById('content-area');
  var cur=drillStack[drillStack.length-1];
  if(!cur||cur.type==='root')renderAreas(ca);
  else if(cur.type==='area')renderOffices(ca,cur.name);
  else if(cur.type==='office')renderStaff(ca,cur.area,cur.name);
}

function renderAreas(c){
  document.getElementById('section-title').textContent='AREA OVERVIEW';
  var ai=COL.area;
  if(ai<0){c.innerHTML='<div class="error-state">找不到營業處欄位</div>';return;}
  var map={};
  allRows.forEach(function(r){var a=r[ai]||'未知';if(!map[a])map[a]=[];map[a].push(r);});
  var areas=areaSort(Object.keys(map));
  document.getElementById('section-count').textContent=areas.length+' AREAS';
  updateKPI(allRows);
  var html='<div class="area-grid stagger">';
  areas.forEach(function(name){
    var s=stats(map[name]);
    html+='<div class="area-card" onclick="drillTo(\'area\',\''+name.replace(/'/g,"\\'")+'\')">'
      +'<div class="area-card-header"><div class="area-card-name">'+name+'</div>'
      +'<div><div class="area-card-total">'+s.total+'</div><div class="area-card-total-label">STORES</div></div></div>'
      +miniProg(s)
      +'<div class="area-card-stats">'
        +'<div class="area-stat"><div class="area-stat-dot" style="background:var(--c-green)"></div><span class="area-stat-num" style="color:var(--c-green)">'+s.l+'</span></div>'
        +'<div class="area-stat"><div class="area-stat-dot" style="background:var(--c-yellow)"></div><span class="area-stat-num" style="color:var(--c-yellow)">'+s.n+'</span></div>'
        +'<div class="area-stat"><div class="area-stat-dot" style="background:var(--c-red)"></div><span class="area-stat-num" style="color:var(--c-red)">'+s.u+'</span></div>'
      +'</div>'
      +'<div class="area-card-arrow">DRILL IN ›</div></div>';
  });
  html+='</div>';
  c.innerHTML=html;
}

function renderOffices(c,areaName){
  document.getElementById('section-title').textContent='OFFICE · '+areaName;
  var ai=COL.area,oi=COL.office;
  var rows=allRows.filter(function(r){return (r[ai]||'')===areaName||(r[ai]||'').includes(areaName);});
  updateKPI(rows);
  var map={};
  rows.forEach(function(r){var o=oi>=0?r[oi]||'未知所':'未知所';if(!map[o])map[o]=[];map[o].push(r);});
  var offices=Object.keys(map).sort(function(a,b){return a.localeCompare(b,'zh-TW');});
  document.getElementById('section-count').textContent=offices.length+' OFFICES';
  var html='<div class="office-list stagger">';
  offices.forEach(function(name){
    var s=stats(map[name]);var t=s.total||1;
    html+='<div class="office-row" onclick="drillTo(\'office\',\''+name.replace(/'/g,"\\'")+'\')">'
      +'<div class="office-name">'+name+'</div>'
      +'<div class="office-prog-wrap">'
        +'<div class="office-prog-track">'
          +'<div class="mini-seg l" style="width:'+pct(s.l,t)+'%"></div>'
          +'<div class="mini-seg n" style="width:'+pct(s.n,t)+'%"></div>'
          +'<div class="mini-seg u" style="width:'+pct(s.u,t)+'%"></div>'
        +'</div>'
        +'<div class="office-prog-nums">'
          +'<span class="office-prog-num" style="color:var(--c-green)"><span class="office-num-dot" style="background:var(--c-green)"></span>'+s.l+'</span>'
          +'<span class="office-prog-num" style="color:var(--c-yellow)"><span class="office-num-dot" style="background:var(--c-yellow)"></span>'+s.n+'</span>'
          +'<span class="office-prog-num" style="color:var(--c-red)"><span class="office-num-dot" style="background:var(--c-red)"></span>'+s.u+'</span>'
        +'</div>'
      +'</div>'
      +'<div class="office-total">'+s.total+'</div>'
      +'<div class="office-arrow">›</div>'
    +'</div>';
  });
  html+='</div>';
  c.innerHTML=html;
}

function renderStaff(c,areaName,officeName){
  document.getElementById('section-title').textContent='STAFF · '+officeName;
  var ai=COL.area,oi=COL.office,si=COL.staff;
  var ni=COL.store,ci=COL.code,ti=COL.type,gi=COL.grade;
  var rows=allRows.filter(function(r){
    return ((r[ai]||'')===areaName||(r[ai]||'').includes(areaName))&&(oi>=0?(r[oi]||'')===officeName:true);
  });
  updateKPI(rows);
  var map={};
  rows.forEach(function(r){var s=si>=0?r[si]||'未知':'未知';if(!map[s])map[s]=[];map[s].push(r);});
  var staffList=Object.keys(map).sort(function(a,b){return a.localeCompare(b,'zh-TW');});
  document.getElementById('section-count').textContent=staffList.length+' STAFF';
  var ORDER=['l','n','u'];
  var html='<div class="staff-grid stagger">';
  staffList.forEach(function(name){
    var sRows=map[name],s=stats(sRows);var t=s.total||1;
    var id='sc-'+name.replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g,'_');
    var sorted=sRows.slice().sort(function(a,b){var sa=ORDER.indexOf(a[a.length-1]),sb=ORDER.indexOf(b[b.length-1]);if(sa!==sb)return sa-sb;return (ci>=0?a[ci]:'').localeCompare(ci>=0?b[ci]:'','zh-TW');});
    var items=sorted.map(function(r){
      var st=r[r.length-1];
      var sname=ni>=0?r[ni]:'',code=ci>=0?r[ci]:'',type=ti>=0?r[ti]:'',grade=gi>=0?r[gi]:'';
      var meta=[type,grade].filter(Boolean).join(' · ');
      return '<div class="store-item"><div class="store-status-dot '+st+'"></div><div class="store-name">'+sname+'</div>'+(meta?'<div class="store-meta">'+meta+'</div>':'')+(code?'<div class="store-code">'+code+'</div>':'')+'</div>';
    }).join('');
    html+='<div class="staff-card" id="'+id+'">'
      +'<div class="staff-card-header" onclick="toggleStaff(\''+id+'\')">'
        +'<div class="staff-avatar">👤</div>'
        +'<div class="staff-info"><div class="staff-name">'+name+'</div><div class="staff-office">'+officeName+'</div></div>'
        +'<div class="staff-total">'+s.total+'</div>'
      +'</div>'
      +'<div class="staff-card-body" onclick="toggleStaff(\''+id+'\')">'
        +'<div class="staff-prog">'
          +'<div class="mini-seg l" style="width:'+pct(s.l,t)+'%"></div>'
          +'<div class="mini-seg n" style="width:'+pct(s.n,t)+'%"></div>'
          +'<div class="mini-seg u" style="width:'+pct(s.u,t)+'%"></div>'
        +'</div>'
        +'<div class="staff-stats">'
          +(s.l?'<div class="staff-stat" style="color:var(--c-green)">上架<b>'+s.l+'</b></div>':'')
          +(s.n?'<div class="staff-stat" style="color:var(--c-yellow)">未上架<b>'+s.n+'</b></div>':'')
          +(s.u?'<div class="staff-stat" style="color:var(--c-red)">未填<b>'+s.u+'</b></div>':'')
        +'</div>'
      +'</div>'
      +'<div class="staff-card-detail" id="'+id+'-det">'+items+'</div>'
    +'</div>';
  });
  html+='</div>';
  c.innerHTML=html;
}

function toggleStaff(id){
  var d=document.getElementById(id+'-det');
  if(d)d.classList.toggle('open');
}

function toggleChip(type){
  chipState[type]=!chipState[type];
  var el=document.getElementById('chip-'+type);
  if(el)el.classList.toggle('on',chipState[type]);
}

// 初始化
function init(){
  var cfg=SURVEY_CONFIG[0];
  document.getElementById('hud-label').textContent=cfg.name;
  fetchSheetData(cfg.spreadsheetId,cfg.sheetName,function(data){
    allHeaders=data.headers; allRows=data.rows;
    initCOL();
    setTimeout(function(){
      var ls=document.getElementById('loading-screen');
      ls.classList.add('hide');
      setTimeout(function(){ls.style.display='none';},500);
    },1800);
    drillStack=[];updateBreadcrumb();renderContent();
  },function(err){
    document.getElementById('loading-screen').innerHTML='<div class="loading-logo" style="color:var(--c-red)">⚠ ERROR</div><div class="loading-text">'+err+'</div>';
  });
}
init();
</script>
</body>
</html>
