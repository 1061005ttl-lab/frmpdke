<html lang="zh-TW">

  <head>
    <meta charset="UTF-8">
    <script>
      (function() {
        var input = prompt("請輸入公司英文簡稱(大小寫不分)：", "");
        if (!input || input.toLowerCase() !== "ttl") {
          alert("驗證失敗");
          window.location.replace("about:blank");
          return;
        }
        /* ── 手機偵測：用 screen.width，在 <head> 執行時最可靠（innerWidth 此時可能為 0） ── */
        if (screen.width < 768) {
          document.documentElement.classList.add('is-mobile-pre');
        }

        /* ── 智能縮放：手機（< 768px）不套 zoom ── */
        (function() {
          var BASE_W = 1440;
          function applyZoom() {
            if (screen.width < 768) {
              document.documentElement.style.zoom = '';
              return;
            }
            var ratio = Math.min(1, window.innerWidth / BASE_W);
            ratio = Math.max(0.65, ratio);
            document.documentElement.style.zoom = ratio;
          }
          applyZoom();
          window.addEventListener('resize', applyZoom);
        })();
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>業務王進度看板</title>
    <style>
      :root {
        --primary: #8BA690;
        --primary-d: #6a8a70;
        --bg: #F0EDE6;
        --card: #FFFFFF;
        --green: #22a84c;
        --green-bg: rgba(34, 168, 76, .08);
        --green-bd: rgba(34, 168, 76, .22);
        --yellow: #d4900a;
        --yellow-bg: rgba(212, 144, 10, .08);
        --yellow-bd: rgba(212, 144, 10, .25);
        --purple: #7c3aed;
        --purple-bg: rgba(124, 58, 237, .08);
        --purple-bd: rgba(124, 58, 237, .22);
        --orange: #ea6c00;
        --orange-bg: rgba(234, 108, 0, .08);
        --orange-bd: rgba(234, 108, 0, .22);
        --red: #d93025;
        --red-bg: rgba(217, 48, 37, .08);
        --red-bd: rgba(217, 48, 37, .22);
        --text: #2D2D2D;
        --sub: #888;
        --border: rgba(0, 0, 0, 0.09);
        --shadow: rgba(80, 100, 85, .13);
        --r: 12px;
        --dur: .38s;
        --ease: cubic-bezier(.34, 1.05, .64, 1);
        --glass: rgba(255, 255, 255, 0.72);
        --glass-border: rgba(255, 255, 255, 0.55);

        /* ── RWD 卡片格線 ──
           手機直向  < 600px  → 1 欄，最小寬度 100%
           平板      600–1023px → 2 欄，每欄最少 260px
           桌機      ≥ 1024px   → auto-fill，每欄 clamp(220px, 20vw, 340px)  */
        --card-min-mobile:  100%;
        --card-min-tablet:  260px;
        --card-min-desktop: clamp(220px, 20vw, 340px);

        /* area-view（處級）略寬 */
        --card-min-tablet-area:  300px;
        --card-min-desktop-area: clamp(260px, 22vw, 400px);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
        font-family: 'Microsoft JhengHei', 'Noto Sans TC', sans-serif;
      }

      body {
        display: flex;
        flex-direction: column;
        background: var(--bg);
        color: var(--text);
      }

      #content-wrap {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: row;
        overflow: hidden;
        position: relative; /* 讓 rank-drawer 絕對定位基准 */
      }

      /* ══ TOPBAR ══ */
      #topbar {
        flex-shrink: 0;
        background: var(--glass);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border-bottom: 1px solid var(--glass-border);
        padding: 0 16px;
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 48px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, .07), 0 1px 0 rgba(255, 255, 255, .8) inset;
        z-index: 100;
      }

      #title {
        font-size: 14px;
        font-weight: 900;
        color: var(--primary-d);
        letter-spacing: .5px;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .sep {
        width: 1px;
        height: 18px;
        background: rgba(0, 0, 0, .1);
        flex-shrink: 0;
      }

      .tb-label {
        font-size: 11px;
        color: var(--sub);
        white-space: nowrap;
        flex-shrink: 0;
        font-weight: 700;
      }

      .tb-sel {
        padding: 5px 8px;
        border: 1px solid rgba(0, 0, 0, .1);
        border-radius: 7px;
        background: rgba(255, 255, 255, .6);
        color: var(--text);
        font-size: 12px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        min-width: 80px;
        outline: none;
        transition: border-color .15s;
        white-space: nowrap;
      }

      .tb-sel:focus {
        border-color: var(--primary);
      }

      .tb-sel:disabled {
        opacity: .45;
        cursor: default;
      }

      #chips {
        display: flex;
        gap: 5px;
        flex-shrink: 0;
      }

      .chip {
        padding: 4px 11px;
        border-radius: 99px;
        font-size: 11px;
        font-weight: 700;
        border: 1.5px solid transparent;
        cursor: pointer;
        white-space: nowrap;
        transition: all .15s;
        background: transparent;
        font-family: inherit;
      }

      .chip.g {
        border-color: rgba(34, 168, 76, .3);
        color: #1e6e35;
      }

      .chip.g.on {
        background: var(--green-bg);
        border-color: var(--green);
      }

      .chip.y {
        border-color: rgba(212, 144, 10, .35);
        color: #7a5500;
      }

      .chip.y.on {
        background: var(--yellow-bg);
        border-color: var(--yellow);
      }

      .chip.p {
        border-color: rgba(124, 58, 237, .3);
        color: #5b21b6;
      }

      .chip.p.on {
        background: var(--purple-bg);
        border-color: var(--purple);
      }

      .chip.o {
        border-color: rgba(234, 108, 0, .3);
        color: #92400e;
      }

      .chip.o.on {
        background: var(--orange-bg);
        border-color: var(--orange);
      }

      .chip.r {
        border-color: rgba(217, 48, 37, .3);
        color: #9e1f18;
      }

      .chip.r.on {
        background: var(--red-bg);
        border-color: var(--red);
      }

      #ver-ts {
        margin-left: auto;
        font-size: 10px;
        color: var(--sub);
        white-space: nowrap;
        flex-shrink: 0;
        background: rgba(0, 0, 0, .04);
        padding: 3px 9px;
        border-radius: 6px;
        line-height: 1.5;
      }

      /* ══ GLOBAL BAR ══ */
      #gbar {
        flex-shrink: 0;
        background: rgba(255, 255, 255, .5);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0, 0, 0, .06);
        padding: 0 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 32px;
        font-size: 12px;
        gap: 10px;
      }

      .gb-path {
        display: flex;
        align-items: center;
        flex-wrap: nowrap;
        gap: 1px;
        overflow: hidden;
      }

      .gb-seg {
        cursor: pointer;
        color: var(--sub);
        font-size: 11px;
        font-weight: 600;
        padding: 3px 7px;
        border-radius: 6px;
        transition: background .12s;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .gb-seg:hover {
        background: rgba(0, 0, 0, .05);
        color: var(--text);
      }

      .gb-seg.cur {
        color: var(--text);
        cursor: default;
        font-weight: 700;
      }

      .gb-seg.cur:hover {
        background: transparent;
      }

      .gb-seg strong {
        color: var(--primary-d);
        font-size: 12px;
        font-weight: 900;
      }

      .gb-arrow {
        color: rgba(0, 0, 0, .2);
        font-size: 10px;
        padding: 0 1px;
        flex-shrink: 0;
      }

      .gb-right {
        display: flex;
        align-items: center;
        gap: 7px;
        flex-shrink: 0;
      }

      .gb-sync {
        display: flex;
        align-items: center;
        gap: 8px;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .gb-sync-item {
        font-size: 11px;
        color: var(--sub);
        white-space: nowrap;
      }
      .gb-sync-item.month-badge {
        background: rgba(139, 166, 144, .18);
        color: #4a7a55;
        font-weight: 800;
        font-size: 12px;
        padding: 2px 10px;
        border-radius: 99px;
        border: 1.5px solid rgba(106, 138, 112, .35);
      }
      .gb-sync-item.time-badge {
        background: rgba(100, 130, 200, .1);
        color: #3a5a99;
        font-weight: 700;
        font-size: 11px;
        padding: 2px 9px;
        border-radius: 99px;
        border: 1px solid rgba(100, 130, 200, .28);
      }

      .gb-btn {
        padding: 3px 11px;
        border-radius: 6px;
        border: 1px solid rgba(0, 0, 0, .1);
        background: rgba(255, 255, 255, .7);
        color: var(--text);
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
        transition: all .14s;
        font-family: inherit;
      }

      .gb-btn:hover {
        border-color: var(--primary);
        color: var(--primary-d);
      }

      /* ══ STAGE ══ */
      #stage {
        flex: 1;
        min-height: 0;
        min-width: 0;
        display: flex;
        overflow: hidden;
        position: relative;
        padding-right: 32px; /* 給收小把手留位 */
      }

      .col-side {
        flex-shrink: 0;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 8px;
        gap: 4px;
        display: flex;
        flex-direction: column;
        background: rgba(255, 255, 255, .25);
        border-right: 1px solid rgba(0, 0, 0, .07);
      }

      .col-side::-webkit-scrollbar {
        width: 3px;
      }

      .col-side::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, .1);
        border-radius: 3px;
      }

      .col-main {
        flex: 1;
        min-width: 0;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 20px 24px;
        display: grid;
        /* 桌機預設：auto-fill，卡片寬度在 220–340px 間流體縮放 */
        grid-template-columns: repeat(auto-fill, minmax(var(--card-min-desktop), 1fr));
        gap: 16px;
        align-content: start;
      }

      /* 處級 view：卡片略寬 */
      .col-main.area-view {
        grid-template-columns: repeat(auto-fill, minmax(var(--card-min-desktop-area), 1fr));
      }

      /* ch 視角：與預設相同，頭卡 whole 橫跨整列 */
      .col-main.ch-view {
        grid-template-columns: repeat(auto-fill, minmax(var(--card-min-desktop), 1fr));
      }
      .col-main.ch-view .big-card.whole {
        grid-column: 1 / -1;
      }

      /* 人員層：卡片可稍窄，容納更多人 */
      .col-main.staff-view {
        grid-template-columns: repeat(auto-fill, minmax(clamp(200px, 18vw, 320px), 1fr));
        padding: 16px 20px;
        gap: 14px;
      }

      /* 店家層：單欄顯示 */
      .col-main.store-view {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
        grid-auto-rows: auto;
        padding: 14px 16px;
        gap: 10px;
        overflow-y: hidden;
      }

      /* ── 平板：600–1023px，固定兩欄 ── */
      @media (min-width: 600px) and (max-width: 1023px) {
        .col-main {
          grid-template-columns: repeat(2, minmax(var(--card-min-tablet), 1fr));
          padding: 16px 18px;
          gap: 14px;
        }
        .col-main.area-view {
          grid-template-columns: repeat(2, minmax(var(--card-min-tablet-area), 1fr));
        }
        .col-main.ch-view {
          grid-template-columns: repeat(2, minmax(var(--card-min-tablet), 1fr));
        }
        .col-main.staff-view {
          grid-template-columns: repeat(2, minmax(220px, 1fr));
          padding: 14px 16px;
          gap: 12px;
        }
        .col-main.store-view {
          padding: 12px 14px;
          gap: 8px;
        }
      }

      /* ── 手機直向：< 600px，單欄 ── */
      @media (max-width: 599px) {
        .col-main {
          grid-template-columns: 1fr;
          padding: 0;
          gap: 0;
          background: var(--bg);
        }
        .col-main.area-view,
        .col-main.ch-view {
          grid-template-columns: 1fr;
        }
        .col-main.staff-view {
          grid-template-columns: 1fr;
          padding: 0;
          gap: 0;
        }
        .col-main.store-view {
          padding: 12px 14px;
          gap: 8px;
        }
      }

      #store-list-wrap {
        overflow-y: auto;
        overflow-x: hidden;
        min-height: 0;
      }

      #store-list-wrap::-webkit-scrollbar {
        width: 5px;
      }

      #store-list-wrap::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, .12);
        border-radius: 4px;
      }

      .col-main::-webkit-scrollbar {
        width: 4px;
      }

      .col-main::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, .1);
        border-radius: 4px;
      }

      .divider {
        flex-shrink: 0;
        width: 1px;
        background: rgba(0, 0, 0, .07);
      }

      /* ══ 排行抄屉（絕對定位浮層，不擠壓主畫面） ══ */
      #rank-drawer {
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        width: 240px;
        background: var(--glass);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border-left: 1px solid rgba(0, 0, 0, .1);
        display: flex;
        flex-direction: column;
        transition: width .3s var(--ease), box-shadow .3s;
        overflow: hidden;
        z-index: 50;
        box-shadow: -4px 0 20px rgba(0,0,0,.1);
      }

      #rank-drawer.collapsed {
        width: 32px;
        box-shadow: none;
      }

      #rank-drawer.collapsed .rd-content {
        opacity: 0;
        pointer-events: none;
      }

      .rd-toggle {
        width: 32px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        border-bottom: 1px solid rgba(0, 0, 0, .07);
        padding: 10px 0;
      }

      #rank-drawer.collapsed .rd-toggle {
        border-bottom: none;
        writing-mode: vertical-rl;
        height: 100%;
        padding: 16px 0;
        font-size: 10px;
        font-weight: 700;
        color: var(--sub);
        letter-spacing: 1px;
      }

      #rank-drawer:not(.collapsed) .rd-toggle {
        writing-mode: horizontal-tb;
        flex-direction: row;
        width: 100%;
        padding: 10px 14px;
        border-bottom: 1px solid rgba(0, 0, 0, .07);
      }

      .rd-content {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        opacity: 1;
        transition: opacity .2s;
      }

      .rd-content::-webkit-scrollbar {
        width: 3px;
      }

      .rd-content::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, .1);
        border-radius: 3px;
      }

      .rd-section {
        padding: 10px 12px 6px;
      }

      .rd-sec-title {
        font-size: 9px;
        font-weight: 900;
        letter-spacing: .8px;
        color: #aaa;
        text-transform: uppercase;
        margin-bottom: 7px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .rd-sec-title::after {
        content: '';
        flex: 1;
        height: 1px;
        background: rgba(0, 0, 0, .07);
      }

      .rank-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 9px;
        border-radius: 9px;
        margin-bottom: 4px;
        cursor: pointer;
        border: 1px solid transparent;
        transition: all .18s;
      }

      .rank-item:hover {
        background: rgba(139, 166, 144, .1);
        border-color: rgba(139, 166, 144, .25);
      }

      .rank-item.top3 {
        background: rgba(0, 0, 0, .03);
        border: 1px solid rgba(200, 50, 50, .18);
        animation: rankPulse 3s ease-in-out infinite;
      }

      .rank-item.top3:nth-child(1) {
        animation-delay: 0s;
      }

      .rank-item.top3:nth-child(2) {
        animation-delay: .4s;
      }

      .rank-item.top3:nth-child(3) {
        animation-delay: .8s;
      }

      @keyframes rankPulse {

        0%,
        100% {
          box-shadow: none;
        }

        50% {
          box-shadow: 0 0 10px rgba(200, 50, 50, .2), inset 0 0 6px rgba(200, 50, 50, .06);
        }
      }

      .rank-badge {
        width: 22px;
        height: 22px;
        border-radius: 7px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 900;
        flex-shrink: 0;
      }

      .rank-badge.r1 {
        width: 26px;
        height: 26px;
        border-radius: 8px;
        font-size: 13px;
        background: linear-gradient(135deg, #7f1d1d, #ef4444);
        color: #fff;
        box-shadow: 0 2px 8px rgba(239, 68, 68, .5), 0 0 0 2px rgba(239, 68, 68, .2);
      }

      .rank-badge.r2 {
        width: 24px;
        height: 24px;
        border-radius: 7px;
        font-size: 12px;
        background: linear-gradient(135deg, #7c2d12, #f97316);
        color: #fff;
        box-shadow: 0 2px 6px rgba(249, 115, 22, .45), 0 0 0 2px rgba(249, 115, 22, .18);
      }

      .rank-badge.r3 {
        width: 23px;
        height: 23px;
        border-radius: 7px;
        font-size: 12px;
        background: linear-gradient(135deg, #78350f, #f59e0b);
        color: #fff;
        box-shadow: 0 2px 6px rgba(245, 158, 11, .4), 0 0 0 2px rgba(245, 158, 11, .15);
      }

      .rank-badge.rn {
        background: rgba(0, 0, 0, .07);
        color: #777;
      }

      .rank-info {
        flex: 1;
        min-width: 0;
      }

      .rank-name {
        font-size: 13px;
        font-weight: 800;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .rank-sub {
        font-size: 10px;
        color: #999;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-top: 1px;
      }

      .rank-num {
        font-size: 17px;
        font-weight: 900;
        color: var(--red);
        flex-shrink: 0;
        letter-spacing: -.5px;
        min-width: 28px;
        text-align: right;
      }

      .rd-divider {
        height: 1px;
        background: rgba(0, 0, 0, .06);
        margin: 6px 12px;
      }

      /* ══ 側欄小卡 ══ */
      .mini-card {
        background: rgba(255, 255, 255, .75);
        border: 1px solid rgba(0, 0, 0, .08);
        border-radius: 8px;
        cursor: pointer;
        padding: 11px 13px;
        transition: all .16s;
        animation: miniSlide .24s var(--ease) both;
      }

      .mini-card:hover {
        border-color: var(--primary);
        transform: translateX(3px);
        box-shadow: 3px 0 10px var(--shadow);
      }

      .mini-card.sel {
        border-color: var(--primary);
        background: rgba(139, 166, 144, .1);
      }

      .mc-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 4px;
        margin-bottom: 8px;
      }

      .mc-name {
        font-size: 17px;
        font-weight: 900;
        color: var(--text);
        word-break: keep-all;
        line-height: 1.2;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .mc-total {
        font-size: 28px;
        font-weight: 900;
        color: var(--primary-d);
        line-height: 1;
        flex-shrink: 0;
        letter-spacing: -1.5px;
      }

      .mc-bar {
        height: 5px;
        background: rgba(0, 0, 0, .07);
        border-radius: 99px;
        overflow: hidden;
        display: flex;
        margin-bottom: 7px;
        width: 100%;
      }

      .mc-sts {
        display: flex;
        justify-content: flex-start;
        gap: 5px;
        flex-wrap: wrap;
      }

      .mc-s {
        font-size: 13px;
        font-weight: 900;
        white-space: nowrap;
      }

      .mc-s.g { color: var(--green); }
      .mc-s.y { color: var(--yellow); }
      .mc-s.p { color: var(--purple); }
      .mc-s.o { color: var(--orange); }
      .mc-s.r { color: var(--red); }

      /* 主要通路巡訪專用：色塊格式 */
      .mc-s-block-met {
        background: var(--green-bg);
        border: 1px solid var(--green-bd);
        border-radius: 6px;
        padding: 3px 8px;
        display: inline-flex;
        align-items: baseline;
        gap: 3px;
      }
      .mc-s-block-unmet {
        background: var(--red-bg);
        border: 1px solid var(--red-bd);
        border-radius: 6px;
        padding: 3px 8px;
        display: inline-flex;
        align-items: baseline;
        gap: 3px;
      }
      .mc-s-sub {
        font-size: 11px;
        font-weight: 700;
        opacity: .75;
      }

      /* ══ 整體卡（深色英雄） ══ */
      .big-card.whole {
        grid-column: 1/-1;
        cursor: default;
        background: linear-gradient(130deg, #1a1f2e 0%, #22293a 60%, #1e2d26 100%);
        border-radius: var(--r);
        padding: 22px 28px;
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 28px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, .28), 0 1px 0 rgba(255, 255, 255, .06) inset;
        position: relative;
        overflow: hidden;
        animation: cardPop .34s var(--ease) both;
        border: 1px solid rgba(255, 255, 255, .07);
        min-height: 110px;
      }

      .big-card.whole::before {
        content: '';
        position: absolute;
        top: -60px;
        right: -40px;
        width: 220px;
        height: 220px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(139, 166, 144, .12) 0%, transparent 65%);
        pointer-events: none;
      }

      .big-card.whole::after {
        content: '';
        position: absolute;
        bottom: -50px;
        left: 100px;
        width: 160px;
        height: 160px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(80, 120, 200, .06) 0%, transparent 65%);
        pointer-events: none;
      }

      .wc-left {
        display: flex;
        flex-direction: column;
        justify-content: center;
        flex-shrink: 0;
        min-width: 130px;
      }

      .wc-label {
        font-size: 16px;
        font-weight: 900;
        color: rgba(255, 255, 255, .7);
        letter-spacing: .5px;
        margin-bottom: 6px;
      }

      .wc-total {
        font-size: 64px;
        font-weight: 900;
        color: #fff;
        line-height: 1;
        letter-spacing: -4px;
      }

      .wc-divider {
        width: 1px;
        align-self: stretch;
        margin: 4px 0;
        background: linear-gradient(180deg, transparent, rgba(255, 255, 255, .15) 30%, rgba(255, 255, 255, .15) 70%, transparent);
        flex-shrink: 0;
      }

      .wc-right {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 12px;
        justify-content: center;
      }

      .wc-track {
        height: 10px;
        background: rgba(255, 255, 255, .1);
        border-radius: 99px;
        overflow: hidden;
        display: flex;
        width: 100%;
      }

      .wc-stats {
        display: flex;
        gap: 0;
        flex-wrap: wrap;
        align-items: center;
      }

      .wc-st {
        padding: 4px 12px;
        border-right: 1px solid rgba(255, 255, 255, .08);
        flex-shrink: 0;
      }

      .wc-st:last-child {
        border-right: none;
      }

      .wc-st-lbl {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: .3px;
        color: rgba(255, 255, 255, .55);
        margin-bottom: 3px;
        white-space: nowrap;
      }

      .wc-st-row {
        display: flex;
        flex-direction: row;
        align-items: baseline;
        gap: 4px;
        flex-wrap: nowrap;
      }

      .wc-st-pct {
        font-size: 22px;
        font-weight: 900;
        line-height: 1;
        white-space: nowrap;
      }

      .wc-st-num {
        font-size: 22px;
        font-weight: 700;
        white-space: nowrap;
        opacity: .85;
      }

      .wc-st.g .wc-st-num {
        color: #5cf08a;
      }

      .wc-st.g .wc-st-pct {
        color: #5cf08a;
      }

      .wc-st.y .wc-st-num {
        color: #fdd261;
      }

      .wc-st.y .wc-st-pct {
        color: #fdd261;
      }

      .wc-st.p .wc-st-num {
        color: #c4b5fd;
      }

      .wc-st.p .wc-st-pct {
        color: #c4b5fd;
      }

      .wc-st.o .wc-st-num {
        color: #fdba74;
      }

      .wc-st.o .wc-st-pct {
        color: #fdba74;
      }

      .wc-st.r .wc-st-num {
        color: #ff7b6b;
      }

      .wc-st.r .wc-st-pct {
        color: #ff7b6b;
      }

      /* ══ 前3名效果 ══ */
      .big-card.bc-top1,
      .big-card.bc-top2,
      .big-card.bc-top3 {
        position: relative;
      }

      .big-card.bc-top1::after,
      .big-card.bc-top2::after,
      .big-card.bc-top3::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: var(--r);
        pointer-events: none;
        animation: cardGlow 3s ease-in-out infinite;
      }

      .big-card.bc-top1::after {
        box-shadow: 0 0 0 2px rgba(220, 38, 38, .55), 0 4px 20px rgba(220, 38, 38, .25);
        animation-delay: 0s;
      }

      .big-card.bc-top2::after {
        box-shadow: 0 0 0 1.5px rgba(234, 88, 12, .45), 0 4px 16px rgba(234, 88, 12, .18);
        animation-delay: .5s;
      }

      .big-card.bc-top3::after {
        box-shadow: 0 0 0 1.5px rgba(202, 138, 4, .4), 0 4px 14px rgba(202, 138, 4, .15);
        animation-delay: 1s;
      }

      @keyframes cardGlow {

        0%,
        100% {
          opacity: .55;
        }

        50% {
          opacity: 1;
        }
      }

      .big-card.bc-top1 .bc-head::after {
        content: '1';
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 22px;
        height: 22px;
        border-radius: 7px;
        font-size: 12px;
        font-weight: 900;
        color: #fff;
        flex-shrink: 0;
        margin-left: 6px;
        background: linear-gradient(135deg, #7f1d1d, #ef4444);
        box-shadow: 0 2px 8px rgba(239, 68, 68, .45);
      }

      .big-card.bc-top2 .bc-head::after {
        content: '2';
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 22px;
        height: 22px;
        border-radius: 7px;
        font-size: 12px;
        font-weight: 900;
        color: #fff;
        flex-shrink: 0;
        margin-left: 6px;
        background: linear-gradient(135deg, #7c2d12, #f97316);
        box-shadow: 0 2px 6px rgba(249, 115, 22, .4);
      }

      .big-card.bc-top3 .bc-head::after {
        content: '3';
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 22px;
        height: 22px;
        border-radius: 7px;
        font-size: 12px;
        font-weight: 900;
        color: #fff;
        flex-shrink: 0;
        margin-left: 6px;
        background: linear-gradient(135deg, #78350f, #f59e0b);
        box-shadow: 0 2px 6px rgba(245, 158, 11, .35);
      }

      /* ══ 一般大卡 ══ */
      .big-card {
        container-type: inline-size; /* 啟用容器查詢，讓 cqi 字型依卡片寬度縮放 */
        background: #fff;
        border-radius: var(--r);
        border: 1px solid rgba(0, 0, 0, .07);
        cursor: pointer;
        overflow: hidden;
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 8px;
        transition: border-color .2s, box-shadow .2s, transform .22s var(--ease);
        animation: cardPop .34s var(--ease) both;
        padding: 14px 16px 22px 16px; /* 底部22px = 14px內距 + 8px進度條空間 */
        box-shadow: 0 2px 8px rgba(0, 0, 0, .05), 0 1px 0 rgba(255, 255, 255, .9) inset;
      }

      .big-card::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: linear-gradient(180deg, var(--primary-d), var(--primary));
        opacity: 0;
        transition: opacity .2s;
        border-radius: 3px 0 0 3px;
      }

      .big-card:hover::before,
      .big-card.sel::before {
        opacity: 1;
      }

      .big-card:hover {
        border-color: rgba(139, 166, 144, .5);
        box-shadow: 0 8px 28px rgba(139, 166, 144, .18), 0 1px 0 rgba(255, 255, 255, .9) inset;
        transform: translateY(-2px);
      }

      .big-card.sel {
        border-color: rgba(139, 166, 144, .55);
        box-shadow: 0 0 0 3px rgba(139, 166, 144, .15), 0 6px 20px var(--shadow);
      }

      .bc-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .bc-name {
        font-size: clamp(13px, 1.6cqi, 17px);
        font-weight: 900;
        color: var(--text);
        white-space: normal;
        word-break: break-all;
        flex: 1;
        min-width: 0;
        line-height: 1.3;
      }

      .bc-total {
        font-size: clamp(20px, 3cqi, 32px);
        font-weight: 900;
        color: var(--primary-d);
        line-height: 1;
        letter-spacing: -1.5px;
        flex-shrink: 0;
      }

      .bc-track {
        height: 8px;
        background: rgba(0, 0, 0, .06);
        border-radius: 0;
        overflow: hidden;
        display: flex;
        /* 改用 absolute 貼底，不依賴負邊距，縮放任何比例都正確 */
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
      }
      .bc-track::after {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 3px;
        background: linear-gradient(180deg, rgba(255,255,255,.38) 0%, transparent 100%);
        pointer-events: none;
        z-index: 1;
      }

      /* ══ [主要通路巡訪] 大卡：對齊截圖版（bc-cv-*） ══ */

      /* 整張大卡：移除內距，讓表格貼邊 */
      .big-card.bc-cv-card {
        padding: 0 !important;
        overflow: hidden;
        gap: 0 !important;
      }

      /* 整體表格 */
      .bc-cv-tbl {
        width: 100%;
        border-collapse: collapse;
        table-layout: auto;
      }

      /* ── 標題列（第一列）：卡名 | 總家數 | 達成 | 未達 ── */
      .bc-cv-thead tr {
        border-bottom: 1px solid rgba(0,0,0,.07);
      }

      /* 左上角卡名格：大字、醒目 */
      .bc-cv-th-name {
        font-size: clamp(16px, 3.5cqi, 28px);
        font-weight: 900;
        color: var(--text);
        text-align: left;
        padding: 10px 10px 9px 16px;
        white-space: nowrap;
        vertical-align: bottom;
        line-height: 1;
        letter-spacing: -.5px;
        /* 左側色條 */
        border-left: 5px solid var(--primary-d);
      }

      /* 欄標題：總家數 */
      .bc-cv-th-cnt {
        font-size: 14px;
        font-weight: 800;
        color: var(--sub);
        text-align: right;
        padding: 8px 10px 8px 4px;
        white-space: nowrap;
        vertical-align: bottom;
        width: 54px;
        min-width: 54px;
      }

      /* 欄標題：達成 / 未達 */
      .bc-cv-th {
        font-size: 15px;
        font-weight: 900;
        text-align: center;
        padding: 8px 8px 8px 8px;
        white-space: nowrap;
        vertical-align: bottom;
        min-width: 0;
        width: 38%;
        letter-spacing: .3px;
      }
      .bc-cv-th.bc-cv-met   { color: var(--green); }
      .bc-cv-th.bc-cv-unmet { color: var(--red); }
      .bc-cv-th.bc-cv-neutral { color: var(--yellow); }

      /* ── 資料列 ── */
      .bc-cv-tbody tr {
        border-top: 1px solid rgba(0,0,0,.045);
      }

      /* 行標籤：不分類 / 非CVS / CVS */
      .bc-cv-lbl {
        font-size: 13px;
        font-weight: 800;
        color: var(--sub);
        white-space: nowrap;
        padding: 9px 6px 9px 14px;
        vertical-align: middle;
        width: 52px;
      }

      /* 總家數數字 */
      .bc-cv-cnt {
        font-size: 15px;
        font-weight: 800;
        color: var(--sub);
        text-align: right;
        padding: 9px 10px 9px 4px;
        vertical-align: middle;
        font-variant-numeric: tabular-nums;
        width: 54px;
        min-width: 54px;
      }

      /* 資料格（達成 / 未達） */
      .bc-cv-td {
        text-align: center;
        padding: 8px 6px;
        vertical-align: middle;
      }

      /* 百分比＋括號數字：合在一行，參考截圖格式 99%(6165) */
      .bc-cv-pct {
        font-size: clamp(13px, 2.5cqi, 20px);
        font-weight: 900;
        white-space: nowrap;
        font-variant-numeric: tabular-nums;
      }
      .bc-cv-num {
        font-size: clamp(10px, 1.6cqi, 14px);
        font-weight: 700;
        opacity: .85;
        margin-left: 2px;
        white-space: nowrap;
      }

      /* 達成格：綠字 + 淡綠底 */
      .bc-cv-met {
        background: rgba(34,168,76,.07);
      }
      .bc-cv-met .bc-cv-pct { color: var(--green); }
      .bc-cv-met .bc-cv-num { color: var(--green); }

      /* 未達格：紅字 + 淡紅底 */
      .bc-cv-unmet {
        background: rgba(217,48,37,.07);
      }
      .bc-cv-unmet .bc-cv-pct { color: var(--red); }
      .bc-cv-unmet .bc-cv-num { color: var(--red); }

      /* 其他格：黃字 + 淡黃底 */
      .bc-cv-neutral {
        background: rgba(212,144,10,.07);
      }
      .bc-cv-neutral .bc-cv-pct { color: var(--yellow); }
      .bc-cv-neutral .bc-cv-num { color: var(--yellow); }

      /* bc-cv-card 內的進度條：已使用 absolute 定位，確保貼底 */
      .bc-cv-card .bc-track {
        height: 8px !important;
      }

      /* 數量為0的資料格：背景透明、文字極淡，讓有數字的色塊更突出 */
      .bc-cv-td.bc-cv-td-zero {
        background: transparent !important;
        opacity: 0.20;
        filter: grayscale(1);
      }

      /* ══ [2026-05-28] bc-cv-card 人員/個人頭卡補充樣式 ══ */

      /* th-name 內的角落資訊 */
      .bc-cv-corner {
        font-size: 11px;
        font-weight: 700;
        color: var(--sub);
        opacity: .75;
        margin-left: auto;
        white-space: nowrap;
      }
      .bc-cv-visits {
        font-size: 10px;
        font-weight: 700;
        color: #4a7a55;
      }

      /* staff-view 下的 bc-cv-card 使用小號字，適合多欄排列 */
      .staff-view .big-card.bc-cv-card .bc-cv-th-name {
        font-size: clamp(13px, 2.8cqi, 21px);
        padding: 8px 8px 7px 12px;
      }
      /* 人員卡專用：去掉上下多餘空間，讓名字不擠壓數據欄 */
      .staff-view .big-card.bc-cv-card .bc-cv-th-name--staff {
        font-size: clamp(12px, 2.5cqi, 19px);
        padding: 7px 6px 6px 12px;
        letter-spacing: -.3px;
      }
      .staff-view .big-card.bc-cv-card .bc-cv-pct {
        font-size: clamp(12px, 2.2cqi, 17px);
      }
      .staff-view .big-card.bc-cv-card .bc-cv-num {
        font-size: clamp(9px, 1.4cqi, 13px);
      }

      /* store-view 頭卡（個人層級）：full width + 不可點擊 */
      .store-view .big-card.bc-cv-card.whole {
        grid-column: 1 / -1;
        cursor: default;
        border-left: 5px solid var(--primary-d);
        margin-bottom: 0;
      }
      /* 個人頭卡：覆寫深色 whole 背景，改成淺色清爽版 */
      .sv-personal-header {
        background: var(--card) !important;
        color: var(--text) !important;
      }
      .sv-personal-header .bc-cv-thead tr {
        background: rgba(139,166,144,.08);
      }
      .sv-personal-header .bc-cv-tbody tr {
        background: transparent;
      }
      /* 個人頭卡人名欄：用綠色主題色，不用大白字 */
      .sv-ph-name {
        font-size: clamp(18px, 4cqi, 26px) !important;
        color: var(--primary-d) !important;
        padding: 10px 10px 9px 16px !important;
        border-left: 5px solid var(--primary-d) !important;
      }
      /* ── 清冊展開 bar（清冊框上緣） ── */
      .sp-toggle-bar {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 7px 14px;
        font-size: 12px;
        font-weight: 700;
        color: var(--primary-d);
        background: rgba(139,166,144,.10);
        border-bottom: 1px solid rgba(0,0,0,.07);
        cursor: pointer;
        user-select: none;
        transition: background .14s;
        border-radius: var(--r) var(--r) 0 0;
      }
      .sp-toggle-bar:hover {
        background: rgba(139,166,144,.18);
      }
      .bc-tbl { width: 100%; border-collapse: collapse; margin-top: 6px; }
      .bc-tbl-th-name { font-size: 16px; font-weight: 900; color: var(--text); text-align: left; padding: 3px 4px 5px 0; white-space: nowrap; }
      .bc-tbl-th-count { font-size: 11px; font-weight: 700; color: var(--sub); text-align: right; padding: 2px 6px; }
      .bc-tbl-th { font-size: 11px; font-weight: 700; text-align: center; padding: 2px 4px; }
      .bc-tbl-th.g { color: var(--green); }
      .bc-tbl-th.y { color: var(--yellow); }
      .bc-tbl-th.r { color: var(--red); }
      .bc-tbl-lbl { font-size: 12px; font-weight: 700; color: var(--sub); padding: 5px 5px 5px 0; white-space: nowrap; }
      .bc-tbl-count { font-size: 12px; color: var(--sub); text-align: right; padding: 5px 7px; }
      .bc-tbl-td { text-align: center; padding: 4px 5px; border-top: 1px solid rgba(0,0,0,.05); }
      .bc-tbl-pct { font-size: clamp(13px, 2.5cqi, 15px); font-weight: 900; }
      .bc-tbl-num { font-size: 11px; color: var(--sub); margin-left: 2px; }
      .bc-tbl-td.g .bc-tbl-pct { color: var(--green); }
      .bc-tbl-td.r .bc-tbl-pct { color: var(--red); }
      .bc-tbl-td.y .bc-tbl-pct { color: var(--yellow); }
      /* 達成（綠）色塊 */
      .bc-tbl-td.bc-tbl-td-met { background: var(--green-bg); }
      .bc-tbl-td.bc-tbl-td-met .bc-tbl-pct { color: var(--green); }
      /* 未達（紅）色塊 */
      .bc-tbl-td.bc-tbl-td-unmet { background: var(--red-bg); }
      .bc-tbl-td.bc-tbl-td-unmet .bc-tbl-pct { color: var(--red); }
      .bc-tbl-tag { font-size: 10px; font-weight: 700; color: var(--green); margin-left: 2px; }
      /* ══ 統計格：行內橫排 ══ */
      .bc-stats {
        display: none; /* 已改為行內顯示 */
      }

      /* 行內統計列 — 每個狀態獨立色框，文字在上數字在下 */
      .bc-inline-stats {
        display: flex;
        gap: 6px;
        align-items: stretch;
        flex-wrap: wrap;
        width: 100%;
        margin-top: 2px;
      }

      .bc-inline-st {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1px;
        padding: 5px 9px 6px;
        border-radius: 8px;
        border: 1px solid transparent;
        flex: 1;
        min-width: 0;
        white-space: nowrap;
      }

      .bc-inline-lbl {
        font-size: clamp(9px, 1.8cqi, 11px);
        font-weight: 800;
        letter-spacing: .2px;
        line-height: 1.2;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 100%;
      }

      .bc-inline-num-row {
        display: flex;
        align-items: baseline;
        gap: 2px;
        white-space: nowrap;
      }

      .bc-inline-pct {
        font-size: clamp(13px, 2.8cqi, 17px);
        font-weight: 900;
        line-height: 1;
      }

      .bc-inline-num {
        font-size: clamp(13px, 2.8cqi, 17px);
        font-weight: 700;
        opacity: .8;
      }

      /* 數量為0的狀態框：完全透明，不搶眼，讓有數字的色塊更突出 */
      .bc-inline-st.bc-st-zero {
        opacity: 0.18;
        filter: grayscale(1);
        background: transparent !important;
        border-color: transparent !important;
      }
      .bc-inline-st.bc-st-zero .bc-inline-pct {
        font-size: clamp(11px, 2.4cqi, 15px);
      }

      /* bc-inline 顏色 + 框 */
      .bc-inline-st.g {
        background: var(--green-bg);
        border-color: var(--green-bd);
      }
      .bc-inline-st.g .bc-inline-lbl { color: #1e6e35; }
      .bc-inline-st.g .bc-inline-pct,
      .bc-inline-st.g .bc-inline-num { color: var(--green); }

      .bc-inline-st.y {
        background: var(--yellow-bg);
        border-color: var(--yellow-bd);
      }
      .bc-inline-st.y .bc-inline-lbl { color: #7a5500; }
      .bc-inline-st.y .bc-inline-pct,
      .bc-inline-st.y .bc-inline-num { color: var(--yellow); }

      .bc-inline-st.r {
        background: var(--red-bg);
        border-color: var(--red-bd);
      }
      .bc-inline-st.r .bc-inline-lbl { color: #922018; }
      .bc-inline-st.r .bc-inline-pct,
      .bc-inline-st.r .bc-inline-num { color: var(--red); }

      .bc-inline-st.p {

      .bc-tri-cell.p .bc-tri-num { color: var(--purple); }
      .bc-tri-cell.o .bc-tri-pct,
      .bc-tri-cell.o .bc-tri-num { color: var(--orange); }
      /* CVS達標特殊標示 */
      .bc-tri-tag {
        font-size: 8px;
        font-weight: 800;
        padding: 1px 4px;
        border-radius: 4px;
        background: rgba(58,106,170,.15);
        color: #3a60aa;
        margin-left: 2px;
        vertical-align: middle;
        white-space: nowrap;
        flex-shrink: 0;
      }

      /* 整體卡（dark hero）的三層橫向 */
      .wc-tri {
        display: flex;
        flex-direction: column;
        gap: 3px;
        margin-top: 6px;
      }
      .wc-tri-row {
        display: flex;
        align-items: center;
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,.08);
        min-height: 28px;
      }
      .wc-tri-hdr {
        font-size: 10px;
        font-weight: 800;
        padding: 5px 8px;
        white-space: nowrap;
        flex-shrink: 0;
        width: 108px;
        min-width: 108px;
        display: flex;
        align-items: center;
        gap: 4px;
        line-height: 1.2;
      }
      .wc-tri-hdr .wc-tri-visits {
        font-size: 9px;
        font-weight: 700;
        opacity: .6;
        margin-left: 3px;
      }
      .wc-tri-cells {
        display: flex;
        flex: 1;
        gap: 1px;
        background: rgba(255,255,255,.06);
        min-width: 0;
      }
      .wc-tri-cell {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 2px;
        padding: 4px 6px;
      }
      .wc-tri-pct {
        font-size: clamp(11px, 2.3cqi, 14px);
        font-weight: 900;
        white-space: nowrap;
        line-height: 1;
      }
      .wc-tri-num {
        font-size: clamp(11px, 2.3cqi, 14px);
        font-weight: 700;
        opacity: .8;
        white-space: nowrap;
      }
      .wc-tri-row.total { }
      .wc-tri-row.total .wc-tri-hdr { background: rgba(255,255,255,.1); color: rgba(255,255,255,.8); }
      .wc-tri-row.total .wc-tri-cell { background: rgba(255,255,255,.05); }
      .wc-tri-row.noncvs .wc-tri-hdr { background: rgba(139,166,144,.2); color: #a8d4b4; }
      .wc-tri-row.noncvs .wc-tri-cell { background: rgba(139,166,144,.07); }
      .wc-tri-row.cvs .wc-tri-hdr { background: rgba(100,150,255,.2); color: #a8c4f8; }
      .wc-tri-row.cvs .wc-tri-cell { background: rgba(100,150,255,.07); }
      .wc-tri-cell.g .wc-tri-pct,
      .wc-tri-cell.g .wc-tri-num { color: #5cf08a; }
      .wc-tri-cell.r .wc-tri-pct,
      .wc-tri-cell.r .wc-tri-num { color: #ff7b6b; }
      .wc-tri-tag {
        font-size: 8px; font-weight: 800;
        padding: 1px 4px; border-radius: 4px;
        background: rgba(160,200,255,.2);
        color: #a8c4f8;
        margin-left: 2px;
        white-space: nowrap; flex-shrink: 0;
      }

      /* bc-tri 在人員卡中的微調 */
      .staff-card .bc-tri {
        margin: 4px 0 0;
      }
      .staff-card .bc-tri-hdr {
        font-size: 9.5px;
        width: 100px;
        min-width: 100px;
      }

      /* ══ 雙欄對比列（真實 vs 加權）已棄用，保留備用 ══ */
      .bc-dual {
        display: none;
      }

      /* 整體卡（dark hero）的雙欄 — 已棄用，改用 wc-tri */
      .wc-dual { display: none; }

      /* ══ 所級雙欄摘要（staff-summary） ══ */
      .ss-dual {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1px;
        background: rgba(0,0,0,.05);
        border-radius: 8px;
        overflow: hidden;
        margin-top: 8px;
        flex-shrink: 0;
        max-width: 480px;
      }
      .ss-dual-col {
        padding: 6px 10px 7px;
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .ss-dual-col.real { background: #f4f9f5; }
      .ss-dual-col.weighted { background: #eef3ff; }
      .ss-dual-hdr {
        font-size: 9px;
        font-weight: 900;
        letter-spacing: .5px;
        text-transform: uppercase;
        margin-bottom: 2px;
      }
      .ss-dual-col.real .ss-dual-hdr { color: #4a7a55; }
      .ss-dual-col.weighted .ss-dual-hdr { color: #3a5faa; }
      /* 人員卡雙欄：複用 bc-dual，但稍微緊湊 */
      .sc-dual { margin: 4px 0 0; border-radius: 0 0 var(--r) var(--r); overflow: hidden; }
      .sc-dual .bc-dual-hdr { font-size: 8.5px; white-space: normal; overflow-wrap: break-word; word-break: break-all; }
      .sc-dual .bc-dual-num { font-size: clamp(11px, 1.1vw, 16px); }
      .sc-dual .bc-dual-pct { font-size: clamp(7px, 0.65vw, 9px); }
      .sc-dual .bc-dual-col { padding: 6px 8px 7px; min-width: 0; overflow: hidden; }

      /* ══ 人員詳情頁（store-header）雙欄摘要 ══ */
      .sh-dual {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 4px 10px;
        margin-top: 6px;
        padding: 5px 10px;
        background: rgba(0,0,0,.04);
        border-radius: 7px;
        font-size: 11px;
        font-weight: 700;
        width: 100%;
      }
      .sh-dual-lbl {
        font-size: 9.5px;
        font-weight: 900;
        letter-spacing: .3px;
        opacity: .8;
        white-space: nowrap;
      }
      .sh-dual-lbl.real { color: #4a7a55; }
      .sh-dual-lbl.weighted { color: #3a5faa; }

      /* 加權數字角標 */
      .wt-badge {
        display: inline-block;
        font-size: 10px;
        font-weight: 800;
        color: #3a6aaa;
        background: rgba(58, 106, 170, .1);
        border: 1px solid rgba(58, 106, 170, .25);
        border-radius: 5px;
        padding: 1px 5px;
        margin-left: 4px;
        vertical-align: middle;
        white-space: nowrap;
        letter-spacing: 0;
      }
      /* 整體卡裡的加權角標（白底版） */
      .wc-badge {
        display: inline-block;
        font-size: 11px;
        font-weight: 800;
        color: #7ab0f0;
        background: rgba(122, 176, 240, .15);
        border: 1px solid rgba(122, 176, 240, .3);
        border-radius: 5px;
        padding: 1px 6px;
        margin-left: 6px;
        vertical-align: middle;
        white-space: nowrap;
      }

      .td-name {
        font-weight: 700;
        font-size: 13px;
      }

      .td-sub {
        color: var(--sub);
        font-size: 12px;
      }

      .td-status {
        font-size: 11px;
        font-weight: 800;
        padding: 8px 8px !important;
        overflow: visible !important;
        text-overflow: clip !important;
        white-space: nowrap !important;
      }

      .td-st-g {
        color: #1e6e35;
        background: #f0faf4 !important;
      }

      .td-st-y {
        color: #7a5500;
        background: #fdf8ed !important;
      }

      .td-st-p {
        color: #5b21b6;
        background: #f5f3ff !important;
      }

      .td-st-o {
        color: #92400e;
        background: #fff7ed !important;
      }

      .td-st-r {
        color: #9e1f18;
        background: #fdf0ef !important;
      }

      /* ══ 動畫 ══ */
      @keyframes cardPop {
        from {
          opacity: 0;
          transform: translateY(12px) scale(.97);
        }

        to {
          opacity: 1;
          transform: none;
        }
      }

      @keyframes miniSlide {
        from {
          opacity: 0;
          transform: translateX(-8px);
        }

        to {
          opacity: 1;
          transform: none;
        }
      }

      @keyframes panelFade {
        from {
          opacity: 0;
          transform: translateY(6px);
        }

        to {
          opacity: 1;
          transform: none;
        }
      }

      .big-card:nth-child(1) {
        animation-delay: .03s
      }

      .big-card:nth-child(2) {
        animation-delay: .07s
      }

      .big-card:nth-child(3) {
        animation-delay: .11s
      }

      .big-card:nth-child(4) {
        animation-delay: .15s
      }

      .big-card:nth-child(5) {
        animation-delay: .19s
      }

      .big-card:nth-child(6) {
        animation-delay: .23s
      }

      .big-card:nth-child(n+7) {
        animation-delay: .27s
      }

      .mini-card:nth-child(1) {
        animation-delay: .02s
      }

      .mini-card:nth-child(2) {
        animation-delay: .05s
      }

      .mini-card:nth-child(3) {
        animation-delay: .08s
      }

      .mini-card:nth-child(n+4) {
        animation-delay: .12s
      }

      .staff-card:nth-child(2) {
        animation-delay: .04s
      }

      .staff-card:nth-child(3) {
        animation-delay: .08s
      }

      .staff-card:nth-child(4) {
        animation-delay: .12s
      }

      .staff-card:nth-child(5) {
        animation-delay: .16s
      }

      .staff-card:nth-child(6) {
        animation-delay: .20s
      }

      .staff-card:nth-child(n+7) {
        animation-delay: .24s
      }

      /* ══ 空狀態 ══ */
      .empty {
        grid-column: 1/-1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 60px 20px;
        gap: 10px;
        color: var(--sub);
        font-size: 13px;
      }

      /* ══ 載入 ══ */
      #loading {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: var(--bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
      }

      #loading-txt {
        font-size: 12px;
        letter-spacing: 3px;
        color: var(--sub);
        font-weight: 600;
      }

      /* ══ clear btn ══ */
      #clear-btn {
        display: none;
        padding: 4px 11px;
        border-radius: 7px;
        border: 1.5px solid #c62828;
        background: #fff5f5;
        color: #c62828;
        font-size: 11px;
        font-weight: 700;
        cursor: pointer;
        white-space: nowrap;
      }

      /* ══ Multi-Select ══ */
      .ms-wrap {
        position: relative;
        display: inline-flex;
        flex-direction: column;
        flex-shrink: 0;
      }

      .ms-btn {
        text-align: left;
        cursor: pointer;
        min-width: 90px;
        max-width: 150px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .ms-btn:disabled {
        opacity: .45;
        cursor: default;
      }

      .ms-btn.has-filter {
        border-color: var(--primary) !important;
        color: var(--primary-d) !important;
        background: rgba(139, 166, 144, .1) !important;
      }

      .ms-drop {
        display: none;
        position: absolute;
        top: calc(100% + 4px);
        left: 0;
        z-index: 500;
        background: #fff;
        border: 1px solid rgba(0, 0, 0, .12);
        border-radius: 10px;
        box-shadow: 0 8px 28px rgba(0, 0, 0, .14);
        padding: 6px 0;
        min-width: 160px;
        max-width: 240px;
        max-height: 320px;
        overflow-y: auto;
        white-space: nowrap;
      }

      .ms-drop.open {
        display: block;
      }

      .ms-drop-mm {
        position: static !important;
        width: 100% !important;
        max-width: 100% !important;
        border-radius: 8px;
        margin-top: 4px;
        box-shadow: 0 4px 12px rgba(0, 0, 0, .1);
      }

      .ms-drop-actions {
        display: flex;
        gap: 6px;
        padding: 6px 10px 4px;
        border-bottom: 1px solid rgba(0, 0, 0, .06);
      }

      .ms-act-btn {
        padding: 3px 10px;
        border-radius: 6px;
        font-size: 11px;
        font-weight: 700;
        border: 1px solid rgba(0, 0, 0, .12);
        background: rgba(0, 0, 0, .04);
        cursor: pointer;
        font-family: inherit;
        flex: 1;
        transition: all .12s;
      }

      .ms-act-btn:hover {
        background: rgba(139, 166, 144, .15);
        border-color: var(--primary);
      }

      .ms-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
        color: var(--text);
        transition: background .1s;
        user-select: none;
      }

      .ms-item:hover {
        background: rgba(139, 166, 144, .1);
      }

      .ms-item input[type=checkbox] {
        width: 14px;
        height: 14px;
        cursor: pointer;
        accent-color: var(--primary-d);
        flex-shrink: 0;
      }

      .ms-item label {
        cursor: pointer;
        flex: 1;
      }

      #hamburger {
        display: none;
        background: none;
        border: none;
        cursor: pointer;
        padding: 6px;
        flex-shrink: 0;
        color: var(--text);
        margin-left: auto;
      }

      #mobile-menu {
        display: none;
        position: fixed;
        top: 48px;
        left: 0;
        right: 0;
        z-index: 300;
        flex-direction: column;
        gap: 0;
        background: var(--bg);
        border-bottom: 2px solid rgba(0, 0, 0, .1);
        box-shadow: 0 8px 32px rgba(0, 0, 0, .2);
        overflow-y: auto;
        max-height: calc(100vh - 48px);
      }

      #mobile-menu.open {
        display: flex;
      }

      #mm-overlay {
        display: none;
        position: fixed;
        inset: 0;
        top: 48px;
        z-index: 299;
        background: rgba(0, 0, 0, .4);
      }

      #mm-overlay.open {
        display: block;
      }

      .mm-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px 10px;
        border-bottom: 1px solid rgba(0, 0, 0, .07);
        background: rgba(255, 255, 255, .6);
      }

      .mm-title {
        font-size: 13px;
        font-weight: 800;
        color: var(--text);
      }

      #mm-close-btn {
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px 8px;
        font-size: 18px;
        color: var(--sub);
        line-height: 1;
      }

      .mm-section {
        padding: 10px 14px;
        border-bottom: 1px solid rgba(0, 0, 0, .05);
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .mm-row {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
      }

      .mm-row .tb-label {
        font-size: 11px;
        font-weight: 700;
        color: var(--sub);
        flex-shrink: 0;
        white-space: nowrap;
        width: 34px;
        text-align: right;
      }

      .mm-row .tb-sel {
        flex: 1;
        min-width: 0;
        font-size: 13px;
        padding: 6px 8px;
        border-radius: 7px;
      }

      #mm-chips-row {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
        padding: 10px 14px 12px;
      }

      #mm-chips-row .chip {
        font-size: 12px;
        padding: 5px 12px;
      }

      #mm-chips-row #mm-clear {
        padding: 5px 11px;
        border-radius: 99px;
        font-size: 12px;
        font-weight: 700;
        border: 1.5px solid rgba(0, 0, 0, .12);
        background: rgba(255, 255, 255, .7);
        cursor: pointer;
        font-family: inherit;
        white-space: nowrap;
        margin-left: auto;
        color: #c62828;
        border-color: rgba(198, 40, 40, .3);
      }

      /* ══ MOBILE ══ */
      @media(max-width:768px), (min-width:769px) and (orientation:portrait) {
        #topbar {
          min-height: 52px;
          padding: 0 16px;
          gap: 6px;
          flex-wrap: nowrap;
          overflow: hidden;
          z-index: 200;
        }

        #topbar .sep,
        #topbar .tb-label,
        #topbar .tb-sel,
        #chips,
        #clear-btn,
        #ver-ts {
          display: none !important;
        }

        #title {
          font-size: 15px;
          font-weight: 900;
          flex-shrink: 0;
        }

        #hamburger {
          display: flex;
          align-items: center;
          justify-content: center;
          margin-left: auto;
        }

        #gbar {
          padding: 0 14px;
          min-height: 40px;
          gap: 4px;
          border-bottom: 1px solid rgba(0, 0, 0, .07);
        }

        .gb-btn {
          padding: 5px 12px;
          font-size: 12px;
          font-weight: 700;
          border-radius: 8px;
          white-space: nowrap;
        }

        .gb-sync {
          display: none;
        }

        .gb-seg {
          font-size: 12px;
          font-weight: 600;
          padding: 2px 4px;
        }

        .gb-seg strong {
          font-size: 12px;
        }

        #content-wrap {
          flex-direction: column;
        }

        .col-side,
        .divider,
        #rank-drawer {
          display: none !important;
        }

        #stage {

          display: flex;
          flex-direction: column;
          overflow-y: auto;
          -webkit-overflow-scrolling: touch;
          background: var(--bg);
        }

        .col-main {
          /* 手機不再強制 flex，由 @media (max-width:599px) 的 grid 規則接管 */
          width: 100%;
          background: var(--bg);
        }

        .big-card.whole {
          flex-direction: column !important;
          margin: 12px 12px 4px !important;
          padding: 14px 16px !important;
          border-radius: 14px !important;
          gap: 10px !important;
          height: auto !important;
        }

        .wc-left {
          flex-direction: row !important;
          align-items: baseline !important;
          gap: 10px !important;
        }

        .wc-label {
          font-size: 13px !important;
          opacity: .65;
        }

        .wc-total {
          font-size: 42px !important;
          line-height: 1 !important;
          letter-spacing: -2px !important;
        }

        .wc-divider {
          display: none !important;
        }

        .wc-right {
          gap: 8px !important;
        }

        .wc-track {
          height: 7px !important;
        }

        .wc-stats {
          gap: 0 !important;
          flex-wrap: nowrap !important;
        }

        .wc-st {
          flex: 1 !important;
          padding: 5px 6px !important;
        }

        .wc-st-lbl {
          font-size: 9px !important;
        }

        .wc-st-num {
          font-size: 18px !important;
          letter-spacing: -1px !important;
        }

        .wc-st-pct {
          font-size: 18px !important;
        }

        .big-card:not(.whole) {
          display: block;
          height: auto;
          margin: 0;
          padding: 11px 16px 10px;
          border-radius: 0;
          border: none;
          border-bottom: 1px solid rgba(0, 0, 0, .055);
          box-shadow: none;
          background: #ffffff;
          transform: none;
          cursor: pointer;
          -webkit-tap-highlight-color: rgba(139, 166, 144, .12);
          transition: background .1s;
        }

        .big-card:not(.whole):active {
          background: #f5f8f5;
        }

        .big-card:not(.whole).sel {
          background: #f0f7f1;
          border-left: 3px solid var(--primary);
          padding-left: 13px;
        }

        .big-card.bc-top1::after,
        .big-card.bc-top2::after,
        .big-card.bc-top3::after {
          display: none;
        }

        .bc-head {
          display: flex;
          flex-direction: row;
          justify-content: space-between;
          align-items: center;
          gap: 6px;
          flex-wrap: wrap;
          margin-bottom: 4px;
        }

        .bc-name {
          font-size: 15px;
          font-weight: 800;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
          flex: 1;
          min-width: 0;
        }

        .bc-total {
          font-size: 24px;
          font-weight: 900;
          letter-spacing: -1px;
          line-height: 1;
          flex-shrink: 0;
        }

        .bc-track {
          height: 5px;
          border-radius: 3px;
          margin-bottom: 6px;
        }

        .bc-stats      { display: none; }
        .bc-inline-stats { display: flex; gap: 8px; flex-wrap: wrap; }
        .bc-inline-pct,
        .bc-inline-num { font-size: 13px; }

        .staff-summary {
          margin: 12px 12px 0;
          padding: 12px 14px;
          border-radius: 14px;
          flex-wrap: nowrap;
          gap: 10px;
        }

        .staff-card {
          display: block;
          margin: 0;
          padding: 11px 16px 10px;
          border-radius: 0;
          border: none;
          border-bottom: 1px solid rgba(0, 0, 0, .055);
          box-shadow: none;
          background: #fff;
          transform: none;
          cursor: pointer;
          -webkit-tap-highlight-color: rgba(139, 166, 144, .12);
          transition: background .1s;
        }

        .staff-card:active { background: #f5f8f5; }
        .staff-card.sel    { background: #f0f7f1; border-left: 3px solid var(--primary); padding-left: 13px; }

        .sc-head {
          display: flex;
          flex-direction: row;
          justify-content: space-between;
          align-items: center;
          flex-wrap: wrap;
          padding: 0;
          gap: 6px;
          margin-bottom: 4px;
        }

        statusColIdxs.forEach(function(i) {
          if (headers[i].indexOf('未填寫') >= 0) unfilled = i;
          else others.push(i);
        });
        var ordered = others.slice();
        if (unfilled >= 0) ordered.push(unfilled);
        else if (ordered.length) ordered.push(ordered.pop());
        var statuses = ordered.map(function(colIdx, i) {
          var isLast = (i === ordered.length - 1);

          var emoji = isLast ? '🔴' : STATUS_EMOJI_ORDER[Math.min(i, STATUS_EMOJI_ORDER.length - 1)];
          return {
            key: isLast ? 'u' : ['l', 'n', 'p', 'o'][Math.min(i, 3)],

      function gv(row, key) {
        var i = CI[key];
        var v = (i >= 0 && row[i] != null) ? String(row[i]).trim() : '';
        /* defaultChannel：當 channel 欄位不存在時，回傳 cfg 設定的預設通路 */

      function gs(row) {

      /* ══ 工具 ══ */
      function stat(rows) {
        var s = { t: 0 };
        curStatuses.forEach(function(st) { s[st.key] = 0; });
        rows.forEach(function(r) {
          var k = gs(r);
          if (s[k] !== undefined) s[k]++;
          else s[k] = 1;
          s.t++;
        });
        return s;
      }

      /* combo 模式下分母只算有「查核達成」欄（l+y）的店；其餘模式回傳 s.t */
      function statBase(s) {
        if (_curCfg && _curCfg.statusMode === 'combo') {
          return (s['l'] || 0) + (s['y'] || 0);
        }
        return s.t;
      }

      var _pctDecimals = 0; /* 由 cfg.pctDecimals 控制，預設0位小數 */
      function pct(a, b) {
        if (b <= 0) return _pctDecimals > 0 ? (0).toFixed(_pctDecimals) : 0;
        var v = a / b * 100;
        return _pctDecimals > 0 ? v.toFixed(_pctDecimals) : Math.round(v);
      }

      function visitsSum(rows) {
        if (CI['visits'] < 0) return -1;

      function visitsWeightedDetail(rows) {
        var cfg = _curCfg;
        if (!cfg || !cfg.cvsWeightChannel || !cfg.cvsWeightCap) return null;
        if (CI['visits'] < 0) return null;
        var cvsCh = cfg.cvsWeightChannel;
        var nonCvsVisits = 0, cvsVisits = 0;
        rows.forEach(function(r) {
          var ch = gv(r, 'channel') || '（其他）';
          var v = parseFloat(gv(r, 'visits')) || 0;
          if (ch === cvsCh) cvsVisits += v;
          else nonCvsVisits += v;
        });
        return {
          real: nonCvsVisits + cvsVisits,
          nonCvs: nonCvsVisits,
          cvs: cvsVisits
        };
      }

      function statWeighted(rows) {
        var cfg = _curCfg;
        if (!cfg || !cfg.cvsWeightChannel || !cfg.cvsWeightCap) return null;
        var cap = cfg.cvsWeightCap;
        var cvsCh = cfg.cvsWeightChannel;
        var wl = 0, wu = 0, wt = 0;
        var groups = {};
        rows.forEach(function(r) {
          var ch = gv(r, 'channel') || '（其他）';
          if (!groups[ch]) groups[ch] = { l: 0, u: 0, t: 0 };
          groups[ch].t++;
          if (gs(r) === 'l') groups[ch].l++;
          else groups[ch].u++;
        });
        Object.keys(groups).forEach(function(ch) {
          var g = groups[ch];
          if (ch === cvsCh && g.t > 0) {
            var rate = g.l / g.t;
            if (rate >= cap) {
              wl += g.l;
              wu += 0;
              wt += g.l;
            } else {
              wl += g.l;
              wu += g.u;
              wt += g.t;
            }
          } else {
            wl += g.l;
            wu += g.u;
            wt += g.t;
          }
        });
        var realS = stat(rows);
        if (wl === realS.l && wt === realS.t) return null;
        return { wl: wl, wu: wu, wt: wt };
      }

      function statByChannel(rows) {
        var cfg = _curCfg;
        if (!cfg || !cfg.cvsWeightChannel || !cfg.cvsWeightCap) return null;
        var cvsCh = cfg.cvsWeightChannel;
        var cap = cfg.cvsWeightCap;
        var nc = { l: 0, u: 0, t: 0 };
        var cv = { l: 0, u: 0, t: 0 };
        rows.forEach(function(r) {
          var ch = gv(r, 'channel') || '';
          var key = gs(r);
          var target = (ch === cvsCh) ? cv : nc;
          target.t++;
          if (key === 'l') target.l++;
          else target.u++;

        cv.weighted = (cv.t > 0 && cv.l / cv.t >= cap);
        return { nonCvs: nc, cvs: cv };

      function fetchSyncTime(id, sheet, cell) {
        var url = 'https://docs.google.com/spreadsheets/d/' + id + '/gviz/tq?tqx=out:json&sheet=' + encodeURIComponent(sheet) + '&range=' + cell;
        return fetch(url).then(function(r) {
          return r.text();
        }).then(function(txt) {
          var s = txt.indexOf('{'), e = txt.lastIndexOf('}');
          if (s < 0) return '';
          var json = JSON.parse(txt.slice(s, e + 1));
          var cell = json.table && json.table.rows && json.table.rows[0] && json.table.rows[0].c && json.table.rows[0].c[0];
          if (!cell) return '';
          var raw = cell.f || cell.v || '';
          raw = String(raw).trim();
          var dm = raw.match(/^Date\((\d+),(\d+),(\d+),(\d+),(\d+),(\d+)\)$/);
          if (dm) {
            var Y = dm[1], M = String(Number(dm[2]) + 1).padStart(2, '0'), D = String(dm[3]).padStart(2, '0'),
              hh = String(dm[4]).padStart(2, '0'), mm = String(dm[5]).padStart(2, '0'), ss = String(dm[6]).padStart(2, '0');
            return Y + '/' + M + '/' + D + ' ' + hh + ':' + mm + ':' + ss;
          }
          var sm = raw.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})\s+(\d{1,2}):(\d{2}):(\d{2})$/);
          if (sm) {
            var Y = sm[1], M = String(sm[2]).padStart(2, '0'), D = String(sm[3]).padStart(2, '0'),
              hh = String(sm[4]).padStart(2, '0'), mm = sm[5], ss = sm[6];
            return Y + '/' + M + '/' + D + ' ' + hh + ':' + mm + ':' + ss;
          }
          return raw;
        }).catch(function() { return ''; });
