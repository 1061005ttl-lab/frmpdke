<!--
================================================================================
  業務王看板入口 (index.html)
  版本：Ver. 1.0.0 ｜ 最後更新：2026-06-19 00:00
================================================================================

【這個檔案在做什麼】
  這是整個「業務王看板」系統的唯一入口頁。
  它從一張 Google Sheets 管理表讀取所有子專案的設定，
  然後把專案以卡片方式列出，讓使用者點擊後跳轉到對應的看板頁面。

【登入機制】
  - 密碼從管理表（登入與頁面設定）的「密碼」列動態讀取。
  - 登入狀態存在 localStorage（key: ttl_auth_v1），關閉分頁後仍保留。
  - 登出或清除瀏覽器資料後須重新登入。

【管理表結構（Google Sheets: MGMT_ID）】

  工作表①「登入與頁面設定」
  ┌──────────┬──────────────────┬──────────────────────┐
  │ A: 鍵值   │ B: 值             │ C: 備註              │
  ├──────────┼──────────────────┼──────────────────────┤
  │ 密碼      │ ttl（可改）       │                      │
  │ 頁面對照  │ 獎勵達成型        │ award_board.html     │
  └──────────┴──────────────────┴──────────────────────┘
  → 可在此新增「看板類型名稱 → HTML 檔名」的對照關係。

  工作表②「專案管理」
  ┌──────┬──────────┬────────────────┬────────────┬────────┬──────┬──────────────┐
  │ A    │ B        │ C              │ D          │ E      │ F    │ G            │
  │ 啟用 │ 專案名稱  │ 試算表 ID      │ 資料工作表 │ 輔助表  │ 儲存格│ 看板類型     │
  ├──────┼──────────┼────────────────┼────────────┼────────┼──────┼──────────────┤
  │ ON   │ CVS春季…  │ 1aBcD…（44碼） │ 店家名冊   │ 輔助   │ B1   │ 達成率型     │
  │ OFF  │ 舊專案    │ 1xYzW…        │ 店家名冊   │ 輔助   │ B1   │ 達成率型     │
  └──────┴──────────┴────────────────┴────────────┴────────┴──────┴──────────────┘
  → A 欄填 ON 為進行中（可點擊），填 OFF 為已結束（灰化、折疊顯示、不可點擊）。
  → E/F 欄指定從哪張工作表的哪個儲存格讀取「最後同步時間」，顯示在卡片底部。

【OFF 專案為何還顯示卡片】
  OFF 只代表活動結束、資料不再更新，但歷史資料仍有檢視價值。
  OFF 卡片灰化（視覺區隔）但仍可點擊，跳轉到對應看板查看歷史資料。
  折疊在「已結束專案」底下，避免干擾進行中專案的操作。

【看板類型與對應頁面（預設）】
  達成率型   → achievement_board.html  （以箱數/業績達成率為主）
  覆蓋率型   → coverage_board.html     （以店數覆蓋/陳列為主）
  獎勵達成型 → award_board.html        （以季度獎勵達成為主）

【跳轉方式】
  點擊卡片後以 window.location.href 同分頁跳轉，
  並在 URL 帶上 ?sheetId=xxx 讓目標頁面知道要讀哪張試算表。

【卡片上的「🔄 更新」按鈕（手動觸發資料同步）】
  - 這顆按鈕跟「業務王同步中心」(sync.html) 共用同一個後端入口
    SYNC_GAS_URL（同一個 Google Apps Script Web App）。
  - 只有「ON（進行中）」且「專案名稱（去掉括號內的日期後）」能在
    SYNC_TASK_MAP 對照表裡找到對應任務名稱的卡片，才會顯示這顆按鈕。
    OFF（已結束）的卡片一律不顯示，不受 SYNC_TASK_MAP 影響。
  - 沒有列在 SYNC_TASK_MAP 裡的 ON 專案（例如彙總多張表的「進度表」類
    專案），代表它的資料不是靠單一同步任務產生，沒有對應的按鈕可以
    觸發，所以卡片上自然不會出現「🔄 更新」——這是預期行為，不是漏寫。
  - 點擊流程：① 先呼叫 SYNC_GAS_URL?action=getTasks 取得最新任務清單，
    用「任務名稱」在清單裡找出對應任務 ② 用該任務的 _originalIndex
    呼叫 SYNC_GAS_URL 的 action=syncTask 觸發後端同步 ③ 成功後重新讀取
    這張卡片自己的「同步時間」儲存格，更新卡片上顯示的時間文字。
  - 如果某個 ON 專案明明該有更新功能卻沒顯示按鈕，先檢查
    SYNC_TASK_MAP 裡有沒有對應的項目；如果某個按鈕點了一直失敗，
    先確認 SYNC_TASK_MAP 右邊填的任務名稱有沒有跟 sync.html 裡顯示的
    任務名稱「一字不差」對上（沒有比對到會直接跳過、不會誤觸發其他
    任務的同步）。

【常數位置（需要改設定時看這裡）】
  MGMT_ID      → 管理表的 Google Sheets ID
  LOGIN_SHEET  → 登入設定的工作表名稱
  PROJ_SHEET   → 專案清單的工作表名稱
  SYNC_TIMEOUT → 同步時間讀取逾時（毫秒，預設 8000）
  SYNC_GAS_URL → 業務王同步工具的後端入口（跟 sync.html 共用）
  SYNC_TASK_MAP→ 看板專案名稱 → 同步任務名稱 對照表，決定哪些卡片
                 會出現「🔄 更新」按鈕

================================================================================
-->

<style>
:root{
  --primary:#8BA690;--primary-d:#6a8a70;
  --bg:#F0EDE6;--card:#FFFFFF;
  --red:#d93025;--text:#2D2D2D;--sub:#888;
  --border:rgba(0,0,0,0.09);
  --glass:rgba(255,255,255,0.78);
  --r:12px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'Microsoft JhengHei','Noto Sans TC',sans-serif;}
body{background:var(--bg);color:var(--text);min-height:100vh;}

#login-screen{
  position:fixed;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;z-index:1000;
}
.login-box{
  background:#fff;border-radius:20px;padding:48px 44px 40px;
  box-shadow:0 12px 48px rgba(0,0,0,.12);width:360px;text-align:center;
}
.login-logo{font-size:36px;margin-bottom:8px;}
.login-title{font-size:20px;font-weight:900;color:var(--primary-d);letter-spacing:.5px;margin-bottom:4px;}
.login-sub{font-size:12px;color:var(--sub);margin-bottom:32px;}
.login-label{font-size:12px;font-weight:700;color:var(--sub);text-align:left;display:block;margin-bottom:6px;}
.login-input{
  width:100%;padding:11px 16px;border:1.5px solid var(--border);border-radius:10px;
  font-size:16px;font-family:inherit;color:var(--text);background:#fafafa;outline:none;
  transition:border-color .15s,box-shadow .15s;letter-spacing:3px;text-align:center;margin-bottom:16px;
}
.login-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(139,166,144,.15);}
.login-input.shake{animation:shake .3s ease;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
.login-btn{
  width:100%;padding:12px;background:var(--primary);border:none;border-radius:10px;
  color:#fff;font-size:15px;font-weight:900;font-family:inherit;cursor:pointer;
  transition:background .15s,transform .1s;
}
.login-btn:hover{background:var(--primary-d);}
.login-btn:active{transform:scale(.98);}
.login-btn:disabled{background:#ccc;cursor:not-allowed;}
.login-err{font-size:12px;color:var(--red);margin-top:10px;min-height:18px;font-weight:600;}

#loading-screen{
  position:fixed;inset:0;background:rgba(240,237,230,.9);
  display:none;align-items:center;justify-content:center;
  flex-direction:column;gap:16px;z-index:900;
}
#loading-screen.show{display:flex;}
.spinner{
  width:44px;height:44px;border:4px solid rgba(139,166,144,.2);
  border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:13px;color:var(--sub);font-weight:600;}

#main-screen{display:none;flex-direction:column;min-height:100vh;}
#topbar{
  flex-shrink:0;background:var(--glass);backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,.55);padding:0 20px;
  display:flex;align-items:center;gap:10px;min-height:48px;
  position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.07);
}
#tb-title{font-size:15px;font-weight:900;color:var(--primary-d);flex:1;}
.tb-logout{
  font-size:12px;color:var(--sub);cursor:pointer;padding:4px 10px;
  border:1px solid var(--border);border-radius:6px;background:#fff;
  font-family:inherit;transition:all .14s;
}
.tb-logout:hover{border-color:var(--red);color:var(--red);}
.tb-sync-link{
  font-size:12px;color:var(--primary-d);cursor:pointer;padding:4px 10px;
  border:1px solid var(--primary);border-radius:6px;background:#fff;
  font-family:inherit;transition:all .14s;text-decoration:none;
  display:inline-flex;align-items:center;gap:4px;white-space:nowrap;
}
.tb-sync-link:hover{background:var(--primary);color:#fff;}

#stage{padding:20px 24px 60px;flex:1;}
.section-label{
  font-size:11px;font-weight:700;color:var(--sub);
  letter-spacing:.08em;margin-bottom:12px;margin-top:28px;
}
.section-label:first-child{margin-top:0;}
.proj-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:12px;margin-bottom:8px;
}
.proj-card{
  background:#fff;border:1px solid var(--border);border-radius:var(--r);
  padding:20px 20px 16px;cursor:pointer;position:relative;overflow:hidden;
  transition:transform .25s cubic-bezier(.34,1.05,.64,1),box-shadow .25s;
}
.proj-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.10);}
.proj-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--accent,#8BA690);border-radius:var(--r) var(--r) 0 0;
}
.proj-card.off{opacity:.55;}
.badge{
  display:inline-block;font-size:10px;font-weight:700;
  padding:2px 8px;border-radius:5px;margin-bottom:8px;
  background:var(--badge-bg,rgba(139,166,144,.12));
  color:var(--badge-fg,#4a7a55);
}
.proj-name{font-size:16px;font-weight:900;color:var(--text);margin-bottom:8px;line-height:1.35;}
.proj-sync{font-size:11px;color:var(--sub);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);min-height:20px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.proj-update-btn{
  flex-shrink:0;width:24px;height:24px;border-radius:50%;
  border:1.5px solid var(--primary);background:#fff;color:var(--primary-d);
  font-size:12px;line-height:1;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background .15s,color .15s,transform .12s;
}
.proj-update-btn:hover{background:var(--primary);color:#fff;}
.proj-update-btn:active{transform:scale(.88);}
.proj-update-btn:disabled{cursor:not-allowed;background:#f2f2f2;border-color:var(--border);color:var(--sub);}
.proj-arrow{
  position:absolute;right:16px;top:50%;transform:translateY(-50%);
  font-size:20px;color:rgba(139,166,144,.35);transition:color .15s,right .15s;
}
.proj-card:hover .proj-arrow{color:var(--primary);right:12px;}
.off-toggle{
  font-size:12px;color:var(--sub);cursor:pointer;margin-top:20px;
  padding:6px 0;display:inline-flex;align-items:center;gap:5px;user-select:none;
}
.off-toggle:hover{color:var(--primary-d);}
#off-section{display:none;margin-top:10px;}
.empty{padding:60px 20px;text-align:center;color:var(--sub);font-size:14px;}
</style>
</head>
<body>

<div id="login-screen" style="display:none">
  <div class="login-box">
    <div class="login-logo">&#x1F451;</div>
    <div class="login-title">業務王看板</div>
    <div class="login-sub">TTL 內部系統，請輸入公司標識進入</div>
    <label class="login-label">公司英文簡稱</label>
    <input class="login-input" id="login-input" type="password"
      placeholder="請輸入…" onkeydown="if(event.key==='Enter')doLogin()"
      autocomplete="off" spellcheck="false">
    <button class="login-btn" id="login-btn" onclick="doLogin()">進入看板</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<div id="loading-screen">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">初始化中…</div>
</div>

<div id="main-screen">
  <div id="topbar">
    <span id="tb-title">業務王看板</span>
    <a class="tb-sync-link" href="sync.html" title="前往業務王同步中心">🔄 同步中心</a>
    <button class="tb-logout" onclick="doLogout()">登出</button>
  </div>
  <div id="stage"></div>
</div>

<script>

/* ══ 設定 ══ */
var MGMT_ID     = '1PR9OR7BIGyTpcH8QSMRXkPhQTr4h3m0UK3gET29f19s';
var LOGIN_SHEET = '登入與頁面設定';
var PROJ_SHEET  = '專案管理';
var AUTH_KEY    = 'ttl_auth_v1';

/* 同步時間 fetch 逾時（毫秒） */
var SYNC_TIMEOUT = 8000;

/* 業務王同步工具的後端入口，跟 sync.html 共用同一個 GAS Web App */
var SYNC_GAS_URL = 'https://script.google.com/macros/s/AKfycbwNmy6uS6NiOzMNJfVeWn7R98tub-DWHPNaj2FW5BnVneq-KbSZ82yYDuIvVLEk_dKPaA/exec';

/* 「看板專案名稱(去掉括號日期後)」→「業務王同步工具裡的任務名稱」對照表。
   只有 ON 的專案、且名稱能在這裡找到對應項目，卡片才會顯示「🔄 更新」
   按鈕；沒列在這裡的 ON 專案，代表它的資料是用別的方式產生（例如彙總
   多張表的進度表），沒有單一同步任務可以觸發，所以不會出現按鈕，這是
   正常現象。日後新增/調整對應關係，改這個物件就好，不用動其他邏輯。
   右邊的任務名稱必須跟 sync.html 上顯示的名稱「一字不差」。 */
var SYNC_TASK_MAP = {
  'CVS米酒PET商化':   'CVS米酒PET商化',
  'CVS雲泡上架':      'CVS雲泡上架調查',
  'CVS雲泡二位陳列':  'CVS雲泡二位陳列',
  '全聯A級':          '全聯A級巡補',
  '量販A級巡補':      '量販A級巡補'
};

/* ══ 狀態 ══ */
var _password = 'ttl';
var _pageMap  = {
  '達成率型':  'achievement_board.html',
  '覆蓋率型':  'coverage_board.html',
  '獎勵達成型':'award_board.html'
};
var _surveys = { on:[], off:[] };

/* ══ 工具 ══ */
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* 去掉專案名稱尾端的括號日期，例如「CVS米酒PET商化(26.6.1-6.30)」→
   「CVS米酒PET商化」，用來跟 SYNC_TASK_MAP 的左邊鍵值比對。 */
function stripDateSuffix(name){
  return String(name||'').replace(/[\(（][^\)）]*[\)）]\s*$/, '').trim();
}

function parseGvizDate(v){
  var m = String(v).match(/Date\((\d+),(\d+),(\d+),(\d+),(\d+),(\d+)\)/);
  if(!m) return String(v);
  var d = new Date(+m[1],+m[2],+m[3],+m[4],+m[5],+m[6]);
  return d.toLocaleString('zh-TW',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}

function cv(c){ return c?(c.v!==null&&c.v!==undefined?c.v:c.f||''):''; }

function gvizFetch(sheetId, sheetName){
  var url = 'https://docs.google.com/spreadsheets/d/'+sheetId+
    '/gviz/tq?tqx=out:json&sheet='+encodeURIComponent(sheetName);
  return fetch(url)
    .then(function(r){ return r.text(); })
    .then(function(txt){ return JSON.parse(txt.replace(/^[^\(]+\(/,'').replace(/\);?\s*$/,'')); });
}

/* fetch 加逾時包裝 */
function fetchWithTimeout(url, ms){
  return Promise.race([
    fetch(url),
    new Promise(function(_,rej){
      setTimeout(function(){ rej(new Error('timeout')); }, ms);
    })
  ]);
}

/* ══ 表頭列偵測：跳過明顯是佔位文字的列 ══ */
var HEADER_KEYWORDS = ['專案名','試算表 ID','試算表ID','sheetid','project','專案'];
function isHeaderRow(name, sid){
  var n = name.toLowerCase(), s = sid.toLowerCase();
  for(var i=0;i<HEADER_KEYWORDS.length;i++){
    if(n === HEADER_KEYWORDS[i].toLowerCase()) return true;
  }
  /* sid 不像真實 Google Sheets ID（長度通常 44 字元，只含英數字與 -_） */
  if(sid.length < 20) return true;
  return false;
}

/* ══ Auth ══ */
function setAuth(){ localStorage.setItem(AUTH_KEY,'1'); }
function clearAuth(){ localStorage.removeItem(AUTH_KEY); }
function hasAuth(){ return localStorage.getItem(AUTH_KEY)==='1'; }

/* ══ Loading ══ */
function showLoading(msg){
  document.getElementById('loading-text').textContent = msg||'載入中…';
  document.getElementById('loading-screen').classList.add('show');
}
function hideLoading(){
  document.getElementById('loading-screen').classList.remove('show');
}

/* ══ 讀登入設定（更新密碼和頁面對照） ══ */
function loadLoginConfig(){
  return gvizFetch(MGMT_ID, LOGIN_SHEET)
    .then(function(json){
      var rows=(json.table&&json.table.rows)||[];
      rows.forEach(function(row){
        var cells=row.c||[];
        var key=String(cv(cells[0])).trim();
        var b=String(cv(cells[1])).trim();
        var c=String(cv(cells[2])).trim();
        if(key==='密碼') _password=b.toLowerCase();
        if(key==='頁面對照'&&b&&c) _pageMap[b]=c;
      });
    })
    .catch(function(){});
}

/* ══ 登入 ══ */
function doLogin(){
  var input=document.getElementById('login-input');
  var btn=document.getElementById('login-btn');
  var err=document.getElementById('login-err');
  var val=input.value.trim().toLowerCase();
  if(!val){ err.textContent='請輸入公司英文簡稱'; shakeInput(); return; }
  if(val!==_password){ err.textContent='符號錯誤，請再試一次'; input.value=''; shakeInput(); input.focus(); return; }
  err.textContent='';
  btn.disabled=true; btn.textContent='驗證中…';
  setAuth();
  document.getElementById('login-screen').style.display='none';
  showLoading('載入專案清單…');
  loadProjects();
}

function shakeInput(){
  var el=document.getElementById('login-input');
  el.classList.remove('shake'); void el.offsetWidth; el.classList.add('shake');
  setTimeout(function(){ el.classList.remove('shake'); },400);
}

function doLogout(){
  clearAuth(); location.reload();
}

/* ══ 讀專案清單 ══ */
function loadProjects(){
  gvizFetch(MGMT_ID, PROJ_SHEET)
    .then(function(json){
      var rows=(json.table&&json.table.rows)||[];
      var onList=[],offList=[];
      rows.forEach(function(row){
        var cells=row.c||[];
        var active=String(cv(cells[0])).trim().toUpperCase()==='ON';
        var name=String(cv(cells[1])).trim();
        var sid=String(cv(cells[2])).trim();
        var sheet=String(cv(cells[3])).trim()||'店家名冊';
        var sync=String(cv(cells[4])).trim()||'輔助';
        var cell=String(cv(cells[5])).trim()||'B1';
        var btype=String(cv(cells[6])).trim()||'達成率型';
        /* ── 修正①：跳過空列與表頭佔位列 ── */
        if(!name||!sid) return;
        if(isHeaderRow(name,sid)) return;
        var p={name:name,id:sid,sheet:sheet,syncSheet:sync,syncCell:cell,boardType:btype};
        if(active) onList.push(p); else offList.push(p);
      });
      _surveys={on:onList,off:offList};
      hideLoading();
      renderPortal();
      fetchAllSyncTimes(onList.concat(offList));
    })
    .catch(function(){
      hideLoading();
      document.getElementById('stage').innerHTML='<div class="empty">⚠️ 專案清單載入失敗，請重新整理頁面</div>';
      document.getElementById('main-screen').style.display='flex';
    });
}

/* ══ 渲染入口 ══ */
var TYPE_STYLE={
  '達成率型': {accent:'#8BA690',badgeBg:'rgba(139,166,144,.12)',badgeFg:'#4a7a55',icon:'📊'},
  '覆蓋率型': {accent:'#378ADD',badgeBg:'rgba(55,138,221,.10)',badgeFg:'#1a5fa8',icon:'🗺️'},
  '獎勵達成型':{accent:'#d4900a',badgeBg:'rgba(212,144,10,.10)',badgeFg:'#7a5000',icon:'🏆'}
};

function renderPortal(){
  document.getElementById('main-screen').style.display='flex';
  var stage=document.getElementById('stage');
  stage.innerHTML='';
  if(!_surveys.on.length&&!_surveys.off.length){
    stage.innerHTML='<div class="empty">目前沒有專案</div>'; return;
  }
  if(_surveys.on.length){
    var lbl=document.createElement('div');
    lbl.className='section-label'; lbl.textContent='🟢  進行中專案';
    stage.appendChild(lbl);
    var grid=document.createElement('div'); grid.className='proj-grid';
    _surveys.on.forEach(function(p){ grid.appendChild(buildCard(p,false)); });
    stage.appendChild(grid);
  }
  if(_surveys.off.length){
    var toggle=document.createElement('div');
    toggle.className='off-toggle';
    toggle.innerHTML='▶ 已結束專案（'+_surveys.off.length+'個）';
    toggle.onclick=function(){
      var sec=document.getElementById('off-section');
      var open=sec.style.display==='block';
      sec.style.display=open?'none':'block';
      toggle.innerHTML=(open?'▶':'▼')+' 已結束專案（'+_surveys.off.length+'個）';
    };
    stage.appendChild(toggle);
    var sec=document.createElement('div'); sec.id='off-section';
    var offGrid=document.createElement('div'); offGrid.className='proj-grid';
    _surveys.off.forEach(function(p){ offGrid.appendChild(buildCard(p,true)); });
    sec.appendChild(offGrid); stage.appendChild(sec);
  }
}

function buildCard(proj,isOff){
  var sty=TYPE_STYLE[proj.boardType]||TYPE_STYLE['達成率型'];
  var card=document.createElement('div');
  card.className='proj-card'+(isOff?' off':'');
  card.id='card-'+proj.id;
  card.style.cssText='--accent:'+sty.accent+';--badge-bg:'+sty.badgeBg+';--badge-fg:'+sty.badgeFg+';';

  /* 只有 ON 的專案才查表；OFF 一律沒有更新按鈕 */
  var taskName = isOff ? null : SYNC_TASK_MAP[stripDateSuffix(proj.name)];
  var updateBtnHtml = taskName
    ? '<button class="proj-update-btn" type="button" title="更新「'+esc(taskName)+'」資料">🔄</button>'
    : '';

  card.innerHTML=
    '<span class="badge">'+sty.icon+' '+esc(proj.boardType)+(isOff?' · 已結束':'')+'</span>'+
    '<div class="proj-name">'+esc(proj.name)+'</div>'+
    '<div class="proj-sync">'+
      '<span id="sync-'+esc(proj.id)+'">⏳ 讀取中…</span>'+
      updateBtnHtml+
    '</div>'+
    '<span class="proj-arrow">›</span>';

  card.addEventListener('click',function(){ openProject(proj); });

  if(taskName){
    var btn = card.querySelector('.proj-update-btn');
    btn.addEventListener('click', function(e){
      e.stopPropagation(); /* 不要連帶觸發卡片本身的跳轉點擊 */
      handleUpdateClick(btn, proj, taskName);
    });
  }
  return card;
}

function openProject(proj){
  var page=_pageMap[proj.boardType];
  if(!page){ alert('找不到對應頁面：'+proj.boardType); return; }
  window.location.href=page+'?sheetId='+encodeURIComponent(proj.id);
}

/* 「🔄 更新」按鈕點擊流程：
   ① 先取得最新任務清單，用「名稱」找出對應任務（不要直接寫死 index，
      因為後端任務清單的順序可能會變動）
   ② 用該任務的 _originalIndex 呼叫 syncTask 觸發後端同步
   ③ 成功後重新讀取這張卡片自己的同步時間，更新卡片上顯示的文字 */
function handleUpdateClick(btn, proj, taskName){
  if(btn.disabled) return;
  btn.disabled = true;
  btn.textContent = '⏳';

  fetch(SYNC_GAS_URL + '?action=getTasks')
    .then(function(r){ return r.json(); })
    .then(function(json){
      if(!json.ok) throw new Error('讀取同步任務清單失敗');
      var match = (json.data||[]).filter(function(t){ return t.name===taskName; })[0];
      if(!match) throw new Error('在同步工具裡找不到任務：'+taskName);
      return fetch(SYNC_GAS_URL, {
        method:'POST',
        body: JSON.stringify({ action:'syncTask', index: match._originalIndex })
      });
    })
    .then(function(r){ return r.json(); })
    .then(function(json){
      if(!json.ok) throw new Error(json.message||'更新失敗');
      btn.textContent = '✅';
      setTimeout(function(){
        fetchOneSyncTime(proj);
        btn.textContent = '🔄';
        btn.disabled = false;
      }, 1200);
    })
    .catch(function(err){
      btn.textContent = '❌';
      btn.title = '更新失敗：'+(err&&err.message||err);
      setTimeout(function(){
        btn.textContent = '🔄';
        btn.title = '更新「'+taskName+'」資料';
        btn.disabled = false;
      }, 1800);
    });
}

/* ══ 背景拉同步時間（修正②：加逾時，off 卡片不顯示讀取中） ══ */
function fetchOneSyncTime(proj){
  var el=document.getElementById('sync-'+proj.id);
  if(!proj.syncSheet||!proj.syncCell){
    if(el) el.textContent=''; return Promise.resolve();
  }
  var url='https://docs.google.com/spreadsheets/d/'+proj.id+
    '/gviz/tq?tqx=out:json&sheet='+encodeURIComponent(proj.syncSheet)+'&range='+proj.syncCell;
  return fetchWithTimeout(url, SYNC_TIMEOUT)
    .then(function(r){ return r.text(); })
    .then(function(txt){
      var json=JSON.parse(txt.replace(/^[^\(]+\(/,'').replace(/\);?\s*$/,''));
      var val=''; try{val=json.table.rows[0].c[0].v||'';}catch(e){}
      if(el) el.textContent=val?'📊 同步 '+parseGvizDate(String(val)):'';
    })
    .catch(function(){
      if(el) el.textContent='';
    });
}
function fetchAllSyncTimes(list){
  list.forEach(function(proj){ fetchOneSyncTime(proj); });
}

/* ══ 啟動 ══ */
(function(){
  if(hasAuth()){
    document.getElementById('loading-screen').classList.add('show');
    document.getElementById('loading-text').textContent='載入專案清單…';
    loadLoginConfig();
    loadProjects();
    return;
  }
  document.getElementById('loading-screen').classList.add('show');
  document.getElementById('loading-text').textContent='初始化中…';
  loadLoginConfig().then(function(){
    document.getElementById('loading-screen').classList.remove('show');
    document.getElementById('login-screen').style.display='flex';
    setTimeout(function(){ document.getElementById('login-input').focus(); },120);
  });
})();
