【這個檔案在做什麼】
  這是整個「業務王看板」系統的唯一入口頁。
  它從一張 Google Sheets 管理表讀取所有子專案的設定，
  然後把專案以卡片方式列出，讓使用者點擊後跳轉到對應的看板頁面。

【登入機制】
  - 密碼從管理表（登入與頁面設定）的「密碼」列動態讀取。
  - 登入狀態存在 localStorage（key: ttl_auth_v1），關閉分頁後仍保留。

  _syncTaskOverride → 看板名稱→同步任務名稱的「例外」對照，來自管理表
                「登入與頁面設定」分頁的「同步對照」列，只有名稱對不上
                時才需要填，日常新增專案完全不用碰這裡

================================================================================
-->

<style>
:root{
  --primary:#8BA690;--primary-d:#6a8a70;

  --red:#d93025;--text:#2D2D2D;--sub:#888;

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'Microsoft JhengHei','Noto Sans TC',sans-serif;}
body{background:var(--bg);color:var(--text);min-height:100vh;}

#login-screen{

  display:flex;align-items:center;justify-content:center;z-index:1000;
}

  box-shadow:0 12px 48px rgba(0,0,0,.12);width:360px;text-align:center;
}
.login-logo{font-size:36px;margin-bottom:8px;}
.login-title{font-size:20px;font-weight:900;color:var(--primary-d);letter-spacing:.5px;margin-bottom:4px;}
.login-sub{font-size:12px;color:var(--sub);margin-bottom:32px;}
.login-label{font-size:12px;font-weight:700;color:var(--sub);text-align:left;display:block;margin-bottom:6px;}
.login-input{
  width:100%;padding:11px 16px;border:1.5px solid var(--border);border-radius:10px;
  font-size:16px;font-family:inherit;color:var(--text);background:#fafafa;outline:none;
  transition:border-color .15s,box-shadow .15s;letter-spacing:3px;text-align:center;margin-bottom:16px;
}
.login-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(139,166,144,.15);}

.login-btn{

#stage{padding:20px 24px 60px;flex:1;}
.section-label{

}
.section-label:first-child{margin-top:0;}
.group-block{
  margin-bottom:4px;
}
.group-sublabel{

.proj-card{

.proj-card.off{opacity:.55;}

/* 桌機：群組區塊左到右盡量塞、塞不下才換行，同一群的卡片永遠留在
   同一個 .group-block 裡（見 renderGroupedGrid 註解），不會被拆到

   硬佔一整排空間，多個小群組可以並排在同一列，讓畫面利用率提高。
   單一群組項目多到超過可用寬度時，該群組的格子會自動換行變兩排，
   但仍然是同一個 .group-block，不會影響其他群組的排列。 */
@media(min-width:641px){
  .group-row{display:flex;flex-wrap:wrap;align-items:flex-start;gap:20px;}
  .group-block{flex:0 0 auto;max-width:100%;margin-bottom:0;}

.badge{

}
.proj-name{font-size:16px;font-weight:900;color:var(--text);margin-bottom:8px;line-height:1.35;}

.proj-update-btn{
  flex-shrink:0;width:24px;height:24px;border-radius:50%;
  border:1.5px solid var(--primary);background:#fff;color:var(--primary-d);
  font-size:12px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background .15s,color .15s,transform .12s;
}
.proj-update-btn:hover{background:var(--primary);color:#fff;}
.proj-update-btn:active{transform:scale(.88);}
.proj-update-btn:disabled{cursor:not-allowed;background:#f2f2f2;border-color:var(--border);color:var(--sub);}
.proj-arrow{
  position:absolute;right:16px;top:50%;transform:translateY(-50%);

.proj-card:hover .proj-arrow{color:var(--primary);right:12px;}
.off-toggle{
  font-size:12px;color:var(--sub);cursor:pointer;margin-top:20px;

}
.off-toggle:hover{color:var(--primary-d);}
#off-section{display:none;margin-top:10px;}
.empty{padding:60px 20px;text-align:center;color:var(--sub);font-size:14px;}

/* ── 手機版（≤640px）：緊湊條列，badge 省略，色條移至左側 ── */
@media(max-width:640px){
  #stage{padding:12px 12px 40px;}
  .proj-grid{gap:8px;}
  .section-label{margin-top:16px;margin-bottom:8px;}
  .group-sublabel{margin:12px 0 8px;font-size:11px;}

  .proj-card{
    padding:10px 32px 10px 12px; /* 右側 32px 給 arrow */
    border-radius:10px;
  }
  /* 頂部橫條改為左側直條 */
  .proj-card::before{
    width:3px;height:100%;
    top:0;left:0;right:auto;
    border-radius:var(--r) 0 0 var(--r);
  }
  .badge{display:none;}
  .proj-name{font-size:14px;margin-bottom:2px;}
  /* 手機同步列：省略上方間距、邊框線 */
  .proj-sync{
    margin-top:0;padding-top:0;border-top:none;
    min-height:auto;font-size:10.5px;
  }
  .proj-sync-text{font-family:monospace;}
  /* 更新按鈕：絕對定位於卡片右側中間，與 arrow 並列 */
  .proj-update-btn{
    position:absolute;
    right:32px;top:50%;transform:translateY(-50%);
    width:28px;height:28px;font-size:13px;
  }
  /* 有更新按鈕的卡片，arrow 再右移一點 */
  .proj-card:has(.proj-update-btn) .proj-arrow{right:6px;}
  .proj-card:has(.proj-update-btn):hover .proj-arrow{right:4px;}
  .proj-arrow{font-size:14px;right:10px;}
  .proj-card:hover .proj-arrow{right:8px;}
}
</style>

<body>

<div id="login-screen" style="display:none">
  <div class="login-box">
    <div class="login-logo">&#x1F451;</div>
    <div class="login-title">業務王看板</div>
    <div class="login-sub">TTL 內部系統，請輸入公司標識進入</div>
    <label class="login-label">公司英文簡稱</label>
    <input class="login-input" id="login-input" type="password"
      placeholder="請輸入…" onkeydown="if(event.key==='Enter')doLogin()"
      autocomplete="off" spellcheck="false">
    <button class="login-btn" id="login-btn" onclick="doLogin()">進入看板</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<div id="loading-screen">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">初始化中…</div>
</div>

<div id="main-screen">
  <div id="topbar">
    <span id="tb-title">業務王看板</span>
    <button class="tb-sync-link" onclick="openSyncModal()" title="開啟同步中心">🔄 同步中心</button>
    <button class="tb-logout" onclick="doLogout()">登出</button>
  </div>
  <div id="stage"></div>
</div>

<script>

/* ══ 設定 ══ */
var MGMT_ID     = '1PR9OR7BIGyTpcH8QSMRXkPhQTr4h3m0UK3gET29f19s';
var LOGIN_SHEET = '登入與頁面設定';
var PROJ_SHEET  = '專案管理';
var AUTH_KEY    = 'ttl_auth_v1';

/* 同步時間 fetch 逾時（毫秒） */
var SYNC_TIMEOUT = 8000;

/* 業務王同步工具的後端入口，跟 sync.html 共用同一個 GAS Web App */
var SYNC_GAS_URL = 'https://script.google.com/macros/s/AKfycbwNmy6uS6NiOzMNJfVeWn7R98tub-DWHPNaj2FW5BnVneq-KbSZ82yYDuIvVLEk_dKPaA/exec';

/* ══ 同步任務自動比對 ══
   以前這裡是一個寫死的 SYNC_TASK_MAP 物件，每加一個需要「🔄 更新」
   按鈕的專案，都要回來改這份程式碼，還要求名稱「一字不差」，很容易
   漏改或打錯字。

   改成：頁面載入時直接向同步後端問一次「目前有哪些同步任務」
   （action=getTasks，跟 sync.html 用的是同一份清單），把名稱存起來。
   之後要不要顯示「🔄 更新」按鈕，就看「看板專案名稱（去掉日期後）」
   能不能在這份清單裡直接找到同名任務——大多數專案兩邊名稱本來就一樣
   （例如「全聯A級巡補」），完全不用設定就會自動配對成功。

   只有名稱真的對不上的少數案例（例如看板叫「CVS雲泡上架」，但同步
   任務其實叫「CVS雲泡上架調查」），才需要在管理表「登入與頁面設定」
   分頁加一列：A欄「同步對照」、B欄「CVS雲泡上架」、C欄「CVS雲泡上架
   調查」，不用改這裡的程式碼。 */
var _syncTaskOverride = {}; // 由 loadLoginConfig() 讀「同步對照」列填入，只收「對不上」的例外
var _syncTasks = [];        // 同步後端回傳的完整任務清單（含 _originalIndex）
var _syncTaskNames = {};    // 上面清單依名稱建的索引，方便快速查詢

function fetchSyncTaskList(){
  return fetch(SYNC_GAS_URL + '?action=getTasks')
    .then(function(r){ return r.json(); })
    .then(function(json){
      _syncTasks = (json && json.ok && json.data) || [];
      _syncTaskNames = {};
      _syncTasks.forEach(function(t){ _syncTaskNames[t.name] = t; });
    })
    .catch(function(){
      /* 抓不到同步任務清單就安全降級：所有卡片一律不顯示「🔄 更新」
         按鈕，但不影響專案清單本身正常顯示——看板還是看得到，只是
         這次沒辦法手動觸發同步，重新整理通常就會恢復。 */
      _syncTasks=[]; _syncTaskNames={};
    });
}

/* ══ 狀態 ══ */
var _password = 'ttl';
var _pageMap  = {
  '達成率型':  'achievement_board.html',
  '覆蓋率型':  'coverage_board.html',
  '獎勵達成型':'award_board.html'
};
var _surveys = { on:[], off:[] };

/* ══ 工具 ══ */
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* 去掉專案名稱尾端的括號日期，例如「CVS米酒PET商化(26.6.1-6.30)」→
   「CVS米酒PET商化」，用來跟同步任務清單比對。 */
function stripDateSuffix(name){
  return String(name||'').replace(/[\(（][^\)）]*[\)）]\s*$/, '').trim();
}

function parseGvizDate(v){
  var m = String(v).match(/Date\((\d+),(\d+),(\d+),(\d+),(\d+),(\d+)\)/);
  if(!m) return String(v);
  var d = new Date(+m[1],+m[2],+m[3],+m[4],+m[5],+m[6]);
  /* 固定輸出 MM/DD HH:MM（24h），不要上午/下午 */
  var mm  = String(d.getMonth()+1).padStart(2,'0');
  var dd  = String(d.getDate()).padStart(2,'0');
  var hh  = String(d.getHours()).padStart(2,'0');
  var min = String(d.getMinutes()).padStart(2,'0');
  return mm+'/'+dd+' '+hh+':'+min;
}

function cv(c){ return c?(c.v!==null&&c.v!==undefined?c.v:c.f||''):''; }

/* 看板群分類正規化：去除頭尾與內部所有空白（含全形空白 \u3000），
   避免「訪頻」「訪頻 」「訪 頻」這種純粹手滑造成的空白差異被誤判成
   不同分組。真的要讓同名分類拆開，請用可辨識的文字區隔（例如
   「訪頻1」「訪頻2」），不要用空白鍵——空白一律會被吃掉。 */
function _normGroup(s){ return String(s||'').replace(/[\s\u3000]+/g,''); }

function gvizFetch(sheetId, sheetName){
  var url = 'https://docs.google.com/spreadsheets/d/'+sheetId+
    '/gviz/tq?tqx=out:json&sheet='+encodeURIComponent(sheetName);
  return fetch(url)
    .then(function(r){ return r.text(); })
    .then(function(txt){ return JSON.parse(txt.replace(/^[^\(]+\(/,'').replace(/\);?\s*$/,'')); });
}

/* fetch 加逾時包裝 */
function fetchWithTimeout(url, ms){
  return Promise.race([
    fetch(url),
    new Promise(function(_,rej){
      setTimeout(function(){ rej(new Error('timeout')); }, ms);
    })
  ]);
}

/* ══ 表頭列偵測：跳過明顯是佔位文字的列 ══ */
var HEADER_KEYWORDS = ['專案名','試算表 ID','試算表ID','sheetid','project','專案'];
function isHeaderRow(name, sid){
  var n = name.toLowerCase(), s = sid.toLowerCase();
  for(var i=0;i<HEADER_KEYWORDS.length;i++){
    if(n === HEADER_KEYWORDS[i].toLowerCase()) return true;
  }
  /* sid 不像真實 Google Sheets ID（長度通常 44 字元，只含英數字與 -_） */
  if(sid.length < 20) return true;
  return false;
}

/* ══ Auth ══ */
function setAuth(){ localStorage.setItem(AUTH_KEY,'1'); }
function clearAuth(){ localStorage.removeItem(AUTH_KEY); }
function hasAuth(){ return localStorage.getItem(AUTH_KEY)==='1'; }

/* ══ Loading ══ */
function showLoading(msg){
  document.getElementById('loading-text').textContent = msg||'載入中…';
  document.getElementById('loading-screen').classList.add('show');
}
function hideLoading(){
  document.getElementById('loading-screen').classList.remove('show');
}

/* ══ 讀登入設定（更新密碼和頁面對照） ══
   【效能優化 2026/7/9】加入 sessionStorage 短期快取（60 秒），同一次
   瀏覽器分頁 session 內重整/切換頁面時可略過這次 gviz 往返，因為登入
   設定表變動頻率很低（密碼、頁面對照都是久久才改一次）。
   快取內容只存「原始 rows」，實際套用邏輯統一走 applyLoginRows()，
   確保「從快取套用」跟「從網路套用」的結果永遠一致，不會產生兩套
   邏輯分歧的風險。 */
var LOGIN_CFG_CACHE_KEY = 'ttl_login_cfg_v1';
var LOGIN_CFG_CACHE_TTL = 60000; // 60 秒

function applyLoginRows(rows){
  rows.forEach(function(row){
    var cells=row.c||[];
    var key=String(cv(cells[0])).trim();
    var b=String(cv(cells[1])).trim();
    var c=String(cv(cells[2])).trim();
    if(key==='密碼') _password=b.toLowerCase();
    /* 同步對照：只有「看板專案名稱（去掉日期後）」跟「sync.html
       實際任務名稱」對不上時才需要填這一列。B欄＝看板名稱、
       C欄＝實際任務名稱。大部分專案兩邊名稱本來就一樣，不用填
       也會自動比對到（見 buildCard() 與 fetchSyncTaskList()）。 */
    if(key==='同步對照'&&b&&c) _syncTaskOverride[b]=c;
    if(key==='頁面對照'&&b&&c){
      _pageMap[b]=c;
      /* D欄(顏色)、E欄都選填：留空就交給 autoStyle() 依名稱自動配一個
         穩定的顏色，不會因為沒填而報錯或誤用到其他類型的樣式。 */
      var colorHex=String(cv(cells[3])).trim();
      var icon=String(cv(cells[4])).trim();
      if(colorHex||icon){
        TYPE_STYLE[b] = {
          accent:  colorHex || (TYPE_STYLE[b]&&TYPE_STYLE[b].accent)  || autoStyle(b).accent,
          badgeBg: colorHex ? hexToRgba(colorHex,0.12) : (TYPE_STYLE[b]&&TYPE_STYLE[b].badgeBg) || autoStyle(b).badgeBg,
          badgeFg: colorHex || (TYPE_STYLE[b]&&TYPE_STYLE[b].badgeFg) || autoStyle(b).badgeFg,
          icon:    icon || (TYPE_STYLE[b]&&TYPE_STYLE[b].icon) || '📁'
        };
      }
    }
  });
}

function loadLoginConfig(){
  try{
    var cached = sessionStorage.getItem(LOGIN_CFG_CACHE_KEY);
    if(cached){
      var parsed = JSON.parse(cached);
      if(parsed && (Date.now()-parsed.ts) < LOGIN_CFG_CACHE_TTL){
        applyLoginRows(parsed.rows);
        return Promise.resolve();
      }
    }
  }catch(e){ /* 快取壞掉就當作沒有快取，走正常網路流程 */ }

  return gvizFetch(MGMT_ID, LOGIN_SHEET)
    .then(function(json){
      var rows=(json.table&&json.table.rows)||[];
      applyLoginRows(rows);
      try{
        sessionStorage.setItem(LOGIN_CFG_CACHE_KEY, JSON.stringify({ts:Date.now(), rows:rows}));
      }catch(e){ /* 存不進去（例如無痕模式擋 sessionStorage）不影響主流程 */ }
    })
    .catch(function(){});
}

/* ══ 登入 ══ */
function doLogin(){
  var input=document.getElementById('login-input');
  var btn=document.getElementById('login-btn');
  var err=document.getElementById('login-err');
  var val=input.value.trim().toLowerCase();
  if(!val){ err.textContent='請輸入公司英文簡稱'; shakeInput(); return; }
  if(val!==_password){ err.textContent='符號錯誤，請再試一次'; input.value=''; shakeInput(); input.focus(); return; }
  err.textContent='';
  btn.disabled=true; btn.textContent='驗證中…';
  setAuth();
  document.getElementById('login-screen').style.display='none';
  showLoading('載入專案清單…');
  loadProjects();
}

function shakeInput(){
  var el=document.getElementById('login-input');
  el.classList.remove('shake'); void el.offsetWidth; el.classList.add('shake');
  setTimeout(function(){ el.classList.remove('shake'); },400);
}

function doLogout(){
  clearAuth(); location.reload();
}

/* ══ 讀專案清單 ══
   【效能優化 2026/7/9 第二輪】這裡有兩個進一步的改動：

   1. 原本是 loadLoginConfig().then(loadProjects)：先把登入設定表整個
      讀完，才「開始」讀專案表，兩次 gviz 往返是完全序列疊加的。
      其實只有「套用覆寫、組卡片」這個步驟需要登入設定先到位，兩個
      fetch 本身完全可以同時發送。改成 Promise.all 平行送出，只在
      真正要組卡片之前才等兩邊都回來，正確性跟原本一樣（見 2026/7/5
      的註解），但等待時間從「兩次往返相加」變成「取兩者較慢的那個」。

   2. 同步任務清單（fetchSyncTaskList，打的是自家 GAS 後端 getTasks）
      跟 Google 的 gviz 端點是完全不同的服務，GAS Web App 常常有明顯
      的冷啟動延遲（第一次呼叫可能要等好幾秒），過去卻讓它跟 gviz
      綁在同一個 Promise.all 裡，等於整頁卡片畫面都要陪著它一起等。
      現在改成「背景抓」：卡片先用當下已知的資料畫出來（這時候如果
      GAS 還沒回來，更新按鈕會先不顯示），GAS 一旦回應，才用
      patchUpdateButtons() 補上原本該有的「🔄 更新」按鈕，不會讓使用者
      等一個跟看板資料無關的服務。

   【效能優化 2026/7/9 第四輪】專案清單（PROJ_SHEET）現在也比照登入
   設定表加上 sessionStorage 短期快取（見 fetchProjectList()）。同一
   分頁 session 內，只要 30 秒內重新整理過、或使用者從看板頁按上一頁
   回到入口頁，第二次以後完全不用等網路，直接用快取畫面——這是實務
   上最常見的情境（點錯卡片、看完一個看板想換下一個），效果比單純把
   兩個 fetch 平行化更明顯。TTL 刻意比登入設定的 60 秒短（設 30 秒），
   因為 ON/OFF 狀態、同步時間比密碼/頁面對照這種設定變動頻繁，快取
   太久容易讓使用者看到過期的專案清單。 */
var PROJ_CACHE_KEY = 'ttl_proj_cache_v1';
var PROJ_CACHE_TTL = 30000; // 30 秒，刻意比登入設定的 60 秒短

function fetchProjectList(){
  try{
    var cached = sessionStorage.getItem(PROJ_CACHE_KEY);
    if(cached){
      var parsed = JSON.parse(cached);
      if(parsed && (Date.now()-parsed.ts) < PROJ_CACHE_TTL) return Promise.resolve(parsed.json);
    }
  }catch(e){ /* 快取壞掉就當作沒有快取，走正常網路流程 */ }

  return gvizFetch(MGMT_ID, PROJ_SHEET).then(function(json){
    try{
      sessionStorage.setItem(PROJ_CACHE_KEY, JSON.stringify({ts:Date.now(), json:json}));
    }catch(e){ /* 存不進去（例如無痕模式擋 sessionStorage）不影響主流程 */ }
    return json;
  });
}

function loadProjects(){
  var syncTaskPromise = fetchSyncTaskList(); // 背景抓，不等它，抓完自動存進 _syncTaskNames

  Promise.all([ loadLoginConfig(), fetchProjectList() ])
    .then(function(results){
      var json = results[1];
      var rows=(json.table&&json.table.rows)||[];
      var onList=[],offList=[];
      rows.forEach(function(row){
        var cells=row.c||[];
        var active=String(cv(cells[0])).trim().toUpperCase()==='ON';
        var name=String(cv(cells[1])).trim();
        var sid=String(cv(cells[2])).trim();
        var sheet=String(cv(cells[3])).trim()||'店家名冊';
        var sync=String(cv(cells[4])).trim()||'輔助';
        var cell=String(cv(cells[5])).trim()||'B1';
        var btype=String(cv(cells[6])).trim()||'達成率型';
        var group=_normGroup(cv(cells[7]))||'未分類'; /* H欄：看板群分類，沒填的一律歸「未分類」 */
        /* I欄（第三輪新增）：IMPORTRANGE 預先拉好的同步時間快照，跟
           fetchOneSyncTime() 即時查詢回來的格式一樣是 gviz 的
           Date(...) 字串。有值就直接用，不用再對該專案的試算表發
           即時請求；公式出錯／還沒授權／留空時是空字串，交給
           fetchAllSyncTimes() 的 fallback 邏輯即時查詢補上。 */
        var syncPre=String(cv(cells[8])||'').trim();
        /* ── 修正①：跳過空列與表頭佔位列 ── */
        if(!name||!sid) return;
        if(isHeaderRow(name,sid)) return;
        var p={name:name,id:sid,sheet:sheet,syncSheet:sync,syncCell:cell,boardType:btype,group:group,syncPre:syncPre};
        if(active) onList.push(p); else offList.push(p);
      });
      _surveys={on:onList,off:offList};
      hideLoading();
      renderPortal();
      /* 【效能優化 2026/7/9】只先拉「進行中」專案的同步時間。
         「已結束專案」預設是折疊、使用者根本還沒看到，卻要跟 ON 專案
         搶同一批並發名額，會拖慢使用者實際看得到的 ON 卡片。
         OFF 的同步時間改成使用者真的點開摺疊區塊時才觸發（見
         renderPortal() 裡 off-toggle 的 onclick）。 */
      fetchAllSyncTimes(onList);
      /* GAS 同步任務清單這時候可能還沒回來（或早就回來了，皆可）。
         等它真的 resolve 了，才幫已經畫出來的卡片補上更新按鈕；
         patchUpdateButtons() 對已經有按鈕的卡片會直接跳過，重複呼叫
         也不會有副作用。 */
      syncTaskPromise.then(function(){ patchUpdateButtons(onList); });
    })
    .catch(function(){
      hideLoading();
      document.getElementById('stage').innerHTML='<div class="empty">⚠️ 專案清單載入失敗，請重新整理頁面</div>';
      document.getElementById('main-screen').style.display='flex';
    });
}

/* ══ 渲染入口 ══ */
/* 內建三種預設樣式，可被「登入與頁面設定」表的「頁面對照」列（D欄顏色／
   E欄圖示）覆蓋或擴充，完全不用改這裡的程式碼。 */
var TYPE_STYLE={
  '達成率型': {accent:'#8BA690',badgeBg:'rgba(139,166,144,.12)',badgeFg:'#4a7a55',icon:'📊'},
  '覆蓋率型': {accent:'#378ADD',badgeBg:'rgba(55,138,221,.10)',badgeFg:'#1a5fa8',icon:'🗺️'},
  '傳統購值型':{accent:'#7B5EA7',badgeBg:'rgba(123,94,167,.10)',badgeFg:'#5a3a8a',icon:'🏪'}
};

/* hex（例如 "#E0955D" 或 "E0955D"）轉成指定透明度的 rgba 字串，
   格式不對就退回中性的預設灰綠色，不會讓畫面壞掉。 */
function hexToRgba(hex, alpha){
  hex = String(hex||'').replace('#','').trim();
  if(hex.length===3) hex = hex.split('').map(function(c){return c+c;}).join('');
  var r=parseInt(hex.substring(0,2),16), g=parseInt(hex.substring(2,4),16), b=parseInt(hex.substring(4,6),16);
  if(isNaN(r)||isNaN(g)||isNaN(b)) return 'rgba(139,166,144,'+alpha+')';
  return 'rgba('+r+','+g+','+b+','+alpha+')';
}

/* 給完全沒設定過樣式的新看板類型，依名稱穩定配一個顏色（同一個名稱
   永遠配到同一個顏色，不會每次重新整理就換色），不會誤套到其他類型
   的樣式，也不會因為找不到而報錯。 */
var AUTO_PALETTE=[
  {accent:'#E0955D',badgeBg:'rgba(224,149,93,.12)',badgeFg:'#a65f22'},
  {accent:'#4FB0A5',badgeBg:'rgba(79,176,165,.12)',badgeFg:'#2c7a70'},
  {accent:'#C75B7A',badgeBg:'rgba(199,91,122,.12)',badgeFg:'#8a3350'},
  {accent:'#8B8FE0',badgeBg:'rgba(139,143,224,.12)',badgeFg:'#4c50a8'},
  {accent:'#B3A15A',badgeBg:'rgba(179,161,90,.12)',badgeFg:'#7a6a2e'}
];
function autoStyle(boardType){
  var s=String(boardType||''), h=0;
  for(var i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))|0; }
  var base=AUTO_PALETTE[Math.abs(h)%AUTO_PALETTE.length];
  return {accent:base.accent,badgeBg:base.badgeBg,badgeFg:base.badgeFg,icon:'📁'};
}

/* 卡片樣式一律透過這支函式取得：有登記(內建或管理表補的)就用登記的，
   完全沒登記過的新類型就用 autoStyle() 自動配色，不會再出現「查無此
   類型就悄悄借用達成率型的綠色」這種誤導視覺的情況。 */
function getTypeStyle(boardType){
  return TYPE_STYLE[boardType] || autoStyle(boardType);
}

function renderPortal(){
  document.getElementById('main-screen').style.display='flex';
  var stage=document.getElementById('stage');
  stage.innerHTML='';
  if(!_surveys.on.length&&!_surveys.off.length){
    stage.innerHTML='<div class="empty">目前沒有專案</div>'; return;
  }
  if(_surveys.on.length){
    var lbl=document.createElement('div');
    lbl.className='section-label'; lbl.textContent='🟢  進行中專案';
    stage.appendChild(lbl);
    renderGroupedGrid(stage,_surveys.on,false);
  }
  if(_surveys.off.length){
    var toggle=document.createElement('div');
    toggle.className='off-toggle';
    toggle.innerHTML='▶ 已結束專案（'+_surveys.off.length+'個）';
    var offSyncFetched=false; /* 確保同步時間只在第一次展開時拉一次，重複收合展開不會重複發請求 */
    toggle.onclick=function(){
      var sec=document.getElementById('off-section');
      var open=sec.style.display==='block';
      sec.style.display=open?'none':'block';
      toggle.innerHTML=(open?'▶':'▼')+' 已結束專案（'+_surveys.off.length+'個）';
      if(!open&&!offSyncFetched){
        offSyncFetched=true;
        fetchAllSyncTimes(_surveys.off);
      }
    };
    stage.appendChild(toggle);
    var sec=document.createElement('div'); sec.id='off-section';
    renderGroupedGrid(sec,_surveys.off,true);
    stage.appendChild(sec);
  }
}

/* 依「看板群分類」(H欄) 動態分組：不預設任何固定類別清單，
   純粹依照專案管理表裡實際出現的文字分組，第一次出現的順序＝
   畫面顯示順序（也就是照你在管理表排的列順序），日後新增分類、
   改分類名稱都不用動這裡的程式碼。 */
function groupByBoardGroup(list){
  var order=[], map={};
  list.forEach(function(p){
    var g = p.group || '未分類';
    if(!map[g]){ map[g]=[]; order.push(g); }
    map[g].push(p);
  });
  return order.map(function(g){ return {group:g, items:map[g]}; });
}

/* 群組自動配色：跟看板類型的 autoStyle() 邏輯一樣（同名稱永遠配到
   同一色），但用另一組獨立的色盤，避免跟卡片本身的看板類型顏色混淆
   —— 這裡的顏色只用在標題左側的色條上，刻意不做背景色塊：背景色塊
   在同一列裡兩個群組高度不一致時（例如某張卡片標題換行變高），會
   讓兩個色塊底部對不齊、看起來很突兀，拿掉背景只留色條就沒有這個
   問題，色條本身也已經夠達到「一眼看出是不同群」的效果。 */
var GROUP_PALETTE=['#6B8F71','#3E7CB1','#C99A3B','#8B5FBF','#C15C6B','#3FA7A0','#B9763F','#6E7BC4'];
function groupAutoColor(name){
  var s=String(name||''), h=0;
  for(var i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))|0; }
  return {accent: GROUP_PALETTE[Math.abs(h)%GROUP_PALETTE.length]};
}

/* 每個群組包成一個獨立的 .group-block（小標題＋該群的卡片格），
   同一群的卡片永遠待在同一個 block 裡、不會被拆開。外層 .group-row
   在桌機用 flex-wrap 讓多個 block 左到右排、排不下才換行，盡量把
   小群組塞進同一列，空間利用率比「每群強制獨佔一整列」高很多；
   手機版維持原本每群獨佔一列、卡片撐滿寬度的排法（見 CSS）。

   ★ 這裡刻意不用 grid-template-columns:repeat(auto-fill,260px)：
   auto-fill 在「寬度不確定」的情境下（這裡的 block 寬度是由 flex
   排列動態決定，不是固定值）會整個失效、直接退化成單欄，導致一群
   4 張卡變成直的疊 4 排，而不是橫的排一列——這正是你上一張截圖看到
   的狀況。改成直接算出「這群卡片橫著排一列需要多寬」，用明確的
   max-width 告訴瀏覽器這個 block 該有多寬，瀏覽器才會正確地先橫向
   排滿、真的放不下整群才整塊換到下一行。 */
var GROUP_MAX_COLS = 4; // 單一群組最多橫向排幾張卡，超過這個數量會在同一個 block 內自動換行（仍算同一群，不影響其他群組排列）
function renderGroupedGrid(container, list, isOff){
  var row=document.createElement('div');
  row.className='group-row';
  var groups=groupByBoardGroup(list);
  groups.forEach(function(g){
    var col=groupAutoColor(g.group);
    var block=document.createElement('div');
    block.className='group-block';
    block.style.setProperty('--group-accent',col.accent);

    var cols = Math.min(g.items.length, GROUP_MAX_COLS);
    var CARD_W=260, GAP=12; // 對應 CSS 裡卡片寬度／格間距（block 已無內距，不用再加 padding）
    block.style.maxWidth = (cols*CARD_W + (cols-1)*GAP) + 'px';

    var sub=document.createElement('div');
    sub.className='group-sublabel';
    sub.textContent=g.group+'（'+g.items.length+'）';
    block.appendChild(sub);

    var grid=document.createElement('div'); grid.className='proj-grid';
    grid.style.setProperty('--group-cols', cols);
    g.items.forEach(function(p){ grid.appendChild(buildCard(p,isOff)); });
    block.appendChild(grid);

    row.appendChild(block);
  });
  container.appendChild(row);
}

/* 卡片要不要顯示「🔄 更新」按鈕、按鈕該對應哪個同步任務名稱，
   buildCard()（第一次畫卡片）跟 patchUpdateButtons()（GAS 任務清單
   晚到時補畫按鈕）都要用同一套判斷邏輯，抽出來避免兩邊各寫一次、
   日後改規則只改一個地方就好，也不會兩邊行為兜不起來。 */
function resolveTaskName(proj, isOff){
  var stripped = stripDateSuffix(proj.name);
  var effectiveTaskName = _syncTaskOverride[stripped] || stripped;
  return (isOff || !_syncTaskNames[effectiveTaskName]) ? null : effectiveTaskName;
}

function buildCard(proj,isOff){
  var sty=getTypeStyle(proj.boardType);
  var card=document.createElement('div');
  card.className='proj-card'+(isOff?' off':'');
  card.id='card-'+proj.id;
  card.style.cssText='--accent:'+sty.accent+';--badge-bg:'+sty.badgeBg+';--badge-fg:'+sty.badgeFg+';';

  var taskName = resolveTaskName(proj, isOff);
  var updateBtnHtml = taskName
    ? '<button class="proj-update-btn" type="button" title="更新「'+esc(taskName)+'」資料">🔄</button>'
    : '';

  card.innerHTML=
    '<span class="badge">'+sty.icon+' '+esc(proj.boardType)+(isOff?' · 已結束':'')+'</span>'+
    '<div class="proj-name">'+esc(proj.name)+'</div>'+
    '<div class="proj-sync">'+
      '<span class="proj-sync-text" id="sync-'+esc(proj.id)+'">'+
        (proj.syncPre?esc('📊 同步 '+parseGvizDate(proj.syncPre)):'⏳ 讀取中…')+
      '</span>'+
      '<span class="proj-sync-status" id="sync-status-'+esc(proj.id)+'"></span>'+
      updateBtnHtml+
    '</div>'+
    '<span class="proj-arrow">›</span>';

  card.addEventListener('click',function(e){
    /* 點到更新按鈕時不要觸發卡片跳轉 */
    if(e.target.closest&&e.target.closest('.proj-update-btn')) return;
    openProject(proj);
  });

  if(taskName){
    var btn = card.querySelector('.proj-update-btn');
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      handleUpdateClick(btn, proj, taskName);
    });
  }
  return card;
}

/* 【效能優化 2026/7/9 第二輪】卡片畫出來的當下，GAS 同步任務清單
   （fetchSyncTaskList）可能還沒回來，這時 buildCard() 會判斷「還沒有
   任務名單、所以先不顯示更新按鈕」。等 GAS 真的回應之後，用這支函式
   幫已經在畫面上的卡片「補畫」按鈕，不用整批卡片重新渲染，也不會
   影響使用者已經在看的畫面（例如正在捲動、正在點別的卡片）。
   對已經有按鈕的卡片會直接跳過，所以重複呼叫是安全的。 */
function patchUpdateButtons(list){
  list.forEach(function(proj){
    var card = document.getElementById('card-'+proj.id);
    if(!card || card.querySelector('.proj-update-btn')) return;
    var taskName = resolveTaskName(proj, false);
    if(!taskName) return;
    var syncRow = card.querySelector('.proj-sync');
    if(!syncRow) return;
    var btn = document.createElement('button');
    btn.className = 'proj-update-btn';
    btn.type = 'button';
    btn.title = '更新「'+taskName+'」資料';
    btn.textContent = '🔄';
    syncRow.appendChild(btn);
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      handleUpdateClick(btn, proj, taskName);
    });
  });
}

function openProject(proj){
  var page=_pageMap[proj.boardType];
  if(!page){
    alert('「'+proj.boardType+'」還沒設定要開哪個看板頁面。\n\n請到管理表「登入與頁面設定」分頁新增一列：\nA欄填「頁面對照」、B欄填「'+proj.boardType+'」、C欄填對應的頁面檔名（例如 xxx_board.html），存檔後重新整理本頁即可，不用改程式碼。');
    return;
  }
  window.location.href=page+'?sheetId='+encodeURIComponent(proj.id);
}

/* 點 4+5：更新按鈕點擊流程，加入三階段視覺回饋
   ① 按下：按鈕 ⏳，時間欄顯示「同步中…」
   ② 完成：按鈕 ✅，時間欄顯示「✅ 完成」，1.5s 後重新讀取最新時間
   ③ 失敗：按鈕 ❌，時間欄顯示錯誤原因，2s 後恢復 */
function handleUpdateClick(btn, proj, taskName){
  if(btn.disabled) return;
  btn.disabled = true;
  btn.textContent = '⏳';

  var statusEl = document.getElementById('sync-status-'+proj.id);
  var textEl   = document.getElementById('sync-'+proj.id);
  var prevText = textEl ? textEl.textContent : '';

  if(statusEl) statusEl.textContent = '同步中…';

  /* 計時器，讓使用者看到時間在跑 */
  var startTs = Date.now();
  var timerInterval = setInterval(function(){
    var secs = ((Date.now()-startTs)/1000).toFixed(0);
    if(statusEl) statusEl.textContent = '同步中… '+secs+'s';
  }, 1000);

  /* 按鈕會顯示，代表載入頁面時 _syncTaskNames 裡已經有這個任務，
     正常情況下直接用快取就好，不用每次點擊都重新問一次後端「有哪些
     任務」——sync.html 本身開著才需要即時清單，這裡只是觸發，用頁面
     載入時的快照即可。只有極少數「快取裡剛好找不到」的情況（例如
     使用者開著這頁很久，後端當中任務被改名/移除）才保險性地重新問
     一次最新清單，而不是直接判定失敗。 */
  var lookup = _syncTaskNames[taskName]
    ? Promise.resolve(_syncTaskNames[taskName])
    : fetchSyncTaskList().then(function(){ return _syncTaskNames[taskName]; });

  lookup
    .then(function(match){
      if(!match) throw new Error('在同步工具裡找不到任務：'+taskName);
      return fetch(SYNC_GAS_URL, {
        method:'POST',
        body: JSON.stringify({ action:'syncTask', index: match._originalIndex })
      });
    })
    .then(function(r){ return r.json(); })
    .then(function(json){
      if(!json.ok) throw new Error(json.message||'更新失敗');
      clearInterval(timerInterval);
      var elapsed = ((Date.now()-startTs)/1000).toFixed(1);
      btn.textContent = '✅';
      if(statusEl) statusEl.textContent = '✅ '+elapsed+'s';
      /* 點 5：1.5s 後重新讀取最新同步時間並刷新顯示 */
      setTimeout(function(){
        if(statusEl) statusEl.textContent = '';
        fetchOneSyncTime(proj);
        btn.textContent = '🔄';
        btn.disabled = false;
      }, 1500);
    })
    .catch(function(err){
      clearInterval(timerInterval);
      btn.textContent = '❌';
      var msg = (err&&err.message)||'失敗';
      if(statusEl) statusEl.textContent = '❌ '+msg.slice(0,20);
      if(textEl) textEl.textContent = prevText; /* 恢復舊時間 */
      setTimeout(function(){
        if(statusEl) statusEl.textContent = '';
        btn.textContent = '🔄';
        btn.title = '更新「'+taskName+'」資料';
        btn.disabled = false;
      }, 2500);
    });
}

/* ══ 背景拉同步時間（修正②：加逾時，off 卡片不顯示讀取中） ══ */
function fetchOneSyncTime(proj){
  var el=document.getElementById('sync-'+proj.id);
  if(!proj.syncSheet||!proj.syncCell){
    if(el) el.textContent=''; return Promise.resolve();
  }
  var url='https://docs.google.com/spreadsheets/d/'+proj.id+
    '/gviz/tq?tqx=out:json&sheet='+encodeURIComponent(proj.syncSheet)+'&range='+proj.syncCell;
  return fetchWithTimeout(url, SYNC_TIMEOUT)
    .then(function(r){ return r.text(); })
    .then(function(txt){
      var json=JSON.parse(txt.replace(/^[^\(]+\(/,'').replace(/\);?\s*$/,''));
      var val=''; try{val=json.table.rows[0].c[0].v||'';}catch(e){}
      if(el) el.textContent=val?'📊 同步 '+parseGvizDate(String(val)):'';
    })
    .catch(function(){
      if(el) el.textContent='';
    });
}
/* 【效能優化 2026/7/9】改成限制並發數的 queue，而不是一次把所有專案的
   同步時間請求全部丟出去。瀏覽器對同一網域（docs.google.com）預設只有
   6 條並發連線，專案一多，全部同時發送反而會互相排隊、拖慢每一張卡片
   看到時間的速度。限制同時最多 5 個在跑，其餘排隊依序遞補，總請求數
   不變，但不會塞爆連線、也不會讓某些卡片被卡在隊伍最後面很久。 */
var SYNC_TIME_CONCURRENCY = 5;
function runWithConcurrency(items, worker, limit){
  return new Promise(function(resolve){
    var idx = 0, active = 0, done = 0;
    if(!items.length){ resolve(); return; }
    function next(){
      while(active < limit && idx < items.length){
        (function(item){
          idx++; active++;
          worker(item).then(function(){}, function(){}).then(function(){
            active--; done++;
            if(done === items.length) resolve();
            else next();
          });
        })(items[idx]);
      }
    }
    next();
  });
}
/* 【效能優化 2026/7/9 第三輪】混合式讀取：已經從 I 欄 IMPORTRANGE
   拿到同步時間快照的專案（proj.syncPre 有值），buildCard() 畫卡片
   時就已經直接顯示了，這裡不用再重複發一次即時查詢；只有 syncPre
   是空字串（IMPORTRANGE 還沒授權、公式出錯、或那格本來就沒填）的
   專案才需要 fallback 用 fetchOneSyncTime() 即時問一次。 */
function fetchAllSyncTimes(list){
  var pending = list.filter(function(p){ return !p.syncPre; });
  return runWithConcurrency(pending, fetchOneSyncTime, SYNC_TIME_CONCURRENCY);
}

/* ══ Sync Modal ══ */
function openSyncModal(){
  var overlay = document.getElementById('sync-modal-overlay');
  var iframe  = document.getElementById('sync-iframe');
  /* 第一次開啟才載入，避免每次都重新整理 iframe */
  if(!iframe.src || iframe.src === window.location.href){
    iframe.src = 'sync.html?embed=1';
  }
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeSyncModal(){
  document.getElementById('sync-modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
function handleOverlayClick(e){
  /* 點 overlay 背景關閉，點 modal 本身不關 */
  if(e.target === document.getElementById('sync-modal-overlay')) closeSyncModal();
}
document.addEventListener('keydown', function(e){
  if(e.key === 'Escape') closeSyncModal();
});


(function(){
  if(hasAuth()){
    document.getElementById('loading-screen').classList.add('show');
    document.getElementById('loading-text').textContent='載入專案清單…';
    /* 【2026/7/5 修正，2026/7/9 改法但結論不變】「頁面對照」「同步對照」
       這些覆寫設定必須在組卡片（buildCard）之前就讀到才有用，這個
       前提沒有變。差別是：以前用「序列呼叫」(A 做完才做 B) 來保證
       順序，現在改成在 loadProjects() 內部用 Promise.all 兩邊同時發
       請求、但仍然等兩邊都回來才組卡片——保證順序的效果一樣，只是
       不用把兩次網路往返的時間相加，改成兩個一起等，取比較慢的那個
       就好。所以這裡不用再手動串接，直接呼叫 loadProjects() 即可。 */
    loadProjects();
    return;
  }
  document.getElementById('loading-screen').classList.add('show');

  loadLoginConfig().then(function(){
    document.getElementById('loading-screen').classList.remove('show');
    document.getElementById('login-screen').style.display='flex';
    setTimeout(function(){ document.getElementById('login-input').focus(); },120);
  });
})();
