  <script>
  /* ══════════════════════════════════════════
     手機版「主要通路巡訪」介面邏輯
     ══════════════════════════════════════════ */

  /* ── 狀態 ── */
  var MB = {
    mode: 'r',          /* 'g' 達成 | 'r' 未達 */
    dlChips: { r: true, g: false },
    stack: [],          /* [{ label, key, level }] level: 0=整體 1=地區 2=所 3=人員 */
    storeOpen: false,
    isBcCv: false       /* 是否為主要通路巡訪 */
  };

  /* ── 工具：百分比格式 ── */
  function mbPct(n, t) {
    if (!t) return '0%';
    return Math.round(n / t * 100) + '%';
  }

  /* ── 工具：statByChannel 回傳三欄資料 ── */
  function mbGetCols(rows) {
    var cfg = _curCfg;
    if (!cfg || !cfg.cvsWeightChannel) return null;
    var cvsCh = cfg.cvsWeightChannel;
    var all = { l: 0, u: 0, t: 0 };
    var nc  = { l: 0, u: 0, t: 0 };
    var cv  = { l: 0, u: 0, t: 0 };
    rows.forEach(function(r) {
      var ch = gv(r, 'channel') || '';
      var k  = gs(r);
      all.t++; if (k === 'l') all.l++; else all.u++;
      if (ch === cvsCh) { cv.t++; if (k === 'l') cv.l++; else cv.u++; }
      else              { nc.t++; if (k === 'l') nc.l++; else nc.u++; }
    });
    return { all: all, nc: nc, cv: cv };
  }

  /* ── 工具：渲染一個 .mb-cell ── */
  function mbCellHtml(n, t, mode) {
    if (!t) return '<span class="mb-cell mc-zero"><span class="mb-pct">—</span></span>';
    var p = mbPct(n, t);
    var isZero = (n === 0);
    if (isZero) {
      return '<span class="mb-cell mc-zero"><span class="mb-pct">0%</span></span>';
    }
    return '<span class="mb-cell mc-' + mode + '">'
      + '<span class="mb-pct">' + p + '</span>'
      + '<span class="mb-qty">(' + n.toLocaleString() + ')</span>'
      + '</span>';
  }

  /* ── 渲染表頭 ── */
  function mbHeadHtml(mode) {
    var cls = 'mb-th-' + mode;
    return '<div class="mb-thead">'
      + '<span>單位</span>'
      + '<span>家數</span>'
      + '<span class="' + cls + '">不分類</span>'
      + '<span class="' + cls + '">非CVS</span>'
      + '<span class="' + cls + '">CVS</span>'
      + '</div>';
  }

  /* ── 渲染一行資料列 ── */
  function mbRowHtml(label, rows, clickable, isParent) {
    var cols = mbGetCols(rows);
    if (!cols) return '';
    var mode = MB.mode;
    var allN = mode === 'r' ? cols.all.u : cols.all.l;
    var ncN  = mode === 'r' ? cols.nc.u  : cols.nc.l;
    var cvN  = mode === 'r' ? cols.cv.u  : cols.cv.l;
    var cls  = isParent ? ' parent-row' : (clickable ? '' : '');
    var dataAttr = clickable ? ' data-label="' + label.replace(/"/g,'&quot;') + '"' : '';
    return '<div class="mb-row' + cls + '"' + dataAttr + (clickable ? ' role="button"' : '') + '>'
      + '<span class="mb-row-name">' + label + '</span>'
      + '<span class="mb-row-total">' + cols.all.t.toLocaleString() + '</span>'
      + mbCellHtml(allN, cols.all.t, mode)
      + mbCellHtml(ncN,  cols.nc.t,  mode)
      + mbCellHtml(cvN,  cols.cv.t,  mode)
      + '</div>';
  }

  /* ── 渲染切換按鈕 ── */
  function mbToggleHtml(mode) {
    return '<div class="mb-toggle-wrap">'
      + '<div class="mb-toggle">'
      + '<button class="mb-toggle-btn' + (mode === 'r' ? ' active-r' : '') + '" onclick="mbSetMode('r')">🔴 未達</button>'
      + '<button class="mb-toggle-btn' + (mode === 'g' ? ' active-g' : '') + '" onclick="mbSetMode('g')">✅ 達成</button>'
      + '</div></div>';
  }

  function mbStorePanelHtml(rows, totalCount, defaultOpen) {
    var showR = MB.dlChips.r;
    var showG = MB.dlChips.g;
    var filtered = rows.filter(function(r) {
      var k = gs(r);
      if (showR && k === 'u') return true;
      if (showG && k === 'l') return true;
      return false;
    });

    /* 排序：未達→達成，同狀態按店名 */
    var sorted = filtered.slice().sort(function(a, b) {
      var ka = gs(a), kb = gs(b);
      if (ka === 'u' && kb !== 'u') return -1;
      if (kb === 'u' && ka !== 'u') return  1;
      return gv(a,'store').localeCompare(gv(b,'store'),'zh-TW');
    });

    var isOpen = defaultOpen || false;
    var toggleCls = isOpen ? ' open' : '';
    var bodyCls   = isOpen ? ' open' : '';

    var rows_html = sorted.map(function(r) {
      var k   = gs(r);
      var cls = k === 'l' ? 'st-g' : 'st-r';
      var lbl = k === 'l' ? '達成' : '未達';
      return '<tr>'
        + '<td style="width:46px"><span class="mb-store-status ' + cls + '">' + lbl + '</span></td>'
        + '<td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(gv(r,'store')) + '</td>'
        + '<td style="white-space:nowrap">' + esc(gv(r,'channel') || '—') + '</td>'
        + '<td style="white-space:nowrap">' + esc(gv(r,'type')    || '—') + '</td>'
        + '</tr>';
    }).join('');

    var chipR = '<button class="mb-store-filter-btn' + (showR ? ' on-r' : '') + '" onclick="mbToggleChip(\'r\')">🔴 未達</button>';
    var chipG = '<button class="mb-store-filter-btn' + (showG ? ' on-g' : '') + '" onclick="mbToggleChip(\'g\')">✅ 達成</button>';

    return '<div class="mb-store-panel" id="mb-store-panel">'
      + '<div class="mb-store-toggle' + toggleCls + '" id="mb-store-toggle" onclick="mbToggleStore()">'
      + '<div class="mb-store-toggle-left">'
      + '<div class="mb-store-toggle-icon">🏪</div>'
      + '<div>'
      + '<span class="mb-store-toggle-label">店家清單</span>'
      + '<span class="mb-store-toggle-count">共 ' + totalCount.toLocaleString() + ' 家 · 篩選後 ' + sorted.length + ' 家</span>'
      + '</div></div>'
      + '<span class="mb-store-toggle-arrow">▼</span>'
      + '</div>'
      + '<div class="mb-store-body' + bodyCls + '" id="mb-store-body">'
      + '<div class="mb-store-filter">' + chipR + chipG + '</div>'
      + (sorted.length
        ? '<div style="overflow-x:auto"><table class="mb-store-tbl">'
          + '<thead><tr><th>狀態</th><th>店家名稱</th><th>通路</th><th>型態</th></tr></thead>'
          + '<tbody>' + rows_html + '</tbody>'
          + '</table></div>'
        : '<div class="mb-empty">無符合條件的店家</div>')
      + '</div></div>';
  }

  /* ── 取得目前層的資料列 ── */
  function mbCurrentRows() {
    var rows = allRows.slice();
    MB.stack.forEach(function(s, i) {
      var key = ['area','office','staff'][i];
      if (key) rows = rows.filter(function(r) { return gv(r, key) === s.key; });
    });
    return rows;
  }

  /* ── 依未達數量排序 ── */
  function mbSortByMiss(items) {
    return items.slice().sort(function(a, b) {
      return (b.stats.u || 0) - (a.stats.u || 0);
    });
  }

  /* ── 主渲染 ── */
  function mbRender() {
    var content = document.getElementById('mb-content');
    if (!content) return;

    var depth   = MB.stack.length;          /* 0=整體 1=地區 2=所 3=人員 */
    var rows    = mbCurrentRows();
    var mode    = MB.mode;

    /* 導覽列麵包屑 */
    mbRenderNav();

    var html = mbToggleHtml(mode) + mbHeadHtml(mode) + '<div class="mb-list-wrap"><div class="mb-table">';

    if (depth < 3) {
      /* 整體/地區/所 層 → 顯示子項目清單 */
      var groupKey = ['area','office','staff'][depth];
      var grouped  = groupBy(rows, groupKey);
      var items    = Object.keys(grouped).map(function(k) {
        var r = grouped[k];
        return { key: k, rows: r, stats: stat(r) };
      });

      /* 排序：未達多的在前 */
      items = mbSortByMiss(items);
      if (depth === 0) {
        /* 整體層用地區順序再排 */
        var areaItems = items.filter(function(x) {
          return AREA_ORDER.some(function(a) { return x.key.indexOf(a) >= 0; });
        });
        var otherItems = items.filter(function(x) {
          return !AREA_ORDER.some(function(a) { return x.key.indexOf(a) >= 0; });
        });
        items = areaItems.concat(otherItems);
        items = mbSortByMiss(items);
      }

      /* 母單位置頂列（整體統計） */
      var parentLabel = depth === 0 ? '整體' : MB.stack[depth-1].label;
      html += mbRowHtml(parentLabel, rows, false, true);

      items.forEach(function(item) {
        html += mbRowHtml(item.key, item.rows, true, false);
      });

    } else {
      /* 人員層（depth===3）→ 顯示該人員的摘要統計列，店家清單由下方面板展開 */
      var parentStaff = MB.stack[2].label;
      html += mbRowHtml(parentStaff, rows, false, true);

      /* 三欄摘要：不分類 / 非CVS / CVS（無法點擊） */
      var cfg2 = _curCfg;
      var cvsCh2 = cfg2 && cfg2.cvsWeightChannel ? cfg2.cvsWeightChannel : 'CVS通路';
      [
        { label: '不分類', rows: rows },
        { label: '非CVS', rows: rows.filter(function(r){ return gv(r,'channel') !== cvsCh2; }) },
        { label: 'CVS',   rows: rows.filter(function(r){ return gv(r,'channel') === cvsCh2; }) }
      ].forEach(function(g) {
        if (!g.rows.length) return;
        var s = stat(g.rows);
        var n = mode === 'r' ? (s.u||0) : (s.l||0);
        var t = s.t;
        html += '<div class="mb-row no-drill">'
          + '<span class="mb-row-name" style="font-size:13px;font-weight:700;color:#6a8a70;padding-left:8px">'
          + g.label + '</span>'
          + '<span class="mb-row-total">' + t.toLocaleString() + '</span>'
          + mbCellHtml(n, t, mode)
          + '<span class="mb-cell"></span>'
          + '<span class="mb-cell"></span>'
          + '</div>';
      });
    }

    html += '</div></div>';

    /* 店家收折面板（每層都有，人員層預設展開） */
    html += mbStorePanelHtml(rows, rows.length, depth === 3);

    content.innerHTML = html;

    /* 若人員層，自動展開店家面板 */
    if (depth === 3) {
      MB.storeOpen = true;
      var tog = document.getElementById('mb-store-toggle');
      var bdy = document.getElementById('mb-store-body');
      if (tog) tog.classList.add('open');
      if (bdy) bdy.classList.add('open');
    }

    /* 重新綁定行點擊事件 */
    if (depth < 3) {
      content.querySelectorAll('.mb-row[data-label]').forEach(function(el) {
        el.addEventListener('click', function() {
          var label = this.getAttribute('data-label');
          mbDrillInto(label);
        });
      });
    }

    /* 捲回頂部 */
    var scroll = document.getElementById('mb-scroll');
    if (scroll) scroll.scrollTop = 0;
  }

  /* ── 導覽列渲染 ── */
  function mbRenderNav() {
    var nav = document.getElementById('mb-nav');
    if (!nav) return;
    var stack = MB.stack;
    if (!stack.length) {
      nav.innerHTML = '<span class="mb-nav-title">主要通路巡訪</span>';
      return;
    }
    var crumbs = '<div class="mb-nav-crumb">';
    crumbs += '<span class="mb-nav-crumb-item" onclick="mbGoTo(-1)">整體</span>';
    stack.forEach(function(s, i) {
      crumbs += '<span class="mb-nav-crumb-sep">›</span>';
      var isCurrent = (i === stack.length - 1);
      crumbs += '<span class="mb-nav-crumb-item' + (isCurrent ? ' current' : '') + '"'
        + (isCurrent ? '' : ' onclick="mbGoTo(' + i + ')"')
        + '>' + s.label + '</span>';
    });
    crumbs += '</div>';
    nav.innerHTML = '<span class="mb-nav-back" onclick="mbGoBack()">‹ 返回</span>' + crumbs;
  }

  /* ── 鑽取 ── */
  function mbDrillInto(label) {
    var depth = MB.stack.length;
    var key   = ['area','office','staff'][depth];
    MB.stack.push({ label: trimName(label), key: label, level: depth + 1 });
    MB.storeOpen = false;
    mbRender();
  }

  /* ── 返回上一層 ── */
  function mbGoBack() {
    if (!MB.stack.length) return;
    MB.stack.pop();
    MB.storeOpen = false;
    mbRender();
  }

  /* ── 麵包屑跳層 ── */
  function mbGoTo(idx) {
    if (idx < 0) {
      MB.stack = [];
    } else {
      MB.stack = MB.stack.slice(0, idx + 1);
    }
    MB.storeOpen = false;
    mbRender();
  }

  /* ── 切換達成/未達 ── */
  function mbSetMode(m) {
    MB.mode = m;
    mbRender();
  }

  /* ── 店家面板收折 ── */
  function mbToggleStore() {
    var toggle = document.getElementById('mb-store-toggle');
    var body   = document.getElementById('mb-store-body');
    if (!toggle || !body) return;
    MB.storeOpen = !MB.storeOpen;
    if (MB.storeOpen) {
      toggle.classList.add('open');
      body.classList.add('open');
    } else {
      toggle.classList.remove('open');
      body.classList.remove('open');
    }
  }

  /* ── 下載篩選晶片切換 ── */
  function mbToggleChip(key) {
    MB.dlChips[key] = !MB.dlChips[key];
    /* 至少保留一個 */
    if (!MB.dlChips.r && !MB.dlChips.g) MB.dlChips[key] = true;
    var rBtn = document.getElementById('mb-chip-r');
    var gBtn = document.getElementById('mb-chip-g');
    if (rBtn) rBtn.className = 'mb-dl-chip' + (MB.dlChips.r ? ' checked-r' : '');
    if (gBtn) gBtn.className = 'mb-dl-chip' + (MB.dlChips.g ? ' checked-g' : '');
    /* 晶片狀態也同步更新店家面板（若已展開） */
    var panel = document.getElementById('mb-store-panel');
    if (panel) {
      var rows = mbCurrentRows();
      var depth = MB.stack.length;
      panel.outerHTML = mbStorePanelHtml(rows, rows.length, depth === 3);
      /* 若剛才是展開狀態，重新打開 */
      if (MB.storeOpen) {
        var tog = document.getElementById('mb-store-toggle');
        var bdy = document.getElementById('mb-store-body');
        if (tog) tog.classList.add('open');
        if (bdy) bdy.classList.add('open');
      }
    }
  }

  /* ── 取得下載/複製用的資料 ── */
  function mbGetDlRows() {
    var rows = mbCurrentRows();
    return rows.filter(function(r) {
      var k = gs(r);
      if (MB.dlChips.r && k === 'u') return true;
      if (MB.dlChips.g && k === 'l') return true;
      return false;
    });
  }

  /* ── 複製 ── */
  function mbCopy() {
    var rows = mbGetDlRows();
    if (!rows.length) { alert('沒有符合勾選條件的資料'); return; }
    var breadcrumb = MB.stack.map(function(s) { return s.label; }).join(' › ');
    var lines = [];
    var chips = [];
    if (MB.dlChips.r) chips.push('未達');
    if (MB.dlChips.g) chips.push('達成');
    lines.push('📋 主要通路巡訪' + (breadcrumb ? ' ｜ ' + breadcrumb : '') + '（' + chips.join('＋') + '）');
    lines.push('共 ' + rows.length + ' 家');
    lines.push('');
    var staffMap = groupBy(rows, 'staff');
    Object.keys(staffMap).sort(function(a,b){
      var ua = stat(staffMap[a]).u || 0;
      var ub = stat(staffMap[b]).u || 0;
      return ub - ua;
    }).forEach(function(sName) {
      var sRows = staffMap[sName];
      var ss = stat(sRows);
      lines.push('👤 ' + trimName(sName) + '　'
        + (MB.dlChips.r ? '🔴未達' + (ss.u||0) + '　' : '')
        + (MB.dlChips.g ? '✅達成' + (ss.l||0) : ''));
      sRows.slice().sort(function(a,b){
        var ka = gs(a), kb = gs(b);
        if (ka==='u' && kb!=='u') return -1;
        if (kb==='u' && ka!=='u') return 1;
        return gv(a,'store').localeCompare(gv(b,'store'),'zh-TW');
      }).forEach(function(r){
        var k = gs(r);
        var em = k==='l' ? '✅' : '🔴';
        lines.push('  ' + em + ' ' + gv(r,'type') + '｜' + gv(r,'store'));
      });
      lines.push('');
    });
    var text = lines.join('\n').trim();
    var btn = document.getElementById('mb-copy-btn');
    var orig = btn ? btn.textContent : '';
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function(){
        if (btn) { btn.textContent = '✅'; setTimeout(function(){ btn.textContent = orig; }, 1500); }
      });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); } catch(e){}
      document.body.removeChild(ta);
      if (btn) { btn.textContent = '✅'; setTimeout(function(){ btn.textContent = orig; }, 1500); }
    }
  }

  /* ── 下載 XLSX ── */
  function mbDownload() {
    if (typeof XLSX === 'undefined') { alert('SheetJS 尚未載入'); return; }
    var rows = mbGetDlRows();
    if (!rows.length) { alert('沒有符合勾選條件的資料'); return; }
    var breadcrumb = MB.stack.map(function(s) { return s.label; }).join('_');
    var chips = [];
    if (MB.dlChips.r) chips.push('未達');
    if (MB.dlChips.g) chips.push('達成');
    var statusLabelMap = { l: '達成', u: '未達' };
    var listHeader = ['狀態'].concat(allHeaders);
    var listRows = rows.slice().sort(function(a,b){
      var ka = gs(a), kb = gs(b);
      if (ka==='u' && kb!=='u') return -1;
      if (kb==='u' && ka!=='u') return 1;
      return (gv(a,'area')+gv(a,'office')+gv(a,'staff')+gv(a,'store'))
        .localeCompare(gv(b,'area')+gv(b,'office')+gv(b,'staff')+gv(b,'store'), 'zh-TW');
    }).map(function(r){
      return [statusLabelMap[gs(r)] || gs(r)].concat(r.slice(0, allHeaders.length));
    });
    var wb = XLSX.utils.book_new();
    var ws = XLSX.utils.aoa_to_sheet([listHeader].concat(listRows));
    ws['!cols'] = listHeader.map(function(h){ return { wch: Math.max(10, Math.min(30, (h||'').length*2+4)) }; });
    XLSX.utils.book_append_sheet(wb, ws, '明細清冊');
    var now = new Date();
    var ts = now.getFullYear() + ('0'+(now.getMonth()+1)).slice(-2) + ('0'+now.getDate()).slice(-2);
    var fname = '主要通路巡訪' + (breadcrumb ? '_' + breadcrumb : '') + '_' + chips.join('＋') + '_' + ts + '.xlsx';
    XLSX.writeFile(wb, fname);
    var btn = document.getElementById('mb-dl-btn');
    if (btn) { btn.textContent = '✅ 完成'; setTimeout(function(){ btn.textContent = '📥 下載'; }, 1500); }
  }

  /* ── 初始化手機版 ── */
  function mbInit() {
    /* 偵測是否為主要通路巡訪 */
    var isBcCv = false;
    if (typeof SURVEYS !== 'undefined' && typeof curSurvey !== 'undefined' && curSurvey >= 0) {
      var s = SURVEYS[curSurvey];
      if (s && s.name && s.name.indexOf('主要通路') >= 0) isBcCv = true;
    }
    MB.isBcCv = isBcCv;
    if (!isBcCv) {
      document.getElementById('mb-content').innerHTML =
        '<div class="mb-empty">此專案暫不支援手機版介面<br>請切換至桌機檢視</div>';
      return;
    }
    MB.stack = [];
    MB.mode  = 'r';
    MB.storeOpen = false;
    /* 資料時間 */
    var dt = document.getElementById('mb-datatime');
    if (dt) {
      if (_syncTime) { dt.textContent = _syncTime; dt.style.display = ''; }
      else { dt.style.display = 'none'; }
    }
    /* 重置導覽狀態（切換專案時清空） */
    MB.stack = [];
    MB.storeOpen = false;
    mbRender();
  }

  /* ── 裝置偵測：resize 補偵測（初始化已在 body 開頭處理） ── */
  window.addEventListener('resize', function() {
    if (window.innerWidth < 768) {
      document.body.classList.add('mobile-mode');
    }
  });
  </script>

  </body>
