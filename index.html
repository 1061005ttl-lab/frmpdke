    <style>
      :root {

        --yellow: #d4900a;

        --purple: #7c3aed;
        --purple-bg: rgba(124, 58, 237, .08);
        --purple-bd: rgba(124, 58, 237, .22);
        --orange: #ea6c00;
        --orange-bg: rgba(234, 108, 0, .08);
        --orange-bd: rgba(234, 108, 0, .22);
        --red: #d93025;

        padding: 0;

      }

      html,

        overflow: hidden;
        font-family: 'Microsoft JhengHei', 'Noto Sans TC', sans-serif;

      body {

        background: var(--bg);
        color: var(--text);
      }

      #content-wrap {

        min-height: 0;
        display: flex;
        flex-direction: row;
        overflow: hidden;

      /* ══ TOPBAR ══ */
      #topbar {

      #title {
        font-size: 14px;
        font-weight: 900;
        color: var(--primary-d);
        letter-spacing: .5px;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .sep {
        width: 1px;
        height: 18px;
        background: rgba(0, 0, 0, .1);
        flex-shrink: 0;
      }

      .tb-label {

        flex-shrink: 0;

      }

      .tb-sel {

      #chips {

        flex-shrink: 0;

      .chip {
        padding: 4px 11px;
        border-radius: 99px;
        font-size: 11px;

        cursor: pointer;

      .chip.g {

      .chip.y {
        border-color: rgba(212, 144, 10, .35);

      }

      .chip.y.on {
        background: var(--yellow-bg);
        border-color: var(--yellow);
      }

      .chip.p {
        border-color: rgba(124, 58, 237, .3);
        color: #5b21b6;
      }

      .chip.p.on {
        background: var(--purple-bg);
        border-color: var(--purple);
      }

      .chip.o {
        border-color: rgba(234, 108, 0, .3);
        color: #92400e;
      }

      .chip.o.on {
        background: var(--orange-bg);
        border-color: var(--orange);
      }

      .chip.r {

      .chip.r.on {

      }

      #ver-ts {

        border-radius: 6px;
        line-height: 1.5;

      /* ══ GLOBAL BAR ══ */

        background: rgba(255, 255, 255, .5);

        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0, 0, 0, .06);
        padding: 0 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 32px;
        font-size: 12px;
        gap: 10px;
      }

      .gb-path {
        display: flex;
        align-items: center;
        flex-wrap: nowrap;
        gap: 1px;
        overflow: hidden;
      }

      .gb-seg {
        cursor: pointer;
        color: var(--sub);
        font-size: 11px;
        font-weight: 600;
        padding: 3px 7px;
        border-radius: 6px;
        transition: background .12s;

      .gb-seg:hover {

      .gb-seg.cur {

      .gb-arrow {

        flex-shrink: 0;
      }

      .gb-right {
        display: flex;
        align-items: center;
        gap: 7px;
        flex-shrink: 0;
      }

      .gb-sync {
        font-size: 10px;
        color: var(--sub);
        white-space: nowrap;
      }

      .gb-btn {
        padding: 3px 11px;
        border-radius: 6px;
        border: 1px solid rgba(0, 0, 0, .1);
        background: rgba(255, 255, 255, .7);
        color: var(--text);
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
        transition: all .14s;
        font-family: inherit;
      }

      .gb-btn:hover {
        border-color: var(--primary);
        color: var(--primary-d);
      }

      /* ══ STAGE ══ */
      #stage {
        flex: 1;
        min-height: 0;
        min-width: 0;
        display: flex;
        overflow: hidden;
        position: relative;
      }

      .col-side {
        flex-shrink: 0;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 8px;

        flex-direction: column;

        border-right: 1px solid rgba(0, 0, 0, .07);

      .col-side::-webkit-scrollbar {

      .col-main {

      .col-main.area-view {

      }

        overflow-y: hidden;

      #store-list-wrap {

        overflow-x: hidden;

      #store-list-wrap::-webkit-scrollbar-thumb {

      }

      .col-main::-webkit-scrollbar {
        width: 4px;
      }

      .col-main::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, .1);
        border-radius: 4px;
      }

      .divider {
        flex-shrink: 0;
        width: 1px;
        background: rgba(0, 0, 0, .07);
      }

      /* ══ 排行抽屜 ══ */
      #rank-drawer {
        flex-shrink: 0;
        width: 240px;
        background: var(--glass);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border-left: 1px solid rgba(0, 0, 0, .08);
        display: flex;
        flex-direction: column;
        transition: width .3s var(--ease);
        overflow: hidden;
        min-height: 0;
      }

      #rank-drawer.collapsed {
        width: 32px;
      }

      #rank-drawer.collapsed .rd-content {
        opacity: 0;
        pointer-events: none;
      }

      .rd-toggle {
        width: 32px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;

        border-bottom: 1px solid rgba(0, 0, 0, .07);

        font-size: 10px;
        font-weight: 700;
        color: var(--sub);

      #rank-drawer:not(.collapsed) .rd-toggle {
        writing-mode: horizontal-tb;

        padding: 10px 14px;
        border-bottom: 1px solid rgba(0, 0, 0, .07);
      }

      .rd-content {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;

      .rd-content::-webkit-scrollbar {

        background: rgba(0, 0, 0, .1);
        border-radius: 3px;
      }

      .rd-section {
        padding: 10px 12px 6px;
      }

      .rd-sec-title {
        font-size: 9px;
        font-weight: 900;

        color: #aaa;

        align-items: center;
        gap: 6px;
      }

      .rd-sec-title::after {
        content: '';

        height: 1px;
        background: rgba(0, 0, 0, .07);
      }

      .rank-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 9px;
        border-radius: 9px;
        margin-bottom: 4px;
        cursor: pointer;
        border: 1px solid transparent;
        transition: all .18s;
      }

      .rank-item:hover {
        background: rgba(139, 166, 144, .1);
        border-color: rgba(139, 166, 144, .25);
      }

      .rank-item.top3 {

        border: 1px solid rgba(200, 50, 50, .18);

      }

      .rank-item.top3:nth-child(1) {
        animation-delay: 0s;
      }

      .rank-item.top3:nth-child(2) {
        animation-delay: .4s;
      }

      .rank-item.top3:nth-child(3) {
        animation-delay: .8s;
      }

        0%,
        100% {
          box-shadow: none;

        50% {
          box-shadow: 0 0 10px rgba(200, 50, 50, .2), inset 0 0 6px rgba(200, 50, 50, .06);
        }
      }

      .rank-badge {
        width: 22px;
        height: 22px;
        border-radius: 7px;

        align-items: center;

      .rank-badge.r1 {

      .rank-badge.r3 {

        height: 23px;

      .rank-info {

      .rank-name {

      .rank-sub {

      .mc-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 4px;
        margin-bottom: 7px;
      }

      .mc-name {
        font-size: 14px;
        font-weight: 800;
        color: var(--text);

        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .mc-total {
        font-size: 24px;
        font-weight: 900;

      .mc-bar {
        height: 4px;

        margin-bottom: 5px;

      .mc-sts {

      .mc-s {

      .mc-s.g {
        color: var(--green);

      .mc-s.y {
        color: var(--yellow);
      }

      .mc-s.p {
        color: var(--purple);
      }

      .mc-s.o {
        color: var(--orange);
      }

      .mc-s.r {
        color: var(--red);
      }

      /* ══ 整體卡（深色英雄） ══ */
      .big-card.whole {
        grid-column: 1/-1;
        cursor: default;
        background: linear-gradient(130deg, #1a1f2e 0%, #22293a 60%, #1e2d26 100%);
        border-radius: var(--r);

        flex-direction: row;

        flex-direction: column;
        justify-content: center;
        flex-shrink: 0;
        min-width: 130px;
      }

      .wc-label {

        font-weight: 900;

        margin-bottom: 6px;

      .wc-total {

        position: relative;
      }

      .big-card.bc-top1::after,
      .big-card.bc-top2::after,
      .big-card.bc-top3::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: var(--r);
        pointer-events: none;
        animation: cardGlow 3s ease-in-out infinite;
      }

      .big-card.bc-top1::after {
        box-shadow: 0 0 0 2px rgba(220, 38, 38, .55), 0 4px 20px rgba(220, 38, 38, .25);
        animation-delay: 0s;
      }

      .big-card.bc-top2::after {
        box-shadow: 0 0 0 1.5px rgba(234, 88, 12, .45), 0 4px 16px rgba(234, 88, 12, .18);
        animation-delay: .5s;
      }

      .big-card.bc-top3::after {
        box-shadow: 0 0 0 1.5px rgba(202, 138, 4, .4), 0 4px 14px rgba(202, 138, 4, .15);
        animation-delay: 1s;
      }

      @keyframes cardGlow {

        0%,
        100% {
          opacity: .55;
        }

        50% {
          opacity: 1;
        }
      }

    <script>
      /* ══ 設定 ══ */
      var SURVEYS = [{
        name: '特販米酒PET調查',
        id: '1ftAAjWsibhNFjaro5ZONFfu2Ru7CmMq9VfSUArdckLc',
        sheet: '店家名冊',
        syncSheet: '輔助',
        syncCell: 'B1'
      }, {
        name: 'CVS釀酒季調查',
        id: '19QuxbkdHOknPXlA3bwN3u1E5o5R8nnSuWf-yFA0bRXY',
        sheet: '店家名冊',
        syncSheet: '輔助',
        syncCell: 'B1'
      }, {
        name: 'CVS白蘭地調價',
        id: '1H_6MSbPFZbgAvN1rrnAzflsVnLq_Afd2nD_kAT_5BiM',
        sheet: '店家名冊',
        syncSheet: '輔助',
        syncCell: 'B1'
      }];
      var AREA_ORDER = ['北部', '桃園', '臺中', '嘉義', '臺南', '高雄', '花蓮']; /* 燈號顏色依位置：最後一個永遠紅，其餘按順序 */
      var STATUS_CLS_ORDER = ['g', 'y', 'p', 'o'];
      var STATUS_EMOJI_ORDER = ['✅', '🟡', '🟣', '🟠']; /* ══ 狀態 ══ */
      var allRows = [],
        allHeaders = [];
      var chips = {};
      var curStatuses = []; /* [{key,col,label,cls,emoji}] 由 autoDetectStatuses() 產生 */
      var fArea = '',
        fOffice = '',
        fStaff = '';
      var fChSet = null,
        fTpSet = null;
      var drillStack = [];
      var curSurvey = -1;
      var _oMap = {},
        _sMap = {};
      var _runRaf = null;
      var _syncTime = '';
      var _rankDrawerOpen = true;
      var _viewMode = 'org';
      var _chDrillStack = [];
      var _chTypeMap = {};
      var _allCh = [],
        _allTp = []; /* ══ 自動辨識狀態欄 ══ */
      function autoDetectStatuses(headers, rawRows) {
        /* 找出所有值只有 '0'/'1'/'' 的欄位 */
        var statusColIdxs = [];
        headers.forEach(function(h, i) {
          if (!h) return;
          var isStatus = rawRows.every(function(r) {
            var v = (r[i] || '').trim();
            return v === '' || v === '0' || v === '1';
          });
          if (isStatus) statusColIdxs.push(i);
        });
        if (!statusColIdxs.length) return null; /* 無法辨識 */ /* 分出「未填寫」欄和其他欄 */
        var unfilled = -1;
        var others = [];
        statusColIdxs.forEach(function(i) {
          if (headers[i].indexOf('未填寫') >= 0) unfilled = i;
          else others.push(i);
        }); /* 組合：其他欄（按原始順序）+ 未填寫在最後 */
        var ordered = others.slice();
        if (unfilled >= 0) ordered.push(unfilled);
        else if (ordered.length) ordered.push(ordered.pop()); /* fallback：最後一欄當紅燈 */
        var statuses = ordered.map(function(colIdx, i) {
          var isLast = (i === ordered.length - 1);
          var cls = isLast ? 'r' : STATUS_CLS_ORDER[Math.min(i, STATUS_CLS_ORDER.length - 1)];
          var emoji = isLast ? '🔴' : STATUS_EMOJI_ORDER[Math.min(i, STATUS_EMOJI_ORDER.length - 1)];
          return {
            key: isLast ? 'u' : ['l', 'n', 'p', 'o'][Math.min(i, 3)],
            colIdx: colIdx,
            col: headers[colIdx],
            label: emoji + ' ' + headers[colIdx],
            labelShort: headers[colIdx],
            cls: cls,
            emoji: emoji
          };
        });
        return statuses;
      } /* ══ chips 重建 ══ */
      function rebuildChips() {
        chips = {};
        curStatuses.forEach(function(s) {
          chips[s.key] = true;
        }); /* 桌機 */
        var chipsEl = document.getElementById('chips');
        if (chipsEl) {
          chipsEl.innerHTML = '';
          curStatuses.forEach(function(s) {
            var btn = document.createElement('button');
            btn.className = 'chip ' + s.cls + ' on';
            btn.id = 'chip-' + s.key;
            btn.textContent = s.label;
            btn.onclick = (function(k) {
              return function() {
                toggleChip(k);
              };
            })(s.key);
            chipsEl.appendChild(btn);
          });
        } /* 手機 */
        var mmRow = document.getElementById('mm-chips-row');
        if (mmRow) {
          Array.from(mmRow.querySelectorAll('.chip')).forEach(function(el) {
            el.parentNode.removeChild(el);
          });
          var clearBtn = document.getElementById('mm-clear');
          curStatuses.forEach(function(s) {
            var btn = document.createElement('button');
            btn.className = 'chip ' + s.cls + ' on';
            btn.id = 'mm-chip-' + s.key;
            btn.textContent = s.label;
            btn.onclick = (function(k) {
              return function() {
                toggleChip(k);
                syncMmChips();
              };
            })(s.key);
            mmRow.insertBefore(btn, clearBtn);
          });
        }
      } /* ══ 欄位索引 ══ */
      var CI = {
        area: -1,
        office: -1,
        staff: -1,
        store: -1,
        code: -1,
        channel: -1,
        type: -1,
        grade: -1
      };

      function initCI() {
        var MAP = {
          area: ['營業處名稱', '營業處'],
          office: ['營業所/課', '營業所'],
          staff: ['執行人員', '業務員'],
          store: ['店家名稱', '店家'],
          code: ['店家代碼'],
          channel: ['通路別'],
          type: ['店家型態'],
          grade: ['店家等級']
        };
        Object.keys(MAP).forEach(function(k) {
          CI[k] = -1;
          MAP[k].forEach(function(name) {
            if (CI[k] >= 0) return;
            var i = allHeaders.findIndex(function(h) {
              return h === name;
            });
            if (i < 0) i = allHeaders.findIndex(function(h) {
              return h.indexOf(name) >= 0;
            });
            if (i >= 0) CI[k] = i;
          });
        });
      }

      function gv(row, key) {
        var i = CI[key];
        return (i >= 0 && row[i] != null) ? String(row[i]).trim() : '';
      }

      function gs(row) {
        return row[row.length - 1];
      } /* ══ 工具 ══ */
      function stat(rows) {
        var s = {
          t: 0
        };
        curStatuses.forEach(function(st) {
          s[st.key] = 0;
        });
        rows.forEach(function(r) {
          var k = gs(r);
          if (s[k] !== undefined) s[k]++;
          else s[k] = 1;
          s.t++;
        });
        return s;
      }

      function pct(a, b) {
        return b > 0 ? Math.round(a / b * 100) : 0;
      }

      function esc(s) {
        return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      function sortArea(keys) {
        return keys.slice().sort(function(a, b) {
          var ai = AREA_ORDER.findIndex(function(k) {
            return a.indexOf(k) >= 0;
          });
          var bi = AREA_ORDER.findIndex(function(k) {
            return b.indexOf(k) >= 0;
          });
          if (ai >= 0 && bi >= 0) return ai - bi;
          if (ai >= 0) return -1;
          if (bi >= 0) return 1;
          return a.localeCompare(b, 'zh-TW');
        });
      }

      function groupBy(rows, key) {
        var m = {};
        rows.forEach(function(r) {
          var k = gv(r, key) || '（未知）';
          if (!m[k]) m[k] = [];
          m[k].push(r);
        });
        return m;
      }

      function visible() {
        return allRows.filter(function(r) {
          if (fArea && gv(r, 'area') !== fArea) return false;
          if (fOffice && gv(r, 'office') !== fOffice) return false;
          if (fStaff && gv(r, 'staff') !== fStaff) return false;
          if (fChSet !== null && !fChSet.has(gv(r, 'channel'))) return false;
          if (fTpSet !== null && !fTpSet.has(gv(r, 'type'))) return false;
          return chips[gs(r)];
        });
      }

      function segs(s) {
        var t = s.t || 1;
        return curStatuses.map(function(st) {
          return '<div class="seg-' + st.cls + '" style="width:' + pct(s[st.key] || 0, t) + '%"></div>';
        }).join('');
      }

      function colsClass(n) {
        return 'cols-' + Math.min(n, 5);
      } /* ══ 資料載入 ══ */
      function onSurveyChange() {
        var idx = Number(document.getElementById('sel-survey').value);
        if (idx === curSurvey) {
          render('none');
          return;
        }
        curSurvey = -1;
        drillStack = []; /* 完整重置 */
        allRows = [];
        allHeaders = [];
        curStatuses = [];
        fArea = '';
        fOffice = '';
        fStaff = '';
        fChSet = null;
        fTpSet = null;
        _allCh = [];
        _allTp = [];
        _chTypeMap = {};
        _oMap = {};
        _sMap = {};
        _chDrillStack = [];
        chips = {};
        ['sel-area', 'sel-office', 'sel-staff'].forEach(function(id) {
          var el = document.getElementById(id);
          if (el) {
            el.innerHTML = '<option value="">全部</option>';
            el.disabled = true;
          }
        });
        ['ms-ch-btn', 'ms-tp-btn', 'mm-ch-btn', 'mm-tp-btn'].forEach(function(id) {
          var el = document.getElementById(id);
          if (el) {
            el.textContent = '全部';
            el.disabled = true;
            el.classList.remove('has-filter');
          }
        });
        ['ms-ch-drop', 'ms-tp-drop', 'mm-ch-drop', 'mm-tp-drop'].forEach(function(id) {
          var el = document.getElementById(id);
          if (el) el.innerHTML = '';
        });
        var rdContent = document.getElementById('rd-content');
        if (rdContent) rdContent.innerHTML = '';
        document.getElementById('stage').innerHTML = '';
        updateClearBtn();
        showLoading();
        var cfg = SURVEYS[idx];
        if (!cfg) return;
        var p1 = fetchSheetP(cfg.id, cfg.sheet);
        var p2 = cfg.syncSheet ? fetchSyncTime(cfg.id, cfg.syncSheet, cfg.syncCell) : Promise.resolve('');
        Promise.all([p1, p2]).then(function(res) {
          try {
            allHeaders = res[0].headers;
            allRows = res[0].rows;
            curStatuses = res[0].statuses;
            initCI();
            rebuildChips();
            buildFilters();
          } catch (e) {
            console.error(e);
          }
          _syncTime = res[1] || '';
          curSurvey = idx;
          hideLoading();
          if (allRows.length) {
            render('none');
            updateRankDrawer();
          }
        }).catch(function(err) {
          hideLoading();
          document.getElementById('stage').innerHTML = '<div style="padding:40px;color:#c62828;font-size:14px">⚠️ 載入失敗：' + err + '</div>';
        });
      }

      function fetchSyncTime(id, sheet, cell) {
        var url = 'https://docs.google.com/spreadsheets/d/' + id + '/gviz/tq?tqx=out:json&sheet=' + encodeURIComponent(sheet) + '&range=' + cell;
        return fetch(url).then(function(r) {
          return r.text();
        }).then(function(txt) {
          var s = txt.indexOf('{'),
            e = txt.lastIndexOf('}');
          if (s < 0) return '';
          var json = JSON.parse(txt.slice(s, e + 1));
          var cell = json.table && json.table.rows && json.table.rows[0] && json.table.rows[0].c && json.table.rows[0].c[0];
          if (!cell) return '';
          var raw = cell.f || cell.v || '';
          raw = String(raw).trim();
          var dm = raw.match(/^Date\((\d+),(\d+),(\d+),(\d+),(\d+),(\d+)\)$/);
          if (dm) {
            var Y = dm[1],
              M = String(Number(dm[2]) + 1).padStart(2, '0'),
              D = String(dm[3]).padStart(2, '0'),
              hh = String(dm[4]).padStart(2, '0'),
              mm = String(dm[5]).padStart(2, '0'),
              ss = String(dm[6]).padStart(2, '0');
            return Y + '/' + M + '/' + D + ' ' + hh + ':' + mm + ':' + ss;
          }
          var sm = raw.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})\s+(\d{1,2}):(\d{2}):(\d{2})$/);
          if (sm) {
            var Y = sm[1],
              M = String(sm[2]).padStart(2, '0'),
              D = String(sm[3]).padStart(2, '0'),
              hh = String(sm[4]).padStart(2, '0'),
              mm = sm[5],
              ss = sm[6];
            return Y + '/' + M + '/' + D + ' ' + hh + ':' + mm + ':' + ss;
          }
          return raw;
        }).catch(function() {
          return '';
        });
      }

      function fetchSheetP(id, sheet) {
        return new Promise(function(ok, fail) {
          fetchSheet(id, sheet, ok, fail);
        });
      }

      function fetchSheet(id, sheet, ok, fail) {
        var url = 'https://docs.google.com/spreadsheets/d/' + id + '/gviz/tq?tqx=out:json&sheet=' + encodeURIComponent(sheet);
        fetch(url).then(function(r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.text();
        }).then(function(txt) {
          var s = txt.indexOf('{'),
            e = txt.lastIndexOf('}');
          if (s < 0 || e < 0) throw new Error('回應格式錯誤');
          var json = JSON.parse(txt.slice(s, e + 1));
          var tbl = json.table;
          if (!tbl || !tbl.cols) throw new Error('無資料');
          var hdrs = tbl.cols.map(function(c) {
            return c.label || '';
          });
          var rawRows = (tbl.rows || []).map(function(row) {
            return (row.c || []).map(function(c) {
              return c && c.v != null ? String(c.v) : '';
            });
          }).filter(function(r) {
            return !r.every(function(v) {
              return !v.trim();
            });
          }); /* 自動辨識狀態欄 */
          var statuses = autoDetectStatuses(hdrs, rawRows);
          if (!statuses || !statuses.length) throw new Error('無法辨識狀態欄位');
          var statusColSet = new Set(statuses.map(function(s) {
            return s.colIdx;
          })); /* 為每列決定狀態 key */
          var processedRows = rawRows.map(function(vals) {
            var assignedKey = statuses[statuses.length - 1].key; /* 預設最後（未填寫）*/
            for (var si = 0; si < statuses.length - 1; si++) {
              var ci = statuses[si].colIdx;
              if (ci >= 0 && (vals[ci] || '').trim() === '1') {
                assignedKey = statuses[si].key;
                break;
              }
            }
            var keep = [];
            hdrs.forEach(function(h, i) {
              if (!statusColSet.has(i)) keep.push(vals[i] || '');
            });
            keep.push(assignedKey);
            return keep;
          }); /* 保留非狀態欄的 headers */
          var keepHdrs = hdrs.filter(function(h, i) {
            return !statusColSet.has(i);
          });
          ok({
            headers: keepHdrs,
            rows: processedRows,
            statuses: statuses
          });
        }).catch(function(e) {
          console.error('fetchSheet:', e);
          fail(e.message || String(e));
        });
      } /* ══ 篩選器 ══ */
      function buildFilters() {
        var aSet = new Set();
        _oMap = {};
        _sMap = {};
        var chSet = new Set(),
          tpSet = new Set();
        _chTypeMap = {};
        _allCh = [];
        _allTp = [];
        fChSet = null;
        fTpSet = null;
        allRows.forEach(function(r) {
          var a = gv(r, 'area'),
            o = gv(r, 'office'),
            s = gv(r, 'staff');
          var ch = gv(r, 'channel'),
            tp = gv(r, 'type');
          if (a) {
            aSet.add(a);
            if (!_oMap[a]) _oMap[a] = new Set();
            if (o) {
              _oMap[a].add(o);
              var k = a + '||' + o;
              if (!_sMap[k]) _sMap[k] = new Set();
              if (s) _sMap[k].add(s);
            }
          }
          if (ch) {
            chSet.add(ch);
            if (!_chTypeMap[ch]) _chTypeMap[ch] = new Set();
            if (tp) _chTypeMap[ch].add(tp);
          }
          if (tp) tpSet.add(tp);
        });
        fillSel('sel-area', Array.from(aSet));
        _allCh = Array.from(chSet).sort(function(a, b) {
          return a.localeCompare(b, 'zh-TW');
        });
        _allTp = Array.from(tpSet).sort(function(a, b) {
          return a.localeCompare(b, 'zh-TW');
        });
        buildMsDrop('ch', _allCh);
        buildMsDrop('tp', _allTp);
        ['ms-ch-btn', 'ms-tp-btn', 'mm-ch-btn', 'mm-tp-btn'].forEach(function(id) {
          var el = document.getElementById(id);
          if (el) el.disabled = false;
        });
        document.getElementById('sel-area').disabled = false;
        onAreaFilter(false);
      }

      function fillSel(id, items) {
        var el = document.getElementById(id);
        var prev = el.value;
        el.innerHTML = '<option value="">全部</option>' + items.sort(function(a, b) {
          return a.localeCompare(b, 'zh-TW');
        }).map(function(v) {
          return '<option value="' + esc(v) + '">' + esc(v) + '</option>';
        }).join('');
        if (prev) el.value = prev;
      }

      function onAreaFilter(doRender) {
        fArea = document.getElementById('sel-area').value;
        fOffice = '';
        fStaff = '';
        var oEl = document.getElementById('sel-office');
        var offices = fArea ? Array.from(_oMap[fArea] || []).sort(function(a, b) {
          return a.localeCompare(b, 'zh-TW');
        }) : [];
        oEl.innerHTML = '<option value="">全部</option>' + offices.map(function(o) {
          return '<option value="' + esc(o) + '">' + esc(o) + '</option>';
        }).join('');
        oEl.disabled = !offices.length;
        onOfficeFilter(false);
        if (doRender !== false) {
          render('none');
          updateRankDrawer();
        }
      }

      function onOfficeFilter(doRender) {
        fOffice = document.getElementById('sel-office').value;
        fStaff = '';
        var sEl = document.getElementById('sel-staff');
        var key = fArea + '||' + fOffice;
        var staffs = fOffice ? Array.from(_sMap[key] || []).sort(function(a, b) {
          return a.localeCompare(b, 'zh-TW');
        }) : [];
        sEl.innerHTML = '<option value="">全部</option>' + staffs.map(function(s) {
          return '<option value="' + esc(s) + '">' + esc(s) + '</option>';
        }).join('');
        sEl.disabled = !staffs.length;
        if (doRender !== false) {
          render('none');
          updateRankDrawer();
        }
      }

      function onStaffFilter() {
        fStaff = document.getElementById('sel-staff').value;
        render('none');
      }

      function updateClearBtn() {
        var btn = document.getElementById('clear-btn');
        if (!btn) return;
        var allOn = curStatuses.every(function(s) {
          return chips[s.key];
        });
        var hasFilter = fArea || fOffice || fStaff || fChSet !== null || fTpSet !== null || !allOn;
        btn.style.display = hasFilter ? '' : 'none';
      }

      function clearAllFilters() {
        fArea = '';
        fOffice = '';
        fStaff = '';
        fChSet = null;
        fTpSet = null;
        ['sel-area', 'sel-office', 'sel-staff'].forEach(function(id) {
          var el = document.getElementById(id);
          if (el) el.value = '';
        });
        curStatuses.forEach(function(s) {
          chips[s.key] = true;
          var el = document.getElementById('chip-' + s.key);
          if (el) el.classList.add('on');
        });
        buildMsDrop('ch', _allCh);
        buildMsDrop('tp', _allTp);
        updateClearBtn();
        render('none');
        updateRankDrawer();
      }

      function toggleChip(t) {
        chips[t] = !chips[t];
        var el = document.getElementById('chip-' + t);
        if (el) el.classList.toggle('on', chips[t]);
        updateClearBtn();
        render('none');
      } /* ══ Multi-Select ══ */
      function buildMsDrop(key, items) {
        var isChKey = (key === 'ch');
        var currentSet = isChKey ? fChSet : fTpSet;
        var dropIds = ['ms-' + key + '-drop', 'mm-' + key + '-drop'];
        var btnIds = ['ms-' + key + '-btn', 'mm-' + key + '-btn'];
        dropIds.forEach(function(dropId) {
          var drop = document.getElementById(dropId);
          if (!drop) return;
          drop.innerHTML = '';
          var actions = document.createElement('div');
          actions.className = 'ms-drop-actions';
          var allBtn = document.createElement('button');
          allBtn.className = 'ms-act-btn';
          allBtn.textContent = '全選';
          allBtn.onclick = function(e) {
            e.stopPropagation();
            msSelectAll(key, true);
          };
          var noneBtn = document.createElement('button');
          noneBtn.className = 'ms-act-btn';
          noneBtn.textContent = '全不選';
          noneBtn.onclick = function(e) {
            e.stopPropagation();
            msSelectAll(key, false);
          };
          actions.appendChild(allBtn);
          actions.appendChild(noneBtn);
          drop.appendChild(actions);
          items.forEach(function(val) {
            var isChecked = currentSet === null || currentSet.has(val);
            var row = document.createElement('div');
            row.className = 'ms-item';
            var cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.id = dropId + '-' + val.replace(/\s/g, '_');
            cb.checked = isChecked;
            cb.addEventListener('change', function() {
              msToggleItem(key, val, cb.checked);
            });
            var lbl = document.createElement('label');
            lbl.htmlFor = cb.id;
            lbl.textContent = val;
            row.appendChild(cb);
            row.appendChild(lbl);
            row.addEventListener('click', function(e) {
              if (e.target !== cb && e.target !== lbl) {
                cb.checked = !cb.checked;
                msToggleItem(key, val, cb.checked);
              }
            });
            drop.appendChild(row);
          });
        });
        updateMsBtnLabel(key, items);
      }

      function msToggleItem(key, val, checked) {
        var isChKey = (key === 'ch');
        var currentSet = isChKey ? fChSet : fTpSet;
        var allItems = isChKey ? _allCh : _allTp;
        if (currentSet === null) currentSet = new Set(allItems);
        if (checked) currentSet.add(val);
        else currentSet.delete(val);
        if (currentSet.size === allItems.length) currentSet = null;
        if (isChKey) fChSet = currentSet;
        else fTpSet = currentSet;
        syncMsCheckboxes(key, allItems);
        updateMsBtnLabel(key, allItems);
        if (isChKey) {
          var availTp = fChSet === null ? _allTp : (function() {
            var s = new Set();
            fChSet.forEach(function(ch) {
              (_chTypeMap[ch] || new Set()).forEach(function(tp) {
                s.add(tp);
              });
            });
            return _allTp.filter(function(tp) {
              return s.has(tp);
            });
          }());
          if (fTpSet !== null) {
            fTpSet.forEach(function(tp) {
              if (availTp.indexOf(tp) < 0) fTpSet.delete(tp);
            });
            if (fTpSet.size === availTp.length) fTpSet = null;
          }
          buildMsDrop('tp', availTp);
        }
        updateClearBtn();
        render('none');
      }

      function msSelectAll(key, selectAll) {
        var isChKey = (key === 'ch');
        var allItems = isChKey ? _allCh : _allTp;
        if (isChKey) fChSet = selectAll ? null : new Set();
        else fTpSet = selectAll ? null : new Set();
        syncMsCheckboxes(key, allItems);
        updateMsBtnLabel(key, allItems);
        updateClearBtn();
        render('none');
      }

      function syncMsCheckboxes(key, allItems) {
        var isChKey = (key === 'ch');
        var currentSet = isChKey ? fChSet : fTpSet;
        ['ms-' + key + '-drop', 'mm-' + key + '-drop'].forEach(function(dropId) {
          var drop = document.getElementById(dropId);
          if (!drop) return;
          allItems.forEach(function(val) {
            var cb = document.getElementById(dropId + '-' + val.replace(/\s/g, '_'));
            if (cb) cb.checked = (currentSet === null || currentSet.has(val));
          });
        });
      }

      function updateMsBtnLabel(key, allItems) {
        var isChKey = (key === 'ch');
        var currentSet = isChKey ? fChSet : fTpSet;
        var label, hasFilter;
        if (currentSet === null || currentSet.size === allItems.length) {
          label = '全部';
          hasFilter = false;
        } else if (currentSet.size === 0) {
          label = '（無）';
          hasFilter = true;
        } else {
          var arr = Array.from(currentSet);
          label = arr.length === 1 ? arr[0] : arr.length + '項已選';
          hasFilter = true;
        } ['ms-' + key + '-btn', 'mm-' + key + '-btn'].forEach(function(id) {
          var btn = document.getElementById(id);
          if (!btn) return;
          btn.textContent = label;
          btn.classList.toggle('has-filter', hasFilter);
        });
      }
      var _msOpenKey = null;

      function toggleMsDropdown(key) {
        var dropId = 'ms-' + key + '-drop';
        var drop = document.getElementById(dropId);
        if (!drop) return;
        var isOpen = drop.classList.contains('open');
        document.querySelectorAll('.ms-drop').forEach(function(d) {
          d.classList.remove('open');
        });
        _msOpenKey = null;
        if (!isOpen) {
          drop.classList.add('open');
          _msOpenKey = key;
        }
      }
      document.addEventListener('click', function(e) {
        if (!_msOpenKey) return;
        var wrap = document.getElementById('ms-' + _msOpenKey + '-wrap');
        if (wrap && !wrap.contains(e.target)) {
          document.querySelectorAll('.ms-drop').forEach(function(d) {
            d.classList.remove('open');
          });
          _msOpenKey = null;
        }
      }); /* ══ 下鑽 ══ */
      var LEVEL_IDX = {
        area: 0,
        office: 1,
        staff: 2
      };

      function drillInto(level, key) {
        drillStack = drillStack.slice(0, LEVEL_IDX[level]);
        drillStack.push({
          level: level,
          key: key
        });
        doRender('forward', null);
      }

      function goToDepth(d) {
        if (drillStack.length === d) return;
        drillStack = drillStack.slice(0, d);
        doRender('back', null);
      }

      function setViewMode(m) {
        if (_viewMode === m) return;
        _viewMode = m;
        _chDrillStack = [];
        var btnOrg = document.getElementById('vt-org');
        var btnCh = document.getElementById('vt-ch');
        if (btnOrg && btnCh) {
          btnOrg.className = 'vt-btn' + (m === 'org' ? ' on' : '');
          btnCh.className = 'vt-btn' + (m === 'ch' ? ' on' : '');
        }
        updateGlobalBar();
        render('none');
      }

      function chDrillInto(level, key) {
        if (level === 'ch') _chDrillStack = [{
          level: 'ch',
          key: key
        }];
        else _chDrillStack = [_chDrillStack[0], {
          level: 'area',
          key: key
        }];
        doRender('forward', null);
      }

      function chGoToDepth(d) {
        if (_chDrillStack.length === d) return;
        _chDrillStack = _chDrillStack.slice(0, d);
        doRender('back', null);
      }

      function buildChStage(container, rows) {
        container.innerHTML = '';
        var depth = _chDrillStack.length;
        if (depth === 0) {
          var main = makeMain();
          main.classList.add('ch-view');
          buildChCards(main, rows);
          container.appendChild(main);
        } else if (depth === 1) {
          var ch = _chDrillStack[0].key;
          var chRows = rows.filter(function(r) {
            return gv(r, 'channel') === ch;
          });
          var side = makeSide(220);
          buildChSide(side, rows, ch);
          container.appendChild(side);
          container.appendChild(makeDivider());
          var main = makeMain();
          main.classList.add('area-view');
          buildChAreaCards(main, chRows, ch);
          container.appendChild(main);
        } else {
          var ch = _chDrillStack[0].key;
          var area = _chDrillStack[1].key;
          var chRows = rows.filter(function(r) {
            return gv(r, 'channel') === ch;
          });
          var aRows = chRows.filter(function(r) {
            return gv(r, 'area') === area;
          });
          var side = makeSide(220);
          buildChSide(side, rows, ch);
          container.appendChild(side);
          container.appendChild(makeDivider());
          var side2 = makeSide(210);
          buildChAreaSide(side2, chRows, area, ch);
          container.appendChild(side2);
          container.appendChild(makeDivider());
          var main = makeMain();
          main.classList.add('store-view');
          buildStoreCards(main, aRows);
          container.appendChild(main);
        }
      }

      function buildChCards(c, rows) {
        c.appendChild(makeWholeCard('整體', rows));
        var m = groupBy(rows, 'channel');
        var lastKey = curStatuses[curStatuses.length - 1].key;
        var sorted = Object.keys(m).sort(function(a, b) {
          return (stat(m[b])[lastKey] || 0) - (stat(m[a])[lastKey] || 0);
        });
        sorted.forEach(function(k) {
          c.appendChild(makeBigCard(k, m[k], function() {
            chDrillInto('ch', k);
          }, false));
        });
        if (!sorted.length) c.appendChild(makeEmpty('沒有符合條件的資料'));
      }

      function buildChSide(c, rows, selCh) {
        var m = groupBy(rows, 'channel');
        var lastKey = curStatuses[curStatuses.length - 1].key;
        var sorted = Object.keys(m).sort(function(a, b) {
          return (stat(m[b])[lastKey] || 0) - (stat(m[a])[lastKey] || 0);
        });
        c.appendChild(makeMiniCard('整體', rows, function() {
          chGoToDepth(0);
        }, false));
        sorted.forEach(function(k) {
          c.appendChild(makeMiniCard(k, m[k], function() {
            chDrillInto('ch', k);
          }, k === selCh));
        });
      }

      function buildChAreaCards(c, rows, chName) {
        c.appendChild(makeWholeCard(chName + ' 整體', rows));
        var m = groupBy(rows, 'area');
        var sorted = sortArea(Object.keys(m));
        sorted.forEach(function(k) {
          c.appendChild(makeBigCard(k, m[k], function() {
            chDrillInto('area', k);
          }, false));
        });
        if (!sorted.length) c.appendChild(makeEmpty('沒有符合條件的資料'));
      }

      function buildChAreaSide(c, rows, selArea, chName) {
        var m = groupBy(rows, 'area');
        var sorted = sortArea(Object.keys(m));
        c.appendChild(makeMiniCard(chName + ' 整體', rows, function() {
          chGoToDepth(1);
        }, false));
        sorted.forEach(function(k) {
          c.appendChild(makeMiniCard(k, m[k], function() {
            chDrillInto('area', k);
          }, k === selArea));
        });
      }

      function render(dir) {
        doRender(dir || 'none', null);
      } /* ══ 渲染引擎 ══ */
      function doRender(dir, clickedCard) {
        if (!allRows.length || !curStatuses.length) return;
        updateGlobalBar();
        var rows = visible();
        var stage = document.getElementById('stage');
        if (dir === 'none') {
          stage.innerHTML = '';
          buildStage(stage, rows);
          syncMmSelects();
          return;
        }
        var newWrap = document.createElement('div');
        newWrap.style.cssText = 'position:fixed;left:-9999px;top:-9999px;display:flex;width:' + stage.offsetWidth + 'px;height:' + stage.offsetHeight + 'px;overflow:hidden;';
        document.body.appendChild(newWrap);
        buildStage(newWrap, rows);
        var newMain = newWrap.querySelector('.col-main');
        if (newMain) {
          newMain.style.opacity = '0';
          newMain.style.transform = dir === 'forward' ? 'translateX(40px) scale(.97)' : 'translateX(-40px) scale(.97)';
          newMain.style.transition = 'none';
        }
        requestAnimationFrame(function() {
          stage.innerHTML = '';
          Array.from(newWrap.children).forEach(function(c) {
            stage.appendChild(c);
          });
          if (newWrap.parentNode) newWrap.parentNode.removeChild(newWrap);
          var m = stage.querySelector('.col-main');
          if (m) {
            requestAnimationFrame(function() {
              m.style.transition = 'opacity .38s var(--ease),transform .38s var(--ease)';
              m.style.opacity = '1';
              m.style.transform = 'none';
            });
          }
        });
      } /* ══ buildStage ══ */
      function buildStage(container, rows) {
        if (_viewMode === 'ch') {
          buildChStage(container, visible());
          return;
        }
        container.innerHTML = '';
        var depth = drillStack.length;
        if (depth === 0) {
          var main = makeMain();
          buildAreaCards(main, rows);
          container.appendChild(main);
        } else if (depth === 1) {
          var aRows = rows.filter(function(r) {
            return gv(r, 'area') === drillStack[0].key;
          });
          var s0 = makeSide(220);
          buildSideAreas(s0, rows, drillStack[0].key);
          container.appendChild(s0);
          container.appendChild(makeDivider());
          var main = makeMain();
          buildOfficeCards(main, aRows);
          container.appendChild(main);
        } else if (depth === 2) {
          var aRows = rows.filter(function(r) {
            return gv(r, 'area') === drillStack[0].key;
          });
          var oRows = aRows.filter(function(r) {
            return gv(r, 'office') === drillStack[1].key;
          });
          var s0 = makeSide(210);
          buildSideAreas(s0, rows, drillStack[0].key);
          container.appendChild(s0);
          container.appendChild(makeDivider());
          var s1 = makeSide(220);
          buildSideOffices(s1, aRows, drillStack[1].key);
          container.appendChild(s1);
          container.appendChild(makeDivider());
          var main = makeMain();
          main.classList.add('staff-view');
          buildStaffCards(main, oRows);
          container.appendChild(main);
        } else if (depth >= 3) {
          var aRows = rows.filter(function(r) {
            return gv(r, 'area') === drillStack[0].key;
          });
          var oRows = aRows.filter(function(r) {
            return gv(r, 'office') === drillStack[1].key;
          });
          var sRows = oRows.filter(function(r) {
            return gv(r, 'staff') === drillStack[2].key;
          });
          var s0 = makeSide(200);
          buildSideAreas(s0, rows, drillStack[0].key);
          container.appendChild(s0);
          container.appendChild(makeDivider());
          var s1 = makeSide(210);
          buildSideOffices(s1, aRows, drillStack[1].key);
          container.appendChild(s1);
          container.appendChild(makeDivider());
          var s2 = makeSide(220);
          buildSideStaff(s2, oRows, drillStack[2].key);
          container.appendChild(s2);
          container.appendChild(makeDivider());
          var main = makeMain();
          main.classList.add('store-view');
          buildStoreCards(main, sRows);
          container.appendChild(main);
        }
      }

      function makeMain() {
        var d = document.createElement('div');
        d.className = 'col-main';
        return d;
      }

      function makeSide(w) {
        var d = document.createElement('div');
        d.className = 'col-side';
        d.style.width = w + 'px';
        return d;
      }

      function makeDivider() {
        var d = document.createElement('div');
        d.className = 'divider';
        return d;
      }

      function makeEmpty(msg) {
        var d = document.createElement('div');
        d.className = 'empty';
        d.innerHTML = '<div style="font-size:28px">🔍</div><div>' + esc(msg) + '</div>';
        return d;
      } /* ══ 整體卡 ══ */
      function makeWholeCard(name, rows) {
        var s = stat(rows);
        var t = s.t || 1;
        var el = document.createElement('div');
        el.className = 'big-card whole';
        el.innerHTML = '<div class="wc-left"><div class="wc-label">' + esc(name) + '</div><div class="wc-total">' + s.t + '</div></div>' + '<div class="wc-divider"></div>' + '<div class="wc-right">' + '<div class="wc-track">' + segs(s) + '</div>' + '<div class="wc-stats">' + curStatuses.map(function(st) {
          return '<div class="wc-st ' + st.cls + '">' + '<div class="wc-st-lbl">' + esc(st.label) + '</div>' + '<div class="wc-st-row">' + '<span class="wc-st-num">' + (s[st.key] || 0) + '</span>' + '<span class="wc-st-pct">(' + pct(s[st.key] || 0, t) + '%)</span>' + '</div></div>';
        }).join('') + '</div>' + '</div>';
        return el;
      } /* ══ 一般大卡 ══ */
      function makeBigCard(name, rows, onClick, isSel) {
        var s = stat(rows);
        var t = s.t || 1;
        var n = curStatuses.length;
        var el = document.createElement('div');
        el.className = 'big-card' + (isSel ? ' sel' : '');
        el.innerHTML = '<div class="bc-head"><div class="bc-name">' + esc(name) + '</div><div class="bc-total">' + s.t + '</div></div>' + '<div class="bc-track">' + segs(s) + '</div>' + '<div class="bc-stats ' + colsClass(n) + '">' + curStatuses.map(function(st) {
          return '<div class="bc-st ' + st.cls + '">' + '<div class="bc-st-lbl">' + esc(st.label) + '</div>' + '<div class="bc-st-row"><span class="bc-st-num">' + (s[st.key] || 0) + '</span>' + '<span class="bc-st-pct">(' + pct(s[st.key] || 0, t) + '%)</span></div></div>';
        }).join('') + '</div>';
        if (onClick) el.addEventListener('click', onClick);
        return el;
      } /* ══ 側欄小卡 ══ */
      function makeMiniCard(name, rows, onClick, isSel) {
        var s = stat(rows);
        var t = s.t || 1;
        var el = document.createElement('div');
        el.className = 'mini-card' + (isSel ? ' sel' : '');
        el.innerHTML = '<div class="mc-top"><span class="mc-name">' + esc(name) + '</span><span class="mc-total">' + s.t + '</span></div>' + '<div class="mc-bar">' + segs(s) + '</div>' + '<div class="mc-sts">' + curStatuses.map(function(st) {
          return '<span class="mc-s ' + st.cls + '">' + esc(st.emoji) + (s[st.key] || 0) + '</span>';
        }).join('') + '</div>';
        el.addEventListener('click', onClick);
        return el;
      } /* ══ 各層建構 ══ */
      function buildAreaCards(c, rows) {
        c.classList.add('area-view');
        var sel = drillStack[0] ? drillStack[0].key : null;
        c.appendChild(makeWholeCard('整體', rows));
        var m = groupBy(rows, 'area');
        sortArea(Object.keys(m)).forEach(function(k) {
          c.appendChild(makeBigCard(k, m[k], function() {
            drillInto('area', k);
          }, sel === k));
        });
        if (!Object.keys(m).length) c.appendChild(makeEmpty('沒有符合條件的資料'));
      }

      function buildSideAreas(c, rows, sel) {
        c.appendChild(makeMiniCard('整體', rows, function() {
          goToDepth(0);
        }, false));
        var m = groupBy(rows, 'area');
        sortArea(Object.keys(m)).forEach(function(k) {
          c.appendChild(makeMiniCard(k, m[k], function() {
            drillInto('area', k);
          }, sel === k));
        });
      }

      function buildOfficeCards(c, rows) {
        c.classList.add('office-view');
        var sel = drillStack[1] ? drillStack[1].key : null;
        var aName = drillStack[0] ? drillStack[0].key : '';
        c.appendChild(makeWholeCard(aName + ' 整體', rows));
        var m = groupBy(rows, 'office'); /* 依未填寫數由多到少排序 */
        var lastKey = curStatuses[curStatuses.length - 1].key;
        var sorted = Object.keys(m).sort(function(a, b) {
          return (stat(m[b])[lastKey] || 0) - (stat(m[a])[lastKey] || 0);
        });
        sorted.forEach(function(k, i) {
          var card = makeBigCard(k, m[k], function() {
            drillInto('office', k);
          }, sel === k);
          if (i < 3) card.classList.add('bc-top' + (i + 1));
          c.appendChild(card);
        });
        if (!Object.keys(m).length) c.appendChild(makeEmpty('此處無資料'));
      }

      function buildSideOffices(c, rows, sel) {
        var m = groupBy(rows, 'office');
        var lastKey = curStatuses[curStatuses.length - 1].key;
        Object.keys(m).sort(function(a, b) {
          return (stat(m[b])[lastKey] || 0) - (stat(m[a])[lastKey] || 0);
        }).forEach(function(k) {
          c.appendChild(makeMiniCard(k, m[k], function() {
            drillInto('office', k);
          }, sel === k));
        });
      } /* ══ 人員層 ══ */
      function buildStaffCards(c, rows) {
        var sel = drillStack[2] ? drillStack[2].key : null;
        var ts = stat(rows);
        var tt = ts.t || 1;
        var n = curStatuses.length;
        var oName = drillStack[1] ? drillStack[1].key : '';
        var aName = drillStack[0] ? drillStack[0].key : '';
        var lastKey = curStatuses[curStatuses.length - 1].key;
        var summary = document.createElement('div');
        summary.className = 'staff-summary';
        summary.innerHTML = '<div class="ss-title">👥 ' + esc(aName) + ' · ' + esc(oName) + '</div>' + '<div class="ss-total">' + ts.t + '</div>' + '<div class="ss-bar-wrap">' + '<div class="ss-bar">' + segs(ts) + '</div>' + '<div class="ss-sts">' + curStatuses.map(function(st) {
          return '<span class="ss-s ' + st.cls + '">' + esc(st.label) + ' ' + (ts[st.key] || 0) + ' (' + pct(ts[st.key] || 0, tt) + '%)</span>';
        }).join('') + '</div>' + '</div>';
        c.appendChild(summary);
        var m = groupBy(rows, 'staff');
        if (!Object.keys(m).length) {
          c.appendChild(makeEmpty('此所無資料'));
          return;
        } /* 排序：未填寫多→其他狀態多→名字 */
        Object.keys(m).sort(function(a, b) {
          var sa = stat(m[a]),
            sb = stat(m[b]);
          if ((sb[lastKey] || 0) !== (sa[lastKey] || 0)) return (sb[lastKey] || 0) - (sa[lastKey] || 0);
          for (var i = curStatuses.length - 2; i >= 1; i--) {
            var k = curStatuses[i].key;
            if ((sb[k] || 0) !== (sa[k] || 0)) return (sb[k] || 0) - (sa[k] || 0);
          }
          return a.localeCompare(b, 'zh-TW');
        }).forEach(function(k) {
          var sr = m[k];
          var s = stat(sr);
          var t = s.t || 1;
          var isSel = sel === k;
          var card = document.createElement('div');
          card.className = 'staff-card' + (isSel ? ' sel' : '');
          card.innerHTML = '<div class="sc-head">' + '<div class="sc-name">👤 ' + esc(k) + '</div>' + '<div class="sc-corner"><span class="sc-corner-num">' + s.t + '</span><span class="sc-corner-pct">佔所' + pct(s.t, tt) + '%</span></div>' + '</div>' + '<div class="sc-stats ' + colsClass(n) + '">' + curStatuses.map(function(st) {
            return '<div class="sc-st ' + st.cls + '">' + '<div class="sc-st-lbl">' + esc(st.labelShort) + '</div>' + '<div class="sc-st-row"><span class="sc-st-num">' + (s[st.key] || 0) + '</span>' + '<span class="sc-st-pct">(' + pct(s[st.key] || 0, t) + '%)</span></div></div>';
          }).join('') + '</div>' + '<div class="sc-bar">' + curStatuses.map(function(st) {
            var v = s[st.key] || 0;
            return v ? '<div class="sc-bar-' + st.cls + '" style="flex:' + v + '"></div>' : ''
          }).join('') + '</div>';
          card.addEventListener('click', function() {
            drillInto('staff', k);
          });
          c.appendChild(card);
        });
      }

      function buildSideStaff(c, rows, sel) {
        var m = groupBy(rows, 'staff');
        var lastKey = curStatuses[curStatuses.length - 1].key;
        Object.keys(m).sort(function(a, b) {
          return (stat(m[b])[lastKey] || 0) - (stat(m[a])[lastKey] || 0);
        }).forEach(function(k) {
          c.appendChild(makeMiniCard('👤 ' + k, m[k], function() {
            drillInto('staff', k);
          }, sel === k));
        });
      } /* ══ 店家層 ══ */
      function buildStoreCards(c, rows) {
        var s = stat(rows);
        var staffName = drillStack[2] ? drillStack[2].key : '';
        var header = document.createElement('div');
        header.className = 'store-header';
        header.innerHTML = '<div class="sh-left">' + '<div class="sh-name">👤 ' + esc(staffName) + '</div>' + '<div class="sh-stats">' + curStatuses.map(function(st) {
          return '<span class="sh-s ' + st.cls + '">' + esc(st.emoji) + ' ' + (s[st.key] || 0) + '</span>';
        }).join('') + '</div>' + '</div>' + '<button class="sh-toggle" id="store-toggle-btn" onclick="toggleStoreList()">▾ 收合清冊</button>';
        c.appendChild(header);
        var wrap = document.createElement('div');
        wrap.className = 'store-panel sg';

      function copyList() {
        var surveyName = SURVEYS[curSurvey] ? SURVEYS[curSurvey].name : '';
        var breadcrumb = drillStack.map(function(d) {
          return d.key;
        }).join(' › ');
        var lines = [];
        var rows = visible();
        if (drillStack.length >= 1) rows = rows.filter(function(r) {
          return gv(r, 'area') === drillStack[0].key;
        });
        if (drillStack.length >= 2) rows = rows.filter(function(r) {
          return gv(r, 'office') === drillStack[1].key;
        });
        if (drillStack.length >= 3) rows = rows.filter(function(r) {
          return gv(r, 'staff') === drillStack[2].key;
        });
        if (!rows.length) return;
        lines.push('📋 ' + surveyName + (breadcrumb ? ' ｜ ' + breadcrumb : ''));
        var ts = stat(rows);
        lines.push(curStatuses.map(function(st) {
          return st.label + ' ' + (ts[st.key] || 0);
        }).join('　'));
        lines.push('');
        var lastKey = curStatuses[curStatuses.length - 1].key;
        var orderMap = {};
        curStatuses.forEach(function(st, i) {
          orderMap[st.key] = i;
        });
        orderMap[lastKey] = 0;
        curStatuses.forEach(function(st, i) {
          if (st.key !== lastKey) orderMap[st.key] = i + 1;
        });
        var staffMap = groupBy(rows, 'staff');
        Object.keys(staffMap).sort(function(a, b) {
          return (stat(staffMap[b])[lastKey] || 0) - (stat(staffMap[a])[lastKey] || 0);
        }).forEach(function(staffName) {
          var sRows = staffMap[staffName];
          var ss = stat(sRows);
          lines.push('👤 ' + staffName + '　' + curStatuses.map(function(st) {
            return st.emoji + (ss[st.key] || 0);
          }).join('　'));
          sRows.slice().sort(function(a, b) {
            var od = (orderMap[gs(a)] || 0) - (orderMap[gs(b)] || 0);
            return od !== 0 ? od : gv(a, 'store').localeCompare(gv(b, 'store'), 'zh-TW');
          }).forEach(function(r) {
            var stObj = curStatuses.find(function(s) {
              return s.key === gs(r);
            }) || curStatuses[curStatuses.length - 1];
            lines.push(' ' + stObj.emoji + ' ' + gv(r, 'type') + '｜' + gv(r, 'store'));
          });
          lines.push('');
        });
        var text = lines.join('\n').trim();
        if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(text).then(function() {
          flash('copy-btn', '✅ 已複製', '📋 複製');
        }).catch(function() {
          fbCopy(text);
        });
        else fbCopy(text);
      }

        } catch (e) {}
        document.body.removeChild(ta);
      }

      function downloadCSV() {
        var depth = drillStack.length;
        var surveyName = SURVEYS[curSurvey] ? SURVEYS[curSurvey].name : '';
        var label = surveyName + (drillStack.length ? ' ｜ ' + drillStack.map(function(d) {
          return d.key;
        }).join(' › ') : '');

        function q(v) {
          var s = String(v == null ? '' : v);
          if (s.indexOf(',') >= 0 || s.indexOf('"') >= 0 || s.indexOf('\n') >= 0) return '"' + s.replace(/"/g, '""') + '"';
          return s;
        }
        var stCols = curStatuses.map(function(s) {
          return s.labelShort;
        });
        var lines, rows;
        if (depth === 0) {
          rows = visible();
          lines = [
            ['營業處'].concat(stCols).concat(['總計']).map(q).join(',')
          ];
          var m = groupBy(rows, 'area');
          sortArea(Object.keys(m)).forEach(function(k) {
            var s = stat(m[k]);
            lines.push([k].concat(curStatuses.map(function(st) {
              return s[st.key] || 0;
            })).concat([s.t]).map(q).join(','));
          });
        } else if (depth === 1) {
          rows = visible().filter(function(r) {
            return gv(r, 'area') === drillStack[0].key;
          });
          lines = [
            ['營業處', '營業所'].concat(stCols).concat(['總計']).map(q).join(',')
          ];
          var m = groupBy(rows, 'office');
          var lastKey = curStatuses[curStatuses.length - 1].key;
          Object.keys(m).sort(function(a, b) {
            return (stat(m[b])[lastKey] || 0) - (stat(m[a])[lastKey] || 0);
          }).forEach(function(k) {
            var s = stat(m[k]);
            lines.push([drillStack[0].key, k].concat(curStatuses.map(function(st) {
              return s[st.key] || 0;
            })).concat([s.t]).map(q).join(','));
          });
        } else if (depth === 2) {
          rows = visible().filter(function(r) {
            return gv(r, 'area') === drillStack[0].key && gv(r, 'office') === drillStack[1].key;
          });
          lines = [
            ['營業處', '營業所', '人員'].concat(stCols).concat(['總計']).map(q).join(',')
          ];
          var m = groupBy(rows, 'staff');
          var lastKey = curStatuses[curStatuses.length - 1].key;
          Object.keys(m).sort(function(a, b) {
            return (stat(m[b])[lastKey] || 0) - (stat(m[a])[lastKey] || 0);
          }).forEach(function(k) {
            var s = stat(m[k]);
            lines.push([drillStack[0].key, drillStack[1].key, k].concat(curStatuses.map(function(st) {
              return s[st.key] || 0;
            })).concat([s.t]).map(q).join(','));
          });
        } else {
          rows = window._storeRows || [];
          if (!rows.length) return;
          lines = [
            ['狀態', '店家名稱', '通路別', '店家型態', '店家等級', '店家代碼'].map(q).join(',')
          ];
          var statusLabelMap = {};
          curStatuses.forEach(function(st) {
            statusLabelMap[st.key] = st.labelShort;
          });
          rows.forEach(function(r) {
            lines.push([statusLabelMap[gs(r)] || gs(r), gv(r, 'store'), gv(r, 'channel'), gv(r, 'type'), gv(r, 'grade'), gv(r, 'code')].map(q).join(','));
          });
        }
        var blob = new Blob(['\uFEFF' + lines.join('\r\n')], {
          type: 'text/csv;charset=utf-8;'
        });
        var url = URL.createObjectURL(blob);
        var now = new Date();
        var ts = now.getFullYear() + ('0' + (now.getMonth() + 1)).slice(-2) + ('0' + now.getDate()).slice(-2);
        var a = document.createElement('a');
        a.href = url;
        a.download = label + '_' + ts + '.csv';
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        setTimeout(function() {
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        }, 500);
        flash('csv-btn', '✅ 已下載', '📥 CSV');
      }

        ];
        var bricks = [];
        for (var i = 0; i < Math.ceil(W / S) + 2; i++) bricks.push(i * S);
        if (_runRaf) cancelAnimationFrame(_runRaf);

        function draw() {
          ctx.clearRect(0, 0, W, H);
          ctx.fillStyle = 'rgba(128,128,128,.15)';
          for (var b = 0; b < bricks.length; b++) {
            var bx = ((bricks[b] - frame * 2) % W + W) % W;
            ctx.fillRect(bx, H - S, S - 1, S - 1);
          }
          ctx.fillStyle = C;
          var sf = frame % 8 < 4 ? f0 : f1;
          for (var r = 0; r < 8; r++)
            for (var col = 0; col < 8; col++)
              if (sf[r][col]) ctx.fillRect(W / 2 - 4 * S + col * S, H - S - 8 * S - 4 + r * S, S - 1, S - 1);
          frame++;
          if (frame % 20 === 0) {
            dots = (dots + 1) % 4;
            if (txtEl) txtEl.textContent = '載入資料中' + '.'.repeat(dots);
          }
          _runRaf = requestAnimationFrame(draw);
        }
        draw();
      }

      function hideLoading() {
        if (_runRaf) {
          cancelAnimationFrame(_runRaf);
          _runRaf = null;
        }
        var ls = document.getElementById('loading');
        ls.style.transition = 'opacity .4s';
        ls.style.opacity = '0';
        setTimeout(function() {
          ls.style.display = 'none';
          ls.style.transition = '';
        }, 420);
      } /* ══ 啟動 ══ */
      var ss = document.getElementById('sel-survey');
      ss.innerHTML = SURVEYS.map(function(c, i) {
        return '<option value="' + i + '">' + esc(c.name) + '</option>';
      }).join('');
      ss.disabled = false;
      document.addEventListener('DOMContentLoaded', function() {
        initRankDrawer();
      });
      if (document.readyState !== 'loading') {
        initRankDrawer();
      }
      showLoading();
      onSurveyChange();

    </script>
  </body>

</html>
