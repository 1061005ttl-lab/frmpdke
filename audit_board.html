/* ── 店家葉節點：原始問卷明細展開／收合（首次展開才去抓來源分頁，之後吃快取） ── */
var _storeDetailLoaded = {}; /* rid → true，避免重複抓取 */
var _storeDetailCache  = {}; /* rid → {rowData, ref, basicRow}，供「複製摘要／截圖」分享功能取用 */
function _toggleStoreDetail(rid, sourceRef, dataRid){
  /* rid 是「這次呼叫端自己的命名空間 id」（例如 dlg-row123／pvstaff-row123／
     pvstore-row123），確保同一筆資料在不同畫面（查核明細 Dialog／彙整看板的人員 slide／
     店家 slide）各自展開時，DOM id 不會撞名。
     dataRid 才是真正拿來回頭比對 allRows 的原始 __rid，务必跟 DOM id 分開，不能混用。 */
  dataRid = dataRid || rid;
  var detail = document.getElementById('storedetail-'+rid);
  var ico = document.getElementById('storeico-'+rid);
  if(!detail) return;
  var isOpen = detail.style.display !== 'none';
  detail.style.display = isOpen ? 'none' : 'table-row';
  if(ico) ico.classList.toggle('open', !isOpen);
  if(isOpen) return; /* 收合不用重抓 */

  var bodyEl = document.getElementById('storedetailbody-'+rid);
  if(!bodyEl) return;

  /* 【修正】「切維度 on/off 開關／切排序模式/子分/所人／點全展開／點其他節點的展開箭頭」
     這些操作全部都是呼叫 _renderDlgContent() 整棵樹重新 innerHTML 重建，rid 相同的
     storedetailbody DOM 節點其實已經被整個換成一個全新、空的節點。但 _storeDetailLoaded
     / _storeDetailCache 是頁面層級的全域變數，不會因為樹被重建而重置，於是舊寫法一看到
     _storeDetailLoaded[rid] 已經是 true，就直接 return，這個全新、空的節點就永遠沒被
     填內容——畫面上呈現「箭頭轉開了、內容卻是空的」，而且不管怎麼切回原本的維度開關都一樣
     （因為每切一次都是新的一輪「整棵樹重建 → 舊旗標騙過新節點」）。
     正確做法：快取直接存「渲染完成的 html 字串」而不是原始資料；只要快取存在，
     不管 bodyEl 是不是剛剛才重新誕生的全新節點，都直接拿快取的 html 貼回去即可
     （不必也不會重新打 API），徹底不依賴「這個節點之前是不是同一個節點」。 */
  if(_storeDetailLoaded[rid] && _storeDetailCache[rid] && _storeDetailCache[rid].html){
    bodyEl.innerHTML = _storeDetailCache[rid].html;
    return;
  }

  /* 基本資料：直接用 __rid 從 allRows 找回這一筆完整物件，不用再回頭比對店家代碼
     （同一店家代碼可能因多次查核在店家名冊出現多筆，用 __rid 才能保證拿到的
     正是被點擊的那一列，不會選錯）。問卷內容（大題/選項）才需要另外向來源分頁查詢。 */
  var basicRow = allRows.find(function(x){ return x.__rid === dataRid; }) || null;

  var ref = _parseSourceRef(sourceRef);

  if(!ref){
    var htmlNoRef = _buildRawDetailPanel(null, null, null, basicRow, rid)
      + '<div style="padding:0 16px 10px;font-size:12px;color:#B23A3A;">⚠️ 此筆店家沒有「來源分頁+行數」資料，無法回溯問卷內容</div>';
    bodyEl.innerHTML = htmlNoRef;
    _storeDetailLoaded[rid] = true;
    _storeDetailCache[rid] = { rowData:null, ref:null, basicRow:basicRow, html:htmlNoRef };
    return;
  }

  bodyEl.innerHTML = _buildRawDetailPanel(null, ref, null, basicRow, rid)
    + '<div style="padding:0 16px 10px;font-size:12px;color:#2D2D2D;">⏳ 讀取「'+esc(ref.sheet)+'」第 '+ref.row+' 列問卷內容…</div>';

  _fetchSourceRowDetail(sourceRef, function(rowData, parsedRef, err, sheetData){
    /* 重抓期間使用者可能已經切換維度、重建了整棵樹，這個當初抓到的 bodyEl 參照
       可能已經不在畫面上了；每次要寫入前都重新用 rid 找一次目前畫面上「現存」的
       節點，找不到就代表這筆展開狀態已經被使用者收合／重建掉了，不用再寫。 */
    var liveBodyEl = document.getElementById('storedetailbody-'+rid);
    if(err){
      var dbgHtml = sheetData && sheetData._debugRows ? _renderDebugRowsHtml(sheetData) : '';
      var htmlErr = _buildRawDetailPanel(null, parsedRef, null, basicRow, rid)
        + '<div style="padding:0 16px 10px;font-size:12px;color:#B23A3A;">⚠️ '+esc(err)+'</div>' + dbgHtml;
      /* 錯誤不快取、不標記為已讀取，讓使用者下次展開時可以重試（例如網路暫時失敗） */
      if(liveBodyEl) liveBodyEl.innerHTML = htmlErr;
      return;
    }
    var htmlOk = _buildRawDetailPanel(rowData, parsedRef, sheetData, basicRow, rid);
    _storeDetailLoaded[rid] = true;
    _storeDetailCache[rid] = { rowData:rowData, ref:parsedRef, basicRow:basicRow, html:htmlOk };
    if(liveBodyEl) liveBodyEl.innerHTML = htmlOk;
  });
}

/* 除錯區塊：顯示來源分頁前 3 列原始內容，方便核對 gviz 回傳結構是否與 Sheet 實際畫面一致 */
function _renderDebugRowsHtml(sheetData){
  if(!sheetData || !sheetData._debugRows) return '';
  var rows = sheetData._debugRows;
  var html = '<details style="margin:8px 16px;font-size:11px;">'
    + '<summary style="cursor:pointer;font-weight:700;color:var(--primary);">🔍 除錯：查看來源分頁原始前 3 列內容</summary>'
    + '<div style="margin-top:6px;padding:8px;background:#fff;border:1px solid #ddd;border-radius:6px;overflow-x:auto;">';
  rows.forEach(function(row, ri){
    var cells = (row && row.c) || [];
    html += '<div style="margin-bottom:6px;"><strong style="color:#2D2D2D;">第 '+(ri+1)+' 列：</strong>';
    for(var i=0;i<Math.min(cells.length,20);i++){
      var c = cells[i];
      var v = c ? ((c.v!==null&&c.v!==undefined)?c.v:(c.f||'')) : '';
      html += '<span style="display:inline-block;margin:2px;padding:1px 5px;background:#f0f0f0;border-radius:3px;color:#1a1a1a;">'+i+':'+esc(v===''?'(空)':String(v))+'</span>';
    }
    html += '</div>';
  });
  html += '</div></details>';
  return html;
}

/* 基本資料卡片要顯示的欄位（依店家名冊欄名，與主表格用詞一致），依序顯示 */
var BASIC_DETAIL_FIELDS = [
  COL_AREA, COL_OFFICE, COL_STAFF, COL_CHANNEL, COL_STORETYPE,
  COL_CODE, COL_NAME, COL_GRADE, COL_SUPTYPE, COL_QUESTTYPE, COL_DATE
];

/* 渲染：基本資料區（卡片 grid，直接取自店家名冊 basicRow）＋ 問卷大題區（來源分頁，逐題列出已勾選的選項）
   注意：dbgHtml（來源分頁前 3 列原始內容）只在「解析失敗／查無資料」時才附加，
   因為它顯示的是分頁最前面 3 列固定樣本，跟目前展開的這一筆資料無關；
   若連解析成功的畫面都附加，容易讓人誤以為第 3 列內容是這筆店家的資料，造成混淆。
   rid：用來給整個面板一個唯一 id（rawpanel-RID），讓「📸 截圖」功能能精準鎖定
   只擷取這一筆店家的卡片區塊，而不是整個頁面或整張表格。 */
function _buildRawDetailPanel(rowData, ref, sheetData, basicRow, rid){
  var srcTag = ref ? '<div style="font-size:10px;font-weight:700;color:var(--primary);margin-bottom:10px;">📄 來源：'+esc(ref.sheet)+'　第 '+ref.row+' 列</div>' : '';
  var panelId = rid ? ' id="rawpanel-'+esc(rid)+'"' : '';
  var wrapOpen = '<div'+panelId+' style="padding:10px 16px 14px 18px;background:#FAFAF8;border-left:3px solid var(--primary-bg,rgba(55,138,221,.3));margin:2px 12px 6px 0;border-radius:0 8px 8px 0;">';

  /* 分享動作列：複製成 LINE 文字摘要／截圖存成個案圖片，方便逐筆拿去跟同事討論。
     只有在 rid 存在時才顯示（rid 是呼叫端傳入的店家 __rid，截圖／複製都要靠它
     回頭從 _storeDetailCache 取出這一筆的完整資料）。 */
  var actionBar = rid ? (
    '<div data-screenshot-ignore="1" style="display:flex;gap:6px;justify-content:flex-end;margin-bottom:8px;">'
    + '<button class="raw-share-btn" id="rawshare-copy-'+esc(rid)+'" onclick="event.stopPropagation();_storeDetailCopy(\''+escAttr(rid)+'\',this)">📋 複製摘要</button>'
    + '<button class="raw-share-btn" id="rawshare-shot-'+esc(rid)+'" onclick="event.stopPropagation();_storeDetailScreenshot(\''+escAttr(rid)+'\',this)">📸 截圖</button>'
    + '</div>'
  ) : '';

  /* 基本資料：一律直接從店家名冊（basicRow，即被點擊的那一列）取得，
     不再依賴來源分頁解析出的 base —— 即使來源分頁讀取失敗，
     基本資料依然能正確顯示（因為這本來就是已經載入記憶體的資料）。 */
  var baseHtml = '';
  if(basicRow){
    var items = BASIC_DETAIL_FIELDS
      .map(function(k){ return { k:k, v:basicRow[k] }; })
      .filter(function(it){ return it.v !== '' && it.v !== null && it.v !== undefined; });
    if(items.length){
      baseHtml += '<div class="raw-detail-grid">';
      items.forEach(function(it){
        baseHtml += '<div class="raw-detail-item">'
          + '<div class="raw-detail-label">'+esc(it.k)+'</div>'
          + '<div class="raw-detail-val">'+esc(String(it.v))+'</div>'
          + '</div>';
      });
      baseHtml += '</div>';
    }
  }

  if(!rowData){
    /* 問卷內容尚未抓到（讀取中／失敗／無來源連結），但基本資料已經可以先顯示。
       這裡正常關閉容器；呼叫端（_toggleStoreDetail）會把「讀取中／錯誤」訊息
       接在這個區塊的後面，視覺上呈現為同一塊卡片下方的提示文字。
       動作列在讀取中也先顯示沒關係：複製摘要會自動 fallback 成只有基本資料的版本。 */
    return wrapOpen + actionBar + srcTag + baseHtml + '</div>';
  }

  var sections = rowData.sections || [];

  /* 問卷大題區：每題一個區塊，每個選項各自一張小卡片，Q（選項本身）／A（填寫的答案）
     上下分兩行顯示，不再用冒號把兩者黏成一行文字，長答案也能清楚看出起訖。
     若該欄只是單純打勾（值為 v/V/✓，沒有額外文字說明），代表「答案」其實就是
     選項本身被選取了，不需要再重複顯示一次，改用單行徽章樣式即可。
     照片（見上方【照片欄位規則】）：文字卡片跟照片縮圖分兩個容器渲染——
     文字卡片維持原本一行一則的直向排列；照片縮圖收集到同一個
     .raw-quiz-photos 容器裡用 flex-wrap 並排顯示，不再每張各佔一整排。 */
  var quizHtml = '';
  if(sections.length){
    quizHtml += '<div class="raw-quiz-list">';
    sections.forEach(function(sec){
      var picksHtml = '';
      var photosHtml = '';
      sec.picks.forEach(function(p){
        /* 照片欄位（PG半身照／PG全身照／服務情形照片…）：GAS那邊會把照片上傳到
           雲端硬碟並把網址寫進儲存格。網址可能是整格唯一內容、可能用換行
           累加多筆、也可能跟文字說明混在同一格（例如「缺失：無價格卡
           https://...」）——一律用全域正則掃描整段文字找出所有網址，
           不限定網址一定要出現在開頭，才能處理文字＋網址混合的情況。 */
        var raw = String(p.value||'');
        var urlRe = /https?:\/\/\S+/gi;
        var urls = raw.match(urlRe) || [];
        var textOnly = raw.replace(urlRe, '').replace(/[\r\n]+/g, ' ').trim();
        // 去掉文字被抽走網址後可能留下的孤立連接符號（例如「→」單獨留在句尾）
        textOnly = textOnly.replace(/[→\-–—]+$/, '').trim();

        if(urls.length){
          urls.forEach(function(u, uIdx){
            var label = urls.length > 1 ? (p.option + '-' + (uIdx+1)) : p.option;
            photosHtml += _renderPhotoChip(label, u);
          });
          if(textOnly){
            // 網址之外還有文字說明，文字部分照正常 Q/A 卡片顯示，不能被丟掉
            picksHtml += '<span class="raw-quiz-chip">'
              + '<span class="raw-quiz-chip-q">'+esc(p.option)+'</span>'
              + '<span class="raw-quiz-chip-a">→ '+esc(textOnly)+'</span>'
              + '</span>';
          }
          return;
        }

        var isCheckmarkOnly = (p.value==='v' || p.value==='V' || p.value==='✓');
        if(isCheckmarkOnly){
          picksHtml += '<span class="raw-quiz-chip is-simple">'
            + '<span class="raw-quiz-chip-a">✓ '+esc(p.option)+'</span>'
            + '</span>';
        } else {
          picksHtml += '<span class="raw-quiz-chip">'
            + '<span class="raw-quiz-chip-q">'+esc(p.option)+'</span>'
            + '<span class="raw-quiz-chip-a">→ '+esc(p.value)+'</span>'
            + '</span>';
        }
      });
      quizHtml += '<div class="raw-quiz-section">'
        + '<div class="raw-quiz-title">📋 '+esc(sec.section)+'</div>'
        + (picksHtml ? '<div class="raw-quiz-picks">' + picksHtml + '</div>' : '')
        + (photosHtml ? '<div class="raw-quiz-photos">' + photosHtml + '</div>' : '')
        + '</div>';
    });
    quizHtml += '</div>';
  } else {
    quizHtml = '<div style="font-size:12px;color:#2D2D2D;margin-top:4px;">（此筆問卷未填寫任何題目）</div>';
  }

  if(!baseHtml && !sections.length){
    /* 真的查無任何資料（基本資料、問卷內容都沒有），才附上除錯區塊供排查 */
    var dbgHtml = _renderDebugRowsHtml(sheetData);
    return wrapOpen + actionBar + srcTag + '<div style="font-size:12px;color:#2D2D2D;">（查無資料）</div>' + dbgHtml + '</div>';
  }

  var html = wrapOpen + actionBar + srcTag;
  if(baseHtml) html += baseHtml + '<div style="height:12px;"></div>';
  html += quizHtml;
  html += '</div>';
  return html;
}
/* 雲端硬碟縮圖網址（https://lh3.googleusercontent.com/d/xxx=w1000）→ 換一個尺寸參數，
   燈箱裡看大圖用更大的寬度（=w1600），撈不到 id 就直接沿用原網址（頂多燈箱裡也是縮圖尺寸，不會壞掉）。 */
function _driveBigUrl(url){
  var m = String(url).match(/\/d\/([^=\/]+)/);
  return m ? ('https://lh3.googleusercontent.com/d/'+m[1]+'=w1600') : url;
}
/* 照片欄位的卡片：選項名稱（如「PG半身照」）＋縮圖，點縮圖直接浮出大圖燈箱（不開新分頁，不用切換分頁再關掉）。
   img 讀取失敗（例如雲端硬碟該檔案還沒設定好公開權限、或網址失效）時，用 onerror 換成文字提示，不留破圖示。
   crossorigin="anonymous"：讓「📸截圖」功能能把這張圖的像素畫進canvas再輸出，
   沒有這個屬性的話，截圖／複製到剪貼簿功能對這張圖片會抓到空白（瀏覽器安全限制，跨網域圖片預設不給讀像素）。 */
function _renderPhotoChip(optionName, url, note){
  var bigUrl = _driveBigUrl(url);
  var uid = 'photo_' + Math.random().toString(36).substring(2,9);
  return '<span class="raw-quiz-chip raw-quiz-photo">'
    + '<span class="raw-quiz-chip-q">'+esc(optionName)+'</span>'
    +   '<img id="'+uid+'" class="raw-quiz-photo-img" src="'+esc(url)+'" alt="'+esc(optionName)+'" '
    +   'loading="lazy" crossorigin="anonymous" '
    +   'onclick="event.stopPropagation();_openPhotoLightbox(\''+escAttr(bigUrl)+'\',\''+escAttr(optionName)+'\');" '
    +   'onerror="this.style.display=\'none\';this.insertAdjacentHTML(\'afterend\',\'<span class=&quot;raw-quiz-photo-fail&quot;>⚠️ 圖片載入失敗</span>\');">'
    +   (note ? '<span class="raw-quiz-photo-note">📝 '+esc(note)+'</span>' : '')
    + '</span>';
}
/* ── 照片燈箱：點縮圖後浮在畫面正中央看大圖 ──
   backdrop元素只建一次、重複使用；點背景或按X或按Esc都能關閉。 */
function _ensurePhotoLightbox(){
  var el = document.getElementById('photo-lightbox-backdrop');
  if(el) return el;
  el = document.createElement('div');
  el.id = 'photo-lightbox-backdrop';
  el.className = 'photo-lightbox-backdrop';
  el.innerHTML = '<button class="photo-lightbox-close" onclick="_closePhotoLightbox()">✕</button>'
    + '<img class="photo-lightbox-img" id="photo-lightbox-img" src="" alt="">';
  el.addEventListener('click', function(e){ if(e.target===el) _closePhotoLightbox(); });
  document.body.appendChild(el);
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') _closePhotoLightbox(); });
  return el;
}
function _openPhotoLightbox(url, alt){
  var el = _ensurePhotoLightbox();
  var img = document.getElementById('photo-lightbox-img');
  img.src = url; img.alt = alt||'';
  el.classList.add('show');
}
function _closePhotoLightbox(){
  var el = document.getElementById('photo-lightbox-backdrop');
  if(el) el.classList.remove('show');
}

/* ════ 照片牆（圖片選項型視角） ════
   需求：一份清單，列出「哪間店、在哪份問卷（子分類）、哪個大題、哪個選項底下」
   被放了什麼照片。跟單筆店家展開明細用的是同一套「來源分頁+行數」機制，差別只在
   這裡要一次掃描『目前篩選範圍內的所有店家』，而不是使用者點開的單一筆。

   作法：
   1. 目前範圍內每一筆有效資料（COL_CODE + COL_SOURCE_REF 都存在）先解析出
      { sheet, row }，收集所有「不重複」的來源分頁名稱。
   2. 逐一分頁呼叫 _fetchSourceSheet（本來就有分頁層級的快取 _sourceSheetCache，
      同一分頁只會真的打一次 API，之後不管開幾次照片牆都是吃快取，不會越開越慢）。
   3. 全部分頁都抓完後，回頭用每一筆資料自己的 { sheet, row } 去對應分頁的
      rowsByNum 撈出 sections/picks，跟單筆展開明細用同一套「文字裡掃網址」規則
      （urlRe = /https?:\/\/\S+/gi）找出照片欄位，組成「店卡」清單。
   4. 完全沒有照片的店家不顯示（照片牆本來就是要看照片，不是看全部店家）。 */
function _extractPhotosFromRowData(rowData){
  if(!rowData || !rowData.sections) return [];
  var out = [];
  rowData.sections.forEach(function(sec){
    sec.picks.forEach(function(p){
      var raw = String(p.value||'');
      var urlRe = /https?:\/\/\S+/gi;
      var urls = raw.match(urlRe) || [];
      if(!urls.length) return;
      /* 儲存格裡網址之外若還有文字備註（例如「花雕酸菜牛肉麵袋麵缺貨」），
         照片牆之前只取網址、把文字整個丟掉，導致看不出這張照片被備註了什麼。
         這裡跟單筆店家展開明細用同一套規則抽出文字，一併帶著走，
         讓照片牆縮圖底下也能顯示這段備註。 */
      var textOnly = raw.replace(urlRe, '').replace(/[\r\n]+/g, ' ').trim();
      textOnly = textOnly.replace(/[→\-–—]+$/, '').trim();
      urls.forEach(function(u, uIdx){
        var label = urls.length > 1 ? (p.option + '-' + (uIdx+1)) : p.option;
        out.push({ section: sec.section, option: label, url: u, note: textOnly });
      });
    });
  });
  return out;
}

function _buildPhotoGallery(rows, callback){
  var candidates = rows.filter(function(r){
    return String(r[COL_CODE]||'').trim() && String(r[COL_SOURCE_REF]||'').trim();
  }).map(function(r){
    return { row:r, ref:_parseSourceRef(r[COL_SOURCE_REF]) };
  }).filter(function(x){ return !!x.ref; });

  if(!candidates.length){ callback('<div class="photo-gallery-empty">目前範圍內沒有可回溯照片的資料（缺少「來源分頁+行數」）</div>'); return; }

  var sheetNames = [];
  var seenSheet = {};
  candidates.forEach(function(x){
    if(!seenSheet[x.ref.sheet]){ seenSheet[x.ref.sheet]=true; sheetNames.push(x.ref.sheet); }
  });

  var loadedCount = 0;
  var sheetDataMap = {};
  sheetNames.forEach(function(sn){
    _fetchSourceSheet(sn, function(sheetData, err){
      sheetDataMap[sn] = sheetData; /* err 時是 null，等等對應不到列，該分頁的照片自然跳過 */
      loadedCount++;
      if(loadedCount === sheetNames.length) _finishGallery();
    });
  });

  function _finishGallery(){
    var cards = [];
    var totalPhotos = 0;
    candidates.forEach(function(x){
      var sheetData = sheetDataMap[x.ref.sheet];
      if(!sheetData) return;
      var rowData = sheetData.rowsByNum[x.ref.row];
      var photos = _extractPhotosFromRowData(rowData);
      if(!photos.length) return;
      totalPhotos += photos.length;
      cards.push({ row:x.row, ref:x.ref, photos:photos });
    });

    if(!cards.length){ callback('<div class="photo-gallery-empty">目前範圍內的問卷都沒有找到任何照片</div>'); return; }

    /* 日期新→舊，同日再依店名排序，跟其他清單的排序習慣一致 */
    cards.sort(function(a,b){
      var da=String(a.row[COL_DATE]||''), db=String(b.row[COL_DATE]||'');
      if(da!==db) return da>db?-1:1;
      return String(a.row[COL_NAME]||'').localeCompare(String(b.row[COL_NAME]||''),'zh-TW');
    });

    var html = '<div class="photo-gallery-wrap">'
      + '<div class="photo-gallery-summary">📸 共 <strong>'+cards.length+'</strong> 家店　🖼️ 共 <strong>'+totalPhotos+'</strong> 張照片'
      + '　<span style="font-weight:500;opacity:.7;">（僅列出目前篩選範圍內、且問卷裡有照片的店家）</span></div>';

    cards.forEach(function(c){
      var r = c.row;
      /* 依大題分組（同一張店卡可能橫跨好幾個大題，例如陳列照＋PG合照分屬不同大題） */
      var bySection = {}, sectionOrder = [];
      c.photos.forEach(function(p){
        if(!bySection[p.section]){ bySection[p.section]=[]; sectionOrder.push(p.section); }
        bySection[p.section].push(p);
      });
      var sectionsHtml = sectionOrder.map(function(sec){
        var photosHtml = bySection[sec].map(function(p){ return _renderPhotoChip(p.option, p.url, p.note); }).join('');
        return '<div class="raw-quiz-section">'
          + '<div class="raw-quiz-title">📋 '+esc(sec)+'</div>'
          + '<div class="raw-quiz-photos">'+photosHtml+'</div>'
          + '</div>';
      }).join('');

      var metaParts = [r[COL_AREA], r[COL_OFFICE], r[COL_STAFF]].filter(function(v){ return v; });
      html += '<div class="photo-store-card">'
        + '<div class="photo-store-head">'
        + '<span class="photo-store-name">🏪 '+esc(String(r[COL_NAME]||'—'))+'</span>'
        + '<span class="photo-store-meta">'+(r[COL_DATE]?esc(String(r[COL_DATE]))+'　':'')+esc(metaParts.join(' · '))+'</span>'
        + '<span class="photo-store-tag">📄 '+esc(c.ref.sheet)+' 第 '+c.ref.row+' 列</span>'
        + (r[COL_QUESTTYPE] ? '<span class="photo-store-tag">'+esc(String(r[COL_QUESTTYPE]))+'</span>' : '')
        + '</div>'
        + '<div class="photo-gallery-sections">'+sectionsHtml+'</div>'
        + '</div>';
    });

    html += '</div>';
    callback(html);
  }
}

function _rid(s){ return String(s).replace(/[^\w\u4e00-\u9fff]/g,'_').substring(0,20); }
function escAttr(s){ return String(s).replace(/'/g,"\\'"); }


/* ════════════════════════════════════════════════════════
   巢狀 Pivot 渲染器
   dims = ['office','suptype','staff']（依當前順序）
   第零層固定為 area（營業處），不在 dims 裡

   資料欄位對應：
     area    → COL_AREA
     office  → COL_OFFICE
     suptype → COL_SUPTYPE
     staff   → COL_STAFF
   ════════════════════════════════════════════════════════ */

var DIM_COL = {
  area:      function(){ return COL_AREA; },
  office:    function(){ return COL_OFFICE; },
  suptype:   function(){ return COL_SUPTYPE; },
  staff:     function(){ return COL_STAFF; },
  questtype: function(){ return COL_QUESTTYPE; }
};

/* 分群：rows → { key: [row,...] }，依 AREA_ORDER / 字母順序 */
function _groupBy(rows, dim){
  var col = DIM_COL[dim]();
  var map = {}, order = [];
  rows.forEach(function(r){
    var k = String(r[col]||'').trim();
    if(!k) return;
    if(!map[k]){ map[k]=[]; order.push(k); }
    map[k].push(r);
  });
  /* 排序 */
  if(dim === 'area'){
    order.sort(function(a,b){
      var ia=AREA_ORDER.indexOf(a), ib=AREA_ORDER.indexOf(b);
      if(ia===-1&&ib===-1) return a.localeCompare(b);
      if(ia===-1) return 1; if(ib===-1) return -1; return ia-ib;
    });
  } else {
    order.sort(function(a,b){ return a.localeCompare(b,'zh-TW'); });
  }
  return { map:map, order:order };
}

/* 計算 rows 中的唯一 code 數 */
function _countCodes(rows){
  var s = new Set();
  rows.forEach(function(r){ var c=String(r[COL_CODE]||'').trim(); if(c) s.add(c); });
  return s.size;
}
/* 計算 rows 中有效筆數（有 code 的列） */
function _countRows(rows){
  var n=0;
  rows.forEach(function(r){ if(String(r[COL_CODE]||'').trim()) n++; });
  return n;
}
/* 統一格式：N 份　M 家（份數為主、家數為輔，同字級並列，不做大小字區分） */
function _fmtRecStore(records, stores){
  return records+' 份　'+stores+' 家';
}
/* 統一格式：無資料時留白，避免「0 份 0 家」造成視覺疲乏 */
function _fmtRecStoreOrZero(records, stores){
  if(!records && !stores) return '';
  return _fmtRecStore(records||0, stores||0);
}

/* 排序 key：支援 label / total / dim_N */
function _sortedKeys(order, map, sortCol, sortDir){
  if(!sortCol||!sortDir) return order;
  var arr = order.slice();
  arr.sort(function(a,b){
    var va, vb;
    if(sortCol==='__label__'){ va=a; vb=b; }
    else if(sortCol==='total'){ va=_countRows(map[a]||[]); vb=_countRows(map[b]||[]); }
    else { return 0; }
    if(typeof va==='string') return sortDir==='asc'?va.localeCompare(vb,'zh-TW'):vb.localeCompare(va,'zh-TW');
    return sortDir==='asc'?va-vb:vb-va;
  });
  return arr;
}

/* ── 主產生函數：Tree View 縮排版 ── */
function _buildNestedPivot(rows, dims){
  var fullDims = ['area'].concat(dims);
  var ss = _dlgSortState;

  /* 層級設定表 */
  var LEVEL_CFG = [
    /* depth 0：營業處 */
    { bg:'rgba(55,138,221,.08)', borderTop:'2px solid rgba(55,138,221,.2)',
      fontSize:'15px', fontWeight:'900', color:'#1a1a1a', rowH:'44px' },
    /* depth 1 */
    { bg:'transparent', borderTop:'1px solid #eeebe6',
      fontSize:'15px', fontWeight:'700', color:'#1a1a1a', rowH:'38px' },
    /* depth 2 */
    { bg:'transparent', borderTop:'1px solid #f2f0ec',
      fontSize:'14px', fontWeight:'600', color:'#2a2a2a', rowH:'36px' },
    /* depth 3 */
    { bg:'transparent', borderTop:'1px solid #f5f4f1',
      fontSize:'14px', fontWeight:'500', color:'#333', rowH:'34px' },
    /* depth 4（子分類，葉節點） */
    { bg:'rgba(0,0,0,.015)', borderTop:'1px solid #f7f6f3',
      fontSize:'13px', fontWeight:'500', color:'#2D2D2D', rowH:'32px' }
  ];

  var INDENT_BASE = 20;   /* 第0層左邊距 */
  var INDENT_STEP = 32;   /* 每層縮排寬度 */

  /* tree line 顏色 */
  var LINE_COLOR = 'rgba(0,0,0,.12)';

  var html = '<table class="pivot-tbl" style="min-width:320px;"><thead><tr>'
    + '<th class="th-left" style="padding-left:20px;">層級 / 名稱</th>'
    + '<th class="th-num th-total" style="width:140px;min-width:140px;text-align:right;">份數／家數'+_sortBtns('total')+'</th>'
    + '</tr></thead><tbody>';

  function _sortCol(dimIdx){
    if(!ss.col||!ss.dir) return null;
    if(ss.col==='total') return 'total';
    return null;
  }

  /* ── 遞迴渲染 ── */
  function renderLevel(levelRows, dimIdx, depth, parentRid, isLastArr){
    if(dimIdx >= fullDims.length) return;
    var dim    = fullDims[dimIdx];
    var isLeaf = (dimIdx === fullDims.length - 1);
    var meta   = DIM_META[dim];
    var cfg    = LEVEL_CFG[Math.min(depth, LEVEL_CFG.length-1)];

    var g      = _groupBy(levelRows, dim);
    var sorted = _sortedKeys(g.order, g.map, _sortCol(dimIdx), ss.dir||'desc');
    var total  = sorted.length;

    sorted.forEach(function(key, ki){
      var childRows = g.map[key];
      var count = _countCodes(childRows);
      var recs  = _countRows(childRows);
      var rid   = (parentRid||'r')+'-d'+dimIdx+'-'+_rid(key);
      var isOpen = !!_dlgExpandMap[rid];
      var isLast = (ki === total - 1);

      var treePrefix = '';
      if(depth > 0){
        for(var li=0; li<depth; li++){
          var isLastAtThisLevel = isLastArr[li];
          if(li === depth-1){
            treePrefix += '<span style="display:inline-block;width:'+INDENT_STEP+'px;height:20px;position:relative;vertical-align:middle;flex-shrink:0;">'
              + '<svg width="'+INDENT_STEP+'" height="20" style="position:absolute;top:50%;left:0;transform:translateY(-50%);">'
              + (isLastAtThisLevel
                  ? '<line x1="12" y1="0" x2="12" y2="10" stroke="'+LINE_COLOR+'" stroke-width="1.5"/>'
                  : '<line x1="12" y1="0" x2="12" y2="20" stroke="'+LINE_COLOR+'" stroke-width="1.5"/>')
              + '<line x1="12" y1="10" x2="'+INDENT_STEP+'" y2="10" stroke="'+LINE_COLOR+'" stroke-width="1.5"/>'
              + '</svg></span>';
          } else {
            treePrefix += '<span style="display:inline-block;width:'+INDENT_STEP+'px;height:20px;position:relative;vertical-align:middle;flex-shrink:0;">'
              + (!isLastAtThisLevel
                  ? '<svg width="'+INDENT_STEP+'" height="20" style="position:absolute;top:0;left:0;height:100%;">'
                    + '<line x1="12" y1="0" x2="12" y2="20" stroke="'+LINE_COLOR+'" stroke-width="1.5"/>'
                    + '</svg>'
                  : '')
              + '</span>';
          }
        }
      }

      /* 展開箭頭：leaf（questtype）也可展開店家 */
      var arrow = '<span class="pivot-expand-icon'+(isOpen?' open':'')+'" id="ico-'+rid+'" '
        + 'style="font-size:10px;margin-right:5px;flex-shrink:0;">▶</span>';

      /* 圖示 */
      var icon = '<span style="margin-right:5px;font-size:13px;opacity:.75;flex-shrink:0;">'+meta.icon+'</span>';

      var leftPad = INDENT_BASE;

      html += '<tr id="row-'+rid+'" style="'
        + 'background:'+cfg.bg+';'
        + 'border-top:'+cfg.borderTop+';'
        + 'height:'+cfg.rowH+';'
        + 'cursor:pointer;'
        + '" onclick="_dlgNestToggle(\''+rid+'\')">';

      html += '<td class="td-left" style="padding:0 12px 0 '+leftPad+'px;">'
        + '<div style="display:flex;align-items:center;min-width:0;">'
        + (depth>0 ? treePrefix : '')
        + arrow + icon
        + '<span style="font-size:'+cfg.fontSize+';font-weight:'+cfg.fontWeight+';color:'+cfg.color+';white-space:nowrap;">'+esc(key)+'</span>'
        + '</div></td>';

      html += '<td class="td-total" style="font-size:'+cfg.fontSize+';font-weight:'+cfg.fontWeight+';width:140px;text-align:right;white-space:nowrap;color:'+cfg.color+';">'
        + _fmtRecStore(recs, count)
        + '</td>';
      html += '</tr>';

      if(!isLeaf && isOpen){
        renderLevel(childRows, dimIdx+1, depth+1, rid, isLastArr.concat([isLast]));
      }

      /* 葉節點（questtype）展開時顯示店家列表（全部份數，日期由新至舊） */
      if(isLeaf && isOpen){
        /* 全部顯示，不去重，依日期新→舊 */
        var storeRows = childRows.filter(function(r){ return String(r[COL_CODE]||'').trim(); })
          .slice().sort(function(a,b){
            var da=String(a[COL_DATE]||''), db=String(b[COL_DATE]||'');
            if(da!==db) return da>db?-1:1;
            return String(a[COL_NAME]||'').localeCompare(String(b[COL_NAME]||''),'zh-TW');
          });
        /* tree line for store depth */
        storeRows.forEach(function(r, sti){
          var storeName = String(r[COL_NAME]||'').trim();
          var storeDate = String(r[COL_DATE]||'').trim();
          var isStoreLast = (sti === storeRows.length - 1);
          /* last-item tree line for store row */
          var stPrefix = '';
          for(var tli=0; tli<=depth; tli++){
            var tIsLast = tli===depth ? isLast : isLastArr[tli];
            if(tli===depth){
              stPrefix += '<span style="display:inline-block;width:'+INDENT_STEP+'px;height:20px;position:relative;vertical-align:middle;flex-shrink:0;">'
                + '<svg width="'+INDENT_STEP+'" height="20" style="position:absolute;top:50%;left:0;transform:translateY(-50%);">'
                + (!isLast
                    ? '<line x1="12" y1="0" x2="12" y2="20" stroke="'+LINE_COLOR+'" stroke-width="1.5"/>'
                    : '<line x1="12" y1="0" x2="12" y2="10" stroke="'+LINE_COLOR+'" stroke-width="1.5"/>')
                + '</svg></span>';
            } else {
              stPrefix += '<span style="display:inline-block;width:'+INDENT_STEP+'px;height:20px;position:relative;vertical-align:middle;flex-shrink:0;">'
                + (!tIsLast
                    ? '<svg width="'+INDENT_STEP+'" height="20" style="position:absolute;top:0;left:0;height:100%;">'
                      + '<line x1="12" y1="0" x2="12" y2="20" stroke="'+LINE_COLOR+'" stroke-width="1.5"/>'
                      + '</svg>'
                    : '')
                + '</span>';
            }
          }
          /* final leg for this store */
          stPrefix += '<span style="display:inline-block;width:'+INDENT_STEP+'px;height:20px;position:relative;vertical-align:middle;flex-shrink:0;">'
            + '<svg width="'+INDENT_STEP+'" height="20" style="position:absolute;top:50%;left:0;transform:translateY(-50%);">'
            + (isStoreLast
                ? '<line x1="12" y1="0" x2="12" y2="10" stroke="'+LINE_COLOR+'" stroke-width="1.5"/>'
                : '<line x1="12" y1="0" x2="12" y2="20" stroke="'+LINE_COLOR+'" stroke-width="1.5"/>')
            + '<line x1="12" y1="10" x2="'+INDENT_STEP+'" y2="10" stroke="'+LINE_COLOR+'" stroke-width="1.5"/>'
            + '</svg></span>';

          var srcRefVal = String(r[COL_SOURCE_REF]||'').trim();
          var srcRefJs = srcRefVal.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
          html += '<tr class="store-leaf-row" id="storerow-dlg-'+r.__rid+'" style="background:rgba(0,0,0,.012);border-top:1px solid #f7f6f3;height:30px;cursor:pointer;" onclick="_toggleStoreDetail(\'dlg-'+r.__rid+'\',\''+srcRefJs+'\',\''+r.__rid+'\')">';
          html += '<td class="td-left" style="padding:0 12px 0 '+INDENT_BASE+'px;">'
            + '<div style="display:flex;align-items:center;min-width:0;">'
            + stPrefix
            + '<span class="pivot-expand-icon" id="storeico-dlg-'+r.__rid+'" style="font-size:9px;width:14px;flex-shrink:0;">▶</span>'
            + '<span style="font-size:12px;opacity:.7;margin-right:5px;flex-shrink:0;">🏪</span>'
            + '<span style="font-size:12px;font-weight:500;color:#2D2D2D;white-space:nowrap;">'
              + (storeDate ? '<span style="font-size:11px;font-weight:700;color:#2D2D2D;margin-right:8px;font-variant-numeric:tabular-nums;">'+esc(storeDate)+'</span>' : '')
              + esc(storeName)
            + '</span>'
            + '</div></td>';
          html += '<td class="td-total" style="font-size:11px;color:#2D2D2D;font-weight:500;">—</td>';
          html += '</tr>';
          /* 原始問卷明細展開面板（隱藏，點擊才向來源分頁抓取） */
          html += '<tr class="store-detail-row" id="storedetail-dlg-'+r.__rid+'" style="display:none;">'
            + '<td colspan="2" style="padding:0;" id="storedetailbody-dlg-'+r.__rid+'"></td>'
            + '</tr>';
        });
      }
    });
  }

  renderLevel(rows, 0, 0, '', []);

  /* 合計列 */
  var totalC = _countCodes(rows);
  var totalR = _countRows(rows);
  html += '<tr class="sum-footer">'
    + '<td class="td-left" style="padding-left:20px;">合計</td>'
    + '<td class="td-total" style="font-size:17px;text-align:right;white-space:nowrap;">'
      + totalR + '<span style="font-size:11px;font-weight:500;color:#2D2D2D;margin-left:3px;">份</span>'
      + (totalR !== totalC ? '<span style="font-size:12px;font-weight:600;color:#2D2D2D;margin-left:8px;">'+totalC+' 家</span>' : '')
    + '</td>'
    + '</tr></tbody></table>';
  return html;
}

/* ── CSV 匯出 ── */
function downloadDialogCsv(){
  var btn=document.getElementById('btn-dlg-csv');
  if(!_dialogRows||!_dialogRows.length){ _flashBtn(btn,'⚠️ 無資料'); return; }
  if(_dlgListMode){ _downloadCsv(buildCsvContent(_dialogRows),_dialogTitle); _flashBtn(btn,'✅ 已下載'); return; }
  var tbl=document.querySelector('#dlg-pivot-content table');
  if(!tbl){ _flashBtn(btn,'⚠️ 無資料'); return; }
  var csv=Array.from(tbl.querySelectorAll('tr'))
    .filter(function(tr){ return !tr.classList.contains('pivot-child-row')||tr.classList.contains('visible'); })
    .map(function(tr){
      return Array.from(tr.querySelectorAll('th,td')).map(function(td){

        return /[,"\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;
      }).join(',');
    }).join('\n');
  _downloadCsv('\uFEFF'+csv,_dialogTitle+'_彙整');

}



function buildAuditTable(rows){

  var sorted=rows.slice().filter(function(r){ return String(r[COL_CODE]||'').trim(); })
    .sort(function(a,b){
      /* 日期由新至舊 */
      var da=String(a[COL_DATE]||''), db=String(b[COL_DATE]||'');
      if(da!==db) return da>db?-1:1;
      /* 同日再依 area/office/staff/code */
      var cols=[COL_AREA,COL_OFFICE,COL_STAFF,COL_CODE];
      for(var i=0;i<cols.length;i++){
        var va=String(a[cols[i]]||''), vb=String(b[cols[i]]||'');
        if(va!==vb) return va>vb?1:-1;
      }
      return 0;
    });

  /* 要顯示的欄位：根據 level */
  var extraCols=[];

  html+='<th class="th-left">店家型態</th>';
  html+='<th class="th-left">店家等級</th>';
  html+='<th class="th-left">分類</th>';
  html+='<th class="th-left">子分類</th>';
  html+='<th class="th-left">查核時間</th>';
  html+='</tr></thead><tbody>';

  sorted.forEach(function(r){
    html+='<tr>';
    extraCols.forEach(function(c){ html+='<td class="td-left">'+esc(String(r[c]||'—'))+'</td>'; });
    html+='<td class="td-left" style="color:#2D2D2D;font-size:11px;font-weight:600;">'+esc(String(r[COL_CODE]||'—'))+'</td>';
    html+='<td class="td-name td-left">'+esc(String(r[COL_NAME]||'—'))+'</td>';
    html+='<td class="td-left">'+esc(String(r[COL_CHANNEL]||'—'))+'</td>';
    html+='<td class="td-left">'+esc(String(r[COL_STORETYPE]||'—'))+'</td>';
    html+='<td class="td-left">'+esc(String(r[COL_GRADE]||'—'))+'</td>';
    html+='<td class="td-left">'+esc(String(r[COL_SUPTYPE]||'—'))+'</td>';
    html+='<td class="td-left">'+esc(String(r[COL_QUESTTYPE]||'—'))+'</td>';
    html+='<td class="td-left" style="color:#2D2D2D;font-size:12px;font-weight:600;">'+esc(String(r[COL_DATE]||'—'))+'</td>';
    html+='</tr>';
  });
  var footerCols = extraCols.length + 8; /* extra + 店碼+店名+通路+型態+等級+督導+問卷+日期 */
  var footerStores = _countCodes(rows);
  var footerRecs = sorted.length;
  html+='<tr class="sum-footer"><td class="td-left" colspan="'+footerCols+'" style="font-size:13px;">'
    +'合計：<strong style="color:var(--primary);">'+_fmtRecStore(footerRecs, footerStores)+'</strong>'
    +'</td></tr>';
  html+='</tbody></table>';
  return html;
}

/* ════ CSV ════ */
function buildCsvContent(rows){
  var sorted=rows.slice().sort(function(a,b){
    var cols=[COL_AREA,COL_OFFICE,COL_STAFF,COL_SUPTYPE,COL_CODE];
    for(var i=0;i<cols.length;i++){
      var va=String(a[cols[i]]||''), vb=String(b[cols[i]]||'');
      if(va!==vb) return va>vb?1:-1;
    }
    return 0;
  });
  var headers=[COL_AREA,COL_OFFICE,COL_STAFF,COL_CHANNEL,COL_STORETYPE,COL_CODE,COL_NAME,COL_GRADE,COL_SUPTYPE,COL_QUESTTYPE,COL_DATE];
  var allR=[headers];
  sorted.forEach(function(r){
    var code=String(r[COL_CODE]||'').trim(); if(!code) return;
    allR.push(headers.map(function(h){ return String(r[h]||''); }));
  });
  return '\uFEFF'+allR.map(function(row){
    return row.map(function(c){ var s=String(c); return /[,"\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }).join(',');
  }).join('\n');
}

function _downloadCsv(csv,title){
  var now=new Date(),p=function(n){return String(n).padStart(2,'0');};
  var fname=(title||'查核').replace(/[\\/:*?"<>|]/g,'_')+'_'+now.getFullYear()+p(now.getMonth()+1)+p(now.getDate())+'_'+p(now.getHours())+p(now.getMinutes())+'.csv';
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a'); a.href=url; a.download=fname;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

function toolbarDownloadCsv(){
  var btn=document.getElementById('tb-btn-csv');
  if(!allRows.length){ _flashBtn(btn,'⚠️ 無資料'); return; }
  _downloadCsv(buildCsvContent(allRows),PROJ_NAME);
  _flashBtn(btn,'✅ 已下載');
}


/* ════ 截圖（Viewport） ════
   一律只複製到剪貼簿，不下載到本機（複製後就是要直接貼上，
   下載反而多一道存檔/找檔案的手續）。若瀏覽器不支援剪貼簿圖片
   寫入，才提示錯誤，不再自動退回下載。 */
function _clipboardCopyFailBtn(btn, restoreHtml){
  btn.classList.remove('loading');
  if(restoreHtml!==undefined) btn.innerHTML = restoreHtml;
  _flashBtn(btn,'⚠️ 複製失敗，請改用瀏覽器截圖');
}
function toolbarScreenshot(){
  var btn=document.getElementById('tb-btn-screenshot');
  btn.classList.add('loading'); btn.textContent='⏳ 截圖中...';
  function doCapture(){
    html2canvas(document.body,{
      scale:2, backgroundColor:'#ffffff', useCORS:true,
      width:window.innerWidth, height:window.innerHeight,
      windowWidth:window.innerWidth, windowHeight:window.innerHeight,
      x:window.scrollX, y:window.scrollY
    }).then(function(canvas){
      if(navigator.clipboard&&window.ClipboardItem){
        canvas.toBlob(function(blob){
          try{
            navigator.clipboard.write([new ClipboardItem({'image/png':blob})])
              .then(function(){ btn.classList.remove('loading'); btn.textContent='📸 截圖'; _flashBtn(btn,'✅ 已複製！'); })
              .catch(function(){ _clipboardCopyFailBtn(btn,'📸 截圖'); });
          }catch(e){ _clipboardCopyFailBtn(btn,'📸 截圖'); }
        },'image/png');
      } else { _clipboardCopyFailBtn(btn,'📸 截圖'); }
    }).catch(function(err){ btn.classList.remove('loading'); btn.textContent='📸 截圖'; alert('截圖失敗：'+err); });
  }
  if(window.html2canvas) doCapture();
  else {
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    s.onload=doCapture;
    s.onerror=function(){ btn.classList.remove('loading'); btn.textContent='📸 截圖'; alert('html2canvas 載入失敗'); };
    document.head.appendChild(s);
  }
}

/* ════════════════════════════════════════════════════════════
   PIVOT DIALOG  ─  動態多維度切換大表
   ════════════════════════════════════════════════════════════ */

var _pivotMode      = 'staff';   /* staff | office | suptype | store */
var _pivotRows      = null;      /* 目前 pivot 使用的資料集（null = allRows） */
var _pivotSortState = {};        /* { mode: { col, dir } } */
var _pivotTabIndex  = { staff:0, office:1, suptype:2, store:3 };
var PIVOT_TITLES = { staff:'人員 × 分類', office:'單位 × 分類', suptype:'分類 × 子分類', store:'店家明細' };

/* ── 開啟 / 關閉 ── */
function openSummaryDialog(mode, rows){
  _pivotMode = mode || 'staff';
  _pivotRows = rows || getCurrentRows();

  document.getElementById('sum-title').textContent = '彙整看板 ─ ' + (PIVOT_TITLES[_pivotMode] || '');

  /* 高亮正確 Tab */
  document.querySelectorAll('.pivot-tab').forEach(function(t,i){
    t.classList.toggle('active', i === _pivotTabIndex[_pivotMode]);
  });

  /* 渲染四個 slide（懶渲染：只渲染目前 + 鄰近） */
  _renderPivotSlide('staff');
  _renderPivotSlide('office');
  _renderPivotSlide('suptype');
  _renderPivotSlide('store');

  /* 定位到正確 slide */
  _setPivotSlide(_pivotMode, false);

  var dlg = document.getElementById('summary-dialog');
  dlg.style.display = 'flex';
  setTimeout(function(){ dlg.classList.add('open'); }, 10);
}

function closeSummaryDialog(){
  var dlg = document.getElementById('summary-dialog');
  dlg.classList.remove('open');
  setTimeout(function(){ dlg.style.display='none'; }, 220);
}

/* ── Tab 切換 ── */
function switchPivotTab(mode, tabEl){
  _pivotMode = mode;
  document.querySelectorAll('.pivot-tab').forEach(function(t){ t.classList.remove('active'); });
  if(tabEl) tabEl.classList.add('active');
  document.getElementById('sum-title').textContent = '彙整看板 ─ ' + (PIVOT_TITLES[mode]||'');
  _setPivotSlide(mode, true);
}

function _setPivotSlide(mode, animate){
  var idx = _pivotTabIndex[mode] || 0;
  var slides = document.getElementById('pivot-slides');
  if(!animate) slides.style.transition = 'none';
  slides.style.transform = 'translateX(-' + (idx * 100/4) + '%)';
  if(!animate) setTimeout(function(){ slides.style.transition=''; }, 30);
}

/* ── Slide 渲染入口 ── */
function _renderPivotSlide(mode){
  var el = document.getElementById('pivot-slide-' + mode);
  if(!el) return;
  var rows = _pivotRows || getCurrentRows();
  if(mode === 'staff')   el.innerHTML = _buildStaffPivot(rows);
  else if(mode==='office') el.innerHTML = _buildOfficePivot(rows);
  else if(mode==='suptype') el.innerHTML = _buildSuptypePivot(rows);
  else if(mode==='store') el.innerHTML = _buildStorePivot(rows);
}

/* ════ [1] 人員 維度 ════
   三層：營業處 Banner → 人員（可展開） → 店家子列
   欄位：人員 | 分類₁ | … | 合計
*/
function _buildStaffPivot(rows){
  var supTypes = ROSTER_GROUPS;
  var sortKey  = (_pivotSortState.staff||{}).col  || 'total';
  var sortDir  = (_pivotSortState.staff||{}).dir  || 'desc';

  /* areaMap[area][name] = { bySt:{st:{recs:n, codes:Set}}, allCodes:Set, allRecs:n } */
  var areaMap={}, areaOrder=[];
  rows.forEach(function(r){
    var area=String(r[COL_AREA]||'').trim(),
        name=String(r[COL_STAFF]||'').trim(),
        st  =String(r[COL_SUPTYPE]||'').trim(),
        code=String(r[COL_CODE]||'').trim();
    if(!area||!name||!code) return;
    if(!areaMap[area]){ areaMap[area]={}; areaOrder.push(area); }
    if(!areaMap[area][name]) areaMap[area][name]={ bySt:{}, allCodes:new Set(), allRecs:0 };
    if(st){
      if(!areaMap[area][name].bySt[st]) areaMap[area][name].bySt[st]={ recs:0, codes:new Set() };
      areaMap[area][name].bySt[st].recs++;
      areaMap[area][name].bySt[st].codes.add(code);
    }
    areaMap[area][name].allCodes.add(code);
    areaMap[area][name].allRecs++;
  });

  areaOrder.sort(function(a,b){
    var ia=AREA_ORDER.indexOf(a),ib=AREA_ORDER.indexOf(b);
    if(ia===-1&&ib===-1) return 0;
    if(ia===-1) return 1; if(ib===-1) return -1; return ia-ib;
  });

  /* 全域合計（份數＋家數） */
  var grandBySt={}, grandTotalCodes=new Set(), grandTotalRecs=0;
  supTypes.forEach(function(st){ grandBySt[st]={ recs:0, codes:new Set() }; });
  rows.forEach(function(r){
    var st=String(r[COL_SUPTYPE]||'').trim(), code=String(r[COL_CODE]||'').trim();
    if(!code) return;
    grandTotalCodes.add(code); grandTotalRecs++;
    if(st){ grandBySt[st].recs++; grandBySt[st].codes.add(code); }
  });

  function sortIcon(col){
    if(sortKey!==col) return '';
    return '<span style="font-size:9px;color:var(--primary);margin-left:3px;">'+(sortDir==='asc'?'▲':'▼')+'</span>';
  }

  var html='<table class="pivot-tbl"><thead><tr>'
    +'<th class="th-left sortable" onclick="_sortStaff(\'name\')" style="cursor:pointer;">人員'+sortIcon('name')+'</th>';
  supTypes.forEach(function(st,si){
    html+='<th class="th-num th-sup-'+si+' sortable" onclick="_sortStaff(\''+escAttr(st)+'\')" style="cursor:pointer;">'+esc(st)+'（份／家）'+sortIcon(st)+'</th>';
  });
  html+='<th class="th-num th-total sortable" onclick="_sortStaff(\'total\')" style="cursor:pointer;">合計（份／家）'+sortIcon('total')+'</th>';
  html+='</tr></thead><tbody>';

  areaOrder.forEach(function(area){
    var staffMap=areaMap[area];
    var staffList=Object.keys(staffMap).map(function(name){
      var m=staffMap[name], bySt={};
      supTypes.forEach(function(st){ bySt[st]={ recs:m.bySt[st]?m.bySt[st].recs:0, stores:m.bySt[st]?m.bySt[st].codes.size:0 }; });
      return { name:name, bySt:bySt, totalRecs:m.allRecs, totalStores:m.allCodes.size };
    });
    staffList.sort(function(a,b){
      var va=sortKey==='name'?a.name:(sortKey==='total'?a.totalRecs:(a.bySt[sortKey]?a.bySt[sortKey].recs:0));
      var vb=sortKey==='name'?b.name:(sortKey==='total'?b.totalRecs:(b.bySt[sortKey]?b.bySt[sortKey].recs:0));
      if(typeof va==='string') return sortDir==='asc'?va.localeCompare(vb):vb.localeCompare(va);
      return sortDir==='asc'?va-vb:vb-va;
    });

    /* 計算此處小計（份數＋家數） */
    var areaBySt={}, areaTotalCodes=new Set(), areaTotalRecs=0;
    supTypes.forEach(function(st){ areaBySt[st]={ recs:0, codes:new Set() }; });
    rows.forEach(function(r){
      if(String(r[COL_AREA]||'').trim()!==area) return;
      var st=String(r[COL_SUPTYPE]||'').trim(), code=String(r[COL_CODE]||'').trim();
      if(!code) return;
      areaTotalCodes.add(code); areaTotalRecs++;
      if(st){ areaBySt[st].recs++; areaBySt[st].codes.add(code); }
    });

    /* 營業處 Banner */
    var areaSpan=1+supTypes.length+1;
    html+='<tr class="pivot-area-row"><td colspan="'+areaSpan+'" style="padding:8px 16px;">'
      +'<span style="font-size:13px;font-weight:900;margin-right:10px;">▸ '+esc(area)+'</span>';
    supTypes.forEach(function(st){ html+='<span style="font-size:12px;font-weight:600;color:#2D2D2D;margin-right:10px;">'+esc(st)+' <strong style="color:#2D2D2D;">'+areaBySt[st].recs+' 份</strong></span>'; });
    html+='<span style="font-size:12px;">合計 <strong style="color:var(--primary);font-size:14px;">'+areaTotalRecs+' 份</strong></span></td></tr>';

    /* 人員列 */
    staffList.forEach(function(s){
      var rid='pvst-'+area.replace(/[^\w\u4e00-\u9fff]/g,'_')+s.name.replace(/[^\w\u4e00-\u9fff]/g,'_');
      html+='<tr class="pivot-expand-row" onclick="_toggleStaffExpand(\''+rid+'\')" id="row-'+rid+'">';
      html+='<td class="td-left"><span class="pivot-expand-icon" id="ico-'+rid+'">▶</span>'+esc(s.name)+'</td>';
      supTypes.forEach(function(st,si){
        var v=s.bySt[st];
        html+='<td class="td-num td-sup-'+si+'">'+_fmtRecStoreOrZero(v.recs,v.stores)+'</td>';
      });
      html+='<td class="td-total">'+_fmtRecStore(s.totalRecs,s.totalStores)+'</td></tr>';

      /* 店家展開子列：日期 代碼 店名，依日期新→舊 */
      var storeRows=rows.filter(function(r){ return String(r[COL_AREA]||'').trim()===area&&String(r[COL_STAFF]||'').trim()===s.name; });
      storeRows.sort(function(a,b){
        var da=String(a[COL_DATE]||''), db=String(b[COL_DATE]||'');
        if(da!==db) return da>db?-1:1;
        return String(a[COL_NAME]||'').localeCompare(String(b[COL_NAME]||''),'zh-TW');
      });
      var storeColspan = 2 + supTypes.length;
      storeRows.forEach(function(r,ri){
        var code=String(r[COL_CODE]||'').trim(); if(!code) return;
        var dateStr=String(r[COL_DATE]||'').trim();
        var srcRefVal = String(r[COL_SOURCE_REF]||'').trim();
        var srcRefJs = srcRefVal.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
        html+='<tr class="pivot-child-row store-leaf-row" id="child-'+rid+'-'+ri+'" data-parent="'+rid+'" style="cursor:pointer;" onclick="_toggleStoreDetail(\'pvstaff-'+r.__rid+'\',\''+srcRefJs+'\',\''+r.__rid+'\')">';
        html+='<td class="td-left" colspan="1" style="padding-left:32px;font-size:13px;">'
             +'<span class="pivot-expand-icon" id="storeico-pvstaff-'+r.__rid+'" style="font-size:9px;width:14px;display:inline-block;">▶</span>'
             +'<span style="font-size:11px;font-weight:600;color:#2D2D2D;margin-right:6px;">'+esc(code)+'</span>'
             +'<span style="font-weight:600;color:#1a1a1a;">'+esc(String(r[COL_NAME]||''))+'</span>'
             +'</td>';
        supTypes.forEach(function(st,si){
          var match=String(r[COL_SUPTYPE]||'').trim()===st;
          html+='<td class="td-num td-sup-'+si+'" style="font-size:11px;font-weight:500;color:#2D2D2D;">'
            +(match?'<span style="color:var(--green);">✓</span>':'')+'</td>';
        });
        html+='<td class="td-total" style="font-size:11px;color:#2D2D2D;">'+esc(String(r[COL_QUESTTYPE]||'—'))+'</td></tr>';
        html+='<tr class="pivot-child-row store-detail-row" id="storedetail-pvstaff-'+r.__rid+'" data-parent="'+rid+'" style="display:none;">'
             +'<td colspan="'+storeColspan+'" style="padding:0;" id="storedetailbody-pvstaff-'+r.__rid+'"></td></tr>';
      });
      /* 收合人員時，一併收合底下已展開的店家明細，避免收合後留下孤兒面板 */
    });
  });

  /* 合計列 */
  html+='<tr class="sum-footer"><td class="td-left">合計</td>';
  supTypes.forEach(function(st){ html+='<td class="td-total">'+_fmtRecStore(grandBySt[st].recs,grandBySt[st].codes.size)+'</td>'; });
  html+='<td class="td-total" style="font-size:15px;">'+_fmtRecStore(grandTotalRecs,grandTotalCodes.size)+'</td>';
  html+='</tr></tbody></table>';
  return html;
}

function _sortStaff(col){
  var cur=_pivotSortState.staff||{};
  _pivotSortState.staff = { col:col, dir:(cur.col===col&&cur.dir==='desc')?'asc':'desc' };
  _renderPivotSlide('staff');
}

/* 收合某層群組時，一併強制收合底下任何已展開的店家問卷明細面板，
   避免群組收合後，明細面板因為是用 inline style 個別控制開合，
   殘留變成「孤兒面板」浮在畫面上（inline style 優先權比 class 高，
   單純 toggle class 蓋不掉它）。 */
function _collapseNestedStoreDetails(rid){
  document.querySelectorAll('.store-detail-row[data-parent="'+rid+'"]').forEach(function(tr){
    if(tr.style.display!=='none'){
      tr.style.display='none';
      var ridSuffix=tr.id.replace('storedetail-','');
      var ico=document.getElementById('storeico-'+ridSuffix);
      if(ico) ico.classList.remove('open');
    }
  });
}

function _toggleStaffExpand(rid){
  var ico=document.getElementById('ico-'+rid);
  var childRows=document.querySelectorAll('[data-parent="'+rid+'"]');
  var isOpen=ico&&ico.classList.contains('open');
  if(ico) ico.classList.toggle('open',!isOpen);
  childRows.forEach(function(tr){ tr.classList.toggle('visible',!isOpen); });
  if(isOpen) _collapseNestedStoreDetails(rid);
}

/* ════ [2] 單位 維度 ════
   三層：營業處 Banner → 所/課（可展開） → 人員子列
   欄位：所/課 | 分類₁ | … | 合計
*/
function _buildOfficePivot(rows){
  var supTypes=ROSTER_GROUPS;
  var sortKey=(_pivotSortState.office||{}).col||'total';
  var sortDir=(_pivotSortState.office||{}).dir||'desc';

  /* areaMap[area][office] = { bySt:{st:{recs,codes:Set}}, staffs:Set, allCodes:Set, allRecs:n } */
  var areaMap={}, areaOrder=[];
  rows.forEach(function(r){
    var area=String(r[COL_AREA]||'').trim(),
        off =String(r[COL_OFFICE]||'').trim(),
        staff=String(r[COL_STAFF]||'').trim(),
        st  =String(r[COL_SUPTYPE]||'').trim(),
        code=String(r[COL_CODE]||'').trim();
    if(!area||!off||!code) return;
    if(!areaMap[area]){ areaMap[area]={}; areaOrder.push(area); }
    if(!areaMap[area][off]) areaMap[area][off]={ bySt:{}, staffs:new Set(), allCodes:new Set(), allRecs:0 };
    if(st){
      if(!areaMap[area][off].bySt[st]) areaMap[area][off].bySt[st]={ recs:0, codes:new Set() };
      areaMap[area][off].bySt[st].recs++;
      areaMap[area][off].bySt[st].codes.add(code);
    }
    areaMap[area][off].allCodes.add(code);
    areaMap[area][off].allRecs++;
    if(staff) areaMap[area][off].staffs.add(staff);
  });

  areaOrder.sort(function(a,b){
    var ia=AREA_ORDER.indexOf(a),ib=AREA_ORDER.indexOf(b);
    if(ia===-1&&ib===-1) return a>b?1:-1;
    if(ia===-1) return 1; if(ib===-1) return -1; return ia-ib;
  });

  /* 全域合計（份數＋家數） */
  var grandBySt={}, grandTotalCodes=new Set(), grandTotalRecs=0;
  supTypes.forEach(function(st){ grandBySt[st]={ recs:0, codes:new Set() }; });
  rows.forEach(function(r){
    var st=String(r[COL_SUPTYPE]||'').trim(), code=String(r[COL_CODE]||'').trim();
    if(!code) return;
    grandTotalCodes.add(code); grandTotalRecs++;
    if(st){ grandBySt[st].recs++; grandBySt[st].codes.add(code); }
  });

  function sortIcon(col){
    if(sortKey!==col) return '';
    return '<span style="font-size:9px;color:var(--primary);margin-left:3px;">'+(sortDir==='asc'?'▲':'▼')+'</span>';
  }

  var html='<table class="pivot-tbl"><thead><tr>'
    +'<th class="th-left sortable" onclick="_sortOffice(\'office\')" style="cursor:pointer;">所/課 '+sortIcon('office')+'</th>'
    +'<th class="th-left" style="min-width:60px;color:#2D2D2D;">人員</th>';
  supTypes.forEach(function(st,si){
    html+='<th class="th-num th-sup-'+si+' sortable" onclick="_sortOffice(\''+escAttr(st)+'\')" style="cursor:pointer;">'+esc(st)+'（份／家） '+sortIcon(st)+'</th>';
  });
  html+='<th class="th-num th-total sortable" onclick="_sortOffice(\'total\')" style="cursor:pointer;">合計（份／家） '+sortIcon('total')+'</th>';
  html+='</tr></thead><tbody>';

  areaOrder.forEach(function(area, ai){
    var offMap=areaMap[area];

    /* 計算此區各 office 的合計，以便排序 */
    var offs=Object.keys(offMap);
    var offStats=offs.map(function(off){
      var m=offMap[off], bySt={};
      supTypes.forEach(function(st){ bySt[st]={ recs:m.bySt[st]?m.bySt[st].recs:0, stores:m.bySt[st]?m.bySt[st].codes.size:0 }; });
      return { off:off, bySt:bySt, totalRecs:m.allRecs, totalStores:m.allCodes.size, staffs:Array.from(m.staffs).sort() };
    });
    offStats.sort(function(a,b){
      if(sortKey==='office') return sortDir==='asc'?a.off.localeCompare(b.off):b.off.localeCompare(a.off);
      var va=sortKey==='total'?a.totalRecs:(a.bySt[sortKey]?a.bySt[sortKey].recs:0);
      var vb=sortKey==='total'?b.totalRecs:(b.bySt[sortKey]?b.bySt[sortKey].recs:0);
      return sortDir==='asc'?va-vb:vb-va;
    });

    /* 計算此區小計（份數＋家數） */
    var areaBySt={}, areaTotalCodes=new Set(), areaTotalRecs=0;
    supTypes.forEach(function(st){ areaBySt[st]={ recs:0, codes:new Set() }; });
    rows.forEach(function(r){
      if(String(r[COL_AREA]||'').trim()!==area) return;
      var st=String(r[COL_SUPTYPE]||'').trim(), code=String(r[COL_CODE]||'').trim();
      if(!code) return;
      areaTotalCodes.add(code); areaTotalRecs++;
      if(st){ areaBySt[st].recs++; areaBySt[st].codes.add(code); }
    });

    /* ── 營業處 Banner 列 ── */
    var areaSpan=2+supTypes.length+1;
    html+='<tr class="pivot-area-row"><td colspan="'+areaSpan+'" style="padding:8px 16px;">'
      +'<span style="font-size:13px;font-weight:900;margin-right:10px;">▸ '+esc(area)+'</span>';
    supTypes.forEach(function(st,si){ html+='<span style="font-size:12px;font-weight:600;color:#2D2D2D;margin-right:10px;">'+esc(st)+' <strong style="color:#2D2D2D;">'+areaBySt[st].recs+' 份</strong></span>'; });
    html+='<span style="font-size:12px;">合計 <strong style="color:var(--primary);font-size:14px;">'+areaTotalRecs+' 份</strong></span>'
      +'</td></tr>';

    /* ── 所/課 列（可展開人員） ── */
    offStats.forEach(function(o, oi){
      var rid='pvoff-'+area.replace(/[^\w\u4e00-\u9fff]/g,'_')+oi;
      html+='<tr class="pivot-expand-row" onclick="_toggleOfficeExpand(\''+rid+'\')" id="row-'+rid+'">'
        +'<td class="td-left"><span class="pivot-expand-icon" id="ico-'+rid+'">▶</span>'+esc(o.off)+'</td>'
        +'<td class="td-left" style="font-size:12px;font-weight:600;color:#2D2D2D;">'+o.staffs.length+' 人</td>';
      supTypes.forEach(function(st,si){
        var v=o.bySt[st];
        html+='<td class="td-num td-sup-'+si+'">'+_fmtRecStoreOrZero(v.recs,v.stores)+'</td>';
      });
      html+='<td class="td-total">'+_fmtRecStore(o.totalRecs,o.totalStores)+'</td></tr>';

      /* 人員子列（份數＋家數） */
      o.staffs.forEach(function(name, ni){
        var sBySt={}, sCodes=new Set(), sRecs=0;
        supTypes.forEach(function(st){ sBySt[st]={ recs:0 }; });
        rows.forEach(function(r){
          if(String(r[COL_AREA]||'').trim()!==area||String(r[COL_OFFICE]||'').trim()!==o.off||String(r[COL_STAFF]||'').trim()!==name) return;
          var st=String(r[COL_SUPTYPE]||'').trim(), code=String(r[COL_CODE]||'').trim();
          if(!code) return;
          sCodes.add(code); sRecs++;
          if(st&&sBySt[st]) sBySt[st].recs++;
        });
        html+='<tr class="pivot-child-row" id="child-'+rid+'-'+ni+'" data-parent="'+rid+'">'
          +'<td class="td-left" style="padding-left:36px;font-size:13px;font-weight:600;color:#1a1a1a;">'+esc(name)+'</td>'
          +'<td></td>';
        supTypes.forEach(function(st,si){
          var n=sBySt[st]?sBySt[st].recs:0;
          html+='<td class="td-num td-sup-'+si+'" style="font-size:13px;font-weight:600;">'+(n?n+' 份':'')+'</td>';
        });
        html+='<td class="td-total" style="font-size:13px;">'+_fmtRecStore(sRecs,sCodes.size)+'</td></tr>';
      });
    });
  });

  /* 合計列 */
  html+='<tr class="sum-footer"><td class="td-left" colspan="2">合計</td>';
  supTypes.forEach(function(st){ html+='<td class="td-total">'+_fmtRecStore(grandBySt[st].recs,grandBySt[st].codes.size)+'</td>'; });
  html+='<td class="td-total" style="font-size:16px;">'+_fmtRecStore(grandTotalRecs,grandTotalCodes.size)+'</td>';
  html+='</tr></tbody></table>';
  return html;
}

function _sortOffice(col){
  var cur=_pivotSortState.office||{};
  _pivotSortState.office={col:col, dir:(cur.col===col&&cur.dir==='desc')?'asc':'desc'};
  _renderPivotSlide('office');
}
function _toggleOfficeExpand(rid){
  var ico=document.getElementById('ico-'+rid);
  var childRows=document.querySelectorAll('[data-parent="'+rid+'"]');
  var isOpen=ico&&ico.classList.contains('open');
  if(ico) ico.classList.toggle('open',!isOpen);
  childRows.forEach(function(tr){ tr.classList.toggle('visible',!isOpen); });
  if(isOpen) _collapseNestedStoreDetails(rid);
}

/* ════ [4] 店家 維度 ════
   兩層：營業處 Banner → 所/課（可展開）→ 展開後直接列出該所/課全部店家逐筆明細
   明細排序：日期（新→舊）→ 代碼 → 店名 → 人員 → 分類
   欄位：日期 | 代碼 | 店名 | 人員 | 分類
*/
function _buildStorePivot(rows){
  var sortKey=(_pivotSortState.store||{}).col||'office';
  var sortDir=(_pivotSortState.store||{}).dir||'asc';

  /* areaMap[area][office] = { rows:[...], allRecs:n } */
  var areaMap={}, areaOrder=[];
  rows.forEach(function(r){
    var area=String(r[COL_AREA]||'').trim(),
        off =String(r[COL_OFFICE]||'').trim(),
        code=String(r[COL_CODE]||'').trim();
    if(!area||!off||!code) return;
    if(!areaMap[area]){ areaMap[area]={}; areaOrder.push(area); }
    if(!areaMap[area][off]) areaMap[area][off]={ rows:[], allRecs:0 };
    areaMap[area][off].rows.push(r);
    areaMap[area][off].allRecs++;
  });

  areaOrder.sort(function(a,b){
    var ia=AREA_ORDER.indexOf(a),ib=AREA_ORDER.indexOf(b);
    if(ia===-1&&ib===-1) return a>b?1:-1;
    if(ia===-1) return 1; if(ib===-1) return -1; return ia-ib;
  });

  /* 全域合計（份數＋家數） */
  var grandTotalCodes=new Set(), grandTotalRecs=0;
  rows.forEach(function(r){
    var code=String(r[COL_CODE]||'').trim();
    if(!code) return;
    grandTotalCodes.add(code); grandTotalRecs++;
  });

  /* 明細排序：日期新→舊，同日期再依代碼→店名→人員→分類 */
  function _sortStoreRows(list){
    return list.slice().sort(function(a,b){
      var da=String(a[COL_DATE]||''), db=String(b[COL_DATE]||'');
      if(da!==db) return da>db?-1:1;
      var ca=String(a[COL_CODE]||''), cb=String(b[COL_CODE]||'');
      if(ca!==cb) return ca.localeCompare(cb,'zh-TW');
      var na=String(a[COL_NAME]||''), nb=String(b[COL_NAME]||'');
      if(na!==nb) return na.localeCompare(nb,'zh-TW');
      var sa=String(a[COL_STAFF]||''), sb=String(b[COL_STAFF]||'');
      if(sa!==sb) return sa.localeCompare(sb,'zh-TW');
      return String(a[COL_SUPTYPE]||'').localeCompare(String(b[COL_SUPTYPE]||''),'zh-TW');
    });
  }

  function sortIcon(col){
    if(sortKey!==col) return '';
    return '<span style="font-size:9px;color:var(--primary);margin-left:3px;">'+(sortDir==='asc'?'▲':'▼')+'</span>';
  }

  var html='<table class="pivot-tbl"><thead><tr>'
    +'<th class="th-left sortable" onclick="_sortStore(\'office\')" style="cursor:pointer;">所/課 '+sortIcon('office')+'</th>'
    +'<th class="th-left" style="min-width:90px;color:#2D2D2D;">日期</th>'
    +'<th class="th-left" style="min-width:70px;color:#2D2D2D;">代碼</th>'
    +'<th class="th-left" style="min-width:120px;color:#2D2D2D;">店名</th>'
    +'<th class="th-left" style="min-width:70px;color:#2D2D2D;">人員</th>'
    +'<th class="th-num th-total sortable" onclick="_sortStore(\'total\')" style="cursor:pointer;">分類／份數 '+sortIcon('total')+'</th>'
    +'</tr></thead><tbody>';

  areaOrder.forEach(function(area, ai){
    var offMap=areaMap[area];

    var offs=Object.keys(offMap);
    var offStats=offs.map(function(off){
      var m=offMap[off];
      var codes=new Set(); m.rows.forEach(function(r){ var c=String(r[COL_CODE]||'').trim(); if(c) codes.add(c); });
      return { off:off, totalRecs:m.allRecs, totalStores:codes.size, rows:m.rows };
    });
    offStats.sort(function(a,b){
      if(sortKey==='office') return sortDir==='asc'?a.off.localeCompare(b.off,'zh-TW'):b.off.localeCompare(a.off,'zh-TW');
      var va=a.totalRecs, vb=b.totalRecs;
      return sortDir==='asc'?va-vb:vb-va;
    });

    /* 此區小計（份數＋家數） */
    var areaTotalCodes=new Set(), areaTotalRecs=0;
    rows.forEach(function(r){
      if(String(r[COL_AREA]||'').trim()!==area) return;
      var code=String(r[COL_CODE]||'').trim();
      if(!code) return;
      areaTotalCodes.add(code); areaTotalRecs++;
    });

    /* ── 營業處 Banner 列 ── */
    html+='<tr class="pivot-area-row"><td colspan="6" style="padding:8px 16px;">'
      +'<span style="font-size:13px;font-weight:900;margin-right:10px;">▸ '+esc(area)+'</span>'
      +'<span style="font-size:12px;">合計 <strong style="color:var(--primary);font-size:14px;">'+areaTotalRecs+' 份</strong></span>'
      +'</td></tr>';

    /* ── 所/課 列（可展開店家逐筆明細） ── */
    offStats.forEach(function(o, oi){
      var rid='pvstore-'+area.replace(/[^\w\u4e00-\u9fff]/g,'_')+oi;
      html+='<tr class="pivot-expand-row" onclick="_toggleStoreExpand(\''+rid+'\')" id="row-'+rid+'">'
        +'<td class="td-left"><span class="pivot-expand-icon" id="ico-'+rid+'">▶</span>'+esc(o.off)+'</td>'
        +'<td class="td-left"></td><td class="td-left"></td><td class="td-left"></td><td class="td-left"></td>'
        +'<td class="td-total">'+_fmtRecStore(o.totalRecs,o.totalStores)+'</td></tr>';

      /* 店家逐筆明細子列：日期新→舊 → 代碼 → 店名 → 人員 → 分類 */
      var storeRows=_sortStoreRows(o.rows);

      /* 偵測「同日且同店」：日期+代碼 出現次數 > 1 即標記高光 */
      var dupKeyCount={};
      storeRows.forEach(function(r){
        var k=String(r[COL_DATE]||'').trim()+'|'+String(r[COL_CODE]||'').trim();
        dupKeyCount[k]=(dupKeyCount[k]||0)+1;
      });

      storeRows.forEach(function(r, ri){
        var dateStr=String(r[COL_DATE]||'').trim();
        var code=String(r[COL_CODE]||'').trim();
        var name=String(r[COL_NAME]||'').trim();
        var staff=String(r[COL_STAFF]||'').trim();
        var st=String(r[COL_SUPTYPE]||'').trim();
        var qt=String(r[COL_QUESTTYPE]||'').trim();
        var dupKey=dateStr+'|'+code;
        var isDup=dateStr&&code&&dupKeyCount[dupKey]>1;
        var rowClass='pivot-child-row store-leaf-row'+(isDup?' pivot-dup-row':'');
        var srcRefVal=String(r[COL_SOURCE_REF]||'').trim();
        var srcRefJs=srcRefVal.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
        html+='<tr class="'+rowClass+'" id="child-'+rid+'-'+ri+'" data-parent="'+rid+'" style="cursor:pointer;"'+(isDup?' title="同一天同一家店有多筆查核紀錄"':'')+' onclick="_toggleStoreDetail(\'pvstore-'+r.__rid+'\',\''+srcRefJs+'\',\''+r.__rid+'\')">'
          +'<td class="td-left" style="padding-left:20px;"><span class="pivot-expand-icon" id="storeico-pvstore-'+r.__rid+'" style="font-size:9px;width:14px;display:inline-block;">▶</span></td>'
          +'<td class="td-left" style="font-size:12px;font-weight:700;color:#2D2D2D;font-variant-numeric:tabular-nums;">'+(dateStr||'—')+'</td>'
          +'<td class="td-left" style="font-size:11px;font-weight:600;color:#2D2D2D;">'+esc(code||'—')+'</td>'
          +'<td class="td-left" style="font-size:13px;font-weight:700;color:#1a1a1a;">'+esc(name||'—')+(isDup?' <span class="pivot-dup-badge">⚠ 同日重複</span>':'')+'</td>'
          +'<td class="td-left" style="font-size:12px;font-weight:600;color:#1a1a1a;">'+esc(staff||'—')+'</td>'
          +'<td class="td-total" style="font-size:12px;font-weight:600;color:var(--green);">'+esc(st||'—')+(qt?'　<span style="color:#2D2D2D;font-weight:500;">'+esc(qt)+'</span>':'')+'</td>'
          +'</tr>';
        html+='<tr class="pivot-child-row store-detail-row" id="storedetail-pvstore-'+r.__rid+'" data-parent="'+rid+'" style="display:none;">'
          +'<td colspan="6" style="padding:0;" id="storedetailbody-pvstore-'+r.__rid+'"></td></tr>';
      });
    });
  });

  /* 合計列 */
  html+='<tr class="sum-footer"><td class="td-left" colspan="5">合計</td>'
    +'<td class="td-total" style="font-size:16px;">'+_fmtRecStore(grandTotalRecs,grandTotalCodes.size)+'</td>'
    +'</tr></tbody></table>';
  return html;
}

function _sortStore(col){
  var cur=_pivotSortState.store||{};
  _pivotSortState.store={col:col, dir:(cur.col===col&&cur.dir==='desc')?'asc':'desc'};
  _renderPivotSlide('store');
}
function _toggleStoreExpand(rid){
  var ico=document.getElementById('ico-'+rid);
  var childRows=document.querySelectorAll('[data-parent="'+rid+'"]');
  var isOpen=ico&&ico.classList.contains('open');
  if(ico) ico.classList.toggle('open',!isOpen);
  childRows.forEach(function(tr){ tr.classList.toggle('visible',!isOpen); });
  if(isOpen) _collapseNestedStoreDetails(rid);
}

/* ════ [3] 分類 維度 ════
   欄位：分類 | 子分類 | 人員數 | 份數／家數
   結構：分類 → 子分類 → 人員名單（展開）
*/
function _buildSuptypePivot(rows){
  var supTypes=ROSTER_GROUPS;
  var sortKey=(_pivotSortState.suptype||{}).col||'stores';
  var sortDir=(_pivotSortState.suptype||{}).dir||'desc';

  /* stMap[supType][questType] = { stores:Set, staffs:Set, recs:n } */
  var stMap={};
  supTypes.forEach(function(st){ stMap[st]={}; });
  rows.forEach(function(r){
    var st=String(r[COL_SUPTYPE]||'').trim(),
        qt=String(r[COL_QUESTTYPE]||'').trim(),
        code=String(r[COL_CODE]||'').trim(),
        staff=String(r[COL_STAFF]||'').trim();
    if(!st||!code) return;
    if(!stMap[st]) stMap[st]={};
    var key=qt||'（未分類）';
    if(!stMap[st][key]) stMap[st][key]={ stores:new Set(), staffs:new Set(), recs:0 };
    stMap[st][key].stores.add(code);
    stMap[st][key].recs++;
    if(staff) stMap[st][key].staffs.add(staff);
  });

  function sortIcon(col){
    if(sortKey!==col) return '';
    return ' <span style="font-size:9px;color:var(--primary);">'+(sortDir==='asc'?'▲':'▼')+'</span>';
  }

  var html='<table class="pivot-tbl"><thead><tr>'
    +'<th class="th-left sortable" onclick="_sortSuptype(\'suptype\')" style="cursor:pointer;">分類'+sortIcon('suptype')+'</th>'
    +'<th class="th-left sortable" onclick="_sortSuptype(\'questtype\')" style="cursor:pointer;">子分類'+sortIcon('questtype')+'</th>'
    +'<th class="th-num sortable" onclick="_sortSuptype(\'staffs\')" style="cursor:pointer;">人員數'+sortIcon('staffs')+'</th>'
    +'<th class="th-num th-total sortable" onclick="_sortSuptype(\'stores\')" style="cursor:pointer;">份數／家數'+sortIcon('stores')+'</th>'
    +'</tr></thead><tbody>';

  var grandTotalCodes=new Set(), grandTotalRecs=0;
  rows.forEach(function(r){ var c=String(r[COL_CODE]||'').trim(); if(c){ grandTotalCodes.add(c); grandTotalRecs++; } });

  supTypes.forEach(function(st, si){
    var qtMap=stMap[st]||{};
    var qtList=Object.keys(qtMap).map(function(qt){
      return { qt:qt, stores:qtMap[qt].stores.size, recs:qtMap[qt].recs, staffs:qtMap[qt].staffs.size, staffList:Array.from(qtMap[qt].staffs).sort() };
    });

    qtList.sort(function(a,b){
      if(sortKey==='questtype') return sortDir==='asc'?a.qt.localeCompare(b.qt):b.qt.localeCompare(a.qt);
      var va=sortKey==='staffs'?a.staffs:a.recs;
      var vb=sortKey==='staffs'?b.staffs:b.recs;
      return sortDir==='asc'?va-vb:vb-va;
    });

    /* 分類小計（份數＋家數） */
    var stTotalCodes=new Set(), stTotalRecs=0;
    rows.forEach(function(r){ if(String(r[COL_SUPTYPE]||'').trim()===st){ var c=String(r[COL_CODE]||'').trim(); if(c){ stTotalCodes.add(c); stTotalRecs++; } } });
    var stStaffs=new Set();
    rows.forEach(function(r){ if(String(r[COL_SUPTYPE]||'').trim()===st){ var s=String(r[COL_STAFF]||'').trim(); if(s) stStaffs.add(s); } });

    /* 分類標題列（展開/收合子分類） */
    var stId='pvst-'+String(st).replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g,'_');
    html+='<tr class="pivot-expand-row" onclick="_toggleSuptypeExpand(\''+stId+'\')" id="row-'+stId+'" '
      +'style="background:rgba(55,138,221,.05);border-top:2px solid rgba(0,0,0,.07);">';
    html+='<td class="td-left" style="font-weight:900;"><span class="pivot-expand-icon" id="ico-'+stId+'">▶</span>'+esc(st)+'</td>';
    html+='<td class="td-left" style="color:#2D2D2D;font-size:12px;">共 '+qtList.length+' 種子分類</td>';
    html+='<td class="td-num" style="font-weight:900;color:#2D2D2D;">'+stStaffs.size+'</td>';
    html+='<td class="td-total" style="font-size:14px;">'+_fmtRecStore(stTotalRecs,stTotalCodes.size)+'</td></tr>';

    /* 子分類子列 */
    qtList.forEach(function(q, qi){
      var qtId=stId+'_qt'+qi;
      html+='<tr class="pivot-child-row" id="child-'+stId+'-'+qi+'" data-parent="'+stId+'">';
      html+='<td class="td-left" style="padding-left:32px;color:#2D2D2D;font-size:11px;"></td>';
      html+='<td class="td-left" style="font-size:12px;cursor:pointer;" onclick="_toggleStaffList(\''+qtId+'\')">'
        +'<span class="pivot-expand-icon" id="ico-'+qtId+'">▶</span>'+esc(q.qt)+'</td>';
      html+='<td class="td-num" style="font-size:12px;font-weight:600;color:#2D2D2D;">'+q.staffs+'</td>';
      html+='<td class="td-total" style="font-size:12px;">'+_fmtRecStore(q.recs,q.stores)+'</td></tr>';

      /* 人員名單（第三層展開） */
      q.staffList.forEach(function(name, ni){
        html+='<tr class="pivot-child-row" id="child-'+qtId+'-'+ni+'" data-parent="'+qtId+'" style="display:none;" data-qt-child="1">';
        html+='<td colspan="2" class="td-left" style="padding-left:56px;font-size:12px;color:#2D2D2D;">'+esc(name)+'</td>';
        html+='<td colspan="2" class="td-left" style="font-size:11px;color:#2D2D2D;"></td></tr>';
      });
    });
  });

  /* 合計 */
  var grandStaffs=new Set();
  rows.forEach(function(r){ var s=String(r[COL_STAFF]||'').trim(); if(s) grandStaffs.add(s); });
  html+='<tr class="sum-footer">'
    +'<td class="td-left" colspan="2">合計</td>'
    +'<td class="td-total">'+grandStaffs.size+'</td>'
    +'<td class="td-total" style="font-size:15px;">'+_fmtRecStore(grandTotalRecs,grandTotalCodes.size)+'</td>'
    +'</tr></tbody></table>';
  return html;
}

function _sortSuptype(col){
  var cur=_pivotSortState.suptype||{};
  _pivotSortState.suptype={col:col, dir:(cur.col===col&&cur.dir==='desc')?'asc':'desc'};
  _renderPivotSlide('suptype');
}
function _toggleSuptypeExpand(rid){
  var ico=document.getElementById('ico-'+rid);
  var childRows=document.querySelectorAll('[data-parent="'+rid+'"]');
  var isOpen=ico&&ico.classList.contains('open');
  if(ico) ico.classList.toggle('open',!isOpen);
  childRows.forEach(function(tr){ tr.classList.toggle('visible',!isOpen); });
}
function _toggleStaffList(qtId){
  var ico=document.getElementById('ico-'+qtId);
  var childRows=document.querySelectorAll('[data-parent="'+qtId+'"]');
  var isOpen=ico&&ico.classList.contains('open');
  if(ico) ico.classList.toggle('open',!isOpen);
  childRows.forEach(function(tr){
    tr.classList.toggle('visible',!isOpen);
    tr.style.display=isOpen?'none':'table-row';
  });

/* ── CSV 匯出（讀取目前 slide 的表格） ── */
function downloadSummaryCsv(){
  var btn=document.getElementById('btn-sum-csv');
  var slide=document.getElementById('pivot-slide-'+_pivotMode);
  if(!slide){ _flashBtn(btn,'⚠️ 無資料'); return; }
  var rows=slide.querySelectorAll('table tr');
  if(!rows.length){ _flashBtn(btn,'⚠️ 無資料'); return; }
  var csv=Array.from(rows).filter(function(tr){
    return !tr.classList.contains('pivot-child-row')||tr.style.display!=='none';
  }).map(function(tr){
    return Array.from(tr.querySelectorAll('th,td')).map(function(td){
      var s=td.textContent.trim().replace(/[\▶▼▲✓]/g,'');
      return /[,"\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;
    }).join(',');
  }).join('\n');
  var titles={staff:'人員彙整',office:'單位彙整',suptype:'分類彙整',store:'店家明細'};
  _downloadCsv('\uFEFF'+csv, titles[_pivotMode]||'彙整');
  _flashBtn(btn,'✅ 已下載');
}



/* ════ LINE 分享 ════ */

/* 產生主看板摘要文字 */
function _buildBoardLineSummary(){
  var rows = getCurrentRows();
  var stat = calcAudit(rows);
  var ctx = drillStack.length ? drillStack.map(function(d){ return d.key; }).join(' › ') : '全台';
  var lines = ['📋 稽核型看版 ─ '+PROJ_NAME, '📍 範圍：'+ctx, '🏪 總計：'+_fmtRecStore(stat.totalRecords, stat.totalStores), ''];
  stat.groups.forEach(function(g){
    lines.push('【'+g.label+'】'+_fmtRecStore(g.records, g.stores));
    if(g.subItems && g.subItems.length){
      g.subItems.forEach(function(s){ lines.push('  ▸ '+s.label+'：'+_fmtRecStore(s.records, s.stores)); });
    }
  });
  lines.push('');
  lines.push('📅 '+new Date().toLocaleString('zh-TW',{timeZone:'Asia/Taipei'}));
  return lines.join('\n');
}

/* 產生 Dialog 明細摘要 */
function _buildDialogLineSummary(){
  var stat = calcAudit(_dialogRows);
  var ctx = drillStack.map(function(d){ return d.key; });
  ctx.push(_dialogTitle);
  var mode = { '1':'所→人', '2':'人→所', '3':'分→子' }[_dlgDimMode] || _dlgDimMode;
  var lines = ['📋 查核明細 ─ '+PROJ_NAME, '📍 '+ctx.join(' › '), '🔀 模式：'+mode, '🏪 合計：'+_fmtRecStore(stat.totalRecords, stat.totalStores), ''];
  stat.groups.forEach(function(g){
    lines.push('【'+g.label+'】'+_fmtRecStore(g.records, g.stores));
  });
  lines.push('');
  lines.push('📅 '+new Date().toLocaleString('zh-TW',{timeZone:'Asia/Taipei'}));
  return lines.join('\n');
}

/* 產生彙整 Dialog 摘要 */
function _buildSummaryLineSummary(){
  var rows = _pivotRows || allRows;
  var stat = calcAudit(rows);
  var modeNames = PIVOT_TITLES;
  var lines = ['📊 彙整看板 ─ '+PROJ_NAME, '📑 維度：'+modeNames[_pivotMode], '🏪 總計：'+_fmtRecStore(stat.totalRecords, stat.totalStores), ''];
  stat.groups.forEach(function(g){
    lines.push('【'+g.label+'】'+_fmtRecStore(g.records, g.stores));
  });
  lines.push('');
  lines.push('📅 '+new Date().toLocaleString('zh-TW',{timeZone:'Asia/Taipei'}));
  return lines.join('\n');
}

function _shareToLine(text, btn){
  /* 純複製純文字摘要到剪貼簿，方便貼到 LINE 或任何通訊軟體 */
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){
      _flashBtn(btn, '✅ 已複製！');
    }).catch(function(){
      _fallbackCopy(text, btn);
    });
  } else {
    _fallbackCopy(text, btn);
  }
}

function _fallbackCopy(text, btn){
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); _flashBtn(btn,'✅ 已複製！'); }
  catch(e){ _flashBtn(btn,'⚠️ 請手動複製'); }
  document.body.removeChild(ta);
}

function toolbarShareLine(){
  var btn = document.getElementById('tb-btn-line');
  _shareToLine(_buildBoardLineSummary(), btn);
}

function dialogCopySummary(){
  var btn = document.getElementById('btn-dlg-summary');
  _shareToLine(_buildDialogLineSummary(), btn);
}

function dialogCopyDetail(){
  var btn = document.getElementById('btn-dlg-detail');
  _shareToLine(_buildDialogLineDetail(), btn);
}

function summaryShareLine(){
  var btn = document.getElementById('btn-sum-line');
  _shareToLine(_buildSummaryLineSummary(), btn);
}

/* ════ 單筆店家明細分享（個案討論用：複製成 LINE 文字摘要／截圖存圖） ════
   每一筆展開的店家明細卡片右上角都有「📋 複製摘要」「📸 截圖」兩顆按鈕，
   方便逐筆挑出要跟同事討論的個案，不用截整頁或整個 Dialog。 */

/* 把單一筆店家明細（基本資料＋問卷內容）組成純文字，格式跟其他 LINE 摘要一致 */
function _buildStoreDetailLineText(rid){
  var cache = _storeDetailCache[rid];
  if(!cache) return '⚠️ 找不到這筆店家的資料';
  var basicRow = cache.basicRow, ref = cache.ref, rowData = cache.rowData;

  var lines = ['📋 查核個案 ─ '+PROJ_NAME];
  if(ref) lines.push('📄 來源：'+ref.sheet+'　第 '+ref.row+' 列');
  lines.push('');

  if(basicRow){
    BASIC_DETAIL_FIELDS.forEach(function(k){
      var v = basicRow[k];
      if(v === '' || v === null || v === undefined) return;
      lines.push(k+'：'+v);
    });
    lines.push('');
  }

  var sections = (rowData && rowData.sections) || [];
  if(sections.length){
    sections.forEach(function(sec){
      lines.push('📋 '+sec.section);
      sec.picks.forEach(function(p){
        var isCheckmarkOnly = (p.value==='v' || p.value==='V' || p.value==='✓');
        lines.push(isCheckmarkOnly ? '　✓ '+p.option : '　'+p.option+'　→ '+p.value);
      });
      lines.push('');
    });
  } else if(rowData){
    lines.push('（此筆問卷未填寫任何題目）');
    lines.push('');
  } else {
    lines.push('（問卷內容尚未讀取完成或讀取失敗）');
    lines.push('');
  }

  lines.push('📅 '+new Date().toLocaleString('zh-TW',{timeZone:'Asia/Taipei'}));
  return lines.join('\n');
}

function _storeDetailCopy(rid, btn){
  _shareToLine(_buildStoreDetailLineText(rid), btn);
}

function _storeDetailScreenshot(rid, btn){
  var el = document.getElementById('rawpanel-'+rid);
  if(!el){ _flashBtn(btn,'⚠️ 無畫面'); return; }
  var cache = _storeDetailCache[rid];
  var row = (cache && cache.basicRow) || {};
  /* 檔名組成：單位（營業所/課）_督屬（執行人員）_卷名（子分類）_店名（店家名稱）
     缺哪一段就跳過那一段，不會留下多餘底線；全部缺就退回「查核個案」。 */
  var parts = [row[COL_OFFICE], row[COL_STAFF], row[COL_QUESTTYPE], row[COL_NAME]]
    .filter(function(v){ return v!=null && String(v).trim()!==''; })
    .map(function(v){ return String(v).trim().replace(/[\\\/:*?"<>|]/g,''); }); /* 濾掉檔名不能用的符號 */
  var name = parts.length ? parts.join('_') : '查核個案';
  _captureElement(el, btn, name+'_查核明細');
}

/* ════ Dialog 截圖 ════
   同樣一律只複製到剪貼簿，不下載到本機（見 toolbarScreenshot 說明）。 */
function _captureElement(el, btn, filename){
  btn.classList.add('loading'); btn.innerHTML='<span>⏳</span>';
  function doCapture(){
    html2canvas(el, {
      scale:2, backgroundColor:'#ffffff', useCORS:true,
      width:el.scrollWidth, height:el.scrollHeight,
      ignoreElements:function(node){ return node.getAttribute && node.getAttribute('data-screenshot-ignore')==='1'; }
    }).then(function(canvas){
      if(navigator.clipboard && window.ClipboardItem){
        canvas.toBlob(function(blob){
          try{
            navigator.clipboard.write([new ClipboardItem({'image/png':blob})])
              .then(function(){ btn.classList.remove('loading'); _flashBtn(btn,'✅ 已複製！'); })
              .catch(function(){ _clipboardCopyFailBtn(btn,'<span>📸</span>'); });
          }catch(e){ _clipboardCopyFailBtn(btn,'<span>📸</span>'); }
        },'image/png');
      } else { _clipboardCopyFailBtn(btn,'<span>📸</span>'); }
    }).catch(function(err){ btn.classList.remove('loading'); btn.innerHTML='<span>📸</span>'; });
  }
  if(window.html2canvas) doCapture();
  else {
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    s.onload=doCapture;
    s.onerror=function(){ btn.classList.remove('loading'); btn.innerHTML='<span>📸</span>'; };
    document.head.appendChild(s);
  }
}

function dialogScreenshot(){
  var btn = document.getElementById('btn-dlg-screenshot');
  var el = document.querySelector('#detail-dialog .dlg-box');
  if(!el){ _flashBtn(btn,'⚠️ 無畫面'); return; }
  _captureElement(el, btn, _dialogTitle+'_明細');
}

function summaryScreenshot(){
  var btn = document.getElementById('btn-sum-screenshot');
  var el = document.querySelector('#summary-dialog .dlg-box');
  if(!el){ _flashBtn(btn,'⚠️ 無畫面'); return; }
  _captureElement(el, btn, PROJ_NAME+'_彙整');
}
