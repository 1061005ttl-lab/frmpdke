    +'</td></tr>';
  html+='</tbody></table>';
  return html;
}

/* ════ CSV ════ */
function buildCsvContent(rows){
  var sorted=rows.slice().sort(function(a,b){
    var cols=[COL_AREA,COL_OFFICE,COL_STAFF,COL_SUPTYPE,COL_CODE];
    for(var i=0;i<cols.length;i++){
      var va=String(a[cols[i]]||''), vb=String(b[cols[i]]||'');
      if(va!==vb) return va>vb?1:-1;
    }
    return 0;
  });
  var headers=[COL_AREA,COL_OFFICE,COL_STAFF,COL_CHANNEL,COL_STORETYPE,COL_CODE,COL_NAME,COL_GRADE,COL_SUPTYPE,COL_QUESTTYPE,COL_DATE];
  var allR=[headers];
  sorted.forEach(function(r){
    var code=String(r[COL_CODE]||'').trim(); if(!code) return;
    allR.push(headers.map(function(h){ return String(r[h]||''); }));
  });
  return '\uFEFF'+allR.map(function(row){
    return row.map(function(c){ var s=String(c); return /[,"\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }).join(',');
  }).join('\n');
}

function _downloadCsv(csv,title){
  var now=new Date(),p=function(n){return String(n).padStart(2,'0');};
  var fname=(title||'查核').replace(/[\\/:*?"<>|]/g,'_')+'_'+now.getFullYear()+p(now.getMonth()+1)+p(now.getDate())+'_'+p(now.getHours())+p(now.getMinutes())+'.csv';
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a'); a.href=url; a.download=fname;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

function toolbarDownloadCsv(){
  var btn=document.getElementById('tb-btn-csv');
  if(!allRows.length){ _flashBtn(btn,'⚠️ 無資料'); return; }
  _downloadCsv(buildCsvContent(allRows),PROJ_NAME);
  _flashBtn(btn,'✅ 已下載');
}


/* ════ 截圖（Viewport） ════ */
function toolbarScreenshot(){
  var btn=document.getElementById('tb-btn-screenshot');
  btn.classList.add('loading'); btn.textContent='⏳ 截圖中...';
  function doCapture(){
    html2canvas(document.body,{
      scale:2, backgroundColor:'#ffffff', useCORS:true,
      width:window.innerWidth, height:window.innerHeight,
      windowWidth:window.innerWidth, windowHeight:window.innerHeight,
      x:window.scrollX, y:window.scrollY
    }).then(function(canvas){
      var titleText=PROJ_NAME||'查核';
      if(navigator.clipboard&&window.ClipboardItem){
        canvas.toBlob(function(blob){
          try{
            navigator.clipboard.write([new ClipboardItem({'image/png':blob})])
              .then(function(){ btn.classList.remove('loading'); _flashBtn(btn,'✅ 已複製！'); })
              .catch(function(){ _downloadCanvas(canvas,titleText,btn); });
          }catch(e){ _downloadCanvas(canvas,titleText,btn); }
        },'image/png');
      } else _downloadCanvas(canvas,titleText,btn);
    }).catch(function(err){ btn.classList.remove('loading'); btn.textContent='📸 截圖'; alert('截圖失敗：'+err); });
  }
  if(window.html2canvas) doCapture();
  else {
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    s.onload=doCapture;
    s.onerror=function(){ btn.classList.remove('loading'); btn.textContent='📸 截圖'; alert('html2canvas 載入失敗'); };
    document.head.appendChild(s);
  }
}
function _downloadCanvas(canvas,titleText,btn){
  var link=document.createElement('a');
  link.download=titleText.replace(/\s+/g,'_')+'.png';
  link.href=canvas.toDataURL('image/png'); link.click();
  btn.classList.remove('loading'); _flashBtn(btn,'✅ 已下載！');
}

/* ════════════════════════════════════════════════════════════
   PIVOT DIALOG  ─  動態多維度切換大表
   ════════════════════════════════════════════════════════════ */

var _pivotMode      = 'staff';   /* staff | office | suptype | store */
var _pivotRows      = null;      /* 目前 pivot 使用的資料集（null = allRows） */
var _pivotSortState = {};        /* { mode: { col, dir } } */
var _pivotTabIndex  = { staff:0, office:1, suptype:2, store:3 };
var PIVOT_TITLES = { staff:'人員 × 督導類型', office:'單位 × 督導類型', suptype:'督導類型 × 問卷類型', store:'店家明細' };

/* ── 開啟 / 關閉 ── */
function openSummaryDialog(mode, rows){
  _pivotMode = mode || 'staff';
  _pivotRows = rows || getCurrentRows();

  document.getElementById('sum-title').textContent = '彙整看板 ─ ' + (PIVOT_TITLES[_pivotMode] || '');

  /* 高亮正確 Tab */
  document.querySelectorAll('.pivot-tab').forEach(function(t,i){
    t.classList.toggle('active', i === _pivotTabIndex[_pivotMode]);
  });

  /* 渲染四個 slide（懶渲染：只渲染目前 + 鄰近） */
  _renderPivotSlide('staff');
  _renderPivotSlide('office');
  _renderPivotSlide('suptype');
  _renderPivotSlide('store');

  /* 定位到正確 slide */
  _setPivotSlide(_pivotMode, false);

  var dlg = document.getElementById('summary-dialog');
  dlg.style.display = 'flex';
  setTimeout(function(){ dlg.classList.add('open'); }, 10);
}

function closeSummaryDialog(){
  var dlg = document.getElementById('summary-dialog');
  dlg.classList.remove('open');
  setTimeout(function(){ dlg.style.display='none'; }, 220);
}

/* ── Tab 切換 ── */
function switchPivotTab(mode, tabEl){
  _pivotMode = mode;
  document.querySelectorAll('.pivot-tab').forEach(function(t){ t.classList.remove('active'); });
  if(tabEl) tabEl.classList.add('active');
  document.getElementById('sum-title').textContent = '彙整看板 ─ ' + (PIVOT_TITLES[mode]||'');
  _setPivotSlide(mode, true);
}

function _setPivotSlide(mode, animate){
  var idx = _pivotTabIndex[mode] || 0;
  var slides = document.getElementById('pivot-slides');
  if(!animate) slides.style.transition = 'none';
  slides.style.transform = 'translateX(-' + (idx * 100/4) + '%)';
  if(!animate) setTimeout(function(){ slides.style.transition=''; }, 30);
}

/* ── Slide 渲染入口 ── */
function _renderPivotSlide(mode){
  var el = document.getElementById('pivot-slide-' + mode);
  if(!el) return;
  var rows = _pivotRows || getCurrentRows();
  if(mode === 'staff')   el.innerHTML = _buildStaffPivot(rows);
  else if(mode==='office') el.innerHTML = _buildOfficePivot(rows);
  else if(mode==='suptype') el.innerHTML = _buildSuptypePivot(rows);
  else if(mode==='store') el.innerHTML = _buildStorePivot(rows);
}

/* ════ [1] 人員 維度 ════
   三層：營業處 Banner → 人員（可展開） → 店家子列
   欄位：人員 | 督導類型₁ | … | 合計
*/
function _buildStaffPivot(rows){
  var supTypes = ROSTER_GROUPS;
  var sortKey  = (_pivotSortState.staff||{}).col  || 'total';
  var sortDir  = (_pivotSortState.staff||{}).dir  || 'desc';

  /* areaMap[area][name] = { bySt:{st:{recs:n, codes:Set}}, allCodes:Set, allRecs:n } */
  var areaMap={}, areaOrder=[];
  rows.forEach(function(r){
    var area=String(r[COL_AREA]||'').trim(),
        name=String(r[COL_STAFF]||'').trim(),
        st  =String(r[COL_SUPTYPE]||'').trim(),
        code=String(r[COL_CODE]||'').trim();
    if(!area||!name||!code) return;
    if(!areaMap[area]){ areaMap[area]={}; areaOrder.push(area); }
    if(!areaMap[area][name]) areaMap[area][name]={ bySt:{}, allCodes:new Set(), allRecs:0 };
    if(st){
      if(!areaMap[area][name].bySt[st]) areaMap[area][name].bySt[st]={ recs:0, codes:new Set() };
      areaMap[area][name].bySt[st].recs++;
      areaMap[area][name].bySt[st].codes.add(code);
    }
    areaMap[area][name].allCodes.add(code);
    areaMap[area][name].allRecs++;
  });

  areaOrder.sort(function(a,b){
    var ia=AREA_ORDER.indexOf(a),ib=AREA_ORDER.indexOf(b);
    if(ia===-1&&ib===-1) return 0;
    if(ia===-1) return 1; if(ib===-1) return -1; return ia-ib;
  });

  /* 全域合計（份數＋家數） */
  var grandBySt={}, grandTotalCodes=new Set(), grandTotalRecs=0;
  supTypes.forEach(function(st){ grandBySt[st]={ recs:0, codes:new Set() }; });
  rows.forEach(function(r){
    var st=String(r[COL_SUPTYPE]||'').trim(), code=String(r[COL_CODE]||'').trim();
    if(!code) return;
    grandTotalCodes.add(code); grandTotalRecs++;
    if(st){ grandBySt[st].recs++; grandBySt[st].codes.add(code); }
  });

  function sortIcon(col){
    if(sortKey!==col) return '';
    return '<span style="font-size:9px;color:var(--primary);margin-left:3px;">'+(sortDir==='asc'?'▲':'▼')+'</span>';
  }

  var html='<table class="pivot-tbl"><thead><tr>'
    +'<th class="th-left sortable" onclick="_sortStaff(\'name\')" style="cursor:pointer;">人員'+sortIcon('name')+'</th>';
  supTypes.forEach(function(st,si){
    html+='<th class="th-num th-sup-'+si+' sortable" onclick="_sortStaff(\''+escAttr(st)+'\')" style="cursor:pointer;">'+esc(st)+'（份／家）'+sortIcon(st)+'</th>';
  });
  html+='<th class="th-num th-total sortable" onclick="_sortStaff(\'total\')" style="cursor:pointer;">合計（份／家）'+sortIcon('total')+'</th>';
  html+='</tr></thead><tbody>';

  areaOrder.forEach(function(area){
    var staffMap=areaMap[area];
    var staffList=Object.keys(staffMap).map(function(name){
      var m=staffMap[name], bySt={};
      supTypes.forEach(function(st){ bySt[st]={ recs:m.bySt[st]?m.bySt[st].recs:0, stores:m.bySt[st]?m.bySt[st].codes.size:0 }; });
      return { name:name, bySt:bySt, totalRecs:m.allRecs, totalStores:m.allCodes.size };
    });
    staffList.sort(function(a,b){
      var va=sortKey==='name'?a.name:(sortKey==='total'?a.totalRecs:(a.bySt[sortKey]?a.bySt[sortKey].recs:0));
      var vb=sortKey==='name'?b.name:(sortKey==='total'?b.totalRecs:(b.bySt[sortKey]?b.bySt[sortKey].recs:0));
      if(typeof va==='string') return sortDir==='asc'?va.localeCompare(vb):vb.localeCompare(va);
      return sortDir==='asc'?va-vb:vb-va;
    });

    /* 計算此處小計（份數＋家數） */
    var areaBySt={}, areaTotalCodes=new Set(), areaTotalRecs=0;
    supTypes.forEach(function(st){ areaBySt[st]={ recs:0, codes:new Set() }; });
    rows.forEach(function(r){
      if(String(r[COL_AREA]||'').trim()!==area) return;
      var st=String(r[COL_SUPTYPE]||'').trim(), code=String(r[COL_CODE]||'').trim();
      if(!code) return;
      areaTotalCodes.add(code); areaTotalRecs++;
      if(st){ areaBySt[st].recs++; areaBySt[st].codes.add(code); }
    });

    /* 營業處 Banner */
    var areaSpan=1+supTypes.length+1;
    html+='<tr class="pivot-area-row"><td colspan="'+areaSpan+'" style="padding:8px 16px;">'
      +'<span style="font-size:13px;font-weight:900;margin-right:10px;">▸ '+esc(area)+'</span>';
    supTypes.forEach(function(st){ html+='<span style="font-size:12px;font-weight:600;color:#2D2D2D;margin-right:10px;">'+esc(st)+' <strong style="color:#2D2D2D;">'+areaBySt[st].recs+' 份</strong></span>'; });
    html+='<span style="font-size:12px;">合計 <strong style="color:var(--primary);font-size:14px;">'+areaTotalRecs+' 份</strong></span></td></tr>';

    /* 人員列 */
    staffList.forEach(function(s){
      var rid='pvst-'+area.replace(/[^\w\u4e00-\u9fff]/g,'_')+s.name.replace(/[^\w\u4e00-\u9fff]/g,'_');
      html+='<tr class="pivot-expand-row" onclick="_toggleStaffExpand(\''+rid+'\')" id="row-'+rid+'">';
      html+='<td class="td-left"><span class="pivot-expand-icon" id="ico-'+rid+'">▶</span>'+esc(s.name)+'</td>';
      supTypes.forEach(function(st,si){
        var v=s.bySt[st];
        html+='<td class="td-num td-sup-'+si+'">'+_fmtRecStoreOrZero(v.recs,v.stores)+'</td>';
      });
      html+='<td class="td-total">'+_fmtRecStore(s.totalRecs,s.totalStores)+'</td></tr>';

      /* 店家展開子列：日期 代碼 店名，依日期新→舊 */
      var storeRows=rows.filter(function(r){ return String(r[COL_AREA]||'').trim()===area&&String(r[COL_STAFF]||'').trim()===s.name; });
      storeRows.sort(function(a,b){
        var da=String(a[COL_DATE]||''), db=String(b[COL_DATE]||'');
        if(da!==db) return da>db?-1:1;
        return String(a[COL_NAME]||'').localeCompare(String(b[COL_NAME]||''),'zh-TW');
      });
      storeRows.forEach(function(r,ri){
        var code=String(r[COL_CODE]||'').trim(); if(!code) return;
        var dateStr=String(r[COL_DATE]||'').trim();
        html+='<tr class="pivot-child-row" id="child-'+rid+'-'+ri+'" data-parent="'+rid+'">';
        html+='<td class="td-left" colspan="1" style="padding-left:32px;font-size:13px;">'
             +'<span style="font-size:12px;font-weight:700;color:#2D2D2D;margin-right:8px;font-variant-numeric:tabular-nums;">'+(dateStr||'—')+'</span>'
             +'<span style="font-size:11px;font-weight:600;color:#2D2D2D;margin-right:6px;">'+esc(code)+'</span>'
             +'<span style="font-weight:600;color:#1a1a1a;">'+esc(String(r[COL_NAME]||''))+'</span>'
             +'</td>';
        supTypes.forEach(function(st,si){
          var match=String(r[COL_SUPTYPE]||'').trim()===st;
          html+='<td class="td-num td-sup-'+si+'" style="font-size:11px;font-weight:500;color:#2D2D2D;">'
            +(match?'<span style="color:var(--green);">✓</span>':'')+'</td>';
        });
        html+='<td class="td-total" style="font-size:11px;color:#2D2D2D;">'+esc(String(r[COL_QUESTTYPE]||'—'))+'</td></tr>';
      });
    });
  });

  /* 合計列 */
  html+='<tr class="sum-footer"><td class="td-left">合計</td>';
  supTypes.forEach(function(st){ html+='<td class="td-total">'+_fmtRecStore(grandBySt[st].recs,grandBySt[st].codes.size)+'</td>'; });
  html+='<td class="td-total" style="font-size:15px;">'+_fmtRecStore(grandTotalRecs,grandTotalCodes.size)+'</td>';
  html+='</tr></tbody></table>';
  return html;
}

function _sortStaff(col){
  var cur=_pivotSortState.staff||{};
  _pivotSortState.staff = { col:col, dir:(cur.col===col&&cur.dir==='desc')?'asc':'desc' };
  _renderPivotSlide('staff');
}

function _toggleStaffExpand(rid){
  var ico=document.getElementById('ico-'+rid);
  var childRows=document.querySelectorAll('[data-parent="'+rid+'"]');
  var isOpen=ico&&ico.classList.contains('open');
  if(ico) ico.classList.toggle('open',!isOpen);
  childRows.forEach(function(tr){ tr.classList.toggle('visible',!isOpen); });
}

/* ════ [2] 單位 維度 ════
   三層：營業處 Banner → 所/課（可展開） → 人員子列
   欄位：所/課 | 督導類型₁ | … | 合計
*/
function _buildOfficePivot(rows){
  var supTypes=ROSTER_GROUPS;
  var sortKey=(_pivotSortState.office||{}).col||'total';
  var sortDir=(_pivotSortState.office||{}).dir||'desc';

  /* areaMap[area][office] = { bySt:{st:{recs,codes:Set}}, staffs:Set, allCodes:Set, allRecs:n } */
  var areaMap={}, areaOrder=[];
  rows.forEach(function(r){
    var area=String(r[COL_AREA]||'').trim(),
        off =String(r[COL_OFFICE]||'').trim(),
        staff=String(r[COL_STAFF]||'').trim(),
        st  =String(r[COL_SUPTYPE]||'').trim(),
        code=String(r[COL_CODE]||'').trim();
    if(!area||!off||!code) return;
    if(!areaMap[area]){ areaMap[area]={}; areaOrder.push(area); }
    if(!areaMap[area][off]) areaMap[area][off]={ bySt:{}, staffs:new Set(), allCodes:new Set(), allRecs:0 };
    if(st){
      if(!areaMap[area][off].bySt[st]) areaMap[area][off].bySt[st]={ recs:0, codes:new Set() };
      areaMap[area][off].bySt[st].recs++;
      areaMap[area][off].bySt[st].codes.add(code);
    }
    areaMap[area][off].allCodes.add(code);
    areaMap[area][off].allRecs++;
    if(staff) areaMap[area][off].staffs.add(staff);
  });

  areaOrder.sort(function(a,b){
    var ia=AREA_ORDER.indexOf(a),ib=AREA_ORDER.indexOf(b);
    if(ia===-1&&ib===-1) return a>b?1:-1;
    if(ia===-1) return 1; if(ib===-1) return -1; return ia-ib;
  });

  /* 全域合計（份數＋家數） */
  var grandBySt={}, grandTotalCodes=new Set(), grandTotalRecs=0;
  supTypes.forEach(function(st){ grandBySt[st]={ recs:0, codes:new Set() }; });
  rows.forEach(function(r){
    var st=String(r[COL_SUPTYPE]||'').trim(), code=String(r[COL_CODE]||'').trim();
    if(!code) return;
    grandTotalCodes.add(code); grandTotalRecs++;
    if(st){ grandBySt[st].recs++; grandBySt[st].codes.add(code); }
  });

  function sortIcon(col){
    if(sortKey!==col) return '';
    return '<span style="font-size:9px;color:var(--primary);margin-left:3px;">'+(sortDir==='asc'?'▲':'▼')+'</span>';
  }

  var html='<table class="pivot-tbl"><thead><tr>'
    +'<th class="th-left sortable" onclick="_sortOffice(\'office\')" style="cursor:pointer;">所/課 '+sortIcon('office')+'</th>'
    +'<th class="th-left" style="min-width:60px;color:#2D2D2D;">人員</th>';
  supTypes.forEach(function(st,si){
    html+='<th class="th-num th-sup-'+si+' sortable" onclick="_sortOffice(\''+escAttr(st)+'\')" style="cursor:pointer;">'+esc(st)+'（份／家） '+sortIcon(st)+'</th>';
  });
  html+='<th class="th-num th-total sortable" onclick="_sortOffice(\'total\')" style="cursor:pointer;">合計（份／家） '+sortIcon('total')+'</th>';
  html+='</tr></thead><tbody>';

  areaOrder.forEach(function(area, ai){
    var offMap=areaMap[area];

    /* 計算此區各 office 的合計，以便排序 */
    var offs=Object.keys(offMap);
    var offStats=offs.map(function(off){
      var m=offMap[off], bySt={};
      supTypes.forEach(function(st){ bySt[st]={ recs:m.bySt[st]?m.bySt[st].recs:0, stores:m.bySt[st]?m.bySt[st].codes.size:0 }; });
      return { off:off, bySt:bySt, totalRecs:m.allRecs, totalStores:m.allCodes.size, staffs:Array.from(m.staffs).sort() };
    });
    offStats.sort(function(a,b){
      if(sortKey==='office') return sortDir==='asc'?a.off.localeCompare(b.off):b.off.localeCompare(a.off);
      var va=sortKey==='total'?a.totalRecs:(a.bySt[sortKey]?a.bySt[sortKey].recs:0);
      var vb=sortKey==='total'?b.totalRecs:(b.bySt[sortKey]?b.bySt[sortKey].recs:0);
      return sortDir==='asc'?va-vb:vb-va;
    });

    /* 計算此區小計（份數＋家數） */
    var areaBySt={}, areaTotalCodes=new Set(), areaTotalRecs=0;
    supTypes.forEach(function(st){ areaBySt[st]={ recs:0, codes:new Set() }; });
    rows.forEach(function(r){
      if(String(r[COL_AREA]||'').trim()!==area) return;
      var st=String(r[COL_SUPTYPE]||'').trim(), code=String(r[COL_CODE]||'').trim();
      if(!code) return;
      areaTotalCodes.add(code); areaTotalRecs++;
      if(st){ areaBySt[st].recs++; areaBySt[st].codes.add(code); }
    });

    /* ── 營業處 Banner 列 ── */
    var areaSpan=2+supTypes.length+1;
    html+='<tr class="pivot-area-row"><td colspan="'+areaSpan+'" style="padding:8px 16px;">'
      +'<span style="font-size:13px;font-weight:900;margin-right:10px;">▸ '+esc(area)+'</span>';
    supTypes.forEach(function(st,si){ html+='<span style="font-size:12px;font-weight:600;color:#2D2D2D;margin-right:10px;">'+esc(st)+' <strong style="color:#2D2D2D;">'+areaBySt[st].recs+' 份</strong></span>'; });
    html+='<span style="font-size:12px;">合計 <strong style="color:var(--primary);font-size:14px;">'+areaTotalRecs+' 份</strong></span>'
      +'</td></tr>';

    /* ── 所/課 列（可展開人員） ── */
    offStats.forEach(function(o, oi){
      var rid='pvoff-'+area.replace(/[^\w\u4e00-\u9fff]/g,'_')+oi;
      html+='<tr class="pivot-expand-row" onclick="_toggleOfficeExpand(\''+rid+'\')" id="row-'+rid+'">'
        +'<td class="td-left"><span class="pivot-expand-icon" id="ico-'+rid+'">▶</span>'+esc(o.off)+'</td>'
        +'<td class="td-left" style="font-size:12px;font-weight:600;color:#2D2D2D;">'+o.staffs.length+' 人</td>';
      supTypes.forEach(function(st,si){
        var v=o.bySt[st];
        html+='<td class="td-num td-sup-'+si+'">'+_fmtRecStoreOrZero(v.recs,v.stores)+'</td>';
      });
      html+='<td class="td-total">'+_fmtRecStore(o.totalRecs,o.totalStores)+'</td></tr>';

      /* 人員子列（份數＋家數） */
      o.staffs.forEach(function(name, ni){
        var sBySt={}, sCodes=new Set(), sRecs=0;
        supTypes.forEach(function(st){ sBySt[st]={ recs:0 }; });
        rows.forEach(function(r){
          if(String(r[COL_AREA]||'').trim()!==area||String(r[COL_OFFICE]||'').trim()!==o.off||String(r[COL_STAFF]||'').trim()!==name) return;
          var st=String(r[COL_SUPTYPE]||'').trim(), code=String(r[COL_CODE]||'').trim();
          if(!code) return;
          sCodes.add(code); sRecs++;
          if(st&&sBySt[st]) sBySt[st].recs++;
        });
        html+='<tr class="pivot-child-row" id="child-'+rid+'-'+ni+'" data-parent="'+rid+'">'
          +'<td class="td-left" style="padding-left:36px;font-size:13px;font-weight:600;color:#1a1a1a;">'+esc(name)+'</td>'
          +'<td></td>';
        supTypes.forEach(function(st,si){
          var n=sBySt[st]?sBySt[st].recs:0;
          html+='<td class="td-num td-sup-'+si+'" style="font-size:13px;font-weight:600;">'+(n?n+' 份':'')+'</td>';
        });
        html+='<td class="td-total" style="font-size:13px;">'+_fmtRecStore(sRecs,sCodes.size)+'</td></tr>';
      });
    });
  });

  /* 合計列 */
  html+='<tr class="sum-footer"><td class="td-left" colspan="2">合計</td>';
  supTypes.forEach(function(st){ html+='<td class="td-total">'+_fmtRecStore(grandBySt[st].recs,grandBySt[st].codes.size)+'</td>'; });
  html+='<td class="td-total" style="font-size:16px;">'+_fmtRecStore(grandTotalRecs,grandTotalCodes.size)+'</td>';
  html+='</tr></tbody></table>';
  return html;
}

function _sortOffice(col){
  var cur=_pivotSortState.office||{};
  _pivotSortState.office={col:col, dir:(cur.col===col&&cur.dir==='desc')?'asc':'desc'};
  _renderPivotSlide('office');
}
function _toggleOfficeExpand(rid){
  var ico=document.getElementById('ico-'+rid);
  var childRows=document.querySelectorAll('[data-parent="'+rid+'"]');
  var isOpen=ico&&ico.classList.contains('open');
  if(ico) ico.classList.toggle('open',!isOpen);
  childRows.forEach(function(tr){ tr.classList.toggle('visible',!isOpen); });
}

/* ════ [4] 店家 維度 ════
   兩層：營業處 Banner → 所/課（可展開）→ 展開後直接列出該所/課全部店家逐筆明細
   明細排序：日期（新→舊）→ 代碼 → 店名 → 人員 → 督導類型
   欄位：日期 | 代碼 | 店名 | 人員 | 督導類型
*/
function _buildStorePivot(rows){
  var sortKey=(_pivotSortState.store||{}).col||'office';
  var sortDir=(_pivotSortState.store||{}).dir||'asc';

  /* areaMap[area][office] = { rows:[...], allRecs:n } */
  var areaMap={}, areaOrder=[];
  rows.forEach(function(r){
    var area=String(r[COL_AREA]||'').trim(),
        off =String(r[COL_OFFICE]||'').trim(),
        code=String(r[COL_CODE]||'').trim();
    if(!area||!off||!code) return;
    if(!areaMap[area]){ areaMap[area]={}; areaOrder.push(area); }
    if(!areaMap[area][off]) areaMap[area][off]={ rows:[], allRecs:0 };
    areaMap[area][off].rows.push(r);
    areaMap[area][off].allRecs++;
  });

  areaOrder.sort(function(a,b){
    var ia=AREA_ORDER.indexOf(a),ib=AREA_ORDER.indexOf(b);
    if(ia===-1&&ib===-1) return a>b?1:-1;
    if(ia===-1) return 1; if(ib===-1) return -1; return ia-ib;
  });

  /* 全域合計（份數＋家數） */
  var grandTotalCodes=new Set(), grandTotalRecs=0;
  rows.forEach(function(r){
    var code=String(r[COL_CODE]||'').trim();
    if(!code) return;
    grandTotalCodes.add(code); grandTotalRecs++;
  });

  /* 明細排序：日期新→舊，同日期再依代碼→店名→人員→督導類型 */
  function _sortStoreRows(list){
    return list.slice().sort(function(a,b){
      var da=String(a[COL_DATE]||''), db=String(b[COL_DATE]||'');
      if(da!==db) return da>db?-1:1;
      var ca=String(a[COL_CODE]||''), cb=String(b[COL_CODE]||'');
      if(ca!==cb) return ca.localeCompare(cb,'zh-TW');
      var na=String(a[COL_NAME]||''), nb=String(b[COL_NAME]||'');
      if(na!==nb) return na.localeCompare(nb,'zh-TW');
      var sa=String(a[COL_STAFF]||''), sb=String(b[COL_STAFF]||'');
      if(sa!==sb) return sa.localeCompare(sb,'zh-TW');
      return String(a[COL_SUPTYPE]||'').localeCompare(String(b[COL_SUPTYPE]||''),'zh-TW');
    });
  }

  function sortIcon(col){
    if(sortKey!==col) return '';
    return '<span style="font-size:9px;color:var(--primary);margin-left:3px;">'+(sortDir==='asc'?'▲':'▼')+'</span>';
  }

  var html='<table class="pivot-tbl"><thead><tr>'
    +'<th class="th-left sortable" onclick="_sortStore(\'office\')" style="cursor:pointer;">所/課 '+sortIcon('office')+'</th>'
    +'<th class="th-left" style="min-width:90px;color:#2D2D2D;">日期</th>'
    +'<th class="th-left" style="min-width:70px;color:#2D2D2D;">代碼</th>'
    +'<th class="th-left" style="min-width:120px;color:#2D2D2D;">店名</th>'
    +'<th class="th-left" style="min-width:70px;color:#2D2D2D;">人員</th>'
    +'<th class="th-num th-total sortable" onclick="_sortStore(\'total\')" style="cursor:pointer;">督導類型／份數 '+sortIcon('total')+'</th>'
    +'</tr></thead><tbody>';

  areaOrder.forEach(function(area, ai){
    var offMap=areaMap[area];

    var offs=Object.keys(offMap);
    var offStats=offs.map(function(off){
      var m=offMap[off];
      var codes=new Set(); m.rows.forEach(function(r){ var c=String(r[COL_CODE]||'').trim(); if(c) codes.add(c); });
      return { off:off, totalRecs:m.allRecs, totalStores:codes.size, rows:m.rows };
    });
    offStats.sort(function(a,b){
      if(sortKey==='office') return sortDir==='asc'?a.off.localeCompare(b.off,'zh-TW'):b.off.localeCompare(a.off,'zh-TW');
      var va=a.totalRecs, vb=b.totalRecs;
      return sortDir==='asc'?va-vb:vb-va;
    });

    /* 此區小計（份數＋家數） */
    var areaTotalCodes=new Set(), areaTotalRecs=0;
    rows.forEach(function(r){
      if(String(r[COL_AREA]||'').trim()!==area) return;
      var code=String(r[COL_CODE]||'').trim();
      if(!code) return;
      areaTotalCodes.add(code); areaTotalRecs++;
    });

    /* ── 營業處 Banner 列 ── */
    html+='<tr class="pivot-area-row"><td colspan="6" style="padding:8px 16px;">'
      +'<span style="font-size:13px;font-weight:900;margin-right:10px;">▸ '+esc(area)+'</span>'
      +'<span style="font-size:12px;">合計 <strong style="color:var(--primary);font-size:14px;">'+areaTotalRecs+' 份</strong></span>'
      +'</td></tr>';

    /* ── 所/課 列（可展開店家逐筆明細） ── */
    offStats.forEach(function(o, oi){
      var rid='pvstore-'+area.replace(/[^\w\u4e00-\u9fff]/g,'_')+oi;
      html+='<tr class="pivot-expand-row" onclick="_toggleStoreExpand(\''+rid+'\')" id="row-'+rid+'">'
        +'<td class="td-left"><span class="pivot-expand-icon" id="ico-'+rid+'">▶</span>'+esc(o.off)+'</td>'
        +'<td class="td-left"></td><td class="td-left"></td><td class="td-left"></td><td class="td-left"></td>'
        +'<td class="td-total">'+_fmtRecStore(o.totalRecs,o.totalStores)+'</td></tr>';

      /* 店家逐筆明細子列：日期新→舊 → 代碼 → 店名 → 人員 → 督導類型 */
      var storeRows=_sortStoreRows(o.rows);

      /* 偵測「同日且同店」：日期+代碼 出現次數 > 1 即標記高光 */
      var dupKeyCount={};
      storeRows.forEach(function(r){
        var k=String(r[COL_DATE]||'').trim()+'|'+String(r[COL_CODE]||'').trim();
        dupKeyCount[k]=(dupKeyCount[k]||0)+1;
      });

      storeRows.forEach(function(r, ri){
        var dateStr=String(r[COL_DATE]||'').trim();
        var code=String(r[COL_CODE]||'').trim();
        var name=String(r[COL_NAME]||'').trim();
        var staff=String(r[COL_STAFF]||'').trim();
        var st=String(r[COL_SUPTYPE]||'').trim();
        var qt=String(r[COL_QUESTTYPE]||'').trim();
        var dupKey=dateStr+'|'+code;
        var isDup=dateStr&&code&&dupKeyCount[dupKey]>1;
        var rowClass='pivot-child-row'+(isDup?' pivot-dup-row':'');
        html+='<tr class="'+rowClass+'" id="child-'+rid+'-'+ri+'" data-parent="'+rid+'"'+(isDup?' title="同一天同一家店有多筆查核紀錄"':'')+'>'
          +'<td class="td-left" style="padding-left:36px;"></td>'
          +'<td class="td-left" style="font-size:12px;font-weight:700;color:#2D2D2D;font-variant-numeric:tabular-nums;">'+(dateStr||'—')+'</td>'
          +'<td class="td-left" style="font-size:11px;font-weight:600;color:#2D2D2D;">'+esc(code||'—')+'</td>'
          +'<td class="td-left" style="font-size:13px;font-weight:700;color:#1a1a1a;">'+esc(name||'—')+(isDup?' <span class="pivot-dup-badge">⚠ 同日重複</span>':'')+'</td>'
          +'<td class="td-left" style="font-size:12px;font-weight:600;color:#1a1a1a;">'+esc(staff||'—')+'</td>'
          +'<td class="td-total" style="font-size:12px;font-weight:600;color:var(--green);">'+esc(st||'—')+(qt?'　<span style="color:#2D2D2D;font-weight:500;">'+esc(qt)+'</span>':'')+'</td>'
          +'</tr>';
      });
    });
  });

  /* 合計列 */
  html+='<tr class="sum-footer"><td class="td-left" colspan="5">合計</td>'
    +'<td class="td-total" style="font-size:16px;">'+_fmtRecStore(grandTotalRecs,grandTotalCodes.size)+'</td>'
    +'</tr></tbody></table>';
  return html;
}

function _sortStore(col){
  var cur=_pivotSortState.store||{};
  _pivotSortState.store={col:col, dir:(cur.col===col&&cur.dir==='desc')?'asc':'desc'};
  _renderPivotSlide('store');
}
function _toggleStoreExpand(rid){
  var ico=document.getElementById('ico-'+rid);
  var childRows=document.querySelectorAll('[data-parent="'+rid+'"]');
  var isOpen=ico&&ico.classList.contains('open');
  if(ico) ico.classList.toggle('open',!isOpen);
  childRows.forEach(function(tr){ tr.classList.toggle('visible',!isOpen); });
}

/* ════ [3] 督導類型 維度 ════
   欄位：督導類型 | 問卷類型 | 人員數 | 份數／家數
   結構：督導類型 → 問卷類型 → 人員名單（展開）
*/
function _buildSuptypePivot(rows){
  var supTypes=ROSTER_GROUPS;
  var sortKey=(_pivotSortState.suptype||{}).col||'stores';
  var sortDir=(_pivotSortState.suptype||{}).dir||'desc';

  /* stMap[supType][questType] = { stores:Set, staffs:Set, recs:n } */
  var stMap={};
  supTypes.forEach(function(st){ stMap[st]={}; });
  rows.forEach(function(r){
    var st=String(r[COL_SUPTYPE]||'').trim(),
        qt=String(r[COL_QUESTTYPE]||'').trim(),
        code=String(r[COL_CODE]||'').trim(),
        staff=String(r[COL_STAFF]||'').trim();
    if(!st||!code) return;
    if(!stMap[st]) stMap[st]={};
    var key=qt||'（未分類）';
    if(!stMap[st][key]) stMap[st][key]={ stores:new Set(), staffs:new Set(), recs:0 };
    stMap[st][key].stores.add(code);
    stMap[st][key].recs++;
    if(staff) stMap[st][key].staffs.add(staff);
  });

  function sortIcon(col){
    if(sortKey!==col) return '';
    return ' <span style="font-size:9px;color:var(--primary);">'+(sortDir==='asc'?'▲':'▼')+'</span>';
  }

  var html='<table class="pivot-tbl"><thead><tr>'
    +'<th class="th-left sortable" onclick="_sortSuptype(\'suptype\')" style="cursor:pointer;">督導類型'+sortIcon('suptype')+'</th>'
    +'<th class="th-left sortable" onclick="_sortSuptype(\'questtype\')" style="cursor:pointer;">問卷類型'+sortIcon('questtype')+'</th>'
    +'<th class="th-num sortable" onclick="_sortSuptype(\'staffs\')" style="cursor:pointer;">人員數'+sortIcon('staffs')+'</th>'
    +'<th class="th-num th-total sortable" onclick="_sortSuptype(\'stores\')" style="cursor:pointer;">份數／家數'+sortIcon('stores')+'</th>'
    +'</tr></thead><tbody>';

  var grandTotalCodes=new Set(), grandTotalRecs=0;
  rows.forEach(function(r){ var c=String(r[COL_CODE]||'').trim(); if(c){ grandTotalCodes.add(c); grandTotalRecs++; } });

  supTypes.forEach(function(st, si){
    var qtMap=stMap[st]||{};
    var qtList=Object.keys(qtMap).map(function(qt){
      return { qt:qt, stores:qtMap[qt].stores.size, recs:qtMap[qt].recs, staffs:qtMap[qt].staffs.size, staffList:Array.from(qtMap[qt].staffs).sort() };
    });

    qtList.sort(function(a,b){
      if(sortKey==='questtype') return sortDir==='asc'?a.qt.localeCompare(b.qt):b.qt.localeCompare(a.qt);
      var va=sortKey==='staffs'?a.staffs:a.recs;
      var vb=sortKey==='staffs'?b.staffs:b.recs;
      return sortDir==='asc'?va-vb:vb-va;
    });

    /* 督導類型小計（份數＋家數） */
    var stTotalCodes=new Set(), stTotalRecs=0;
    rows.forEach(function(r){ if(String(r[COL_SUPTYPE]||'').trim()===st){ var c=String(r[COL_CODE]||'').trim(); if(c){ stTotalCodes.add(c); stTotalRecs++; } } });
    var stStaffs=new Set();
    rows.forEach(function(r){ if(String(r[COL_SUPTYPE]||'').trim()===st){ var s=String(r[COL_STAFF]||'').trim(); if(s) stStaffs.add(s); } });

    /* 督導類型標題列（展開/收合問卷類型） */
    var stId='pvst-'+String(st).replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g,'_');
    html+='<tr class="pivot-expand-row" onclick="_toggleSuptypeExpand(\''+stId+'\')" id="row-'+stId+'" '
      +'style="background:rgba(55,138,221,.05);border-top:2px solid rgba(0,0,0,.07);">';
    html+='<td class="td-left" style="font-weight:900;"><span class="pivot-expand-icon" id="ico-'+stId+'">▶</span>'+esc(st)+'</td>';
    html+='<td class="td-left" style="color:#2D2D2D;font-size:12px;">共 '+qtList.length+' 種問卷類型</td>';
    html+='<td class="td-num" style="font-weight:900;color:#2D2D2D;">'+stStaffs.size+'</td>';
    html+='<td class="td-total" style="font-size:14px;">'+_fmtRecStore(stTotalRecs,stTotalCodes.size)+'</td></tr>';

    /* 問卷類型子列 */
    qtList.forEach(function(q, qi){
      var qtId=stId+'_qt'+qi;
      html+='<tr class="pivot-child-row" id="child-'+stId+'-'+qi+'" data-parent="'+stId+'">';
      html+='<td class="td-left" style="padding-left:32px;color:#2D2D2D;font-size:11px;"></td>';
      html+='<td class="td-left" style="font-size:12px;cursor:pointer;" onclick="_toggleStaffList(\''+qtId+'\')">'
        +'<span class="pivot-expand-icon" id="ico-'+qtId+'">▶</span>'+esc(q.qt)+'</td>';
      html+='<td class="td-num" style="font-size:12px;font-weight:600;color:#2D2D2D;">'+q.staffs+'</td>';
      html+='<td class="td-total" style="font-size:12px;">'+_fmtRecStore(q.recs,q.stores)+'</td></tr>';

      /* 人員名單（第三層展開） */
      q.staffList.forEach(function(name, ni){
        html+='<tr class="pivot-child-row" id="child-'+qtId+'-'+ni+'" data-parent="'+qtId+'" style="display:none;" data-qt-child="1">';
        html+='<td colspan="2" class="td-left" style="padding-left:56px;font-size:12px;color:#2D2D2D;">'+esc(name)+'</td>';
        html+='<td colspan="2" class="td-left" style="font-size:11px;color:#2D2D2D;"></td></tr>';
      });
    });
  });

  /* 合計 */
  var grandStaffs=new Set();
  rows.forEach(function(r){ var s=String(r[COL_STAFF]||'').trim(); if(s) grandStaffs.add(s); });
  html+='<tr class="sum-footer">'
    +'<td class="td-left" colspan="2">合計</td>'
    +'<td class="td-total">'+grandStaffs.size+'</td>'
    +'<td class="td-total" style="font-size:15px;">'+_fmtRecStore(grandTotalRecs,grandTotalCodes.size)+'</td>'
    +'</tr></tbody></table>';
  return html;
}

function _sortSuptype(col){
  var cur=_pivotSortState.suptype||{};
  _pivotSortState.suptype={col:col, dir:(cur.col===col&&cur.dir==='desc')?'asc':'desc'};
  _renderPivotSlide('suptype');
}
function _toggleSuptypeExpand(rid){
  var ico=document.getElementById('ico-'+rid);
  var childRows=document.querySelectorAll('[data-parent="'+rid+'"]');
  var isOpen=ico&&ico.classList.contains('open');
  if(ico) ico.classList.toggle('open',!isOpen);
  childRows.forEach(function(tr){ tr.classList.toggle('visible',!isOpen); });
}
function _toggleStaffList(qtId){
  var ico=document.getElementById('ico-'+qtId);
  var childRows=document.querySelectorAll('[data-parent="'+qtId+'"]');
  var isOpen=ico&&ico.classList.contains('open');
  if(ico) ico.classList.toggle('open',!isOpen);
  childRows.forEach(function(tr){
    tr.classList.toggle('visible',!isOpen);
    tr.style.display=isOpen?'none':'table-row';
  });
}


/* ── CSV 匯出（讀取目前 slide 的表格） ── */
function downloadSummaryCsv(){
  var btn=document.getElementById('btn-sum-csv');
  var slide=document.getElementById('pivot-slide-'+_pivotMode);
  if(!slide){ _flashBtn(btn,'⚠️ 無資料'); return; }
  var rows=slide.querySelectorAll('table tr');
  if(!rows.length){ _flashBtn(btn,'⚠️ 無資料'); return; }
  var csv=Array.from(rows).filter(function(tr){
    return !tr.classList.contains('pivot-child-row')||tr.style.display!=='none';
  }).map(function(tr){
    return Array.from(tr.querySelectorAll('th,td')).map(function(td){
      var s=td.textContent.trim().replace(/[\▶▼▲✓]/g,'');
      return /[,"\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;
    }).join(',');
  }).join('\n');
  var titles={staff:'人員彙整',office:'單位彙整',suptype:'督導類型彙整',store:'店家明細'};
  _downloadCsv('\uFEFF'+csv, titles[_pivotMode]||'彙整');
  _flashBtn(btn,'✅ 已下載');
}



/* ════ LINE 分享 ════ */

/* 產生主看板摘要文字 */
function _buildBoardLineSummary(){
  var rows = getCurrentRows();
  var stat = calcAudit(rows);
  var ctx = drillStack.length ? drillStack.map(function(d){ return d.key; }).join(' › ') : '全台';
  var lines = ['📋 大督導時代 ─ '+PROJ_NAME, '📍 範圍：'+ctx, '🏪 總計：'+_fmtRecStore(stat.totalRecords, stat.totalStores), ''];
  stat.groups.forEach(function(g){
    lines.push('【'+g.label+'】'+_fmtRecStore(g.records, g.stores));
    if(g.subItems && g.subItems.length){
      g.subItems.forEach(function(s){ lines.push('  ▸ '+s.label+'：'+_fmtRecStore(s.records, s.stores)); });
    }
  });
  lines.push('');
  lines.push('📅 '+new Date().toLocaleString('zh-TW',{timeZone:'Asia/Taipei'}));
  return lines.join('\n');
}

/* 產生 Dialog 明細摘要 */
function _buildDialogLineSummary(){
  var stat = calcAudit(_dialogRows);
  var ctx = drillStack.map(function(d){ return d.key; });
  ctx.push(_dialogTitle);
  var mode = _dlgDimMode === '1' ? '所→人' : '人→所';
  var lines = ['📋 查核明細 ─ '+PROJ_NAME, '📍 '+ctx.join(' › '), '🔀 模式：'+mode, '🏪 合計：'+_fmtRecStore(stat.totalRecords, stat.totalStores), ''];
  stat.groups.forEach(function(g){
    lines.push('【'+g.label+'】'+_fmtRecStore(g.records, g.stores));
  });
  lines.push('');
  lines.push('📅 '+new Date().toLocaleString('zh-TW',{timeZone:'Asia/Taipei'}));
  return lines.join('\n');
}

/* 產生彙整 Dialog 摘要 */
function _buildSummaryLineSummary(){
  var rows = _pivotRows || allRows;
  var stat = calcAudit(rows);
  var modeNames = PIVOT_TITLES;
  var lines = ['📊 彙整看板 ─ '+PROJ_NAME, '📑 維度：'+modeNames[_pivotMode], '🏪 總計：'+_fmtRecStore(stat.totalRecords, stat.totalStores), ''];
  stat.groups.forEach(function(g){
    lines.push('【'+g.label+'】'+_fmtRecStore(g.records, g.stores));
  });
  lines.push('');
  lines.push('📅 '+new Date().toLocaleString('zh-TW',{timeZone:'Asia/Taipei'}));
  return lines.join('\n');
}

function _shareToLine(text, btn){
  /* 純複製純文字摘要到剪貼簿，方便貼到 LINE 或任何通訊軟體 */
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){
      _flashBtn(btn, '✅ 已複製！');
    }).catch(function(){
      _fallbackCopy(text, btn);
    });
  } else {
    _fallbackCopy(text, btn);
  }
}

function _fallbackCopy(text, btn){
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); _flashBtn(btn,'✅ 已複製！'); }
  catch(e){ _flashBtn(btn,'⚠️ 請手動複製'); }
  document.body.removeChild(ta);
}

function toolbarShareLine(){
  var btn = document.getElementById('tb-btn-line');
  _shareToLine(_buildBoardLineSummary(), btn);
}

function dialogCopySummary(){
  var btn = document.getElementById('btn-dlg-summary');
  _shareToLine(_buildDialogLineSummary(), btn);
}

function dialogCopyDetail(){
  var btn = document.getElementById('btn-dlg-detail');
  _shareToLine(_buildDialogLineDetail(), btn);
}

function summaryShareLine(){
  var btn = document.getElementById('btn-sum-line');
  _shareToLine(_buildSummaryLineSummary(), btn);
}

/* ════ 單筆店家明細分享（個案討論用：複製成 LINE 文字摘要／截圖存圖） ════
   每一筆展開的店家明細卡片右上角都有「📋 複製摘要」「📸 截圖」兩顆按鈕，
   方便逐筆挑出要跟同事討論的個案，不用截整頁或整個 Dialog。 */

/* 把單一筆店家明細（基本資料＋問卷內容）組成純文字，格式跟其他 LINE 摘要一致 */
function _buildStoreDetailLineText(rid){
  var cache = _storeDetailCache[rid];
  if(!cache) return '⚠️ 找不到這筆店家的資料';
  var basicRow = cache.basicRow, ref = cache.ref, rowData = cache.rowData;

  var lines = ['📋 查核個案 ─ '+PROJ_NAME];
  if(ref) lines.push('📄 來源：'+ref.sheet+'　第 '+ref.row+' 列');
  lines.push('');

  if(basicRow){
    BASIC_DETAIL_FIELDS.forEach(function(k){
      var v = basicRow[k];
      if(v === '' || v === null || v === undefined) return;
      lines.push(k+'：'+v);
    });
    lines.push('');
  }

  var sections = (rowData && rowData.sections) || [];
  if(sections.length){
    sections.forEach(function(sec){
      lines.push('📋 '+sec.section);
      sec.picks.forEach(function(p){
        var isCheckmarkOnly = (p.value==='v' || p.value==='V' || p.value==='✓');
        lines.push(isCheckmarkOnly ? '　✓ '+p.option : '　'+p.option+'　→ '+p.value);
      });
      lines.push('');
    });
  } else if(rowData){
    lines.push('（此筆問卷未填寫任何題目）');
    lines.push('');
  } else {
    lines.push('（問卷內容尚未讀取完成或讀取失敗）');
    lines.push('');
  }

  lines.push('📅 '+new Date().toLocaleString('zh-TW',{timeZone:'Asia/Taipei'}));
  return lines.join('\n');
}

function _storeDetailCopy(rid, btn){
  _shareToLine(_buildStoreDetailLineText(rid), btn);
}

function _storeDetailScreenshot(rid, btn){
  var el = document.getElementById('rawpanel-'+rid);
  if(!el){ _flashBtn(btn,'⚠️ 無畫面'); return; }
  var cache = _storeDetailCache[rid];
  var name = (cache && cache.basicRow && cache.basicRow[COL_NAME]) ? cache.basicRow[COL_NAME] : '查核個案';
  _captureElement(el, btn, name+'_查核明細');
}

/* ════ Dialog 截圖 ════ */
function _captureElement(el, btn, filename){
  btn.classList.add('loading'); btn.innerHTML='<span>⏳</span>';
  function doCapture(){
    html2canvas(el, {
      scale:2, backgroundColor:'#ffffff', useCORS:true,
      width:el.scrollWidth, height:el.scrollHeight,
      ignoreElements:function(node){ return node.getAttribute && node.getAttribute('data-screenshot-ignore')==='1'; }
    }).then(function(canvas){
      if(navigator.clipboard && window.ClipboardItem){
        canvas.toBlob(function(blob){
          try{
            navigator.clipboard.write([new ClipboardItem({'image/png':blob})])
              .then(function(){ btn.classList.remove('loading'); _flashBtn(btn,'✅ 已複製！'); })
              .catch(function(){ _downloadCanvas(canvas, filename, btn); });
          }catch(e){ _downloadCanvas(canvas, filename, btn); }
        },'image/png');
      } else { _downloadCanvas(canvas, filename, btn); }
    }).catch(function(err){ btn.classList.remove('loading'); btn.innerHTML='<span>📸</span>'; });
  }
  if(window.html2canvas) doCapture();
  else {
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    s.onload=doCapture;
    s.onerror=function(){ btn.classList.remove('loading'); btn.innerHTML='<span>📸</span>'; };
    document.head.appendChild(s);
  }
}

function dialogScreenshot(){
  var btn = document.getElementById('btn-dlg-screenshot');
  var el = document.querySelector('#detail-dialog .dlg-box');
  if(!el){ _flashBtn(btn,'⚠️ 無畫面'); return; }
  _captureElement(el, btn, _dialogTitle+'_明細');
}

function summaryScreenshot(){
  var btn = document.getElementById('btn-sum-screenshot');
  var el = document.querySelector('#summary-dialog .dlg-box');
  if(!el){ _flashBtn(btn,'⚠️ 無畫面'); return; }
  _captureElement(el, btn, PROJ_NAME+'_彙整');
}

init();
