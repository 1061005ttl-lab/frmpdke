════════════════════════════════════════════════════════════
  audit_board.html  ─  查核型看板（店家名冊版）
  版本：Ver. 2.0.0 ｜ 最後更新：2026-06-26
════════════════════════════════════════════════════════════

【這個檔案在做什麼】
  顯示「查核型」專案的店家名冊概況。
  資料格式：每列一筆店家，固定讀取以下 10 個欄位。
  依「督導類型」(I欄) 分大群統計家數；群內依「問卷類型」(J欄) 細分。
  層級視角：營業處 → 營業所/課 → 業務人員。

【店家名冊固定欄位（A~J）】
  A 營業處名稱
  B 營業所/課
  C 執行人員
  D 通路別
  E 店家型態
  F 店家代碼
  G 店家名稱
  H 店家等級
  I 督導類型   ← 大群分組鍵（ROSTER_GROUPS 由資料動態產生）
  J 問卷類型   ← 群內子分類

【計算邏輯】
  大群 = 唯一督導類型值（依資料首次出現順序）
  家數 = 店家代碼去重計數
  卡片：各督導類型群組 N 家（hover/長按 Tooltip 展開問卷類型明細）
  Dialog：逐列明細，含通路別、店家型態、店家等級、督導類型、問卷類型

【版本紀錄】
  2.0.0  2026-06-26  改為店家名冊模式：固定10欄、督導類型分群、問卷類型子分類
  1.0.0  2026-06-26  初版

════════════════════════════════════════════════════════════
-->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>查核型看板</title>
<script>
if (localStorage.getItem('ttl_auth_v1') !== '1') {
  window.location.replace('index.html');
}
</script>
<style>
:root {
  --primary: #378ADD;
  --primary-bg: rgba(55,138,221,.08);
  --bg: #F0EDE6;
  --card: #FFFFFF;
  --text: #2D2D2D;
  --sub: #888;
  --border: rgba(0,0,0,0.09);
  --green: #3B6D11;
  --green-bg: #EAF3DE;
  --green-bd: rgba(59,109,17,.25);
  --amber: #7B4F00;
  --amber-bg: #FFF3DC;
  --r: 12px;
  --dur: .32s;
  --ease: cubic-bezier(.34,1.05,.64,1);
}
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif; min-height:100vh; }

/* ── loading ── */
.loading {
  position:fixed; inset:0; background:rgba(240,237,230,.85); display:none;
  align-items:center; justify-content:center; z-index:999;
  font-size:15px; font-weight:600; color:var(--sub);
}
.loading.show { display:flex; }

/* ── toolbar ── */
.toolbar {
  background:#fff; border-bottom:1px solid var(--border);
  padding:0 20px; height:52px; display:flex; align-items:center;
  gap:12px; position:sticky; top:0; z-index:50;
}
.toolbar-title { font-size:15px; font-weight:600; flex:1; }
.back-btn {
  background:none; border:1px solid var(--border); border-radius:8px;
  padding:5px 12px; font-size:13px; cursor:pointer; color:var(--text);
  transition:background .15s;
}
.back-btn:hover { background:var(--bg); }
.proj-sel {
  padding:5px 10px; border:1px solid var(--border); border-radius:8px;
  background:rgba(255,255,255,.7); color:var(--text); font-size:13px;
  font-weight:600; font-family:inherit; cursor:pointer; max-width:280px;
  outline:none; transition:border-color .15s;
}
.proj-sel:focus { border-color:var(--primary); }
.sync-note { font-size:11px; color:var(--sub); }
.tb-act-btn {
  padding:5px 12px; border:1px solid var(--border); border-radius:8px;
  font-size:13px; font-weight:600; cursor:pointer; color:var(--text);
  background:#fff; font-family:inherit; white-space:nowrap;
  transition:all .15s; flex-shrink:0;
}
.tb-act-btn:hover { background:var(--primary-bg); border-color:var(--primary); color:var(--primary); }
.tb-act-btn.done  { border-color:var(--green); color:var(--green); background:var(--green-bg); }
.tb-act-btn.loading { opacity:.6; pointer-events:none; }

/* ── quicknav ── */
.quicknav {
  padding:6px 16px 0; display:flex; align-items:center;
  gap:0; flex-wrap:nowrap; overflow-x:auto; scrollbar-width:none;
  -webkit-overflow-scrolling:touch; border-bottom:1px solid var(--border);
  background:#fff; position:sticky; top:52px; z-index:40;
}
.quicknav::-webkit-scrollbar { display:none; }
.qn-group { display:flex; align-items:center; gap:3px; padding:0 10px 6px 0; flex-shrink:0; border-right:1px solid var(--border); margin-right:8px; }
.qn-group:last-child { border-right:none; padding-right:0; }
.qn-btn {
  padding:4px 10px; border-radius:16px; font-size:12px; font-weight:600;
  cursor:pointer; border:1px solid transparent; background:transparent;
  color:var(--sub); font-family:inherit; white-space:nowrap;
  transition:all .15s; flex-shrink:0;
}
.qn-btn:hover { background:rgba(55,138,221,.08); color:var(--primary); }
.qn-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); }
.qn-label { font-size:10px; color:var(--sub); font-weight:600; white-space:nowrap; padding-right:3px; letter-spacing:.04em; opacity:.6; flex-shrink:0; }

/* ── stage ── */
.stage { padding:16px 20px 40px; }
.level-label { font-size:11px; color:var(--sub); letter-spacing:.05em; margin-bottom:10px; text-transform:uppercase; }
.grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:28px; }

/* ── card ── */
.card {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--r); padding:20px 22px 16px;
  cursor:pointer; transition:transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
  position:relative; overflow:visible;
}
.card:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,.10); z-index:10; }
.card-overall { border-color:var(--primary); background:var(--primary-bg); }
.card-top-inline {
  font-size:11px; color:var(--sub); font-weight:500;
  display:flex; align-items:center; gap:5px; margin-bottom:14px;
}
.card-overall .card-top-inline { color:var(--primary); font-weight:700; }
.card-name-inline { font-size:18px; font-weight:800; color:var(--text); line-height:1.1; flex:1; min-width:0; }
.card-overall .card-name-inline { color:var(--primary); }
.card-detail-btn {
  flex-shrink:0; font-size:11px; font-weight:600; padding:2px 8px; border-radius:6px;
  border:1px solid rgba(0,0,0,.12); background:rgba(255,255,255,.75);
  color:var(--sub); cursor:pointer; font-family:inherit; transition:all .14s;
  white-space:nowrap; line-height:1.6; margin-left:auto;
}
.card-detail-btn:hover { border-color:var(--primary); color:var(--primary); background:#fff; }

/* ── stat row ── */
.stat-row { display:flex; gap:6px; margin-top:4px; flex-wrap:wrap; }
.stat-item { flex:1; min-width:0; background:var(--bg); border-radius:10px; padding:10px 6px; text-align:center; user-select:none; -webkit-user-select:none; -webkit-touch-callout:none; position:relative; }
.stat-item.grp { background:var(--green-bg); }
.stat-label { font-size:10px; font-weight:500; color:var(--sub); margin-bottom:6px; word-break:keep-all; overflow-wrap:break-word; line-height:1.3; min-height:2.6em; display:flex; align-items:center; justify-content:center; }
.stat-item.grp .stat-label { color:var(--green); }
.stat-val { font-size:24px; font-weight:800; color:var(--text); line-height:1; letter-spacing:-1px; }
.stat-item.grp .stat-val { color:var(--green); }
.stat-sub { font-size:11px; color:var(--sub); margin-top:3px; }
.stat-item.grp .stat-sub { color:var(--green); opacity:.7; }

/* ── tooltip ── */
.tooltip {
  position:absolute; bottom:calc(100% + 8px); left:50%;
  transform:translateX(-50%); background:#fff;
  border:1px solid var(--border); border-radius:10px;
  padding:10px 14px; min-width:180px; max-width:300px; width:max-content;
  z-index:200; pointer-events:none; opacity:0; transition:opacity .15s;
  box-shadow:0 4px 16px rgba(0,0,0,.10);
}
.tooltip.show { opacity:1; }
.tooltip.flip { bottom:auto; top:calc(100% + 8px); }
.tt-title { font-size:11px; font-weight:700; color:var(--sub); margin-bottom:7px; letter-spacing:.03em; }
.tt-row { display:flex; justify-content:space-between; align-items:center; gap:12px; padding:3px 0; }
.tt-label { font-size:12px; color:var(--sub); flex:1; }
.tt-val { font-size:12px; font-weight:700; color:var(--text); white-space:nowrap; }

/* ── Dialog ── */
#detail-dialog, #summary-dialog {
  position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:500;
  display:flex; align-items:center; justify-content:center;
  opacity:0; transition:opacity .2s;
}
#detail-dialog.open, #summary-dialog.open { opacity:1; }
.dlg-box {
  background:#fff; border-radius:14px; width:95vw; height:92vh;
  display:flex; flex-direction:column; overflow:hidden;
  box-shadow:0 20px 80px rgba(0,0,0,.35);
  transform:translateY(16px); transition:transform .22s;
}
#detail-dialog.open .dlg-box { transform:translateY(0); }
.dlg-header {
  padding:14px 20px; border-bottom:1px solid rgba(0,0,0,.09);
  display:flex; align-items:center; justify-content:space-between;
  font-size:15px; font-weight:900; flex-shrink:0;
  background:rgba(248,250,248,1);
}
.dlg-close {
  cursor:pointer; font-size:14px; color:var(--sub); padding:4px 12px;
  border-radius:7px; border:1px solid rgba(0,0,0,.12); background:#fff;
  font-family:inherit; font-weight:700; transition:all .14s;
}
.dlg-close:hover { border-color:var(--primary); color:var(--primary); }
.dlg-action-btn {
  cursor:pointer; font-size:13px; color:var(--sub); padding:4px 11px;
  border-radius:7px; border:1px solid rgba(0,0,0,.12); background:#fff;
  font-family:inherit; font-weight:600; white-space:nowrap;
  transition:all .14s;
}
.dlg-action-btn:hover { border-color:var(--primary); color:var(--primary); }
.dlg-action-btn.done { border-color:var(--green); color:var(--green); background:var(--green-bg); }
.dlg-body { flex:1; overflow:auto; padding:0; }
.empty { padding:60px 24px; text-align:center; color:var(--sub); font-size:14px; }

/* ── detail table ── */
.detail-scroll { overflow:auto; }
.detail-tbl { border-collapse:collapse; width:100%; min-width:600px; font-size:13px; }
.detail-tbl thead th {
  position:sticky; top:0; z-index:5;
  padding:8px 12px; text-align:center; font-size:11px; font-weight:800;
  color:#888; background:#f8f8f8; border-bottom:2px solid #e0e0e0;
  white-space:nowrap;
}
.detail-tbl thead th.th-left { text-align:left; }
.detail-tbl tbody td { padding:7px 12px; border-bottom:1px solid #f0f0f0; text-align:center; white-space:nowrap; }
.detail-tbl tbody td.td-left { text-align:left; color:#555; }
.detail-tbl tbody td.td-name { text-align:left; }
.detail-tbl tbody td.td-num { font-weight:700; color:var(--green); }
.th-grp-color-0 { background:rgba(52,199,89,.12) !important; }
.th-grp-color-1 { background:rgba(0,122,255,.10) !important; }
.th-grp-color-2 { background:rgba(255,149,0,.12) !important; }
.th-grp-color-3 { background:rgba(175,82,222,.10) !important; }
.td-grp-color-0 { background:rgba(52,199,89,.05); }
.td-grp-color-1 { background:rgba(0,122,255,.05); }
.td-grp-color-2 { background:rgba(255,149,0,.07); }
.td-grp-color-3 { background:rgba(175,82,222,.05); }

/* ── Summary table ── */
.sum-tbl { min-width:500px; }
.sum-th-key { text-align:left; min-width:120px; }
.sum-th-val { min-width:80px; }
.sum-th-total { min-width:70px; background:rgba(55,138,221,.08) !important; }
.sum-td-key { font-size:13px; color:#333; padding-left:16px !important; }
.sum-td-val { text-align:center; font-size:14px; font-weight:700; color:var(--green); }
.sum-td-total { text-align:center; font-size:14px; font-weight:900; color:var(--primary); background:rgba(55,138,221,.05); }
.sum-td-grand { text-align:center; font-size:15px; font-weight:900; color:var(--primary); background:rgba(55,138,221,.10); }
.sum-footer { border-top:2px solid #ccc; background:#f4f4f2 !important; }
.sum-footer .sum-td-key { font-weight:900; font-size:13px; color:#222; }
.dash { color:#ccc; font-weight:400; }

/* ══════════════════════════════════════════
   PIVOT DIALOG  ─  動態多維度切換大表
   ══════════════════════════════════════════ */

/* Tab 切換列 */
.pivot-tabs {
  display:flex; gap:0; padding:12px 20px 0; background:#fafaf8;
  border-bottom:1px solid rgba(0,0,0,.09); flex-shrink:0;
}
.pivot-tab {
  padding:8px 20px; border-radius:10px 10px 0 0; font-size:13px; font-weight:700;
  border:1px solid transparent; border-bottom:none; cursor:pointer;
  font-family:inherit; background:transparent; color:var(--sub);
  transition:all .18s; position:relative; top:1px;
  white-space:nowrap;
}
.pivot-tab:hover { color:var(--primary); background:rgba(55,138,221,.06); }
.pivot-tab.active {
  background:#fff; color:var(--primary);
  border-color:rgba(0,0,0,.09); border-bottom-color:#fff;
}

/* 滑動容器 */
.pivot-viewport { flex:1; overflow:hidden; position:relative; }
.pivot-slides {
  display:flex; width:400%; height:100%;
  transition:transform .36s cubic-bezier(.4,0,.2,1);
}
.pivot-slide {
  width:calc(100% / 4); height:100%; overflow:auto; flex-shrink:0;
  padding:0;
}

/* 通用表格樣式 */
.pivot-tbl {
  border-collapse:collapse; width:100%; min-width:520px; font-size:13px;
}
.pivot-tbl thead th {
  position:sticky; top:0; z-index:5;
  padding:9px 14px; font-size:11px; font-weight:800; color:#888;
  background:#f8f8f8; border-bottom:2px solid #e0e0e0;
  white-space:nowrap; user-select:none; -webkit-user-select:none;
}
.pivot-tbl thead th.th-left { text-align:left; }
.pivot-tbl thead th.th-num  { text-align:right; }
.pivot-tbl thead th.sortable { cursor:pointer; }
.pivot-tbl thead th.sortable:hover { background:#eef4ff; color:var(--primary); }
.pivot-tbl thead th.sort-asc::after  { content:'  ▲'; font-size:9px; color:var(--primary); }
.pivot-tbl thead th.sort-desc::after { content:'  ▼'; font-size:9px; color:var(--primary); }
.pivot-tbl thead th.th-total {
  background:rgba(55,138,221,.09) !important; color:var(--primary) !important;
}
.pivot-tbl thead th.th-total.sortable:hover { background:rgba(55,138,221,.18) !important; }
.pivot-tbl tbody td {
  padding:7px 14px; border-bottom:1px solid #f2f2f0; white-space:nowrap;
}
.pivot-tbl tbody td.td-num  { text-align:right; font-weight:700; color:var(--green); }
.pivot-tbl tbody td.td-total{ text-align:right; font-weight:900; color:var(--primary);
  background:rgba(55,138,221,.04); }
.pivot-tbl tbody td.td-left { text-align:left; }
.pivot-tbl .sum-footer td   { font-weight:900; background:#f0ede8 !important;
  border-top:2px solid #ccc; }
.pivot-tbl .sum-footer .td-total { font-size:15px; }

/* 區域標題列 */
.pivot-area-row td {
  background:rgba(55,138,221,.07) !important; font-weight:900;
  font-size:12px; letter-spacing:.04em; color:#444;
  border-top:2px solid rgba(0,0,0,.08) !important;
  padding:6px 14px !important;
}

/* Expand 行 */
.pivot-expand-row { cursor:pointer; transition:background .12s; }
.pivot-expand-row:hover td { background:rgba(55,138,221,.05) !important; }
.pivot-expand-icon { display:inline-block; margin-right:6px; font-size:10px;
  transition:transform .2s; color:var(--primary); }
.pivot-expand-icon.open { transform:rotate(90deg); }

/* 子展開行 */
.pivot-child-row td { background:rgba(248,250,248,1); padding-left:28px !important; font-size:12px; }
.pivot-child-row { display:none; }
.pivot-child-row.visible { display:table-row; }

/* 督導類型色帶 */
.th-sup-0 { background:rgba(52,199,89,.13) !important; }
.th-sup-1 { background:rgba(0,122,255,.10) !important; }
.th-sup-2 { background:rgba(255,149,0,.12) !important; }
.th-sup-3 { background:rgba(175,82,222,.10) !important; }
.td-sup-0 { background:rgba(52,199,89,.04); }
.td-sup-1 { background:rgba(0,122,255,.04); }
.td-sup-2 { background:rgba(255,149,0,.06); }
.td-sup-3 { background:rgba(175,82,222,.04); }

/* 空白格 */
.pivot-dash { color:#ccc; font-weight:400; }

@media (max-width:640px) {
  .pivot-tab { padding:6px 12px; font-size:12px; }
  .pivot-tbl { font-size:12px; min-width:400px; }
  .pivot-tbl thead th { font-size:10px; padding:6px 8px; }
  .pivot-tbl tbody td { padding:5px 8px; }
}

/* ══ END PIVOT ══ */

@media (max-width:640px) {
  .toolbar { padding:0 10px; gap:6px; flex-wrap:nowrap; }
  .toolbar-title { display:none; }
  .proj-sel { font-size:11px; max-width:none; flex:1; padding:3px 6px; min-width:0; }
  .back-btn { font-size:11px; padding:3px 8px; flex-shrink:0; }
  .sync-note { display:none; }
  .stage { padding:10px 8px 40px; }
  .grid { grid-template-columns:1fr !important; gap:8px; }
  .card { padding:12px 12px 10px; }
  .card-name-inline { font-size:16px; }
  .stat-row { gap:5px; }
  .stat-item { padding:8px 5px; border-radius:9px; }
  .stat-val { font-size:22px !important; }
  .stat-label { font-size:9px; min-height:2.4em; }
  .dlg-box { width:100vw; height:100dvh; border-radius:0; }
  .dlg-header { padding:8px 12px; font-size:12px; flex-wrap:wrap; gap:5px; }
  .dlg-header > span { order:-1; width:100%; font-size:11px; line-height:1.4; }
  .dlg-action-btn { font-size:11px; padding:4px 8px; }
  .btn-txt { display:none; }
  .detail-tbl { font-size:12px; }
  .detail-tbl th { padding:6px 8px; font-size:10px; }
  .detail-tbl td { padding:5px 8px; }
  .quicknav { padding:4px 10px 0; top:44px; }
}
</style>
</head>
<body>

<div class="loading" id="loading">載入中…</div>

<div class="toolbar">
  <button class="back-btn" onclick="goBack()">← 返回</button>
  <span class="toolbar-title" id="tb-title">查核型看板</span>
  <select class="proj-sel" id="proj-sel" style="display:none" onchange="switchProject(this.value)"></select>
  <span class="sync-note" id="tb-sync"></span>
  <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
    <button class="tb-act-btn" onclick="openSummaryDialog('staff')">👤 人員</button>
    <button class="tb-act-btn" onclick="openSummaryDialog('office')">🏢 單位</button>
    <button class="tb-act-btn" onclick="openSummaryDialog('suptype')">📋 督導</button>
    <button class="tb-act-btn" id="tb-btn-csv" onclick="toolbarDownloadCsv()">📥 CSV</button>
    <button class="tb-act-btn" id="tb-btn-screenshot" onclick="toolbarScreenshot()">📸 截圖</button>
  </div>
</div>

<!-- Pivot Dialog (取代舊 Summary Dialog) -->
<div id="summary-dialog" style="display:none" onclick="if(event.target===this)closeSummaryDialog()">
  <div class="dlg-box">
    <div class="dlg-header">
      <span id="sum-title" style="font-size:14px;font-weight:900;flex:1;min-width:0;"></span>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
        <button class="dlg-action-btn" id="btn-sum-csv" onclick="downloadSummaryCsv()"><span>📥</span><span class="btn-txt"> CSV</span></button>
        <button class="dlg-close" onclick="closeSummaryDialog()">✕</button>
      </div>
    </div>
    <!-- Tab 列 -->
    <div class="pivot-tabs">
      <button class="pivot-tab active" onclick="switchPivotTab('staff',this)">👤 業務王</button>
      <button class="pivot-tab"        onclick="switchPivotTab('office',this)">🏢 單位</button>
      <button class="pivot-tab"        onclick="switchPivotTab('suptype',this)">📋 督導類型</button>
    </div>
    <!-- 滑動容器 -->
    <div class="pivot-viewport">
      <div class="pivot-slides" id="pivot-slides" style="width:300%;">
        <div class="pivot-slide" id="pivot-slide-staff"  style="width:calc(100%/3);"></div>
        <div class="pivot-slide" id="pivot-slide-office" style="width:calc(100%/3);"></div>

<div class="stage"   id="stage"></div>

<script>
/* ════ 設定（寫死，同 index 架構） ════ */
var MGMT_ID        = '1PR9OR7BIGyTpcH8QSMRXkPhQTr4h3m0UK3gET29f19s';
var MGMT_SHEET     = '專案管理';
var SYNC_SHEET_DEFAULT = '輔助';
var SYNC_CELL_DEFAULT  = 'B1';
var SHEET_NAME_DEFAULT = '店家名冊';

/* 店家名冊固定欄位（A~J） */
var COL_AREA      = '營業處名稱';   /* A */
var COL_OFFICE    = '營業所/課';    /* B */
var COL_STAFF     = '執行人員';     /* C */
var COL_CHANNEL   = '通路別';       /* D */
var COL_STORETYPE = '店家型態';     /* E */
var COL_CODE      = '店家代碼';     /* F */
var COL_NAME      = '店家名稱';     /* G */
var COL_GRADE     = '店家等級';     /* H */
var COL_SUPTYPE   = '督導類型';     /* I — 大群分組鍵 */
var COL_QUESTTYPE = '問卷類型';     /* J — 群內子分類 */

/* ROSTER_GROUPS: 由資料動態產生（唯一督導類型清單，依首次出現順序） */
var ROSTER_GROUPS = [];

/* URL 參數 */
var params   = new URLSearchParams(location.search);
var SHEET_ID = params.get('sheetId') || '';

/* 專案資訊 */
var PROJ_NAME  = '查核型看板';
var SYNC_SHEET = SYNC_SHEET_DEFAULT;
var SYNC_CELL  = SYNC_CELL_DEFAULT;
var SHEET_NAME = SHEET_NAME_DEFAULT;

/* 狀態 */
var allRows    = [];
var drillStack = [];
var _dialogTitle = '';
var _dialogRows  = [];
var _dialogLevel = 'staff';
var _overallRows = [];
var _overallLevel = 'area';

/* ════ 工具 ════ */
function showLoading(){ document.getElementById('loading').classList.add('show'); }
function hideLoading(){ document.getElementById('loading').classList.remove('show'); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function numVal(v){ var n=Number(v); return (isFinite(n)&&n>=1)?n:0; }

function parseGvizDate(v) {
  var m = String(v).match(/Date\((\d+),(\d+),(\d+),(\d+),(\d+),(\d+)\)/);
  if (!m) return String(v);
  var d = new Date(+m[1], +m[2], +m[3], +m[4], +m[5], +m[6]);
  return d.toLocaleString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',timeZone:'Asia/Taipei'});
}

function _flashBtn(btn, txt) {
  var orig = btn.textContent;
  btn.textContent = txt;
  btn.classList.add('done');
  setTimeout(function(){ btn.textContent = orig; btn.classList.remove('done'); }, 2000);
}

function goBack(){ window.location.href = 'index.html'; }
function switchProject(sid){ location.href = location.pathname + '?sheetId=' + encodeURIComponent(sid); }

/* ════ 初始化 ════ */
function init() {
  if (!SHEET_ID) {
    hideLoading();
    document.getElementById('stage').innerHTML = '<div class="empty">⚠️ 缺少 sheetId 參數</div>';
    return;
  }

  /* 讀「專案管理」分頁 */
  var urlMgmt = 'https://docs.google.com/spreadsheets/d/' + MGMT_ID +
    '/gviz/tq?tqx=out:json&headers=1&sheet=' + encodeURIComponent(MGMT_SHEET);
  fetch(urlMgmt)
    .then(function(r){ return r.text(); })
    .then(function(txt){
      var json = JSON.parse(txt.replace(/^[^\(]+\(/,'').replace(/\);?\s*$/,''));
      var rows = (json.table && json.table.rows) || [];
      var auditProjs = [];
      rows.forEach(function(row){
        var cells = row.c || [];
        function cv(c){ return c ? String(c.v!==null&&c.v!==undefined?c.v:c.f||'').trim() : ''; }
        var active    = cv(cells[0]).toUpperCase() === 'ON';
        var name      = cv(cells[1]);
        var sid       = cv(cells[2]);
        var sheet     = cv(cells[3]) || SHEET_NAME_DEFAULT;
        var sync      = cv(cells[4]) || SYNC_SHEET_DEFAULT;
        var cell      = cv(cells[5]) || SYNC_CELL_DEFAULT;
        var boardType = cv(cells[6]);
        if (!name || !sid) return;
        if (boardType !== '查核型') return;
        if (sid === SHEET_ID) {
          PROJ_NAME  = name;
          SHEET_NAME = sheet;
          SYNC_SHEET = sync;
          SYNC_CELL  = cell;
        }
        auditProjs.push({ name:name, id:sid, active:active });
      });

      document.getElementById('tb-title').textContent = PROJ_NAME;
      document.title = PROJ_NAME;

      var onProjs = auditProjs.filter(function(p){ return p.active; });
      if (onProjs.length > 1) {
        var sel = document.getElementById('proj-sel');
        sel.innerHTML = onProjs.map(function(p){
          return '<option value="'+esc(p.id)+'"'+(p.id===SHEET_ID?' selected':'')+'>'+ esc(p.name)+'</option>';
        }).join('');
        sel.style.display = '';
      }

      fetchSheet();
      fetchSyncTime();
    })
    .catch(function(){
      document.getElementById('tb-title').textContent = PROJ_NAME;
      fetchSheet();
      fetchSyncTime();
    });
}

/* ════ 讀主資料 ════ */
var FIXED_COLS = [
  '營業處名稱','營業所/課','執行人員','通路別',
  '店家型態','店家代碼','店家名稱','店家等級',
  '督導類型','問卷類型'
];

function fetchSheet() {
  showLoading();
  var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
    '/gviz/tq?tqx=out:json&headers=1&sheet=' + encodeURIComponent(SHEET_NAME);
  fetch(url)
    .then(function(r){ return r.text(); })
    .then(function(txt){
      var json = JSON.parse(txt.replace(/^[^\(]+\(/,'').replace(/\);?\s*$/,''));
      var tbl  = json.table || {};
      var cols = (tbl.cols||[]).map(function(c){ return c.label||''; });
      allRows = (tbl.rows||[]).map(function(row){
        var obj = {};
        (row.c||[]).forEach(function(cell,i){
          var colName = cols[i];
          if (FIXED_COLS.indexOf(colName) === -1) return; /* 只讀取指定欄位 */
          if (!cell) { obj[colName]=''; return; }
          var v=(cell.v!==null&&cell.v!==undefined)?cell.v:'';
          var f=cell.f||'';
          obj[colName]=(v!==''&&v!==null&&v!==undefined)?v:f;
        });
        return obj;
      }).filter(function(r){
        /* 過濾掉完全空白列 */
        return FIXED_COLS.some(function(c){ return String(r[c]||'').trim(); });
      });

      /* 由資料建立 ROSTER_GROUPS（唯一督導類型，依首次出現順序） */
      var seen = {};
      ROSTER_GROUPS = [];
      allRows.forEach(function(r){
        var st = String(r[COL_SUPTYPE]||'').trim();
        if (st && !seen[st]) { seen[st]=true; ROSTER_GROUPS.push(st); }
      });

      render();
    })
    .catch(function(err){
      hideLoading();
      document.getElementById('stage').innerHTML = '<div class="empty">⚠️ 載入失敗：'+err+'</div>';
    });
}

function fetchSyncTime() {
  var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
    '/gviz/tq?tqx=out:json&sheet=' + encodeURIComponent(SYNC_SHEET) + '&range=' + SYNC_CELL;
  fetch(url).then(function(r){ return r.text(); }).then(function(txt){
    var json = JSON.parse(txt.replace(/^[^\(]+\(/,'').replace(/\);?\s*$/,''));
    var val=''; try{ val=json.table.rows[0].c[0].v||''; }catch(e){}
    if(val) document.getElementById('tb-sync').textContent='📊 同步 '+parseGvizDate(val);
  }).catch(function(){});
}

/* ════ 計算 ════ */
/* 對一批 rows，依 ROSTER_GROUPS（督導類型）統計店家數與問卷類型子分佈 */
function calcAudit(rows) {
  /* groups[i] = { label:督導類型, stores:Set, questMap:{問卷類型:Set} } */
  var groups = ROSTER_GROUPS.map(function(g){
    return { label:g, stores:new Set(), staffMap:{}, questMap:{} };
  });
  var totalStores = new Set();

  rows.forEach(function(r){
    var supType  = String(r[COL_SUPTYPE]||'').trim();
    var questType= String(r[COL_QUESTTYPE]||'').trim();
    var code     = String(r[COL_CODE]||'').trim();
    if (!code) return;
    if (!supType) return;

    totalStores.add(code);

    var staff = String(r[COL_STAFF]||'').trim();
    groups.forEach(function(g){
      if (g.label !== supType) return;
      g.stores.add(code);
      if (staff) {
        if (!g.staffMap[staff]) g.staffMap[staff] = new Set();
        g.staffMap[staff].add(code);
      }
      if (questType) {
        if (!g.questMap[questType]) g.questMap[questType] = new Set();
        g.questMap[questType].add(code);
      }
    });
  });

  return {
    totalShares: totalStores.size, /* 語意上這裡是「家數」，重用 totalShares 欄位供 UI 相容 */
    totalStores: totalStores.size,
    groups: groups.map(function(g){
      var subItems = Object.keys(g.questMap).sort().map(function(qt){
        return { label:qt, stores:g.questMap[qt].size };
      });
      var staffList = Object.keys(g.staffMap).map(function(s){
        return { name:s, stores:g.staffMap[s].size };
      }).sort(function(a,b){ return b.stores-a.stores || a.name.localeCompare(b.name); });
      return { label:g.label, shares:g.stores.size, stores:g.stores.size, subItems:subItems, staffList:staffList };
    })
  };
}

/* ════ 篩選 ════ */
function getCurrentRows(){
  if(!drillStack.length) return allRows;
  var rows=allRows;
  drillStack.forEach(function(d){
    var col;
    if(d.level==='area')   col=COL_AREA;
    else if(d.level==='office') col=COL_OFFICE;
    else if(d.level==='staff')  col=COL_STAFF;
    if(col) rows=rows.filter(function(r){ return String(r[col]||'')===d.key; });
  });
  return rows;
}
function getNextGroups(rows,col){
  var map={};
  rows.forEach(function(r){
    var k=String(r[col]||''); if(!k) return;
    if(!map[k]) map[k]=[];
    map[k].push(r);
  });
  return map;
}

/* ════ 渲染 ════ */
var AREA_ORDER = ['北部','桃園','台中','嘉義','台南','高雄','花蓮'];

function render() {
  hideLoading();
  buildQuicknav();
  var stage=document.getElementById('stage');
  stage.innerHTML='';
  var depth=drillStack.length, rows=getCurrentRows();
  var overallName=depth===0?'全台':drillStack[drillStack.length-1].key;

  if(depth===0)      renderLevel(stage,rows,COL_AREA,  'area',  '營業處',   overallName);
  else if(depth===1) renderLevel(stage,rows,COL_OFFICE,'office','營業所/課', overallName);
  else if(depth===2) renderLevel(stage,rows,COL_STAFF, 'staff', '業務人員', overallName);
  else stage.innerHTML='<div class="empty">已到最細層級</div>';

  setTimeout(updateStickyTops,0);
}

function updateStickyTops(){
  var tb=document.querySelector('.toolbar');
  var qn=document.getElementById('quicknav');
  var tbH=tb?tb.offsetHeight:52;
  if(qn) qn.style.top=tbH+'px';
}
window.addEventListener('resize',updateStickyTops);

function renderLevel(stage,rows,col,levelKey,labelText,overallName){
  var groups=getNextGroups(rows,col), keys=Object.keys(groups);
  if(!keys.length){ stage.innerHTML='<div class="empty">無資料</div>'; return; }

  /* 快取 calcAudit，排序用 */
  var statCache={};
  keys.forEach(function(k){ statCache[k]=calcAudit(groups[k]); });

  if(levelKey==='area'){
    keys.sort(function(a,b){
      var ia=AREA_ORDER.indexOf(a), ib=AREA_ORDER.indexOf(b);
      if(ia===-1&&ib===-1) return statCache[b].totalShares-statCache[a].totalShares;
      if(ia===-1) return 1; if(ib===-1) return -1;
      return ia-ib;
    });
  } else {
    keys.sort(function(a,b){ return statCache[b].totalShares-statCache[a].totalShares; });
  }

  var div=document.createElement('div');
  div.innerHTML='<div class="level-label">'+esc(labelText)+'</div>';
  var grid=document.createElement('div'); grid.className='grid';

  /* 整體卡片 */
  _overallRows=rows; _overallLevel=levelKey;
  var overallStat=calcAudit(rows);
  var overallCard=buildCard(overallName,labelText,overallStat,levelKey,rows,true);
  grid.appendChild(overallCard);
  keys.forEach(function(k){ grid.appendChild(buildCard(k,labelText,statCache[k],levelKey,groups[k],false)); });
  div.appendChild(grid);
  stage.appendChild(div);
}

/* ════ 卡片 ════ */
function buildCard(name,labelText,stat,levelKey,rows,isOverall){
  var card=document.createElement('div');
  card.className='card'+(isOverall?' card-overall':'');
  var ttId='tt-'+String(name).replace(/[^a-zA-Z0-9]/g,'_')+'-'+levelKey+(isOverall?'-all':'');

  var topHtml='<div class="card-top-inline">'
    +esc(isOverall?'整體概況':labelText)
    +' <span class="card-name-inline">'+esc(name)+'</span>'
    +'<button class="card-detail-btn" id="dbtn-'+ttId+'">📋 明細</button>'
    +'</div>';

  /* 總計格 */
  var statRowHtml='<div class="stat-row">'
    +'<div class="stat-item">'
    +'<div class="stat-label">總家數</div>'
    +'<div class="stat-val">'+stat.totalStores+'</div>'
    +'<div class="stat-sub">家</div>'
    +'</div>';

  /* 各督導類型群格 */
  stat.groups.forEach(function(g,gi){
    var ttGId='ttg'+gi+'-'+ttId;
    var subHtml='';
    if(g.staffList && g.staffList.length){
      g.staffList.forEach(function(s){
        subHtml+='<div class="tt-row"><span class="tt-label">'+esc(s.name)+'</span><span class="tt-val">'+s.stores+' 家</span></div>';
      });
    }
    statRowHtml+='<div class="stat-item grp" id="sig'+gi+'-'+ttId+'">'
      +'<div class="stat-label">'+esc(g.label)+'</div>'
      +'<div class="stat-val">'+g.stores+'</div>'
      +'<div class="stat-sub">家</div>'
      +'<div class="tooltip" id="'+ttGId+'">'
        +'<div class="tt-title">'+esc(g.label)+'</div>'
        +(subHtml||'<div class="tt-row"><span class="tt-label">店家數</span><span class="tt-val">'+g.stores+'</span></div>')
      +'</div>'
    +'</div>';
  });
  statRowHtml+='</div>';

  card.innerHTML=topHtml+statRowHtml;

  /* 綁定 tooltip */
  stat.groups.forEach(function(g,gi){
    var siEl=card.querySelector('#sig'+gi+'-'+ttId);
    var ttEl=card.querySelector('#ttg'+gi+'-'+ttId);
    if(siEl&&ttEl) bindTooltip(siEl,ttEl,card);
  });

  /* 明細按鈕 */
  card.querySelector('#dbtn-'+ttId).addEventListener('click',function(e){
    e.stopPropagation(); openDialog(name,levelKey,rows);
  });

  /* 卡片點擊 */
  card.addEventListener('click',function(e){
    if(window._lastLongPress&&Date.now()-window._lastLongPress<600) return;
    if(e.target.closest('#dbtn-'+ttId)) return;
    if(isOverall){ openDialog(name,levelKey,rows); return; }
    var isLeaf=(levelKey==='staff');
    if(isLeaf) openDialog(name,levelKey,rows);
    else drillDown(levelKey,name);
  });
  return card;
}

/* ════ Tooltip ════ */
function bindTooltip(triggerEl,ttEl,card){
  function positionTooltip(){
    var cardRect=card.getBoundingClientRect();
    var stickyH=(document.querySelector('.toolbar')||{offsetHeight:52}).offsetHeight
               +(document.getElementById('quicknav')||{offsetHeight:40}).offsetHeight+20;
    ttEl.classList.toggle('flip',cardRect.top<stickyH+120);
    ttEl.style.left=''; ttEl.style.right=''; ttEl.style.transform='';
    var ttRect=ttEl.getBoundingClientRect(), vw=window.innerWidth;
    if(ttRect.right>vw-8){ ttEl.style.left='auto'; ttEl.style.right='0'; ttEl.style.transform='none'; }
    else if(ttRect.left<8){ ttEl.style.left='0'; ttEl.style.transform='none'; }
  }
  triggerEl.addEventListener('mouseenter',function(e){ e.stopPropagation(); ttEl.classList.add('show'); positionTooltip(); });
  triggerEl.addEventListener('mouseleave',function(){ ttEl.classList.remove('show'); ttEl.classList.remove('flip'); });
  var _pressTimer=null;
  triggerEl.addEventListener('touchstart',function(){
    _pressTimer=setTimeout(function(){
      window._lastLongPress=Date.now();
      document.querySelectorAll('.tooltip.show').forEach(function(el){ el.classList.remove('show'); });
      ttEl.classList.add('show'); positionTooltip();
      function dismissOnce(ev){ if(!ttEl.contains(ev.target)){ ttEl.classList.remove('show'); document.removeEventListener('touchstart',dismissOnce); } }
      setTimeout(function(){ document.addEventListener('touchstart',dismissOnce); },50);
    },480);
  },{passive:true});
  triggerEl.addEventListener('touchend',function(){ clearTimeout(_pressTimer); });
  triggerEl.addEventListener('touchmove',function(){ clearTimeout(_pressTimer); },{passive:true});
}

/* ════ Drill ════ */
function drillDown(levelKey,key){ drillStack.push({level:levelKey,key:key}); render(); }
function drillTo(idx){ drillStack=idx<0?[]:drillStack.slice(0,idx+1); render(); }

/* ════ Quicknav ════ */
function buildQuicknav(){
  var nav=document.getElementById('quicknav'); nav.innerHTML='';
  function addGroup(btns){
    var g=document.createElement('div'); g.className='qn-group';
    btns.forEach(function(b){ g.appendChild(b); }); nav.appendChild(g);
  }
  /* 全覽 */
  var homeBtn=document.createElement('button');
  homeBtn.className='qn-btn home'+(drillStack.length===0?' active':'');
  homeBtn.textContent='全覽';
  homeBtn.onclick=function(){ drillStack=[]; render(); };
  addGroup([homeBtn]);

  /* 層級麵包屑 */
  drillStack.forEach(function(d,i){
    var btn=document.createElement('button');
    btn.className='qn-btn active';
    btn.textContent=d.key;
    btn.onclick=function(){ drillTo(i); };
    addGroup([btn]);
  });

  /* 快捷：頂層顯示各區按鈕 */
  if(drillStack.length===0){
    var areaGroups=getNextGroups(allRows,COL_AREA);
    var aKeys=Object.keys(areaGroups).sort(function(a,b){
      var ia=AREA_ORDER.indexOf(a),ib=AREA_ORDER.indexOf(b);
      if(ia===-1&&ib===-1) return a>b?1:-1;
      if(ia===-1) return 1; if(ib===-1) return -1;
      return ia-ib;
    });
    if(aKeys.length>1){
      var lbl=document.createElement('span'); lbl.className='qn-label'; lbl.textContent='快捷';
      var grp=[lbl];
      aKeys.forEach(function(k){
        var b=document.createElement('button'); b.className='qn-btn';
        b.textContent=k;
        b.onclick=function(){ drillStack=[{level:'area',key:k}]; render(); };
        grp.push(b);
      });
      addGroup(grp);
    }
  }
}

/* ════ Dialog（整合 Pivot 三 Tab） ════ */

var _dlgPivotMode    = 'staff';   /* staff | office | suptype | list */
var _dlgPivotTabIdx  = { staff:0, office:1, suptype:2, list:3 };
var _dlgSortState    = {};        /* { mode: { col, dir } } */

function openDialog(name, levelKey, rows){
  _dialogTitle = name; _dialogLevel = levelKey; _dialogRows = rows;
  _dlgPivotMode = 'staff';

  /* Header */
  var stat = calcAudit(rows);
  var ctx  = drillStack.map(function(d){ return d.key; });
  ctx.push(name);
  var parts = ['共 ' + stat.totalStores + ' 家'];
  stat.groups.forEach(function(g){ parts.push(esc(g.label) + '：' + g.stores + ' 家'); });
  document.getElementById('dlg-title').innerHTML =
    '<div style="font-size:14px;font-weight:900;line-height:1.3;">【' + ctx.join(' › ') + '】查核明細</div>'
    + '<div style="font-size:12px;color:var(--sub);font-weight:500;margin-top:2px;">' + parts.join('　') + '</div>';

  /* 重置 Tab 狀態 */
  document.querySelectorAll('#dlg-pivot-tabs .pivot-tab').forEach(function(t, i){
    t.classList.toggle('active', i === 0);
  });
  _dlgSortState = {};

  /* 渲染四個 slide */
  _renderDlgSlide('staff');
  _renderDlgSlide('office');
  _renderDlgSlide('suptype');
  _renderDlgSlide('list');

  /* 定位到第一個 slide（無動畫） */
  _setDlgSlide('staff', false);

  var dlg = document.getElementById('detail-dialog');
  dlg.style.display = 'flex';
  setTimeout(function(){ dlg.classList.add('open'); }, 10);
}

function closeDialog(){
  var dlg = document.getElementById('detail-dialog');
  dlg.classList.remove('open');
  setTimeout(function(){ dlg.style.display = 'none'; }, 220);
}
document.addEventListener('keydown', function(e){ if(e.key==='Escape'){ closeDialog(); closeSummaryDialog(); } });

/* Tab 切換 */
function switchDlgPivotTab(mode, tabEl){
  _dlgPivotMode = mode;
  document.querySelectorAll('#dlg-pivot-tabs .pivot-tab').forEach(function(t){ t.classList.remove('active'); });
  if(tabEl) tabEl.classList.add('active');
  _setDlgSlide(mode, true);
}

function _setDlgSlide(mode, animate){
  var idx = _dlgPivotTabIdx[mode] || 0;
  var slides = document.getElementById('dlg-pivot-slides');
  if(!animate) slides.style.transition = 'none';
  slides.style.transform = 'translateX(-' + (idx * 25) + '%)';
  if(!animate) setTimeout(function(){ slides.style.transition = ''; }, 30);
}

/* Slide 渲染分派 */
function _renderDlgSlide(mode){
  var el = document.getElementById('dlg-slide-' + mode);
  if(!el) return;
  var rows = _dialogRows;
  if(mode === 'staff')   el.innerHTML = _buildDlgStaffPivot(rows);
  else if(mode==='office')  el.innerHTML = _buildDlgOfficePivot(rows);
  else if(mode==='suptype') el.innerHTML = _buildDlgSuptypePivot(rows);
  else if(mode==='list')    el.innerHTML = buildAuditTable(rows);
}

/* ── [人員] 維度：人員姓名 → 督導類型分佈 → 所/課 展開 ── */
function _buildDlgStaffPivot(rows){
  var supTypes = ROSTER_GROUPS;
  var sortKey  = (_dlgSortState.staff||{}).col || 'total';
  var sortDir  = (_dlgSortState.staff||{}).dir || 'desc';

  /* staffMap[name] = { bySt:{st:Set(code)}, offices:Set, allCodes:Set } */
  var staffMap = {}, staffOrder = [];
  rows.forEach(function(r){
    var name = String(r[COL_STAFF]||'').trim(),
        st   = String(r[COL_SUPTYPE]||'').trim(),
        code = String(r[COL_CODE]||'').trim(),
        off  = String(r[COL_OFFICE]||'').trim();
    if(!name||!code) return;
    if(!staffMap[name]){ staffMap[name]={ bySt:{}, offices:new Set(), allCodes:new Set(), rows:[] }; staffOrder.push(name); }
    if(st){ if(!staffMap[name].bySt[st]) staffMap[name].bySt[st]=new Set(); staffMap[name].bySt[st].add(code); }
    staffMap[name].allCodes.add(code);
    if(off) staffMap[name].offices.add(off);
    staffMap[name].rows.push(r);
  });

  var staffList = staffOrder.map(function(name){
    var m = staffMap[name], bySt = {};
    supTypes.forEach(function(st){ bySt[st] = m.bySt[st] ? m.bySt[st].size : 0; });
    return { name:name, bySt:bySt, total:m.allCodes.size, offices:Array.from(m.offices).sort(), rows:m.rows };
  });

  staffList.sort(function(a,b){
    var va = sortKey==='name' ? a.name : (sortKey==='total' ? a.total : (a.bySt[sortKey]||0));
    var vb = sortKey==='name' ? b.name : (sortKey==='total' ? b.total : (b.bySt[sortKey]||0));
    return typeof va==='string' ? (sortDir==='asc'?va.localeCompare(vb):vb.localeCompare(va)) : (sortDir==='asc'?va-vb:vb-va);
  });

  /* 全域合計 */
  var grandBySt={}, grandTotal=new Set();
  supTypes.forEach(function(st){ grandBySt[st]=new Set(); });
  rows.forEach(function(r){
    var st=String(r[COL_SUPTYPE]||'').trim(), code=String(r[COL_CODE]||'').trim();
    if(st&&code){ grandBySt[st].add(code); grandTotal.add(code); }
  });

  function _si(col){ return sortKey!==col?'':'<span style="font-size:9px;color:var(--primary);">'+(sortDir==='asc'?'▲':'▼')+'</span>'; }

  var html='<table class="pivot-tbl"><thead><tr>'
    +'<th class="th-left sortable" onclick="_dlgSortStaff(\'name\')">人員 '+_si('name')+'</th>'
    +'<th class="th-left" style="min-width:80px;">所/課</th>';
  supTypes.forEach(function(st,si){
    html+='<th class="th-num th-sup-'+si+' sortable" onclick="_dlgSortStaff(\''+escAttr(st)+'\')">'+esc(st)+' '+_si(st)+'</th>';
  });
  html+='<th class="th-num th-total sortable" onclick="_dlgSortStaff(\'total\')">合計 '+_si('total')+'</th>';
  html+='</tr></thead><tbody>';

  staffList.forEach(function(s){
    var rid = 'ds-' + s.name.replace(/[^\w\u4e00-\u9fff]/g,'_');
    html+='<tr class="pivot-expand-row" onclick="_dlgToggle(\''+rid+'\')" id="row-'+rid+'">'
      +'<td class="td-left"><span class="pivot-expand-icon" id="ico-'+rid+'">▶</span>'+esc(s.name)+'</td>'
      +'<td class="td-left" style="font-size:11px;color:#888;">'+s.offices.map(esc).join('、')+'</td>';
    supTypes.forEach(function(st,si){
      var n=s.bySt[st]||0;
      html+='<td class="td-num td-sup-'+si+'">'+(n?n:'<span class="pivot-dash">—</span>')+'</td>';
    });
    html+='<td class="td-total">'+s.total+'</td></tr>';

    /* 店家子列 */
    var srows = s.rows.slice().sort(function(a,b){
      var sa=String(a[COL_SUPTYPE]||''), sb=String(b[COL_SUPTYPE]||'');
      return sa!==sb ? sa.localeCompare(sb) : String(a[COL_NAME]||'').localeCompare(String(b[COL_NAME]||''));
    });
    /* 去重（同一 code 只取第一筆） */
    var seenCode={};
    srows.forEach(function(r, ri){
      var code=String(r[COL_CODE]||'').trim(); if(!code||seenCode[code]) return; seenCode[code]=true;
      html+='<tr class="pivot-child-row" id="child-'+rid+'-'+ri+'" data-parent="'+rid+'">'
        +'<td class="td-left" style="padding-left:36px;"><span style="color:#bbb;font-size:10px;margin-right:5px;">'+esc(code)+'</span>'+esc(String(r[COL_NAME]||''))+'</td>'
        +'<td class="td-left" style="font-size:11px;color:#888;">'+esc(String(r[COL_OFFICE]||'—'))+'</td>';
      supTypes.forEach(function(st,si){
        var match=String(r[COL_SUPTYPE]||'').trim()===st;
        html+='<td class="td-num td-sup-'+si+'" style="font-size:11px;">'+(match?'<span style="color:var(--green);font-weight:700;">✓</span>':'')+'</td>';
      });
      html+='<td class="td-total" style="font-size:11px;color:var(--sub);">'+esc(String(r[COL_QUESTTYPE]||'—'))+'</td>';
      html+='</tr>';
    });
  });

  html+='<tr class="sum-footer"><td class="td-left" colspan="2">合計</td>';
  supTypes.forEach(function(st){ html+='<td class="td-total">'+grandBySt[st].size+'</td>'; });
  html+='<td class="td-total" style="font-size:15px;">'+grandTotal.size+'</td></tr>';
  html+='</tbody></table>';
  return html;
}
function _dlgSortStaff(col){
  var cur=_dlgSortState.staff||{};
  _dlgSortState.staff={col:col, dir:(cur.col===col&&cur.dir==='desc')?'asc':'desc'};
  _renderDlgSlide('staff');
}

/* ── [單位] 維度：所/課 → 督導類型分佈 → 人員 展開 ── */
function _buildDlgOfficePivot(rows){
  var supTypes = ROSTER_GROUPS;
  var sortKey  = (_dlgSortState.office||{}).col || 'total';
  var sortDir  = (_dlgSortState.office||{}).dir || 'desc';

  /* offMap[office] = { bySt:{st:Set}, staffs:Set, allCodes:Set } */
  var offMap={}, offOrder=[];
  rows.forEach(function(r){
    var off  = String(r[COL_OFFICE]||'').trim(),
        st   = String(r[COL_SUPTYPE]||'').trim(),
        code = String(r[COL_CODE]||'').trim(),
        name = String(r[COL_STAFF]||'').trim();
    if(!off||!code) return;
    if(!offMap[off]){ offMap[off]={ bySt:{}, staffs:new Set(), allCodes:new Set() }; offOrder.push(off); }
    if(st){ if(!offMap[off].bySt[st]) offMap[off].bySt[st]=new Set(); offMap[off].bySt[st].add(code); }
    offMap[off].allCodes.add(code);
    if(name) offMap[off].staffs.add(name);
  });

  /* 加入 area 資訊 */
  var offArea={};
  rows.forEach(function(r){ var off=String(r[COL_OFFICE]||'').trim(), area=String(r[COL_AREA]||'').trim(); if(off&&area) offArea[off]=offArea[off]||area; });

  var offList = offOrder.map(function(off){
    var m=offMap[off], bySt={};
    supTypes.forEach(function(st){ bySt[st]=m.bySt[st]?m.bySt[st].size:0; });
    return { off:off, area:offArea[off]||'', bySt:bySt, total:m.allCodes.size, staffs:Array.from(m.staffs).sort() };
  });
  offList.sort(function(a,b){
    if(sortKey==='office') return sortDir==='asc'?a.off.localeCompare(b.off):b.off.localeCompare(a.off);
    var va=sortKey==='total'?a.total:(a.bySt[sortKey]||0);
    var vb=sortKey==='total'?b.total:(b.bySt[sortKey]||0);
    return sortDir==='asc'?va-vb:vb-va;
  });

  /* 全域合計 */
  var grandBySt={}, grandTotal=new Set();
  supTypes.forEach(function(st){ grandBySt[st]=new Set(); });
  rows.forEach(function(r){
    var st=String(r[COL_SUPTYPE]||'').trim(), code=String(r[COL_CODE]||'').trim();
    if(st&&code){ grandBySt[st].add(code); grandTotal.add(code); }
  });

  function _si(col){ return sortKey!==col?'':'<span style="font-size:9px;color:var(--primary);">'+(sortDir==='asc'?'▲':'▼')+'</span>'; }

  var html='<table class="pivot-tbl"><thead><tr>'
    +'<th class="th-left sortable" onclick="_dlgSortOffice(\'office\')">所/課 '+_si('office')+'</th>'
    +'<th class="th-left" style="min-width:70px;">人員</th>';
  supTypes.forEach(function(st,si){
    html+='<th class="th-num th-sup-'+si+' sortable" onclick="_dlgSortOffice(\''+escAttr(st)+'\')">'+esc(st)+' '+_si(st)+'</th>';
  });
  html+='<th class="th-num th-total sortable" onclick="_dlgSortOffice(\'total\')">合計 '+_si('total')+'</th>'
    +'</tr></thead><tbody>';

  offList.forEach(function(o, oi){
    var rid='do-'+o.off.replace(/[^\w\u4e00-\u9fff]/g,'_')+oi;
    html+='<tr class="pivot-expand-row" onclick="_dlgToggle(\''+rid+'\')" id="row-'+rid+'">'
      +'<td class="td-left"><span class="pivot-expand-icon" id="ico-'+rid+'">▶</span>'
      +(o.area?'<span style="font-size:10px;color:#bbb;margin-right:4px;">'+esc(o.area)+'</span>':'')+esc(o.off)+'</td>'
      +'<td class="td-left" style="font-size:11px;color:#888;">'+o.staffs.length+' 人</td>';
    supTypes.forEach(function(st,si){
      html+='<td class="td-num td-sup-'+si+'">'+(o.bySt[st]?o.bySt[st]:'<span class="pivot-dash">—</span>')+'</td>';
    });
    html+='<td class="td-total">'+o.total+'</td></tr>';

    /* 人員子列 */
    o.staffs.forEach(function(name, ni){
      /* 計算該人員在此單位的督導類型分佈 */
      var sBySt={}, sTotal=new Set();
      supTypes.forEach(function(st){ sBySt[st]=0; });
      rows.forEach(function(r){
        if(String(r[COL_OFFICE]||'').trim()!==o.off||String(r[COL_STAFF]||'').trim()!==name) return;
        var st=String(r[COL_SUPTYPE]||'').trim(), code=String(r[COL_CODE]||'').trim();
        if(st&&code){ if(sBySt[st]!==undefined) sBySt[st]++; sTotal.add(code); }
      });
      html+='<tr class="pivot-child-row" id="child-'+rid+'-'+ni+'" data-parent="'+rid+'">'
        +'<td class="td-left" style="padding-left:36px;font-size:12px;color:#555;">'+esc(name)+'</td>'
        +'<td></td>';
      supTypes.forEach(function(st,si){
        html+='<td class="td-num td-sup-'+si+'" style="font-size:12px;font-weight:500;">'+(sBySt[st]?sBySt[st]:'<span class="pivot-dash">—</span>')+'</td>';
      });
      html+='<td class="td-total" style="font-size:12px;">'+sTotal.size+'</td></tr>';
    });
  });

  html+='<tr class="sum-footer"><td class="td-left" colspan="2">合計</td>';
  supTypes.forEach(function(st){ html+='<td class="td-total">'+grandBySt[st].size+'</td>'; });
  html+='<td class="td-total" style="font-size:15px;">'+grandTotal.size+'</td></tr>';
  html+='</tbody></table>';
  return html;
}
function _dlgSortOffice(col){
  var cur=_dlgSortState.office||{};
  _dlgSortState.office={col:col, dir:(cur.col===col&&cur.dir==='desc')?'asc':'desc'};
  _renderDlgSlide('office');
}

/* ── [督導類型] 維度：督導類型 → 人員名單 → 所/課 ── */
function _buildDlgSuptypePivot(rows){
  var supTypes = ROSTER_GROUPS;
  var sortKey  = (_dlgSortState.suptype||{}).col || 'stores';
  var sortDir  = (_dlgSortState.suptype||{}).dir || 'desc';

  /* stMap[supType][staff] = { codes:Set, offices:Set } */
  var stMap={};
  supTypes.forEach(function(st){ stMap[st]={}; });
  rows.forEach(function(r){
    var st   = String(r[COL_SUPTYPE]||'').trim(),
        name = String(r[COL_STAFF]||'').trim(),
        code = String(r[COL_CODE]||'').trim(),
        off  = String(r[COL_OFFICE]||'').trim();
    if(!st||!code) return;
    if(!stMap[st]) stMap[st]={};
    var key = name||'（未指定）';
    if(!stMap[st][key]) stMap[st][key]={ codes:new Set(), offices:new Set() };
    stMap[st][key].codes.add(code);
    if(off) stMap[st][key].offices.add(off);
  });

  function _si(col){ return sortKey!==col?'':'<span style="font-size:9px;color:var(--primary);">'+(sortDir==='asc'?'▲':'▼')+'</span>'; }

  var html='<table class="pivot-tbl"><thead><tr>'
    +'<th class="th-left sortable" onclick="_dlgSortSuptype(\'suptype\')">督導類型 '+_si('suptype')+'</th>'
    +'<th class="th-left sortable" onclick="_dlgSortSuptype(\'staff\')">人員 '+_si('staff')+'</th>'
    +'<th class="th-left">所/課</th>'
    +'<th class="th-num th-total sortable" onclick="_dlgSortSuptype(\'stores\')">家數 '+_si('stores')+'</th>'
    +'</tr></thead><tbody>';

  var grandTotal=new Set();
  rows.forEach(function(r){ var c=String(r[COL_CODE]||'').trim(); if(c) grandTotal.add(c); });
  var grandStaffs=new Set();
  rows.forEach(function(r){ var s=String(r[COL_STAFF]||'').trim(); if(s) grandStaffs.add(s); });

  supTypes.forEach(function(st, si){
    var smap = stMap[st]||{};
    var staffList = Object.keys(smap).map(function(name){
      return { name:name, stores:smap[name].codes.size, offices:Array.from(smap[name].offices).sort() };
    });
    staffList.sort(function(a,b){
      if(sortKey==='staff') return sortDir==='asc'?a.name.localeCompare(b.name):b.name.localeCompare(a.name);
      return sortDir==='asc'?a.stores-b.stores:b.stores-a.stores;
    });

    var stTotal=new Set();
    rows.forEach(function(r){ if(String(r[COL_SUPTYPE]||'').trim()===st){ var c=String(r[COL_CODE]||'').trim(); if(c) stTotal.add(c); } });
    var stStaffs=new Set();
    rows.forEach(function(r){ if(String(r[COL_SUPTYPE]||'').trim()===st){ var s=String(r[COL_STAFF]||'').trim(); if(s) stStaffs.add(s); } });

    var rid='dsp-'+String(st).replace(/[^\w\u4e00-\u9fff]/g,'_');
    html+='<tr class="pivot-expand-row" onclick="_dlgToggle(\''+rid+'\')" id="row-'+rid+'" '
      +'style="background:rgba(55,138,221,.05);border-top:2px solid rgba(0,0,0,.07);">'
      +'<td class="td-left" style="font-weight:900;"><span class="pivot-expand-icon" id="ico-'+rid+'">▶</span>'
      +'<span class="td-sup-'+si%4+'" style="display:inline-block;padding:2px 7px;border-radius:4px;margin-left:4px;font-size:11px;">'+esc(st)+'</span></td>'
      +'<td class="td-left" style="color:#aaa;font-size:12px;">'+stStaffs.size+' 人</td>'
      +'<td class="td-left" style="color:#aaa;font-size:11px;"></td>'
      +'<td class="td-total" style="font-size:14px;">'+stTotal.size+'</td></tr>';

    staffList.forEach(function(s, ni){
      html+='<tr class="pivot-child-row" id="child-'+rid+'-'+ni+'" data-parent="'+rid+'">'
        +'<td class="td-left" style="padding-left:36px;color:#aaa;font-size:11px;"></td>'
        +'<td class="td-left" style="font-size:12px;color:#444;font-weight:600;">'+esc(s.name)+'</td>'
        +'<td class="td-left" style="font-size:11px;color:#888;">'+s.offices.map(esc).join('、')+'</td>'
        +'<td class="td-total" style="font-size:12px;">'+s.stores+'</td></tr>';
    });
  });

  html+='<tr class="sum-footer">'
    +'<td class="td-left">合計</td>'
    +'<td class="td-total">'+grandStaffs.size+' 人</td>'
    +'<td></td>'
    +'<td class="td-total" style="font-size:15px;">'+grandTotal.size+'</td>'
    +'</tr></tbody></table>';
  return html;
}

  _dlgSortState.suptype={col:col, dir:(cur.col===col&&cur.dir==='desc')?'asc':'desc'};

function buildAuditTable(rows){
  /* 依 COL_AREA → COL_OFFICE → COL_STAFF → COL_SUPTYPE → COL_CODE 排序 */
  var sorted=rows.slice().sort(function(a,b){
    var cols=[COL_AREA,COL_OFFICE,COL_STAFF,COL_SUPTYPE,COL_CODE];
    for(var i=0;i<cols.length;i++){
      var va=String(a[cols[i]]||''), vb=String(b[cols[i]]||'');
      if(va!==vb) return va>vb?1:-1;
    }
    return 0;
  });

  /* 要顯示的欄位：根據 level */
  var extraCols=[];
  if(_dialogLevel==='area')   extraCols=[COL_OFFICE,COL_STAFF];
  else if(_dialogLevel==='office') extraCols=[COL_STAFF];

  var html='<table class="pivot-tbl"><thead><tr>';
  extraCols.forEach(function(c){
    var lbl={'營業所/課':'所/課','執行人員':'執行人員'}[c]||c;
    html+='<th class="th-left">'+esc(lbl)+'</th>';
  });
  html+='<th class="th-left">店碼</th><th class="th-left">店名</th>';
  html+='<th class="th-left">通路別</th>';
  html+='<th class="th-left">店家型態</th>';
  html+='<th class="th-left">店家等級</th>';
  html+='<th class="th-left">督導類型</th>';
  html+='<th class="th-left">問卷類型</th>';
  html+='</tr></thead><tbody>';

  sorted.forEach(function(r){
    var code=String(r[COL_CODE]||'').trim();
    if(!code) return;
    html+='<tr>';
    extraCols.forEach(function(c){ html+='<td class="td-left">'+esc(String(r[c]||'—'))+'</td>'; });
    html+='<td class="td-left" style="color:#aaa;font-size:11px;">'+esc(String(r[COL_CODE]||'—'))+'</td>';
    html+='<td class="td-name td-left">'+esc(String(r[COL_NAME]||'—'))+'</td>';
    html+='<td class="td-left">'+esc(String(r[COL_CHANNEL]||'—'))+'</td>';
    html+='<td class="td-left">'+esc(String(r[COL_STORETYPE]||'—'))+'</td>';
    html+='<td class="td-left">'+esc(String(r[COL_GRADE]||'—'))+'</td>';
    html+='<td class="td-left">'+esc(String(r[COL_SUPTYPE]||'—'))+'</td>';
    html+='<td class="td-left">'+esc(String(r[COL_QUESTTYPE]||'—'))+'</td>';
    html+='</tr>';
  });
  html+='</tbody></table>';
  return html;
}

/* ════ CSV ════ */
function buildCsvContent(rows){
  var sorted=rows.slice().sort(function(a,b){
    var cols=[COL_AREA,COL_OFFICE,COL_STAFF,COL_SUPTYPE,COL_CODE];
    for(var i=0;i<cols.length;i++){
      var va=String(a[cols[i]]||''), vb=String(b[cols[i]]||'');
      if(va!==vb) return va>vb?1:-1;
    }
    return 0;
  });
  var headers=[COL_AREA,COL_OFFICE,COL_STAFF,COL_CHANNEL,COL_STORETYPE,COL_CODE,COL_NAME,COL_GRADE,COL_SUPTYPE,COL_QUESTTYPE];
  var allR=[headers];
  sorted.forEach(function(r){
    var code=String(r[COL_CODE]||'').trim(); if(!code) return;
    allR.push(headers.map(function(h){ return String(r[h]||''); }));
  });
  return '\uFEFF'+allR.map(function(row){
    return row.map(function(c){ var s=String(c); return /[,"\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }).join(',');
  }).join('\n');
}

function _downloadCsv(csv,title){
  var now=new Date(),p=function(n){return String(n).padStart(2,'0');};
  var fname=(title||'查核').replace(/[\\/:*?"<>|]/g,'_')+'_'+now.getFullYear()+p(now.getMonth()+1)+p(now.getDate())+'_'+p(now.getHours())+p(now.getMinutes())+'.csv';
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a'); a.href=url; a.download=fname;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

function toolbarDownloadCsv(){
  var btn=document.getElementById('tb-btn-csv');
  if(!allRows.length){ _flashBtn(btn,'⚠️ 無資料'); return; }
  _downloadCsv(buildCsvContent(allRows),PROJ_NAME);
  _flashBtn(btn,'✅ 已下載');
}

function downloadDialogCsv(){
  var btn = document.getElementById('btn-dlg-csv');
  if(!_dialogRows.length){ _flashBtn(btn,'⚠️ 無資料'); return; }
  /* 如果在 list 頁，匯出原始資料；否則匯出 pivot 表格 */
  if(_dlgPivotMode==='list'){
    _downloadCsv(buildCsvContent(_dialogRows), _dialogTitle);
    _flashBtn(btn,'✅ 已下載'); return;
  }
  var slide = document.getElementById('dlg-slide-'+_dlgPivotMode);
  if(!slide){ _flashBtn(btn,'⚠️ 無資料'); return; }
  var trows = slide.querySelectorAll('table tr');
  if(!trows.length){ _flashBtn(btn,'⚠️ 無資料'); return; }
  var modeLabel={staff:'人員',office:'單位',suptype:'督導類型'};
  var csv = Array.from(trows).filter(function(tr){
    return !tr.classList.contains('pivot-child-row') || tr.classList.contains('visible');
  }).map(function(tr){
    return Array.from(tr.querySelectorAll('th,td')).map(function(td){
      var s=td.textContent.trim().replace(/[▶▼▲✓]/g,'').replace(/\s+/g,' ').trim();
      return /[,"\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;
    }).join(',');
  }).join('\n');
  _downloadCsv('\uFEFF'+csv, _dialogTitle+'_'+(modeLabel[_dlgPivotMode]||'彙整'));
  _flashBtn(btn,'✅ 已下載');
}

/* ════ 截圖（Viewport） ════ */
function toolbarScreenshot(){
  var btn=document.getElementById('tb-btn-screenshot');
  btn.classList.add('loading'); btn.textContent='⏳ 截圖中...';
  function doCapture(){
    html2canvas(document.body,{
      scale:2, backgroundColor:'#ffffff', useCORS:true,
      width:window.innerWidth, height:window.innerHeight,
      windowWidth:window.innerWidth, windowHeight:window.innerHeight,
      x:window.scrollX, y:window.scrollY
    }).then(function(canvas){
      var titleText=PROJ_NAME||'查核';
      if(navigator.clipboard&&window.ClipboardItem){
        canvas.toBlob(function(blob){
          try{
            navigator.clipboard.write([new ClipboardItem({'image/png':blob})])
              .then(function(){ btn.classList.remove('loading'); _flashBtn(btn,'✅ 已複製！'); })
              .catch(function(){ _downloadCanvas(canvas,titleText,btn); });
          }catch(e){ _downloadCanvas(canvas,titleText,btn); }
        },'image/png');
      } else _downloadCanvas(canvas,titleText,btn);
    }).catch(function(err){ btn.classList.remove('loading'); btn.textContent='📸 截圖'; alert('截圖失敗：'+err); });
  }
  if(window.html2canvas) doCapture();
  else {
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    s.onload=doCapture;
    s.onerror=function(){ btn.classList.remove('loading'); btn.textContent='📸 截圖'; alert('html2canvas 載入失敗'); };
    document.head.appendChild(s);
  }
}
function _downloadCanvas(canvas,titleText,btn){
  var link=document.createElement('a');
  link.download=titleText.replace(/\s+/g,'_')+'.png';
  link.href=canvas.toDataURL('image/png'); link.click();
  btn.classList.remove('loading'); _flashBtn(btn,'✅ 已下載！');
}

/* ════════════════════════════════════════════════════════════
   PIVOT DIALOG  ─  動態多維度切換大表
   ════════════════════════════════════════════════════════════ */

var _pivotMode      = 'staff';   /* staff | office | suptype */
var _pivotRows      = null;      /* 目前 pivot 使用的資料集（null = allRows） */
var _pivotSortState = {};        /* { mode: { col, dir } } */
var _pivotTabIndex  = { staff:0, office:1, suptype:2 };

/* ── 開啟 / 關閉 ── */
function openSummaryDialog(mode, rows){
  _pivotMode = mode || 'staff';
  _pivotRows = rows || null;

  var titles = { staff:'業務王 × 督導類型', office:'單位 × 督導類型', suptype:'督導類型 × 問卷類型' };
  document.getElementById('sum-title').textContent = '彙整看板 ─ ' + (titles[_pivotMode] || '');

  /* 高亮正確 Tab */
  document.querySelectorAll('.pivot-tab').forEach(function(t,i){
    t.classList.toggle('active', i === _pivotTabIndex[_pivotMode]);
  });

  /* 渲染三個 slide（懶渲染：只渲染目前 + 鄰近） */
  _renderPivotSlide('staff');
  _renderPivotSlide('office');
  _renderPivotSlide('suptype');

  /* 定位到正確 slide */
  _setPivotSlide(_pivotMode, false);

  var dlg = document.getElementById('summary-dialog');
  dlg.style.display = 'flex';
  setTimeout(function(){ dlg.classList.add('open'); }, 10);
}

function closeSummaryDialog(){
  var dlg = document.getElementById('summary-dialog');
  dlg.classList.remove('open');
  setTimeout(function(){ dlg.style.display='none'; }, 220);
}
document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeSummaryDialog(); });

/* ── Tab 切換 ── */
function switchPivotTab(mode, tabEl){
  _pivotMode = mode;
  document.querySelectorAll('.pivot-tab').forEach(function(t){ t.classList.remove('active'); });
  if(tabEl) tabEl.classList.add('active');
  document.getElementById('sum-title').textContent =
    '彙整看板 ─ ' + ({staff:'業務王 × 督導類型', office:'單位 × 督導類型', suptype:'督導類型 × 問卷類型'}[mode]||'');
  _setPivotSlide(mode, true);
}

function _setPivotSlide(mode, animate){
  var idx = _pivotTabIndex[mode] || 0;
  var slides = document.getElementById('pivot-slides');
  if(!animate) slides.style.transition = 'none';
  slides.style.transform = 'translateX(-' + (idx * 100/3) + '%)';
  if(!animate) setTimeout(function(){ slides.style.transition=''; }, 30);
}

/* ── Slide 渲染入口 ── */
function _renderPivotSlide(mode){
  var el = document.getElementById('pivot-slide-' + mode);
  if(!el) return;
  var rows = _pivotRows || allRows;
  if(mode === 'staff')   el.innerHTML = _buildStaffPivot(rows);
  else if(mode==='office') el.innerHTML = _buildOfficePivot(rows);
  else if(mode==='suptype') el.innerHTML = _buildSuptypePivot(rows);
}

/* ════ [1] 業務王 維度 ════
   欄位：業務王 | 督導類型₁ | 督導類型₂ | … | 合計
   互動：點擊業務王姓名展開該業務王的店家明細列
*/
function _buildStaffPivot(rows){
  var supTypes = ROSTER_GROUPS;
  var sortKey  = (_pivotSortState.staff||{}).col  || 'total';
  var sortDir  = (_pivotSortState.staff||{}).dir  || 'desc';

  /* staffMap[name][supType] = Set(code) */
  var staffMap={}, staffOrder=[];
  rows.forEach(function(r){
    var name=String(r[COL_STAFF]||'').trim(),
        st  =String(r[COL_SUPTYPE]||'').trim(),
        code=String(r[COL_CODE]||'').trim();
    if(!name||!st||!code) return;
    if(!staffMap[name]){ staffMap[name]={}; staffOrder.push(name); }
    if(!staffMap[name][st]) staffMap[name][st]=new Set();
    staffMap[name][st].add(code);
  });

  /* 組成排序用列陣 */
  var staffList = staffOrder.map(function(name){
    var bySt={}; var total=new Set();
    supTypes.forEach(function(st){
      var s=staffMap[name][st]; bySt[st]=s?s.size:0;
      if(s) s.forEach(function(c){ total.add(c); });
    });
    return { name:name, bySt:bySt, total:total.size };
  });

  /* 排序 */
  staffList.sort(function(a,b){
    var va = sortKey==='name' ? a.name : (sortKey==='total' ? a.total : (a.bySt[sortKey]||0));
    var vb = sortKey==='name' ? b.name : (sortKey==='total' ? b.total : (b.bySt[sortKey]||0));
    if(typeof va==='string') return sortDir==='asc'?va.localeCompare(vb):vb.localeCompare(va);
    return sortDir==='asc'?va-vb:vb-va;
  });

  /* 全域合計 */
  var grandBySt={}, grandTotal=new Set();
  supTypes.forEach(function(st){ grandBySt[st]=new Set(); });
  rows.forEach(function(r){
    var st=String(r[COL_SUPTYPE]||'').trim(), code=String(r[COL_CODE]||'').trim();
    if(st&&code){ grandBySt[st].add(code); grandTotal.add(code); }
  });

  function sortIcon(col){
    if(sortKey!==col) return '';
    return ' <span style="font-size:9px;color:var(--primary);">'+(sortDir==='asc'?'▲':'▼')+'</span>';
  }
  function thSort(col,label,extraClass){
    var isActive=sortKey===col;
    return '<th class="th-num sortable'+(extraClass?' '+extraClass:'')+'" onclick="_sortStaff(\''+col+'\')" style="cursor:pointer;">'
      +esc(label)+sortIcon(col)+'</th>';
  }

  var html='<table class="pivot-tbl"><thead><tr>'
    +'<th class="th-left sortable" onclick="_sortStaff(\'name\')" style="cursor:pointer;">業務王'+sortIcon('name')+'</th>';
  supTypes.forEach(function(st,si){
    html+=thSort(st, st, 'th-sup-'+si);
  });
  html+=thSort('total','合計','th-total');
  html+='</tr></thead><tbody>';

  staffList.forEach(function(s){
    var rid='pvst-'+s.name.replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g,'_');
    html+='<tr class="pivot-expand-row" onclick="_toggleStaffExpand(\''+rid+'\')" id="row-'+rid+'">';
    html+='<td class="td-left"><span class="pivot-expand-icon" id="ico-'+rid+'">▶</span>'+esc(s.name)+'</td>';
    supTypes.forEach(function(st,si){
      var n=s.bySt[st]||0;
      html+='<td class="td-num td-sup-'+si+'">'+(n||'<span class="pivot-dash">—</span>')+'</td>';
    });
    html+='<td class="td-total">'+s.total+'</td>';
    html+='</tr>';

    /* 店家展開子列（隱藏） */
    var storeRows=rows.filter(function(r){ return String(r[COL_STAFF]||'').trim()===s.name; });
    storeRows.sort(function(a,b){
      var sa=String(a[COL_SUPTYPE]||''), sb=String(b[COL_SUPTYPE]||'');
      if(sa!==sb) return sa.localeCompare(sb);
      return String(a[COL_NAME]||'').localeCompare(String(b[COL_NAME]||''));
    });
    storeRows.forEach(function(r, ri){
      var code=String(r[COL_CODE]||'').trim(); if(!code) return;
      html+='<tr class="pivot-child-row" id="child-'+rid+'-'+ri+'" data-parent="'+rid+'">';
      html+='<td class="td-left" colspan="1" style="padding-left:32px;color:#555;font-size:12px;">'
           +'<span style="color:#aaa;font-size:11px;margin-right:6px;">'+esc(code)+'</span>'
           +esc(String(r[COL_NAME]||''))+'</td>';
      supTypes.forEach(function(st,si){
        var match=String(r[COL_SUPTYPE]||'').trim()===st;
        html+='<td class="td-num td-sup-'+si+'" style="font-size:11px;font-weight:500;color:#888;">'
          +(match?'<span style="color:var(--green);">✓</span>':'')+'</td>';
      });
      html+='<td class="td-total" style="font-size:11px;color:var(--sub);">'+esc(String(r[COL_QUESTTYPE]||'—'))+'</td>';
      html+='</tr>';
    });
  });

  /* 合計列 */
  html+='<tr class="sum-footer"><td class="td-left">合計</td>';
  supTypes.forEach(function(st){
    html+='<td class="td-total">'+grandBySt[st].size+'</td>';
  });
  html+='<td class="td-total" style="font-size:15px;">'+grandTotal.size+'</td>';
  html+='</tr></tbody></table>';
  return html;
}

function _sortStaff(col){
  var cur=_pivotSortState.staff||{};
  _pivotSortState.staff = { col:col, dir:(cur.col===col&&cur.dir==='desc')?'asc':'desc' };
  _renderPivotSlide('staff');
}

function _toggleStaffExpand(rid){
  var ico=document.getElementById('ico-'+rid);
  var childRows=document.querySelectorAll('[data-parent="'+rid+'"]');
  var isOpen=ico&&ico.classList.contains('open');
  if(ico) ico.classList.toggle('open',!isOpen);
  childRows.forEach(function(tr){ tr.classList.toggle('visible',!isOpen); });
}

/* ════ [2] 單位 維度 ════
   欄位：所/課 | 業務王 | 督導類型₁ | … | 合計
   分群：依營業處
*/
function _buildOfficePivot(rows){
  var supTypes=ROSTER_GROUPS;
  var sortKey=(_pivotSortState.office||{}).col||'total';
  var sortDir=(_pivotSortState.office||{}).dir||'desc';

  /* areaMap[area][office][staff][supType] = Set(code) */
  var areaMap={}, areaOrder=[];
  rows.forEach(function(r){
    var area=String(r[COL_AREA]||'').trim(),
        off =String(r[COL_OFFICE]||'').trim(),
        staff=String(r[COL_STAFF]||'').trim(),
        st  =String(r[COL_SUPTYPE]||'').trim(),
        code=String(r[COL_CODE]||'').trim();
    if(!area||!off||!st||!code) return;
    if(!areaMap[area]){ areaMap[area]={}; areaOrder.push(area); }
    if(!areaMap[area][off]) areaMap[area][off]={};
    var key=staff||'（未指定）';
    if(!areaMap[area][off][key]) areaMap[area][off][key]={};
    if(!areaMap[area][off][key][st]) areaMap[area][off][key][st]=new Set();
    areaMap[area][off][key][st].add(code);
  });

  areaOrder.sort(function(a,b){
    var ia=AREA_ORDER.indexOf(a),ib=AREA_ORDER.indexOf(b);
    if(ia===-1&&ib===-1) return a>b?1:-1;
    if(ia===-1) return 1; if(ib===-1) return -1; return ia-ib;
  });

  /* 全域合計 */
  var grandBySt={}, grandTotal=new Set();
  supTypes.forEach(function(st){ grandBySt[st]=new Set(); });
  rows.forEach(function(r){
    var st=String(r[COL_SUPTYPE]||'').trim(), code=String(r[COL_CODE]||'').trim();
    if(st&&code){ grandBySt[st].add(code); grandTotal.add(code); }
  });

  function sortIcon(col){
    if(sortKey!==col) return '';
    return ' <span style="font-size:9px;color:var(--primary);">'+(sortDir==='asc'?'▲':'▼')+'</span>';
  }

  var html='<table class="pivot-tbl"><thead><tr>'
    +'<th class="th-left sortable" onclick="_sortOffice(\'office\')" style="cursor:pointer;">所/課'+sortIcon('office')+'</th>'
    +'<th class="th-left">業務王</th>';
  supTypes.forEach(function(st,si){
    html+='<th class="th-num th-sup-'+si+' sortable" onclick="_sortOffice(\''+escAttr(st)+'\')" style="cursor:pointer;">'+esc(st)+sortIcon(st)+'</th>';
  });
  html+='<th class="th-num th-total sortable" onclick="_sortOffice(\'total\')" style="cursor:pointer;">合計'+sortIcon('total')+'</th>';
  html+='</tr></thead><tbody>';

  areaOrder.forEach(function(area, ai){
    var offMap=areaMap[area];
    var offs=Object.keys(offMap);

    /* 計算各 office 合計（用於排序） */
    var offStats=offs.map(function(off){
      var bySt={}, total=new Set();
      supTypes.forEach(function(st){ bySt[st]=new Set(); });
      var staffKeys=Object.keys(offMap[off]);
      staffKeys.forEach(function(sk){
        supTypes.forEach(function(st){
          var s=offMap[off][sk][st]; if(!s) return;
          s.forEach(function(c){ bySt[st].add(c); total.add(c); });
        });
      });
      return { off:off, bySt:bySt, total:total, staffKeys:staffKeys };
    });

    offStats.sort(function(a,b){
      if(sortKey==='office') return sortDir==='asc'?a.off.localeCompare(b.off):b.off.localeCompare(a.off);
      var va=sortKey==='total'?a.total.size:(a.bySt[sortKey]||new Set()).size;
      var vb=sortKey==='total'?b.total.size:(b.bySt[sortKey]||new Set()).size;
      return sortDir==='asc'?va-vb:vb-va;
    });

    /* 計算此區合計 */
    var areaBySt={}, areaTotal=new Set();
    supTypes.forEach(function(st){ areaBySt[st]=new Set(); });
    offStats.forEach(function(o){
      supTypes.forEach(function(st){ o.bySt[st].forEach(function(c){ areaBySt[st].add(c); }); });
      o.total.forEach(function(c){ areaTotal.add(c); });
    });

    /* 區域標題列 */
    var areaSpan=2+supTypes.length+1;
    html+='<tr class="pivot-area-row"><td colspan="'+areaSpan+'">';
    html+='▸ '+esc(area)+'　';
    supTypes.forEach(function(st){ html+='<span style="font-weight:500;color:#666;margin-right:10px;">'+esc(st)+' <strong style="color:#333;">'+areaBySt[st].size+'</strong></span>'; });
    html+='<span>合計 <strong style="color:var(--primary);">'+areaTotal.size+'</strong></span></td></tr>';

    /* 各 office 列與 staff 子列 */
    offStats.forEach(function(o, oi){
      /* 計算各 staff */
      var staffData=o.staffKeys.map(function(sk){
        var sbySt={}, stotal=new Set();
        supTypes.forEach(function(st){
          var s=offMap[o.off][sk][st];
          sbySt[st]=s?s.size:0;
          if(s) s.forEach(function(c){ stotal.add(c); });
        });
        return { sk:sk, bySt:sbySt, total:stotal.size };
      }).sort(function(a,b){ return b.total-a.total; });

      var offId='pvoff-'+area.replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g,'_')+oi;
      html+='<tr class="pivot-expand-row" onclick="_toggleOfficeExpand(\''+offId+'\')" id="row-'+offId+'">';
      html+='<td class="td-left"><span class="pivot-expand-icon" id="ico-'+offId+'">▶</span>'+esc(o.off)+'</td>';
      html+='<td class="td-left" style="color:#aaa;font-size:11px;">'+staffData.length+' 人</td>';
      supTypes.forEach(function(st,si){
        var n=o.bySt[st].size;
        html+='<td class="td-num td-sup-'+si+'">'+(n||'<span class="pivot-dash">—</span>')+'</td>';
      });
      html+='<td class="td-total">'+o.total.size+'</td></tr>';

      /* 業務王子列 */
      staffData.forEach(function(sd, sdi){
        html+='<tr class="pivot-child-row" id="child-'+offId+'-'+sdi+'" data-parent="'+offId+'">';
        html+='<td class="td-left" style="padding-left:28px;color:#aaa;font-size:11px;"></td>';
        html+='<td class="td-left" style="padding-left:8px;font-size:12px;color:#555;">'+esc(sd.sk)+'</td>';
        supTypes.forEach(function(st,si){
          var n=sd.bySt[st]||0;
          html+='<td class="td-num td-sup-'+si+'" style="font-size:12px;font-weight:500;">'+(n||'<span class="pivot-dash">—</span>')+'</td>';
        });
        html+='<td class="td-total" style="font-size:12px;">'+sd.total+'</td></tr>';
      });
    });
  });

  /* 合計 */
  html+='<tr class="sum-footer"><td class="td-left" colspan="2">合計</td>';
  supTypes.forEach(function(st){ html+='<td class="td-total">'+grandBySt[st].size+'</td>'; });
  html+='<td class="td-total" style="font-size:15px;">'+grandTotal.size+'</td>';
  html+='</tr></tbody></table>';
  return html;
}

function _sortOffice(col){
  var cur=_pivotSortState.office||{};
  _pivotSortState.office={col:col, dir:(cur.col===col&&cur.dir==='desc')?'asc':'desc'};
  _renderPivotSlide('office');
}
function _toggleOfficeExpand(rid){
  var ico=document.getElementById('ico-'+rid);
  var childRows=document.querySelectorAll('[data-parent="'+rid+'"]');
  var isOpen=ico&&ico.classList.contains('open');
  if(ico) ico.classList.toggle('open',!isOpen);
  childRows.forEach(function(tr){ tr.classList.toggle('visible',!isOpen); });
}

/* ════ [3] 督導類型 維度 ════
   欄位：督導類型 | 問卷類型 | 業務王數 | 家數
   結構：督導類型 → 問卷類型 → 業務王名單（展開）
*/
function _buildSuptypePivot(rows){
  var supTypes=ROSTER_GROUPS;
  var sortKey=(_pivotSortState.suptype||{}).col||'stores';
  var sortDir=(_pivotSortState.suptype||{}).dir||'desc';

  /* stMap[supType][questType] = { stores:Set, staffs:Set } */
  var stMap={};
  supTypes.forEach(function(st){ stMap[st]={}; });
  rows.forEach(function(r){
    var st=String(r[COL_SUPTYPE]||'').trim(),
        qt=String(r[COL_QUESTTYPE]||'').trim(),
        code=String(r[COL_CODE]||'').trim(),
        staff=String(r[COL_STAFF]||'').trim();
    if(!st||!code) return;
    if(!stMap[st]) stMap[st]={};
    var key=qt||'（未分類）';
    if(!stMap[st][key]) stMap[st][key]={ stores:new Set(), staffs:new Set() };
    stMap[st][key].stores.add(code);
    if(staff) stMap[st][key].staffs.add(staff);
  });

  function sortIcon(col){
    if(sortKey!==col) return '';
    return ' <span style="font-size:9px;color:var(--primary);">'+(sortDir==='asc'?'▲':'▼')+'</span>';
  }

  var html='<table class="pivot-tbl"><thead><tr>'
    +'<th class="th-left sortable" onclick="_sortSuptype(\'suptype\')" style="cursor:pointer;">督導類型'+sortIcon('suptype')+'</th>'
    +'<th class="th-left sortable" onclick="_sortSuptype(\'questtype\')" style="cursor:pointer;">問卷類型'+sortIcon('questtype')+'</th>'
    +'<th class="th-num sortable" onclick="_sortSuptype(\'staffs\')" style="cursor:pointer;">業務王數'+sortIcon('staffs')+'</th>'
    +'<th class="th-num th-total sortable" onclick="_sortSuptype(\'stores\')" style="cursor:pointer;">家數'+sortIcon('stores')+'</th>'
    +'</tr></thead><tbody>';

  var grandTotal=new Set();
  rows.forEach(function(r){ var c=String(r[COL_CODE]||'').trim(); if(c) grandTotal.add(c); });

  supTypes.forEach(function(st, si){
    var qtMap=stMap[st]||{};
    var qtList=Object.keys(qtMap).map(function(qt){
      return { qt:qt, stores:qtMap[qt].stores.size, staffs:qtMap[qt].staffs.size, staffList:Array.from(qtMap[qt].staffs).sort() };
    });

    qtList.sort(function(a,b){
      if(sortKey==='questtype') return sortDir==='asc'?a.qt.localeCompare(b.qt):b.qt.localeCompare(a.qt);
      var va=sortKey==='staffs'?a.staffs:a.stores;
      var vb=sortKey==='staffs'?b.staffs:b.stores;
      return sortDir==='asc'?va-vb:vb-va;
    });

    /* 督導類型小計 */
    var stTotal=new Set();
    rows.forEach(function(r){ if(String(r[COL_SUPTYPE]||'').trim()===st){ var c=String(r[COL_CODE]||'').trim(); if(c) stTotal.add(c); } });
    var stStaffs=new Set();
    rows.forEach(function(r){ if(String(r[COL_SUPTYPE]||'').trim()===st){ var s=String(r[COL_STAFF]||'').trim(); if(s) stStaffs.add(s); } });

    /* 督導類型標題列（展開/收合問卷類型） */
    var stId='pvst-'+String(st).replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g,'_');
    html+='<tr class="pivot-expand-row" onclick="_toggleSuptypeExpand(\''+stId+'\')" id="row-'+stId+'" '
      +'style="background:rgba(55,138,221,.05);border-top:2px solid rgba(0,0,0,.07);">';
    html+='<td class="td-left" style="font-weight:900;"><span class="pivot-expand-icon" id="ico-'+stId+'">▶</span>'+esc(st)+'</td>';
    html+='<td class="td-left" style="color:#aaa;font-size:12px;">共 '+qtList.length+' 種問卷類型</td>';
    html+='<td class="td-num" style="font-weight:900;color:var(--sub);">'+stStaffs.size+'</td>';
    html+='<td class="td-total" style="font-size:14px;">'+stTotal.size+'</td></tr>';

    /* 問卷類型子列 */
    qtList.forEach(function(q, qi){
      var qtId=stId+'_qt'+qi;
      html+='<tr class="pivot-child-row" id="child-'+stId+'-'+qi+'" data-parent="'+stId+'">';
      html+='<td class="td-left" style="padding-left:32px;color:#aaa;font-size:11px;"></td>';
      html+='<td class="td-left" style="font-size:12px;cursor:pointer;" onclick="_toggleStaffList(\''+qtId+'\')">'
        +'<span class="pivot-expand-icon" id="ico-'+qtId+'">▶</span>'+esc(q.qt)+'</td>';
      html+='<td class="td-num" style="font-size:12px;font-weight:600;color:var(--sub);">'+q.staffs+'</td>';
      html+='<td class="td-total" style="font-size:12px;">'+q.stores+'</td></tr>';

      /* 業務王名單（第三層展開） */
      q.staffList.forEach(function(name, ni){
        html+='<tr class="pivot-child-row" id="child-'+qtId+'-'+ni+'" data-parent="'+qtId+'" style="display:none;" data-qt-child="1">';
        html+='<td colspan="2" class="td-left" style="padding-left:56px;font-size:12px;color:#666;">'+esc(name)+'</td>';
        html+='<td colspan="2" class="td-left" style="font-size:11px;color:#aaa;"></td></tr>';
      });
    });
  });

  /* 合計 */
  var grandStaffs=new Set();
  rows.forEach(function(r){ var s=String(r[COL_STAFF]||'').trim(); if(s) grandStaffs.add(s); });
  html+='<tr class="sum-footer">'
    +'<td class="td-left" colspan="2">合計</td>'
    +'<td class="td-total">'+grandStaffs.size+'</td>'
    +'<td class="td-total" style="font-size:15px;">'+grandTotal.size+'</td>'
    +'</tr></tbody></table>';
  return html;
}

function _sortSuptype(col){
  var cur=_pivotSortState.suptype||{};
  _pivotSortState.suptype={col:col, dir:(cur.col===col&&cur.dir==='desc')?'asc':'desc'};
  _renderPivotSlide('suptype');
}
function _toggleSuptypeExpand(rid){
  var ico=document.getElementById('ico-'+rid);
  var childRows=document.querySelectorAll('[data-parent="'+rid+'"]');
  var isOpen=ico&&ico.classList.contains('open');
  if(ico) ico.classList.toggle('open',!isOpen);
  childRows.forEach(function(tr){ tr.classList.toggle('visible',!isOpen); });
}
function _toggleStaffList(qtId){
  var ico=document.getElementById('ico-'+qtId);
  var childRows=document.querySelectorAll('[data-parent="'+qtId+'"]');
  var isOpen=ico&&ico.classList.contains('open');
  if(ico) ico.classList.toggle('open',!isOpen);
  childRows.forEach(function(tr){
    tr.classList.toggle('visible',!isOpen);
    tr.style.display=isOpen?'none':'table-row';
  });
}

/* 屬性安全 escaping */
function escAttr(s){ return String(s).replace(/'/g,"\\'"); }

/* ── CSV 匯出（讀取目前 slide 的表格） ── */
function downloadSummaryCsv(){
  var btn=document.getElementById('btn-sum-csv');
  var slide=document.getElementById('pivot-slide-'+_pivotMode);
  if(!slide){ _flashBtn(btn,'⚠️ 無資料'); return; }
  var rows=slide.querySelectorAll('table tr');
  if(!rows.length){ _flashBtn(btn,'⚠️ 無資料'); return; }
  var csv=Array.from(rows).filter(function(tr){
    return !tr.classList.contains('pivot-child-row')||tr.style.display!=='none';
  }).map(function(tr){
    return Array.from(tr.querySelectorAll('th,td')).map(function(td){
      var s=td.textContent.trim().replace(/[\▶▼▲✓]/g,'');
      return /[,"\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;
    }).join(',');
  }).join('\n');
  var titles={staff:'業務王彙整',office:'單位彙整',suptype:'督導類型彙整'};
  _downloadCsv('\uFEFF'+csv, titles[_pivotMode]||'彙整');
  _flashBtn(btn,'✅ 已下載');
}



/* ════ 啟動 ════ */
init();
</script>
