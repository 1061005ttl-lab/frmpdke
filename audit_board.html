【這個檔案是什麼】
  單一 HTML 檔案（無後端伺服器），純前端 JS，透過 Google Sheets
  的 gviz API（`/gviz/tq?...`，公開分享連結即可讀，不需要 API Key
  或 OAuth）直接讀取兩份 Google 試算表資料，在瀏覽器端組成一個
  「稽核／查核」儀表板。部署方式是丟到 GitHub Pages 上當靜態網頁。

  跟另一份「業務王同步 Code.gs」（Google Apps Script）是兩個
  完全獨立的系統：Code.gs 負責把業務王/Excel資料同步進 Google
  試算表；這份 audit_board.html 只負責「讀」試算表資料並畫成
  儀表板，兩者透過「Google 試算表」這個共用資料層銜接，彼此
  不會互相呼叫程式碼。

【讀取的兩份資料來源】
  1. MGMT_ID「單位名冊」試算表：組織架構骨架（處/所/人），
     即使當月完全沒有查核紀錄，畫面也要能顯示完整的組織樹狀結構。
  2. SHEET_ID「店家名冊」分頁：主要資料來源，每列一筆店家查核
     紀錄，固定讀取 A~L 共 11 欄（見下方【店家名冊固定欄位】）。
     其中 A 欄「來源分頁+行數」（格式：分頁名稱_行數，例如
     「問卷資料傳統_90」）是跨分頁的唯一連結鍵——點開某一筆店家
     的明細面板時，才會即時用這個鍵去對應的「來源分頁」（原始
     問卷資料所在分頁）查詢完整問卷內容，屬於按需載入，不會
     一次全部抓回來，避免資料量大時卡頓。

【這份檔案「能做什麼」】
  ‧ 依「分類」(I欄) 分大群統計家數、群內依「子分類」(J欄) 細分。
  ‧ 兩種巢狀 Pivot 視角可切換：
      模式一「所→人」：處›督›所›人›子分類→店家
      模式二「人→所」：處›督›人›所›子分類→店家
  ‧ 卡片 hover/長按可看子分類明細 Tooltip；點卡片可開 Detail Dialog
    逐列展開到 所/人 層級。
  ‧ 子分類節點可再展開，列出底下每一筆店家名稱＋查核時間；
    點單一店家可展開「明細面板」：
      - 基本資料卡片：直接從已載入記憶體的店家名冊列（basicRow）
        取得，不依賴來源分頁，一定能顯示、速度快。
      - 問卷大題內容（督導意見、拍照備存等）：即時向來源分頁
        查詢解析，含照片欄位渲染（見下方【照片欄位規則】）。
  ‧ 主看板 / Detail Dialog / 店家明細面板 都有「複製摘要」「CSV」
    「截圖」功能，複製的是純文字方便貼 LINE，截圖用 html2canvas
    只框住當下這個卡片區塊（靠 rid 產生的 DOM id 精準鎖定範圍）。

【照片欄位規則 —— 之後修改前務必先讀這段】
  ‧ GAS 那邊同步資料時，問卷裡的照片會先上傳到 Google Drive，
    再把「Drive 分享連結網址」寫回問卷來源分頁的儲存格裡，
    所以「這格是不是照片」的判斷方式是看值裡有沒有 http(s):// 網址，
    不是看欄位名稱寫死清單（未來新增任何照片類欄位都能自動支援）。
  ‧ 【重要】同一個儲存格的值，可能是以下任何一種組合，都要能正確處理：
      (a) 純文字（沒有網址）→ 當一般問卷答案文字顯示
      (b) 純網址，可能不只一個，用換行符號分隔（GAS 寫入時，
          同格已有值會用換行累加，不會覆蓋）→ 每個網址各自渲染
          成一張照片縮圖
      (c) 文字＋網址混在同一格（例如「缺失：無價格卡 https://...」，
          常見於「文字說明＋隨附照片佐證」的情境）→ 文字部分要
          正常顯示成文字，網址部分要各自渲染成照片縮圖，
          不能整格被判斷成「不是照片」而把網址原樣印成一串文字
          （2.7.0 之前的版本有這個問題，已修正，見版本紀錄）
  ‧ 網址判斷／萃取一律用「掃描整個字串找出所有 http(s):// 開頭的
    片段」，不是只判斷「字串開頭是不是 http」，才能處理 (c) 這種
    文字在前、網址在後（或穿插）的情況。
  ‧ 圖片縮圖用原網址直接當 src；點縮圖開燈箱看大圖時，用
    _driveBigUrl() 把 Drive 縮圖網址的 =w1000 參數換成 =w1600。
  ‧ img 標籤一定要帶 crossorigin="anonymous"，否則截圖／複製剪貼簿
    功能對這張圖會抓到空白（瀏覽器跨網域圖片預設不給讀像素）。
  ‧ img 讀取失敗（Drive 檔案權限沒設公開、或網址失效）要有
    onerror fallback 顯示文字提示，不能留破圖示。
  ‧ 同一大題內若有多張照片，版面上要並排顯示（flex-wrap），
    不要每張各自佔滿一整行——這是 2.7.0 才修正的版面問題，
    舊版 `.raw-quiz-picks` 是 `flex-direction:column`，會讓每個
    子元素（含照片）都各自成一整排，之後若調整版面請留意
    別又退回這個狀態。

【店家名冊固定欄位（A~L，順序不可變動，程式寫死用欄位索引讀取）】
  A 來源分頁+行數 ← 跨分頁連結鍵，格式：分頁名稱_行數（例：問卷資料傳統_90）
  B 營業處名稱　C 營業所/課　D 執行人員　E 通路別　F 店家型態
  G 店家代碼　H 店家名稱　I 店家等級　J 分類（大群分組鍵）
  K 子分類（群內細分）　L 日期（查核日期，選填）

【修改這份檔案前，建議先確認的事】
  1. gviz API 讀分頁務必明確帶 `headers=0` 參數，不要讓它自動猜表頭
     列數，否則同一份程式碼在不同分頁上可能解析出錯位的結果
     （已在 2.5.1 踩過這個坑，見下方版本紀錄）。
  2. 比對「這是不是同一筆店家資料」一律用 __rid（內部產生的唯一
     識別碼），不要用店家代碼字串比對——同一店家代碼可能有多筆
     查核紀錄，用字串比對會抓錯筆。
  3. 這份檔案不會主動寫回 Google 試算表，純讀取，所以理論上不會
     把資料寫壞；但如果要新增「寫回」功能，要另外考慮 gviz 唯讀
     的限制（gviz 本身就只能讀，寫回要另外接 GAS Web App 或
     Sheets API）。
  4. 版面／樣式改動前，善用瀏覽器 DevTools 直接改 CSS 變數
     （檔案開頭 :root 裡列了主要色票），不用整段重寫。

【架構優化 2.6.0】基本資料改由店家名冊直接提供，不再依賴來源分頁
  店家明細展開面板拆成兩個獨立資料來源：
  ‧ 基本資料區塊：不再從來源分頁（問卷資料XX）解析取得，
    改成直接用 __rid 從已經載入記憶體的 allRows（店家名冊）裡
    找回被點擊的那一列，欄位固定為 COL_AREA / COL_OFFICE /
    COL_STAFF / COL_CHANNEL / COL_STORETYPE / COL_CODE / COL_NAME /
    COL_GRADE / COL_SUPTYPE / COL_QUESTTYPE / COL_DATE，
    用詞與主表格完全一致，不會因來源分頁欄位差異（增減欄位、
    欄名不同）而顯示不一致或錯位的標籤。
  ‧ 用 __rid（而非店家代碼字串）回頭比對 allRows，避免同一店家
    代碼若有多筆查核記錄時，誤抓到非當前這筆的基本資料。
  ‧ 因此基本資料一定能正確且即時顯示（甚至在來源分頁讀取中／
    讀取失敗時也能先行呈現），只有「問卷大題內容」（督導意見、
    拍照備存等）才需要額外向來源分頁發請求查詢。
  ‧ _buildRawDetailPanel 新增 basicRow 參數，渲染邏輯拆成
    「基本資料卡片（來自店家名冊）」＋「問卷大題區塊（來自來源
    分頁的兩層表頭解析，維持原邏輯不變）」兩個獨立部分。
  ‧ _fetchSourceSheet 解析出的 baseColNames / baseData 目前
    保留但不再用於畫面顯示（僅供內部防呆比對大題名稱用），
    待後續確認穩定後可考慮移除以簡化請求內容。

【修正 2.5.1】解析錯位問題排查與防呆
  上一版（2.5.0）實測發現部分分頁解析結果錯亂（把人名、日期等
  基本資料誤判為問卷大題名稱），原因推測為 gviz API 在未明確指定
  headers 參數時，對特定分頁可能做了非預期的列序自動偵測。
  本版改動：
  ‧ _fetchSourceSheet 明確帶上 headers=0，避免 gviz 自動猜測表頭
    列數導致回傳的 rows[0] 實際對應 Sheet 的列不是第 1 列。
  ‧ 新增結構防呆：若解析出的「大題名稱」剛好跟基本資料欄名重複，
    判定為列序錯位異常，直接回報清楚錯誤訊息，不再靜默產生
    錯誤資料誤導使用者。
  ‧ 新增除錯區塊：解析失敗、或查無資料時，畫面下方會附上
    「🔍 除錯：查看來源分頁原始前 3 列內容」可展開區塊，
    逐欄列出 gviz 實際抓到的原始值，方便直接核對是否與
    Google Sheet 畫面顯示的列序一致，不需要再用程式碼除錯。
  ‧ 移除殘留的灰色提示文字（#999、#666），統一改深色。
  注意：此問題的根本成因仍待用實際資料驗證（沙盒環境無法連線
  Google Sheets API），若展開除錯區塊後發現第 1/2 列內容仍與
  Sheet 畫面不符，請回報該分頁的除錯輸出內容以便進一步排查。

【這個檔案在做什麼】
  顯示「稽核管理型」專案的店家名冊概況。
  資料格式：每列一筆店家，固定讀取以下 11 個欄位。
  依「分類」(I欄) 分大群統計家數；群內依「子分類」(J欄) 細分。
  層級視角：營業處 → 營業所/課 → 業務人員。

【店家名冊固定欄位（A~L）】
  A 來源分頁+行數 ← 跨分頁連結鍵，格式：分頁名稱_行數（例：問卷資料傳統_90）
  B 營業處名稱
  C 營業所/課
  D 執行人員
  E 通路別
  F 店家型態
  G 店家代碼
  H 店家名稱
  I 店家等級
  J 分類   ← 大群分組鍵（ROSTER_GROUPS 由資料動態產生）
  K 子分類   ← 群內子分類
  L 日期       ← 查核日期（選填）

【計算邏輯】
  大群 = 唯一分類值（依資料首次出現順序）
  家數 = 店家代碼去重計數
  卡片：各分類群組 N 家（hover/長按 Tooltip 展開子分類明細）
  Dialog：逐列明細，含通路別、店家型態、店家等級、分類、子分類

  2.8.1  2026-07-03  修正「展開店家明細箭頭轉開但內容空白」的 bug：查核明細 Dialog、

                      storedetail-／storedetailbody-／storeico- 的 DOM id；但彙整看板一

                      若同時出現在兩個以上畫面（例如人員 slide 與店家 slide 都有），id 會
                      撞名，document.getElementById 只抓文件順序中第一個，實際被更新的
                      往往是別處那份看不見的副本。改成三處各自加上 dlg-／pvstaff-／
                      pvstore- 命名空間前綴，_toggleStoreDetail 另外新增 dataRid 參數，
                      確保 DOM id 不撞名的同時，回頭比對 allRows 用的仍是原始 __rid。
  2.8.0  2026-07-03  1) 查核明細新增第三種排序模式「分→子」：處›分類›子分類›所›人，

                      2) 彙整看板「人員」「店家」兩個視角，只要畫面上列得出店名，逐筆列都能
                      點擊展開原始問卷明細（沿用既有 _toggleStoreDetail／_buildRawDetailPanel），
                      群組收合時一併收合底下已展開的明細面板，避免留下孤兒面板；
                      3) 所有「截圖」功能一律只複製到剪貼簿，拿掉「複製失敗才下載到本機」的
                      退路，改成顯示錯誤提示，因為截圖後就是要直接貼上，下載反而多一道手續；
                      4) 頂部時間篩選列重寫：季度／月份改成只列出資料裡實際存在的選項，

<style>
:root {
  --primary: #378ADD;
  --primary-bg: rgba(55,138,221,.08);
  --bg: #F0EDE6;
  --card: #FFFFFF;
  --text: #2D2D2D;
  --sub: #2D2D2D;
  --border: rgba(0,0,0,0.09);
  --green: #3B6D11;
  --green-bg: #EAF3DE;
  --green-bd: rgba(59,109,17,.25);
  --amber: #7B4F00;
  --amber-bg: #FFF3DC;
  --r: 12px;
  --dur: .32s;
  --ease: cubic-bezier(.34,1.05,.64,1);
}
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif; min-height:100vh; }

/* ── loading ── */
.loading {
  position:fixed; inset:0; background:rgba(240,237,230,.85); display:none;
  align-items:center; justify-content:center; z-index:999;
  font-size:15px; font-weight:600; color:var(--sub);
}
.loading.show { display:flex; }

/* ── toolbar ── */
.toolbar {
  background:#fff; border-bottom:1px solid var(--border);
  padding:0 20px; height:52px; display:flex; align-items:center;
  gap:12px; position:sticky; top:0; z-index:50;
}
.toolbar-title { font-size:15px; font-weight:600; flex:1; }
.back-btn {
  background:none; border:1px solid var(--border); border-radius:8px;
  padding:5px 12px; font-size:13px; cursor:pointer; color:var(--text);
  transition:background .15s;
}
.back-btn:hover { background:var(--bg); }
.proj-sel {
  padding:5px 10px; border:1px solid var(--border); border-radius:8px;
  background:rgba(255,255,255,.7); color:var(--text); font-size:13px;
  font-weight:600; font-family:inherit; cursor:pointer; max-width:280px;
  outline:none; transition:border-color .15s;
}
.proj-sel:focus { border-color:var(--primary); }
.sync-note { font-size:11px; color:var(--sub); }
.tb-act-btn {
  padding:5px 12px; border:1px solid var(--border); border-radius:8px;
  font-size:13px; font-weight:600; cursor:pointer; color:var(--text);
  background:#fff; font-family:inherit; white-space:nowrap;
  transition:all .15s; flex-shrink:0;
}
.tb-act-btn:hover { background:var(--primary-bg); border-color:var(--primary); color:var(--primary); }
.tb-act-btn.done  { border-color:var(--green); color:var(--green); background:var(--green-bg); }
.tb-act-btn.loading { opacity:.6; pointer-events:none; }

/* ── quicknav ── */
.quicknav {
  padding:6px 16px 0; display:flex; align-items:center;
  gap:0; flex-wrap:nowrap; overflow-x:auto; scrollbar-width:none;
  -webkit-overflow-scrolling:touch; border-bottom:1px solid var(--border);
  background:#fff; position:sticky; top:52px; z-index:40;
}
.quicknav::-webkit-scrollbar { display:none; }
.qn-group { display:flex; align-items:center; gap:3px; padding:0 10px 6px 0; flex-shrink:0; border-right:1px solid var(--border); margin-right:8px; }
.qn-group:last-child { border-right:none; padding-right:0; }
.qn-btn {
  padding:4px 10px; border-radius:16px; font-size:12px; font-weight:600;
  cursor:pointer; border:1px solid transparent; background:transparent;
  color:var(--sub); font-family:inherit; white-space:nowrap;
  transition:all .15s; flex-shrink:0;
}
.qn-btn:hover { background:rgba(55,138,221,.08); color:var(--primary); }
.qn-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); }
.qn-label { font-size:10px; color:var(--sub); font-weight:600; white-space:nowrap; padding-right:3px; letter-spacing:.04em; opacity:.6; flex-shrink:0; }

/* ── stage ── */
.stage { padding:16px 20px 40px; }
.level-label { font-size:11px; color:var(--sub); letter-spacing:.05em; margin-bottom:10px; text-transform:uppercase; }
.grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:28px; }

/* ── card ── */
.card {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--r); padding:20px 22px 16px;
  cursor:pointer; transition:transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
  position:relative; overflow:visible;
}
.card:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,.10); z-index:10; }
.card-overall { border-color:var(--primary); background:var(--primary-bg); }
.card-top-inline {
  font-size:11px; color:var(--sub); font-weight:500;
  display:flex; align-items:center; gap:5px; margin-bottom:14px;
}
.card-overall .card-top-inline { color:var(--primary); font-weight:700; }
.card-name-inline { font-size:18px; font-weight:800; color:var(--text); line-height:1.1; flex:1; min-width:0; }
.card-overall .card-name-inline { color:var(--primary); }
.card-detail-btn {
  flex-shrink:0; font-size:11px; font-weight:600; padding:2px 8px; border-radius:6px;
  border:1px solid rgba(0,0,0,.12); background:rgba(255,255,255,.75);
  color:var(--sub); cursor:pointer; font-family:inherit; transition:all .14s;
  white-space:nowrap; line-height:1.6; margin-left:auto;
}
.card-detail-btn:hover { border-color:var(--primary); color:var(--primary); background:#fff; }

/* ── stat row ── */
.stat-row { display:flex; gap:6px; margin-top:4px; flex-wrap:wrap; }
.stat-item { flex:1; min-width:0; background:var(--bg); border-radius:10px; padding:10px 6px; text-align:center; user-select:none; -webkit-user-select:none; -webkit-touch-callout:none; position:relative; }
.stat-item.grp { background:var(--green-bg); }
.stat-label { font-size:10px; font-weight:600; color:#2D2D2D; margin-bottom:6px; word-break:keep-all; overflow-wrap:break-word; line-height:1.3; min-height:2.6em; display:flex; align-items:center; justify-content:center; }
.stat-item.grp .stat-label { color:var(--green); }
.stat-val { font-size:24px; font-weight:800; color:var(--text); line-height:1; letter-spacing:-1px; }
.stat-item.grp .stat-val { color:var(--green); }
.stat-val-combo { font-size:17px; font-weight:800; color:var(--text); line-height:1.3; white-space:nowrap; }
.stat-item.grp .stat-val-combo { color:var(--green); }
.stat-sub { font-size:11px; color:#2D2D2D; margin-top:3px; font-weight:500; }
.stat-item.grp .stat-sub { color:var(--green); }

/* ── tooltip ── */
.tooltip {
  position:absolute; bottom:calc(100% + 8px); left:50%;
  transform:translateX(-50%); background:#fff;
  border:1px solid var(--border); border-radius:10px;
  padding:10px 14px; min-width:180px; max-width:300px; width:max-content;
  z-index:200; pointer-events:none; opacity:0; transition:opacity .15s;
  box-shadow:0 4px 16px rgba(0,0,0,.10);
}
.tooltip.show { opacity:1; }
.tooltip.flip { bottom:auto; top:calc(100% + 8px); }
.tt-title { font-size:11px; font-weight:700; color:var(--sub); margin-bottom:7px; letter-spacing:.03em; }
.tt-row { display:flex; justify-content:space-between; align-items:center; gap:12px; padding:3px 0; }
.tt-label { font-size:12px; color:var(--sub); flex:1; }
.tt-val { font-size:12px; font-weight:700; color:var(--text); white-space:nowrap; }

/* ── Dialog ── */
#detail-dialog, #summary-dialog, #photo-dialog {
  position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:500;
  display:flex; align-items:center; justify-content:center;
  opacity:0; transition:opacity .2s;
}
#detail-dialog.open, #summary-dialog.open, #photo-dialog.open { opacity:1; }
.dlg-box {
  background:#fff; border-radius:14px; width:min(92vw,1200px); height:88vh;
  display:flex; flex-direction:column; overflow:hidden;
  box-shadow:0 20px 80px rgba(0,0,0,.35);
  transform:translateY(16px); transition:transform .22s;
}
#detail-dialog.open .dlg-box, #photo-dialog.open .dlg-box { transform:translateY(0); }
.dlg-header {
  padding:14px 20px; border-bottom:1px solid rgba(0,0,0,.09);
  display:flex; align-items:center; justify-content:space-between;
  font-size:15px; font-weight:900; flex-shrink:0;
  background:rgba(248,250,248,1);
}
.dlg-close {
  cursor:pointer; font-size:14px; color:var(--sub); padding:4px 12px;
  border-radius:7px; border:1px solid rgba(0,0,0,.12); background:#fff;
  font-family:inherit; font-weight:700; transition:all .14s;
}
.dlg-close:hover { border-color:var(--primary); color:var(--primary); }
.dlg-action-btn {
  cursor:pointer; font-size:13px; color:var(--sub); padding:4px 11px;
  border-radius:7px; border:1px solid rgba(0,0,0,.12); background:#fff;
  font-family:inherit; font-weight:600; white-space:nowrap;
  transition:all .14s;
}
.dlg-action-btn:hover { border-color:var(--primary); color:var(--primary); }
.dlg-action-btn.done { border-color:var(--green); color:var(--green); background:var(--green-bg); }
.dlg-body { flex:1; overflow:auto; padding:0; }
.empty { padding:60px 24px; text-align:center; color:var(--sub); font-size:14px; }

/* ── detail table ── */
.detail-scroll { overflow:auto; }
.detail-tbl { border-collapse:collapse; width:100%; min-width:600px; font-size:13px; }
.detail-tbl thead th {
  position:sticky; top:0; z-index:5;
  padding:8px 12px; text-align:center; font-size:11px; font-weight:800;
  color:#2D2D2D; background:#f8f8f8; border-bottom:2px solid #e0e0e0;
  white-space:nowrap;
}
.detail-tbl thead th.th-left { text-align:left; }
.detail-tbl tbody td { padding:7px 12px; border-bottom:1px solid #f0f0f0; text-align:center; white-space:nowrap; }
.detail-tbl tbody td.td-left { text-align:left; color:#2D2D2D; }
.detail-tbl tbody td.td-name { text-align:left; }
.detail-tbl tbody td.td-num { font-weight:700; color:var(--green); }
.th-grp-color-0 { background:rgba(52,199,89,.12) !important; }
.th-grp-color-1 { background:rgba(0,122,255,.10) !important; }
.th-grp-color-2 { background:rgba(255,149,0,.12) !important; }
.th-grp-color-3 { background:rgba(175,82,222,.10) !important; }
.td-grp-color-0 { background:rgba(52,199,89,.05); }
.td-grp-color-1 { background:rgba(0,122,255,.05); }
.td-grp-color-2 { background:rgba(255,149,0,.07); }
.td-grp-color-3 { background:rgba(175,82,222,.05); }

/* ── Summary table ── */
.sum-tbl { min-width:500px; }
.sum-th-key { text-align:left; min-width:120px; }
.sum-th-val { min-width:80px; }
.sum-th-total { min-width:70px; background:rgba(55,138,221,.08) !important; }
.sum-td-key { font-size:13px; color:#2D2D2D; padding-left:16px !important; }
.sum-td-val { text-align:center; font-size:14px; font-weight:700; color:var(--green); }
.sum-td-total { text-align:center; font-size:14px; font-weight:900; color:var(--primary); background:rgba(55,138,221,.05); }
.sum-td-grand { text-align:center; font-size:15px; font-weight:900; color:var(--primary); background:rgba(55,138,221,.10); }
.sum-footer { border-top:2px solid #ccc; background:#f4f4f2 !important; }
.sum-footer .sum-td-key { font-weight:900; font-size:13px; color:#222; }
.dash { color:#ccc; font-weight:400; }

/* ══════════════════════════════════════════
   PIVOT DIALOG  ─  動態多維度切換大表
   ══════════════════════════════════════════ */

/* ── 維度控制列 ── */
.dim-bar {
  display:flex; align-items:stretch; gap:0;
  padding:12px 20px 0; background:#f8f6f2;
  border-bottom:2px solid rgba(0,0,0,.09); flex-shrink:0;
  overflow-x:auto; scrollbar-width:none;
}
.dim-bar::-webkit-scrollbar { display:none; }

/* 固定的「營業處」tag */
.dim-tag-locked {
  display:inline-flex; align-items:center; gap:6px;
  padding:8px 16px; border-radius:10px 10px 0 0;
  background:#ede9e3; color:#2D2D2D; font-size:13px; font-weight:700;
  border:1px solid rgba(0,0,0,.10); border-bottom:2px solid #ede9e3;
  white-space:nowrap; position:relative; top:2px; cursor:default;
}
.dim-tag-locked .lock-icon { font-size:10px; opacity:.6; }

/* 分隔箭頭 */
.dim-sep {
  display:flex; align-items:center; padding:0 4px;
  color:#ccc; font-size:16px; position:relative; top:1px;
  flex-shrink:0;
}

/* 模式切換按鈕組 */
.dim-mode-group {
  display:flex; align-items:center; gap:6px;
  margin-left:auto; padding:0 0 10px 16px;
  flex-shrink:0;
}
.dim-mode-btn {
  padding:6px 14px; border-radius:8px; font-size:12px; font-weight:700;
  border:1.5px solid rgba(55,138,221,.3); cursor:pointer; font-family:inherit;
  background:transparent; color:var(--sub); transition:all .15s; white-space:nowrap;
}
.dim-mode-btn.active {
  background:var(--primary); color:#fff; border-color:var(--primary);
  box-shadow:0 2px 8px rgba(55,138,221,.3);
}
.dim-mode-btn:not(.active):hover { background:rgba(55,138,221,.08); color:var(--primary); }

/* 明細列表按鈕 */
.dim-list-btn {
  padding:6px 14px; border-radius:8px; font-size:12px; font-weight:700;
  border:1.5px solid rgba(0,0,0,.12); cursor:pointer; font-family:inherit;
  background:transparent; color:var(--sub); transition:all .15s;
}
.dim-list-btn.active { background:#555; color:#fff; border-color:#2D2D2D; }
.dim-list-btn:not(.active):hover { background:rgba(0,0,0,.06); color:#2D2D2D; }

/* 維度 badge（路徑顯示） */
.dim-path {
  display:flex; align-items:center; gap:0; flex:1; min-width:0;
}
.dim-badge {
  display:inline-flex; align-items:center; gap:4px;
  padding:8px 14px; font-size:13px; font-weight:700; color:var(--primary);
  background:#fff; border:1px solid rgba(55,138,221,.25); border-bottom:none;
  border-radius:10px 10px 0 0; white-space:nowrap;
  position:relative; top:2px; cursor:pointer; user-select:none; transition:all .15s;
}
.dim-badge:hover { background:rgba(55,138,221,.06); }
/* 該層被關閉（off）：仍保留在麵包屑上，但變灰＋加刪除線，點擊可再打開 */
.dim-badge.off {
  color:#aaa; background:#f2f0ec; border-color:rgba(0,0,0,.08);
  text-decoration:line-through; text-decoration-color:rgba(0,0,0,.25);
}
.dim-badge.off:hover { background:#ece9e3; color:#888; }

/* 排序按鈕組（在欄位標頭旁） */
.sort-btns {
  display:inline-flex; flex-direction:column;
  margin-left:5px; gap:0; vertical-align:middle;
}
.sort-btn {
  display:block; width:14px; height:11px; line-height:11px;
  font-size:9px; text-align:center; cursor:pointer;
  color:#ccc; background:none; border:none; padding:0;
  font-family:inherit; transition:color .12s;
}
.sort-btn:hover { color:#2D2D2D; }
.sort-btn.on { color:var(--primary); font-weight:900; }

/* pivot-tabs（summary dialog 仍用） */
.pivot-tabs {
  display:flex; gap:0; padding:12px 20px 0; background:#fafaf8;
  border-bottom:1px solid rgba(0,0,0,.09); flex-shrink:0;
}
.pivot-tab {
  padding:8px 20px; border-radius:10px 10px 0 0; font-size:13px; font-weight:700;
  border:1px solid transparent; border-bottom:none; cursor:pointer;
  font-family:inherit; background:transparent; color:var(--sub);
  transition:all .18s; position:relative; top:1px; white-space:nowrap;
}
.pivot-tab:hover { color:var(--primary); background:rgba(55,138,221,.06); }
.pivot-tab.active {
  background:#fff; color:var(--primary);
  border-color:rgba(0,0,0,.09); border-bottom-color:#fff;
}


/* 滑動容器 */
.pivot-viewport { flex:1; overflow:hidden; position:relative; }
.pivot-slides {
  display:flex; width:400%; height:100%;
  transition:transform .36s cubic-bezier(.4,0,.2,1);
}
.pivot-slide {
  width:calc(100% / 4); height:100%; overflow:auto; flex-shrink:0;
  padding:0;
}

/* 通用表格樣式 */
.pivot-tbl {
  border-collapse:collapse; width:100%; min-width:520px; font-size:15px;
}
.pivot-tbl thead th {
  position:sticky; top:0; z-index:5;
  padding:10px 16px; font-size:13px; font-weight:800; color:#2D2D2D;
  background:#f0ede8; border-bottom:2px solid #d8d4cc;
  white-space:nowrap; user-select:none; -webkit-user-select:none;
}
.pivot-tbl thead th.th-left { text-align:left; }
.pivot-tbl thead th.th-num  { text-align:right; }
.pivot-tbl thead th.sortable { cursor:pointer; }
.pivot-tbl thead th.sortable:hover { background:#eef4ff; color:var(--primary); }
.pivot-tbl thead th.th-total {
  background:rgba(55,138,221,.12) !important; color:var(--primary) !important;
}
.pivot-tbl thead th.th-total.sortable:hover { background:rgba(55,138,221,.22) !important; }

/* ── tbody 統一基準：15px、深色 ── */
.pivot-tbl tbody td {
  padding:10px 16px; border-bottom:1px solid #ebebea; white-space:nowrap;
  font-size:15px !important;   /* 全部同大 */
  color:#1a1a1a !important;    /* 全部深色，不用灰 */
}
.pivot-tbl tbody td.td-num {
  text-align:right; font-weight:700; color:var(--green) !important;
}
.pivot-tbl tbody td.td-total {
  text-align:right; font-weight:900; color:var(--primary) !important;
  background:rgba(55,138,221,.05);
}
.pivot-tbl tbody td.td-left { text-align:left; }

/* 合計行 */
.pivot-tbl .sum-footer td {
  font-weight:900; background:#e8e4dc !important;
  border-top:2px solid #bbb; font-size:15px !important; color:#111 !important;
}
.pivot-tbl .sum-footer .td-total {
  font-size:17px !important; color:var(--primary) !important;
}

/* 區域 Banner 列 */
.pivot-area-row td {
  background:rgba(55,138,221,.08) !important;
  border-top:2px solid rgba(55,138,221,.2) !important;
  padding:9px 16px !important;
  font-size:14px !important; font-weight:900; color:#1a1a1a !important;
  letter-spacing:.03em;
}

/* 展開父列 */
.pivot-expand-row { cursor:pointer; transition:background .12s; }
.pivot-expand-row:hover td { background:rgba(55,138,221,.06) !important; }
.pivot-expand-icon {
  display:inline-block; margin-right:7px; font-size:11px;
  transition:transform .2s; color:var(--primary);
}
.pivot-expand-icon.open { transform:rotate(90deg); }

/* 店家葉節點：可點擊展開原始問卷明細 */
.store-leaf-row { transition:background .12s; }
.store-leaf-row:hover td { background:rgba(55,138,221,.05) !important; }
.store-detail-row td { padding:0 !important; }

/* 原始問卷明細格 */
.raw-detail-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:8px 18px; margin-top:6px;
}
.raw-detail-item { min-width:0; }
.raw-detail-label {
  font-size:10px; font-weight:700; color:var(--primary); margin-bottom:2px;
  letter-spacing:.3px; text-transform:uppercase;
}
.raw-detail-val {
  font-size:12.5px; font-weight:500; color:#2D2D2D; word-break:break-word;
  line-height:1.5;
}

/* 問卷大題區：每題一塊，底下逐選項列出「題目／答案」兩段式卡片，
   不再用冒號把選項與答案黏在同一行文字裡 —— 答案內容若較長
   （例如開放式文字欄），容易跟選項名稱混在一起難以分辨起訖，
   改成上下分層：上排小字＋淺色是選項本身，下排正常字重深色是回答內容。 */
.raw-quiz-list { display:flex; flex-direction:column; gap:10px; }
.raw-quiz-section {
  background:#fff; border:1px solid rgba(0,0,0,.06); border-radius:8px;
  padding:8px 12px;
}
.raw-quiz-title {
  font-size:12px; font-weight:700; color:var(--green,#3B6D11); margin-bottom:6px;
}
.raw-quiz-picks { display:flex; flex-direction:column; gap:6px; }
.raw-quiz-chip {
  display:block; background:var(--green-bg,#EAF3DE);
  border:1px solid var(--green-bd,rgba(59,109,17,.25));
  border-radius:6px; padding:5px 10px;
}
.raw-quiz-chip-q {
  font-size:10.5px; font-weight:700; color:var(--green,#3B6D11);
  letter-spacing:.5px; margin-bottom:3px; opacity:.8;
}
.raw-quiz-chip-a {
  font-size:13px; font-weight:600; color:#1a1a1a; line-height:1.5; word-break:break-word;
}
/* 純打勾（無額外文字說明）：答案就是選項本身被勾選，不需要拆 Q/A 兩段，
   維持單行徽章樣式即可，避免「Q：有　A：有」這種無意義的重複 */
.raw-quiz-chip.is-simple {
  display:inline-block; padding:4px 10px;
}
.raw-quiz-chip.is-simple .raw-quiz-chip-a {
  font-size:12.5px; font-weight:600;
}
/* 問卷內的照片欄位（如PG半身照/全身照/服務情形照片）：顯示縮圖，點擊開燈箱看原圖。
   同一大題內若有多張照片，全部收在 .raw-quiz-photos 裡用 flex-wrap 並排顯示，
   不再像文字卡片一樣一行一則（一張照片佔一整排太浪費版面）。 */
.raw-quiz-photos { display:flex; flex-wrap:wrap; gap:8px; margin-top:6px; }
.raw-quiz-chip.raw-quiz-photo { display:inline-block; padding:6px 8px; vertical-align:top; margin:0; }

/* ── 照片牆（圖片選項型視角）：哪間店、哪份問卷、哪個大題、哪個選項底下放了什麼照片 ──
   店卡沿用 .raw-quiz-section／.raw-quiz-title／.raw-quiz-photos 既有樣式渲染大題/選項，
   這裡只需要額外補「整間店的外框卡片」與「頂部摘要列」的樣式。 */
.photo-gallery-wrap { padding:14px 20px 30px; }
.photo-gallery-summary {
  font-size:12px; font-weight:700; color:var(--sub); margin-bottom:12px;
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
}
.photo-gallery-summary strong { color:var(--primary); font-size:14px; }
.photo-store-card {
  background:#FAFAF8; border:1px solid rgba(0,0,0,.08); border-radius:10px;
  padding:12px 14px 14px; margin-bottom:12px;
}
.photo-store-head {
  display:flex; align-items:baseline; flex-wrap:wrap; gap:8px;
  margin-bottom:10px; padding-bottom:8px; border-bottom:1px dashed rgba(0,0,0,.1);
}
.photo-store-name { font-size:14px; font-weight:900; color:#1a1a1a; }
.photo-store-meta { font-size:11px; color:var(--sub); font-weight:600; }
.photo-store-tag {
  font-size:10.5px; font-weight:700; color:var(--primary);
  background:rgba(55,138,221,.08); border-radius:5px; padding:2px 7px;
}
.photo-gallery-sections { display:flex; flex-direction:column; gap:8px; }
.photo-gallery-empty { padding:60px 20px; text-align:center; color:var(--sub); font-size:13px; }
.photo-gallery-loading { padding:60px 20px; text-align:center; color:var(--sub); font-size:13px; }
.raw-quiz-photo-img {
  display:block; margin-top:4px; width:100px; height:100px; object-fit:cover;
  border-radius:6px; border:1px solid rgba(0,0,0,.08); cursor:zoom-in;
  background:#f0f0ee;
}
.raw-quiz-photo-fail {
  display:block; margin-top:4px; font-size:11px; color:#B23A3A; max-width:100px;
}
/* 照片旁若儲存格裡除了網址還有文字備註（例如「花雕酸菜牛肉麵袋麵缺貨」），
   顯示在縮圖下方，讓人知道這張照片被額外註記了什麼內容，不會漏看。 */
.raw-quiz-photo-note {
  display:block; margin-top:4px; font-size:11px; font-weight:600; color:#B2650A;
  max-width:100px; line-height:1.4; word-break:break-word;
}
/* 照片燈箱：點縮圖後直接浮在畫面正中央看大圖，不用開新分頁再關掉分頁那麼麻煩 */
.photo-lightbox-backdrop {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.75);
  z-index:9999; align-items:center; justify-content:center; padding:24px;
  cursor:zoom-out;
}
.photo-lightbox-backdrop.show { display:flex; }
.photo-lightbox-img {
  /* 【修改】拿掉原本 min(90vw,900px) 的寬度上限——螢幕越大，圖片理應跟著放大，
     不該卡在 900px。改成單純用 max-width/max-height 各自設一個視窗百分比，
     瀏覽器對 <img> 元素本來就會自動照原始長寬比，同時滿足兩個限制中「比較吃緊」
     的那一個（直式照片通常先撐滿高度、橫式照片通常先撐滿寬度），不需要額外用
     JS 去判斷「這張是直的還橫的該先比高還比寬」，CSS 天生就是這樣算的。 */
  max-width:96vw; max-height:94vh; width:auto; height:auto;
  border-radius:8px; object-fit:contain;
  box-shadow:0 8px 32px rgba(0,0,0,.4); cursor:default;
  background:#222;
}
.photo-lightbox-close {
  position:absolute; top:18px; right:24px; width:36px; height:36px;
  border-radius:50%; background:rgba(255,255,255,.15); color:#fff;
  border:none; font-size:20px; cursor:pointer; line-height:36px;
}
.photo-lightbox-close:hover { background:rgba(255,255,255,.3); }

/* 店家明細卡片右上角的分享動作列（複製摘要／截圖） */
.raw-share-btn {
  font-size:11px; font-weight:600; padding:3px 10px; border-radius:6px;
  border:1px solid rgba(0,0,0,.12); background:#fff; color:var(--sub);
  cursor:pointer; font-family:inherit; transition:all .15s; white-space:nowrap;
}
.raw-share-btn:hover { border-color:var(--primary); color:var(--primary); }
.raw-share-btn.done { border-color:var(--green); color:var(--green); background:var(--green-bg); }

/* 子列：同字體、稍微縮排、背景略區分 */
.pivot-child-row { display:none; }
.pivot-child-row.visible { display:table-row; }
.pivot-child-row td {
  background:#fafaf8 !important;
  font-size:15px !important;
  color:#1a1a1a !important;
  border-bottom:1px solid #f0f0ee;
  padding:8px 16px !important;
}
.pivot-child-row td:first-child { padding-left:40px !important; }
.pivot-child-row td.td-num  { color:var(--green) !important; }
.pivot-child-row td.td-total{ color:var(--primary) !important; background:rgba(55,138,221,.03) !important; }

/* 同日且同店 高光標示（店家明細用） */
.pivot-dup-row td {
  background:#FFF4D6 !important;
  border-top:1px solid #F0C84A;
  border-bottom:1px solid #F0C84A;
}
.pivot-dup-row td.td-total{ background:#FFF4D6 !important; }
.pivot-dup-row td:first-child { border-left:4px solid #E8A800; }
.pivot-dup-badge {
  display:inline-block; font-size:11px; font-weight:700; color:#7A4A00;
  background:#FFE2A0; border-radius:6px; padding:1px 6px; margin-left:6px;
  white-space:nowrap; vertical-align:middle;
}

/* 分類色帶 */
.th-sup-0 { background:rgba(52,199,89,.15) !important; color:#1a5c10 !important; }
.th-sup-1 { background:rgba(0,122,255,.12) !important; color:#003d99 !important; }
.th-sup-2 { background:rgba(255,149,0,.14) !important; color:#7a4600 !important; }
.th-sup-3 { background:rgba(175,82,222,.12) !important; color:#5a1a80 !important; }
.td-sup-0 { background:rgba(52,199,89,.05) !important; }
.td-sup-1 { background:rgba(0,122,255,.05) !important; }
.td-sup-2 { background:rgba(255,149,0,.07) !important; }
.td-sup-3 { background:rgba(175,82,222,.05) !important; }

/* 空值佔位（—）：淺色但不灰到看不清 */
.pivot-dash { color:#2D2D2D; font-weight:400; font-size:13px !important; }

/* 店碼小標籤 */
.store-code-tag {
  color:#2D2D2D; font-size:12px; margin-right:7px;
  font-variant-numeric:tabular-nums; letter-spacing:.02em;
}

@media (max-width:640px) {
  .pivot-tab { padding:6px 12px; font-size:12px; }
  .pivot-tbl { font-size:12px; min-width:400px; }
  .pivot-tbl thead th { font-size:10px; padding:6px 8px; }
  .pivot-tbl tbody td { padding:5px 8px; }
}

/* ══ END PIVOT ══ */

@media (max-width:640px) {
  .toolbar { padding:0 10px; gap:6px; flex-wrap:nowrap; }
  .toolbar-title { display:none; }
  .proj-sel { font-size:11px; max-width:none; flex:1; padding:3px 6px; min-width:0; }
  .back-btn { font-size:11px; padding:3px 8px; flex-shrink:0; }
  .sync-note { display:none; }
  .stage { padding:10px 8px 40px; }
  .grid { grid-template-columns:1fr !important; gap:8px; }
  .card { padding:12px 12px 10px; }
  .card-name-inline { font-size:16px; }
  .stat-row { gap:5px; }
  .stat-item { padding:8px 5px; border-radius:9px; }
  .stat-val { font-size:22px !important; }
  .stat-label { font-size:9px; min-height:2.4em; }
  .dlg-box { width:100vw; height:100dvh; border-radius:0; }
  .dlg-header { padding:8px 12px; font-size:12px; flex-wrap:wrap; gap:5px; }
  .dlg-header > span { order:-1; width:100%; font-size:11px; line-height:1.4; }
  .dlg-action-btn { font-size:11px; padding:4px 8px; }
  .btn-txt { display:none; }
  .detail-tbl { font-size:12px; }
  .detail-tbl th { padding:6px 8px; font-size:10px; }
  .detail-tbl td { padding:5px 8px; }
  .quicknav { padding:4px 10px 0; top:44px; }
}
</style>

      <span id="sum-title" style="font-size:14px;font-weight:900;flex:1;min-width:0;"></span>

    <div class="pivot-tabs">

      <button class="pivot-tab"        onclick="switchPivotTab('office',this)">🏢 單位</button>

<!-- Detail Dialog（動態維度排列） -->

      <div id="dlg-pivot-content" style="height:100%;overflow:auto;"></div>

<script>
/* ════ 設定（寫死，同 index 架構） ════ */
var MGMT_ID        = '1PR9OR7BIGyTpcH8QSMRXkPhQTr4h3m0UK3gET29f19s';
var MGMT_SHEET     = '專案管理';
var SYNC_SHEET_DEFAULT = '輔助';
var SYNC_CELL_DEFAULT  = 'B1';
var SHEET_NAME_DEFAULT = '店家名冊';

/* 店家名冊固定欄位（A~K，B~K 為原資料，A 為新增的來源連結欄） */
var COL_SOURCE_REF = '來源分頁+行數'; /* A — 格式：分頁名稱_行數，例：問卷資料傳統_90 */
var COL_AREA      = '營業處名稱';   /* B */
var COL_OFFICE    = '營業所/課';    /* C */
var COL_STAFF     = '執行人員';     /* D */
var COL_CHANNEL   = '通路別';       /* E */
var COL_STORETYPE = '店家型態';     /* F */
var COL_CODE      = '店家代碼';     /* G */
var COL_NAME      = '店家名稱';     /* H */
var COL_GRADE     = '店家等級';     /* I */
var COL_SUPTYPE   = '分類';     /* J — 大群分組鍵 */
var COL_QUESTTYPE = '子分類';     /* K — 群內子分類 */
var COL_DATE      = '日期';         /* L — 店家查核日期 */

/* ROSTER_GROUPS: 由資料動態產生（唯一分類清單，依首次出現順序） */
var ROSTER_GROUPS = [];

/* URL 參數 */
var params   = new URLSearchParams(location.search);
var SHEET_ID = params.get('sheetId') || '';

/* 專案資訊 */
var PROJ_NAME  = '稽核型看版';
var SYNC_SHEET = SYNC_SHEET_DEFAULT;
var SYNC_CELL  = SYNC_CELL_DEFAULT;

/* 狀態 */
var allRows    = [];
var drillStack = [];
/* 時間篩選狀態：年度/季度/月份，三者可疊加（AND）；月份是季度底下的子選項，
   選了月份會自動帶出對應季度，兩者不互斥 */
var TIME_FILTER = { year:'', quarter:'', month:'' };
var _initialTimeFilterSet = false; /* 一進畫面預設帶入「當季當月」，只設定一次 */
var _dialogTitle = '';
var _dialogRows  = [];
var _dialogLevel = 'staff';
var _overallRows = [];
var _overallLevel = 'area';

/* ════ 工具 ════ */
function showLoading(){ document.getElementById('loading').classList.add('show'); }
function hideLoading(){ document.getElementById('loading').classList.remove('show'); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function numVal(v){ var n=Number(v); return (isFinite(n)&&n>=1)?n:0; }

function parseGvizDate(v) {
  var m = String(v).match(/Date\((\d+),(\d+),(\d+),(\d+),(\d+),(\d+)\)/);
  if (!m) return String(v);
  var d = new Date(+m[1], +m[2], +m[3], +m[4], +m[5], +m[6]);
  return d.toLocaleString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',timeZone:'Asia/Taipei'});
}

/* ════ 跨分頁來源連結（COL_SOURCE_REF：分頁名稱_行數） ════
   例：「問卷資料傳統_90」→ 分頁「問卷資料傳統」第 90 列（含表頭，即資料第 89 筆）
   用「最後一個底線」切分，避免分頁名稱本身含底線時誤判。 */
function _parseSourceRef(val){
  var s = String(val||'').trim();
  if(!s) return null;
  var idx = s.lastIndexOf('_');
  if(idx === -1) return null;
  var sheetName = s.substring(0, idx);
  var rowStr    = s.substring(idx+1);
  var rowNum    = parseInt(rowStr, 10);
  if(!sheetName || !rowNum || isNaN(rowNum)) return null;
  return { sheet: sheetName, row: rowNum };
}

/* 來源分頁完整資料快取：{ 分頁名稱: 解析後結構 } */
var _sourceSheetCache = {};

/*
  抓取來源分頁整頁資料，並解析「動態問卷結構」：
  ‧ Sheet 第 1 列＝大題列：某些欄位有字（大題名稱），其餘空白；
    一個大題名稱底下會橫跨好幾欄，直到下一個有字的儲存格為止。
  ‧ Sheet 第 2 列＝選項列：每一欄填該題的選項文字（如「無缺失」「缺失：位置」）。
  ‧ 第 2 列「第一個非空白值」之前的欄位，都是基本資料（人員/店家/時間…），
    這段固定資料不限欄數、會隨時間變動，所以用「掃到第一個有大題名稱的欄」
    自動切分，不寫死欄位數。
  ‧ 資料列（第 3 列起）：基本資料區直接讀值；問卷區則看哪一欄有值（如 v），
    該欄對應的「大題＋選項」就是受訪者勾選的內容（同大題可複選）。
*/
/* 除錯輔助：顯示某一列前 5 欄的原始值，方便核對 gviz 回傳的列序是否與 Sheet 實際結構對齊 */
function _debugRowPreview(row){
  if(!row || !row.c) return '(空列)';
  var out=[];
  for(var i=0;i<Math.min(5,row.c.length);i++){
    var c=row.c[i];
    var v=c?((c.v!==null&&c.v!==undefined)?c.v:(c.f||'')):'';
    out.push('['+i+']='+(v===''?'(空)':String(v)));
  }
  return out.join(' ');
}

function _fetchSourceSheet(sheetName, callback){
  if(_sourceSheetCache[sheetName]){ callback(_sourceSheetCache[sheetName]); return; }
  /* 用 tq=SELECT * 並指定 range 為整個分頁，強制 gviz 不做任何表頭自動偵測，
     確保回傳的 rows[0] 一定對應 Sheet 可見的第 1 列（現在是單行扁平化標題）。 */
  var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
    '/gviz/tq?tqx=out:json&headers=0&sheet=' + encodeURIComponent(sheetName);
  fetch(url)
    .then(function(r){ return r.text(); })
    .then(function(txt){
      var json = JSON.parse(txt.replace(/^[^\(]+\(/,'').replace(/\);?\s*$/,''));
      var tbl  = json.table || {};
      var rawRows = tbl.rows || [];
      
      // 【修改】現在只需要 1 列（標題列本身）即可通關
      if(rawRows.length < 1){ callback(null, '分頁「'+sheetName+'」完全沒有資料（連標題列都沒有）'); return; }

      function cellVal(row, i){
        if(!row) return '';
        var c = row.c && row.c[i];
        if(!c) return '';
        var v=(c.v!==null&&c.v!==undefined)?c.v:'';
        var f=c.f||'';
        if(typeof v==='string' && /^Date\(/.test(v)) return f || parseGvizDate(v);
        return (v!==''&&v!==null&&v!==undefined)?v:f;
      }

      var headerRow = rawRows[0]; /* 單行標題列（Sheet 第 1 列） */
      var colCount = (headerRow.c || []).length;

      var baseColNames = [];
      var quizCols = []; /* [{col, section, option}] */

      /* 【修改】核心邏輯：掃描單行標題，自動用底線拆分「基本資料」與「問卷題組」 */
      for (var i = 0; i < colCount; i++) {
        var headerText = String(cellVal(headerRow, i) || '').trim();
        if (!headerText) continue; // 欄位名稱為空則跳過

        if (headerText.indexOf('_') !== -1) {
          // 發現底線（如：TTL陳列及販售品項_0.6L金牌）
          var parts = headerText.split('_');
          var bigTitle = parts[0].trim();
          var optionName = parts.slice(1).join('_').trim(); // 防止選項本身也帶有底線
          
          quizCols.push({ col: i, section: bigTitle, option: optionName });
        } else {
          // 沒有底線（如：月份、營業處、店家代碼），視為基本資料欄位
          baseColNames.push(headerText);
        }
      }

      /* 【修改】解析資料列：從 rawRows[1] 開始（對應 Sheet 第 2 列起），
         因為現在只有第 1 列是標題，第 2 列就是第一筆資料了。 */
      var rowsByNum = {};
      for(var ri=1; ri<rawRows.length; ri++){
        var row = rawRows[ri];
        var baseData = {};
        
        // 抓取基本資料
        baseColNames.forEach(function(name){
          // 找出該基本資料欄名在 headerRow 中的真實索引
          var bi = -1;
          for(var cIdx=0; cIdx<colCount; cIdx++){
            if(String(cellVal(headerRow, cIdx)||'').trim() === name){ bi = cIdx; break; }
          }
          baseData[name] = bi !== -1 ? cellVal(row, bi) : '';
        });

        /* sections[大題名稱] = [{option, value}, ...]（同大題可複選） */
        var sections = {}; var sectionOrder = [];
        quizCols.forEach(function(qc){
          var v = String(cellVal(row, qc.col)||'').trim();
          if(!v) return; /* 該欄沒填值，跳過 */
          if(!sections[qc.section]){ sections[qc.section]=[]; sectionOrder.push(qc.section); }
          sections[qc.section].push({ option:qc.option, value:v });
        });

        // 換算成對應 Excel/Sheet 的實際列號 (rawRows[0] 是第 1 列，則 rawRows[ri] 是第 ri+1 列)
        var sheetRowNum = ri + 1; 
        rowsByNum[sheetRowNum] = {
          base: baseData,
          sections: sectionOrder.map(function(s){ return { section:s, picks:sections[s] }; })
        };
      }

      if(quizCols.length === 0){
        callback(null, '分頁「'+sheetName+'」未偵測到任何帶有「_」底線的問卷題組欄位，請檢查標題列格式。'
          +' [除錯] 標題前5欄：'+_debugRowPreview(headerRow)); return;
      }

      // 移除原本的「大題與基本資料同名」防呆，因為單行結構不會發生 gviz 雙行錯位問題
      var result = { baseColNames: baseColNames, quizCols: quizCols, rowsByNum: rowsByNum, _debugRows: rawRows.slice(0,3) };
      _sourceSheetCache[sheetName] = result;
      callback(result);
    })
    .catch(function(err){
      callback(null, String(err));
    });
}

/* 依 COL_SOURCE_REF 抓單筆來源問卷的完整內容 */
function _fetchSourceRowDetail(refVal, callback){
  var ref = _parseSourceRef(refVal);
  if(!ref){ callback(null, null, '找不到來源連結欄位或格式不符'); return; }
  _fetchSourceSheet(ref.sheet, function(sheetData, err){
    if(err){ callback(null, ref, '讀取分頁「'+ref.sheet+'」失敗：'+err); return; }
    if(!sheetData){ callback(null, ref, '讀取分頁「'+ref.sheet+'」失敗'); return; }
    var rowData = sheetData.rowsByNum[ref.row];
    if(!rowData){ callback(null, ref, '分頁「'+ref.sheet+'」第 '+ref.row+' 列查無資料（可能是表頭列或超出範圍）', sheetData); return; }
    callback(rowData, ref, null, sheetData);
  });
}

function init() {
  if (!SHEET_ID) {
    hideLoading();
    document.getElementById('stage').innerHTML = '<div class="empty">⚠️ 缺少 sheetId 參數</div>';
    return;
  }

  /* 讀「專案管理」分頁 */
  var urlMgmt = 'https://docs.google.com/spreadsheets/d/' + MGMT_ID +
    '/gviz/tq?tqx=out:json&headers=1&sheet=' + encodeURIComponent(MGMT_SHEET);
  fetch(urlMgmt)
    .then(function(r){ return r.text(); })
    .then(function(txt){
      var json = JSON.parse(txt.replace(/^[^\(]+\(/,'').replace(/\);?\s*$/,''));
      var rows = (json.table && json.table.rows) || [];
      var auditProjs = [];
      rows.forEach(function(row){
        var cells = row.c || [];
        function cv(c){ return c ? String(c.v!==null&&c.v!==undefined?c.v:c.f||'').trim() : ''; }
        var active    = cv(cells[0]).toUpperCase() === 'ON';
        var name      = cv(cells[1]);
        var sid       = cv(cells[2]);
        var sheet     = cv(cells[3]) || SHEET_NAME_DEFAULT;
        var sync      = cv(cells[4]) || SYNC_SHEET_DEFAULT;
        var cell      = cv(cells[5]) || SYNC_CELL_DEFAULT;
        var boardType = cv(cells[6]);
        if (!name || !sid) return;
        if (boardType !== '稽核管理型') return;
        if (sid === SHEET_ID) {
          PROJ_NAME  = name;
          SHEET_NAME = sheet;
          SYNC_SHEET = sync;
          SYNC_CELL  = cell;
        }
        auditProjs.push({ name:name, id:sid, active:active });
      });

      document.getElementById('tb-title').textContent = PROJ_NAME;
      document.title = PROJ_NAME;

      var onProjs = auditProjs.filter(function(p){ return p.active; });
      if (onProjs.length > 1) {
        var sel = document.getElementById('proj-sel');
        sel.innerHTML = onProjs.map(function(p){
          return '<option value="'+esc(p.id)+'"'+(p.id===SHEET_ID?' selected':'')+'>'+ esc(p.name)+'</option>';
        }).join('');
        sel.style.display = '';
      }

      fetchOrgSkeleton(fetchSheet);
      fetchSyncTime();
    })
    .catch(function(){
      document.getElementById('tb-title').textContent = PROJ_NAME;
      fetchOrgSkeleton(fetchSheet);
      fetchSyncTime();
    });
}

/* ════ 讀單位名冊骨架 ════ */
function fetchOrgSkeleton(callback) {
  var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
    '/gviz/tq?tqx=out:json&headers=1&sheet=' + encodeURIComponent('單位名冊');
  fetch(url)
    .then(function(r){ return r.text(); })
    .then(function(txt){
      var json = JSON.parse(txt.replace(/^[^\(]+\(/,'').replace(/\);?\s*$/,''));
      var rows = (json.table && json.table.rows) || [];
      var skeleton = {}; /* { '北部': ['中和','蘆洲',...], ... } */
      rows.forEach(function(row){
        var c = row.c || [];
        var area   = c[0] ? String(c[0].v||c[0].f||'').trim() : '';
        var office = c[1] ? String(c[1].v||c[1].f||'').trim() : '';
        if(!area || !office) return;
        if(!skeleton[area]) skeleton[area] = [];
        if(skeleton[area].indexOf(office)===-1) skeleton[area].push(office);
      });
      ORG_SKELETON = skeleton;
    })
    .catch(function(){ ORG_SKELETON = {}; })
    .then(function(){ callback(); });
}

/* ════ 讀主資料 ════ */
var FIXED_COLS = [
  '來源分頁+行數',
  '營業處名稱','營業所/課','執行人員','通路別',
  '店家型態','店家代碼','店家名稱','店家等級',
  '分類','子分類','日期'
];

function fetchSheet() {
  showLoading();
  var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
    '/gviz/tq?tqx=out:json&headers=1&sheet=' + encodeURIComponent(SHEET_NAME);
  fetch(url)
    .then(function(r){ return r.text(); })
    .then(function(txt){
      var json = JSON.parse(txt.replace(/^[^\(]+\(/,'').replace(/\);?\s*$/,''));
      var tbl  = json.table || {};
      var cols = (tbl.cols||[]).map(function(c){ return c.label||''; });
      allRows = (tbl.rows||[]).map(function(row, ridx){
        var obj = {};
        (row.c||[]).forEach(function(cell,i){
          var colName = cols[i];
          if (FIXED_COLS.indexOf(colName) === -1) return; /* 只讀取指定欄位（含來源連結欄） */
          if (!cell) { obj[colName]=''; return; }
          var v=(cell.v!==null&&cell.v!==undefined)?cell.v:'';
          var f=cell.f||'';
          /* 日期欄位：優先用 formatted value（f），再 fallback parseGvizDate(v) */
          if(colName === '日期'){
            if(f) obj[colName]=f;
            else if(v) obj[colName]=parseGvizDate(String(v));
            else obj[colName]='';
          } else {
            obj[colName]=(v!==''&&v!==null&&v!==undefined)?v:f;
          }
        });
        obj.__rid = 'row'+ridx;
        return obj;
      }).filter(function(r){
        /* 過濾掉完全空白列 */
        return FIXED_COLS.some(function(c){ return String(r[c]||'').trim(); });
      });

      /* 由資料建立 ROSTER_GROUPS（唯一分類，依首次出現順序） */
      var seen = {};
      ROSTER_GROUPS = [];
      allRows.forEach(function(r){
        var st = String(r[COL_SUPTYPE]||'').trim();
        if (st && !seen[st]) { seen[st]=true; ROSTER_GROUPS.push(st); }
      });

      /* 一進畫面預設帶入「當季當月」篩選（僅初次載入設定一次，
         之後使用者自行切換／清除篩選，不會再被這段覆蓋） */
      if(!_initialTimeFilterSet){
        _initialTimeFilterSet = true;
        var _tp = new Intl.DateTimeFormat('en-US',{timeZone:'Asia/Taipei',year:'numeric',month:'numeric'}).formatToParts(new Date());
        var _yy = (_tp.find(function(p){ return p.type==='year'; })||{}).value;
        var _mm = parseInt((_tp.find(function(p){ return p.type==='month'; })||{}).value, 10);
        if(_yy && _mm){
          TIME_FILTER = { year:_yy, quarter:(_mm<=3?'Q1':_mm<=6?'Q2':_mm<=9?'Q3':'Q4'), month:_mm };
        }
      }

      render();
    })
    .catch(function(err){
      hideLoading();
      document.getElementById('stage').innerHTML = '<div class="empty">⚠️ 載入失敗：'+err+'</div>';
    });
}

function fetchSyncTime() {

  fetch(url).then(function(r){ return r.text(); }).then(function(txt){

/* ════ 計算 ════ */
/* 對一批 rows，依 ROSTER_GROUPS（分類）統計店家數與子分類子分佈 */
function calcAudit(rows) {
  /* groups[i] = { label:分類, stores:Set, questMap:{子分類:Set} } */
  var groups = ROSTER_GROUPS.map(function(g){
    return { label:g, stores:new Set(), records:0, staffMap:{}, staffRecMap:{}, questMap:{}, questRecMap:{} };
  });
  var totalStores = new Set();
  var totalRecords = 0;

  rows.forEach(function(r){
    var supType  = String(r[COL_SUPTYPE]||'').trim();
    var questType= String(r[COL_QUESTTYPE]||'').trim();
    var code     = String(r[COL_CODE]||'').trim();
    if (!code) return;
    if (!supType) return;

    totalStores.add(code);
    totalRecords++;

    var staff = String(r[COL_STAFF]||'').trim();
    groups.forEach(function(g){
      if (g.label !== supType) return;
      g.stores.add(code);
      g.records++;
      if (staff) {
        if (!g.staffMap[staff]) { g.staffMap[staff] = new Set(); g.staffRecMap[staff] = 0; }
        g.staffMap[staff].add(code);
        g.staffRecMap[staff]++;
      }
      if (questType) {
        if (!g.questMap[questType]) { g.questMap[questType] = new Set(); g.questRecMap[questType] = 0; }
        g.questMap[questType].add(code);
        g.questRecMap[questType]++;
      }
    });
  });

  return {
    totalStores: totalStores.size,
    totalRecords: totalRecords,
    groups: groups.map(function(g){
      var subItems = Object.keys(g.questMap).sort().map(function(qt){
        return { label:qt, stores:g.questMap[qt].size, records:g.questRecMap[qt] };
      });
      var staffList = Object.keys(g.staffMap).map(function(s){
        return { name:s, stores:g.staffMap[s].size, records:g.staffRecMap[s] };
      }).sort(function(a,b){ return b.stores-a.stores || a.name.localeCompare(b.name); });
      return { label:g.label, stores:g.stores.size, records:g.records, subItems:subItems, staffList:staffList };
    })
  };
}

/* ════ 篩選 ════ */
/* 時間維度解析：從 COL_DATE（yyyy-mm-dd 字串）解析年度、季度（自然年／日曆季）、月份 */
function _parseDateParts(dateStr){
  var s = String(dateStr||'').trim();
  if(!s) return null;
  var m = s.match(/^(\d{4})-(\d{1,2})(?:-(\d{1,2}))?/);
  if(!m) return null;
  var y = m[1], mo = parseInt(m[2],10);
  if(!mo || mo<1 || mo>12) return null;
  var q = mo<=3?'Q1':mo<=6?'Q2':mo<=9?'Q3':'Q4';
  return { year:y, month:mo, quarter:q };
}
function getTimeFilteredRows(rows){
  if(!TIME_FILTER.year && !TIME_FILTER.quarter && !TIME_FILTER.month) return rows;
  return rows.filter(function(r){
    var p = _parseDateParts(r[COL_DATE]);
    if(!p) return false; /* 篩選中但無日期可比對 → 不列入 */
    if(TIME_FILTER.year && p.year !== TIME_FILTER.year) return false;
    if(TIME_FILTER.quarter && p.quarter !== TIME_FILTER.quarter) return false;
    if(TIME_FILTER.month && p.month !== TIME_FILTER.month) return false;
    return true;
  });
}
function setTimeFilter(dim,val){
  if(TIME_FILTER[dim]===val){
    TIME_FILTER[dim]='';
    /* 收合季度時，底下月份篩選（屬於該季度）一併清除 */
    if(dim==='quarter') TIME_FILTER.month='';
  } else {
    TIME_FILTER[dim]=val;
    /* 月份是季度底下展開出來的子選項，不是互斥維度：
       選月份時自動帶出對應季度；換季度時月份已不屬於新季度，須清空 */
    if(dim==='quarter') TIME_FILTER.month='';
    if(dim==='month'){
      TIME_FILTER.quarter = val<=3?'Q1':val<=6?'Q2':val<=9?'Q3':'Q4';
    }
  }
  render();
}
function clearTimeFilter(){ TIME_FILTER={year:'',quarter:'',month:''}; render(); }

function getCurrentRows(){
  var rows = getTimeFilteredRows(allRows);
  if(!drillStack.length) return rows;
  drillStack.forEach(function(d){
    var col;
    if(d.level==='area')   col=COL_AREA;
    else if(d.level==='office') col=COL_OFFICE;
    else if(d.level==='staff')  col=COL_STAFF;
    if(col) rows=rows.filter(function(r){ return String(r[col]||'')===d.key; });
  });
  return rows;
}
function getNextGroups(rows,col){
  var map={};
  rows.forEach(function(r){
    var k=String(r[col]||''); if(!k) return;
    if(!map[k]) map[k]=[];
    map[k].push(r);
  });
  return map;
}

function updateStickyTops(){

}

function renderLevel(stage,rows,col,levelKey,labelText,overallName){
  var groups=getNextGroups(rows,col);
  var keys;

  if(levelKey==='area'){
    var skAreas = ORG_SKELETON ? Object.keys(ORG_SKELETON) : [];
    skAreas.sort(function(a,b){
      var ia=AREA_ORDER.indexOf(a), ib=AREA_ORDER.indexOf(b);
      if(ia===-1&&ib===-1) return 0;
      if(ia===-1) return 1; if(ib===-1) return -1;
      return ia-ib;
    });
    var extra=Object.keys(groups).filter(function(k){ return skAreas.indexOf(k)===-1; });
    keys=skAreas.concat(extra);
  } else if(levelKey==='office' && drillStack.length>=1){
    var currentArea=drillStack[drillStack.length-1].key;
    var skOffices=(ORG_SKELETON && ORG_SKELETON[currentArea]) || [];
    var extraO=Object.keys(groups).filter(function(k){ return skOffices.indexOf(k)===-1; });
    keys=skOffices.concat(extraO);
  } else {
    keys=Object.keys(groups);
    keys.sort(function(a,b){ return calcAudit(groups[b]||[]).totalStores-calcAudit(groups[a]||[]).totalStores; });
  }

  if(!keys.length){ stage.innerHTML='<div class="empty">無資料</div>'; return; }

  var statCache={};
  keys.forEach(function(k){ statCache[k]=calcAudit(groups[k]||[]); });

  var div=document.createElement('div');
  div.innerHTML='<div class="level-label">'+esc(labelText)+'</div>';
  var grid=document.createElement('div'); grid.className='grid';

  _overallRows=rows; _overallLevel=levelKey;
  var overallStat=calcAudit(rows);
  var overallCard=buildCard(overallName,labelText,overallStat,levelKey,rows,true);
  grid.appendChild(overallCard);
  keys.forEach(function(k){ grid.appendChild(buildCard(k,labelText,statCache[k],levelKey,groups[k]||[],false)); });
  div.appendChild(grid);
  stage.appendChild(div);
}

/* ════ 卡片 ════ */
function buildCard(name,labelText,stat,levelKey,rows,isOverall){
  var card=document.createElement('div');
  card.className='card'+(isOverall?' card-overall':'');
  var ttId='tt-'+String(name).replace(/[^a-zA-Z0-9]/g,'_')+'-'+levelKey+(isOverall?'-all':'');

  var topHtml='<div class="card-top-inline">'
    +esc(isOverall?'整體概況':labelText)
    +' <span class="card-name-inline">'+esc(name)+'</span>'
    +'<button class="card-detail-btn" id="dbtn-'+ttId+'">📋 明細</button>'
    +'</div>';

  /* 總計格 */
  var statRowHtml='<div class="stat-row">'
    +'<div class="stat-item" id="sigtotal-'+ttId+'">'
    +'<div class="stat-label">總份數</div>'
    +'<div class="stat-val">'+stat.totalRecords+'</div>'
    +'<div class="stat-sub">份</div>'
    +'<div class="tooltip" id="ttgtotal-'+ttId+'">'
      +'<div class="tt-title">總計</div>'
      +'<div class="tt-row"><span class="tt-label" style="color:#2D2D2D;">份數／家數</span><span class="tt-val">'+stat.totalRecords+' 份　'+stat.totalStores+' 家</span></div>'
    +'</div>'
    +'</div>';

  /* 各分類群格 */
  stat.groups.forEach(function(g,gi){
    var ttGId='ttg'+gi+'-'+ttId;
    var subHtml='';
    if(g.staffList && g.staffList.length){
      g.staffList.forEach(function(s){
        subHtml+='<div class="tt-row"><span class="tt-label" style="color:#2D2D2D;">'+esc(s.name)+'</span><span class="tt-val">'+s.records+' 份　'+s.stores+' 家</span></div>';
      });
    }
    statRowHtml+='<div class="stat-item grp" id="sig'+gi+'-'+ttId+'">'
      +'<div class="stat-label">'+esc(g.label)+'</div>'
      +'<div class="stat-val">'+g.records+'</div>'
      +'<div class="stat-sub">份</div>'
      +'<div class="tooltip" id="'+ttGId+'">'
        +'<div class="tt-title">'+esc(g.label)+'</div>'
        +'<div class="tt-row"><span class="tt-label" style="color:#2D2D2D;">份數／家數</span><span class="tt-val">'+g.records+' 份　'+g.stores+' 家</span></div>'
        +subHtml
      +'</div>'
    +'</div>';
  });
  statRowHtml+='</div>';

  card.innerHTML=topHtml+statRowHtml;

  /* 綁定 tooltip */
  var siTotalEl=card.querySelector('#sigtotal-'+ttId);
  var ttTotalEl=card.querySelector('#ttgtotal-'+ttId);
  if(siTotalEl&&ttTotalEl) bindTooltip(siTotalEl,ttTotalEl,card);
  stat.groups.forEach(function(g,gi){
    var siEl=card.querySelector('#sig'+gi+'-'+ttId);
    var ttEl=card.querySelector('#ttg'+gi+'-'+ttId);
    if(siEl&&ttEl) bindTooltip(siEl,ttEl,card);
  });

  /* 明細按鈕 */
  card.querySelector('#dbtn-'+ttId).addEventListener('click',function(e){
    e.stopPropagation(); openDialog(name,levelKey,rows);
  });

  /* 卡片點擊 */
  card.addEventListener('click',function(e){
    if(window._lastLongPress&&Date.now()-window._lastLongPress<600) return;
    if(e.target.closest('#dbtn-'+ttId)) return;
    if(isOverall){ openDialog(name,levelKey,rows); return; }
    var isLeaf=(levelKey==='staff');
    if(isLeaf) openDialog(name,levelKey,rows);
    else drillDown(levelKey,name);
  });
  return card;
}

/* ════ Tooltip ════ */
function bindTooltip(triggerEl,ttEl,card){
  function positionTooltip(){
    var cardRect=card.getBoundingClientRect();
    var stickyH=(document.querySelector('.toolbar')||{offsetHeight:52}).offsetHeight
               +(document.getElementById('quicknav')||{offsetHeight:40}).offsetHeight+20;
    ttEl.classList.toggle('flip',cardRect.top<stickyH+120);
    ttEl.style.left=''; ttEl.style.right=''; ttEl.style.transform='';
    var ttRect=ttEl.getBoundingClientRect(), vw=window.innerWidth;
    if(ttRect.right>vw-8){ ttEl.style.left='auto'; ttEl.style.right='0'; ttEl.style.transform='none'; }
    else if(ttRect.left<8){ ttEl.style.left='0'; ttEl.style.transform='none'; }
  }
  triggerEl.addEventListener('mouseenter',function(e){ e.stopPropagation(); ttEl.classList.add('show'); positionTooltip(); });
  triggerEl.addEventListener('mouseleave',function(){ ttEl.classList.remove('show'); ttEl.classList.remove('flip'); });
  var _pressTimer=null;
  triggerEl.addEventListener('touchstart',function(){
    _pressTimer=setTimeout(function(){
      window._lastLongPress=Date.now();
      document.querySelectorAll('.tooltip.show').forEach(function(el){ el.classList.remove('show'); });
      ttEl.classList.add('show'); positionTooltip();
      function dismissOnce(ev){ if(!ttEl.contains(ev.target)){ ttEl.classList.remove('show'); document.removeEventListener('touchstart',dismissOnce); } }
      setTimeout(function(){ document.addEventListener('touchstart',dismissOnce); },50);
    },480);
  },{passive:true});
  triggerEl.addEventListener('touchend',function(){ clearTimeout(_pressTimer); });
  triggerEl.addEventListener('touchmove',function(){ clearTimeout(_pressTimer); },{passive:true});
}

/* ════ Drill ════ */
function drillDown(levelKey,key){ drillStack.push({level:levelKey,key:key}); render(); }
function drillTo(idx){ drillStack=idx<0?[]:drillStack.slice(0,idx+1); render(); }

/* ════ Quicknav ════
   時間篩選按鈕列：年度／季度／月份，風格與地區頁籤(quicknav)一致，與地區篩選疊加生效。
   規則（依需求調整）：
   ‧ 季度、月份都只列出「資料裡實際出現過」的選項，不是把 Q1~Q4／1~12月固定全列出來。
   ‧ 月份是季度展開出來的下一層，只有選了季度之後才會出現，
     且只列出該季度範圍內、資料實際有出現的月份。
   ‧ 季度的可選範圍會先依目前選定的年度縮小（若有選年度的話）。 */
var QUARTER_MONTHS = { Q1:[1,2,3], Q2:[4,5,6], Q3:[7,8,9], Q4:[10,11,12] };
function buildTimenav(){
  var nav=document.getElementById('timenav');
  if(!nav) return;
  nav.innerHTML='';
  function addGroup(btns){
    var g=document.createElement('div'); g.className='qn-group';
    btns.forEach(function(b){ g.appendChild(b); }); nav.appendChild(g);
  }

  /* 年度：從資料中動態取得，新到舊排序 */
  var yearSet={};
  allRows.forEach(function(r){
    var p=_parseDateParts(r[COL_DATE]);
    if(p) yearSet[p.year]=true;
  });
  var years=Object.keys(yearSet).sort().reverse();
  if(years.length){
    var yLbl=document.createElement('span'); yLbl.className='qn-label'; yLbl.textContent='年度';
    var yGrp=[yLbl];
    years.forEach(function(y){
      var b=document.createElement('button');
      b.className='qn-btn'+(TIME_FILTER.year===y?' active':'');
      b.textContent=y+'年';
      b.onclick=function(){ setTimeFilter('year',y); };
      yGrp.push(b);
    });
    addGroup(yGrp);
  }

  /* 季度：只列出（在目前年度篩選範圍內）資料實際有出現的季度 */
  var yearRows = TIME_FILTER.year ? allRows.filter(function(r){
    var p=_parseDateParts(r[COL_DATE]); return p && p.year===TIME_FILTER.year;
  }) : allRows;
  var qSet={};
  yearRows.forEach(function(r){ var p=_parseDateParts(r[COL_DATE]); if(p) qSet[p.quarter]=true; });
  var qOrder=['Q1','Q2','Q3','Q4'].filter(function(q){ return qSet[q]; });
  if(qOrder.length){
    var qLbl=document.createElement('span'); qLbl.className='qn-label'; qLbl.textContent='季度';
    var qGrp=[qLbl];
    qOrder.forEach(function(q){
      var b=document.createElement('button');
      b.className='qn-btn'+(TIME_FILTER.quarter===q?' active':'');
      b.textContent=q;
      b.onclick=function(){ setTimeFilter('quarter',q); };
      qGrp.push(b);
    });
    addGroup(qGrp);
  }

  /* 月份：只有選定季度後才展開，且只列出該季度內資料實際有出現的月份 */
  if(TIME_FILTER.quarter){
    var qRows = yearRows.filter(function(r){
      var p=_parseDateParts(r[COL_DATE]); return p && p.quarter===TIME_FILTER.quarter;
    });
    var mSet={};
    qRows.forEach(function(r){ var p=_parseDateParts(r[COL_DATE]); if(p) mSet[p.month]=true; });
    var mOrder=(QUARTER_MONTHS[TIME_FILTER.quarter]||[]).filter(function(m){ return mSet[m]; });
    if(mOrder.length){
      var mLbl=document.createElement('span'); mLbl.className='qn-label'; mLbl.textContent='月份';
      var mGrp=[mLbl];
      mOrder.forEach(function(m){
        var b=document.createElement('button');
        b.className='qn-btn'+(TIME_FILTER.month===m?' active':'');
        b.textContent=m+'月';
        b.onclick=function(){ setTimeFilter('month',m); };
        mGrp.push(b);
      });
      addGroup(mGrp);
    }
  }

  /* 清除時間篩選（僅在有篩選中時顯示） */
  if(TIME_FILTER.year||TIME_FILTER.quarter||TIME_FILTER.month){
    var clrBtn=document.createElement('button');
    clrBtn.className='qn-btn';
    clrBtn.textContent='✕ 清除時間篩選';
    clrBtn.onclick=clearTimeFilter;
    addGroup([clrBtn]);
  }
}

function buildQuicknav(){
  var nav=document.getElementById('quicknav'); nav.innerHTML='';
  function addGroup(btns){
    var g=document.createElement('div'); g.className='qn-group';
    btns.forEach(function(b){ g.appendChild(b); }); nav.appendChild(g);
  }
  /* 全覽 */
  var homeBtn=document.createElement('button');
  homeBtn.className='qn-btn home'+(drillStack.length===0?' active':'');
  homeBtn.textContent='全覽';
  homeBtn.onclick=function(){ drillStack=[]; render(); };
  addGroup([homeBtn]);

  /* 層級麵包屑 */
  drillStack.forEach(function(d,i){
    var btn=document.createElement('button');
    btn.className='qn-btn active';
    btn.textContent=d.key;
    btn.onclick=function(){ drillTo(i); };
    addGroup([btn]);
  });

  /* 快捷：頂層顯示各區按鈕 */
  if(drillStack.length===0){
    var areaGroups=getNextGroups(getTimeFilteredRows(allRows),COL_AREA);
    var aKeys=Object.keys(areaGroups).sort(function(a,b){
      var ia=AREA_ORDER.indexOf(a),ib=AREA_ORDER.indexOf(b);
      if(ia===-1&&ib===-1) return a>b?1:-1;
      if(ia===-1) return 1; if(ib===-1) return -1;
      return ia-ib;
    });
    if(aKeys.length>1){
      var lbl=document.createElement('span'); lbl.className='qn-label'; lbl.textContent='快捷';
      var grp=[lbl];
      aKeys.forEach(function(k){
        var b=document.createElement('button'); b.className='qn-btn';
        b.textContent=k;
        b.onclick=function(){ drillStack=[{level:'area',key:k}]; render(); };
        grp.push(b);
      });
      addGroup(grp);
    }
  }
}

/* ════════════════════════════════════════════════════════
   DETAIL DIALOG ─ 兩模式維度 + 欄位雙向排序
   模式一：處›所/課›人員›分類
   模式二：處›人員›分類›所/課
*/

var DIM_STORAGE_KEY = 'ttl_audit_dim_mode_v4';
var DIM_MODES = {
  '1': ['suptype','office','staff','questtype'],   /* 所→人：處›分類›所›人›子分類 */
  '2': ['suptype','staff','office','questtype'],   /* 人→所：處›分類›人›所›子分類 */
  '3': ['suptype','questtype','office','staff']    /* 分→子：處›分類›子分類›所›人 */
};
var DIM_META = {
  area:      { icon:'🏢', label:'營業處' },
  office:    { icon:'📁', label:'所/課'  },
  suptype:   { icon:'📋', label:'分類' },
  staff:     { icon:'👤', label:'人員'   },
  questtype: { icon:'📄', label:'子分類' }
};
var _dlgDimMode=_loadDimMode(), _dlgListMode=false, _dlgExpandMap={}, _dlgSortState={}, _dlgAllExpanded=false;

/* 【新增】四個維度（分類／所課／人員／子分類）各自獨立的 on/off 狀態，
   不論目前選的是哪一種排序模式（所→人／人→所／分→子），都可以把其中幾層關掉，
   關掉的層級直接跳過、不佔一層縮排，適合「只想看某個人員/單位資料，懶得逐層點開」的情境。
   跟排序模式一樣存 localStorage，記住使用者上次的設定。 */
var DIM_ACTIVE_STORAGE_KEY = 'ttl_audit_dim_active_v1';
var DIM_TOGGLABLE = ['suptype','office','staff','questtype'];
function _loadDimActive(){
  var def = { suptype:true, office:true, staff:true, questtype:true };
  try{
    var v = localStorage.getItem(DIM_ACTIVE_STORAGE_KEY);
    if(v){
      var o = JSON.parse(v);
      DIM_TOGGLABLE.forEach(function(d){ def[d] = o[d]!==false; });
    }
  }catch(e){}
  return def;
}
function _saveDimActive(){ try{ localStorage.setItem(DIM_ACTIVE_STORAGE_KEY, JSON.stringify(_dlgDimActive)); }catch(e){} }
var _dlgDimActive = _loadDimActive();

function _loadDimMode(){
  try{ var v=localStorage.getItem(DIM_STORAGE_KEY); if(v==='1'||v==='2'||v==='3') return v; }catch(e){}
  return '1';  /* 預設模式一：處›分類›所›人›子分類 */
}
function _saveDimMode(){ try{ localStorage.setItem(DIM_STORAGE_KEY,_dlgDimMode); }catch(e){} }
function _getDimOrder(){ return DIM_MODES[_dlgDimMode].filter(function(d){ return _dlgDimActive[d]!==false; }); }

function openDialog(name,levelKey,rows){
  _dialogTitle=name; _dialogLevel=levelKey; _dialogRows=rows;
  _dlgListMode=false; _dlgExpandMap={}; _dlgSortState={}; _dlgAllExpanded=false;
  var stat=calcAudit(rows);
  var ctx=drillStack.map(function(d){ return d.key; });
  ctx.push(name);
  var parts=['共 '+_fmtRecStore(stat.totalRecords, stat.totalStores)];
  stat.groups.forEach(function(g){ parts.push(esc(g.label)+'：'+_fmtRecStore(g.records, g.stores)); });
  document.getElementById('dlg-title').innerHTML=
    '<div style="font-size:14px;font-weight:900;line-height:1.3;">【'+ctx.join(' › ')+'】查核明細</div>'
    +'<div style="font-size:12px;color:#2D2D2D;font-weight:600;margin-top:2px;">'+parts.join('　')+'</div>';
  _renderDimBar(); _renderDlgContent();
  var dlg=document.getElementById('detail-dialog');
  dlg.style.display='flex';
  setTimeout(function(){ dlg.classList.add('open'); },10);
}
function closeDialog(){
  var dlg=document.getElementById('detail-dialog');
  dlg.classList.remove('open');
  setTimeout(function(){ dlg.style.display='none'; },220);
}
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){ closeDialog(); closeSummaryDialog(); closePhotoGalleryDialog(); }
});

function _renderDimBar(){
  var bar=document.getElementById('dlg-dim-bar');
  /* 【修改】麵包屑一律照「目前排序模式」的完整順序把 4 個維度都列出來（即使被關掉），
     這樣使用者才能點回去重新打開；真正決定資料樹要不要展開那一層的是 _getDimOrder()
     （只回傳 active 的維度）。 */
  var fullOrderDims = DIM_MODES[_dlgDimMode];
  var p='<div class="dim-path"><div class="dim-tag-locked"><span class="lock-icon">🔒</span>🏢 營業處</div>';
  fullOrderDims.forEach(function(d){
    var m=DIM_META[d];
    var isOn = _dlgDimActive[d]!==false;
    p+='<span class="dim-sep">›</span><div class="dim-badge'+(isOn?'':' off')+'" onclick="_dlgToggleDimActive(\''+d+'\')" title="'+(isOn?'點擊隱藏此層':'點擊顯示此層')+'">'+m.icon+' '+m.label+'</div>';
  });
  p+='</div>';
  var expandLabel = _dlgAllExpanded ? '⊟ 全摺疊' : '⊞ 全展開';
  var c='<div class="dim-mode-group">'
    +'<button class="dim-mode-btn'+(_dlgDimMode==='1'?' active':'')+'" onclick="_setDimMode(\'1\')" title="處›分類›所›人›子分類">所→人</button>'
    +'<button class="dim-mode-btn'+(_dlgDimMode==='2'?' active':'')+'" onclick="_setDimMode(\'2\')" title="處›分類›人›所›子分類">人→所</button>'
    +'<button class="dim-mode-btn'+(_dlgDimMode==='3'?' active':'')+'" onclick="_setDimMode(\'3\')" title="處›分類›子分類›所›人">分→子</button>'
    +'<button class="dim-list-btn" onclick="_dlgToggleExpandAll()">'+expandLabel+'</button>'
    +'<button class="dim-list-btn'+(_dlgListMode?' active':'')+'" onclick="_dlgToggleList()">📄 明細</button>'
    +'</div>';
  bar.innerHTML=p+c;
}
/* 點擊麵包屑上的 分類／所課／人員／子分類 badge，切換該層 on/off；
   不論現在是所→人／人→所／分→子哪個排序模式都能用，設定會存 localStorage 記住。
   關閉的層級會直接從資料樹跳過（不佔縮排），例如把「所/課」關掉，
   就會從「分類」直接跳到「人員」，適合只想看特定人員/單位、懶得逐層展開的情境。 */
function _dlgToggleDimActive(dim){
  _dlgDimActive[dim] = !(_dlgDimActive[dim]!==false);
  _saveDimActive();
  _dlgExpandMap={}; _dlgSortState={}; _dlgAllExpanded=false;
  _renderDimBar(); _renderDlgContent();
}
function _setDimMode(m){
  _dlgDimMode=m; _saveDimMode();
  _dlgExpandMap={}; _dlgSortState={}; _dlgListMode=false; _dlgAllExpanded=false;
  _renderDimBar(); _renderDlgContent();
}
function _dlgToggleList(){
  _dlgListMode=!_dlgListMode; _renderDimBar(); _renderDlgContent();
}

/* ── 全展開 / 全摺疊 ── */
function _dlgToggleExpandAll(){
  _dlgAllExpanded = !_dlgAllExpanded;
  if(_dlgAllExpanded){
    /* 遞迴走資料樹，產生所有節點的 rid */
    _dlgExpandMap = {};
    var fullDims = ['area'].concat(_getDimOrder());
    function _collectRids(rows, dimIdx, parentRid){
      if(dimIdx >= fullDims.length) return;
      var dim = fullDims[dimIdx];
      var col = DIM_COL[dim]();
      var seen = {}, order = [];
      rows.forEach(function(r){
        var k = String(r[col]||'').trim();
        if(!k) return;
        if(!seen[k]){ seen[k]=[]; order.push(k); }
        seen[k].push(r);
      });
      order.forEach(function(key){
        var rid = (parentRid||'r')+'-d'+dimIdx+'-'+_rid(key);
        _dlgExpandMap[rid] = true;
        _collectRids(seen[key], dimIdx+1, rid);
      });
    }
    _collectRids(_dialogRows, 0, '');
  } else {
    _dlgExpandMap = {};
  }
  _renderDimBar(); _renderDlgContent();
}

/* ── 詳細文字：依模式展開到所/人 ── */
function _buildDialogLineDetail(){
  var ctx = drillStack.map(function(d){ return d.key; });
  ctx.push(_dialogTitle);
  var MODE_NAMES = { '1':'所→人', '2':'人→所', '3':'分→子' };
  var mode = MODE_NAMES[_dlgDimMode] || _dlgDimMode;
  var lines = [
    '📋 查核明細（詳細）─ '+PROJ_NAME,
    '📍 '+ctx.join(' › '),
    '🔀 模式：'+mode,
    '🏪 合計：'+_fmtRecStore(_countRows(_dialogRows), _countCodes(_dialogRows)),
    ''
  ];

  /* 通用逐層展開：處固定第0層，之後依當前模式的維度順序逐層展開，
     展開到倒數第二層為止（最後一層留給明細表本身，文字摘要不重複列出）。 */
  var fullDims = ['area'].concat(_getDimOrder());
  var maxDepth = fullDims.length - 1; /* 不展開到最後一層（留給明細/店家列表） */

  function grpBy(rows, dim){
    var col=DIM_COL[dim](), map={}, order=[];
    rows.forEach(function(r){
      var k=String(r[col]||'').trim(); if(!k) return;
      if(!map[k]){ map[k]=[]; order.push(k); }
      map[k].push(r);
    });
    order.sort(function(a,b){ return a.localeCompare(b,'zh-TW'); });
    return {map:map, order:order};
  }

  function recurse(rows, dimIdx, indent){
    if(dimIdx >= maxDepth) return;
    var dim = fullDims[dimIdx];
    var g = grpBy(rows, dim);
    var pad = '  '.repeat(indent);
    g.order.forEach(function(key){
      var childRows = g.map[key];
      var summary = _fmtRecStore(_countRows(childRows), _countCodes(childRows));
      var text;
      if(dimIdx===0) text = '🏢 '+key+'（'+summary+'）';
      else if(dimIdx===1) text = '【'+key+'】'+summary;
      else text = DIM_META[dim].icon+' '+key+'（'+summary+'）';
      lines.push(pad+text);
      recurse(childRows, dimIdx+1, indent+1);
    });
    if(dimIdx===0) lines.push('');
  }

  recurse(_dialogRows, 0, 0);

  lines.push('📅 '+new Date().toLocaleString('zh-TW',{timeZone:'Asia/Taipei'}));
  return lines.join('\n');
}

  el.innerHTML=_buildNestedPivot(_dialogRows,_getDimOrder());
}
