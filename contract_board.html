<!--
════════════════════════════════════════════════════════════
  contract_board.html ─ 品項達成型看板
  版本：Ver. 1.0.5 ｜ 建立：2026-07-05 ｜ 最後更新：2026-07-16

【這個檔案是什麼】
  單一 HTML 檔案，純前端 JS，透過 Google Sheets 的 gviz API 直接讀取
  一份 Google 試算表裡的三個分頁，在瀏覽器端組成「一家店，它自己該
  簽的合約品項，這個月收齊了沒」的儀表板。跟 audit_board.html／
  achievement_board.html 是各自獨立的系統，只共用 shared/*.js 技術骨架
  （gviz 抓表、CSV/複製/截圖/Pivot Dialog/UI Chrome），業務邏輯完全
  不共用（無「應達成」概念的累加統計 vs 一案一冊 vs 本檔的「每店多
  品項、品項因店而異」，三者資料模型、計算邏輯都不同）。

【讀取的三份資料來源（同一份 SHEET_ID 試算表裡的三個分頁）】
  1. 「店家名冊」── 母體：由 combineQuestionnaires() 產生。
     欄位：營業處／營業所/課／通路別／店家型態／店家／店家代碼／
     業務員／菸／啤酒／烈酒／系統店。菸/啤酒/烈酒/系統店四欄有值
     （非空）代表這家店有簽該品項合約，這就是這家店本月的「應達成
     清單」。1~4項不等（實務上目前是1~3項）。
  2. 「處理層」── 比對資料：由 extractSurveyDataToMasterRegistry()
     產生。欄位：來源分頁+行數／營業處名稱／營業所/課／執行人員／
     通路別／店家型態／店家代碼／店家名稱／店家等級／分類／子分類／
     日期。查「這個月、這家店、這個品項有沒有回收」＝查這張表：
     店家代碼符合 ＋ 分類符合該品項 ＋ 日期落在該月份內。
     【重要】「分類」欄用字（菸/啤酒/烈酒/系統店）跟「店家名冊」
     品項欄用字已確認完全一致（2026-07-05 母體欄位已改成全名），
     不需要字串對照表，直接比對即可。
  3. 「單位名冊」── 組織骨架（處/所），欄位：營業處名稱／營業所/課，
     用來讓篩選下拉選單即使當月完全沒資料也能顯示完整單位清單。

  三者皆讀自同一個 SHEET_ID（跟 audit 用網址參數 ?sheetId= 動態帶入
  的模式一致）。另外透過 MGMT_ID「專案管理」分頁做多專案切換，
  只挑 boardType==='品項達成型' 的列（沿用 audit 的專案登錄機制，
  實際登錄時 boardType 欄位要填這四個字，否則專案選單不會列出）。

【核心比對邏輯】
  對「店家名冊」每一列：
    1. 讀菸/啤酒/烈酒/系統店四欄，非空的即為「應達成品項」，N=項目數。
    2. 對每個應達成品項，查「處理層」是否有 店家代碼相符 ＋ 分類相符
       ＋ 日期落在目前選定月份 的列，有→已查核，無→未查核。
    3. 完成度 = 已查核項目數 / N。未勾選的品項完全不顯示（不是這家店
       的合約範圍，不放「—」佔位）。
  月份採「每月重跑」模式（非起訖日區間），下拉選單預設當月，可切換
  查看歷史月份（選項由「處理層」實際出現過的年月 + 當月組成）。

【畫面設計】
  ‧ 上方摘要列：目前篩選範圍的 總店數／已查核／未查核／達成率。
  ‧ 篩選列（quicknav 樣式）：營業處／營業所／完成度／品項／月份／
    關鍵字搜尋／未查核優先排序開關。
  ‧ 主畫面：店家卡片列表（分頁載入，一次 60 張，「顯示更多」按鈕），
    卡片：店代碼＋店名／單位＋業務員／x/N 完成度／品項清單
    （只列有勾選的品項，各自 ✅已查核／❌未查核）。
  ‧ 📊彙整：Pivot Dialog，三分頁「依單位」「依業務員」「未達成清單」，
    沿用 shared/pivot-dialog.js 分頁/滑動骨架，內容為本檔專屬邏輯。
  ‧ 📥CSV／📋複製LINE／📸截圖：皆針對「目前篩選後的完整結果」
    （不受分頁載入 60 筆的視覺限制影響）。

【視覺優化（規劃書 4.3，已套用）】
  .raw-detail-grid 欄寬 minmax(180px,1fr)；.raw-detail-val 顏色統一
  var(--text)（本檔目前用不到明細面板，先備著，未來若加店家逐筆
  問卷明細可直接沿用 dashboard-common.css 既有樣式，不用重寫）。

【已知待確認事項（見對話紀錄，非本檔程式問題）】
  ‧ MGMT「專案管理」分頁的 boardType 欄位需要新增一列填「品項達成型」
    並指到正確的 SHEET_ID，多專案切換下拉選單才會出現。
  ‧ 若「店家名冊」品項欄位未來又改回縮寫（菸/啤/酒/系），
    ITEM_KEYS 常數需要同步改回對照表模式，目前先以全名直接比對。

<link rel="stylesheet" href="shared/dashboard-common.css">
<style>
:root {
  --primary: #378ADD;
  --primary-bg: rgba(55,138,221,.08);
  --bg: #F0EDE6;
  --card: #FFFFFF;
  --text: #2D2D2D;
  --sub: #2D2D2D;
  --border: rgba(0,0,0,0.09);
  --green: #3B6D11;
  --green-bg: #EAF3DE;
  --green-bd: rgba(59,109,17,.25);
  --amber: #7B4F00;
  --amber-bg: #FFF3DC;
  --red: #A32020;
  --red-bg: #FBEAEA;
  --red-bd: rgba(163,32,32,.25);
  --r: 12px;
  --dur: .32s;
  --ease: cubic-bezier(.34,1.05,.64,1);
}
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif; min-height:100vh; }

/* ── loading ── */
.loading { position:fixed; inset:0; background:rgba(240,237,230,.85); display:none; align-items:center; justify-content:center; z-index:999; font-size:15px; font-weight:600; color:var(--sub); }
.loading.show { display:flex; }

/* ── toolbar ── */
.toolbar { background:#fff; border-bottom:1px solid var(--border); padding:0 20px; height:52px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:50; }
.toolbar-title { font-size:15px; font-weight:600; flex-shrink:0; }
.back-btn { background:none; border:1px solid var(--border); border-radius:8px; padding:5px 12px; font-size:13px; cursor:pointer; color:var(--text); transition:background .15s; flex-shrink:0; }
.back-btn:hover { background:var(--bg); }
.proj-sel { display:none; padding:5px 10px; border:1px solid var(--border); border-radius:8px; background:rgba(255,255,255,.7); color:var(--text); font-size:13px; font-weight:600; font-family:inherit; cursor:pointer; max-width:220px; outline:none; }
.sync-note { font-size:11px; color:var(--sub); white-space:nowrap; }
.tb-act-btn { padding:5px 12px; border:1px solid var(--border); border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; color:var(--text); background:#fff; font-family:inherit; white-space:nowrap; transition:all .15s; flex-shrink:0; }
.tb-act-btn:hover { background:var(--primary-bg); border-color:var(--primary); color:var(--primary); }
.tb-act-btn.done { border-color:var(--green); color:var(--green); background:var(--green-bg); }
.tb-act-btn.loading { opacity:.6; pointer-events:none; }
.toolbar-spacer { flex:1; }

/* ── quicknav（AREA/OFFICE 麵包屑，雙向鑽取）── */
.quicknav {
  padding:6px 16px 0; display:flex; align-items:center;
  gap:0; flex-wrap:nowrap; overflow-x:auto; scrollbar-width:none;
  -webkit-overflow-scrolling:touch; border-bottom:1px solid var(--border);
  background:#fff; position:sticky; top:52px; z-index:45;
}
.quicknav::-webkit-scrollbar { display:none; }
.qn-group { display:flex; align-items:center; gap:3px; padding:0 10px 6px 0; flex-shrink:0; border-right:1px solid var(--border); margin-right:8px; }
.qn-group:last-child { border-right:none; padding-right:0; }
.qn-btn {
  padding:4px 10px; border-radius:16px; font-size:12px; font-weight:600;
  cursor:pointer; border:1px solid transparent; background:transparent;
  color:var(--sub); font-family:inherit; white-space:nowrap;
  transition:all .15s; flex-shrink:0;
}
.qn-btn:hover { background:rgba(55,138,221,.08); color:var(--primary); }
.qn-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); }
.qn-btn.home { font-weight:700; }
.qn-label { font-size:10px; color:var(--sub); font-weight:600; white-space:nowrap; padding-right:3px; letter-spacing:.04em; opacity:.6; flex-shrink:0; }

/* ── filter bar ── */
.filterbar { background:#fff; border-bottom:1px solid var(--border); padding:10px 20px; display:flex; flex-wrap:wrap; align-items:center; gap:8px 14px; position:sticky; top:90px; z-index:40; }
.fb-group { display:flex; align-items:center; gap:6px; }
.fb-label { font-size:11px; color:var(--sub); font-weight:600; opacity:.65; letter-spacing:.03em; }
.fb-sel { padding:5px 8px; border:1px solid var(--border); border-radius:8px; background:#fff; color:var(--text); font-size:12.5px; font-family:inherit; cursor:pointer; outline:none; }
.fb-sel:focus { border-color:var(--primary); }
.fb-input { padding:5px 10px; border:1px solid var(--border); border-radius:8px; background:#fff; color:var(--text); font-size:12.5px; font-family:inherit; outline:none; width:150px; }
.fb-input:focus { border-color:var(--primary); }
.fb-chip-row { display:flex; gap:4px; }
.fb-chip { padding:4px 10px; border-radius:16px; font-size:12px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:#fff; color:var(--sub); font-family:inherit; white-space:nowrap; transition:all .15s; }
.fb-chip:hover { background:var(--primary-bg); color:var(--primary); }
.fb-chip.active { background:var(--primary); color:#fff; border-color:var(--primary); }
.fb-toggle { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--sub); cursor:pointer; user-select:none; }
.fb-toggle input { cursor:pointer; }

/* ── summary row ── */
.summary-row { padding:14px 20px 0; display:flex; gap:12px; flex-wrap:wrap; }
.sum-card { flex:1; min-width:120px; background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:12px 16px; }
.sum-card .sc-label { font-size:11px; color:var(--sub); opacity:.65; font-weight:600; margin-bottom:4px; }
.sum-card .sc-val { font-size:24px; font-weight:800; letter-spacing:-1px; }
.sum-card.ok .sc-val { color:var(--green); }
.sum-card.bad .sc-val { color:var(--red); }
.sum-card.rate .sc-val { color:var(--primary); }

/* ── stage ── */
.stage { padding:16px 20px 40px; }
.empty { padding:60px 20px; text-align:center; color:var(--sub); font-size:14px; }

/* ── store card grid ── */
/* ── 分層總覽卡片（audit_board 同款視覺語言：整體概況卡＋大數字統計格）── */
.stage { padding:4px 0 40px; }
.level-label { font-size:11px; color:var(--sub); opacity:.65; letter-spacing:.05em; margin-bottom:10px; }
.grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:28px; }
.card {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--r); padding:20px 22px 16px;
  cursor:pointer; transition:transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
  position:relative; overflow:visible;
}
.card:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,.10); z-index:10; }
.card-overall { border-color:var(--primary); background:var(--primary-bg); }
.card-top-inline { font-size:11px; color:var(--sub); font-weight:500; display:flex; align-items:center; gap:5px; margin-bottom:14px; }
.card-overall .card-top-inline { color:var(--primary); font-weight:700; }
.card-name-inline { font-size:18px; font-weight:800; color:var(--text); line-height:1.1; flex:1; min-width:0; }
.card-overall .card-name-inline { color:var(--primary); }
.card-detail-btn {
  flex-shrink:0; font-size:11px; font-weight:600; padding:2px 8px; border-radius:6px;
  border:1px solid rgba(0,0,0,.12); background:rgba(255,255,255,.75);
  color:var(--sub); cursor:pointer; font-family:inherit; transition:all .14s;
  white-space:nowrap; line-height:1.6; margin-left:auto;
}
.card-detail-btn:hover { border-color:var(--primary); color:var(--primary); background:#fff; }
.stat-row { display:flex; gap:6px; margin-top:4px; flex-wrap:wrap; }
.stat-item { flex:1; min-width:0; background:var(--bg); border-radius:10px; padding:10px 6px; text-align:center; user-select:none; -webkit-user-select:none; }
.stat-item.grp { background:var(--green-bg); }
.stat-item.warn { background:var(--red-bg); }
.stat-item.rate { background:var(--primary-bg); }
.stat-label { font-size:10px; font-weight:600; color:var(--sub); margin-bottom:6px; word-break:keep-all; line-height:1.3; min-height:2.6em; display:flex; align-items:center; justify-content:center; }
.stat-item.grp .stat-label { color:var(--green); }
.stat-item.warn .stat-label { color:var(--red); }
.stat-item.rate .stat-label { color:var(--primary); }
.stat-val { font-size:24px; font-weight:800; color:var(--text); line-height:1; letter-spacing:-1px; }
.stat-item.grp .stat-val { color:var(--green); }
.stat-item.warn .stat-val { color:var(--red); }
.stat-item.rate .stat-val { color:var(--primary); }

/* ── 店家 leaf 卡片：頂部沿用 .card 大卡風格，底下品項用小 chip 列出（品項數本來就少，chip 比再開一組 stat-item 更省空間且清楚） ── */
.store-meta-line { font-size:11.5px; color:var(--sub); opacity:.8; margin:2px 0 10px; }
.sc-items { display:flex; flex-wrap:wrap; gap:5px; margin-top:10px; }
.sc-item { font-size:11.5px; font-weight:600; padding:3px 8px; border-radius:6px; white-space:nowrap; }
.sc-item.ok { color:var(--green); background:var(--green-bg); }
.sc-item.no { color:var(--red); background:var(--red-bg); }

.loadmore-wrap { text-align:center; margin-top:20px; }
.loadmore-btn { padding:8px 22px; border:1px solid var(--border); border-radius:20px; background:#fff; font-size:13px; font-weight:600; color:var(--text); cursor:pointer; font-family:inherit; }
.loadmore-btn:hover { border-color:var(--primary); color:var(--primary); }
.result-count { font-size:12px; color:var(--sub); opacity:.7; margin-bottom:10px; }

@media (max-width:640px) {
  .grid { grid-template-columns:1fr !important; gap:8px; }
  .card { padding:12px 12px 10px; }
  .card-name-inline { font-size:16px; }
  .stat-row { gap:5px; }
  .stat-item { padding:8px 5px; border-radius:9px; }
  .stat-val { font-size:20px !important; }
  .stat-label { font-size:9px; min-height:2.4em; }
  .toolbar-controls {
    display:none; position:absolute; top:52px; left:0; right:0; z-index:60;
    background:#fff; border-bottom:1px solid var(--border); padding:10px 16px;
    flex-direction:column; align-items:stretch; gap:6px;
    box-shadow:0 8px 20px rgba(0,0,0,.10);
  }
  .toolbar-controls.open { display:flex; }
  .toolbar-controls .tb-act-btn { width:100%; text-align:left; }
}

/* ── 店家個案明細 Dialog：高密度 Grid 版面＋回報時間戳＋品項 Chip 篩選 ── */
.dd-toprow { display:flex; flex-wrap:wrap; gap:4px 18px; align-items:baseline; margin-top:4px; }
.dd-lasttime { font-size:12px; color:var(--sub); font-weight:600; }
.dd-lasttime b { color:var(--primary); font-weight:800; }
.dd-chip-row { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
.dd-chip { padding:5px 14px; border-radius:16px; font-size:12.5px; font-weight:700; cursor:pointer; border:1px solid var(--border); background:#fff; color:var(--sub); font-family:inherit; transition:all .15s; white-space:nowrap; }
.dd-chip:hover { border-color:var(--primary); color:var(--primary); }
.dd-chip.active { background:var(--primary); color:#fff; border-color:var(--primary); }
.dd-item-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:8px; margin-bottom:18px; }
.dd-item-card { border-radius:10px; padding:10px 12px; border:1px solid var(--border); background:var(--bg); transition:opacity .15s; }
.dd-item-card.ok { background:var(--green-bg); border-color:var(--green-bd); }
.dd-item-card.no { background:var(--red-bg); border-color:var(--red-bd); }
.dd-item-card.dim { opacity:.32; }
.dd-item-name { font-size:13px; font-weight:800; color:var(--text); margin-bottom:4px; }
.dd-item-card.ok .dd-item-name { color:var(--green); }
.dd-item-card.no .dd-item-name { color:var(--red); }
.dd-item-status { font-size:11.5px; font-weight:700; }
.dd-item-time { font-size:10.5px; color:var(--sub); opacity:.75; margin-top:4px; }
@media (max-width:640px){
  .dd-item-grid { grid-template-columns:repeat(2,1fr); }
  .dd-toprow { flex-direction:column; gap:2px; }
}

/* ── 拜訪／登記時間軸：高密度版面（contract 專屬覆寫，不動 shared 層）
   shared/photo-viewer.js 的 _renderQuizSections 預設把每筆問卷渲染成
   .raw-quiz-list（逐一大題直排）+ .raw-quiz-picks（逐一選項直排、
   flex-direction:column）。這是 audit/coverage 為了「有意義的文字答案
   永遠獨立一行」訂下的設計決定（見 dashboard-common.css 檔頭說明），
   刻意不能改共用檔，否則會動到那兩板。
   但 contract 這裡時間軸內容幾乎都是簡短勾選／數字（✓照片、箱數→20箱、
   ✓菸-足20品項…），逐行直排反而讓中間、右側大片空白浪費掉，一次只能
   看到 2-3 行內容。這裡改用「只在 #detail-history-body 容器內」生效的
   選擇器覆寫：大題排成多欄 grid（一次看到所有大題），大題內的選項
   改成同行自動換行（wrap），不修改 shared 檔案本身，audit/coverage
   兩板的版面完全不受影響。 */
#detail-history-body .ct-visit-card {
  border:1px solid var(--border); border-radius:10px;
  padding:10px 14px 12px; margin-bottom:10px; background:#fff;
}
#detail-history-body .ct-visit-card:last-child { margin-bottom:0; }
#detail-history-body .ct-visit-head {
  display:flex; align-items:baseline; flex-wrap:wrap; gap:6px 10px;
  font-size:12px; font-weight:800; color:var(--text); margin-bottom:8px;
  padding-bottom:6px; border-bottom:1px dashed var(--border);
}
#detail-history-body .ct-visit-cat {
  font-size:11px; font-weight:700; color:var(--primary);
  background:var(--primary-bg); padding:1px 9px; border-radius:9px;
}
#detail-history-body .raw-quiz-list {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:8px;
}
#detail-history-body .raw-quiz-section { margin:0; padding:7px 10px; }
#detail-history-body .raw-quiz-title { font-size:11px; margin-bottom:5px; }
#detail-history-body .raw-quiz-picks {
  flex-direction:row; flex-wrap:wrap; gap:5px;
}
#detail-history-body .raw-quiz-picks .raw-quiz-chip {
  display:inline-flex; flex-direction:column; width:auto;
}
#detail-history-body .raw-quiz-chip { padding:4px 9px; }
#detail-history-body .raw-quiz-chip-q { font-size:9.5px; margin-bottom:1px; }
#detail-history-body .raw-quiz-chip-a { font-size:12px; }
#detail-history-body .raw-quiz-photos { margin-top:5px; }
@media (max-width:640px){
  #detail-history-body .raw-quiz-list { grid-template-columns:1fr 1fr; }
}

/* ── pivot dialog table ── */
.pivot-tbl { width:100%; border-collapse:collapse; font-size:12.5px; }
.pivot-tbl th,.pivot-tbl td { padding:7px 10px; border-bottom:1px solid var(--border); text-align:right; }
.pivot-tbl th.th-left,.pivot-tbl td.td-left { text-align:left; }
.pivot-tbl thead th { background:var(--bg); font-weight:700; color:var(--sub); position:sticky; top:0; cursor:pointer; }
.pivot-tbl tbody tr:hover { background:var(--primary-bg); }
.pivot-tbl .sum-footer td { font-weight:700; background:var(--bg); }
.miss-tag { display:inline-block; font-size:11px; font-weight:700; color:var(--red); background:var(--red-bg); padding:1px 6px; border-radius:5px; margin:1px 2px 1px 0; }
.d-yes { color:var(--green); font-weight:700; }
.d-no-label { font-size:11px; font-weight:700; color:var(--red); background:var(--red-bg); padding:2px 7px; border-radius:6px; }
</style>
</head>

window._STICKY_IDS = ['crumbnav', 'filterbar'];

/* ════ 常數 ════ */
var MGMT_ID     = '1PR9OR7BIGyTpcH8QSMRXkPhQTr4h3m0UK3gET29f19s';
var MGMT_SHEET  = '專案管理';
var BOARD_TYPE  = '品項達成型';
var SYNC_SHEET_DEFAULT = '輔助';

var POP_SHEET_DEFAULT  = '店家名冊';   /* 母體：combineQuestionnaires() 產生 */
var PROC_SHEET_DEFAULT = '處理層';     /* 比對資料：extractSurveyDataToMasterRegistry() 產生 */

    P_STORENAME='店家', P_CODE='店家代碼', P_STAFF='業務員';

var params    = new URLSearchParams(location.search);
var SHEET_ID  = params.get('sheetId') || '';
var PROJ_NAME = 'CONTRACT 看板';
var SYNC_SHEET = SYNC_SHEET_DEFAULT, SYNC_CELL = SYNC_CELL_DEFAULT;
var POP_SHEET = POP_SHEET_DEFAULT, PROC_SHEET = PROC_SHEET_DEFAULT;

var STORE_ROWS   = [];      /* 母體，未含月度比對結果 */

var _renderedCount = 60;

/* 三層鑽層狀態，跟 audit/coverage 同一套 drillStack 慣例：
   []                                  → 第一層：7處總覽卡片
   [{level:'area',key:區}]              → 第二層：該處底下的營業所/課卡片
   [{level:'area',key:區},{level:'office',key:所}] → 第三層（leaf）：該所店家卡片列表 */
var drillStack = [];

function showLoading(){ document.getElementById('loading').classList.add('show'); }
function hideLoading(){ document.getElementById('loading').classList.remove('show'); }
function goBack(){ window.location.href = 'index.html'; }
function switchProject(sid){ if(sid) location.href = location.pathname + '?sheetId=' + encodeURIComponent(sid); }

/* ════ 初始化 ════ */
function init(){
  if(!SHEET_ID){
    hideLoading();
    document.getElementById('stage').innerHTML = '<div class="empty">⚠️ 缺少 sheetId 參數</div>';
    return;
  }
  var urlMgmt = 'https://docs.google.com/spreadsheets/d/' + MGMT_ID +
    '/gviz/tq?tqx=out:json&headers=1&sheet=' + encodeURIComponent(MGMT_SHEET);
  fetch(urlMgmt).then(function(r){ return r.text(); }).then(function(txt){
    var json = gvizParse(txt);
    var rows = (json.table && json.table.rows) || [];
    var projs = [];
    rows.forEach(function(row){
      var cells = row.c || [];
      function cv(c){ return c ? String(c.v!==null&&c.v!==undefined?c.v:c.f||'').trim() : ''; }
      var active = cv(cells[0]).toUpperCase()==='ON';
      var name = cv(cells[1]), sid = cv(cells[2]);
      var sheet = cv(cells[3]) || POP_SHEET_DEFAULT;
      var sync  = cv(cells[4]) || SYNC_SHEET_DEFAULT;
      var cell  = cv(cells[5]) || SYNC_CELL_DEFAULT;
      var boardType = cv(cells[6]);
      if(!name || !sid) return;
      if(boardType !== BOARD_TYPE) return;
      if(sid === SHEET_ID){ PROJ_NAME=name; POP_SHEET=sheet; SYNC_SHEET=sync; SYNC_CELL=cell; }
      projs.push({name:name, id:sid, active:active});
    });
    document.getElementById('tb-title').textContent = PROJ_NAME;
    document.title = PROJ_NAME;
    var onProjs = projs.filter(function(p){ return p.active; });
    if(onProjs.length > 1){
      var sel = document.getElementById('proj-sel');
      sel.innerHTML = onProjs.map(function(p){
        return '<option value="'+esc(p.id)+'"'+(p.id===SHEET_ID?' selected':'')+'>'+esc(p.name)+'</option>';
      }).join('');
      sel.style.display = '';
    }
    loadAll();
  }).catch(function(){
    document.getElementById('tb-title').textContent = PROJ_NAME;
    loadAll();
  });
}

function loadAll(){
  showLoading();
  fetchOrgSkeleton(function(){
    fetchPopulation(function(){
      fetchProcessLayer(function(){
        buildMonthOptions();
        buildFilterUI();
        hideLoading();
        onFilterChange();
      });
    });
  });
  fetchSyncTime();
}

/* ════ 讀單位名冊骨架 ════ */
function fetchOrgSkeleton(callback){
  var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
    '/gviz/tq?tqx=out:json&headers=1&sheet=' + encodeURIComponent(ORG_SHEET_NAME);
  fetch(url).then(function(r){ return r.text(); }).then(function(txt){
    var json = gvizParse(txt);
    var rows = (json.table && json.table.rows) || [];
    var skel = {};
    rows.forEach(function(row){
      var c = row.c || [];
      var area = c[0] ? String(c[0].v||c[0].f||'').trim() : '';
      var office = c[1] ? String(c[1].v||c[1].f||'').trim() : '';
      if(!area || !office) return;
      if(!skel[area]) skel[area] = [];
      if(skel[area].indexOf(office)===-1) skel[area].push(office);
    });
    ORG_SKELETON = skel;
  }).catch(function(){ ORG_SKELETON = {}; }).then(function(){ callback(); });
}

/* ════ 讀母體「店家名冊」════ */
function fetchPopulation(callback){
  var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
    '/gviz/tq?tqx=out:json&headers=1&sheet=' + encodeURIComponent(POP_SHEET);
  fetch(url).then(function(r){ return r.text(); }).then(function(txt){
    var json = gvizParse(txt);
    var tbl = json.table || {};
    var cols = (tbl.cols||[]).map(function(c){ return c.label||''; });
    STORE_ROWS = (tbl.rows||[]).map(function(row){
      var obj = {};
      (row.c||[]).forEach(function(cell,i){
        var colName = cols[i];
        if(!colName) return;
        if(!cell){ obj[colName]=''; return; }
        var v=(cell.v!==null&&cell.v!==undefined)?cell.v:'';
        obj[colName] = (v!==''&&v!==null&&v!==undefined) ? v : (cell.f||'');
      });
      var needed = ITEM_KEYS.filter(function(it){ return String(obj[it]||'').trim()!==''; });
      return {
        area: String(obj[P_AREA]||'').trim(),
        office: String(obj[P_OFFICE]||'').trim(),
        channel: String(obj[P_CHANNEL]||'').trim(),
        storeType: String(obj[P_STORETYPE]||'').trim(),
        storeName: String(obj[P_STORENAME]||'').trim(),
        code: String(obj[P_CODE]||'').trim(),
        staff: String(obj[P_STAFF]||'').trim(),
        needed: needed
      };
    }).filter(function(r){ return r.code && r.needed.length>0; });
  }).catch(function(err){
    STORE_ROWS = [];
    document.getElementById('stage').innerHTML = '<div class="empty">⚠️ 店家名冊載入失敗：'+err+'</div>';
  }).then(function(){ callback(); });
}

/* ════ 讀比對資料「處理層」════ */
function _cellYM(cell){
  if(!cell) return '';
  var v = cell.v;
  if(typeof v === 'string'){
    var m = v.match(/Date\((\d+),(\d+),(\d+)/);
    if(m) return m[1] + '-' + String(+m[2]+1).padStart(2,'0');
  }
  var f = cell.f || '';
  var m2 = String(f).match(/(\d{4})[\/\-](\d{1,2})/);
  if(m2) return m2[1] + '-' + String(+m2[2]).padStart(2,'0');
  return '';
}
function fetchProcessLayer(callback){
  var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
    '/gviz/tq?tqx=out:json&headers=1&sheet=' + encodeURIComponent(PROC_SHEET);
  fetch(url).then(function(r){ return r.text(); }).then(function(txt){
    var json = gvizParse(txt);
    var tbl = json.table || {};
    var cols = (tbl.cols||[]).map(function(c){ return c.label||''; });
    var idxCode = cols.indexOf(R_CODE), idxCat = cols.indexOf(R_CATEGORY), idxDate = cols.indexOf(R_DATE);
    var idxRef = cols.indexOf(R_SOURCEREF);
    var set = {}; var ymSeen = {}; var refs = {};
    function cv(c){ return (c && (c.v!=null?c.v:c.f)) || ''; }
    (tbl.rows||[]).forEach(function(row){
      var c = row.c || [];
      var code = String(cv(c[idxCode])).trim();
      var cat  = String(cv(c[idxCat])).trim();
      var ym = _cellYM(c[idxDate]);
      if(!code || !cat || !ym) return;
      set[code+'||'+cat+'||'+ym] = true;
      ymSeen[ym] = true;
      var refVal = idxRef!==-1 ? String(cv(c[idxRef])).trim() : '';
      if(refVal){
        if(!refs[code]) refs[code] = [];
        refs[code].push({ category:cat, ym:ym, ref:refVal, dateText: cv(c[idxDate]) });
      }
    });
    /* 同一家店多筆紀錄，新到舊排序（跟 audit/coverage 的時間軸排序習慣一致） */
    Object.keys(refs).forEach(function(code){
      refs[code].sort(function(a,b){ return a.ym<b.ym?1:(a.ym>b.ym?-1:0); });
    });
    PROCESS_SET = set;
    PROCESS_REFS = refs;
    PROCESS_YMS = Object.keys(ymSeen).sort().reverse();
  }).catch(function(){ PROCESS_SET = {}; PROCESS_REFS = {}; PROCESS_YMS = []; }).then(function(){ callback(); });
}

function fetchSyncTime(){
  var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
    '/gviz/tq?tqx=out:json&sheet=' + encodeURIComponent(SYNC_SHEET) + '&range=' + SYNC_CELL;
  fetch(url).then(function(r){ return r.text(); }).then(function(txt){
    var json = gvizParse(txt);
    var val=''; try{ val=json.table.rows[0].c[0].v||''; }catch(e){}
    if(val) document.getElementById('tb-sync').textContent = '📊 同步 '+parseGvizDate(val);
  }).catch(function(){});
}

/* ════ 月份/篩選 UI 建置 ════ */
function _currentYM(){
  var tp = new Intl.DateTimeFormat('en-US',{timeZone:'Asia/Taipei',year:'numeric',month:'numeric'}).formatToParts(new Date());
  var y = (tp.find(function(p){return p.type==='year';})||{}).value;
  var m = (tp.find(function(p){return p.type==='month';})||{}).value;
  return y && m ? (y+'-'+String(+m).padStart(2,'0')) : '';
}
function buildMonthOptions(){
  var cur = _currentYM();
  var yms = PROCESS_YMS.slice();
  if(cur && yms.indexOf(cur)===-1) yms.unshift(cur);
  yms.sort().reverse();
  CUR_YM = cur && yms.indexOf(cur)!==-1 ? cur : (yms[0]||'');
  var sel = document.getElementById('fb-month');
  sel.innerHTML = yms.map(function(ym){
    return '<option value="'+ym+'"'+(ym===CUR_YM?' selected':'')+'>'+ym.replace('-','/')+'</option>';
  }).join('');
}
function onMonthChange(){
  CUR_YM = document.getElementById('fb-month').value;
  onFilterChange();
}
function buildFilterUI(){
  var areas = Object.keys(ORG_SKELETON);
  STORE_ROWS.forEach(function(r){ if(r.area && areas.indexOf(r.area)===-1) areas.push(r.area); });
  areas.sort(function(a,b){
    var ia=AREA_ORDER.indexOf(a), ib=AREA_ORDER.indexOf(b);
    if(ia===-1&&ib===-1) return 0;
    if(ia===-1) return 1; if(ib===-1) return -1;
    return ia-ib;
  });
  var areaSel = document.getElementById('fb-area');
  areaSel.innerHTML = '<option value="">全部</option>' + areas.map(function(a){ return '<option value="'+esc(a)+'">'+esc(a)+'</option>'; }).join('');
  rebuildOfficeOptions();

  var compRow = document.getElementById('fb-completion');
  compRow.innerHTML = ['all:全部','incomplete:未查核','complete:已查核'].map(function(kv){
    var p = kv.split(':');
    return '<div class="fb-chip'+(p[0]==='all'?' active':'')+'" data-v="'+p[0]+'" onclick="setChip(this,\'completion\')">'+p[1]+'</div>';
  }).join('');

  var itemRow = document.getElementById('fb-item');
  var items = ['all'].concat(ITEM_KEYS);
  itemRow.innerHTML = items.map(function(it){
    return '<div class="fb-chip'+(it==='all'?' active':'')+'" data-v="'+esc(it)+'" onclick="setChip(this,\'item\')">'+(it==='all'?'全部':esc(it))+'</div>';
  }).join('');
}
/* 所/課下拉的選項依「目前選定的處」動態決定，沒選處之前禁用，
   強制走 處→所/課→店家 這條固定鑽層路徑，跟卡片鑽層是同一套狀態、互相同步 */
function rebuildOfficeOptions(){
  var area = drillStack[0] ? drillStack[0].key : '';
  var offSel = document.getElementById('fb-office');
  if(!area){
    offSel.innerHTML = '<option value="">全部</option>';
    offSel.disabled = true;
    return;
  }
  offSel.disabled = false;
  var offices = (ORG_SKELETON[area]||[]).slice();
  STORE_ROWS.forEach(function(r){ if(r.area===area && r.office && offices.indexOf(r.office)===-1) offices.push(r.office); });
  var curOffice = drillStack[1] ? drillStack[1].key : '';
  offSel.innerHTML = '<option value="">全部</option>' + offices.map(function(o){ return '<option value="'+esc(o)+'"'+(o===curOffice?' selected':'')+'>'+esc(o)+'</option>'; }).join('');
}
/* ════ 三層鑽層：處(fb-area) → 所/課(fb-office) → 店家卡片，
   下拉選單跟卡片點擊鑽層是同一套 drillStack 狀態，選哪個都會同步 ════ */
function onAreaChange(){
  var area = document.getElementById('fb-area').value;
  drillStack = area ? [{level:'area',key:area}] : [];
  rebuildOfficeOptions();
  onFilterChange();
}
function onOfficeChange(){
  var office = document.getElementById('fb-office').value;
  var area = drillStack[0] ? drillStack[0].key : '';
  drillStack = office ? [{level:'area',key:area},{level:'office',key:office}] : (area ? [{level:'area',key:area}] : []);
  onFilterChange();
}
function drillIntoArea(area){
  document.getElementById('fb-area').value = area;
  drillStack = [{level:'area',key:area}];
  rebuildOfficeOptions();
  onFilterChange();
}
function drillIntoOffice(office){
  var area = drillStack[0] ? drillStack[0].key : '';
  document.getElementById('fb-office').value = office;
  drillStack = [{level:'area',key:area},{level:'office',key:office}];
  onFilterChange();
}
/* 第三層：鑽入某個所/課之後，改看該所底下的人員卡片（跟 audit/coverage 一致的
   處→所→人員→明細 四段式鑽層，原本漏了這一層，人員底下才是店家 leaf 卡片） */
function drillIntoStaff(staff){
  var area = drillStack[0] ? drillStack[0].key : '';
  var office = drillStack[1] ? drillStack[1].key : '';
  drillStack = [{level:'area',key:area},{level:'office',key:office},{level:'staff',key:staff}];
  onFilterChange();
}
function drillBackToOverview(){
  drillStack = [];
  document.getElementById('fb-area').value = '';
  rebuildOfficeOptions();
  onFilterChange();
}
function drillBackToOffice(){
  var area = drillStack[0] ? drillStack[0].key : '';
  drillStack = area ? [{level:'area',key:area}] : [];
  document.getElementById('fb-office').value = '';
  onFilterChange();
}
function drillBackToStaffList(){
  var area = drillStack[0] ? drillStack[0].key : '';
  var office = drillStack[1] ? drillStack[1].key : '';
  drillStack = [{level:'area',key:area},{level:'office',key:office}];
  onFilterChange();
}
function setChip(el, key){
  var parent = el.parentElement;
  Array.from(parent.children).forEach(function(c){ c.classList.remove('active'); });
  el.classList.add('active');
  FILTER[key] = el.getAttribute('data-v');
  onFilterChange();
}
function onFilterChange(){
  FILTER.keyword = document.getElementById('fb-keyword').value.trim();
  _renderedCount = RENDER_LIMIT;
  render();
}

/* ════ 計算單店狀態（依 CUR_YM）════ */
function _storeStatus(store){
  var collected = [], missing = [];
  store.needed.forEach(function(it){
    var key = store.code+'||'+it+'||'+CUR_YM;
    if(PROCESS_SET[key]) collected.push(it); else missing.push(it);
  });
  return { n: store.needed.length, k: collected.length, collected: collected, missing: missing, isComplete: missing.length===0 };
}

/* 套用「品項」「完成度」「關鍵字」這三個 chip/輸入框篩選（不含鑽層範圍），
   drill 範圍另外由呼叫端傳入 scopeArea/scopeOffice/scopeStaff。
   這支是唯一的篩選真相來源——不管是店家 leaf 卡片、還是每一層的整體概況卡／
   下一層子卡片，全部都要經過這裡，chip 改變才會讓所有層級的數字一起變動。 */
function getScopedStores(scopeArea, scopeOffice, scopeStaff){
  var kw = (FILTER.keyword||'').toLowerCase();
  var list = STORE_ROWS.filter(function(r){
    if(scopeArea && r.area!==scopeArea) return false;
    if(scopeOffice && r.office!==scopeOffice) return false;
    if(scopeStaff && r.staff!==scopeStaff) return false;
    if(FILTER.item!=='all' && r.needed.indexOf(FILTER.item)===-1) return false;
    if(kw){
      var hay = (r.storeName+' '+r.code+' '+r.staff).toLowerCase();
      if(hay.indexOf(kw)===-1) return false;
    }
    return true;
  }).map(function(r){
    var st = _storeStatus(r);
    return Object.assign({}, r, { _status: st });
  }).filter(function(r){
    if(FILTER.completion==='complete') return r._status.isComplete;
    if(FILTER.completion==='incomplete') return !r._status.isComplete;
    return true;
  });
  return list;
}

/* ════ 取得目前篩選後的完整店家清單（含狀態），不受分頁載入限制 ════ */
function getFilteredStores(){
  var area = drillStack[0] ? drillStack[0].key : '';
  var office = drillStack[1] ? drillStack[1].key : '';
  var staff = drillStack[2] ? drillStack[2].key : '';
  var list = getScopedStores(area, office, staff);

  var priority = document.getElementById('fb-priority') ? document.getElementById('fb-priority').checked : true;
  list.sort(function(a,b){
    if(priority){
      var ai = a._status.isComplete?1:0, bi = b._status.isComplete?1:0;
      if(ai!==bi) return ai-bi;
    }
    var cols = ['area','office','staff','code'];
    for(var i=0;i<cols.length;i++){
      var va=String(a[cols[i]]||''), vb=String(b[cols[i]]||'');
      if(va!==vb) return va>vb?1:-1;
    }
    return 0;
  });
  return list;
}

/* ════ 渲染 ════ */
function render(){
  var all = getFilteredStores();
  buildCrumbNav();
  renderSummary(all);
  renderStage(all);
}
/* AREA/OFFICE 麵包屑：Home 回全區；處層永遠列出全部處供跨區直接跳轉；
   鑽入某一處後再列出該處底下全部所/課供跨所直接跳轉。雙向鑽取
   （往下：點卡片/chip；往上：點 Home 或再點一次目前所在的處）都經過
   drillIntoArea/drillIntoOffice/drillBackToOverview，跟卡片鑽層、
   fb-area/fb-office 下拉選單共用同一套 drillStack 狀態，永遠同步。 */
function buildCrumbNav(){
  var nav = document.getElementById('crumbnav');
  if(!nav) return;
  var depth = drillStack.length;
  var areas = AREA_ORDER.filter(function(a){ return ORG_SKELETON[a] || STORE_ROWS.some(function(r){ return r.area===a; }); });
  STORE_ROWS.forEach(function(r){ if(r.area && areas.indexOf(r.area)===-1) areas.push(r.area); });

  var html = '<div class="qn-group">'
    + '<div class="qn-btn home'+(depth===0?' active':'')+'" onclick="drillBackToOverview()">🏠 全台</div>'
    + '</div>';

  if(areas.length){
    html += '<div class="qn-group"><span class="qn-label">處</span>';
    areas.forEach(function(a){
      var active = depth>=1 && drillStack[0].key===a;
      html += '<div class="qn-btn'+(active?' active':'')+'" onclick="drillIntoArea(\''+esc(a).replace(/'/g,"\\'")+'\')">'+esc(a)+'</div>';
    });
    html += '</div>';
  }

  if(depth>=1){
    var area = drillStack[0].key;
    var offices = (ORG_SKELETON[area]||[]).slice();
    STORE_ROWS.forEach(function(r){ if(r.area===area && r.office && offices.indexOf(r.office)===-1) offices.push(r.office); });
    if(offices.length){
      html += '<div class="qn-group"><span class="qn-label">所/課</span>';
      offices.forEach(function(o){
        var active = depth>=2 && drillStack[1].key===o;
        html += '<div class="qn-btn'+(active?' active':'')+'" onclick="drillIntoOffice(\''+esc(o).replace(/'/g,"\\'")+'\')">'+esc(o)+'</div>';
      });
      html += '</div>';
    }
  }
  nav.innerHTML = html;
}
function renderSummary(all){
  var total = all.length;
  var complete = all.filter(function(r){ return r._status.isComplete; }).length;
  var incomplete = total - complete;
  var rate = total ? Math.round(complete/total*1000)/10 : 0;
  document.getElementById('summary-row').innerHTML =
    '<div class="sum-card"><div class="sc-label">總店數</div><div class="sc-val">'+total+'</div></div>'+
    '<div class="sum-card ok"><div class="sc-label">已查核</div><div class="sc-val">'+complete+'</div></div>'+
    '<div class="sum-card bad"><div class="sc-label">未查核</div><div class="sc-val">'+incomplete+'</div></div>'+
    '<div class="sum-card rate"><div class="sc-label">達成率</div><div class="sc-val">'+rate+'%</div></div>';
}

/* 統一的分層卡片產生器（跟 audit/coverage 的 buildCard 同一套視覺語言）：
   isOverall=true 時渲染成「整體概況」卡（不可點擊，純資訊），否則渲染成可鑽層的下一層卡片。
   rows 需已經是套用過 _storeStatus 的陣列（每筆有 ._status）。 */
function buildLevelCard(name, topLabel, rows, isOverall, onclickAttr, scopeArea, scopeOffice, scopeStaff){
  var total = rows.length;
  var complete = rows.filter(function(r){ return r._status.isComplete; }).length;
  var incomplete = total - complete;
  var rate = total ? Math.round(complete/total*1000)/10 : 0;
  var topText = isOverall ? '整體概況' : topLabel;
  var styleAttr = onclickAttr ? '' : ' style="cursor:default;"';
  var sa = scopeArea ? esc(scopeArea).replace(/'/g,"\\'") : '';
  var so = scopeOffice ? esc(scopeOffice).replace(/'/g,"\\'") : '';
  var ss = scopeStaff ? esc(scopeStaff).replace(/'/g,"\\'") : '';
  var detailBtn = '<button class="card-detail-btn" onclick="event.stopPropagation();openLevelStoreDetail(\''+sa+'\',\''+so+'\',\''+ss+'\',\''+esc(name).replace(/'/g,"\\'")+'\')">📋 店家明細</button>';
  return '<div class="card'+(isOverall?' card-overall':'')+'"'+styleAttr+' '+(onclickAttr||'')+'>'
    + '<div class="card-top-inline">'+esc(topText)+' <span class="card-name-inline">'+esc(name)+'</span>'+detailBtn+'</div>'
    + '<div class="stat-row">'
    +   '<div class="stat-item"><div class="stat-label">總店數</div><div class="stat-val">'+total+'</div></div>'
    +   '<div class="stat-item grp"><div class="stat-label">已查核</div><div class="stat-val">'+complete+'</div></div>'
    +   '<div class="stat-item warn"><div class="stat-label">未查核</div><div class="stat-val">'+incomplete+'</div></div>'
    +   '<div class="stat-item rate"><div class="stat-label">達成率</div><div class="stat-val">'+rate+'%</div></div>'
    + '</div></div>';
}
/* 每一層卡片的「📋 店家明細」按鈕都走這支——不需要先鑽層到底才能看店家清單，
   直接依這張卡片代表的範圍（處／所／人員）重新算一次篩選結果，開 Pivot Dialog
   並定位到「店家」分頁，滿足需求書 A 項「路徑直達」。 */
function openLevelStoreDetail(scopeArea, scopeOffice, scopeStaff, label){
  var rows = getScopedStores(scopeArea||'', scopeOffice||'', scopeStaff||'');
  openSummaryDialog('store', function(){ return rows; });
}

function renderStage(all){
  var stage = document.getElementById('stage');
  var depth = drillStack.length;
  if(depth===0){ renderAreaOverview(); return; }
  if(depth===1){ renderOfficeOverview(); return; }
  if(depth===2){ renderStaffOverview(); return; }
  /* depth===3：某位人員底下的店家 leaf 卡片，整體概況卡（該人員彙總）放最前面 */
  var html = buildBreadcrumb();
  if(!all.length){ stage.innerHTML = html + '<div class="empty">目前篩選條件下沒有符合的店家</div>'; return; }
  var shown = all.slice(0, _renderedCount);
  html += '<div class="grid">' + buildLevelCard(drillStack[2].key, '人員', all, true, '', drillStack[0].key, drillStack[1].key, drillStack[2].key) + '</div>';
  html += '<div class="result-count">共 '+all.length+' 家，顯示 '+shown.length+' 家</div>';
  html += '<div class="grid">' + shown.map(buildStoreCard).join('') + '</div>';
  if(all.length > shown.length){
    html += '<div class="loadmore-wrap"><button class="loadmore-btn" onclick="loadMore()">顯示更多（還有 '+(all.length-shown.length)+' 家）</button></div>';
  }
  stage.innerHTML = html;
}
function buildBreadcrumb(){
  var depth = drillStack.length;
  var backFn = depth>=3 ? 'drillBackToStaffList()' : (depth>=2 ? 'drillBackToOffice()' : 'drillBackToOverview()');
  var backLabel = depth>=3 ? ('← 返回 '+esc(drillStack[1].key)+' 人員列表')
                : depth>=2 ? ('← 返回 '+esc(drillStack[0].key)+' 所/課列表')
                : '← 返回全處總覽';
  var crumb = drillStack.map(function(d){ return esc(d.key); }).join(' › ');
  return '<div style="margin-bottom:14px;"><button class="back-btn" onclick="'+backFn+'">'+backLabel+'</button> '
    + '<span style="font-size:13px;font-weight:700;margin-left:8px;">'+crumb+'</span></div>';
}
function renderAreaOverview(){
  var stage = document.getElementById('stage');
  var areas = AREA_ORDER.filter(function(a){ return ORG_SKELETON[a] || STORE_ROWS.some(function(r){ return r.area===a; }); });
  STORE_ROWS.forEach(function(r){ if(r.area && areas.indexOf(r.area)===-1) areas.push(r.area); });
  if(!areas.length){ stage.innerHTML = '<div class="empty">沒有可顯示的營業處資料</div>'; return; }
  var allRows = getScopedStores();
  var html = '<div class="level-label">依營業處總覽 · 點卡片看該處營業所/課</div>';
  html += '<div class="grid">';
  html += buildLevelCard('全台', '', allRows, true, '');
  areas.forEach(function(area){
    var rows = getScopedStores(area);
    html += buildLevelCard(area, '營業處', rows, false, 'onclick="drillIntoArea(\''+esc(area).replace(/'/g,"\\'")+'\')"', area);
  });
  html += '</div>';
  stage.innerHTML = html;
}
/* 第二層：鑽入某一處之後，改看該處底下的營業所/課卡片，整體概況卡（該處彙總）放最前面 */
function renderOfficeOverview(){
  var stage = document.getElementById('stage');
  var area = drillStack[0].key;
  var offices = (ORG_SKELETON[area]||[]).slice();
  STORE_ROWS.forEach(function(r){ if(r.area===area && r.office && offices.indexOf(r.office)===-1) offices.push(r.office); });
  var areaRows = getScopedStores(area);
  var html = buildBreadcrumb();
  if(!offices.length){ stage.innerHTML = html + '<div class="empty">這個處目前沒有可顯示的營業所/課資料</div>'; return; }
  html += '<div class="level-label">'+esc(area)+' · 依營業所/課總覽 · 點卡片看該所人員</div>';
  html += '<div class="grid">';
  html += buildLevelCard(area, '', areaRows, true, '', area);
  offices.forEach(function(office){
    var rows = getScopedStores(area, office);
    html += buildLevelCard(office, '營業所/課', rows, false, 'onclick="drillIntoOffice(\''+esc(office).replace(/'/g,"\\'")+'\')"', area, office);
  });
  html += '</div>';
  stage.innerHTML = html;
}
/* 第三層（原本完全沒有這一層）：鑽入某個所/課之後，改看該所底下的人員卡片，
   整體概況卡（該所彙總）放最前面，點人員卡片才進到店家 leaf 卡片 */
function renderStaffOverview(){
  var stage = document.getElementById('stage');
  var area = drillStack[0].key, office = drillStack[1].key;
  var officeRows = STORE_ROWS.filter(function(r){ return r.area===area && r.office===office; });
  var staffList = [];
  officeRows.forEach(function(r){ if(r.staff && staffList.indexOf(r.staff)===-1) staffList.push(r.staff); });
  staffList.sort();
  var officeScoped = getScopedStores(area, office);
  var html = buildBreadcrumb();
  if(!staffList.length){ stage.innerHTML = html + '<div class="empty">這個所/課目前沒有可顯示的人員資料</div>'; return; }
  html += '<div class="level-label">'+esc(area)+' › '+esc(office)+' · 依人員總覽 · 點卡片看該人員負責店家</div>';
  html += '<div class="grid">';
  html += buildLevelCard(office, '', officeScoped, true, '', area, office);
  staffList.forEach(function(staff){
    var rows = getScopedStores(area, office, staff);
    html += buildLevelCard(staff, '人員', rows, false, 'onclick="drillIntoStaff(\''+esc(staff).replace(/'/g,"\\'")+'\')"', area, office, staff);
  });
  html += '</div>';
  stage.innerHTML = html;
}
function loadMore(){ _renderedCount += RENDER_LIMIT; renderStage(getFilteredStores()); }

/* 店家 leaf 卡片：大卡片風格＋可點擊開個案明細 Dialog（原本這裡是死路，點了沒反應） */
function buildStoreCard(store){
  var st = store._status;
  var rate = st.n ? Math.round(st.k/st.n*1000)/10 : 0;
  var itemsHtml = store.needed.map(function(it){
    var ok = st.collected.indexOf(it)!==-1;
    return '<span class="sc-item '+(ok?'ok':'no')+'">'+(ok?'✅':'❌')+' '+esc(it)+'</span>';
  }).join('');
  var safeCode = esc(store.code).replace(/'/g,"\\'");
  return '<div class="card" onclick="openStoreDetail(\''+safeCode+'\')">'
    + '<div class="card-top-inline">'+esc(store.office)+' <span class="card-name-inline">'+esc(store.storeName)+'</span>'
    +   '<button class="card-detail-btn" onclick="event.stopPropagation();openStoreDetail(\''+safeCode+'\')">📋 明細</button>'
    + '</div>'
    + '<div class="store-meta-line">'+esc(store.code)+' · '+esc(store.staff)+'</div>'
    + '<div class="stat-row">'
    +   '<div class="stat-item"><div class="stat-label">應達成</div><div class="stat-val">'+st.n+'</div></div>'
    +   '<div class="stat-item grp"><div class="stat-label">已查核</div><div class="stat-val">'+st.k+'</div></div>'
    +   '<div class="stat-item warn"><div class="stat-label">未查核</div><div class="stat-val">'+(st.n-st.k)+'</div></div>'
    +   '<div class="stat-item rate"><div class="stat-label">達成率</div><div class="stat-val">'+rate+'%</div></div>'
    + '</div>'
    + '<div class="sc-items">'+itemsHtml+'</div>'
    + '</div>';
}

/* ════════════════════════════════════════════════════════════
   PIVOT DIALOG（彙整看板）—— 人員／單位／店家／未達成清單／照片牆
   ════════════════════════════════════════════════════════════ */
var _pivotMode = 'staff';
var _pivotTabIndex = { staff:0, office:1, store:2, missing:3, photos:4, drilldown:5, subcol:6 };
var PIVOT_TITLES = { staff:'人員視角', office:'單位視角', store:'店家視角', missing:'未達成清單', photos:'照片牆', drilldown:'逐題彙整', subcol:'細項匯出' };

function _aggBy(rows, keyFn){
  var map = {};
  rows.forEach(function(r){
    var k = keyFn(r);
    if(!map[k]) map[k] = { key:k, stores:0, complete:0, incomplete:0, missingCount:0, rows:[] };
    map[k].stores++;
    map[k].rows.push(r);
    if(r._status.isComplete) map[k].complete++; else { map[k].incomplete++; map[k].missingCount += r._status.missing.length; }
  });
  return Object.keys(map).sort().map(function(k){ return map[k]; });
}
/* 巢狀店家清單（單一 <tr><td colspan> 包一張 mini-table）：人員／單位彙整表
   點某一列展開後看到的內容，跟「店家」分頁 _renderStoreTable 是同一份資料、
   同一種欄位排法，點列一樣走 closeSummaryDialog()+openStoreDetail(code)，
   不另外做一套展示邏輯——本板店家明細一律走獨立 Dialog（跟 audit_board/
   coverage_board 用 inline 展開問卷明細的作法不同），這裡延續同一個慣例。 */
function _buildContractStoreListEmbed(matchRows){
  var sorted = matchRows.slice().sort(function(a,b){ return String(a.storeName||'').localeCompare(String(b.storeName||''),'zh-TW'); });
  var html = '<table class="pivot-tbl pivot-nested-tbl"><thead><tr>'
    + '<th class="th-left">店碼</th><th class="th-left">店名</th><th>已查核/應達成</th><th>達成率</th>'
    + '</tr></thead><tbody>';
  sorted.forEach(function(r){
    var rate = r._status.n ? Math.round(r._status.k/r._status.n*1000)/10 : 0;
    var safeCode = esc(r.code).replace(/'/g,"\\'");
    html += '<tr class="pivot-expand-row" onclick="openStoreDetailFromPivot(\''+safeCode+'\')">'
      + '<td class="td-left">'+esc(r.code)+'</td><td class="td-left">'+esc(r.storeName)+'</td>'
      + '<td>'+r._status.k+'/'+r._status.n+'</td><td>'+rate+'%</td></tr>';
  });
  html += '</tbody></table>';
  return html;
}
var _aggExpandRows = {};
function _renderAggTable(rows, keyFn, keyLabel){
  var agg = _aggBy(rows, keyFn);
  /* 不在這裡整包清空 _aggExpandRows：openSummaryDialog 一次會把 staff／office
     兩個分頁都渲染過一輪，如果每次渲染都整包歸零，後渲染的分頁（office）會把
     先渲染的分頁（staff）填進去的資料整包洗掉——staff 分頁點展開永遠是空的。
     rid 已經把 keyLabel（業務員／單位）內嵌進去，兩分頁的 key 本來就不會撞，
     這裡只需要覆寫自己那組 rid，不用清空整個物件。 */
  var html = '<table class="pivot-tbl"><thead><tr>'
    + '<th class="th-left">'+esc(keyLabel)+'</th><th>總店數</th><th>已查核</th><th>未查核</th><th>達成率</th>'
    + '</tr></thead><tbody>';
  var totS=0, totC=0, totI=0;
  agg.forEach(function(a){
    var rate = a.stores ? Math.round(a.complete/a.stores*1000)/10 : 0;
    totS+=a.stores; totC+=a.complete; totI+=a.incomplete;
    var rid = 'agg-'+_rid(keyLabel+'-'+a.key);
    _aggExpandRows[rid] = a.rows;
    html += '<tr class="pivot-expand-row" onclick="_toggleAggExpand(\''+rid+'\')">'
      + '<td class="td-left">▸ '+esc(a.key)+'</td><td>'+a.stores+'</td><td>'+a.complete+'</td><td>'+a.incomplete+'</td><td>'+rate+'%</td></tr>';
    html += '<tr class="pivot-child-row" id="child-'+rid+'" style="display:none;"><td colspan="5">'
      + '<div id="body-'+rid+'" style="padding:6px 8px 12px 24px;"></div></td></tr>';
  });
  var totRate = totS ? Math.round(totC/totS*1000)/10 : 0;
  html += '<tr class="sum-footer"><td class="td-left">合計</td><td>'+totS+'</td><td>'+totC+'</td><td>'+totI+'</td><td>'+totRate+'%</td></tr>';
  html += '</tbody></table>';
  return html;
}
/* 點一列展開/收合底下的店家清單；內容延遲到第一次展開才渲染
   （_buildContractStoreListEmbed 需要的 rows 已經在 _renderAggTable 時
   存進 _aggExpandRows，這裡不用重新查一次）。 */
function _toggleAggExpand(rid){
  var row = document.getElementById('child-'+rid);
  if(!row) return;
  var isOpen = row.style.display !== 'none';
  if(isOpen){ row.style.display = 'none'; return; }
  var body = document.getElementById('body-'+rid);
  if(body && !body.innerHTML) body.innerHTML = _buildContractStoreListEmbed(_aggExpandRows[rid] || []);
  row.style.display = 'table-row';
}
function _renderMissingTable(rows){
  var missRows = rows.filter(function(r){ return !r._status.isComplete; });
  var html = '<table class="pivot-tbl"><thead><tr>'
    + '<th class="th-left">單位</th><th class="th-left">業務員</th><th class="th-left">店代碼</th><th class="th-left">店名</th><th class="th-left">未查核品項</th>'
    + '</tr></thead><tbody>';
  missRows.forEach(function(r){
    html += '<tr><td class="td-left">'+esc(r.area)+' '+esc(r.office)+'</td><td class="td-left">'+esc(r.staff)+'</td>'
      + '<td class="td-left">'+esc(r.code)+'</td><td class="td-left">'+esc(r.storeName)+'</td>'
      + '<td class="td-left">'+r._status.missing.map(function(m){ return '<span class="miss-tag">'+esc(m)+'</span>'; }).join('')+'</td></tr>';
  });
  html += '<tr class="sum-footer"><td class="td-left" colspan="5">共 '+missRows.length+' 家未查核</td></tr>';
  html += '</tbody></table>';
  return html;
}
/* 店家視角：不分單位/人員分組，逐店攤平列出，方便直接掃視整份清單、點列可開個案明細 */
function _renderStoreTable(rows){
  var html = '<table class="pivot-tbl"><thead><tr>'
    + '<th class="th-left">營業處</th><th class="th-left">所/課</th><th class="th-left">人員</th>'
    + '<th class="th-left">店碼</th><th class="th-left">店名</th><th>已查核/應達成</th><th>達成率</th>'
    + '</tr></thead><tbody>';
  rows.forEach(function(r){
    var rate = r._status.n ? Math.round(r._status.k/r._status.n*1000)/10 : 0;
    var safeCode = esc(r.code).replace(/'/g,"\\'");
    html += '<tr class="pivot-expand-row" onclick="openStoreDetailFromPivot(\''+safeCode+'\')">'
      + '<td class="td-left">'+esc(r.area)+'</td><td class="td-left">'+esc(r.office)+'</td><td class="td-left">'+esc(r.staff)+'</td>'
      + '<td class="td-left">'+esc(r.code)+'</td><td class="td-left">'+esc(r.storeName)+'</td>'
      + '<td>'+r._status.k+'/'+r._status.n+'</td><td>'+rate+'%</td></tr>';
  });
  html += '</tbody></table>';
  return html;
}
function _renderPivotSlide(mode){
  var el = document.getElementById('pivot-slide-'+mode);
  if(!el) return;
  var rows = _pivotRows || [];
  if(mode==='staff') el.innerHTML = _renderAggTable(rows, function(r){ return r.staff; }, '業務員');
  else if(mode==='office') el.innerHTML = _renderAggTable(rows, function(r){ return r.area+' '+r.office; }, '單位');
  else if(mode==='store') el.innerHTML = _renderStoreTable(rows);
  else if(mode==='missing') el.innerHTML = _renderMissingTable(rows);
  else if(mode==='photos') el.innerHTML = _buildPhotoWall(rows);
  else if(mode==='drilldown') el.innerHTML = _buildDrilldownTab(rows);
  else if(mode==='subcol') el.innerHTML = _buildSubColPanel();
}

/* ══════════════ 彙整看板 ─ 🧩 細項匯出分頁 ══════════════
   比照 coverage_board.html 3.5.0 的「細項匯出」搬過來：讓使用者跨欄位
   任意勾選 1～N 個「應達成品項」（ITEM_KEYS：菸／啤酒／烈酒／系統店），
   立刻看到目前彙整範圍內「已達成該品項」的店家清單，可另外複製 LINE
   文字或下載獨立 CSV。跟既有「⚠️ 未達成清單」分頁是互補關係：那邊看
   的是缺什麼，這裡讓你反過來、針對某幾個特定品項匯出「誰已經達成」。
   contract 的品項是固定 4 個、不分群組（不像 coverage 有 B/C 兩種桶），
   所以這裡全部歸在同一組「應達成品項」底下，供勾選；資料模型也沒有
   coverage C 桶那種「附加文字說明」，valText 一律留空字串。 */
var _subColSel = {}; /* key: 'item:0:'+品項名稱 → true 表示已勾選，
                         每次從工具列重新開啟彙整看板前會設回 {}（見主工具列／
                         detail dialog 捷徑按鈕的 onclick），分頁內部切換不影響它 */
function _allSubColDefs(){
  return ITEM_KEYS.map(function(it){ return { gtype:'item', gi:0, label:'應達成品項', col:it }; });
}
function _subColKey(d){ return d.gtype+':'+d.gi+':'+d.col; }
function _subColScopeTitle(){
  var el = document.getElementById('sum-title');
  return (el && el.textContent.trim()) || PROJ_NAME || '彙整看板';
}
/* 店家個案明細 Dialog 的 🧩 按鈕：關掉明細、改開彙整看板並直接跳到細項
   匯出分頁。範圍固定使用「目前整體彙整範圍」（getFilteredStores，跟工具列
   其他彙整看板按鈕一致），不是這次明細 dialog 單一店家的範圍。 */
function _jumpToSubcolExport(){
  closeStoreDetail();
  _subColSel = {};
  openSummaryDialog('subcol', getFilteredStores);
}
function _buildSubColPanel(){
  var defs = _allSubColDefs();
  var scopeTitle = _subColScopeTitle();
  if(!defs.length) return '<div style="padding:10px 12px;font-size:12px;color:var(--sub);">目前沒有可選的子欄位</div>';
  var byGroup = {}, order = [];
  defs.forEach(function(d){
    var gk = d.gtype+':'+d.gi;
    if(!byGroup[gk]){ byGroup[gk] = { label:d.label, items:[] }; order.push(gk); }
    byGroup[gk].items.push(d);
  });
  var html = '<div style="padding:10px 12px;font-size:12px;">';
  html += '<div style="font-weight:700;margin-bottom:2px;">🧩 細項匯出 ── 勾選想匯出的品項（可跨品項、可只選其中幾個），列出「目前範圍內已達成該品項」的店家</div>';
  html += '<div style="color:var(--sub);margin-bottom:8px;">範圍：'+esc(scopeTitle)+'（跟目前彙整看板其他分頁相同範圍）</div>';
  order.forEach(function(gk){
    var grp = byGroup[gk];
    var allChecked = grp.items.every(function(d){ return !!_subColSel[_subColKey(d)]; });
    html += '<div style="margin:6px 0 4px;">';
    html += '<label style="font-weight:600;cursor:pointer;"><input type="checkbox" '+(allChecked?'checked':'')+' onclick="_subColToggleGroup(\''+esc(gk)+'\',this.checked)"> '+esc(grp.label)+'（整組）</label>';
    html += '<div style="display:flex;flex-wrap:wrap;gap:8px;margin:4px 0 0 18px;">';
    grp.items.forEach(function(d){
      var key = _subColKey(d);
      html += '<label style="cursor:pointer;"><input type="checkbox" onclick="_subColToggle(\''+esc(key)+'\',this.checked)" '+(_subColSel[key]?'checked':'')+'> '+esc(d.col)+'</label>';
    });
    html += '</div></div>';
  });
  html += '<div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;">'
    + '<button class="dlg-action-btn" onclick="_subColLineCopy(this)"><span class="btn-icon">💬</span><span class="btn-txt"> 複製LINE文字</span></button>'
    + '<button class="dlg-action-btn" onclick="_subColCsvDownload(this)"><span class="btn-icon">📥</span><span class="btn-txt"> 下載CSV</span></button>'
    + '<span id="subcol-match-count" style="color:var(--sub);"></span>'
    + '</div></div>';
  return html;
}
function _subColToggle(key, checked){
  if(checked) _subColSel[key] = true; else delete _subColSel[key];
  _subColUpdateCount();
}
function _subColToggleGroup(gk, checked){
  _allSubColDefs().filter(function(d){ return (d.gtype+':'+d.gi)===gk; }).forEach(function(d){
    var key = _subColKey(d);
    if(checked) _subColSel[key] = true; else delete _subColSel[key];
  });
  var slide = document.getElementById('pivot-slide-subcol');
  if(slide) slide.innerHTML = _buildSubColPanel();
}
function _subColSelectedDefs(){
  return _allSubColDefs().filter(function(d){ return _subColSel[_subColKey(d)]; });
}
/* 範圍改用彙整看板當下的 _pivotRows（跟其他分頁一致）。命中定義＝該品項
   在 r.needed（適用）且在 r._status.collected（已達成）——跟「⚠️ 未達成
   清單」互補，那邊看 missing，這裡看 collected。 */
function _subColMatchedRows(){
  var defs = _subColSelectedDefs();
  if(!defs.length) return [];
  var rows = _pivotRows || [];
  var out = [];
  rows.forEach(function(r){
    var matched = [];
    defs.forEach(function(d){
      if(r.needed && r.needed.indexOf(d.col)!==-1 && r._status && r._status.collected.indexOf(d.col)!==-1){
        matched.push({ def:d, valText:'' });
      }
    });
    if(matched.length) out.push({ r:r, matched:matched });
  });
  return out;
}

/* LINE 分享文字：依「單位 → 人員」分組，跟 coverage 的細項匯出排版一致 */
function _subColLineText(){
  var DIV = '─────────────────';
  var defs = _subColSelectedDefs();
  var matched = _subColMatchedRows();
  var groups = {}, order = [];
  matched.forEach(function(m){
    var office = String(m.r.office||'—'), staff = String(m.r.staff||'—');
    var key = office+'\u0001'+staff;
    if(!groups[key]){ groups[key] = { office:office, staff:staff, items:[] }; order.push(key); }
    groups[key].items.push(m);
  });
  order.sort(function(ka, kb){
    var ga = groups[ka], gb = groups[kb];
    if(ga.office !== gb.office) return ga.office.localeCompare(gb.office, 'zh-TW');
    return ga.staff.localeCompare(gb.staff, 'zh-TW');
  });
  var singleDefNoText = defs.length === 1;
  var lines = ['【'+_subColScopeTitle()+'】細項匯出 ── '+defs.map(function(d){return d.col;}).join('、'), '共 '+matched.length+' 家', DIV];
  order.forEach(function(key){
    var g = groups[key];
    lines.push('');
    lines.push('▌ '+g.office+'．'+g.staff+'（共 '+g.items.length+' 家）');
    g.items.forEach(function(m){
      var r = m.r;
      var code = String(r.code||''), name = String(r.storeName||'—');
      var hasText = m.matched.some(function(x){ return x.valText; });
      lines.push('  '+name+(code?'('+code+')':''));
      if(!singleDefNoText || hasText){
        m.matched.forEach(function(x){
          lines.push('   └'+x.def.col+(x.valText?'：'+x.valText:''));
        });
      }
    });
  });
  lines.push('');
  lines.push('📅 '+new Date().toLocaleString('zh-TW',{timeZone:'Asia/Taipei'}));
  return lines.join('\n');
}
