/* ════════════════════════════════════════════════════════════
   原始問卷回溯 —— 跟 AUDIT 完全同一套「來源分頁+行數」跨分頁連結鍵機制
   ────────────────────────────────────────────────────────────
   處理層的 A 欄「來源分頁+行數」（格式：分頁名稱_行數，例：問卷資料查傳菸_1654）
   指向真正的原始問卷資料在哪一份分頁的哪一列。每個分類/地區各自一份原始
   問卷分頁（問卷資料查傳菸、問卷資料查北啤…），不是單一集中分頁——
   之前假設一份叫「問卷資料」的單一分頁是錯的，已經改掉。
   ════════════════════════════════════════════════════════════ */
var _sourceSheetCache = {};

function _parseSourceRef(val){
  var s = String(val||'').trim();
  if(!s) return null;
  var idx = s.lastIndexOf('_');
  if(idx===-1) return null;
  var sheetName = s.substring(0, idx);
  var rowNum = parseInt(s.substring(idx+1), 10);
  if(!sheetName || !rowNum || isNaN(rowNum)) return null;
  return { sheet: sheetName, row: rowNum };
}

/* 抓某一份原始問卷分頁整頁資料，解析成「基本資料欄」+「大題_選項」問卷欄，
   依 Sheet 實際列號索引，跟 audit_board._fetchSourceSheet 邏輯完全一致 */
function _fetchSourceSheet(sheetName, callback){
  if(_sourceSheetCache[sheetName]){ callback(_sourceSheetCache[sheetName]); return; }
  var dataUrl = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
    '/gviz/tq?tqx=out:json&headers=0&sheet=' + encodeURIComponent(sheetName);
  /* 【修正】欄名不能只靠 headers=0 那次請求的第一列（rawRows[0]）去讀：
     gviz 會依「整欄大多數儲存格內容」推斷該欄型別，「月份」這類欄位底下
     多為日期值，整欄被判成 date/datetime 型別後，表頭那格的純文字（例如
     「月份」）無法塞進該型別，gviz 直接回傳 v:null（f 也沒有），導致該欄
     欄名在解析階段整個漏收——不是值抓錯，是這欄的「欄名」從一開始就沒被
     收進 baseColNames，跟 coverage_board.html／audit_board.html 踩到的是
     同一個坑（同一段程式碼複製三份、坑也跟著複製三份，見 shared/core-utils.js
     1.0.5 版本紀錄的診斷過程）。
     改成另外多發一支 headers=1 的請求，只用 table.cols[i].label 取得欄名
     （label 是表頭文字本身，不受欄位型別推斷影響），資料列仍照舊用
     headers=0 那次請求讀，不更動既有資料解析邏輯。 */
  var headerUrl = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
    '/gviz/tq?tqx=out:json&headers=1&sheet=' + encodeURIComponent(sheetName);
  Promise.all([
    fetch(dataUrl).then(function(r){ return r.text(); }),
    fetch(headerUrl).then(function(r){ return r.text(); })
  ]).then(function(results){
    var json = gvizParse(results[0]);
    var headerJson = gvizParse(results[1]);
    var rawRows = (json.table && json.table.rows) || [];
    if(rawRows.length < 1){ callback(null, '分頁「'+sheetName+'」完全沒有資料'); return; }

    function cellVal(row, i){
      if(!row) return '';
      var c = row.c && row.c[i];
      if(!c) return '';
      var v=(c.v!==null&&c.v!==undefined)?c.v:'';
      var f=c.f||'';
      if(typeof v==='string' && /^Date\(/.test(v)) return f || parseGvizDate(v);
      return (v!==''&&v!==null&&v!==undefined)?v:f;
    }
    var headerLabels = ((headerJson.table||{}).cols || []).map(function(c){ return String(c.label||'').trim(); });
    var colCount = headerLabels.length;
    var baseColNames = [], quizCols = [];
    for(var i=0;i<colCount;i++){
      var h = headerLabels[i] || '';
      if(!h) continue;
      if(h.indexOf('_')!==-1){
        var parts = h.split('_');
        quizCols.push({ col:i, section:parts[0].trim(), option:parts.slice(1).join('_').trim() });
      } else {
        baseColNames.push(h);
      }
    }
    if(quizCols.length===0){
      callback(null, '分頁「'+sheetName+'」沒有偵測到任何「大題_選項」格式的欄位');
      return;
    }
    var rowsByNum = {};
    for(var ri=1; ri<rawRows.length; ri++){
      var row = rawRows[ri];
      var base = {};
      baseColNames.forEach(function(name){
        var bi=-1;
        for(var cIdx=0; cIdx<colCount; cIdx++){ if(headerLabels[cIdx]===name){ bi=cIdx; break; } }
        base[name] = bi!==-1 ? cellVal(row,bi) : '';
      });
      var sections = {}, order = [];
      quizCols.forEach(function(qc){
        var v = String(cellVal(row,qc.col)||'').trim();
        if(!v) return;
        if(!sections[qc.section]){ sections[qc.section]=[]; order.push(qc.section); }
        sections[qc.section].push({ option:qc.option, value:v });
      });
      var sheetRowNum = ri+1; /* rawRows[0]=Sheet第1列(標題)，故 rawRows[ri] 對應 Sheet 第 ri+1 列 */
      rowsByNum[sheetRowNum] = { base:base, sections: order.map(function(s){ return {section:s, picks:sections[s]}; }) };
    }
    var result = { rowsByNum: rowsByNum };
    _sourceSheetCache[sheetName] = result;
    callback(result);
  }).catch(function(err){ callback(null, String(err)); });
}

/* 依「來源分頁+行數」抓單筆完整內容 */
function _fetchSourceRowDetail(refVal, callback){
  var ref = _parseSourceRef(refVal);
  if(!ref){ callback(null, null, '「來源分頁+行數」格式不符：'+refVal); return; }
  _fetchSourceSheet(ref.sheet, function(sheetData, err){
    if(err || !sheetData){ callback(null, ref, '讀取分頁「'+ref.sheet+'」失敗：'+(err||'')); return; }
    var rowData = sheetData.rowsByNum[ref.row];
    if(!rowData){ callback(null, ref, '分頁「'+ref.sheet+'」第 '+ref.row+' 列查無資料（可能超出範圍或該列已被刪除）'); return; }
    callback(rowData, ref, null);
  });
}

/* ════ 照片牆：用 PROCESS_REFS（處理層的「來源分頁+行數」）逐一回溯原始問卷 ════
   跟單一分頁不同，這裡範圍內的店家可能分散在好幾份不同的原始問卷分頁裡，
   先取不重複的分頁名稱各抓一次（沿用 _fetchSourceSheet 的分頁層級快取，
   同一分頁不會因為好幾家店都指向它就重複發請求），全部抓完才彙整成清單。 */
function _buildPhotoWall(rows){
  if(!rows.length) return '<div class="photo-gallery-empty">無資料</div>';
  var codeMap = {};
  rows.forEach(function(r){ if(!codeMap[r.code]) codeMap[r.code]=r; });

  var allRefs = [];
  Object.keys(codeMap).forEach(function(code){
    (PROCESS_REFS[code]||[]).forEach(function(rr){ allRefs.push({ code:code, rr:rr }); });
  });
  if(!allRefs.length) return '<div class="photo-gallery-empty">目前範圍內的「處理層」紀錄沒有「來源分頁+行數」可回溯（請確認處理層該欄有值）</div>';

  var sheetNames = [];
  allRefs.forEach(function(a){
    var ref = _parseSourceRef(a.rr.ref);
    if(ref && sheetNames.indexOf(ref.sheet)===-1) sheetNames.push(ref.sheet);
  });

  var containerId = 'photo-wall-' + Date.now();
  var pending = sheetNames.length;
  var errs = [];

  function renderNow(){
    var el = document.getElementById(containerId);
    if(!el) return; /* 使用者可能已經切走分頁 */
    var cards = [];
    allRefs.forEach(function(a){
      var ref = _parseSourceRef(a.rr.ref);
      if(!ref) return;
      var sheetData = _sourceSheetCache[ref.sheet];
      if(!sheetData) return;
      var rowData = sheetData.rowsByNum[ref.row];
      if(!rowData) return;
      var photos = _extractPhotosFromSections(rowData.sections);
      if(!photos.length) return;
      cards.push({ store: codeMap[a.code], rr: a.rr, photos: photos });
    });
    if(!cards.length){
      el.innerHTML = '<div class="photo-gallery-empty">目前範圍內的紀錄都沒有找到照片'
        + (errs.length ? '（部分分頁讀取失敗：'+esc(errs.join('；'))+'）' : '')
        + '</div>';
      return;
    }
    cards.sort(function(a,b){ return a.rr.ym<b.rr.ym?1:(a.rr.ym>b.rr.ym?-1:0); });
    var totalPhotos = cards.reduce(function(s,c){ return s+c.photos.length; },0);
    /* 外層包一層 photo-gallery-wrap（版面 padding）＋ photo-gallery-wall——後者是
       shared/photo-viewer.js 燈箱「跨紀錄無限左右切換」認得的範圍容器（見
       _PHOTO_GALLERY_SCOPE_SELECTOR），對齊 coverage_board.html 的作法，原本這裡
       完全沒包容器，燈箱 closest() 找不到範圍會退回整頁，跟頁面上其他不相干的
       照片混在一起切換。 */
    var html = '<div class="photo-gallery-wrap photo-gallery-wall">'
      + '<div class="photo-gallery-summary">📸 共 <strong>'+cards.length+'</strong> 筆紀錄　🖼️ 共 <strong>'+totalPhotos+'</strong> 張照片</div>';
    cards.forEach(function(c){
      var storeName = c.store ? c.store.storeName : c.rr.category;
      var bySection = {}, order = [];
      c.photos.forEach(function(p){ if(!bySection[p.section]){bySection[p.section]=[];order.push(p.section);} bySection[p.section].push(p); });
      var sectionsHtml = order.map(function(sec){
        var photosHtml = bySection[sec].map(function(p){ return _renderPhotoChip(p.option, p.url, null, { store:storeName, section:sec }); }).join('');
        return '<div class="raw-quiz-section"><div class="raw-quiz-title">📋 '+esc(sec)+'</div><div class="raw-quiz-photos">'+photosHtml+'</div></div>';
      }).join('');
      html += '<div class="photo-store-card">'
        + '<div class="photo-store-head"><span class="photo-store-name">🏪 '+esc(storeName)+'</span>'
        + '<span class="photo-store-meta">🕒 '+esc(c.rr.ym)+'　'+esc(c.store?[c.store.area,c.store.office,c.store.staff].filter(Boolean).join(' · '):'')+'</span></div>'
        + '<div class="photo-gallery-sections">'+sectionsHtml+'</div></div>';
    });
    html += '</div>';
    el.innerHTML = html;
  }
  sheetNames.forEach(function(sn){
    _fetchSourceSheet(sn, function(data, err){
      if(err) errs.push(sn+'：'+err);
      pending--;
      if(pending<=0) renderNow();
    });
  });
  return '<div id="'+containerId+'" class="photo-gallery-loading">⏳ 讀取 '+sheetNames.length+' 份來源分頁中…</div>';
}

/* ════ 逐題彙整分頁：跟照片牆（_buildPhotoWall）同一套 PROCESS_REFS 跨分頁
   回溯機制，差別是不篩選「只有照片」，文字答案也一併收進 entries，交給
   shared/question-drilldown.js 讓使用者自己選一個大題/選項來看。
   一樣是非同步（要等所有來源分頁都抓完），用同一套 containerId + outerHTML
   替換寫法。 ════ */
function _buildDrilldownTab(rows){
  if(!rows.length) return '<div class="empty">無資料</div>';
  var codeMap = {};
  rows.forEach(function(r){ if(!codeMap[r.code]) codeMap[r.code]=r; });

  var allRefs = [];
  Object.keys(codeMap).forEach(function(code){
    (PROCESS_REFS[code]||[]).forEach(function(rr){ allRefs.push({ code:code, rr:rr }); });
  });
  if(!allRefs.length){
    return '<div class="empty">目前範圍內的「處理層」紀錄沒有「來源分頁+行數」可回溯（請確認處理層該欄有值）</div>';
  }

  var sheetNames = [];
  allRefs.forEach(function(a){
    var ref = _parseSourceRef(a.rr.ref);
    if(ref && sheetNames.indexOf(ref.sheet)===-1) sheetNames.push(ref.sheet);
  });

  var containerId = 'qd-wall-' + Date.now();
  var pending = sheetNames.length;

  function finish(){
    var el = document.getElementById(containerId);
    if(!el) return; /* 使用者已經切走分頁或關閉 dialog */
    var entries = [];
    allRefs.forEach(function(a){
      var ref = _parseSourceRef(a.rr.ref);
      if(!ref) return;
      var sheetData = _sourceSheetCache[ref.sheet];
      if(!sheetData) return;
      var rowData = sheetData.rowsByNum[ref.row];
      if(!rowData || !rowData.sections || !rowData.sections.length) return;
      var store = codeMap[a.code];
      entries.push({
        label: store ? store.storeName : a.rr.category,
        meta: store ? [store.area, store.office, store.staff].filter(Boolean).join(' · ') : '',
        timeText: a.rr.ym || '',
        sections: rowData.sections
      });
    });
    el.outerHTML = _qdBuildTabHtml(entries);
  }

  if(pending === 0){ return _qdBuildTabHtml([]); }
  sheetNames.forEach(function(sn){
    _fetchSourceSheet(sn, function(){ pending--; if(pending<=0) finish(); });
  });
  return '<div id="'+containerId+'" class="photo-gallery-loading">⏳ 讀取 '+sheetNames.length+' 份來源分頁中…</div>';
}

/* ════════════════════════════════════════════════════════════
   店家個案明細 Dialog（規劃書 D/E：高密度 Grid 版面＋完整回報時間戳＋
   品項 Chip 篩選——督導可能只負責特定品項，點 Chip 切換成該品項專屬視角）
   ════════════════════════════════════════════════════════════ */
var _detailStore = null;
var _detailRefs = [];        /* PROCESS_REFS[code]，新到舊排序 */
var _detailHistoryResults = []; /* 逐筆時間軸內容，跟 _detailRefs 同索引對齊 */
var _detailItemFilter = 'all';
/* 從彙整看板（summary-dialog）點店家列進來時，記下當時是哪個分頁（staff/office/store...），
   讓明細 Dialog 能顯示「← 返回」鍵、一鍵回到同一個分頁，不用強迫使用者按 ✕ 整個關掉
   再重新點一次。直接從主畫面卡片點進來（不是經彙整看板）時維持 null，不顯示返回鍵。 */
var _detailReturnMode = null;

/* 某品項最近一次回報的原始日期值（未格式化），找不到回傳 null */
function _itemLatestRef(item){
  for(var i=0;i<_detailRefs.length;i++){ if(_detailRefs[i].category===item) return _detailRefs[i]; }
  return null;
}
/* 統一的日期顯示：優先用 parseGvizDate 解析完整 Date(y,m,d,h,i,s)，
   拿不到完整時間就退回原始值，至少不會整格空白 */
function _fmtRefTime(ref){
  if(!ref) return '—';
  var t = parseGvizDate(ref.dateText);
  return (t && t!==String(ref.dateText)) ? t : (ref.dateText || ref.ym);
}

/* 彙整看板（人員/單位/店家分頁）點店家列的入口：先記下目前分頁，
   再關彙整看板、開明細 Dialog——跟直接從主畫面卡片點進來（openStoreDetail
   直接呼叫，_detailReturnMode 維持 null）區分開，明細 Dialog 才知道
   該不該顯示「← 返回」鍵。 */
function openStoreDetailFromPivot(code){
  _detailReturnMode = window._pivotMode;
  closeSummaryDialog();
  openStoreDetail(code);
}
/* 明細 Dialog 的「← 返回」：不是整個關掉回主畫面，是回到剛才那個彙整看板分頁。
   getFilteredStores 跟彙整看板原本開啟時用的 getRowsFn 是同一支，
   直接重開會拿到同一份資料，分頁也照 _detailReturnMode 定位回去。 */
function backStoreDetailToSummary(){
  var mode = _detailReturnMode;
  if(!mode) { closeStoreDetail(); return; }
  _detailReturnMode = null;
  var dlg = document.getElementById('detail-dialog');
  dlg.classList.remove('open');
  dlg.style.display = 'none';
  openSummaryDialog(mode, getFilteredStores);
}
function openStoreDetail(code){
  var store = STORE_ROWS.find(function(r){ return r.code===code; });
  if(!store) return;
  var st = _storeStatus(store);
  _detailStore = Object.assign({}, store, {_status:st});
  _detailRefs = PROCESS_REFS[code] || [];
  _detailHistoryResults = new Array(_detailRefs.length);
  _detailItemFilter = 'all';
  var backBtn = document.getElementById('btn-dlg-back');
  if(backBtn) backBtn.style.display = _detailReturnMode ? '' : 'none';

  var lastRef = _detailRefs[0] || null;
  document.getElementById('dlg-title').innerHTML =
    '<div style="font-size:15px;font-weight:900;">'+esc(store.storeName)+'（'+esc(store.code)+'）</div>'
    + '<div class="dd-toprow">'
    +   '<span style="font-size:12px;color:var(--sub);font-weight:500;">'+esc(store.area)+' · '+esc(store.office)+' · '+esc(store.staff)+'　'+CUR_YM.replace('-','/')+'　已查核 '+st.k+'/'+st.n+'</span>'
    +   '<span class="dd-lasttime">🕒 上次回報：<b>'+esc(_fmtRefTime(lastRef))+'</b>'+(lastRef?'（'+esc(lastRef.category)+'）':'')+'</span>'
    + '</div>';

  var body = document.getElementById('dlg-body');
  body.innerHTML =
      '<div class="dd-chip-row" id="dd-chip-row"></div>'
    + '<div class="dd-item-grid" id="dd-item-grid"></div>'
    + '<div id="detail-history-slot" style="margin-top:6px;">'
    +   '<div class="raw-quiz-title" style="margin-bottom:8px;">📋 拜訪／登記時間軸</div>'
    +   '<div id="detail-history-body" style="font-size:12.5px;color:var(--sub);">⏳ 讀取中…</div>'
    + '</div>';

  _renderDetailChips();
  _renderDetailItemGrid();

  var dlg = document.getElementById('detail-dialog');
  dlg.style.display = 'flex';
  requestAnimationFrame(function(){ dlg.classList.add('open'); });

  /* 個案時間軸：依「處理層」記下的「來源分頁+行數」，逐筆回溯原始問卷分頁的完整內容。
     同一家店可能橫跨好幾個分類/月份，各自可能指向不同的來源分頁，所以逐筆各自查詢。 */
  var slotEl = document.getElementById('detail-history-body');
  if(!_detailRefs.length){
    slotEl.innerHTML = '<div style="padding:8px 0;">⏳ 「處理層」目前查不到這家店的「來源分頁+行數」紀錄</div>';
    return;
  }
  var pending = _detailRefs.length;
  _detailRefs.forEach(function(rr, idx){
    _fetchSourceRowDetail(rr.ref, function(rowData, ref, err){
      _detailHistoryResults[idx] = err ? { error: err } : rowData;
      pending--;
      if(pending<=0) _renderDetailHistory();
    });
  });
}

/* 品項 Chip 列：全部＋這家店實際要簽的每個品項。點擊只切換「顯示範圍」，
   不影響已抓回來的資料，所以切換不需要重新打 API。 */
function _renderDetailChips(){
  var row = document.getElementById('dd-chip-row');
  if(!row) return;
  var chips = ['all'].concat(_detailStore.needed);
  row.innerHTML = chips.map(function(it){
    var active = _detailItemFilter===it;
    var label = it==='all' ? '全部品項' : it;
    return '<div class="dd-chip'+(active?' active':'')+'" onclick="filterDetailItem(\''+esc(it).replace(/'/g,"\\'")+'\')">'+esc(label)+'</div>';
  }).join('');
}
function filterDetailItem(item){
  _detailItemFilter = item;
  _renderDetailChips();
  _renderDetailItemGrid();
  _renderDetailHistory();
}
/* 高密度品項卡片 Grid（規劃書 D）：取代舊版一項品項吃一整行的表格，
   多欄排列＋色彩區隔已查核/未查核，並直接秀出該品項最近一次回報時間。 */
function _renderDetailItemGrid(){
  var grid = document.getElementById('dd-item-grid');
  if(!grid || !_detailStore) return;
  var st = _detailStore._status;
  grid.innerHTML = _detailStore.needed.map(function(it){
    var ok = st.collected.indexOf(it)!==-1;
    var dim = _detailItemFilter!=='all' && _detailItemFilter!==it;
    var ref = _itemLatestRef(it);
    return '<div class="dd-item-card '+(ok?'ok':'no')+(dim?' dim':'')+'">'
      + '<div class="dd-item-name">'+esc(it)+'</div>'
      + '<div class="dd-item-status">'+(ok?'✅ 已查核':'❌ 未查核')+'</div>'
      + '<div class="dd-item-time">🕒 '+esc(ref?_fmtRefTime(ref):'尚無紀錄')+'</div>'
      + '</div>';
  }).join('');
}
/* 時間軸依目前選定的品項 Chip 篩選，'all' 時不過濾 */
function _renderDetailHistory(){
  var slot = document.getElementById('detail-history-body');
  if(!slot || !_detailStore) return;
  var pairs = _detailRefs.map(function(ref, idx){ return { ref: ref, result: _detailHistoryResults[idx], idx: idx }; })
    .filter(function(p){ return _detailItemFilter==='all' || p.ref.category===_detailItemFilter; });
  if(!pairs.length){ slot.innerHTML = '<div style="padding:8px 0;">（此品項目前沒有時間軸紀錄）</div>'; return; }
  slot.innerHTML = pairs.map(function(p){
    var r = p.result;
    if(!r) return '<div style="padding:8px 0;color:var(--sub);">⏳ 讀取中…</div>';
    if(r.error){
      return '<div style="margin-bottom:10px;padding:8px 0;color:#B23A3A;font-size:12px;">⚠️ '+esc(p.ref.category)+' '+esc(p.ref.ym)+'：'+esc(r.error)+'</div>';
    }
    return '<div class="ct-visit-card">'
      + '<div class="ct-visit-head"><span>🕒 '+esc(_fmtRefTime(p.ref))+'</span>'
      +   '<span class="ct-visit-cat">'+esc(p.ref.category)+(p.idx===0?'（最新）':'')+'</span></div>'
      /* 第 2 參數帶入 _detailStore.storeName，讓燈箱資訊列跟照片牆一樣顯示
         「店名 › 大題 › 選項」（原本沒傳，燈箱只會顯示到大題/選項），對齊
         coverage_board.html 的呼叫方式。 */
      + _renderQuizSections(r.sections, _detailStore.storeName)
      + '</div>';
  }).join('');
}
function closeStoreDetail(){
  _detailReturnMode = null;
  var dlg = document.getElementById('detail-dialog');
  dlg.classList.remove('open');
  setTimeout(function(){ dlg.style.display='none'; },220);
}
function storeDetailCopyLine(){
  var btn = document.getElementById('btn-dlg-line');
  if(!_detailStore){ _flashBtn(btn,'⚠️ 無資料'); return; }
  var st = _detailStore._status;
  var lastRef = _detailRefs[0] || null;
  var lines = ['【'+esc(_detailStore.storeName)+'（'+_detailStore.code+'）】', _detailStore.area+' · '+_detailStore.office+' · '+_detailStore.staff, ''];
  lines.push('已查核 '+st.k+'/'+st.n+'　上次回報：'+_fmtRefTime(lastRef));
  _detailStore.needed.forEach(function(it){
    var ref = _itemLatestRef(it);
    lines.push((st.collected.indexOf(it)!==-1?'✅ ':'❌ ')+it+(ref?'（'+_fmtRefTime(ref)+'）':''));
  });
  lines.push('');
  lines.push('📅 '+new Date().toLocaleString('zh-TW',{timeZone:'Asia/Taipei'}));
  _doCopy(lines.join('\n'), btn);
}
/* LINE 精簡：單店一行摘要，適合快速轉貼 */
function storeDetailCopyLineBrief(){
  var btn = document.getElementById('btn-dlg-line-brief');
  if(!_detailStore){ _flashBtn(btn,'⚠️ 無資料'); return; }
  var st = _detailStore._status;
  var rate = st.n ? Math.round(st.k/st.n*1000)/10 : 0;
  var text = '【'+_detailStore.storeName+'（'+_detailStore.code+'）】已查核 '+st.k+'/'+st.n+'（'+rate+'%）'
    + (st.missing.length ? '　缺：'+st.missing.join('、') : '　✅ 全數完成');
  _doCopy(text, btn);
}
function storeDetailDownloadCsv(){
  var btn = document.getElementById('btn-dlg-csv');
  if(!_detailStore){ _flashBtn(btn,'⚠️ 無資料'); return; }
  _triggerCsvDownload(buildCsvContent([_detailStore]), _detailStore.storeName+'_'+_detailStore.code);
  _flashBtn(btn,'✅ 已下載');
}
function storeDetailScreenshot(){
  var btn = document.getElementById('btn-dlg-screenshot');
  var el = document.getElementById('dlg-body');
  _captureElement(el, btn, (_detailStore?_detailStore.storeName:PROJ_NAME)+'_個案明細');
}


/* ════ 主工具列 CSV／複製／截圖 ════ */
function buildCsvContent(rows){
  var headers = ['營業處','營業所/課','業務員','店家代碼','店家名稱','應達成品項','已查核品項','未查核品項','完成度'];
  var out = [headers];
  rows.forEach(function(r){
    out.push([
      r.area, r.office, r.staff, r.code, r.storeName,
      r.needed.join('/'), r._status.collected.join('/'), r._status.missing.join('/'),
      r._status.k+'/'+r._status.n
    ]);
  });
  return '\uFEFF'+out.map(function(row){
    return row.map(function(c){ var s=String(c==null?'':c); return /[,"\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }).join(',');
  }).join('\n');
}
function toolbarDownloadCsv(){
  var btn = document.getElementById('tb-btn-csv');
  var rows = getFilteredStores();
  if(!rows.length){ _flashBtn(btn,'⚠️ 無資料'); return; }
  _triggerCsvDownload(buildCsvContent(rows), PROJ_NAME+'_'+CUR_YM);
  _flashBtn(btn,'✅ 已下載');
}
function toolbarCopyLine(){
  var btn = document.getElementById('tb-btn-line');
  var rows = getFilteredStores();
  if(!rows.length){ _flashBtn(btn,'⚠️ 無資料'); return; }
  var total = rows.length, complete = rows.filter(function(r){return r._status.isComplete;}).length;
  var lines = ['【'+PROJ_NAME+'】'+CUR_YM.replace('-','/')+' 品項達成', '總店數 '+total+'／已查核 '+complete+'／未查核 '+(total-complete), ''];
  rows.filter(function(r){ return !r._status.isComplete; }).slice(0,50).forEach(function(r){
    lines.push('❌ '+r.storeName+'('+r.code+') '+r.staff+' 缺：'+r._status.missing.join('、'));
  });
  if(total-complete > 50) lines.push('…其餘 '+(total-complete-50)+' 家略');
  lines.push('');
  lines.push('📅 '+new Date().toLocaleString('zh-TW',{timeZone:'Asia/Taipei'}));
  _doCopy(lines.join('\n'), btn);
}
/* LINE 精簡：只有總量與達成率，不列逐店清單，適合快速回報用的一行摘要 */
function toolbarCopyLineBrief(){
  var btn = document.getElementById('tb-btn-line-brief');
  var rows = getFilteredStores();
  if(!rows.length){ _flashBtn(btn,'⚠️ 無資料'); return; }
  var total = rows.length, complete = rows.filter(function(r){return r._status.isComplete;}).length;
  var rate = total ? Math.round(complete/total*1000)/10 : 0;
  var ctx = drillStack.length ? drillStack.map(function(d){ return d.key; }).join(' › ') : '全台';
  var text = '【'+PROJ_NAME+'】'+CUR_YM.replace('-','/')+'　'+ctx+'　總店數 '+total+'／已查核 '+complete+'／未查核 '+(total-complete)+'／達成率 '+rate+'%';
  _doCopy(text, btn);
}
function toolbarScreenshot(){
  var btn = document.getElementById('tb-btn-screenshot');
  var el = document.getElementById('stage');
  _captureElement(el, btn, PROJ_NAME || 'CONTRACT看板');
}

/* ════ 共用層載入防呆 ════
   shared/*.js 若因路徑錯誤(404)沒載入成功，esc/gvizParse/_flashBtn 等全域函式
   會是 undefined，之後每個按鈕/下拉選單背後呼叫都會直接拋錯、畫面看起來像
   「怎麼點都沒反應」但主控台其實滿滿 ReferenceError。這裡在最開頭就先擋下來，
   直接告訴使用者是哪裡沒載到，不要讓它繼續往下跑然後到處靜默失敗。 */
(function _checkSharedLoaded(){
  var missing = [];
  if(typeof esc !== 'function') missing.push('core-utils.js（esc）');
  if(typeof gvizParse !== 'function') missing.push('core-utils.js（gvizParse）');
  if(typeof _flashBtn !== 'function') missing.push('copy-utils.js（_flashBtn）');
  if(typeof _doCopy !== 'function') missing.push('copy-utils.js（_doCopy）');
  if(typeof _triggerCsvDownload !== 'function') missing.push('csv-export.js');
  if(typeof _captureElement !== 'function') missing.push('capture-clipboard.js');
  if(typeof _qdBuildTabHtml !== 'function') missing.push('question-drilldown.js');
  if(typeof openSummaryDialog !== 'function') missing.push('pivot-dialog.js');
  if(typeof updateStickyTops !== 'function') missing.push('ui-chrome.js');
  if(missing.length){
    document.body.innerHTML = '<div style="padding:40px;font-family:sans-serif;line-height:1.8;">'
      + '<h2 style="color:#A32020;">⚠️ 共用層檔案沒有載入成功</h2>'
      + '<p>以下檔案讀不到，通常是因為 <code>shared/</code> 資料夾沒有跟 <code>contract_board.html</code> 放在同一層目錄：</p>'
      + '<ul>' + missing.map(function(m){ return '<li>'+m+'</li>'; }).join('') + '</ul>'
      + '<p>請確認資料夾結構長這樣，兩者要在同一層：</p>'
      + '<pre style="background:#f0efe9;padding:12px;border-radius:8px;">你的資料夾/\n  contract_board.html\n  shared/\n    core-utils.js\n    copy-utils.js\n    csv-export.js\n    capture-clipboard.js\n    photo-viewer.js\n    question-drilldown.js\n    ui-chrome.js\n    pivot-dialog.js\n    dashboard-common.css</pre>'
      + '<p>打開瀏覽器開發者工具（F12）→ Console／Network 分頁，也能直接看到是哪支檔案 404。</p>'
      + '</div>';
    throw new Error('shared 層未載入：' + missing.join('、'));
  }
})();

init();
</script>
