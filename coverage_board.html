<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>覆蓋率看板</title>
<style>
:root {
  --primary: #378ADD;
  --primary-bg: rgba(55,138,221,.08);
  --bg: #F0EDE6;
  --card: #FFFFFF;
  --text: #2D2D2D;
  --sub: #888;
  --border: rgba(0,0,0,0.09);
  --green: #3B6D11;
  --green-bg: #EAF3DE;
  --red: #A32D2D;
  --red-bg: #FCEBEB;
  --r: 12px;
  --dur: .32s;
  --ease: cubic-bezier(.34,1.05,.64,1);
}
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Noto Sans TC',sans-serif; min-height:100vh; }
/* ── toolbar ── */
.toolbar {
  background:#fff;
  border-bottom:1px solid var(--border);
  padding:0 20px;
  height:52px;
  display:flex;
  align-items:center;
  gap:12px;
  position:sticky;
  top:0;
  z-index:50;
}
.toolbar-title { font-size:15px; font-weight:600; flex:1; }
.toolbar-sync { font-size:12px; color:var(--sub); }
.back-btn {
  background:none;
  border:1px solid var(--border);
  border-radius:8px;
  padding:5px 12px;
  font-size:13px;
  cursor:pointer;
  color:var(--text);
  transition:background .15s;
}
.back-btn:hover { background:var(--bg); }
/* ── breadcrumb ── */
.breadcrumb {
  padding:12px 20px 4px;
  display:flex;
  align-items:center;
  gap:6px;
  font-size:13px;
  color:var(--sub);
}
.bc-item { cursor:pointer; color:var(--primary); }
.bc-item:hover { text-decoration:underline; }
.bc-sep { color:var(--border); }
.bc-current { color:var(--text); font-weight:500; }
/* ── stage ── */
.stage { padding:16px 20px 40px; }
.level-label {
  font-size:11px;
  color:var(--sub);
  letter-spacing:.05em;
  margin-bottom:10px;
  text-transform:uppercase;
}
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(280px,1fr));
  gap:12px;
  margin-bottom:28px;
}
/* ── card ── */
.card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:20px 22px;
  cursor:pointer;
  transition:transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
  position:relative;
  overflow:visible;
}
.card:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,.10); }
.card-top { font-size:12px; color:var(--sub); margin-bottom:6px; }
.card-name { font-size:18px; font-weight:700; margin-bottom:16px; }
.cov-row { display:flex; align-items:baseline; gap:4px; }
.cov-num {
  font-size:30px;
  font-weight:700;
  color:var(--text);
  cursor:default;
}
.cov-unit { font-size:13px; color:var(--sub); }
.tag-row { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }
.tag {
  font-size:11px;
  padding:3px 8px;
  border-radius:6px;
  font-weight:500;
}
.tag-yes { background:var(--green-bg); color:var(--green); }
.tag-no  { background:var(--red-bg);   color:var(--red); }
.valid-note { font-size:11px; color:#aaa; margin-top:7px; }
/* ── stat row ── */
.stat-row { display:flex; gap:10px; margin-top:4px; }
.stat-item { flex:1; background:var(--bg); border-radius:10px; padding:12px 10px; text-align:center; }
.stat-item.warn { background:var(--red-bg); }
.stat-item.good { background:var(--green-bg); }
.stat-label { font-size:11px; font-weight:500; color:var(--sub); margin-bottom:6px; }
.stat-item.warn .stat-label { color:var(--red); }
.stat-item.good .stat-label { color:var(--green); }
.stat-val { font-size:28px; font-weight:800; color:var(--text); line-height:1; letter-spacing:-1px; }
.stat-item.warn .stat-val { color:var(--red); }
.stat-item.good .stat-val { color:var(--green); }
/* ── tooltip ── */
.tooltip {
  position:absolute;
  bottom:calc(100% + 8px);
  left:50%;
  transform:translateX(-50%);
  background:#fff;
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px 14px;
  min-width:170px;
  z-index:200;
  pointer-events:none;
  opacity:0;
  transition:opacity .15s;
  box-shadow:0 4px 16px rgba(0,0,0,.10);
}
.tooltip.show { opacity:1; }
.tt-title { font-size:11px; font-weight:700; color:var(--sub); margin-bottom:7px; letter-spacing:.03em; }
.tt-row { display:flex; justify-content:space-between; align-items:center; gap:20px; padding:4px 0; }
.tt-label { font-size:13px; color:var(--sub); }
.tt-val { font-size:13px; font-weight:700; color:var(--text); }
/* ── overlay / dialog ── */
.overlay {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.35);
  z-index:300;
  align-items:center;
  justify-content:center;
}
.overlay.show { display:flex; }
.dialog {
  background:#fff;
  border-radius:16px;
  padding:24px;
  width:380px;
  max-width:92vw;
  max-height:90vh;
  overflow-y:auto;
  box-shadow:0 16px 48px rgba(0,0,0,.18);
}
.dlg-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px; }
.dlg-title { font-size:17px; font-weight:700; }
.dlg-sub { font-size:12px; color:var(--sub); margin-top:3px; }
.dlg-close {
  background:none; border:none; cursor:pointer;
  color:var(--sub); font-size:20px; line-height:1; padding:2px;
}
.dlg-main {
  display:flex; align-items:baseline; gap:6px;
  margin-bottom:16px; padding-bottom:14px;
  border-bottom:1px solid var(--border);
}
.dlg-main-num { font-size:40px; font-weight:700; }
.dlg-main-unit { font-size:14px; color:var(--sub); }
.dlg-breakdown { display:flex; flex-direction:column; gap:12px; margin-bottom:16px; }
.dlg-row-label { display:flex; justify-content:space-between; font-size:13px; margin-bottom:5px; }
.dlg-row-name { color:var(--sub); }
.dlg-row-val { font-weight:600; }
.dlg-row-cnt { font-weight:400; color:#aaa; font-size:12px; }
.bar-track { height:7px; background:#f0f0f0; border-radius:4px; overflow:hidden; }
.bar-fill { height:100%; background:var(--primary); border-radius:4px; transition:width .4s var(--ease); }
.dlg-footer {
  font-size:12px; color:var(--sub);
  padding-top:12px; border-top:1px solid var(--border);
  line-height:1.8;
}
/* ── detail dialog ── */
#detail-dialog {
  position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:500;
  display:flex; align-items:center; justify-content:center;
  opacity:0; transition:opacity .2s;
}
#detail-dialog.open { opacity:1; }
.dlg-box {
  background:#fff; border-radius:14px;
  width:95vw; height:92vh;
  display:flex; flex-direction:column; overflow:hidden;
  box-shadow:0 20px 80px rgba(0,0,0,.35);
  transform:translateY(16px); transition:transform .22s;
}
#detail-dialog.open .dlg-box { transform:translateY(0); }
.dlg-hd {
  padding:14px 20px; border-bottom:1px solid rgba(0,0,0,.09);
  display:flex; align-items:center; justify-content:space-between;
  font-size:15px; font-weight:900; color:var(--text); flex-shrink:0;
  background:rgba(248,250,248,1);
}
.dlg-action-btn {
  cursor:pointer; font-size:13px; color:var(--sub); padding:4px 11px;
  border-radius:7px; border:1px solid rgba(0,0,0,.12); background:#fff;
  font-family:inherit; font-weight:700; transition:all .14s; white-space:nowrap;
}
.dlg-action-btn:hover { border-color:var(--primary); color:var(--primary); }
.dlg-action-btn.done { border-color:var(--green); color:var(--green); background:var(--green-bg); }
.dlg-action-btn.loading { opacity:.6; pointer-events:none; }
.dlg-close-btn {
  cursor:pointer; font-size:14px; color:var(--sub); padding:4px 12px;
  border-radius:7px; border:1px solid rgba(0,0,0,.12); background:#fff;
  font-family:inherit; font-weight:700; transition:all .14s;
}
.dlg-close-btn:hover { border-color:var(--primary); color:var(--primary); }
.dlg-body { overflow:auto; flex:1; min-height:0; padding:4px 0; }
.detail-scroll { overflow-x:auto; }
.detail-scroll::-webkit-scrollbar { height:3px; }
.detail-scroll::-webkit-scrollbar-thumb { background:rgba(0,0,0,.1); border-radius:3px; }
.detail-tbl { width:max-content; min-width:100%; border-collapse:collapse; font-size:14px; }
.detail-tbl th {
  padding:9px 14px; text-align:left; font-weight:800; font-size:12px; color:var(--sub);
  border-bottom:1px solid rgba(0,0,0,.08); background:rgba(0,0,0,.02); white-space:nowrap;
}
.detail-tbl th.r { text-align:center; }
.detail-tbl td { padding:8px 14px; border-bottom:1px solid rgba(0,0,0,.04); white-space:nowrap; }
.detail-tbl td.r { text-align:center; }
.detail-tbl tr:last-child td { border-bottom:none; }
.detail-tbl tbody tr:hover td { background:rgba(55,138,221,.07); }
.disp-yes { color:var(--green); font-weight:800; }
.disp-no  { color:#ccc; }
/* ── staff card detail btn ── */
.pc-detail-btn-row { margin-top:10px; }
.pc-open-detail-btn {
  font-size:12px; padding:5px 13px; border-radius:8px;
  border:1px solid rgba(0,0,0,.13); background:#fff;
  color:var(--text); cursor:pointer; font-family:inherit; transition:all .14s;
}
.pc-open-detail-btn:hover { border-color:var(--primary); color:var(--primary); }

/* ── loading ── */
.loading {
  display:none;
  position:fixed; inset:0;
  background:rgba(240,237,230,.7);
  z-index:400;
  align-items:center;
  justify-content:center;
  font-size:15px;
  color:var(--sub);
}
.loading.show { display:flex; }
/* ── empty ── */
.empty { padding:60px 20px; text-align:center; color:var(--sub); font-size:14px; }
</style>
</head>
<body>

<div class="loading" id="loading">載入中…</div>

<div class="toolbar">
  <button class="back-btn" onclick="history.back()">← 返回</button>
  <span class="toolbar-title" id="tb-title">覆蓋率看板</span>
  <span class="toolbar-sync" id="tb-sync"></span>
</div>

<div class="breadcrumb" id="breadcrumb"></div>
<div class="stage" id="stage"></div>

<!-- 舊 overlay（保留給非 staff 層使用）-->
<div class="overlay" id="overlay" onclick="onOverlayClick(event)">
  <div class="dialog" id="dialog">
    <div class="dlg-header">
      <div>
        <div class="dlg-title" id="dlg-title"></div>
        <div class="dlg-sub" id="dlg-sub"></div>
      </div>
      <button class="dlg-close" onclick="closeDialog()">✕</button>
    </div>
    <div class="dlg-main">
      <span class="dlg-main-num" id="dlg-main-num"></span>
      <span class="dlg-main-unit">家 有二位陳列</span>
    </div>
    <div class="dlg-breakdown" id="dlg-breakdown"></div>
    <div class="dlg-footer" id="dlg-footer"></div>
  </div>
</div>

<!-- Dialog 店家明細（staff 層）-->
<div id="detail-dialog" style="display:none" onclick="if(event.target===this)closeDetailDialog()">
  <div class="dlg-box">
    <div class="dlg-hd">
      <span id="detail-dlg-title"></span>
      <div style="display:flex;align-items:center;gap:6px;">
        <button class="dlg-action-btn" id="btn-copy-line" onclick="copyLine()">💬 複製 LINE</button>
        <button class="dlg-action-btn" id="btn-copy-excel" onclick="copyExcel()">📊 複製 Excel</button>
        <button class="dlg-action-btn" id="btn-screenshot" onclick="takeScreenshot()">📸 截圖</button>
        <button class="dlg-close-btn" onclick="closeDetailDialog()">✕</button>
      </div>
    </div>
    <div class="dlg-body" id="detail-dlg-body"></div>
  </div>
</div>

<script>
/* ── URL 參數 ── */
var params = new URLSearchParams(location.search);
var SHEET_ID   = params.get('sheetId')  || '';
var PROJ_NAME  = params.get('name')     || '覆蓋率看板';
var SYNC_SHEET = params.get('syncSheet')|| '輔助';
var SYNC_CELL  = params.get('syncCell') || 'B1';
var SHEET_NAME = '店家名冊';
var TYPES      = ['堆箱','端架','冰箱'];

/* 層級欄位名稱對應 */
var COL_AREA    = '營業處名稱';
var COL_OFFICE  = '營業所/課';
var COL_STAFF   = '執行人員';
var COL_UNFILL  = '未填寫';   /* 0=已填寫有效, 1=未填寫排除 */
var COL_DISPLAY = '有二位';   /* 0=無陳列, 1=有任一陳列 */

document.getElementById('tb-title').textContent = PROJ_NAME;

/* ── 狀態 ── */
var allRows = [];
var drillStack = []; /* [{level:'area'|'office'|'staff', key:string}] */

/* ── 工具 ── */
function pct(a, b) { return b === 0 ? 0 : Math.round(a / b * 100); }
function showLoading()  { document.getElementById('loading').classList.add('show'); }
function hideLoading()  { document.getElementById('loading').classList.remove('show'); }

/* ── 抓資料 ── */
function fetchSheet() {
  showLoading();
  var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
    '/gviz/tq?tqx=out:json&headers=1&sheet=' + encodeURIComponent(SHEET_NAME);
  fetch(url)
    .then(function(r) { return r.text(); })
    .then(function(txt) {
      var json = JSON.parse(txt.replace(/^[^\(]+\(/, '').replace(/\);?\s*$/, ''));
      var tbl = json.table || {};
      var cols = (tbl.cols || []).map(function(c) { return c.label || ''; });
      allRows = (tbl.rows || []).map(function(row) {
        var obj = {};
        (row.c || []).forEach(function(cell, i) {
          obj[cols[i]] = cell ? (cell.v !== null && cell.v !== undefined ? cell.v : cell.f || '') : '';
        });
        return obj;
      });
      fetchSyncTime();
      render();
    })
    .catch(function(err) {
      hideLoading();
      document.getElementById('stage').innerHTML = '<div class="empty">⚠️ 載入失敗：' + err + '</div>';
    });
}

function fetchSyncTime() {
  var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
    '/gviz/tq?tqx=out:json&sheet=' + encodeURIComponent(SYNC_SHEET) + '&range=' + SYNC_CELL;
  fetch(url)
    .then(function(r) { return r.text(); })
    .then(function(txt) {
      var json = JSON.parse(txt.replace(/^[^\(]+\(/, '').replace(/\);?\s*$/, ''));
      var val = '';
      try { val = json.table.rows[0].c[0].v || ''; } catch(e) {}
      document.getElementById('tb-sync').textContent = val ? '📊 資料同步 ' + val : '';
    })
    .catch(function() {});
}

/* ── 計算 ──
   公式欄 gviz 回傳 number(0/1)，用 Number() 統一處理
   未填寫: 0=有效, 1=排除
   有二位: 1=有陳列（堆箱/端架/冰箱 任一）
   堆箱/端架/冰箱: 1=有該類陳列
*/
function isOne(v) {
  return Number(v) === 1 || v === true || v === 'true' || v === '1';
}

function calcGroup(rows) {
  var total    = rows.length;  /* 總家數 */
  var unfilled = 0;            /* 未填寫家數 */
  var valid    = 0;            /* 有效家數（已填寫） */
  var hasDisp  = 0;            /* 有二位家數 */
  var typeCounts = {};
  TYPES.forEach(function(t) { typeCounts[t] = 0; });

  rows.forEach(function(r) {
    if (isOne(r[COL_UNFILL])) { unfilled++; return; } /* 未填寫，排除 */
    valid++;
    if (isOne(r[COL_DISPLAY])) hasDisp++;
    TYPES.forEach(function(t) {
      if (isOne(r[t])) typeCounts[t]++;
    });
  });

  return { total: total, unfilled: unfilled, valid: valid, hasDisp: hasDisp, typeCounts: typeCounts };
}

/* ── 篩選 rows ── */
function filterRows(level, key) {
  if (level === 'area')   return allRows.filter(function(r) { return String(r[COL_AREA])   === key; });
  if (level === 'office') return allRows.filter(function(r) { return String(r[COL_OFFICE]) === key; });
  if (level === 'staff')  return allRows.filter(function(r) { return String(r[COL_STAFF])  === key; });
  return allRows;
}

/* ── 取得目前層級的 rows ── */
function getCurrentRows() {
  if (drillStack.length === 0) return allRows;
  var last = drillStack[drillStack.length - 1];
  return filterRows(last.level, last.key);
}

/* ── 取得下一層群組 ── */
function getNextGroups(rows, nextCol) {
  var map = {};
  rows.forEach(function(r) {
    var k = String(r[nextCol] || '');
    if (!k) return;
    if (!map[k]) map[k] = [];
    map[k].push(r);
  });
  return map;
}

/* ── 渲染 ── */
function render() {
  hideLoading();
  buildBreadcrumb();
  var stage = document.getElementById('stage');
  stage.innerHTML = '';

  var depth = drillStack.length;
  var rows = getCurrentRows();

  if (depth === 0) {
    /* 顯示 area 層 */
    renderLevel(stage, rows, COL_AREA, 'area', '營業處');
  } else if (depth === 1) {
    /* 顯示 office 層 */
    renderLevel(stage, rows, COL_OFFICE, 'office', '營業所/課');
  } else if (depth === 2) {
    /* 顯示 staff 層 */
    renderLevel(stage, rows, COL_STAFF, 'staff', '業務人員');
  } else {
    stage.innerHTML = '<div class="empty">已到最細層級</div>';
  }
}

function renderLevel(stage, rows, col, levelKey, labelText) {
  var groups = getNextGroups(rows, col);
  var keys = Object.keys(groups);
  if (keys.length === 0) {
    stage.innerHTML = '<div class="empty">無資料</div>';
    return;
  }
  var div = document.createElement('div');
  div.innerHTML = '<div class="level-label">' + labelText + '</div>';
  var grid = document.createElement('div');
  grid.className = 'grid';
  keys.forEach(function(k) {
    var stat = calcGroup(groups[k]);
    grid.appendChild(buildCard(k, labelText, stat, levelKey, groups[k]));
  });
  div.appendChild(grid);
  stage.appendChild(div);
}

/* ── 卡片 ── */
function buildCard(name, labelText, stat, levelKey, rows) {
  var card = document.createElement('div');
  card.className = 'card';

  var ttId = 'tt-' + name.replace(/[^a-zA-Z0-9]/g,'_') + '-' + levelKey;

  card.innerHTML =
    '<div class="card-top">' + labelText + '</div>' +
    '<div class="card-name">' + name + '</div>' +
    '<div class="stat-row">' +
      '<div class="stat-item">' +
        '<div class="stat-label">總家數</div>' +
        '<div class="stat-val">' + stat.total + '</div>' +
      '</div>' +
      '<div class="stat-item warn">' +
        '<div class="stat-label">未填寫</div>' +
        '<div class="stat-val">' + stat.unfilled + '</div>' +
      '</div>' +
      '<div class="stat-item good" id="si-' + ttId + '" style="position:relative">' +
        '<div class="stat-label">有二位</div>' +
        '<div class="stat-val">' + stat.hasDisp + '</div>' +
        '<div class="tooltip" id="' + ttId + '">' + buildTooltipHTML(stat) + '</div>' +
      '</div>' +
    '</div>';

  /* hover on 有二位 block → show tooltip */
  var siEl = card.querySelector('#si-' + ttId);
  var ttEl = card.querySelector('#' + ttId);
  siEl.addEventListener('mouseenter', function(e) { e.stopPropagation(); ttEl.classList.add('show'); });
  siEl.addEventListener('mouseleave', function() { ttEl.classList.remove('show'); });

  /* click card → drill or dialog */
  card.addEventListener('click', function(e) {
    if (e.target.classList.contains('pc-open-detail-btn')) return; /* 由按鈕自己處理 */
    if (levelKey === 'staff') {
      openDetailDialog(name, rows, stat);
    } else {
      drillDown(levelKey, name);
    }
  });
  /* 在 staff 卡片底部加明細按鈕 */
  if (levelKey === 'staff') {
    var btnRow = document.createElement('div');
    btnRow.className = 'pc-detail-btn-row';
    btnRow.innerHTML = '<button class="pc-open-detail-btn" onclick="event.stopPropagation();openDetailDialog('' +
      name.replace(/'/g,"\'") + '',this.closest('.card')._rows,this.closest('.card')._stat)">📋 店家明細</button>';
    card._rows = rows;
    card._stat = stat;
    card.appendChild(btnRow);
  }

  return card;
}

function buildTooltipHTML(stat) {
  var rows = TYPES.map(function(t) {
    return '<div class="tt-row">' +
      '<span class="tt-label">' + t + '</span>' +
      '<span class="tt-val">' + stat.typeCounts[t] + ' 家</span>' +
    '</div>';
  }).join('');
  return '<div class="tt-title">有二位明細</div>' + rows;
}

/* ── drill down ── */
function drillDown(levelKey, key) {
  drillStack.push({ level: levelKey, key: key });
  render();
}

/* ── breadcrumb ── */
var LEVEL_LABELS = { area:'全部', office:'', staff:'' };

function buildBreadcrumb() {
  var bc = document.getElementById('breadcrumb');
  var parts = [];

  parts.push('<span class="bc-item" onclick="drillTo(-1)">全覽</span>');

  drillStack.forEach(function(d, i) {
    parts.push('<span class="bc-sep">›</span>');
    if (i < drillStack.length - 1) {
      parts.push('<span class="bc-item" onclick="drillTo(' + i + ')">' + d.key + '</span>');
    } else {
      parts.push('<span class="bc-current">' + d.key + '</span>');
    }
  });

  bc.innerHTML = parts.join('');
}

function drillTo(idx) {
  if (idx < 0) {
    drillStack = [];
  } else {
    drillStack = drillStack.slice(0, idx + 1);
  }
  render();
}

/* ── dialog（統計摘要，給 area/office 層點擊保留）── */
function openDialog(name, labelText, stat) {
  document.getElementById('dlg-title').textContent = name;
  document.getElementById('dlg-sub').textContent = '有二位陳列明細　共 ' + stat.hasDisp + ' 家';
  document.getElementById('dlg-main-num').textContent = stat.hasDisp;
  document.getElementById('dlg-breakdown').innerHTML = TYPES.map(function(t) {
    return '<div>' +
      '<div class="dlg-row-label">' +
        '<span class="dlg-row-name">' + t + '</span>' +
        '<span class="dlg-row-val">' + stat.typeCounts[t] + ' 家</span>' +
      '</div>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' + pct(stat.typeCounts[t], stat.hasDisp) + '%"></div></div>' +
    '</div>';
  }).join('');
  document.getElementById('dlg-footer').innerHTML =
    '總家數 <strong>' + stat.total + '</strong> 家　' +
    '未填寫 <strong>' + stat.unfilled + '</strong> 家　' +
    '有二位 <strong>' + stat.hasDisp + '</strong> 家';
  document.getElementById('overlay').classList.add('show');
}
function closeDialog() {
  document.getElementById('overlay').classList.remove('show');
}
function onOverlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeDialog();
}

/* ── 店家明細 dialog（staff 層）── */
var _currentRows = [], _currentStaff = '', _currentStat = null;

function buildDetailTable(rows, stat) {
  var colCode = '店家代碼', colName = '店家名稱';
  if (!rows.length) return '<div style="padding:16px 20px;font-size:13px;color:var(--sub);">無明細資料</div>';

  /* 排序：先有二位，再依店名 */
  var sorted = rows.slice().filter(function(r){ return !isOne(r[COL_UNFILL]); });
  sorted.sort(function(a, b) {
    var ad = isOne(a[COL_DISPLAY]) ? 0 : 1;
    var bd = isOne(b[COL_DISPLAY]) ? 0 : 1;
    if (ad !== bd) return ad - bd;
    return String(a[colName]||'').localeCompare(String(b[colName]||''), 'zh-TW');
  });

  var thCols = '<th>店碼</th><th>店名</th><th class="r">有二位</th>';
  TYPES.forEach(function(t) { thCols += '<th class="r">' + t + '</th>'; });

  var tbodyHtml = sorted.map(function(r) {
    var code = r[colCode] || '';
    var name = r[colName] || '';
    var hasD = isOne(r[COL_DISPLAY]);
    var dispCell = hasD
      ? '<td class="r disp-yes">✅</td>'
      : '<td class="r disp-no">—</td>';
    var typeCells = TYPES.map(function(t) {
      return isOne(r[t])
        ? '<td class="r disp-yes">✅</td>'
        : '<td class="r disp-no">—</td>';
    }).join('');
    return '<tr><td>' + esc(code) + '</td><td>' + esc(name) + '</td>' + dispCell + typeCells + '</tr>';
  }).join('');

  return '<div class="detail-scroll"><table class="detail-tbl"><thead><tr>' + thCols + '</tr></thead><tbody>' + tbodyHtml + '</tbody></table></div>';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function openDetailDialog(name, rows, stat) {
  _currentRows = rows;
  _currentStaff = name;
  _currentStat = stat;
  var totalValid = stat.valid, unfilled = stat.unfilled;
  document.getElementById('detail-dlg-title').textContent =
    '【' + name + '】店家明細　有效 ' + totalValid + ' 家　有二位 ' + stat.hasDisp + ' 家';
  document.getElementById('detail-dlg-body').innerHTML = buildDetailTable(rows, stat);
  ['btn-copy-line','btn-copy-excel','btn-screenshot'].forEach(function(id){
    var b = document.getElementById(id);
    if (b) { b.classList.remove('done','loading'); }
  });
  var dlg = document.getElementById('detail-dialog');
  dlg.style.display = 'flex';
  requestAnimationFrame(function(){ dlg.classList.add('open'); });
}
function closeDetailDialog() {
  var dlg = document.getElementById('detail-dialog');
  dlg.classList.remove('open');
  setTimeout(function(){ dlg.style.display = 'none'; }, 220);
}
document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeDetailDialog(); });

/* ── 複製共用工具 ── */
function _flashBtn(btn, label) {
  var orig = btn.textContent;
  btn.textContent = label;
  btn.classList.add('done');
  setTimeout(function(){ btn.textContent = orig; btn.classList.remove('done'); }, 2000);
}
function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none;';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
}
function _doCopy(text, btn) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text)
      .then(function(){ _flashBtn(btn, '✅ 已複製！'); })
      .catch(function(){ fallbackCopy(text); _flashBtn(btn, '✅ 已複製！'); });
  } else {
    fallbackCopy(text); _flashBtn(btn, '✅ 已複製！');
  }
}

/* ── 複製 LINE ── */
function copyLine() {
  var btn = document.getElementById('btn-copy-line');
  if (!_currentRows.length) { _flashBtn(btn, '⚠️ 無資料'); return; }
  var stat = _currentStat;
  var lines = [];
  lines.push('【' + _currentStaff + '】店家明細');
  lines.push('有效 ' + stat.valid + ' 家　有二位 ' + stat.hasDisp + ' 家（未填寫 ' + stat.unfilled + ' 家）');
  TYPES.forEach(function(t){ lines.push(t + '：' + stat.typeCounts[t] + ' 家'); });
  lines.push('─────────────────');
  var colCode = '店家代碼', colName = '店家名稱';
  var sorted = _currentRows.slice().filter(function(r){ return !isOne(r[COL_UNFILL]); });
  sorted.sort(function(a, b) {
    var ad = isOne(a[COL_DISPLAY]) ? 0 : 1, bd = isOne(b[COL_DISPLAY]) ? 0 : 1;
    if (ad !== bd) return ad - bd;
    return String(a[colName]||'').localeCompare(String(b[colName]||''), 'zh-TW');
  });
  sorted.forEach(function(r) {
    var code = r[colCode] || '', name = r[colName] || '';
    var hasD = isOne(r[COL_DISPLAY]);
    var typeStr = TYPES.filter(function(t){ return isOne(r[t]); }).join('、');
    lines.push((hasD ? '✅ ' : '✗  ') + name + (code ? ' (' + code + ')' : '') + (typeStr ? '  [' + typeStr + ']' : ''));
  });
  _doCopy(lines.join('
'), btn);
}

/* ── 複製 Excel ── */
function copyExcel() {
  var btn = document.getElementById('btn-copy-excel');
  if (!_currentRows.length) { _flashBtn(btn, '⚠️ 無資料'); return; }
  var colCode = '店家代碼', colName = '店家名稱';
  var headers = ['店碼', '店名', '有二位'].concat(TYPES);
  var lines = [];
  lines.push(document.getElementById('detail-dlg-title').textContent.trim());
  lines.push('');
  lines.push(headers.join('	'));
  var sorted = _currentRows.slice().filter(function(r){ return !isOne(r[COL_UNFILL]); });
  sorted.sort(function(a, b) {
    var ad = isOne(a[COL_DISPLAY]) ? 0 : 1, bd = isOne(b[COL_DISPLAY]) ? 0 : 1;
    if (ad !== bd) return ad - bd;
    return String(a[colName]||'').localeCompare(String(b[colName]||''), 'zh-TW');
  });
  sorted.forEach(function(r) {
    var code = r[colCode] || '', name = r[colName] || '';
    var cells = [code, name, isOne(r[COL_DISPLAY]) ? 1 : 0];
    TYPES.forEach(function(t){ cells.push(isOne(r[t]) ? 1 : 0); });
    lines.push(cells.join('	'));
  });
  _doCopy(lines.join('
'), btn);
}

/* ── 截圖 ── */
function takeScreenshot() {
  var btn = document.getElementById('btn-screenshot');
  btn.classList.add('loading');
  btn.textContent = '⏳ 截圖中...';

  function doCapture() {
    var body = document.getElementById('detail-dlg-body');
    var titleText = document.getElementById('detail-dlg-title').textContent.trim();

    var wrapper = document.createElement('div');
    wrapper.style.cssText = 'background:#fff;padding:20px 24px;font-family:Microsoft JhengHei,Noto Sans TC,sans-serif;display:inline-block;min-width:500px;position:fixed;top:-9999px;left:-9999px;';

    var h = document.createElement('div');
    h.style.cssText = 'font-size:15px;font-weight:900;color:#2D2D2D;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid #e8e8e8;';
    h.textContent = titleText;
    wrapper.appendChild(h);

    var tblSrc = body.querySelector('.detail-tbl');
    if (tblSrc) {
      var tblClone = tblSrc.cloneNode(true);
      tblClone.style.cssText = 'border-collapse:collapse;font-size:13px;width:max-content;min-width:100%;';
      tblClone.querySelectorAll('th').forEach(function(el){
        el.style.cssText = 'padding:7px 12px;text-align:left;font-size:11px;font-weight:800;color:#888;background:#f8f8f8;border-bottom:1px solid #e0e0e0;white-space:nowrap;';
      });
      tblClone.querySelectorAll('th.r').forEach(function(el){ el.style.textAlign = 'center'; });
      tblClone.querySelectorAll('td').forEach(function(el){
        el.style.cssText = 'padding:7px 12px;border-bottom:1px solid #f0f0f0;white-space:nowrap;';
      });
      tblClone.querySelectorAll('td.r').forEach(function(el){ el.style.textAlign = 'center'; });
      tblClone.querySelectorAll('.disp-yes').forEach(function(el){ el.style.color = '#3B6D11'; el.style.fontWeight = '800'; });
      tblClone.querySelectorAll('.disp-no').forEach(function(el){ el.style.color = '#ccc'; });
      wrapper.appendChild(tblClone);
    }

    var ts = document.createElement('div');
    ts.style.cssText = 'font-size:10px;color:#bbb;margin-top:12px;text-align:right;';
    ts.textContent = PROJ_NAME + '　' + new Date().toLocaleString('zh-TW');
    wrapper.appendChild(ts);

    document.body.appendChild(wrapper);
    html2canvas(wrapper, {
      scale: 2, backgroundColor: '#ffffff', useCORS: true,
      width: wrapper.scrollWidth, height: wrapper.scrollHeight
    }).then(function(canvas) {
      document.body.removeChild(wrapper);
      if (navigator.clipboard && window.ClipboardItem) {
        canvas.toBlob(function(blob) {
          try {
            var item = new ClipboardItem({'image/png': blob});
            navigator.clipboard.write([item]).then(function(){
              btn.classList.remove('loading');
              _flashBtn(btn, '✅ 已複製圖片！');
            }).catch(function(){ _downloadCanvas(canvas, titleText, btn); });
          } catch(e) { _downloadCanvas(canvas, titleText, btn); }
        }, 'image/png');
      } else {
        _downloadCanvas(canvas, titleText, btn);
      }
    }).catch(function(err) {
      document.body.removeChild(wrapper);
      btn.classList.remove('loading');
      btn.textContent = '📸 截圖';
      alert('截圖失敗：' + err);
    });
  }

  if (window.html2canvas) {
    doCapture();
  } else {
    var s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    s.onload = doCapture;
    s.onerror = function(){
      btn.classList.remove('loading');
      btn.textContent = '📸 截圖';
      alert('html2canvas 載入失敗，請確認網路連線');
    };
    document.head.appendChild(s);
  }
}

function _downloadCanvas(canvas, titleText, btn) {
  var link = document.createElement('a');
  link.download = titleText.replace(/\s+/g, '_') + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  btn.classList.remove('loading');
  _flashBtn(btn, '✅ 已下載！');
}

if (SHEET_ID) {
  fetchSheet();
} else {
  document.getElementById('stage').innerHTML = '<div class="empty">⚠️ 缺少 sheetId 參數</div>';
}
