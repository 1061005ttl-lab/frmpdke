<!--
════════════════════════════════════════════════════════════
  coverage_board.html  ─  覆蓋率型看板
════════════════════════════════════════════════════════════

【這個檔案在做什麼】
  顯示「覆蓋率型」專案的店家陳列／上架覆蓋狀況。
  支援多種欄位組合（有二位/已上架/未進貨…），
  欄位定義由管理表「覆蓋率型專案管理」分頁動態載入，
  不需修改此 HTML 即可支援不同專案。

【啟動流程】
  1. 從 URL 取得 sheetId
  2. 讀「覆蓋率型專案管理」→ 取得本專案的桶設定（BUCKET_A/B/C、LABEL_B/C）
  3. 讀「專案管理」→ 取得專案名稱、資料分頁、同步時間欄位
  4. 讀專案試算表主資料 → 渲染

【覆蓋率型專案管理分頁欄位（A～G）】
  A 專案名        僅供辨識，建議與「專案管理」B欄一致
  B 專案ID        Google Sheet ID，需與「專案管理」C欄一致
  C 未知群組標題   通常填「未填寫」，目前僅供備註，程式以 C 欄第一欄為 COL_UNFILL
  D 未知欄位      逗號分隔，第一欄為未填寫判斷欄（如：未填寫）
  E 已有群組標題   顯示在 stat 卡上的標題（如：有二位、已上架）
  F 已有欄位      逗號分隔，所有算「已有」的欄位（如：堆箱,端架,冰箱 或 原貨架,冰箱）
  G 未有群組標題   顯示在 stat 卡上的標題（如：未進貨、未上架），無則留空
  H 未有欄位      逗號分隔，所有算「未有」的欄位，無則留空

【範例設定】
  CVS雲泡二位陳列：B=1ELDfc…  D=未填寫  E=有二位  F=堆箱,端架,冰箱  G=  H=
  量全雲泡上架調查：B=1VO4Dh…  D=未填寫  E=已上架  F=原貨架,冰箱  G=未進貨  H=未進貨

【卡片 stat 顯示邏輯】
  總家數  = 全部列數
  未填寫  = C欄第一欄為 1 的列數
  已有    = BUCKET_B 任一欄為 1 的列數（標題由 D 欄決定）
  未有    = BUCKET_C 任一欄為 1 的列數（標題由 F 欄決定，若 G 欄空則不顯示此卡）
  Tooltip = BUCKET_B 超過一欄時才出現，逐欄顯示各類型數量

【常數位置（需改設定時看這裡）】
  MGMT_ID       → 管理表的 Google Sheets ID
  MGMT_SHEET    → 專案管理工作表名稱
  COV_CFG_SHEET → 覆蓋率型專案管理工作表名稱

════════════════════════════════════════════════════════════
-->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>覆蓋率看板</title>
<script>
/* \u2500\u2500 Session \u9A57\u8B49 \u2500\u2500 */
if (localStorage.getItem('ttl_auth_v1') !== '1') {
  window.location.replace('index.html');
}
</script>
<style>
:root {
  --primary: #378ADD;
  --primary-bg: rgba(55,138,221,.08);
  --bg: #F0EDE6;
  --card: #FFFFFF;
  --text: #2D2D2D;
  --sub: #888;
  --border: rgba(0,0,0,0.09);
  --green: #3B6D11;
  --green-bg: #EAF3DE;
  --green-bd: rgba(59,109,17,.25);
  --red: #A32D2D;
  --red-bg: #FCEBEB;
  --r: 12px;
  --dur: .32s;
  --ease: cubic-bezier(.34,1.05,.64,1);
}
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif; min-height:100vh; }

/* ── toolbar ── */
.toolbar {
  background:#fff;
  border-bottom:1px solid var(--border);
  padding:0 20px;
  height:52px;
  display:flex;
  align-items:center;
  gap:12px;
  position:sticky;
  top:0;
  z-index:50;
}
.toolbar-title { font-size:15px; font-weight:600; flex:1; }
.toolbar-sync { font-size:12px; color:var(--sub); }
.back-btn {
  background:none;
  border:1px solid var(--border);
  border-radius:8px;
  padding:5px 12px;
  font-size:13px;
  cursor:pointer;
  color:var(--text);
  transition:background .15s;
}
.back-btn:hover { background:var(--bg); }
.proj-sel {
  padding:5px 10px;
  border:1px solid var(--border);
  border-radius:8px;
  background:rgba(255,255,255,.7);
  color:var(--text);
  font-size:13px;
  font-weight:600;
  font-family:inherit;
  cursor:pointer;
  max-width:280px;
  outline:none;
  transition:border-color .15s;
}
.proj-sel:focus { border-color:var(--primary); }
.sync-note { font-size:11px; color:var(--sub); }

/* ── quicknav ── */
.quicknav {
  padding:6px 16px 0;
  display:flex;
  align-items:center;
  gap:0;
  flex-wrap:nowrap;
  overflow-x:auto;
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
  border-bottom:1px solid var(--border);
  background:#fff;
  position:sticky;
  top:52px;
  z-index:40;
}
.quicknav::-webkit-scrollbar { display:none; }
.qn-group {
  display:flex;
  align-items:center;
  gap:3px;
  padding:0 10px 6px 0;
  flex-shrink:0;
  border-right:1px solid var(--border);
  margin-right:8px;
}
.qn-group:last-child { border-right:none; padding-right:0; }
.qn-btn {
  padding:4px 10px;
  border-radius:16px;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  border:1px solid transparent;
  background:transparent;
  color:var(--sub);
  font-family:inherit;
  white-space:nowrap;
  transition:all .15s;
  flex-shrink:0;
}
.qn-btn:hover { background:rgba(55,138,221,.08); color:var(--primary); }
.qn-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); }
.qn-btn.home { font-weight:700; }
.qn-label {
  font-size:10px;
  color:var(--sub);
  font-weight:600;
  white-space:nowrap;
  padding-right:3px;
  letter-spacing:.04em;
  opacity:.6;
  flex-shrink:0;
}

/* ── stage ── */
.stage { padding:16px 20px 40px; }
.level-label {
  font-size:11px;
  color:var(--sub);
  letter-spacing:.05em;
  margin-bottom:10px;
  text-transform:uppercase;
}
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(360px,1fr));
  gap:12px;
  margin-bottom:28px;
}

/* ── card ── */
.card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:20px 22px 16px;
  cursor:pointer;
  transition:transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
  position:relative;
  overflow:visible;
}
.card:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,.10); }
.card-overall {
  border-color:var(--primary);
  background:var(--primary-bg);
}
.card-overall .card-top { color:var(--primary); }
.card-top-inline {
  font-size:11px; color:var(--sub); font-weight:500;
  display:flex; align-items:baseline; gap:5px;
  margin-bottom:14px; flex-wrap:wrap;
}
.card-overall .card-top-inline { color:var(--primary); font-weight:700; }
.card-name-inline { font-size:18px; font-weight:800; color:var(--text); line-height:1.1; }
.card-overall .card-name-inline, .card-name-overall { color:var(--primary); }
.card-top { font-size:12px; color:var(--sub); margin-bottom:6px; }
.card-name { font-size:18px; font-weight:700; margin-bottom:16px; }
.cov-row { display:flex; align-items:baseline; gap:4px; }
.cov-num { font-size:30px; font-weight:700; color:var(--text); cursor:default; }
.cov-unit { font-size:13px; color:var(--sub); }
.tag-row { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }
.tag { font-size:11px; padding:3px 8px; border-radius:6px; font-weight:500; }
.tag-yes { background:var(--green-bg); color:var(--green); }
.tag-no  { background:var(--red-bg);   color:var(--red); }
.valid-note { font-size:11px; color:#aaa; margin-top:7px; }

/* ── stat row ── */
.stat-row { display:flex; gap:10px; margin-top:4px; }
.stat-item { flex:1; background:var(--bg); border-radius:10px; padding:12px 10px; text-align:center; }
.stat-item.warn { background:var(--red-bg); }
.stat-item.good { background:var(--green-bg); }
.stat-label { font-size:11px; font-weight:500; color:var(--sub); margin-bottom:6px; }
.stat-item.warn .stat-label { color:var(--red); }
.stat-item.good .stat-label { color:var(--green); }
.stat-val { font-size:28px; font-weight:800; color:var(--text); line-height:1; letter-spacing:-1px; }
.stat-item.warn .stat-val { color:var(--red); }
.stat-item.good .stat-val { color:var(--green); }

/* 燈關閉時，對應 stat-item 反灰透明化 */
.stat-item.dim {
  background:#f0f0f0 !important;
  opacity:.45;
  filter:grayscale(.6);
}
.stat-item.dim .stat-label,
.stat-item.dim .stat-val,
.stat-item.dim .stat-pct { color:#999 !important; }

/* ── 明細按鈕 ── */
.card-detail-btn-row { padding-top:12px; margin-top:12px; border-top:1px solid var(--border); }
.card-detail-btn {
  font-size:11px; font-weight:700; padding:4px 12px; border-radius:7px;
  border:1px solid rgba(0,0,0,.12); background:rgba(255,255,255,.8);
  color:var(--text); cursor:pointer; font-family:inherit; transition:all .14s;
}
.card-detail-btn:hover { border-color:var(--primary); color:var(--primary); }

/* ── tooltip ── */
.tooltip {
  position:absolute;
  bottom:calc(100% + 8px);
  left:50%;
  transform:translateX(-50%);
  background:#fff;
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px 14px;
  min-width:170px;
  z-index:200;
  pointer-events:none;
  opacity:0;
  transition:opacity .15s;
  box-shadow:0 4px 16px rgba(0,0,0,.10);
}
.tooltip.show { opacity:1; }
.tt-title { font-size:11px; font-weight:700; color:var(--sub); margin-bottom:7px; letter-spacing:.03em; }
.tt-row { display:flex; justify-content:space-between; align-items:center; gap:20px; padding:4px 0; }
.tt-label { font-size:13px; color:var(--sub); }
.tt-val { font-size:13px; font-weight:700; color:var(--text); }

/* ── 全螢幕 Dialog ── */
#detail-dialog {
  position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:500;
  display:flex; align-items:center; justify-content:center;
  opacity:0; transition:opacity .2s;
}
#detail-dialog.open { opacity:1; }
.dlg-box {
  background:#fff; border-radius:14px;
  width:95vw; height:92vh;
  display:flex; flex-direction:column; overflow:hidden;
  box-shadow:0 20px 80px rgba(0,0,0,.35);
  transform:translateY(16px); transition:transform .22s;
}
#detail-dialog.open .dlg-box { transform:translateY(0); }
.dlg-header {
  padding:14px 20px; border-bottom:1px solid rgba(0,0,0,.09);
  display:flex; align-items:center; justify-content:space-between;
  font-size:15px; font-weight:900; color:var(--text); flex-shrink:0;
  background:rgba(248,250,248,1);
}
.dlg-close {
  cursor:pointer; font-size:14px; color:var(--sub); padding:4px 12px;
  border-radius:7px; border:1px solid rgba(0,0,0,.12); background:#fff;
  font-family:inherit; font-weight:700; transition:all .14s;
}
.dlg-close:hover { border-color:var(--primary); color:var(--primary); }
.dlg-action-btn {
  cursor:pointer; font-size:13px; color:var(--sub); padding:4px 11px;
  border-radius:7px; border:1px solid rgba(0,0,0,.12); background:#fff;
  font-family:inherit; font-weight:700; transition:all .14s; white-space:nowrap;
}
.dlg-action-btn:hover { border-color:var(--primary); color:var(--primary); }
.dlg-action-btn.done { border-color:var(--green); color:var(--green); background:var(--green-bg); }
.dlg-action-btn.loading { opacity:.6; pointer-events:none; }
.dlg-body { overflow:auto; flex:1; min-height:0; padding:0; scrollbar-width:thin; scrollbar-color:rgba(0,0,0,.25) transparent; }
.dlg-body::-webkit-scrollbar { width:8px; }
.dlg-body::-webkit-scrollbar-track { background:rgba(0,0,0,.04); border-radius:4px; }
.dlg-body::-webkit-scrollbar-thumb { background:rgba(0,0,0,.25); border-radius:4px; }
.dlg-body::-webkit-scrollbar-thumb:hover { background:rgba(0,0,0,.4); }

/* ── 店家明細表格 ── */
.detail-scroll { overflow-x:auto; scrollbar-width:thin; scrollbar-color:rgba(0,0,0,.25) transparent; }
.detail-scroll::-webkit-scrollbar { height:7px; }
.detail-scroll::-webkit-scrollbar-track { background:rgba(0,0,0,.04); }
.detail-scroll::-webkit-scrollbar-thumb { background:rgba(0,0,0,.25); border-radius:4px; }
.detail-scroll::-webkit-scrollbar-thumb:hover { background:rgba(0,0,0,.4); }
.detail-tbl { width:100%; border-collapse:collapse; font-size:14px; }
.detail-tbl th {
  padding:9px 14px; text-align:center; font-weight:800; font-size:12px; color:var(--sub);
  border-bottom:none; background:#f8f9fa; white-space:nowrap;
  position:sticky; top:0; z-index:2;
  box-shadow:0 2px 0 rgba(0,0,0,.08);
}
.detail-tbl th:first-child { text-align:left; }
.detail-tbl th:nth-child(2) { text-align:left; }
.detail-tbl td {
  padding:8px 14px; text-align:center;
  border-bottom:1px solid rgba(0,0,0,.04); white-space:nowrap;
}
.detail-tbl td:first-child { text-align:left; color:var(--sub); font-size:12px; font-weight:600; }
.detail-tbl td:nth-child(2) { text-align:left; color:var(--text); font-weight:600; }
.detail-tbl tr:last-child td { border-bottom:none; }
.detail-tbl tbody tr:hover td { background:rgba(55,138,221,.06); }
.d-yes { color:var(--green); font-weight:700; }
.d-no  { color:#ccc; }
.d-unfill {
  font-size:11px; font-weight:700; color:#E65100;
  background:#FFF3E0; padding:2px 7px; border-radius:6px;
}
.d-no-label {
  font-size:11px; font-weight:700; color:var(--red);
  background:var(--red-bg); padding:2px 7px; border-radius:6px;
}
.row-unfill td { background:rgba(255,243,224,.45); color:#aaa; }
.row-unfill .td-name { color:#bbb; }

.detail-tbl th.th-left { text-align:left; }
.detail-tbl td.td-org  { text-align:left; color:var(--sub); font-size:12px; }
.detail-tbl td.td-code { text-align:left; color:var(--sub); font-size:12px; font-weight:600; }
.detail-tbl td.td-name { text-align:left; color:var(--text); font-weight:600; }

/* ── loading ── */
.loading {
  display:none;
  position:fixed; inset:0;
  background:rgba(240,237,230,.7);
  z-index:400;
  align-items:center;
  justify-content:center;
  font-size:15px;
  color:var(--sub);
}
.loading.show { display:flex; }

/* ── empty ── */
.empty { padding:60px 20px; text-align:center; color:var(--sub); font-size:14px; }

/* ── view-toggle ── */
.view-toggle {
  display:inline-flex;
  border:1px solid var(--border);
  border-radius:10px;
  overflow:hidden;
  flex-shrink:0;
}
.vt-btn {
  padding:5px 14px;
  font-size:12px;
  font-weight:700;
  font-family:inherit;
  cursor:pointer;
  border:none;
  background:transparent;
  color:var(--sub);
  transition:all .15s;
  white-space:nowrap;
}
.vt-btn.active {
  background:var(--primary);
  color:#fff;
}
.vt-btn:not(.active):hover { background:var(--primary-bg); color:var(--primary); }

/* ── lamp chips (toolbar 燈號切換) ── */
.lamp-bar {
  display:flex; align-items:center; gap:6px; flex-shrink:0;
}
.lamp-chip {
  display:inline-flex; align-items:center; gap:5px;
  padding:4px 10px; border-radius:20px; font-size:12px; font-weight:700;
  border:1px solid rgba(0,0,0,.12); background:#f0f0f0; color:#bbb;
  cursor:pointer; transition:all .18s; font-family:inherit; white-space:nowrap;
  user-select:none;
}
.lamp-chip .lamp-dot {
  width:8px; height:8px; border-radius:50%; background:#ccc; flex-shrink:0; transition:background .18s;
}
/* 已有（綠） */
.lamp-chip.good.on { background:var(--green-bg); color:var(--green); border-color:var(--green-bd); }
.lamp-chip.good.on .lamp-dot { background:var(--green); }
/* 未有（紅） */
.lamp-chip.warn.on { background:var(--red-bg); color:var(--red); border-color:rgba(163,45,45,.25); }
.lamp-chip.warn.on .lamp-dot { background:var(--red); }
/* 未填寫（橘） */
.lamp-chip.neutral.on { background:#FFF3E0; color:#E65100; border-color:rgba(230,81,0,.3); }
.lamp-chip.neutral.on .lamp-dot { background:#E65100; }
/* 子欄位燈（BUCKET_B 細項） */
.lamp-chip.sub {
  font-size:11px; padding:3px 8px; border-radius:14px;
  border-style:dashed;
}
.lamp-sep {
  display:inline-block; width:1px; height:18px;
  background:rgba(0,0,0,.15); margin:0 2px; align-self:center; flex-shrink:0;
}
/* ── stat-pct 百分比小字 ── */
.stat-pct { font-size:14px; font-weight:700; color:#aaa; margin-top:4px; line-height:1; }
.stat-item.good .stat-pct { color:var(--green); opacity:.7; }
.stat-item.warn .stat-pct { color:var(--red); opacity:.7; }
.stat-pct.hidden { visibility:hidden; }

/* ══════════════════════════════
   手機優化 (640px 以下)
══════════════════════════════ */
@media (max-width: 640px) {
  .toolbar {
    height:auto; padding:8px 12px; flex-wrap:wrap; gap:6px;
  }
  .toolbar-title { font-size:13px; }
  .proj-sel { font-size:12px; max-width:150px; }
  .back-btn { font-size:12px; padding:4px 9px; }
  .sync-note { font-size:10px; order:5; width:100%; }
  .lamp-bar { order:4; width:100%; flex-wrap:wrap; gap:4px; padding-bottom:2px; }
  .lamp-chip { font-size:11px; padding:4px 9px; }

  .quicknav { top:auto; position:relative; }

  .stage { padding:12px 10px 40px; }
  .grid { grid-template-columns:1fr !important; gap:8px; }

  .card { padding:14px 14px 12px; }
  .card-name-inline { font-size:16px; }
  .stat-row { gap:6px; }
  .stat-item { padding:9px 6px; border-radius:9px; }
  .stat-val { font-size:24px !important; }
  .stat-label { font-size:10px; }
  .stat-pct { font-size:13px; }
  .card-detail-btn { font-size:11px; padding:4px 10px; }

  .dlg-box { width:100vw; height:100dvh; border-radius:0; }
  .dlg-header { padding:10px 12px; font-size:13px; flex-wrap:wrap; gap:6px; }
  .dlg-header > span { order:-1; width:100%; font-size:12px; line-height:1.4; }
  .dlg-action-btn { font-size:11px; padding:4px 8px; }
  .btn-txt { display:none; }
  .detail-tbl { font-size:13px; }
  .detail-tbl th { padding:7px 10px; font-size:11px; }
  .detail-tbl td { padding:6px 10px; }
}
</style>
</head>
<body>

<div class="loading" id="loading">載入中…</div>

<div class="toolbar">
  <button class="back-btn" id="back-btn" onclick="goBack()">← 返回</button>
  <span class="toolbar-title" id="tb-title">覆蓋率看板</span>
  <select class="proj-sel" id="proj-sel" style="display:none" onchange="switchProject(this.value)"></select>
  <div class="view-toggle" id="view-toggle">
    <button class="vt-btn active" id="vt-org"     onclick="setViewMode('org')">🏢 組織</button>
    <button class="vt-btn"        id="vt-channel" onclick="setViewMode('channel')">🏪 通路</button>
  </div>
  <span class="sync-note" id="tb-sync"></span>
  <div class="lamp-bar" id="lamp-bar" style="display:none"></div>
</div>

<div class="quicknav" id="quicknav"></div>
<div class="stage" id="stage"></div>

<!-- 全螢幕 Dialog 店家明細 -->
<div id="detail-dialog" style="display:none" onclick="if(event.target===this)closeDialog()">
  <div class="dlg-box">
    <div class="dlg-header">
      <span id="dlg-title"></span>

<script>
/* \u2500\u2500 \u8A2D\u5B9A\uFF08\u5BEB\u6B7B\uFF0C\u540C INDEX \u67B6\u69CB\uFF09\u2500\u2500 */
var MGMT_ID    = '1PR9OR7BIGyTpcH8QSMRXkPhQTr4h3m0UK3gET29f19s';
var MGMT_SHEET = '\u5C08\u6848\u7BA1\u7406';
var SYNC_SHEET_DEFAULT = '\u8F14\u52A9';
var SYNC_CELL_DEFAULT  = 'B1';
var SHEET_NAME_DEFAULT = '\u5E97\u5BB6\u540D\u518A';
/* 層級欄位名稱（組織視角） */
var COL_AREA    = '\u71DF\u696D\u8655\u540D\u7A31';
var COL_OFFICE  = '\u71DF\u696D\u6240/\u8AB2';
var COL_STAFF   = '\u57F7\u884C\u4EBA\u54E1';
var COL_UNFILL  = '\u672A\u586B\u5BEB';
var COL_CODE    = '\u5E97\u5BB6\u4EE3\u78BC';
var COL_NAME    = '\u5E97\u5BB6\u540D\u7A31';
/* 通路視角欄位 */
var COL_CHANNEL = '\u901A\u8DEF\u5225';   /* 通路別 */
var COL_TYPE    = '\u5E97\u5BB6\u578B\u614B'; /* 店家型態 */

/* 動態桶設定（由覆蓋率型專案管理分頁載入） */
var BUCKET_A = [];          /* 未知欄位列表（通常只有一欄：未填寫） */
var BUCKET_B = [];          /* 已有欄位列表（堆箱/端架/冰箱 or 原貨架/冰箱） */
var BUCKET_C = [];          /* 未有欄位列表（未進貨/未上架 or 空） */
var LABEL_B  = '\u5DF2\u6709';   /* 已有 stat 卡標題，預設「已有」 */
var LABEL_C  = '\u672A\u6709';   /* 未有 stat 卡標題，預設「未有」 */

/* 覆蓋率型專案管理分頁名稱 */
var COV_CFG_SHEET = '\u8986\u84CB\u7387\u578B\u5C08\u6848\u7BA1\u7406';

/* \u2500\u2500 \u5F9E URL \u53EA\u8B80 sheetId\uFF0C\u5176\u9918\u5168\u5F9E\u7BA1\u7406\u5206\u9801\u67E5 \u2500\u2500 */
var params   = new URLSearchParams(location.search);
var SHEET_ID = params.get('sheetId') || '';

/* \u76EE\u524D\u5C08\u6848\u8CC7\u8A0A\uFF08\u5F9E\u7BA1\u7406\u5206\u9801\u8F09\u5165\u5F8C\u586B\u5165\uFF09*/
var PROJ_NAME  = '\u8986\u84CB\u7387\u770B\u677F';

var SYNC_CELL  = SYNC_CELL_DEFAULT;
var SHEET_NAME = SHEET_NAME_DEFAULT;

/* \u2500\u2500 \u72C0\u614B \u2500\u2500 */
var allRows    = [];
var drillStack = [];
var _dialogTitle = '';
var _dialogRows  = [];
var _dialogLevel = 'staff';
/* 視角：'org'（組織）| 'channel'（通路） */
var viewMode = 'org';

/* ── 燈號 chips 狀態 ── */
/* 3 題燈： disp(已有) / no(未有，如果有 BUCKET_C) / unfill(未填寫) */
var chips = { disp: true, no: true, unfill: true };

/* bucketChips: 控制 BUCKET_B 各欄位子燈（只影響 hasDisp 細項，不影響 total） */
var bucketChips = {};

function initChips() {
  chips = { disp: true, no: true, unfill: true };
  bucketChips = {};
  BUCKET_B.forEach(function(t){ bucketChips[t] = true; });
  renderLampBar();
}

function renderLampBar() {
  var bar = document.getElementById('lamp-bar');
  if (!bar) return;
  bar.style.display = 'flex';
  bar.innerHTML = '';

  function makeChip(key, label, cls, isBucket) {
    var btn = document.createElement('button');
    var on = isBucket ? (bucketChips[key] !== false) : chips[key];
    btn.className = 'lamp-chip ' + cls + (on ? ' on' : '') + (isBucket ? ' sub' : '');
    btn.innerHTML = '<span class="lamp-dot"></span>' + label;
    btn.dataset.key = key;
    btn.dataset.bucket = isBucket ? '1' : '';
    btn.addEventListener('click', function() {
      if (isBucket) toggleBucketLamp(key);
      else toggleLamp(key);
    });
    if (isBucket && !chips['disp']) btn.style.display = 'none';
    bar.appendChild(btn);
  }

  makeChip('disp', LABEL_B, 'good', false);
  /* 子欄位燈：只在 BUCKET_B > 1 時顯示，加分隔 */
  if (BUCKET_B.length > 1) {
    var sep = document.createElement('span');
    sep.className = 'lamp-sep';
    sep.id = 'lamp-sep-b';
    if (!chips['disp']) sep.style.display = 'none';
    bar.appendChild(sep);
    BUCKET_B.forEach(function(t) { makeChip(t, t, 'good', true); });
    var sep2 = document.createElement('span');
    sep2.className = 'lamp-sep';
    sep2.id = 'lamp-sep-b2';
    if (!chips['disp']) sep2.style.display = 'none';
    bar.appendChild(sep2);
  }
  if (BUCKET_C.length) makeChip('no', LABEL_C, 'warn', false);
  makeChip('unfill', '\u672a\u586b\u5beb', 'neutral', false);
}

function toggleLamp(key) {
  chips[key] = !chips[key];
  var bar = document.getElementById('lamp-bar');
  if (bar) {
    bar.querySelectorAll('.lamp-chip').forEach(function(btn) {
      if (btn.dataset.key === key && !btn.dataset.bucket) {
        btn.classList.toggle('on', chips[key]);
      }
      /* disp 群組燈關掉時，隱藏子燈 */
      if (key === 'disp' && btn.classList.contains('sub')) {
        btn.style.display = chips['disp'] ? '' : 'none';
      }
    });
  }
  /* 同步分隔線顯隱 */
  if (key === 'disp') {
    ['lamp-sep-b','lamp-sep-b2'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.style.display = chips['disp'] ? '' : 'none';
    });
  }
  render();
}

function toggleBucketLamp(key) {
  bucketChips[key] = !bucketChips[key];
  var bar = document.getElementById('lamp-bar');
  if (bar) {
    bar.querySelectorAll('.lamp-chip.sub').forEach(function(btn) {
      if (btn.dataset.key === key) btn.classList.toggle('on', bucketChips[key]);
    });
  }
  render();
}

/* \u2500\u2500 \u5DE5\u5177 \u2500\u2500 */
function pct(a,b){ return b===0?0:Math.round(a/b*100); }
function showLoading(){ document.getElementById('loading').classList.add('show'); }
function hideLoading(){ document.getElementById('loading').classList.remove('show'); }
function isOne(v){ return Number(v)===1||v===true||v==='true'||v==='1'; }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* \u2500\u2500 \u89E3\u6790 gviz \u65E5\u671F\u683C\u5F0F \u2192 \u4EBA\u985E\u53EF\u8B80 \u2500\u2500 */
function parseGvizDate(v) {
  var m = String(v).match(/Date\((\d+),(\d+),(\d+),(\d+),(\d+),(\d+)\)/);
  if (!m) return String(v);
  var d = new Date(+m[1], +m[2], +m[3], +m[4], +m[5], +m[6]);
  return d.toLocaleString('zh-TW', {
    year:'numeric', month:'2-digit', day:'2-digit',
    hour:'2-digit', minute:'2-digit'
  });
}

/* \u2500\u2500 \u8FD4\u56DE \u2500\u2500 */
function goBack() {
  window.location.href = 'index.html';
}

/* \u2500\u2500 \u7B2C\u4E00\u6B65\uFF1A\u5F9E\u7BA1\u7406\u5206\u9801\u67E5\u51FA\u6B64 sheetId \u7684\u8A2D\u5B9A\uFF0C\u518D\u555F\u52D5 \u2500\u2500 */
function init() {
  if (!SHEET_ID) {
    hideLoading();
    document.getElementById('stage').innerHTML = '<div class="empty">\u26A0\uFE0F \u7F3A\u5C11 sheetId \u53C3\u6578</div>';
    return;
  }
  /* 先讀「覆蓋率型專案管理」取得桶設定，再讀「專案管理」取得基本資料 */
  function parseCsv(s){ return s.split(',').map(function(t){ return t.trim(); }).filter(Boolean); }

  var urlCfg = 'https://docs.google.com/spreadsheets/d/' + MGMT_ID +
    '/gviz/tq?tqx=out:json&headers=1&sheet=' + encodeURIComponent(COV_CFG_SHEET);
  fetch(urlCfg)
    .then(function(r){ return r.text(); })
    .then(function(txt){
      var json = JSON.parse(txt.replace(/^[^\(]+\(/, '').replace(/\);?\s*$/, ''));
      var rows = (json.table && json.table.rows) || [];
      rows.forEach(function(row){
        var cells = row.c || [];
        function cv(c){ return c ? String(c.v!==null&&c.v!==undefined ? c.v : c.f||'').trim() : ''; }
        var sid = cv(cells[1]);
        if (!sid || sid.length < 20) return; /* 跳過表頭列 */
        if (sid !== SHEET_ID) return;
        /* A:專案名  B:專案ID  C:未知群組標題  D:未知欄位  E:已有群組標題  F:已有欄位  G:未有群組標題  H:未有欄位 */
        var labelA = cv(cells[2]);
        var colsA  = parseCsv(cv(cells[3]));
        var labelB = cv(cells[4]);
        var colsB  = parseCsv(cv(cells[5]));
        var labelC = cv(cells[6]);
        var colsC  = parseCsv(cv(cells[7]));
        if (colsA.length) BUCKET_A = colsA;
        if (colsB.length) BUCKET_B = colsB;
        if (colsC.length) BUCKET_C = colsC;
        if (labelB) LABEL_B = labelB;
        if (labelC) LABEL_C = labelC;
        /* COL_UNFILL 取桶A第一欄，若有設定的話 */
        if (colsA.length) COL_UNFILL = colsA[0];
      });
    })
    .catch(function(){})
    .then(function(){
      /* 不論桶設定是否讀到，繼續讀「專案管理」 */
      var urlMgmt = 'https://docs.google.com/spreadsheets/d/' + MGMT_ID +
        '/gviz/tq?tqx=out:json&headers=1&sheet=' + encodeURIComponent(MGMT_SHEET);
      return fetch(urlMgmt).then(function(r){ return r.text(); });
    })
    .then(function(txt){
      var json = JSON.parse(txt.replace(/^[^\(]+\(/, '').replace(/\);?\s*$/, ''));
      var rows = (json.table && json.table.rows) || [];
      var coverageProjs = [];

      rows.forEach(function(row){
        var cells = row.c || [];
        function cv(c){ return c ? String(c.v!==null&&c.v!==undefined ? c.v : c.f||'').trim() : ''; }
        var active    = cv(cells[0]).toUpperCase() === 'ON';
        var name      = cv(cells[1]);
        var sid       = cv(cells[2]);
        var sheet     = cv(cells[3]) || SHEET_NAME_DEFAULT;
        var sync      = cv(cells[4]) || SYNC_SHEET_DEFAULT;
        var cell      = cv(cells[5]) || SYNC_CELL_DEFAULT;
        var boardType = cv(cells[6]);
        if (!name || !sid) return;
        if (boardType !== '\u8986\u84CB\u7387\u578B') return;
        if (sid === SHEET_ID) {
          PROJ_NAME  = name;
          SHEET_NAME = sheet;
          SYNC_SHEET = sync;
          SYNC_CELL  = cell;
        }
        coverageProjs.push({ name:name, id:sid, active:active });
      });

      document.getElementById('tb-title').textContent = PROJ_NAME;
      document.title = PROJ_NAME;

      var onProjs = coverageProjs.filter(function(p){ return p.active; });
      if (onProjs.length > 1) {
        var sel = document.getElementById('proj-sel');
        sel.innerHTML = onProjs.map(function(p){
          var selected = p.id === SHEET_ID ? ' selected' : '';
          return '<option value="' + esc(p.id) + '"' + selected + '>' + esc(p.name) + '</option>';
        }).join('');
        sel.style.display = '';
      }

      initChips();
      fetchSheet();
      fetchSyncTime();
    })
    .catch(function(){
      document.getElementById('tb-title').textContent = PROJ_NAME;
      initChips();
      fetchSheet();
      fetchSyncTime();
    });
}

function switchProject(sid) {
  location.href = location.pathname + '?sheetId=' + encodeURIComponent(sid);
}

/* \u2500\u2500 \u4E3B\u8CC7\u6599 \u2500\u2500 */
function fetchSheet() {
  showLoading();
  var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
    '/gviz/tq?tqx=out:json&headers=1&sheet=' + encodeURIComponent(SHEET_NAME);
  fetch(url)
    .then(function(r){ return r.text(); })
    .then(function(txt){
      var json = JSON.parse(txt.replace(/^[^\(]+\(/, '').replace(/\);?\s*$/, ''));
      var tbl  = json.table || {};
      var cols = (tbl.cols||[]).map(function(c){ return c.label||''; });
      allRows  = (tbl.rows||[]).map(function(row){
        var obj = {};
        (row.c||[]).forEach(function(cell,i){
          obj[cols[i]] = cell ? (cell.v!==null&&cell.v!==undefined ? cell.v : cell.f||'') : '';
        });
        return obj;
      });
      render();
    })
    .catch(function(err){
      hideLoading();
      document.getElementById('stage').innerHTML = '<div class="empty">\u26A0\uFE0F \u8F09\u5165\u5931\u6557\uFF1A' + err + '</div>';
    });
}

function fetchSyncTime() {
  var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
    '/gviz/tq?tqx=out:json&sheet=' + encodeURIComponent(SYNC_SHEET) + '&range=' + SYNC_CELL;
  fetch(url)
    .then(function(r){ return r.text(); })
    .then(function(txt){
      var json = JSON.parse(txt.replace(/^[^\(]+\(/, '').replace(/\);?\s*$/, ''));
      var val = '';
      try { val = json.table.rows[0].c[0].v || ''; } catch(e){}
      if (val) {
        document.getElementById('tb-sync').textContent = '\uD83D\uDCCA \u540C\u6B65 ' + parseGvizDate(val);
      }
    })
    .catch(function(){});
}

/* ── 計算 ── */

/* 燈狀態筛選：燈關掉的店家排除 */
function applyChips(rows) {
  return rows.filter(function(r) {
    if (isOne(r[COL_UNFILL])) return chips['unfill'] !== false;
    if (isDispRow(r))         return chips['disp']   !== false;
    if (isNoRow(r))           return chips['no']     !== false;
    /* 其他（未進貨且未填寫）→ 不設專屬燈，永遠納入 */
    return true;
  });
}

function isDispRow(r){
  /* bucketChips 打開的欄位，任一為 1 → 已有 */
  return BUCKET_B.some(function(t){ return bucketChips[t] !== false && isOne(r[t]); });
}
function isNoRow(r){
  return BUCKET_C.some(function(t){ return isOne(r[t]); });
}

function calcGroup(rows) {
  var filtered = applyChips(rows); /* 燈筛後的店家 */
  var total = filtered.length;
  var unfilled = 0, hasDisp = 0, hasNo = 0;
  var bCounts = {}, cCounts = {};
  BUCKET_B.forEach(function(t){ bCounts[t] = 0; });
  BUCKET_C.forEach(function(t){ cCounts[t] = 0; });
  filtered.forEach(function(r){
    if (isOne(r[COL_UNFILL])) { unfilled++; return; }
    if (isDispRow(r)) hasDisp++;
    if (isNoRow(r))   hasNo++;
    BUCKET_B.forEach(function(t){ if (isOne(r[t])) bCounts[t]++; });
    BUCKET_C.forEach(function(t){ if (isOne(r[t])) cCounts[t]++; });
  });
  var valid = total - unfilled;
  /* 分母 = 總家數（含未填寫，依燈筛選後） */
  return { total:total, unfilled:unfilled, valid:valid,
           hasDisp:hasDisp, hasNo:hasNo,
           bCounts:bCounts, cCounts:cCounts };
}

/* \u2500\u2500 \u7BE9\u9078 \u2500\u2500 */
function filterRows(level, key) {
  if(level==='area')    return allRows.filter(function(r){ return String(r[COL_AREA])===key; });
  if(level==='office')  return allRows.filter(function(r){ return String(r[COL_OFFICE])===key; });
  if(level==='staff')   return allRows.filter(function(r){ return String(r[COL_STAFF])===key; });
  if(level==='channel')  return allRows.filter(function(r){ return String(r[COL_CHANNEL])===key; });
  if(level==='type')     return allRows.filter(function(r){ return String(r[COL_TYPE])===key; });
  if(level==='ch-area')  return allRows.filter(function(r){ return String(r[COL_AREA])===key; });
  if(level==='ch-office')return allRows.filter(function(r){ return String(r[COL_OFFICE])===key; });
  return allRows;
}
function getCurrentRows() {
  if(!drillStack.length) return allRows;
  /* 逐層累積過濾：每一層都在上一層的結果裡再篩 */
  var rows = allRows;
  drillStack.forEach(function(d){
    var col;
    if(d.level==='area'||d.level==='ch-area')    col=COL_AREA;
    else if(d.level==='office'||d.level==='ch-office') col=COL_OFFICE;
    else if(d.level==='staff')   col=COL_STAFF;
    else if(d.level==='channel') col=COL_CHANNEL;
    else if(d.level==='type')    col=COL_TYPE;
    if(col) rows=rows.filter(function(r){ return String(r[col])===d.key; });
  });
  return rows;
}
function getNextGroups(rows, col) {
  var map={};
  rows.forEach(function(r){
    var k=String(r[col]||''); if(!k) return;
    if(!map[k]) map[k]=[];
    map[k].push(r);
  });
  return map;
}

/* \u2500\u2500 視角切換 \u2500\u2500 */
function setViewMode(mode) {
  if (viewMode === mode) return;
  viewMode = mode;
  drillStack = [];
  document.getElementById('vt-org').classList.toggle('active',     mode === 'org');
  document.getElementById('vt-channel').classList.toggle('active', mode === 'channel');
  render();
}

/* \u2500\u2500 \u6E32\u67D3 \u2500\u2500 */
function render() {
  hideLoading();
  buildQuicknav();
  var stage=document.getElementById('stage');
  stage.innerHTML='';
  var depth=drillStack.length, rows=getCurrentRows();
  var overallName = depth===0 ? '\u5168\u53F0' : drillStack[drillStack.length-1].key;

  if (viewMode === 'channel') {
    /* 通路視角：通路別 → 店家型態 → 營業處 → 營業所/課 → dialog */
    if      (depth===0) renderLevel(stage,rows,COL_CHANNEL,'channel','\u901A\u8DEF\u5225', overallName);
    else if (depth===1) renderLevel(stage,rows,COL_TYPE,   'type',   '\u5E97\u5BB6\u578B\u614B', overallName);
    else if (depth===2) renderLevel(stage,rows,COL_AREA,   'ch-area','\u71DF\u696D\u8655', overallName);
    else if (depth===3) renderLevel(stage,rows,COL_OFFICE, 'ch-office','\u71DF\u696D\u6240/\u8AB2', overallName);
    else stage.innerHTML='<div class="empty">\u5DF2\u5230\u6700\u7D30\u5C64\u7D1A</div>';
  } else {
    /* 組織視角 */
    if      (depth===0) renderLevel(stage,rows,COL_AREA,  'area',  '\u71DF\u696D\u8655', overallName);
    else if (depth===1) renderLevel(stage,rows,COL_OFFICE,'office','\u71DF\u696D\u6240/\u8AB2', overallName);
    else if (depth===2) renderLevel(stage,rows,COL_STAFF, 'staff', '\u696D\u52D9\u4EBA\u54E1', overallName);
    else stage.innerHTML='<div class="empty">\u5DF2\u5230\u6700\u7D30\u5C64\u7D1A</div>';
  }
}

function renderLevel(stage, rows, col, levelKey, labelText, overallName) {
  var groups=getNextGroups(rows,col), keys=Object.keys(groups);
  if(!keys.length){ stage.innerHTML='<div class="empty">\u7121\u8CC7\u6599</div>'; return; }
  /* 排序：依 hasDisp 降序（已有數量最多的排前面） */
  keys.sort(function(a,b){
    return calcGroup(applyChips(groups[b])).hasDisp - calcGroup(applyChips(groups[a])).hasDisp;
  });
  var div=document.createElement('div');
  div.innerHTML='<div class="level-label">'+labelText+'</div>';
  var grid=document.createElement('div'); grid.className='grid';
  /* 整體卡片固定最前，點即開 dialog */
  var overallCard=buildCard(overallName, labelText, calcGroup(rows), levelKey, rows, true);
  grid.appendChild(overallCard);
  keys.forEach(function(k){ grid.appendChild(buildCard(k,labelText,calcGroup(groups[k]),levelKey,groups[k],false)); });
  div.appendChild(grid); stage.appendChild(div);
}

/* \u2500\u2500 \u5361\u7247 \u2500\u2500 */
function buildCard(name, labelText, stat, levelKey, rows, isOverall) {
  var card=document.createElement('div');
  card.className='card'+(isOverall?' card-overall':'');
  var ttId='tt-'+name.replace(/[^a-zA-Z0-9]/g,'_')+'-'+levelKey+(isOverall?'-all':'');
  var topLabel=isOverall?('\u6574\u9AD4\u6982\u6CC1'):labelText;
  var T = stat.total;
  function fp(n){ return T>0 ? Math.round(n/T*100)+'%' : '—'; }
  /* 全部卡片標題都是一行：組別小字 + 名稱大字 */
  var topHtml = '<div class="card-top card-top-inline">'+esc(topLabel)+' <span class="card-name-inline'+(isOverall?' card-name-overall':'')+'">'+esc(name)+'</span></div>';
  card.innerHTML=
    topHtml+
    '<div class="stat-row">'+
      '<div class="stat-item"><div class="stat-label">\u7E3D\u5BB6\u6578</div><div class="stat-val">'+stat.total+'</div><div class="stat-pct hidden">&nbsp;</div></div>'+
      '<div class="stat-item warn'+(chips['unfill']===false?' dim':'')+'"><div class="stat-label">\u672A\u586B\u5BEB</div><div class="stat-val">'+stat.unfilled+'</div><div class="stat-pct">'+fp(stat.unfilled)+'</div></div>'+
      '<div class="stat-item good'+(chips['disp']===false?' dim':'')+'" id="si-'+ttId+'" style="position:relative">'+
        '<div class="stat-label">'+LABEL_B+'</div><div class="stat-val">'+stat.hasDisp+'</div>'+
        '<div class="stat-pct">'+fp(stat.hasDisp)+'</div>'+
        (BUCKET_B.length>1?'<div class="tooltip" id="'+ttId+'">'+buildTooltipHTML(stat)+'</div>':'')+
      '</div>'+
      (BUCKET_C.length?'<div class="stat-item warn'+(chips['no']===false?' dim':'')+'"><div class="stat-label">'+LABEL_C+'</div><div class="stat-val">'+stat.hasNo+'</div><div class="stat-pct">'+fp(stat.hasNo)+'</div></div>':'')+
    '</div>'+
    '<div class="card-detail-btn-row"><button class="card-detail-btn" id="dbtn-'+ttId+'">\uD83D\uDCCB \u5E97\u5BB6\u660E\u7D30</button></div>';

  var siEl=card.querySelector('#si-'+ttId), ttEl=card.querySelector('#'+ttId);
  if(siEl&&ttEl){
    siEl.addEventListener('mouseenter',function(e){ e.stopPropagation(); ttEl.classList.add('show'); });
    siEl.addEventListener('mouseleave',function(){ ttEl.classList.remove('show'); });
  }

  card.querySelector('#dbtn-'+ttId).addEventListener('click',function(e){
    e.stopPropagation(); openDialog(name,levelKey,rows);
  });
  card.addEventListener('click',function(e){
    if(e.target.closest('#si-'+ttId)||e.target.closest('#dbtn-'+ttId)) return;
    /* 整體卡片：開 dialog */
    if(isOverall){ openDialog(name,levelKey,rows); return; }
    /* 最末層：開 dialog；其餘層級都往下鑽
       組織視角 leaf = staff
       通路視角 leaf = ch-office（type → ch-area → ch-office → dialog） */
    var isLeaf = (levelKey==='staff') || (levelKey==='ch-office');
    if(isLeaf) openDialog(name,levelKey,rows);
    else drillDown(levelKey,name);
  });
  return card;
}

function buildTooltipHTML(stat) {
  return '<div class="tt-title">'+LABEL_B+'\u660E\u7D30</div>'+
    BUCKET_B.map(function(t){
      return '<div class="tt-row"><span class="tt-label">'+t+'</span><span class="tt-val">'+(stat.bCounts[t]||0)+' \u5BB6</span></div>';
    }).join('');
}

/* \u2500\u2500 drill / quicknav \u2500\u2500 */
function drillDown(levelKey, key){ drillStack.push({level:levelKey,key:key}); render(); }
function drillTo(idx){ drillStack=idx<0?[]:drillStack.slice(0,idx+1); render(); }

function jumpToArea(areaName) {
  drillStack = [{ level:'area', key:areaName }];
  render();
}
function jumpToOffice(areaName, officeName) {
  drillStack = [{ level:'area', key:areaName }, { level:'office', key:officeName }];
  render();
}
function jumpToChannel(chName) {
  drillStack = [{ level:'channel', key:chName }];
  render();
}
function jumpToType(chName, typeName) {
  drillStack = [{ level:'channel', key:chName }, { level:'type', key:typeName }];
  render();
}
function jumpToChArea(chName, typeName, areaName) {
  drillStack = [{ level:'channel', key:chName }, { level:'type', key:typeName }, { level:'ch-area', key:areaName }];
  render();
}
function jumpToChOffice(chName, typeName, areaName, officeName) {
  drillStack = [{ level:'channel', key:chName }, { level:'type', key:typeName }, { level:'ch-area', key:areaName }, { level:'ch-office', key:officeName }];
  render();
}

function qEsc(s){ return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function buildQuicknav() {
  var nav = document.getElementById('quicknav');
  if (!nav) return;
  var depth = drillStack.length;
  var html  = '';

  html += '<div class="qn-group">';
  html += '<button class="qn-btn home' + (depth===0?' active':'') + '" onclick="drillTo(-1)">全覽</button>';
  html += '</div>';

  if (viewMode === 'org') {
    var areaGroups = getNextGroups(allRows, COL_AREA);
    var areaKeys   = Object.keys(areaGroups);
    var curArea    = depth >= 1 ? drillStack[0].key : null;
    var curOffice  = depth >= 2 ? drillStack[1].key : null;
    if (areaKeys.length) {
      html += '<div class="qn-group"><span class="qn-label">營業處</span>';
      areaKeys.forEach(function(a) {
        html += '<button class="qn-btn' + (curArea===a?' active':'') + '" onclick="jumpToArea(\'' + qEsc(a) + '\')">' + esc(a) + '</button>';
      });
      html += '</div>';
    }
    if (curArea && areaGroups[curArea]) {
      var officeGroups = getNextGroups(areaGroups[curArea], COL_OFFICE);
      var officeKeys   = Object.keys(officeGroups);
      if (officeKeys.length) {
        html += '<div class="qn-group"><span class="qn-label">' + esc(curArea) + '</span>';
        officeKeys.forEach(function(o) {
          html += '<button class="qn-btn' + (curOffice===o?' active':'') + '" onclick="jumpToOffice(\'' + qEsc(curArea) + '\',\'' + qEsc(o) + '\')">' + esc(o) + '</button>';
        });
        html += '</div>';
      }
    }
  } else {
    var chGroups  = getNextGroups(allRows, COL_CHANNEL);
    var chKeys    = Object.keys(chGroups);
    var curCh     = depth >= 1 ? drillStack[0].key : null;
    var curType   = depth >= 2 ? drillStack[1].key : null;
    var curChArea = depth >= 3 ? drillStack[2].key : null;
    var curChOff  = depth >= 4 ? drillStack[3].key : null;
    if (chKeys.length) {
      html += '<div class="qn-group"><span class="qn-label">\u901a\u8def\u5225</span>';
      chKeys.forEach(function(c) {
        html += '<button class="qn-btn' + (curCh===c?' active':'') + '" onclick="jumpToChannel(\'' + qEsc(c) + '\')">' + esc(c) + '</button>';
      });
      html += '</div>';
    }
    if (curCh && chGroups[curCh]) {
      var typeGroups = getNextGroups(chGroups[curCh], COL_TYPE);
      var typeKeys   = Object.keys(typeGroups);
      if (typeKeys.length) {
        html += '<div class="qn-group"><span class="qn-label">' + esc(curCh) + '</span>';
        typeKeys.forEach(function(t) {
          html += '<button class="qn-btn' + (curType===t?' active':'') + '" onclick="jumpToType(\'' + qEsc(curCh) + '\',\'' + qEsc(t) + '\')">' + esc(t) + '</button>';
        });
        html += '</div>';
      }
    }
    if (curCh && curType) {
      var chRows2     = allRows.filter(function(r){ return String(r[COL_CHANNEL])===curCh && String(r[COL_TYPE])===curType; });
      var areaGroups2 = getNextGroups(chRows2, COL_AREA);
      var areaKeys2   = Object.keys(areaGroups2);
      if (areaKeys2.length) {
        html += '<div class="qn-group"><span class="qn-label">' + esc(curType) + '</span>';
        areaKeys2.forEach(function(a) {
          html += '<button class="qn-btn' + (curChArea===a?' active':'') + '" onclick="jumpToChArea(\'' + qEsc(curCh) + '\',\'' + qEsc(curType) + '\',\'' + qEsc(a) + '\')">' + esc(a) + '</button>';
        });
        html += '</div>';
      }
    }
    if (curCh && curType && curChArea) {
      var chRows3    = allRows.filter(function(r){ return String(r[COL_CHANNEL])===curCh && String(r[COL_TYPE])===curType && String(r[COL_AREA])===curChArea; });
      var offGroups2 = getNextGroups(chRows3, COL_OFFICE);
      var offKeys2   = Object.keys(offGroups2);
      if (offKeys2.length) {
        html += '<div class="qn-group"><span class="qn-label">' + esc(curChArea) + '</span>';
        offKeys2.forEach(function(o) {
          html += '<button class="qn-btn' + (curChOff===o?' active':'') + '" onclick="jumpToChOffice(\'' + qEsc(curCh) + '\',\'' + qEsc(curType) + '\',\'' + qEsc(curChArea) + '\',\'' + qEsc(o) + '\')">' + esc(o) + '</button>';
        });
        html += '</div>';
      }
    }
  }

  nav.innerHTML = html;
}


/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 \u5E97\u5BB6\u660E\u7D30 Dialog \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */

/* \u4f9d chips \u72c0\u614b\u51b3\u5b9a dialog \u8981\u986f\u793a\u54ea\u4e9b\u5217\uff0c\u4e26\u5e36\u6392\u5e8f\uff1a
   1\ufe0f\u20e3 \u5df2\u6709\uff08disp\uff09  2\ufe0f\u20e3 \u672a\u6709\uff08no\uff09  3\ufe0f\u20e3 \u5176\u4ed6\u5c1a\u672a\u786e\u8a8d  4\ufe0f\u20e3 \u672a\u586b\u5beb */
function dialogRows(rows) {
  var result = [];
  rows.forEach(function(r) {
    var isUnfill = isOne(r[COL_UNFILL]);
    if (isUnfill) {
      if (chips['unfill'] !== false) result.push({ r:r, grp:3 }); /* \u672a\u586b\u5beb */
    } else if (isDispRow(r)) {
      if (chips['disp']   !== false) result.push({ r:r, grp:0 }); /* \u5df2\u6709 */
    } else if (isNoRow(r)) {
      if (chips['no']     !== false) result.push({ r:r, grp:1 }); /* \u672a\u6709 */
    } else {
      result.push({ r:r, grp:2 }); /* \u5176\u4ed6\uff08\u672a\u9032\u8ca8\u4e14\u5df2\u77e5\uff09\u2014\u6c38\u9060\u986f\u793a */
    }
  });
  result.sort(function(a, b) {
    if (a.grp !== b.grp) return a.grp - b.grp;
    var oa=String(a.r[COL_OFFICE]||''), ob=String(b.r[COL_OFFICE]||'');
    if (oa!==ob) return oa>ob?1:-1;
    var sa=String(a.r[COL_STAFF]||''), sb=String(b.r[COL_STAFF]||'');
    if (sa!==sb) return sa>sb?1:-1;
    var na=String(a.r[COL_NAME]||''), nb=String(b.r[COL_NAME]||'');
    return na>nb?1:na<nb?-1:0;
  });
  return result;
}

/* \u5f9e dialogRows \u53d6\u51fa\u7d14 row \u7269\u4ef6\uff08\u7d66 copyLine/copyExcel \u7528\uff09 */
function sortedValidRows(rows) {
  return dialogRows(rows)
    .filter(function(d){ return d.grp !== 3; }) /* copyLine/Excel \u4e0d\u5305\u542b\u672a\u586b\u5beb */
    .map(function(d){ return d.r; });
}

function buildStoreTable(rows, levelKey){
  var items = dialogRows(rows);
  var extraCols=levelKey==='area'?[COL_OFFICE,COL_STAFF]:levelKey==='office'?[COL_STAFF]:[];
  var colLabels={}; colLabels[COL_OFFICE]='\u71DF\u696D\u6240/\u8AB2'; colLabels[COL_STAFF]='\u4E3B\u8981\u8A2A\u54E1';
  var html='<div class="detail-scroll"><table class="detail-tbl"><thead><tr>';
  extraCols.forEach(function(c){ html+='<th class="th-left">'+(colLabels[c]||c)+'</th>'; });
  html+='<th class="th-left">\u5E97\u78BC</th><th class="th-left">\u5E97\u540D</th>';
  html+='<th>\u72C0\u614B</th>'; /* \u7D71\u4E00\u72C0\u614B\u6B04 */
  if(BUCKET_B.length>1) BUCKET_B.forEach(function(t){ html+='<th>'+t+'</th>'; });
  if(BUCKET_C.length)   BUCKET_C.forEach(function(t){ html+='<th>'+t+'</th>'; });
  html+='</tr></thead><tbody>';

  items.forEach(function(d){
    var r = d.r, grp = d.grp;
    var isUnfill = (grp === 3);
    var trClass  = isUnfill ? ' class="row-unfill"' : '';
    html += '<tr' + trClass + '>';
    extraCols.forEach(function(c){
      html += '<td class="td-org">' + esc(String(r[c]||'\u2014')) + '</td>';
    });
    html += '<td class="td-code">' + esc(String(r[COL_CODE]||'\u2014')) + '</td>';
    html += '<td class="td-name">' + esc(String(r[COL_NAME]||'\u2014')) + '</td>';

    /* \u72c0\u614b\u6b04 */
    if (isUnfill) {
      html += '<td><span class="d-unfill">\u672A\u586B\u5BEB</span></td>';
      if(BUCKET_B.length>1) BUCKET_B.forEach(function(){ html+='<td><span class="d-no">\u2014</span></td>'; });
      if(BUCKET_C.length)   BUCKET_C.forEach(function(){ html+='<td><span class="d-no">\u2014</span></td>'; });
    } else {
      var disp = isDispRow(r);
      if (grp === 0)      html += '<td><span class="d-yes">\u2705</span></td>';
      else if (grp === 1) html += '<td><span class="d-no-label">' + LABEL_C + '</span></td>';
      else                html += '<td><span class="d-no">\u2014</span></td>';
      if(BUCKET_B.length>1) BUCKET_B.forEach(function(t){ html+='<td>'+(isOne(r[t])?'<span class="d-yes">\u2705</span>':'<span class="d-no">\u2014</span>')+'</td>'; });
      if(BUCKET_C.length)   BUCKET_C.forEach(function(t){ html+='<td>'+(isOne(r[t])?'<span class="d-yes">\u2705</span>':'<span class="d-no">\u2014</span>')+'</td>'; });
    }
    html += '</tr>';
  });

  html += '</tbody></table></div>';
  return html;
}

function openDialog(displayName, levelKey, rows){
  _dialogTitle=displayName; _dialogRows=rows; _dialogLevel=levelKey;
  /* 依 chips 算各狀態家數 */
  var items    = dialogRows(rows);
  var unfillCnt= items.filter(function(d){ return d.grp===3; }).length;
  var dispCnt  = items.filter(function(d){ return d.grp===0; }).length;
  var noCnt    = items.filter(function(d){ return d.grp===1; }).length;
  var total    = items.length;
  /* 組合脈絡前綴（drillStack 路徑 + 目前名稱） */
  var ctx = drillStack.map(function(d){ return d.key; });
  ctx.push(displayName);
  var titleParts = ['\u3010' + ctx.join(' \u203A ') + '\u3011\u5E97\u5BB6\u660E\u7D30'];
  titleParts.push('\u5171 '+total+' \u5BB6');
  if(chips['unfill']!==false && unfillCnt) titleParts.push('\u672A\u586B\u5BEB '+unfillCnt);
  titleParts.push(LABEL_B+' '+dispCnt);
  if(BUCKET_C.length && chips['no']!==false) titleParts.push(LABEL_C+' '+noCnt);
  document.getElementById('dlg-title').textContent = titleParts.join('\u3000');
  document.getElementById('dlg-body').innerHTML=buildStoreTable(rows,levelKey);
  ['btn-copy-line','btn-copy-excel','btn-screenshot'].forEach(function(id){
    var b=document.getElementById(id); if(!b) return;
    b.classList.remove('done','loading');
    var inner = id==='btn-copy-line'
      ? '<span class="btn-icon">\uD83D\uDCAC</span><span class="btn-txt"> \u8907\u88FD LINE</span>'
      : id==='btn-copy-excel'
      ? '<span class="btn-icon">\uD83D\uDCCA</span><span class="btn-txt"> \u8907\u88FD Excel</span>'
      : '<span class="btn-icon">\uD83D\uDCF8</span><span class="btn-txt"> \u622A\u5716</span>';
    b.innerHTML = inner;
  });
  var dlg=document.getElementById('detail-dialog');
  dlg.style.display='flex';
  requestAnimationFrame(function(){ dlg.classList.add('open'); });
}

function closeDialog(){
  var dlg=document.getElementById('detail-dialog');
  dlg.classList.remove('open');
  setTimeout(function(){ dlg.style.display='none'; },220);
}
document.addEventListener('keydown',function(e){ if(e.key==='Escape') closeDialog(); });

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 \u8907\u88FD / \u622A\u5716 \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
function _flashBtn(btn,label){
  var orig=btn.textContent; btn.textContent=label; btn.classList.add('done');
  setTimeout(function(){ btn.textContent=orig; btn.classList.remove('done'); },2000);
}
function fallbackCopy(text){
  var ta=document.createElement('textarea'); ta.value=text;
  ta.style.cssText='position:fixed;top:0;left:0;opacity:0;pointer-events:none;';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{ document.execCommand('copy'); }catch(e){} document.body.removeChild(ta);
}
function _doCopy(text,btn){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){ _flashBtn(btn,'\u2705 \u5DF2\u8907\u88FD\uFF01'); })
      .catch(function(){ fallbackCopy(text); _flashBtn(btn,'\u2705 \u5DF2\u8907\u88FD\uFF01'); });
  } else { fallbackCopy(text); _flashBtn(btn,'\u2705 \u5DF2\u8907\u88FD\uFF01'); }
}

function copyLine(){
  var btn=document.getElementById('btn-copy-line');
  if(!_dialogRows.length){ _flashBtn(btn,'\u26A0\uFE0F \u7121\u8CC7\u6599'); return; }
  var valid=sortedValidRows(_dialogRows), lv=_dialogLevel;
  var hasDisp=valid.filter(function(r){ return isDispRow(r); }).length;
  var hasNo=valid.filter(function(r){ return isNoRow(r); }).length;
  var summary='\u6709\u6548 '+valid.length+' \u5BB6\u3000'+LABEL_B+' '+hasDisp+' \u5BB6'+(BUCKET_C.length?' \u3000'+LABEL_C+' '+hasNo+' \u5BB6':'');
  var lines=['\u3010'+_dialogTitle+'\u3011\u5E97\u5BB6\u660E\u7D30',summary,'\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500'];
  var curGroup=null;
  valid.forEach(function(r){
    var groupKey=lv==='area'?String(r[COL_OFFICE]||''):lv==='office'?String(r[COL_STAFF]||''):null;
    if(groupKey!==null&&groupKey!==curGroup){ curGroup=groupKey; if(groupKey) lines.push('\n\u258C '+groupKey); }
    var code=String(r[COL_CODE]||''), name=String(r[COL_NAME]||'\u2014'), disp=isDispRow(r), noDisp=isNoRow(r);
    var activeTypes=BUCKET_B.filter(function(t){ return isOne(r[t]); });
    if(disp){ lines.push('  \u2705 '+name+(code?' ('+code+')':'')); if(activeTypes.length) lines.push('     \u2514 '+activeTypes.join('\u3001')); }
    else if(noDisp) lines.push('  \u274C '+name+(code?' ('+code+')':'')+'\uff08'+LABEL_C+'\uff09');
    else lines.push('  \u2014 '+name+(code?' ('+code+')':''));
  });
  lines.push('\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500');
  var footParts=BUCKET_B.map(function(t){ return t+' '+_dialogRows.reduce(function(s,r){ return s+(isOne(r[t])?1:0); },0)+' \u5BB6'; });
  if(BUCKET_C.length) BUCKET_C.forEach(function(t){ footParts.push(t+' '+_dialogRows.reduce(function(s,r){ return s+(isOne(r[t])?1:0); },0)+' \u5BB6'); });
  if(footParts.length) lines.push(footParts.join('\u3000'));
  _doCopy(lines.join('\n'),btn);
}

function copyExcel(){
  var btn=document.getElementById('btn-copy-excel');
  if(!_dialogRows.length){ _flashBtn(btn,'\u26A0\uFE0F \u7121\u8CC7\u6599'); return; }
  var valid=sortedValidRows(_dialogRows), lv=_dialogLevel, lines=[];
  lines.push(document.getElementById('dlg-title').textContent.trim()); lines.push('');
  var headers=[];
  if(lv==='area')   headers=['\u71DF\u696D\u6240/\u8AB2','\u4E3B\u8981\u8A2A\u54E1'];
  if(lv==='office') headers=['\u4E3B\u8981\u8A2A\u54E1'];
  var dynCols=[LABEL_B].concat(BUCKET_B.length>1?BUCKET_B:[]).concat(BUCKET_C);
  headers=headers.concat(['\u5E97\u78BC','\u5E97\u540D']).concat(dynCols);
  lines.push(headers.join('\t'));
  valid.forEach(function(r){
    var row=[];
    if(lv==='area'){ row.push(String(r[COL_OFFICE]||'')); row.push(String(r[COL_STAFF]||'')); }
    if(lv==='office') row.push(String(r[COL_STAFF]||''));
    row.push(String(r[COL_CODE]||'')); row.push(String(r[COL_NAME]||''));
    row.push(isDispRow(r)?1:0);
    if(BUCKET_B.length>1) BUCKET_B.forEach(function(t){ row.push(isOne(r[t])?1:0); });
    BUCKET_C.forEach(function(t){ row.push(isOne(r[t])?1:0); });
    lines.push(row.join('\t'));
  });
  _doCopy(lines.join('\n'),btn);
}

function takeScreenshot(){
  var btn=document.getElementById('btn-screenshot');
  btn.classList.add('loading'); btn.textContent='\u23F3 \u622A\u5716\u4E2D...';
  function doCapture(){
    var titleText=document.getElementById('dlg-title').textContent.trim();
    var wrapper=document.createElement('div');
    wrapper.style.cssText='background:#fff;padding:20px 24px;font-family:Microsoft JhengHei,Noto Sans TC,sans-serif;display:inline-block;min-width:700px;position:fixed;top:-9999px;left:-9999px;';
    var h=document.createElement('div');
    h.style.cssText='font-size:15px;font-weight:900;color:#2D2D2D;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid #e8e8e8;';
    h.textContent=titleText; wrapper.appendChild(h);
    var tblSrc=document.getElementById('dlg-body').querySelector('.detail-tbl');
    if(tblSrc){
      var tblClone=tblSrc.cloneNode(true);
      tblClone.style.cssText='border-collapse:collapse;font-size:13px;width:max-content;min-width:100%;';
      /* 截圖不用 sticky，明確移除，確保標頭在最上方 */
      tblClone.querySelectorAll('th').forEach(function(el){
        el.style.cssText='padding:7px 12px;text-align:center;font-size:11px;font-weight:800;color:#888;background:#f8f8f8;border-bottom:2px solid #e0e0e0;white-space:nowrap;position:static;box-shadow:none;top:auto;z-index:auto;';
      });
      tblClone.querySelectorAll('th.th-left').forEach(function(el){ el.style.textAlign='left'; });
      tblClone.querySelectorAll('td').forEach(function(el){ el.style.cssText='padding:7px 12px;text-align:center;border-bottom:1px solid #f0f0f0;white-space:nowrap;'; });
      tblClone.querySelectorAll('td.td-org,td.td-code').forEach(function(el){ el.style.textAlign='left'; el.style.color='#888'; });
      tblClone.querySelectorAll('td.td-name').forEach(function(el){ el.style.textAlign='left'; });
      tblClone.querySelectorAll('.d-yes').forEach(function(el){ el.style.color='#3B6D11'; el.style.fontWeight='700'; });
      tblClone.querySelectorAll('.d-no').forEach(function(el){ el.style.color='#ccc'; });
      tblClone.querySelectorAll('.d-unfill').forEach(function(el){ el.style.cssText='font-size:11px;font-weight:700;color:#E65100;background:#FFF3E0;padding:2px 7px;border-radius:6px;'; });
      wrapper.appendChild(tblClone);
    }
    var ts=document.createElement('div');
    ts.style.cssText='font-size:10px;color:#bbb;margin-top:12px;text-align:right;';
    ts.textContent=PROJ_NAME+'\u3000'+new Date().toLocaleString('zh-TW');
    wrapper.appendChild(ts); document.body.appendChild(wrapper);
    html2canvas(wrapper,{ scale:2, backgroundColor:'#ffffff', useCORS:true, width:wrapper.scrollWidth, height:wrapper.scrollHeight })
      .then(function(canvas){
        document.body.removeChild(wrapper);
        if(navigator.clipboard&&window.ClipboardItem){
          canvas.toBlob(function(blob){
            try{
              navigator.clipboard.write([new ClipboardItem({'image/png':blob})])
                .then(function(){ btn.classList.remove('loading'); _flashBtn(btn,'\u2705 \u5DF2\u8907\u88FD\u5716\u7247\uFF01'); })
                .catch(function(){ _downloadCanvas(canvas,titleText,btn); });
            }catch(e){ _downloadCanvas(canvas,titleText,btn); }
          },'image/png');
        } else _downloadCanvas(canvas,titleText,btn);
      }).catch(function(err){ document.body.removeChild(wrapper); btn.classList.remove('loading'); btn.textContent='\uD83D\uDCF8 \u622A\u5716'; alert('\u622A\u5716\u5931\u6557\uFF1A'+err); });
  }
  if(window.html2canvas) doCapture();
  else {
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    s.onload=doCapture;
    s.onerror=function(){ btn.classList.remove('loading'); btn.textContent='\uD83D\uDCF8 \u622A\u5716'; alert('html2canvas \u8F09\u5165\u5931\u6557'); };
    document.head.appendChild(s);
  }
}
function _downloadCanvas(canvas,titleText,btn){
  var link=document.createElement('a');
  link.download=titleText.replace(/\s+/g,'_')+'.png';
  link.href=canvas.toDataURL('image/png'); link.click();
  btn.classList.remove('loading'); _flashBtn(btn,'\u2705 \u5DF2\u4E0B\u8F09\uFF01');
}

/* \u2500\u2500 \u555F\u52D5 \u2500\u2500 */
init();
</script>
</body>
</html>
