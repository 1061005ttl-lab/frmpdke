【這個檔案在做什麼】
  顯示「覆蓋率型」專案的店家陳列／上架覆蓋狀況。
  支援多種欄位組合（有二位/已上架/未進貨…），
  欄位定義由管理表「覆蓋率型專案管理」分頁動態載入，
  不需修改此 HTML 即可支援不同專案。

【啟動流程】
  1. 從 URL 取得 sheetId
  2. 讀「覆蓋率型專案管理」→ 取得本專案的桶設定（BUCKET_A/B/C、LABEL_B/C）
  3. 讀「專案管理」→ 取得專案名稱、資料分頁、同步時間欄位
  4. 讀專案試算表主資料 → 渲染

【覆蓋率型專案管理分頁欄位（A～G）】
  A 專案名        僅供辨識，建議與「專案管理」B欄一致
  B 專案ID        Google Sheet ID，需與「專案管理」C欄一致
  C 未知群組標題   通常填「未填寫」，目前僅供備註，程式以 C 欄第一欄為 COL_UNFILL
  D 未知欄位      逗號分隔，第一欄為未填寫判斷欄（如：未填寫）
  E 已有群組標題   顯示在 stat 卡上的標題（如：有二位、已上架）
  F 已有欄位      逗號分隔，所有算「已有」的欄位（如：堆箱,端架,冰箱 或 原貨架,冰箱）
  G 未有群組標題   顯示在 stat 卡上的標題（如：未進貨、未上架），無則留空
  H 未有欄位      逗號分隔，所有算「未有」的欄位，無則留空

【範例設定】
  CVS雲泡二位陳列：B=1ELDfc…  D=未填寫  E=有二位  F=堆箱,端架,冰箱  G=  H=
  量全雲泡上架調查：B=1VO4Dh…  D=未填寫  E=已上架  F=原貨架,冰箱  G=未進貨  H=未進貨

【卡片 stat 顯示邏輯】
  總家數  = 全部列數
  未填寫  = C欄第一欄為 1 的列數
  已有    = BUCKET_B 任一欄為 1 的列數（標題由 D 欄決定）
  未有    = BUCKET_C 任一欄為 1 的列數（標題由 F 欄決定，若 G 欄空則不顯示此卡）
  Tooltip = BUCKET_B 超過一欄時才出現，逐欄顯示各類型數量

【常數位置（需改設定時看這裡）】
  MGMT_ID       → 管理表的 Google Sheets ID
  MGMT_SHEET    → 專案管理工作表名稱
  COV_CFG_SHEET → 覆蓋率型專案管理工作表名稱

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>覆蓋率看板</title>

<style>
:root {
  --primary: #378ADD;
  --primary-bg: rgba(55,138,221,.08);
  --bg: #F0EDE6;
  --card: #FFFFFF;
  --text: #2D2D2D;
  --sub: #888;
  --border: rgba(0,0,0,0.09);
  --green: #3B6D11;
  --green-bg: #EAF3DE;
  --green-bd: rgba(59,109,17,.25);
  --red: #A32D2D;
  --red-bg: #FCEBEB;
  --r: 12px;
  --dur: .32s;
  --ease: cubic-bezier(.34,1.05,.64,1);
}
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif; min-height:100vh; }

/* ── toolbar ── */
.toolbar {
  background:#fff;
  border-bottom:1px solid var(--border);
  padding:0 20px;
  height:52px;
  display:flex;
  align-items:center;
  gap:12px;
  position:sticky;
  top:0;
  z-index:50;
}
.toolbar-title { font-size:15px; font-weight:600; flex:1; }
.back-btn {
  background:none;
  border:1px solid var(--border);
  border-radius:8px;
  padding:5px 12px;
  font-size:13px;
  cursor:pointer;
  color:var(--text);
  transition:background .15s;
}
.back-btn:hover { background:var(--bg); }
.proj-sel {
  padding:5px 10px;
  border:1px solid var(--border);
  border-radius:8px;
  background:rgba(255,255,255,.7);
  color:var(--text);
  font-size:13px;
  font-weight:600;
  font-family:inherit;
  cursor:pointer;
  max-width:280px;
  outline:none;
  transition:border-color .15s;
}
.proj-sel:focus { border-color:var(--primary); }
.sync-note { font-size:11px; color:var(--sub); }

/* ── quicknav ── */
.quicknav {
  padding:6px 16px 0;
  display:flex;
  align-items:center;
  gap:0;
  flex-wrap:nowrap;
  overflow-x:auto;
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
  border-bottom:1px solid var(--border);
  background:#fff;
  position:sticky;
  top:52px;
  z-index:40;
}
.quicknav::-webkit-scrollbar { display:none; }
.qn-group {
  display:flex;
  align-items:center;
  gap:3px;
  padding:0 10px 6px 0;
  flex-shrink:0;
  border-right:1px solid var(--border);
  margin-right:8px;
}
.qn-group:last-child { border-right:none; padding-right:0; }
.qn-btn {
  padding:4px 10px;
  border-radius:16px;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  border:1px solid transparent;
  background:transparent;
  color:var(--sub);
  font-family:inherit;
  white-space:nowrap;
  transition:all .15s;
  flex-shrink:0;
}
.qn-btn:hover { background:rgba(55,138,221,.08); color:var(--primary); }
.qn-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); }
.qn-btn.home { font-weight:700; }
.qn-label {
  font-size:10px;
  color:var(--sub);
  font-weight:600;
  white-space:nowrap;
  padding-right:3px;
  letter-spacing:.04em;
  opacity:.6;
  flex-shrink:0;
}

/* ── grade-bar 等級筛選 ── */
.grade-bar {
  padding:6px 16px;
  display:flex;
  align-items:center;
  gap:6px;
  background:#fff;
  border-bottom:1px solid var(--border);
  flex-wrap:wrap;
}
.grade-label {
  font-size:11px;
  color:var(--sub);
  font-weight:600;
  white-space:nowrap;
  letter-spacing:.04em;
  opacity:.6;
}
.grade-chip {
  padding:3px 10px;
  border-radius:16px;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  border:1px solid transparent;
  background:var(--bg);
  color:var(--sub);
  font-family:inherit;
  white-space:nowrap;
  transition:all .15s;
}
.grade-chip.active {
  background:var(--primary);
  color:#fff;
  border-color:var(--primary);
}
.grade-chip:not(.active):hover { background:var(--primary-bg); color:var(--primary); }
.grade-all {
  font-size:11px;
  padding:3px 9px;
}

/* ── stage ── */
.stage { padding:16px 20px 40px; }
.level-label {
  font-size:11px;
  color:var(--sub);
  letter-spacing:.05em;
  margin-bottom:10px;
  text-transform:uppercase;
}
.grid {
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:12px;
  margin-bottom:28px;
}

/* ── card ── */
.card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:20px 22px 16px;
  cursor:pointer;
  transition:transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
  position:relative;
  overflow:visible;
}
.card:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,.10); z-index:10; }
.card-overall {
  border-color:var(--primary);
  background:var(--primary-bg);
}
.card-top-inline {
  font-size:11px; color:var(--sub); font-weight:500;
  display:flex; align-items:center; gap:5px;
  margin-bottom:14px;
}
.card-overall .card-top-inline { color:var(--primary); font-weight:700; }
.card-name-inline { font-size:18px; font-weight:800; color:var(--text); line-height:1.1; flex:1; min-width:0; }
.card-overall .card-name-inline, .card-name-overall { color:var(--primary); }


/* ── stat row ── */
.stat-row { display:flex; gap:6px; margin-top:4px; }
.stat-item { flex:1; min-width:0; background:var(--bg); border-radius:10px; padding:10px 6px; text-align:center; }
.stat-item.warn { background:var(--red-bg); }
.stat-item.good { background:var(--green-bg); }
.stat-label { font-size:10px; font-weight:500; color:var(--sub); margin-bottom:6px; word-break:keep-all; overflow-wrap:break-word; line-height:1.3; min-height:2.6em; display:flex; align-items:center; justify-content:center; }
.stat-item.warn .stat-label { color:var(--red); }
.stat-item.good .stat-label { color:var(--green); }
.stat-val { font-size:24px; font-weight:800; color:var(--text); line-height:1; letter-spacing:-1px; }
.stat-item.warn .stat-val { color:var(--red); }
.stat-item.good .stat-val { color:var(--green); }

/* 燈關閉時，對應 stat-item 反灰透明化 */
.stat-item.dim {
  background:#f0f0f0 !important;
  opacity:.45;
  filter:grayscale(.6);
}
.stat-item.dim .stat-label,
.stat-item.dim .stat-val,
.stat-item.dim .stat-pct { color:#999 !important; }

/* ── 明細按鈕（標題列右上角） ── */
.card-detail-btn {
  flex-shrink:0;
  font-size:11px; font-weight:600; padding:2px 8px; border-radius:6px;
  border:1px solid rgba(0,0,0,.12); background:rgba(255,255,255,.75);
  color:var(--sub); cursor:pointer; font-family:inherit; transition:all .14s;
  white-space:nowrap; line-height:1.6; margin-left:auto;
}
.card-detail-btn:hover { border-color:var(--primary); color:var(--primary); background:#fff; }

/* ── tooltip ── */
.tooltip {
  position:absolute;
  bottom:calc(100% + 8px);
  left:50%;
  transform:translateX(-50%);
  background:#fff;
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px 14px;
  min-width:200px;
  max-width:320px;
  width:max-content;
  z-index:200;
  pointer-events:none;
  opacity:0;
  transition:opacity .15s;
  box-shadow:0 4px 16px rgba(0,0,0,.10);
}
.tooltip.show { opacity:1; }
.tooltip.flip {
  bottom:auto;
  top:calc(100% + 8px);
}
.tt-title { font-size:11px; font-weight:700; color:var(--sub); margin-bottom:7px; letter-spacing:.03em; }
.tt-row { display:flex; justify-content:space-between; align-items:flex-start; gap:16px; padding:4px 0; }
.tt-label { font-size:13px; color:var(--sub); flex:1; line-height:1.4; white-space:normal; word-break:keep-all; }
.tt-val { font-size:13px; font-weight:700; color:var(--text); white-space:nowrap; flex-shrink:0; }

/* ── 全螢幕 Dialog ── */
#detail-dialog {
  position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:500;
  display:flex; align-items:center; justify-content:center;
  opacity:0; transition:opacity .2s;
}
#detail-dialog.open { opacity:1; }
.dlg-box {
  background:#fff; border-radius:14px;
  width:95vw; height:92vh;
  display:flex; flex-direction:column; overflow:hidden;
  box-shadow:0 20px 80px rgba(0,0,0,.35);
  transform:translateY(16px); transition:transform .22s;
}
#detail-dialog.open .dlg-box { transform:translateY(0); }
.dlg-header {
  padding:14px 20px; border-bottom:1px solid rgba(0,0,0,.09);
  display:flex; align-items:center; justify-content:space-between;
  font-size:15px; font-weight:900; color:var(--text); flex-shrink:0;
  background:rgba(248,250,248,1);
}
.dlg-close {
  cursor:pointer; font-size:14px; color:var(--sub); padding:4px 12px;
  border-radius:7px; border:1px solid rgba(0,0,0,.12); background:#fff;
  font-family:inherit; font-weight:700; transition:all .14s;
}
.dlg-close:hover { border-color:var(--primary); color:var(--primary); }
.dlg-action-btn {
  cursor:pointer; font-size:13px; color:var(--sub); padding:4px 11px;
  border-radius:7px; border:1px solid rgba(0,0,0,.12); background:#fff;
  font-family:inherit; font-weight:700; transition:all .14s; white-space:nowrap;
}
.dlg-action-btn:hover { border-color:var(--primary); color:var(--primary); }
.dlg-action-btn.done { border-color:var(--green); color:var(--green); background:var(--green-bg); }
.dlg-action-btn.loading { opacity:.6; pointer-events:none; }
.dlg-body { flex:1; min-height:0; padding:0; overflow:hidden; }

/* ── 店家明細表格 ── */
/* detail-scroll 同時承擔水平+垂直捲動，讓 thead sticky 能正確定位 */
.detail-scroll {
  overflow:auto;
  height:100%;
  scrollbar-width:thin; scrollbar-color:rgba(0,0,0,.25) transparent;
}
.detail-scroll::-webkit-scrollbar { width:8px; height:7px; }
.detail-scroll::-webkit-scrollbar-track { background:rgba(0,0,0,.04); border-radius:4px; }
.detail-scroll::-webkit-scrollbar-thumb { background:rgba(0,0,0,.25); border-radius:4px; }
.detail-scroll::-webkit-scrollbar-thumb:hover { background:rgba(0,0,0,.4); }
.detail-tbl { width:100%; border-collapse:collapse; font-size:14px; }
.detail-tbl th {
  padding:9px 14px; text-align:center; font-weight:800; font-size:12px; color:var(--sub);
  border-bottom:none; background:#f8f9fa; white-space:nowrap;
  position:sticky; top:0; z-index:2;
  box-shadow:0 2px 0 rgba(0,0,0,.08);
}
.detail-tbl th:first-child { text-align:left; }
.detail-tbl th:nth-child(2) { text-align:left; }
.detail-tbl td {
  padding:8px 14px; text-align:center;
  border-bottom:1px solid rgba(0,0,0,.04); white-space:nowrap;
}

.detail-tbl tr:last-child td { border-bottom:none; }
.detail-tbl tbody tr:hover td { background:rgba(55,138,221,.06); }
.d-yes { color:var(--green); font-weight:700; }
.d-no  { color:#ccc; }
.d-unfill {
  font-size:11px; font-weight:700; color:#E65100;
  background:#FFF3E0; padding:2px 7px; border-radius:6px;
}
.d-no-label {
  font-size:11px; font-weight:700; color:var(--red);
  background:var(--red-bg); padding:2px 7px; border-radius:6px;
}
.d-c-yes { color:var(--red); font-weight:700; font-size:15px; }
.row-unfill td { background:rgba(255,243,224,.45); color:#aaa; }
.row-unfill .td-name { color:#bbb; }

.detail-tbl th.th-left { text-align:left; }
.detail-tbl td.td-org  { text-align:left; color:var(--sub); font-size:12px; }
.detail-tbl td.td-code { text-align:left; color:var(--sub); font-size:12px; font-weight:600; }
.detail-tbl td.td-name { text-align:left; color:var(--text); font-weight:600; }

/* ── loading ── */
.loading {
  display:none;
  position:fixed; inset:0;
  background:rgba(240,237,230,.7);
  z-index:400;
  align-items:center;
  justify-content:center;
  font-size:15px;
  color:var(--sub);
}
.loading.show { display:flex; }

/* ── empty ── */
.empty { padding:60px 20px; text-align:center; color:var(--sub); font-size:14px; }

/* ── view-toggle ── */
.view-toggle {
  display:inline-flex;
  border:1px solid var(--border);
  border-radius:10px;
  overflow:hidden;
  flex-shrink:0;
}
.vt-btn {
  padding:5px 14px;
  font-size:12px;
  font-weight:700;
  font-family:inherit;
  cursor:pointer;
  border:none;
  background:transparent;
  color:var(--sub);
  transition:all .15s;
  white-space:nowrap;
}
.vt-btn.active {
  background:var(--primary);
  color:#fff;
}
.vt-btn:not(.active):hover { background:var(--primary-bg); color:var(--primary); }

/* ── lamp chips (toolbar 燈號切換) ── */
.lamp-bar {
  display:flex; align-items:center; gap:6px; flex-shrink:0;
}
.lamp-chip {
  display:inline-flex; align-items:center; gap:5px;
  padding:4px 10px; border-radius:20px; font-size:12px; font-weight:700;
  border:1px solid rgba(0,0,0,.12); background:#f0f0f0; color:#bbb;
  cursor:pointer; transition:all .18s; font-family:inherit; white-space:nowrap;
  user-select:none;
}
.lamp-chip .lamp-dot {
  width:8px; height:8px; border-radius:50%; background:#ccc; flex-shrink:0; transition:background .18s;
}
/* 已有（綠） */
.lamp-chip.good.on { background:var(--green-bg); color:var(--green); border-color:var(--green-bd); }
.lamp-chip.good.on .lamp-dot { background:var(--green); }
/* 未有（紅） */
.lamp-chip.warn.on { background:var(--red-bg); color:var(--red); border-color:rgba(163,45,45,.25); }
.lamp-chip.warn.on .lamp-dot { background:var(--red); }
/* 未填寫（橘） */
.lamp-chip.neutral.on { background:#FFF3E0; color:#E65100; border-color:rgba(230,81,0,.3); }
.lamp-chip.neutral.on .lamp-dot { background:#E65100; }
/* 子欄位燈（BUCKET_B 細項） */
.lamp-chip.sub {

<script>
/* \u2500\u2500 \u8A2D\u5B9A\uFF08\u5BEB\u6B7B\uFF0C\u540C INDEX \u67B6\u69CB\uFF09\u2500\u2500 */
var MGMT_ID    = '1PR9OR7BIGyTpcH8QSMRXkPhQTr4h3m0UK3gET29f19s';
var MGMT_SHEET = '\u5C08\u6848\u7BA1\u7406';
var SYNC_SHEET_DEFAULT = '\u8F14\u52A9';
var SYNC_CELL_DEFAULT  = 'B1';
var SHEET_NAME_DEFAULT = '\u5E97\u5BB6\u540D\u518A';
/* 層級欄位名稱（組織視角） */
var COL_AREA    = '\u71DF\u696D\u8655\u540D\u7A31';
var COL_OFFICE  = '\u71DF\u696D\u6240/\u8AB2';
var COL_STAFF   = '\u57F7\u884C\u4EBA\u54E1';
var COL_UNFILL  = '\u672A\u586B\u5BEB';
var COL_CODE    = '\u5E97\u5BB6\u4EE3\u78BC';
var COL_NAME    = '\u5E97\u5BB6\u540D\u7A31';
/* 店家等級欄位（店家名冊 H 欄） */
var COL_GRADE = '店家等級';
var selectedGrades = null; /* null = 全選，Set = 已選等級 */

/* 通路視角欄位 */
var COL_CHANNEL = '\u901A\u8DEF\u5225';   /* 通路別 */
var COL_TYPE    = '\u5E97\u5BB6\u578B\u614B'; /* 店家型態 */

/* 動態桶設定（由覆蓋率型專案管理分頁載入）
   BUCKETS_B = [{label:'已貼海報', cols:['門口','四周']}, {label:'已貼冰貼', cols:['冰貼']}]
   BUCKETS_C = [{label:'未商化', cols:['未商化']}]
   向後相容：BUCKET_B / LABEL_B 指向第一個 B 群組（供舊程式路徑使用） */
var BUCKETS_B = [];  /* B 群陣列，每項 {label, cols} */
var BUCKETS_C = [];  /* C 群陣列，每項 {label, cols} */
/* 所有 B/C 群欄位扁平列表 */
function ALL_B_COLS(){ return BUCKETS_B.reduce(function(a,g){ return a.concat(g.cols); },[]); }
function ALL_C_COLS(){ return BUCKETS_C.reduce(function(a,g){ return a.concat(g.cols); },[]); }

/* 覆蓋率型專案管理分頁名稱 */
var COV_CFG_SHEET = '\u8986\u84CB\u7387\u578B\u5C08\u6848\u7BA1\u7406';

/* \u2500\u2500 \u5F9E URL \u53EA\u8B80 sheetId\uFF0C\u5176\u9918\u5168\u5F9E\u7BA1\u7406\u5206\u9801\u67E5 \u2500\u2500 */
var params   = new URLSearchParams(location.search);
var SHEET_ID = params.get('sheetId') || '';

/* \u76EE\u524D\u5C08\u6848\u8CC7\u8A0A\uFF08\u5F9E\u7BA1\u7406\u5206\u9801\u8F09\u5165\u5F8C\u586B\u5165\uFF09*/
var PROJ_NAME  = '\u8986\u84CB\u7387\u770B\u677F';
var SYNC_SHEET = SYNC_SHEET_DEFAULT;
var SYNC_CELL  = SYNC_CELL_DEFAULT;
var SHEET_NAME = SHEET_NAME_DEFAULT;

/* \u2500\u2500 \u72C0\u614B \u2500\u2500 */
var allRows    = [];
var drillStack = [];
var _dialogTitle = '';
var _dialogRows  = [];
var _dialogLevel = 'staff';
/* 視角：'org'（組織）| 'channel'（通路） */
var viewMode = 'org';

/* ── 燈號 chips 狀態 ── */
/* 3 題燈： disp(已有) / no(未有，如果有 BUCKET_C) / unfill(未填寫) */
var chips = { disp: true, no: true, unfill: true };

function initChips() {
  chips = {};
  BUCKETS_B.forEach(function(g, i){ chips['b:'+i] = true; });
  BUCKETS_C.forEach(function(g, i){ chips['c:'+i] = true; });
  chips['unfill'] = true;
  renderLampBar();
}

function renderLampBar() {
  var bar = document.getElementById('lamp-bar');
  if (!bar) return;
  bar.style.display = 'flex';
  bar.innerHTML = '';

  function makeChip(key, label, cls) {
    var btn = document.createElement('button');
    btn.className = 'lamp-chip ' + cls + (chips[key] !== false ? ' on' : '');
    btn.innerHTML = '<span class="lamp-dot"></span>' + esc(label);
    btn.dataset.key = key;
    btn.addEventListener('click', function() { toggleLamp(key); });
    bar.appendChild(btn);
  }

  /* B 群組：每個獨立一顆綠燈 */
  BUCKETS_B.forEach(function(g, i) { makeChip('b:'+i, g.label, 'good'); });
  /* C 群組：每個獨立一顆紅燈 */
  BUCKETS_C.forEach(function(g, i) { makeChip('c:'+i, g.label, 'warn'); });
  /* 未填寫燈 */
  makeChip('unfill', '\u672a\u586b\u5beb', 'neutral');
}

function toggleLamp(key) {
  chips[key] = !chips[key];
  var bar = document.getElementById('lamp-bar');
  if (bar) {
    bar.querySelectorAll('.lamp-chip').forEach(function(btn) {
      if (btn.dataset.key === key) btn.classList.toggle('on', chips[key] !== false);
    });
  }
  render();
}

/* \u2500\u2500 \u5DE5\u5177 \u2500\u2500 */
function showLoading(){ document.getElementById('loading').classList.add('show'); }
function hideLoading(){ document.getElementById('loading').classList.remove('show'); }
function isOne(v){ return Number(v)===1||v===true||v==='true'||v==='1'; }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* \u2500\u2500 \u89E3\u6790 gviz \u65E5\u671F\u683C\u5F0F \u2192 \u4EBA\u985E\u53EF\u8B80 \u2500\u2500 */
function parseGvizDate(v) {
  var m = String(v).match(/Date\((\d+),(\d+),(\d+),(\d+),(\d+),(\d+)\)/);
  if (!m) return String(v);
  var d = new Date(+m[1], +m[2], +m[3], +m[4], +m[5], +m[6]);
  return d.toLocaleString('zh-TW', {
    year:'numeric', month:'2-digit', day:'2-digit',
    hour:'2-digit', minute:'2-digit'
  });
}

/* \u2500\u2500 \u8FD4\u56DE \u2500\u2500 */
function goBack() {
  window.location.href = 'index.html';
}

/* \u2500\u2500 \u7B2C\u4E00\u6B65\uFF1A\u5F9E\u7BA1\u7406\u5206\u9801\u67E5\u51FA\u6B64 sheetId \u7684\u8A2D\u5B9A\uFF0C\u518D\u555F\u52D5 \u2500\u2500 */
function init() {
  if (!SHEET_ID) {
    hideLoading();
    document.getElementById('stage').innerHTML = '<div class="empty">\u26A0\uFE0F \u7F3A\u5C11 sheetId \u53C3\u6578</div>';
    return;
  }
  /* 先讀「覆蓋率型專案管理」取得桶設定，再讀「專案管理」取得基本資料 */
  function parseCsv(s){ return s.split(',').map(function(t){ return t.trim(); }).filter(Boolean); }

  var urlCfg = 'https://docs.google.com/spreadsheets/d/' + MGMT_ID +
    '/gviz/tq?tqx=out:json&headers=1&sheet=' + encodeURIComponent(COV_CFG_SHEET);
  fetch(urlCfg)
    .then(function(r){ return r.text(); })
    .then(function(txt){
      var json = JSON.parse(txt.replace(/^[^\(]+\(/, '').replace(/\);?\s*$/, ''));
      var rows = (json.table && json.table.rows) || [];
      rows.forEach(function(row){
        var cells = row.c || [];
        function cv(c){ return c ? String(c.v!==null&&c.v!==undefined ? c.v : c.f||'').trim() : ''; }
        var sid = cv(cells[1]);
        if (!sid || sid.length < 20) return; /* 跳過表頭列 */
        if (sid !== SHEET_ID) return;
        /* 欄位配置：
           A=專案名 B=專案ID C=未知群組標題 D=未知欄位
           E=B1標題 F=B1欄位 G=C1標題 H=C1欄位
           I=B2標題 J=B2欄位 K=C2標題 L=C2欄位
           M=B3標題 N=B3欄位 O=C3標題 P=C3欄位 ...（每4欄一組 B+C）*/
        var colsA = parseCsv(cv(cells[3]));
        if (colsA.length) COL_UNFILL = colsA[0];

        BUCKETS_B = [];
        BUCKETS_C = [];
        /* 從 E(index 4) 起，每 4 欄讀一對 B+C 群組 */
        for (var gi = 4; gi < cells.length - 1; gi += 4) {
          var lb = cv(cells[gi]),   cb = parseCsv(cv(cells[gi+1] || {}));
          var lc = cv(cells[gi+2] || {}), cc = parseCsv(cv(cells[gi+3] || {}));
          if (!lb && !cb.length && !lc && !cc.length) break; /* 空白即停 */
          if (cb.length) BUCKETS_B.push({ label: lb || '\u5DF2\u6709', cols: cb });
          if (cc.length) BUCKETS_C.push({ label: lc.trim() || '\u672A\u6709', cols: cc.filter(Boolean) });
        }
      });
    })
    .catch(function(){})
    .then(function(){
      /* 不論桶設定是否讀到，繼續讀「專案管理」 */
      var urlMgmt = 'https://docs.google.com/spreadsheets/d/' + MGMT_ID +
        '/gviz/tq?tqx=out:json&headers=1&sheet=' + encodeURIComponent(MGMT_SHEET);
      return fetch(urlMgmt).then(function(r){ return r.text(); });
    })
    .then(function(txt){
      var json = JSON.parse(txt.replace(/^[^\(]+\(/, '').replace(/\);?\s*$/, ''));
      var rows = (json.table && json.table.rows) || [];
      var coverageProjs = [];

      rows.forEach(function(row){
        var cells = row.c || [];
        function cv(c){ return c ? String(c.v!==null&&c.v!==undefined ? c.v : c.f||'').trim() : ''; }
        var active    = cv(cells[0]).toUpperCase() === 'ON';
        var name      = cv(cells[1]);
        var sid       = cv(cells[2]);
        var sheet     = cv(cells[3]) || SHEET_NAME_DEFAULT;
        var sync      = cv(cells[4]) || SYNC_SHEET_DEFAULT;
        var cell      = cv(cells[5]) || SYNC_CELL_DEFAULT;
        var boardType = cv(cells[6]);
        if (!name || !sid) return;
        if (boardType !== '\u8986\u84CB\u7387\u578B') return;
        if (sid === SHEET_ID) {
          PROJ_NAME  = name;
          SHEET_NAME = sheet;
          SYNC_SHEET = sync;
          SYNC_CELL  = cell;
        }
        coverageProjs.push({ name:name, id:sid, active:active });
      });

      document.getElementById('tb-title').textContent = PROJ_NAME;
      document.title = PROJ_NAME;

      var onProjs = coverageProjs.filter(function(p){ return p.active; });
      if (onProjs.length > 1) {
        var sel = document.getElementById('proj-sel');
        sel.innerHTML = onProjs.map(function(p){
          var selected = p.id === SHEET_ID ? ' selected' : '';
          return '<option value="' + esc(p.id) + '"' + selected + '>' + esc(p.name) + '</option>';
        }).join('');
        sel.style.display = '';
      }

      initChips();
      fetchSheet();
      fetchSyncTime();
    })
    .catch(function(){
      document.getElementById('tb-title').textContent = PROJ_NAME;
      initChips();
      fetchSheet();
      fetchSyncTime();
    });
}

function switchProject(sid) {
  location.href = location.pathname + '?sheetId=' + encodeURIComponent(sid);
}

/* \u2500\u2500 \u4E3B\u8CC7\u6599 \u2500\u2500 */
function fetchSheet() {
  showLoading();
  var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
    '/gviz/tq?tqx=out:json&headers=1&sheet=' + encodeURIComponent(SHEET_NAME);
  fetch(url)
    .then(function(r){ return r.text(); })
    .then(function(txt){
      var json = JSON.parse(txt.replace(/^[^\(]+\(/, '').replace(/\);?\s*$/, ''));
      var tbl  = json.table || {};
      var cols = (tbl.cols||[]).map(function(c){ return c.label||''; });
      allRows  = (tbl.rows||[]).map(function(row){
        var obj = {};
        (row.c||[]).forEach(function(cell,i){
          obj[cols[i]] = cell ? (cell.v!==null&&cell.v!==undefined ? cell.v : cell.f||'') : '';
        });
        return obj;
      });
      buildGradeBar();
      render();
    })
    .catch(function(err){
      hideLoading();
      document.getElementById('stage').innerHTML = '<div class="empty">\u26A0\uFE0F \u8F09\u5165\u5931\u6557\uFF1A' + err + '</div>';
    });
}

function fetchSyncTime() {
  var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
    '/gviz/tq?tqx=out:json&sheet=' + encodeURIComponent(SYNC_SHEET) + '&range=' + SYNC_CELL;
  fetch(url)
    .then(function(r){ return r.text(); })
    .then(function(txt){
      var json = JSON.parse(txt.replace(/^[^\(]+\(/, '').replace(/\);?\s*$/, ''));
      var val = '';
      try { val = json.table.rows[0].c[0].v || ''; } catch(e){}
      if (val) {
        document.getElementById('tb-sync').textContent = '\uD83D\uDCCA \u540C\u6B65 ' + parseGvizDate(val);
      }
    })
    .catch(function(){});
}

/* ── 計算 ── */

/* 判斷一列屬於哪個 B 群組（燈開著的才算） */
function rowBGroup(r) {
  for (var i = 0; i < BUCKETS_B.length; i++) {
    if (chips['b:'+i] === false) continue;
    if (BUCKETS_B[i].cols.some(function(t){ return isOne(r[t]); })) return i;
  }
  return -1;
}
/* 判斷一列屬於哪個 C 群組（燈開著的才算） */
function rowCGroup(r) {
  for (var j = 0; j < BUCKETS_C.length; j++) {
    if (chips['c:'+j] === false) continue;
    if (BUCKETS_C[j].cols.some(function(t){ return isOne(r[t]); })) return j;
  }
  return -1;
}
function isDispRow(r){ return rowBGroup(r) >= 0; }
function isNoRow(r){ return rowCGroup(r) >= 0; }

/* 燈狀態篩選：關掉的燈所對應的店家排除 */
function applyChips(rows) {
  return rows.filter(function(r) {
    if (isOne(r[COL_UNFILL])) return chips['unfill'] !== false;
    var bi = rowBGroup(r);
    if (bi >= 0) return chips['b:'+bi] !== false;
    var ci = rowCGroup(r);
    if (ci >= 0) return chips['c:'+ci] !== false;
    return true; /* 其他（尚未確認）→ 永遠納入 */
  });
}

function calcGroup(rows) {
  var filtered = applyChips(rows);
  var total = filtered.length, unfilled = 0;
  /* 每個 B 群和 C 群各自計數 */
  var bGroupCounts = BUCKETS_B.map(function(){ return 0; });
  var cGroupCounts = BUCKETS_C.map(function(){ return 0; });
  var bColCounts = {}, cColCounts = {};
  BUCKETS_B.forEach(function(g){ g.cols.forEach(function(t){ bColCounts[t] = 0; }); });
  BUCKETS_C.forEach(function(g){ g.cols.forEach(function(t){ cColCounts[t] = 0; }); });

  filtered.forEach(function(r){
    if (isOne(r[COL_UNFILL])) { unfilled++; return; }
    var bi = rowBGroup(r);
    if (bi >= 0) {
      bGroupCounts[bi]++;
      BUCKETS_B[bi].cols.forEach(function(t){ if (isOne(r[t])) bColCounts[t]++; });
    }
    var ci = rowCGroup(r);
    if (ci >= 0) {
      cGroupCounts[ci]++;
      BUCKETS_C[ci].cols.forEach(function(t){ if (isOne(r[t])) cColCounts[t]++; });
    }
  });
  var valid = total - unfilled;
  /* hasDisp / hasNo 為所有 B/C 群的總計（向後相容） */
  var hasDisp = bGroupCounts.reduce(function(s,n){ return s+n; }, 0);
  var hasNo   = cGroupCounts.reduce(function(s,n){ return s+n; }, 0);
  return { total:total, unfilled:unfilled, valid:valid,
           hasDisp:hasDisp, hasNo:hasNo,
           bGroupCounts:bGroupCounts, cGroupCounts:cGroupCounts,
           bColCounts:bColCounts, cColCounts:cColCounts };
}

/* \u2500\u2500 \u7BE9\u9078 \u2500\u2500 */
function getCurrentRows() {
  if(!drillStack.length) return allRows;
  /* 逐層累積過濾：每一層都在上一層的結果裡再篩 */
  var rows = allRows;
  drillStack.forEach(function(d){
    var col;
    if(d.level==='area'||d.level==='ch-area')    col=COL_AREA;
    else if(d.level==='office'||d.level==='ch-office') col=COL_OFFICE;
    else if(d.level==='staff')   col=COL_STAFF;
    else if(d.level==='channel') col=COL_CHANNEL;
    else if(d.level==='type')    col=COL_TYPE;
    if(col) rows=rows.filter(function(r){ return String(r[col])===d.key; });
  });
  return rows;
}
function getNextGroups(rows, col) {
  var map={};
  rows.forEach(function(r){
    var k=String(r[col]||''); if(!k) return;
    if(!map[k]) map[k]=[];
    map[k].push(r);
  });
  return map;
}

/* \u2500\u2500 \u5e97\u5bb6\u7b49\u7d1a\u7b5b\u9078 \u2500\u2500 */
function buildGradeBar() {
  var bar = document.getElementById('grade-bar');
  if (!bar) return;
  var gradeSet = {};
  allRows.forEach(function(r){
    var g = String(r[COL_GRADE]||'').trim();
    if (g) gradeSet[g] = true;
  });
  var grades = Object.keys(gradeSet).sort();
  if (!grades.length) { bar.style.display='none'; return; }
  bar.style.display = 'flex';
  bar.innerHTML = '<span class="grade-label">\u5e97\u5bb6\u7b49\u7d1a</span>';
  var allBtn = document.createElement('button');
  allBtn.className = 'grade-chip grade-all' + (selectedGrades===null?' active':'');
  allBtn.textContent = '\u5168\u9078';
  allBtn.onclick = function(){ selectedGrades=null; buildGradeBar(); render(); };
  bar.appendChild(allBtn);
  grades.forEach(function(g){
    var btn = document.createElement('button');
    btn.className = 'grade-chip' + (selectedGrades&&selectedGrades[g]?' active':'');
    btn.textContent = g;
    btn.onclick = function(){
      if (!selectedGrades) selectedGrades = {};
      selectedGrades[g] = !selectedGrades[g];
      if (Object.keys(selectedGrades).every(function(k){ return !selectedGrades[k]; })) selectedGrades = null;
      buildGradeBar(); render();
    };
    bar.appendChild(btn);
  });
}

function applyGradeFilter(rows) {
  if (!selectedGrades) return rows;
  return rows.filter(function(r){
    return selectedGrades[String(r[COL_GRADE]||'').trim()];
  });
}

/* \u2500\u2500 視角切換 \u2500\u2500 */
function setViewMode(mode) {
  if (viewMode === mode) return;
  viewMode = mode;
  drillStack = [];
  document.getElementById('vt-org').classList.toggle('active',     mode === 'org');
  document.getElementById('vt-channel').classList.toggle('active', mode === 'channel');
  render();
}

/* \u2500\u2500 \u6E32\u67D3 \u2500\u2500 */
function render() {
  hideLoading();
  buildQuicknav();
  var stage=document.getElementById('stage');
  stage.innerHTML='';
  var depth=drillStack.length, rows=applyGradeFilter(getCurrentRows());
  var overallName = depth===0 ? '\u5168\u53F0' : drillStack[drillStack.length-1].key;

  if (viewMode === 'channel') {
    /* 通路視角：通路別 → 店家型態 → 營業處 → 營業所/課 → dialog */
    if      (depth===0) renderLevel(stage,rows,COL_CHANNEL,'channel','\u901A\u8DEF\u5225', overallName);
    else if (depth===1) renderLevel(stage,rows,COL_TYPE,   'type',   '\u5E97\u5BB6\u578B\u614B', overallName);
    else if (depth===2) renderLevel(stage,rows,COL_AREA,   'ch-area','\u71DF\u696D\u8655', overallName);
    else if (depth===3) renderLevel(stage,rows,COL_OFFICE, 'ch-office','\u71DF\u696D\u6240/\u8AB2', overallName);
    else stage.innerHTML='<div class="empty">\u5DF2\u5230\u6700\u7D30\u5C64\u7D1A</div>';
  } else {
    /* 組織視角 */
    if      (depth===0) renderLevel(stage,rows,COL_AREA,  'area',  '\u71DF\u696D\u8655', overallName);
    else if (depth===1) renderLevel(stage,rows,COL_OFFICE,'office','\u71DF\u696D\u6240/\u8AB2', overallName);
    else if (depth===2) renderLevel(stage,rows,COL_STAFF, 'staff', '\u696D\u52D9\u4EBA\u54E1', overallName);
    else stage.innerHTML='<div class="empty">\u5DF2\u5230\u6700\u7D30\u5C64\u7D1A</div>';
  }
}

/* \u71df\u696d\u8655\u56fa\u5b9a\u6392\u5e8f\u6e05\u55ae\uff08\u53ea\u5957\u7528\u65bc\u300c\u71df\u696d\u8655\u300d\u9019\u4e00\u5c64\uff09 */
var AREA_ORDER = ['\u5317\u90E8','\u6843\u5712','\u81FA\u4E2D','\u5609\u7FA9','\u81FA\u5357','\u9AD8\u96C4','\u82B1\u84EE'];

/* \u71df\u696d\u8655\u6392\u5e8f\uff1a\u4f9d AREA_ORDER \u6392\uff0c\u6e05\u55ae\u5916\u7684\u6392\u6700\u5f8c\u9762\uff08\u4ecd\u4f9d hasDisp \u964d\u5e8f\uff09
   groups: { key: rows[] }\uff0c\u7528\u4e8e\u8a08\u7b97\u6e05\u55ae\u5916\u540d\u7a31\u7684 hasDisp */
function sortAreaKeys(keys, groups, statCache) {
  function hasDispOf(k) {
    return statCache ? statCache[k].hasDisp : calcGroup(groups[k]).hasDisp;
  }
  return keys.slice().sort(function(a,b){
    var ia = AREA_ORDER.indexOf(a), ib = AREA_ORDER.indexOf(b);
    if (ia===-1 && ib===-1) return hasDispOf(b) - hasDispOf(a);
    if (ia===-1) return 1;
    if (ib===-1) return -1;
    return ia - ib;
  });
}

function renderLevel(stage, rows, col, levelKey, labelText, overallName) {
  var groups=getNextGroups(rows,col), keys=Object.keys(groups);
  if(!keys.length){ stage.innerHTML='<div class="empty">\u7121\u8CC7\u6599</div>'; return; }
  /* \u5feb\u53d6\u6bcf\u500b key \u7684 calcGroup \u7d50\u679c\uff0c\u907f\u514d\u6392\u5e8f\u8207\u5361\u7247\u6e32\u67d3\u91cd\u8907\u8a08\u7b97 */
  var statCache = {};
  keys.forEach(function(k){ statCache[k] = calcGroup(groups[k]); });
  if (levelKey === 'area') {
    keys = sortAreaKeys(keys, groups, statCache);
  } else {
    /* \u5176\u4ed6\u5c64\u7d1a\uff1a\u4f9d hasDisp \u964d\u5e8f\uff08\u5df2\u6709\u6578\u91cf\u6700\u591a\u7684\u6392\u524d\u9762\uff09 */
    keys.sort(function(a,b){ return statCache[b].hasDisp - statCache[a].hasDisp; });
  }
  var div=document.createElement('div');
  div.innerHTML='<div class="level-label">'+labelText+'</div>';
  var grid=document.createElement('div'); grid.className='grid';
  /* 整體卡片固定最前，點即開 dialog */
  var overallCard=buildCard(overallName, labelText, calcGroup(rows), levelKey, rows, true);
  grid.appendChild(overallCard);
  keys.forEach(function(k){ grid.appendChild(buildCard(k,labelText,statCache[k],levelKey,groups[k],false)); });
  div.appendChild(grid); stage.appendChild(div);
}

/* \u2500\u2500 Tooltip \u7D81\u5B9A\u8F14\u52A9\u51FD\u5F0F \u2500\u2500 */
function bindTooltip(triggerEl, ttEl, card) {
  triggerEl.addEventListener('mouseenter', function(e) {
    e.stopPropagation();
    var cardRect = card.getBoundingClientRect();
    if (cardRect.top < 160) {
      ttEl.classList.add('flip');
    } else {
      ttEl.classList.remove('flip');
    }
    ttEl.classList.add('show');
  });
  triggerEl.addEventListener('mouseleave', function() {
    ttEl.classList.remove('show');
    ttEl.classList.remove('flip');
  });
}

/* \u2500\u2500 \u5361\u7247 \u2500\u2500 */
function buildCard(name, labelText, stat, levelKey, rows, isOverall) {
  var card=document.createElement('div');
  card.className='card'+(isOverall?' card-overall':'');
  var ttId='tt-'+name.replace(/[^a-zA-Z0-9]/g,'_')+'-'+levelKey+(isOverall?'-all':'');
  var topLabel=isOverall?('\u6574\u9AD4\u6982\u6CC1'):labelText;
  var T = stat.total;
  function fp(n){ return T>0 ? Math.round(n/T*100)+'%' : '—'; }
  /* 全部卡片標題都是一行：組別小字 + 名稱大字 + 右側明細按鈕 */
  var topHtml = '<div class="card-top-inline">'+esc(topLabel)+' <span class="card-name-inline'+(isOverall?' card-name-overall':'')+'">'+esc(name)+'</span><button class="card-detail-btn" id="dbtn-'+ttId+'">📋 明細</button></div>';
  /* 動態產生 B 群格 + C 群格 */
  var statRowHtml = '<div class="stat-row">'+
    '<div class="stat-item"><div class="stat-label">\u7E3D\u5BB6\u6578</div><div class="stat-val">'+stat.total+'</div><div class="stat-pct hidden">&nbsp;</div></div>'+
    '<div class="stat-item warn'+(chips['unfill']===false?' dim':'')+'"><div class="stat-label">\u672A\u586B\u5BEB</div><div class="stat-val">'+stat.unfilled+'</div><div class="stat-pct">'+fp(stat.unfilled)+'</div></div>';

  BUCKETS_B.forEach(function(g, i){
    var cnt = stat.bGroupCounts[i] || 0;
    var dim = chips['b:'+i]===false ? ' dim' : '';
    var hasMultiCols = g.cols.length > 1;
    var siId = 'sib'+i+'-'+ttId;
    var ttBId = hasMultiCols ? 'ttb'+i+'-'+ttId : '';
    statRowHtml += '<div class="stat-item good'+dim+'" id="'+siId+'" style="position:relative">'+
      '<div class="stat-label">'+esc(g.label)+'</div>'+
      '<div class="stat-val">'+cnt+'</div>'+
      '<div class="stat-pct">'+fp(cnt)+'</div>'+
      (hasMultiCols ? '<div class="tooltip" id="'+ttBId+'">'+buildTooltipHTML(g.label, g.cols, stat.bColCounts)+'</div>' : '')+
    '</div>';
  });

  BUCKETS_C.forEach(function(g, j){
    var cnt = stat.cGroupCounts[j] || 0;
    var dim = chips['c:'+j]===false ? ' dim' : '';
    var hasMultiCols = g.cols.length > 1;
    var siId = 'sic'+j+'-'+ttId;
    var ttCId2 = hasMultiCols ? 'ttc'+j+'-'+ttId : '';
    statRowHtml += '<div class="stat-item warn'+dim+'" id="'+siId+'" style="position:relative">'+
      '<div class="stat-label">'+esc(g.label)+'</div>'+
      '<div class="stat-val">'+cnt+'</div>'+
      '<div class="stat-pct">'+fp(cnt)+'</div>'+
      (hasMultiCols ? '<div class="tooltip" id="'+ttCId2+'">'+buildTooltipHTML(g.label, g.cols, stat.cColCounts)+'</div>' : '')+
    '</div>';
  });

  statRowHtml += '</div>';
  card.innerHTML = topHtml + statRowHtml;

  /* 綁定所有 B 群 tooltip */
  BUCKETS_B.forEach(function(g, i){
    if (g.cols.length <= 1) return;
    var siEl = card.querySelector('#sib'+i+'-'+ttId);
    var ttEl = card.querySelector('#ttb'+i+'-'+ttId);
    if (siEl && ttEl) bindTooltip(siEl, ttEl, card);
  });
  /* 綁定所有 C 群 tooltip */
  BUCKETS_C.forEach(function(g, j){
    if (g.cols.length <= 1) return;
    var siEl = card.querySelector('#sic'+j+'-'+ttId);
    var ttEl = card.querySelector('#ttc'+j+'-'+ttId);
    if (siEl && ttEl) bindTooltip(siEl, ttEl, card);
  });

  card.querySelector('#dbtn-'+ttId).addEventListener('click',function(e){
    e.stopPropagation(); openDialog(name,levelKey,rows);
  });
  card.addEventListener('click',function(e){
    if(e.target.closest('#si-'+ttId)||e.target.closest('#dbtn-'+ttId)) return;
    /* 整體卡片：開 dialog */
    if(isOverall){ openDialog(name,levelKey,rows); return; }
    /* 最末層：開 dialog；其餘層級都往下鑽
       組織視角 leaf = staff
       通路視角 leaf = ch-office（type → ch-area → ch-office → dialog） */
    var isLeaf = (levelKey==='staff') || (levelKey==='ch-office');
    if(isLeaf) openDialog(name,levelKey,rows);
    else drillDown(levelKey,name);
  });
  return card;
}

function buildTooltipHTML(label, buckets, counts) {
  return '<div class="tt-title">'+esc(label)+'</div>'+
    buckets.map(function(t){
      return '<div class="tt-row"><span class="tt-label">'+esc(t)+'</span><span class="tt-val">'+(counts[t]||0)+' \u5BB6</span></div>';
    }).join('');
}

/* \u2500\u2500 drill / quicknav \u2500\u2500 */
function drillDown(levelKey, key){ drillStack.push({level:levelKey,key:key}); render(); }
function drillTo(idx){ drillStack=idx<0?[]:drillStack.slice(0,idx+1); render(); }

function jumpToArea(areaName) {
  drillStack = [{ level:'area', key:areaName }];
  render();
}
function jumpToOffice(areaName, officeName) {
  drillStack = [{ level:'area', key:areaName }, { level:'office', key:officeName }];
  render();
}
function jumpToChannel(chName) {
  drillStack = [{ level:'channel', key:chName }];
  render();
}
function jumpToType(chName, typeName) {
  drillStack = [{ level:'channel', key:chName }, { level:'type', key:typeName }];
  render();
}
function jumpToChArea(chName, typeName, areaName) {
  drillStack = [{ level:'channel', key:chName }, { level:'type', key:typeName }, { level:'ch-area', key:areaName }];
  render();
}
function jumpToChOffice(chName, typeName, areaName, officeName) {
  drillStack = [{ level:'channel', key:chName }, { level:'type', key:typeName }, { level:'ch-area', key:areaName }, { level:'ch-office', key:officeName }];
  render();
}

function qEsc(s){ return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

/* 產生一組 quicknav 按鈕列（導航元件通用）
   label: 組標題, keys: 按鈕文字列表, activeKey: 當前選定值, onclickFn: 產生 onclick 屬性的函式 */
function qnGroupHtml(label, keys, activeKey, onclickFn) {
  if (!keys.length) return '';
  var html = '<div class="qn-group"><span class="qn-label">' + esc(label) + '</span>';
  keys.forEach(function(k) {
    html += '<button class="qn-btn' + (activeKey===k?' active':'') + '" onclick="' + onclickFn(k) + '">' + esc(k) + '</button>';
  });
  html += '</div>';
  return html;
}

function buildQuicknav() {
  var nav = document.getElementById('quicknav');
  if (!nav) return;
  var depth = drillStack.length;
  var html  = '<div class="qn-group"><button class="qn-btn home' + (depth===0?' active':'') + '" onclick="drillTo(-1)">全覽</button></div>';

  if (viewMode === 'org') {
    var areaGroups = getNextGroups(allRows, COL_AREA);
    var curArea    = depth >= 1 ? drillStack[0].key : null;
    var curOffice  = depth >= 2 ? drillStack[1].key : null;

    html += qnGroupHtml('營業處', sortAreaKeys(Object.keys(areaGroups), areaGroups), curArea, function(a) {
      return "jumpToArea('" + qEsc(a) + "')";
    });

    if (curArea && areaGroups[curArea]) {
      var officeGroups = getNextGroups(areaGroups[curArea], COL_OFFICE);
      html += qnGroupHtml(curArea, Object.keys(officeGroups), curOffice, function(o) {
        return "jumpToOffice('" + qEsc(curArea) + "','" + qEsc(o) + "')";
      });
    }
  } else {
    var chGroups  = getNextGroups(allRows, COL_CHANNEL);
    var curCh     = depth >= 1 ? drillStack[0].key : null;
    var curType   = depth >= 2 ? drillStack[1].key : null;
    var curChArea = depth >= 3 ? drillStack[2].key : null;
    var curChOff  = depth >= 4 ? drillStack[3].key : null;

    html += qnGroupHtml('通路別', Object.keys(chGroups), curCh, function(c) {
      return "jumpToChannel('" + qEsc(c) + "')";
    });

    var typeGroups, areaGroups2, offGroups2;

    if (curCh && chGroups[curCh]) {
      typeGroups = getNextGroups(chGroups[curCh], COL_TYPE);
      html += qnGroupHtml(curCh, Object.keys(typeGroups), curType, function(t) {
        return "jumpToType('" + qEsc(curCh) + "','" + qEsc(t) + "')";
      });
    }
    /* 直接從已過濾的 typeGroups[curType] 取得，不需重新掃描 allRows */
    if (curCh && curType && typeGroups && typeGroups[curType]) {
      areaGroups2 = getNextGroups(typeGroups[curType], COL_AREA);
      html += qnGroupHtml(curType, Object.keys(areaGroups2), curChArea, function(a) {
        return "jumpToChArea('" + qEsc(curCh) + "','" + qEsc(curType) + "','" + qEsc(a) + "')";
      });
    }
    /* 同樣直接從已過濾的 areaGroups2[curChArea] 取得 */
    if (curCh && curType && curChArea && areaGroups2 && areaGroups2[curChArea]) {
      offGroups2 = getNextGroups(areaGroups2[curChArea], COL_OFFICE);
      html += qnGroupHtml(curChArea, Object.keys(offGroups2), curChOff, function(o) {
        return "jumpToChOffice('" + qEsc(curCh) + "','" + qEsc(curType) + "','" + qEsc(curChArea) + "','" + qEsc(o) + "')";
      });
    }
  }

  nav.innerHTML = html;
}


/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 \u5E97\u5BB6\u660E\u7D30 Dialog \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */

/* 依 chips 狀態決定 dialog 要顯示哪些列，並帶排序 */
function dialogRows(rows, levelKey) {
  var result = [];
  rows.forEach(function(r) {
    if (isOne(r[COL_UNFILL])) {
      if (chips['unfill'] !== false) result.push({ r:r, grp:3, bi:-1, ci:-1 });
      return;
    }
    var bi = rowBGroup(r);
    if (bi >= 0) { result.push({ r:r, grp:0, bi:bi, ci:-1 }); return; }
    var ci = rowCGroup(r);
    if (ci >= 0) { result.push({ r:r, grp:1, bi:-1, ci:ci }); return; }
    result.push({ r:r, grp:2, bi:-1, ci:-1 });
  });
  /* \u6392\u5e8f\u6b04\u4f4d\u4f9d\u7576\u524d\u5c64\u7d1a\u52d5\u614b\u6c7a\u5b9a\uff08\u7d44\u7e54\u8996\u89d2\u7528\u71df\u696d\u6240/\u4eba\u54e1\uff0c\u901a\u8def\u8996\u89d2\u7528\u5c0d\u61c9\u6b04\uff09 */
  var sortCols = levelKey ? getDisplayCols(levelKey) : [COL_OFFICE, COL_STAFF];
  result.sort(function(a, b) {
    if (a.grp !== b.grp) return a.grp - b.grp;
    for (var i = 0; i < sortCols.length; i++) {
      var c = sortCols[i];
      var va = String(a.r[c]||''), vb = String(b.r[c]||'');
      if (va !== vb) return va > vb ? 1 : -1;
    }
    var na=String(a.r[COL_NAME]||''), nb=String(b.r[COL_NAME]||'');
    return na>nb?1:na<nb?-1:0;
  });
  return result;
}

/* \u5f9e dialogRows \u53d6\u51fa\u7d14 row \u7269\u4ef6\uff08\u7d66 copyLine/copyExcel \u7528\uff09 */
function sortedValidRows(rows, levelKey) {
  return dialogRows(rows, levelKey)
    .filter(function(d){ return d.grp !== 3; }) /* copyLine/Excel \u4e0d\u5305\u542b\u672a\u586b\u5beb */
    .map(function(d){ return d.r; });
}

/* \u5404\u5c64\u7d1a\u5bf9\u61c9\u7684\u9644\u52a0\u6b04\u4f4d\uff08\u7d44\u7e54/\u901a\u8def\u8996\u89d2\u901a\u7528\uff09 */
var COL_LABELS = {
  '\u71DF\u696D\u6240/\u8AB2': '\u71DF\u696D\u6240/\u8AB2',
  '\u57F7\u884C\u4EBA\u54E1': '\u4E3B\u8981\u8A2A\u54E1',
  '\u71DF\u696D\u8655\u540D\u7A31': '\u71DF\u696D\u8655',
  '\u5E97\u5BB6\u578B\u614B': '\u5E97\u5BB6\u578B\u614B'
};

function getExtraCols(levelKey) {
  /* 用於 copyLine/copyExcel 匯出，包含店家型態 */
  switch (levelKey) {
    case 'area':      return [COL_OFFICE, COL_STAFF, COL_TYPE];
    case 'office':    return [COL_STAFF, COL_TYPE];
    case 'staff':     return [COL_TYPE];
    case 'ch-area':   return [COL_OFFICE];
    case 'ch-office': return [];
    case 'type':      return [COL_AREA];
    default:          return [];
  }
}
function getDisplayCols(levelKey) {
  /* 用於 buildStoreTable 顯示欄（COL_TYPE 另行獨立渲染，不在此列） */
  switch (levelKey) {
    case 'area':      return [COL_OFFICE, COL_STAFF];
    case 'office':    return [COL_STAFF];
    case 'ch-area':   return [COL_OFFICE];
    case 'ch-office': return [];
    case 'type':      return [COL_AREA];
    default:          return [];
  }
}

function buildStoreTable(rows, levelKey){
  var items = dialogRows(rows, levelKey);
  var extraCols = getDisplayCols(levelKey);
  var colLabels = COL_LABELS;
  /* 組織視角的 staff/office/area 層加「店家型態」欄，讓明細可以區別 */
  var showType = (levelKey === 'staff' || levelKey === 'office' || levelKey === 'area');
  var html='<div class="detail-scroll"><table class="detail-tbl"><thead><tr>';
  extraCols.forEach(function(c){ html+='<th class="th-left">'+(colLabels[c]||c)+'</th>'; });
  html+='<th class="th-left">\u5E97\u78BC</th><th class="th-left">\u5E97\u540D</th>';
  if(showType) html+='<th class="th-left">\u5E97\u5BB6\u578B\u614B</th>';
  /* B 群欄：每個群組一欄（若群組有多個子欄再逐欄） */
  BUCKETS_B.forEach(function(g){
    if(g.cols.length===1) html+='<th>'+esc(g.label)+'</th>';
    else g.cols.forEach(function(t){ html+='<th>'+esc(t)+'</th>'; });
  });
  BUCKETS_C.forEach(function(g){
    if(g.cols.length===1) html+='<th>'+esc(g.label||'未有')+'</th>';
    else g.cols.filter(function(t){ return t; }).forEach(function(t){ html+='<th>'+esc(t)+'</th>'; });
  });
  html+='</tr></thead><tbody>';

  items.forEach(function(d){
    var r = d.r, grp = d.grp;
    var isUnfill = (grp === 3);
    var trClass  = isUnfill ? ' class="row-unfill"' : '';
    html += '<tr' + trClass + '>';
    extraCols.forEach(function(c){
      html += '<td class="td-org">' + esc(String(r[c]||'\u2014')) + '</td>';
    });
    html += '<td class="td-code">' + esc(String(r[COL_CODE]||'\u2014')) + '</td>';
    html += '<td class="td-name">' + esc(String(r[COL_NAME]||'\u2014')) + '</td>';
    if(showType) html += '<td class="td-org">' + esc(String(r[COL_TYPE]||'\u2014')) + '</td>';

    /* \u72c0\u614b\u6b04 */
    if (isUnfill) {
      html += '<td><span class="d-unfill">\u672A\u586B\u5BEB</span></td>';
      BUCKETS_B.forEach(function(g){ g.cols.forEach(function(){ html+='<td><span class="d-no">\u2014</span></td>'; }); });
      BUCKETS_C.forEach(function(g){ g.cols.filter(function(t){ return t; }).forEach(function(){ html+='<td><span class="d-no">\u2014</span></td>'; }); });
    } else {
      if (grp === 0)      html += '<td><span class="d-yes">\u2705</span></td>';
      else if (grp === 1) { var _lc = (BUCKETS_C[d.ci] && BUCKETS_C[d.ci].label) || '\u672A\u6709'; html += '<td><span class="d-no-label">' + esc(_lc) + '</span></td>'; }
      else                html += '<td><span class="d-no">\u2014</span></td>';
      BUCKETS_B.forEach(function(g){
        var cols = g.cols.length===1 ? g.cols : g.cols;
        cols.forEach(function(t){ html+='<td>'+(isOne(r[t])?'<span class="d-yes">\u2705</span>':'<span class="d-no">\u2014</span>')+'</td>'; });
      });
      BUCKETS_C.forEach(function(g){
        var cols = g.cols.filter(function(t){ return t; });
        cols.forEach(function(t){ html+='<td>'+(isOne(r[t])?'<span class="d-c-yes">\u2716</span>':'<span class="d-no">\u2014</span>')+'</td>'; });
      });
    }
    html += '</tr>';
  });

  html += '</tbody></table></div>';
  return html;
}

function openDialog(displayName, levelKey, rows){
  _dialogTitle=displayName; _dialogRows=rows; _dialogLevel=levelKey;
  /* 依 chips 算各狀態家數 */
  var items    = dialogRows(rows, levelKey);
  var unfillCnt= items.filter(function(d){ return d.grp===3; }).length;
  var dispCnt  = items.filter(function(d){ return d.grp===0; }).length;
  var noCnt    = items.filter(function(d){ return d.grp===1; }).length;
  var total    = items.length;
  /* 組合脈絡前綴（drillStack 路徑 + 目前名稱） */
  var ctx = drillStack.map(function(d){ return d.key; });
  ctx.push(displayName);
  var titleParts = ['\u3010' + ctx.join(' \u203A ') + '\u3011\u5E97\u5BB6\u660E\u7D30'];
  titleParts.push('\u5171 '+total+' \u5BB6');
  if(chips['unfill']!==false && unfillCnt) titleParts.push('\u672A\u586B\u5BEB '+unfillCnt);
  BUCKETS_B.forEach(function(g,i){ if(chips['b:'+i]!==false) titleParts.push(esc(g.label)+' '+items.filter(function(d){ return d.grp===0 && d.bi===i; }).length); });
  BUCKETS_C.forEach(function(g,j){ if(chips['c:'+j]!==false) titleParts.push(esc(g.label)+' '+items.filter(function(d){ return d.grp===1 && d.ci===j; }).length); });
  document.getElementById('dlg-title').textContent = titleParts.join('\u3000');
  document.getElementById('dlg-body').innerHTML=buildStoreTable(rows,levelKey);
  /* 重置按鈕狀態（不重置 innerHTML，靜態 HTML 已定義） */
  ['btn-copy-line','btn-copy-excel','btn-screenshot'].forEach(function(id){
    var b=document.getElementById(id); if(!b) return;
    b.classList.remove('done','loading');
  });
  var dlg=document.getElementById('detail-dialog');
  dlg.style.display='flex';
  requestAnimationFrame(function(){ dlg.classList.add('open'); });
}

function closeDialog(){
  var dlg=document.getElementById('detail-dialog');
  dlg.classList.remove('open');
  setTimeout(function(){ dlg.style.display='none'; },220);
}
document.addEventListener('keydown',function(e){ if(e.key==='Escape') closeDialog(); });

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 \u8907\u88FD / \u622A\u5716 \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
function _flashBtn(btn,label){
  var orig=btn.textContent; btn.textContent=label; btn.classList.add('done');
  setTimeout(function(){ btn.textContent=orig; btn.classList.remove('done'); },2000);
}
function fallbackCopy(text){
  var ta=document.createElement('textarea'); ta.value=text;
  ta.style.cssText='position:fixed;top:0;left:0;opacity:0;pointer-events:none;';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{ document.execCommand('copy'); }catch(e){} document.body.removeChild(ta);
}
function _doCopy(text,btn){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){ _flashBtn(btn,'\u2705 \u5DF2\u8907\u88FD\uFF01'); })
      .catch(function(){ fallbackCopy(text); _flashBtn(btn,'\u2705 \u5DF2\u8907\u88FD\uFF01'); });
  } else { fallbackCopy(text); _flashBtn(btn,'\u2705 \u5DF2\u8907\u88FD\uFF01'); }
}

function copyLine(){
  var btn=document.getElementById('btn-copy-line');
  if(!_dialogRows.length){ _flashBtn(btn,'\u26A0\uFE0F \u7121\u8CC7\u6599'); return; }
  var valid=sortedValidRows(_dialogRows, _dialogLevel), lv=_dialogLevel;
  var hasDisp=valid.filter(function(r){ return isDispRow(r); }).length;
  var hasNo=valid.filter(function(r){ return isNoRow(r); }).length;
  var _lb = BUCKETS_B.length ? BUCKETS_B[0].label : '\u5DF2\u6709';
  var _lc = BUCKETS_C.length ? BUCKETS_C[0].label : '\u672A\u6709';
  var summary='\u6709\u6548 '+valid.length+' \u5BB6\u3000'+_lb+' '+hasDisp+' \u5BB6'+(BUCKETS_C.length?' \u3000'+_lc+' '+hasNo+' \u5BB6':'');
  var lines=['\u3010'+_dialogTitle+'\u3011\u5E97\u5BB6\u660E\u7D30',summary,'\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500'];
  /* \u4ee5\u7b2c\u4e00\u500b\u9644\u52a0\u6b04\u70ba\u5206\u7d44\u4f9d\u636e\uff08\u7d44\u7e54/\u901a\u8def\u8996\u89d2\u901a\u7528\uff09 */
  var groupCol = getExtraCols(lv)[0] || null;
  var curGroup=null;
  var _allBCols = ALL_B_COLS();
  valid.forEach(function(r){
    var groupKey = groupCol ? String(r[groupCol]||'') : null;
    if(groupKey!==null&&groupKey!==curGroup){ curGroup=groupKey; if(groupKey) lines.push('\n\u258C '+groupKey); }
    var code=String(r[COL_CODE]||''), name=String(r[COL_NAME]||'\u2014'), disp=isDispRow(r), noDisp=isNoRow(r);
    var activeTypes=_allBCols.filter(function(t){ return isOne(r[t]); });
    if(disp){ lines.push('  \u2705 '+name+(code?' ('+code+')':'')); if(activeTypes.length) lines.push('     \u2514 '+activeTypes.join('\u3001')); }
    else if(noDisp) lines.push('  \u274C '+name+(code?' ('+code+')':'')+'\uff08'+_lc+'\uff09');
    else lines.push('  \u2014 '+name+(code?' ('+code+')':''));
  });
  lines.push('\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500');
  var footParts = [];
  BUCKETS_B.forEach(function(g){
    g.cols.forEach(function(t){ footParts.push(t+' '+_dialogRows.reduce(function(s,r){ return s+(isOne(r[t])?1:0); },0)+' \u5BB6'); });
  });
  BUCKETS_C.forEach(function(g){
    g.cols.forEach(function(t){ footParts.push(t+' '+_dialogRows.reduce(function(s,r){ return s+(isOne(r[t])?1:0); },0)+' \u5BB6'); });
  });
  if(footParts.length) lines.push(footParts.join('\u3000'));
  _doCopy(lines.join('\n'),btn);
}

function copyExcel(){
  var btn=document.getElementById('btn-copy-excel');
  if(!_dialogRows.length){ _flashBtn(btn,'\u26A0\uFE0F \u7121\u8CC7\u6599'); return; }
  var valid=sortedValidRows(_dialogRows, _dialogLevel), lv=_dialogLevel, lines=[];
  lines.push(document.getElementById('dlg-title').textContent.trim()); lines.push('');
  var extraCols = getExtraCols(lv);
  var headers = extraCols.map(function(c){ return COL_LABELS[c] || c; });
  var dynCols = [];
  BUCKETS_B.forEach(function(g){ if(g.cols.length===1) dynCols.push(g.label); else g.cols.forEach(function(t){ dynCols.push(t); }); });
  BUCKETS_C.forEach(function(g){ if(g.cols.length===1) dynCols.push(g.label); else g.cols.forEach(function(t){ dynCols.push(t); }); });
  headers=headers.concat(['\u5E97\u78BC','\u5E97\u540D']).concat(dynCols);
  lines.push(headers.join('\t'));
  valid.forEach(function(r){
    var row=[];
    extraCols.forEach(function(c){ row.push(String(r[c]||'')); });
    row.push(String(r[COL_CODE]||'')); row.push(String(r[COL_NAME]||''));
    BUCKETS_B.forEach(function(g){ if(g.cols.length===1) row.push(isOne(r[g.cols[0]])?1:0); else g.cols.forEach(function(t){ row.push(isOne(r[t])?1:0); }); });
    BUCKETS_C.forEach(function(g){ if(g.cols.length===1) row.push(isOne(r[g.cols[0]])?1:0); else g.cols.forEach(function(t){ row.push(isOne(r[t])?1:0); }); });
    lines.push(row.join('\t'));
  });
  _doCopy(lines.join('\n'),btn);
}

function takeScreenshot(){
  var btn=document.getElementById('btn-screenshot');
  btn.classList.add('loading'); btn.textContent='\u23F3 \u622A\u5716\u4E2D...';
  function doCapture(){
    var titleText=document.getElementById('dlg-title').textContent.trim();
    var wrapper=document.createElement('div');
    wrapper.style.cssText='background:#fff;padding:20px 24px;font-family:Microsoft JhengHei,Noto Sans TC,sans-serif;display:inline-block;min-width:700px;position:fixed;top:-9999px;left:-9999px;';
    var h=document.createElement('div');
    h.style.cssText='font-size:15px;font-weight:900;color:#2D2D2D;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid #e8e8e8;';
    h.textContent=titleText; wrapper.appendChild(h);
    var tblSrc=document.getElementById('dlg-body').querySelector('.detail-tbl');
    if(tblSrc){
      var tblClone=tblSrc.cloneNode(true);
      tblClone.style.cssText='border-collapse:collapse;font-size:13px;width:max-content;min-width:100%;';
      /* 截圖不用 sticky，明確移除，確保標頭在最上方 */
      tblClone.querySelectorAll('th').forEach(function(el){
        el.style.cssText='padding:7px 12px;text-align:center;font-size:11px;font-weight:800;color:#888;background:#f8f8f8;border-bottom:2px solid #e0e0e0;white-space:nowrap;position:static;box-shadow:none;top:auto;z-index:auto;';
      });
      tblClone.querySelectorAll('th.th-left').forEach(function(el){ el.style.textAlign='left'; });
      tblClone.querySelectorAll('td').forEach(function(el){ el.style.cssText='padding:7px 12px;text-align:center;border-bottom:1px solid #f0f0f0;white-space:nowrap;'; });
      tblClone.querySelectorAll('td.td-org,td.td-code').forEach(function(el){ el.style.textAlign='left'; el.style.color='#888'; });
      tblClone.querySelectorAll('td.td-name').forEach(function(el){ el.style.textAlign='left'; });
      tblClone.querySelectorAll('.d-yes').forEach(function(el){ el.style.color='#3B6D11'; el.style.fontWeight='700'; });
      tblClone.querySelectorAll('.d-no').forEach(function(el){ el.style.color='#ccc'; });
      tblClone.querySelectorAll('.d-unfill').forEach(function(el){ el.style.cssText='font-size:11px;font-weight:700;color:#E65100;background:#FFF3E0;padding:2px 7px;border-radius:6px;'; });
      wrapper.appendChild(tblClone);
    }
    var ts=document.createElement('div');
    ts.style.cssText='font-size:10px;color:#bbb;margin-top:12px;text-align:right;';
    ts.textContent=PROJ_NAME+'\u3000'+new Date().toLocaleString('zh-TW');
    wrapper.appendChild(ts); document.body.appendChild(wrapper);
    html2canvas(wrapper,{ scale:2, backgroundColor:'#ffffff', useCORS:true, width:wrapper.scrollWidth, height:wrapper.scrollHeight })
      .then(function(canvas){
        document.body.removeChild(wrapper);
        if(navigator.clipboard&&window.ClipboardItem){
          canvas.toBlob(function(blob){
            try{
              navigator.clipboard.write([new ClipboardItem({'image/png':blob})])
                .then(function(){ btn.classList.remove('loading'); _flashBtn(btn,'\u2705 \u5DF2\u8907\u88FD\u5716\u7247\uFF01'); })
                .catch(function(){ _downloadCanvas(canvas,titleText,btn); });
            }catch(e){ _downloadCanvas(canvas,titleText,btn); }
          },'image/png');
        } else _downloadCanvas(canvas,titleText,btn);
      }).catch(function(err){ document.body.removeChild(wrapper); btn.classList.remove('loading'); btn.textContent='\uD83D\uDCF8 \u622A\u5716'; alert('\u622A\u5716\u5931\u6557\uFF1A'+err); });
  }
  if(window.html2canvas) doCapture();
  else {
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    s.onload=doCapture;
    s.onerror=function(){ btn.classList.remove('loading'); btn.textContent='\uD83D\uDCF8 \u622A\u5716'; alert('html2canvas \u8F09\u5165\u5931\u6557'); };
    document.head.appendChild(s);
  }
}
function _downloadCanvas(canvas,titleText,btn){
  var link=document.createElement('a');
  link.download=titleText.replace(/\s+/g,'_')+'.png';
  link.href=canvas.toDataURL('image/png'); link.click();
  btn.classList.remove('loading'); _flashBtn(btn,'\u2705 \u5DF2\u4E0B\u8F09\uFF01');
}

/* \u2500\u2500 \u555F\u52D5 \u2500\u2500 */
init();
